<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Usage Metrics</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'IBM Plex Sans', system-ui, sans-serif; font-size: 13px; color: #1a1a1a; background: #f5f4f1; }

    /* ── Toolbar ── */
    .toolbar {
      position: sticky; top: 0; z-index: 100;
      display: flex; align-items: center; gap: 10px;
      padding: 10px 20px; background: #2c2c2c; color: #eee; flex-wrap: wrap;
    }
    .toolbar-title { font-weight: 700; font-size: 14px; }
    .toolbar-spacer { flex: 1; }
    .toolbar-divider { width: 1px; height: 24px; background: rgba(255,255,255,.18); margin: 0 4px; }

    .range-btn {
      padding: 4px 12px; border-radius: 4px; font-size: 11px; font-weight: 600;
      cursor: pointer; border: 1px solid rgba(255,255,255,.2);
      background: rgba(255,255,255,.08); color: #ccc;
      transition: background .12s, color .12s;
    }
    .range-btn.active { background: #3b82f6; border-color: #3b82f6; color: #fff; }
    .range-btn:hover:not(.active) { background: rgba(255,255,255,.15); }

    .nav-link {
      color: #aaa; text-decoration: none; font-size: 12px;
      padding: 4px 10px; border: 1px solid rgba(255,255,255,.15); border-radius: 4px;
    }
    .nav-link:hover { color: #fff; }

    /* ── Page ── */
    .page { max-width: 1100px; margin: 20px auto; padding: 0 20px; }

    /* ── Report header ── */
    .report-header {
      display: flex; justify-content: space-between; align-items: flex-end;
      border-bottom: 2.5px solid #111; padding-bottom: 8px; margin-bottom: 20px;
    }
    .report-header .org-label { font-size: 10.5px; letter-spacing: 1.6px; text-transform: uppercase; color: #777; font-weight: 600; }
    .report-header .title { font-size: 17px; font-weight: 700; margin-top: 1px; }
    .report-header .subtitle { font-size: 12px; color: #888; text-align: right; }

    /* ── Summary cards row ── */
    .summary-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 24px; }
    .summary-card {
      background: #fff; border: 1px solid #e8e5df; border-radius: 8px;
      padding: 16px 18px; display: flex; flex-direction: column; gap: 4px;
    }
    .summary-card .sc-label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.8px; color: #888; }
    .summary-card .sc-value { font-size: 28px; font-weight: 700; color: #111; font-family: 'IBM Plex Mono', monospace; }
    .summary-card .sc-sub   { font-size: 11px; color: #999; }
    .summary-card.accent-green { border-left: 3px solid #16a34a; }
    .summary-card.accent-blue  { border-left: 3px solid #3b82f6; }
    .summary-card.accent-red   { border-left: 3px solid #dc2626; }
    .summary-card.accent-amber { border-left: 3px solid #d97706; }
    .summary-card.accent-teal  { border-left: 3px solid #0891b2; }

    /* ── Report breakdown table ── */
    .section-title {
      font-size: 10px; font-weight: 700; text-transform: uppercase;
      letter-spacing: 1px; color: #888; margin-bottom: 8px;
    }
    .breakdown-table {
      width: 100%; border-collapse: collapse; background: #fff;
      border: 1px solid #e8e5df; border-radius: 8px; overflow: hidden;
      margin-bottom: 24px; font-size: 12px;
    }
    .breakdown-table th {
      background: #f0ede7; padding: 8px 12px; text-align: left;
      font-size: 10px; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.5px; color: #555; border-bottom: 1px solid #ddd;
    }
    .breakdown-table td { padding: 10px 12px; border-bottom: 1px solid #f0ede8; }
    .breakdown-table tr:last-child td { border-bottom: none; }
    .breakdown-table tr:nth-child(even) td { background: #fafaf7; }
    .breakdown-table .report-name { font-weight: 600; color: #111; }
    .breakdown-table .num {
      font-family: 'IBM Plex Mono', monospace; font-size: 12px; text-align: right;
    }
    .breakdown-table .num-zero { color: #ccc; }
    .report-badge {
      display: inline-block; padding: 2px 7px; border-radius: 10px;
      font-size: 10px; font-weight: 600; margin-right: 4px;
    }
    .badge-facility { background: #dcfce7; color: #166534; }
    .badge-gl       { background: #dbeafe; color: #1e40af; }
    .badge-historic { background: #fef3c7; color: #92400e; }
    .badge-programs { background: #f3e8ff; color: #6b21a8; }
    .badge-roster   { background: #cffafe; color: #155e75; }
    .badge-overview    { background: #d1fae5; color: #065f46; }
    .badge-products    { background: #fce7f3; color: #9d174d; }
    .badge-memberships { background: #ffedd5; color: #9a3412; }
    .badge-court-utilization { background: #ccfbf1; color: #115e59; }
    .badge-calendar { background: #ffedd5; color: #9a3412; }
    .badge-fasttrack { background: #e0e7ff; color: #3730a3; }
    .badge-users { background: #f3e8ff; color: #6b21a8; }
    .badge-instructor-payout { background: #e0e7ff; color: #3730a3; }
    .badge-rentalcalendar { background: #d1fae5; color: #065f46; }
    .badge-campmap { background: #dcfce7; color: #14532d; }
    .badge-facilities { background: #ccfbf1; color: #134e4a; }
    .badge-qoq { background: #ede9fe; color: #5b21b6; }

    /* ── Sparkline section ── */
    .chart-card { background: #fff; border: 1px solid #e0ddd8; border-radius: 7px; padding: 16px 18px; margin-bottom: 24px; overflow: visible; }
    .chart-wrap  { position: relative; height: 280px; overflow: visible; }
    .sparkline-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 12px; margin-bottom: 24px; }
    .sparkline-card {
      background: #fff; border: 1px solid #e8e5df; border-radius: 8px; padding: 14px 16px;
    }
    .sparkline-card .sk-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
    .sparkline-card .sk-title  { font-weight: 600; font-size: 12px; }
    .sparkline-card .sk-total  { font-family: 'IBM Plex Mono', monospace; font-size: 13px; font-weight: 700; color: #3b82f6; }
    .sparkline-bars { display: flex; align-items: flex-end; gap: 2px; height: 40px; }
    .sparkline-bar  { flex: 1; border-radius: 2px 2px 0 0; background: #3b82f6; opacity: 0.7; min-height: 2px; transition: opacity .1s; }
    .sparkline-bar:hover { opacity: 1; }
    .sparkline-dates { display: flex; justify-content: space-between; margin-top: 4px; font-size: 9px; color: #bbb; }
    .conv-card { background: #fff; border-radius: 8px; padding: 16px; margin-bottom: 24px; box-shadow: 0 1px 3px rgba(0,0,0,.06); }
    .conv-kpis { display: flex; gap: 24px; margin-bottom: 12px; flex-wrap: wrap; }
    .conv-kpi { text-align: center; }
    .conv-kpi-val { font-size: 22px; font-weight: 700; font-family: 'IBM Plex Mono', monospace; }
    .conv-kpi-label { font-size: 10px; color: #888; text-transform: uppercase; letter-spacing: .5px; }
    .conv-delta { font-size: 11px; font-weight: 600; margin-top: 2px; }
    .conv-delta-up { color: #16a34a; }
    .conv-delta-down { color: #dc2626; }
    .conv-prior-row { font-size: 11px; color: #888; margin-top: 6px; margin-bottom: 8px; padding: 6px 10px; background: #f8f9fa; border-radius: 6px; display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
    .conv-prior-row .conv-delta { display: inline; }
  .fb-card { background: #fff; border-radius: 8px; padding: 16px; margin-bottom: 24px; box-shadow: 0 1px 3px rgba(0,0,0,.06); }
  .fb-list { display: flex; flex-direction: column; gap: 8px; max-height: 400px; overflow-y: auto; }
  .fb-item { display: flex; gap: 10px; align-items: flex-start; padding: 8px 10px; border-radius: 6px; background: #fafafa; font-size: 12px; }
  .fb-score { font-size: 16px; flex-shrink: 0; }
  .fb-meta { color: #888; font-size: 10px; }
  .fb-comment { color: #333; margin-top: 2px; font-style: italic; }
  .fb-empty { text-align: center; color: #aaa; padding: 24px; font-size: 13px; }
    .conv-bars { display: flex; align-items: flex-end; gap: 2px; height: 60px; }
    .conv-bar-group { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 1px; }
    .conv-bar-view { width: 100%; border-radius: 2px 2px 0 0; background: #fb923c; opacity: 0.5; min-height: 1px; }
    .conv-bar-enroll { width: 100%; border-radius: 2px 2px 0 0; background: #22c55e; min-height: 0; }

    /* ── Subscriptions section ── */
    .subs-row { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 10px; margin-bottom: 24px; }
    .sub-card {
      background: #fff; border: 1px solid #e8e5df; border-radius: 8px; padding: 12px 14px;
      display: flex; flex-direction: column; gap: 3px;
    }
    .sub-card .sub-label { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.7px; color: #888; }
    .sub-card .sub-value { font-size: 22px; font-weight: 700; font-family: 'IBM Plex Mono', monospace; color: #111; }
    .sub-card .sub-type  { font-size: 11px; color: #999; }

    /* ── Loading ── */
    .loading { text-align: center; padding: 80px; color: #888; }
    .spinner { display: inline-block; width: 28px; height: 28px; border: 3px solid #ddd; border-top-color: #3b82f6; border-radius: 50%; animation: spin .7s linear infinite; margin-bottom: 12px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes conv-shimmer { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }
    .conv-loading { animation: conv-shimmer 1.2s ease-in-out infinite; }
    .empty { text-align: center; padding: 40px; color: #bbb; font-size: 13px; }
  </style>
  <script>
    // ── Token auth (injected) ────────────────────────────────────────
    const URL_TOKEN = new URLSearchParams(window.location.search).get('token') || '';
    const TOKEN_QS  = URL_TOKEN ? '?token=' + encodeURIComponent(URL_TOKEN) : '';
    function withToken(url) {
      if (!URL_TOKEN) return url;
      return url + (url.includes('?') ? '&' : '?') + 'token=' + encodeURIComponent(URL_TOKEN);
    }
  </script>
</head>
<body>
<div id="root"></div>

<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>

<script type="text/babel">
const { useState, useEffect, useMemo } = React;

const REPORT_META = {
  facility:    { label: "Facility Rental Schedule", badgeClass: "badge-facility" },
  gl:          { label: "GL Code Rollup",            badgeClass: "badge-gl" },
  historic:    { label: "Historic Buildings",        badgeClass: "badge-historic" },
  programs:    { label: "Programs",           badgeClass: "badge-programs" },
  roster:      { label: "Class Roster",              badgeClass: "badge-roster" },
  overview:    { label: "Facility Overview",         badgeClass: "badge-overview" },
  products:    { label: "Product Sales",             badgeClass: "badge-products" },
  memberships: { label: "Memberships",               badgeClass: "badge-memberships" },
  "court-utilization": { label: "Court Utilization", badgeClass: "badge-court-utilization" },
  calendar:    { label: "Program Calendar",                 badgeClass: "badge-calendar" },
  fasttrack:   { label: "Fast Track",               badgeClass: "badge-fasttrack" },
  users:       { label: "Community Intel",           badgeClass: "badge-users" },
  "instructor-payout": { label: "Instructor Payout", badgeClass: "badge-instructor-payout" },
  "rentalcalendar": { label: "Rental Calendar", badgeClass: "badge-rentalcalendar" },
  "campmap": { label: "Campsite Map", badgeClass: "badge-campmap" },
  "facilities": { label: "Facilities", badgeClass: "badge-facilities" },
  qoq: { label: "QoQ Revenue Comparison", badgeClass: "badge-qoq" },
};

// Canonical display order for report rows/charts (matches server REPORT_TYPES).
const REPORT_ORDER = ['facility','facilities','gl','historic','programs','roster','overview','products','memberships','court-utilization','calendar','fasttrack','users','instructor-payout','rentalcalendar','campmap','qoq'];

// Shared per-report colors (sparklines + activity chart).
const REPORT_COLORS = {
  facility:'#16a34a', gl:'#3b82f6', historic:'#d97706', programs:'#7c3aed',
  roster:'#0891b2', overview:'#059669', products:'#db2777',
  memberships:'#ea580c', 'court-utilization':'#0d9488', calendar:'#ea580c',
  fasttrack:'#6366f1', users:'#7c3aed', 'instructor-payout':'#6366f1',
  rentalcalendar:'#059669', campmap:'#15803d',
  qoq:'#8b5cf6',
};

const EVENT_LABELS = {
  view:  "Page Views",
  fetch: "Data Fetches",
  pdf:   "PDF Downloads",
  excel: "Excel Exports",
  print: "Print",
};

function numCell(n) {
  return <td className={`num ${!n ? 'num-zero' : ''}`}>{n || '—'}</td>;
}

// Build daily sparkline data for last N days
function buildSparkline(daily, report, days) {
  const today = new Date();
  const bars = [];
  for (let i = days - 1; i >= 0; i--) {
    const d = new Date(today);
    d.setDate(d.getDate() - i);
    const key = d.toISOString().substring(0, 10);
    bars.push({ date: key, count: (daily[key]?.[report] || 0) });
  }
  return bars;
}

function Sparkline({ bars, color = '#3b82f6' }) {
  const max = Math.max(...bars.map(b => b.count), 1);
  const first = bars[0]?.date.slice(5).replace('-', '/');
  const last  = bars[bars.length - 1]?.date.slice(5).replace('-', '/');
  return (
    <div>
      <div className="sparkline-bars">
        {bars.map((b, i) => (
          <div
            key={i}
            className="sparkline-bar"
            style={{ height: `${Math.max((b.count / max) * 100, b.count > 0 ? 8 : 2)}%`, background: color }}
            title={`${b.date}: ${b.count} views`}
          />
        ))}
      </div>
      <div className="sparkline-dates">
        <span>{first}</span>
        <span>{last}</span>
      </div>
    </div>
  );
}

function App() {
  const orgSlug = useMemo(() => window.location.pathname.split('/').filter(Boolean)[0] || '', []);
  const [days, setDays]         = useState(30);
  const [data, setData]         = useState(null);
  const [loading, setLoading]   = useState(true);
  const [error, setError]       = useState(null);
  const [orgName, setOrgName]   = useState('');

  useEffect(() => {
    setLoading(true); setError(null);
    fetch(withToken(`/${orgSlug}/metrics/api/data?days=${days}`))
      .then(r => { if (!r.ok) throw new Error(`Server returned ${r.status}`); return r.json(); })
      .then(json => { setData(json); setLoading(false); })
      .catch(err => { setError(err.message); setLoading(false); });
  }, [days, orgSlug]);

  // Compute report keys present in data
  const reports = useMemo(() => {
    if (!data) return [];
    // Show all configured reports for this org (zeros if no events yet)
    const configured = data.configuredReports || [];
    const fromSummary = Object.keys(data.summary || {});
    const HIDDEN_REPORTS = new Set(['directors-report']);
    const allReports = [...new Set([...configured, ...fromSummary])].filter(r => !HIDDEN_REPORTS.has(r));
    const ordered = REPORT_ORDER.filter(r => allReports.includes(r));
    const extras  = allReports.filter(r => !REPORT_ORDER.includes(r));
    return [...ordered, ...extras];
  }, [data]);

  // Summary totals across all reports
  const totals = useMemo(() => {
    if (!data) return {};
    const t = { view: 0, fetch: 0, pdf: 0, excel: 0, print: 0 };
    Object.values(data.summary || {}).forEach(r => {
      Object.keys(t).forEach(k => { t[k] += r[k] || 0; });
    });
    return t;
  }, [data]);

  const displayDays = days === 9999 ? 'All time' : `Last ${days} days`;

  function renderBreakdownTable() {
    if (!reports.length) return <div className="empty">No activity recorded yet.</div>;
    return (
      <table className="breakdown-table">
        <thead>
          <tr>
            <th>Report</th>
            <th style={{textAlign:'right'}}>Views</th>
            <th style={{textAlign:'right'}}>Fetches</th>
            <th style={{textAlign:'right'}}>PDFs</th>
            <th style={{textAlign:'right'}}>Excel</th>
            <th style={{textAlign:'right'}}>Print</th>
          </tr>
        </thead>
        <tbody>
          {reports.map(r => {
            const s = data.summary[r] || {};
            const meta = REPORT_META[r] || { label: r, badgeClass: '' };
            return (
              <tr key={r}>
                <td>
                  <span className={`report-badge ${meta.badgeClass}`}>{r}</span>
                  <span className="report-name">{meta.label}</span>
                </td>
                {numCell(s.view)}
                {numCell(s.fetch)}
                {numCell(s.pdf)}
                {numCell(s.excel)}
                {numCell(s.print)}
              </tr>
            );
          })}
        </tbody>
      </table>
    );
  }

  function renderSparklines() {
    if (!reports.length) return null;
    const actualDays = Math.min(days === 9999 ? 90 : days, 90);
    return (
      <>
        <div className="section-title">Daily Page Views (last {actualDays} days)</div>
        <div className="sparkline-grid">
          {reports.map(r => {
            const bars = buildSparkline(data.daily || {}, r, actualDays);
            const total = bars.reduce((s, b) => s + b.count, 0);
            if (!total && days !== 9999) return null;
            const meta = REPORT_META[r] || { label: r };
            const colors = REPORT_COLORS;
            return (
              <div className="sparkline-card" key={r}>
                <div className="sk-header">
                  <span className="sk-title">{meta.label}</span>
                  <span className="sk-total">{total}</span>
                </div>
                <Sparkline bars={bars} color={colors[r] || '#3b82f6'} />
              </div>
            );
          }).filter(Boolean)}
        </div>
      </>
    );
  }

  function ConversionCard() {
    const [views, setViews] = React.useState(null);
    const [enroll, setEnroll] = React.useState(null);

    // Phase 1: fetch views (instant from events.jsonl)
    React.useEffect(() => {
      fetch(withToken(`/${orgSlug}/api/calendar-conversion?days=${days}`))
        .then(r => r.ok ? r.json() : null)
        .then(d => { if (d && d.totalViews > 0) setViews(d); })
        .catch(() => {});
    }, [days]);

    // Phase 2: fetch enrollment + revenue data (async, may be slow)
    React.useEffect(() => {
      if (!views) return;
      setEnroll(null);
      const cutoff = new Date(Date.now() - days * 86400000).toISOString().substring(0, 10);
      Promise.all([
        fetch(withToken(`/${orgSlug}/program-demographics/api/data`)).then(r => r.ok ? r.json() : null),
        fetch(withToken(`/${orgSlug}/programs/api/data`)).then(r => r.ok ? r.json() : null),
      ]).then(([demoJ, progJ]) => {
        const demoRows = demoJ?.rows || demoJ || [];
        const progRows = progJ?.rows || progJ || [];
        const byDay = {};
        demoRows.forEach(r => {
          const d = r['Enrolled Date'] || r['enrolled_date'] || '';
          if (!d) return;
          const day = String(d).substring(0, 10);
          if (day >= cutoff) byDay[day] = (byDay[day] || 0) + 1;
        });
        const total = Object.values(byDay).reduce((s, v) => s + v, 0);
        let totalRev = 0, totalEnr = 0;
        progRows.forEach(r => {
          totalRev += parseFloat(r['net_total'] || r['Net Revenue'] || r['Net Total'] || 0) || 0;
          totalEnr += parseInt(r['enrolled'] || r['Enrollments'] || r['Enrolled'] || 0) || 0;
        });
        const avgTicket = totalEnr > 0 ? totalRev / totalEnr : 0;
        // Prior period: same window length immediately before
        const priorCutoff = new Date(Date.now() - days * 2 * 86400000).toISOString().substring(0, 10);
        const priorByDay = {};
        demoRows.forEach(r => {
          const d = r['Enrolled Date'] || r['enrolled_date'] || '';
          if (!d) return;
          const day = String(d).substring(0, 10);
          if (day >= priorCutoff && day < cutoff) priorByDay[day] = (priorByDay[day] || 0) + 1;
        });
        const priorTotal = Object.values(priorByDay).reduce((s, v) => s + v, 0);
        const priorRevenue = Math.round(priorTotal * avgTicket * 100) / 100;
        setEnroll({ byDay, total, avgTicket, revenue: Math.round(total * avgTicket * 100) / 100, priorTotal, priorRevenue });
      }).catch(() => setEnroll({ byDay: {}, total: 0, avgTicket: 0, revenue: 0 }));
    }, [views, days]);

    if (!views) return null;

    const loading = !enroll;
    const shimCls = loading ? ' conv-loading' : '';
    const daily = views.daily.map(d => ({
      date: d.date, views: d.views,
      enrollments: enroll ? (enroll.byDay[d.date] || 0) : 0,
    }));
    const maxVal = Math.max(...daily.map(d => Math.max(d.views, d.enrollments)), 1);
    const convRate = enroll && views.totalViews > 0 ? ((enroll.total / views.totalViews) * 100).toFixed(1) : null;

    return (
      <div className="conv-card">
        <div className="section-title">{'\u{1F4C5}'} Calendar View {'\u2192'} Registration Funnel</div>
        <div className="conv-kpis">
          <div className="conv-kpi">
            <div className="conv-kpi-val" style={{color:'#fb923c'}}>{views.totalViews}</div>
            <div className="conv-kpi-label">Calendar Views</div>
          </div>
          <div className={'conv-kpi' + shimCls}>
            <div className="conv-kpi-val" style={{color:'#22c55e'}}>{loading ? '\u2026' : enroll.total}</div>
            <div className="conv-kpi-label">Enrollments</div>
            {!loading && enroll.priorTotal > 0 && (() => {
              const pct = Math.round(((enroll.total - enroll.priorTotal) / enroll.priorTotal) * 100);
              return <div className={'conv-delta ' + (pct >= 0 ? 'conv-delta-up' : 'conv-delta-down')}>{pct >= 0 ? '\u2191' : '\u2193'}{Math.abs(pct)}% vs prior</div>;
            })()}
          </div>
          <div className={'conv-kpi' + shimCls}>
            <div className="conv-kpi-val" style={{color:'#3b82f6'}}>{loading ? '\u2026' : (convRate || '0') + '%'}</div>
            <div className="conv-kpi-label">Conversion Rate</div>
          </div>
          <div className={'conv-kpi' + shimCls}>
            <div className="conv-kpi-val" style={{color:'#666'}}>{loading ? '\u2026' : (enroll.avgTicket > 0 ? '$' + Math.round(enroll.avgTicket) : '\u2014')}</div>
            <div className="conv-kpi-label">Avg Ticket</div>
          </div>
          <div className={'conv-kpi' + shimCls}>
            <div className="conv-kpi-val" style={{color:'#16a34a',fontSize:26}}>{loading ? '\u2026' : (enroll.revenue > 0 ? '$' + (enroll.revenue >= 1000 ? (enroll.revenue / 1000).toFixed(1) + 'k' : Math.round(enroll.revenue)) : '\u2014')}</div>
            <div className="conv-kpi-label">Enrollment Revenue</div>
            {!loading && enroll.priorRevenue > 0 && (() => {
              const pct = Math.round(((enroll.revenue - enroll.priorRevenue) / enroll.priorRevenue) * 100);
              return <div className={'conv-delta ' + (pct >= 0 ? 'conv-delta-up' : 'conv-delta-down')}>{pct >= 0 ? '\u2191' : '\u2193'}{Math.abs(pct)}% vs prior</div>;
            })()}
          </div>
        </div>
        {!loading && enroll.priorTotal > 0 && (
          <div className="conv-prior-row">
            <span>Prior {days}d:</span>
            <span style={{fontWeight:600}}>{enroll.priorTotal} enrollments</span>
            <span style={{color:'#aaa'}}>{'·'}</span>
            <span style={{fontWeight:600}}>{enroll.priorRevenue >= 1000 ? '$' + (enroll.priorRevenue / 1000).toFixed(1) + 'k' : '$' + Math.round(enroll.priorRevenue)} est. revenue</span>
            <span style={{color:'#aaa',fontSize:10}}>(avg ticket applied)</span>
          </div>
        )}
        <div style={{fontSize:10,color:'#999',marginBottom:8,lineHeight:1.4}}>
          Correlation, not causation — enrollment revenue reflects registrations that occurred on days the program calendar was viewed. Not all enrollments are directly attributable to calendar views.
        </div>
        <div className="conv-bars">
          {daily.map((d, i) => (
            <div className="conv-bar-group" key={i} title={d.date + ': ' + d.views + ' views' + (loading ? '' : ', ' + d.enrollments + ' enrollments')}>
              <div className="conv-bar-view" style={{height: Math.max((d.views / maxVal) * 60, d.views > 0 ? 2 : 0) + 'px'}} />
              {!loading && <div className="conv-bar-enroll" style={{height: Math.max((d.enrollments / maxVal) * 60, d.enrollments > 0 ? 2 : 0) + 'px'}} />}
            </div>
          ))}
        </div>
        <div className="sparkline-dates">
          <span>{daily[0]?.date?.slice(5)}</span>
          <span style={{fontSize:9,color:'#bbb'}}>{'\uD83D\uDFE7'} views{!loading && ' \uD83D\uDFE9 enrollments'}</span>
          <span>{daily[daily.length - 1]?.date?.slice(5)}</span>
        </div>
      </div>
    );
  }

  function FeedbackFeed() {
    const [fb, setFb] = React.useState(null);
    React.useEffect(function() {
      fetch(withToken('/api/admin/feedback?days=' + days))
        .then(function(r) { return r.ok ? r.json() : null; })
        .then(function(d) { setFb(d); })
        .catch(function() {});
    }, [days]);
    if (!fb || !fb.feedback || fb.feedback.length === 0) return null;

    // Filter to this org
    var orgFb = fb.feedback.filter(function(f) { return f.org === orgSlug; });
    if (orgFb.length === 0) return null;

    // Compute summary
    var totalUp = orgFb.filter(function(f) { return f.score === 1; }).length;
    var totalDown = orgFb.filter(function(f) { return f.score === 0; }).length;
    var withComments = orgFb.filter(function(f) { return f.comment; });

    // Per-source breakdown
    var bySource = {};
    orgFb.forEach(function(f) {
      var src = f.type === 'chat' ? 'Rec AI Chat' : (f.report || 'unknown') + ' insights';
      if (!bySource[src]) bySource[src] = { up: 0, down: 0, total: 0 };
      bySource[src].total++;
      if (f.score === 1) bySource[src].up++;
      else if (f.score === 0) bySource[src].down++;
    });
    var sources = Object.entries(bySource).sort(function(a, b) { return b[1].total - a[1].total; });

    return (
      <div className="fb-card">
        <div className="section-title">💬 AI Feedback</div>
        <div style={{display:'flex',gap:24,marginBottom:12,flexWrap:'wrap'}}>
          <div className="conv-kpi">
            <div className="conv-kpi-val" style={{color:'#16a34a'}}>{totalUp}</div>
            <div className="conv-kpi-label">👍 Positive</div>
          </div>
          <div className="conv-kpi">
            <div className="conv-kpi-val" style={{color:'#dc2626'}}>{totalDown}</div>
            <div className="conv-kpi-label">👎 Negative</div>
          </div>
          <div className="conv-kpi">
            <div className="conv-kpi-val" style={{color:'#3b82f6'}}>{orgFb.length > 0 ? Math.round((totalUp / orgFb.length) * 100) : 0}%</div>
            <div className="conv-kpi-label">Satisfaction</div>
          </div>
        </div>

        {sources.length > 0 && (
          <div style={{marginBottom:12}}>
            <div style={{fontSize:11,fontWeight:600,color:'#666',marginBottom:6,textTransform:'uppercase',letterSpacing:'.5px'}}>By Report</div>
            <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
              {sources.map(function(s) {
                var pct = s[1].total > 0 ? Math.round((s[1].up / s[1].total) * 100) : 0;
                var color = pct >= 80 ? '#16a34a' : pct >= 50 ? '#eab308' : '#dc2626';
                return (
                  <div key={s[0]} style={{background:'#f9fafb',border:'1px solid #e5e7eb',borderRadius:6,padding:'6px 10px',fontSize:11}}>
                    <div style={{fontWeight:600,marginBottom:2}}>{s[0]}</div>
                    <span style={{color:color,fontWeight:700}}>{pct}%</span>
                    <span style={{color:'#999',marginLeft:4}}>👍{s[1].up} 👎{s[1].down}</span>
                  </div>
                );
              })}
            </div>
          </div>
        )}

        {withComments.length > 0 && (
          <div>
            <div style={{fontSize:11,fontWeight:600,color:'#666',marginBottom:6,textTransform:'uppercase',letterSpacing:'.5px'}}>Written Feedback</div>
            <div className="fb-list">
              {withComments.map(function(f, i) {
                return (
                  <div key={i} className="fb-item">
                    <span className="fb-score">{f.score === 1 ? '👍' : '👎'}</span>
                    <div style={{flex:1}}>
                      <div className="fb-meta">
                        {f.type === 'chat' ? 'Rec AI Chat' : f.report + ' insights'} · {f.ts ? new Date(f.ts).toLocaleDateString() + ' ' + new Date(f.ts).toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'}) : ''}
                      </div>
                      <div className="fb-comment">“{f.comment}”</div>
                    </div>
                  </div>
                );
              })}
            </div>
          </div>
        )}
      </div>
    );
  }

  function renderActivityChart() {
    const daily = data?.daily || {};
    const labels = [];
    for (let i = days === 9999 ? 89 : days - 1; i >= 0; i--) {
      const d = new Date(); d.setDate(d.getDate() - i);
      labels.push(d.toISOString().slice(0, 10));
    }
    const COLORS = REPORT_COLORS;
    const datasets = reports.map(r => ({
      label: r,
      data: labels.map(d => daily[d]?.[r] || 0),
      borderColor: COLORS[r] || '#888',
      backgroundColor: (COLORS[r] || '#888') + '22',
      borderWidth: 2, pointRadius: 2, tension: 0.3, fill: true,
    }));
    const chartId = 'activity-chart-' + days;
    return (
      <div className="chart-card">
        <div className="section-title" style={{marginBottom:12}}>Activity Over Time</div>
        <div className="chart-wrap">
          <canvas id={chartId} ref={el => {
            if (!el) return;
            const existing = Chart.getChart(el);
            if (existing) existing.destroy();
            new Chart(el.getContext('2d'), {
              type: 'line',
              data: { labels: labels.map(d => d.slice(5)), datasets },
              options: {
                responsive: true, maintainAspectRatio: false,
                plugins: {
                  legend: { position: 'top', labels: { font: { size: 11 }, boxWidth: 12, padding: 12 } },
                  tooltip: { mode: 'index', intersect: false, filter: function(item) { return item.raw > 0; }, bodyFont: { size: 11 }, titleFont: { size: 12 }, padding: 10 },
                },
                scales: {
                  x: { grid: { display: false }, ticks: { font: { size: 10 }, maxTicksLimit: 12 } },
                  y: { beginAtZero: true, ticks: { font: { size: 10 }, precision: 0 }, grid: { color: '#f5f4f1' } },
                },
              },
            });
          }} />
        </div>
      </div>
    );
  }

  function renderSubscriptions() {
    return null;
  }

  return (
    <div>
      {/* Toolbar */}
      <div className="toolbar">
        <span className="toolbar-title">Usage Metrics</span>
        <div className="toolbar-divider" />
        {[7, 30, 90].map(d => (
          <button key={d} className={`range-btn${days === d ? ' active' : ''}`} onClick={() => setDays(d)}>
            {d}d
          </button>
        ))}
        <button className={`range-btn${days === 9999 ? ' active' : ''}`} onClick={() => setDays(9999)}>All</button>
        <div className="toolbar-spacer" />
        <a href={withToken(`/${orgSlug}`)}     className="nav-link">← Back</a>
      </div>

      <div className="page">
        {/* Header */}
        <div className="report-header">
          <div>
            <div className="org-label">{orgSlug}</div>
            <div className="title">Usage Metrics</div>
          </div>
          <div className="subtitle">{displayDays}</div>
        </div>

        {loading && (
          <div className="loading">
            <div className="spinner" />
            <div>Loading metrics…</div>
          </div>
        )}
        {error && <div className="empty" style={{color:'#b91c1c'}}>Error: {error}</div>}

        {data && !loading && (
          <>
            {/* Summary cards */}
            <div className="summary-row">
              <div className="summary-card accent-green">
                <div className="sc-label">Page Views</div>
                <div className="sc-value">{totals.view || 0}</div>
                <div className="sc-sub">report pages opened</div>
              </div>
              <div className="summary-card accent-blue">
                <div className="sc-label">Data Fetches</div>
                <div className="sc-value">{totals.fetch || 0}</div>
                <div className="sc-sub">Run Report clicks</div>
              </div>
              <div className="summary-card accent-red">
                <div className="sc-label">PDF Downloads</div>
                <div className="sc-value">{totals.pdf || 0}</div>
                <div className="sc-sub">PDF files generated</div>
              </div>
              <div className="summary-card accent-amber">
                <div className="sc-label">Excel Exports</div>
                <div className="sc-value">{totals.excel || 0}</div>
                <div className="sc-sub">spreadsheets downloaded</div>
              </div>
              <div className="summary-card accent-teal">
                <div className="sc-label">Prints</div>
                <div className="sc-value">{totals.print || 0}</div>
                <div className="sc-sub">print actions</div>
              </div>
              <div className="summary-card" style={{borderLeft:'3px solid #10b981'}}>
                <div className="sc-label">AI Insights</div>
                <div className="sc-value">{data.insights?.calls || 0}</div>
                <div className="sc-sub">{(() => { const c = data.insights?.costUsd || 0; return '$' + c.toFixed(c >= 1 ? 2 : 4); })()} est. spend</div>
              </div>
            </div>

            {/* Breakdown table */}
            <div className="section-title">By Report Type</div>
            {renderBreakdownTable()}

            {/* Activity timeline chart */}
            <ConversionCard />
        <FeedbackFeed />
        {renderActivityChart()}

            {/* Sparklines */}
            {renderSparklines()}

            {/* Subscriptions */}
            {renderSubscriptions()}
          </>
        )}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
