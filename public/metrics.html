<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Usage Metrics</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'IBM Plex Sans', system-ui, sans-serif; font-size: 13px; color: #1a1a1a; background: #f5f4f1; }

    /* ── Toolbar ── */
    .toolbar {
      position: sticky; top: 0; z-index: 100;
      display: flex; align-items: center; gap: 10px;
      padding: 10px 20px; background: #2c2c2c; color: #eee; flex-wrap: wrap;
    }
    .toolbar-title { font-weight: 700; font-size: 14px; }
    .toolbar-spacer { flex: 1; }
    .toolbar-divider { width: 1px; height: 24px; background: rgba(255,255,255,.18); margin: 0 4px; }

    .range-btn {
      padding: 4px 12px; border-radius: 4px; font-size: 11px; font-weight: 600;
      cursor: pointer; border: 1px solid rgba(255,255,255,.2);
      background: rgba(255,255,255,.08); color: #ccc;
      transition: background .12s, color .12s;
    }
    .range-btn.active { background: #3b82f6; border-color: #3b82f6; color: #fff; }
    .range-btn:hover:not(.active) { background: rgba(255,255,255,.15); }

    .nav-link {
      color: #aaa; text-decoration: none; font-size: 12px;
      padding: 4px 10px; border: 1px solid rgba(255,255,255,.15); border-radius: 4px;
    }
    .nav-link:hover { color: #fff; }

    /* ── Page ── */
    .page { max-width: 1100px; margin: 20px auto; padding: 0 20px; }

    /* ── Report header ── */
    .report-header {
      display: flex; justify-content: space-between; align-items: flex-end;
      border-bottom: 2.5px solid #111; padding-bottom: 8px; margin-bottom: 20px;
    }
    .report-header .org-label { font-size: 10.5px; letter-spacing: 1.6px; text-transform: uppercase; color: #777; font-weight: 600; }
    .report-header .title { font-size: 17px; font-weight: 700; margin-top: 1px; }
    .report-header .subtitle { font-size: 12px; color: #888; text-align: right; }

    /* ── Summary cards row ── */
    .summary-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 24px; }
    .summary-card {
      background: #fff; border: 1px solid #e8e5df; border-radius: 8px;
      padding: 16px 18px; display: flex; flex-direction: column; gap: 4px;
    }
    .summary-card .sc-label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.8px; color: #888; }
    .summary-card .sc-value { font-size: 28px; font-weight: 700; color: #111; font-family: 'IBM Plex Mono', monospace; }
    .summary-card .sc-sub   { font-size: 11px; color: #999; }
    .summary-card.accent-green { border-left: 3px solid #16a34a; }
    .summary-card.accent-blue  { border-left: 3px solid #3b82f6; }
    .summary-card.accent-red   { border-left: 3px solid #dc2626; }
    .summary-card.accent-amber { border-left: 3px solid #d97706; }
    .summary-card.accent-teal  { border-left: 3px solid #0891b2; }

    /* ── Report breakdown table ── */
    .section-title {
      font-size: 10px; font-weight: 700; text-transform: uppercase;
      letter-spacing: 1px; color: #888; margin-bottom: 8px;
    }
    .breakdown-table {
      width: 100%; border-collapse: collapse; background: #fff;
      border: 1px solid #e8e5df; border-radius: 8px; overflow: hidden;
      margin-bottom: 24px; font-size: 12px;
    }
    .breakdown-table th {
      background: #f0ede7; padding: 8px 12px; text-align: left;
      font-size: 10px; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.5px; color: #555; border-bottom: 1px solid #ddd;
    }
    .breakdown-table td { padding: 10px 12px; border-bottom: 1px solid #f0ede8; }
    .breakdown-table tr:last-child td { border-bottom: none; }
    .breakdown-table tr:nth-child(even) td { background: #fafaf7; }
    .breakdown-table .report-name { font-weight: 600; color: #111; }
    .breakdown-table .num {
      font-family: 'IBM Plex Mono', monospace; font-size: 12px; text-align: right;
    }
    .breakdown-table .num-zero { color: #ccc; }
    .report-badge {
      display: inline-block; padding: 2px 7px; border-radius: 10px;
      font-size: 10px; font-weight: 600; margin-right: 4px;
    }
    .badge-facility { background: #dcfce7; color: #166534; }
    .badge-gl       { background: #dbeafe; color: #1e40af; }
    .badge-historic { background: #fef3c7; color: #92400e; }
    .badge-programs { background: #f3e8ff; color: #6b21a8; }
    .badge-roster   { background: #cffafe; color: #155e75; }
    .badge-overview    { background: #d1fae5; color: #065f46; }
    .badge-products    { background: #fce7f3; color: #9d174d; }
    .badge-memberships { background: #ffedd5; color: #9a3412; }
    .badge-court-utilization { background: #ccfbf1; color: #115e59; }
    .badge-calendar { background: #ffedd5; color: #9a3412; }
    .badge-fasttrack { background: #e0e7ff; color: #3730a3; }
    .badge-users { background: #f3e8ff; color: #6b21a8; }

    /* ── Sparkline section ── */
    .chart-card { background: #fff; border: 1px solid #e0ddd8; border-radius: 7px; padding: 16px 18px; margin-bottom: 24px; }
    .chart-wrap  { position: relative; height: 220px; }
    .sparkline-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 12px; margin-bottom: 24px; }
    .sparkline-card {
      background: #fff; border: 1px solid #e8e5df; border-radius: 8px; padding: 14px 16px;
    }
    .sparkline-card .sk-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
    .sparkline-card .sk-title  { font-weight: 600; font-size: 12px; }
    .sparkline-card .sk-total  { font-family: 'IBM Plex Mono', monospace; font-size: 13px; font-weight: 700; color: #3b82f6; }
    .sparkline-bars { display: flex; align-items: flex-end; gap: 2px; height: 40px; }
    .sparkline-bar  { flex: 1; border-radius: 2px 2px 0 0; background: #3b82f6; opacity: 0.7; min-height: 2px; transition: opacity .1s; }
    .sparkline-bar:hover { opacity: 1; }
    .sparkline-dates { display: flex; justify-content: space-between; margin-top: 4px; font-size: 9px; color: #bbb; }

    /* ── Subscriptions section ── */
    .subs-row { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 10px; margin-bottom: 24px; }
    .sub-card {
      background: #fff; border: 1px solid #e8e5df; border-radius: 8px; padding: 12px 14px;
      display: flex; flex-direction: column; gap: 3px;
    }
    .sub-card .sub-label { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.7px; color: #888; }
    .sub-card .sub-value { font-size: 22px; font-weight: 700; font-family: 'IBM Plex Mono', monospace; color: #111; }
    .sub-card .sub-type  { font-size: 11px; color: #999; }

    /* ── Loading ── */
    .loading { text-align: center; padding: 80px; color: #888; }
    .spinner { display: inline-block; width: 28px; height: 28px; border: 3px solid #ddd; border-top-color: #3b82f6; border-radius: 50%; animation: spin .7s linear infinite; margin-bottom: 12px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .empty { text-align: center; padding: 40px; color: #bbb; font-size: 13px; }
  </style>
  <script>
    // ── Token auth (injected) ────────────────────────────────────────
    const URL_TOKEN = new URLSearchParams(window.location.search).get('token') || '';
    const TOKEN_QS  = URL_TOKEN ? '?token=' + encodeURIComponent(URL_TOKEN) : '';
    function withToken(url) {
      if (!URL_TOKEN) return url;
      return url + (url.includes('?') ? '&' : '?') + 'token=' + encodeURIComponent(URL_TOKEN);
    }
  </script>
</head>
<body>
<div id="root"></div>

<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>

<script type="text/babel">
const { useState, useEffect, useMemo } = React;

const REPORT_META = {
  facility:    { label: "Facility Rental Schedule", badgeClass: "badge-facility" },
  gl:          { label: "GL Code Rollup",            badgeClass: "badge-gl" },
  historic:    { label: "Historic Buildings",        badgeClass: "badge-historic" },
  programs:    { label: "Program Revenue",           badgeClass: "badge-programs" },
  roster:      { label: "Class Roster",              badgeClass: "badge-roster" },
  overview:    { label: "Facility Overview",         badgeClass: "badge-overview" },
  products:    { label: "Product Sales",             badgeClass: "badge-products" },
  memberships: { label: "Memberships",               badgeClass: "badge-memberships" },
  "court-utilization": { label: "Court Utilization", badgeClass: "badge-court-utilization" },
  calendar:    { label: "Calendar",                 badgeClass: "badge-calendar" },
  fasttrack:   { label: "Fast Track",               badgeClass: "badge-fasttrack" },
  users:       { label: "Community Intel",           badgeClass: "badge-users" },
};

// Canonical display order for report rows/charts (matches server REPORT_TYPES).
const REPORT_ORDER = ['facility','gl','historic','programs','roster','overview','products','memberships','court-utilization','calendar','fasttrack','users'];

// Shared per-report colors (sparklines + activity chart).
const REPORT_COLORS = {
  facility:'#16a34a', gl:'#3b82f6', historic:'#d97706', programs:'#7c3aed',
  roster:'#0891b2', overview:'#059669', products:'#db2777',
  memberships:'#ea580c', 'court-utilization':'#0d9488', calendar:'#ea580c',
  fasttrack:'#6366f1', users:'#7c3aed',
};

const EVENT_LABELS = {
  view:  "Page Views",
  fetch: "Data Fetches",
  pdf:   "PDF Downloads",
  excel: "Excel Exports",
  print: "Print",
};

function numCell(n) {
  return <td className={`num ${!n ? 'num-zero' : ''}`}>{n || '—'}</td>;
}

// Build daily sparkline data for last N days
function buildSparkline(daily, report, days) {
  const today = new Date();
  const bars = [];
  for (let i = days - 1; i >= 0; i--) {
    const d = new Date(today);
    d.setDate(d.getDate() - i);
    const key = d.toISOString().substring(0, 10);
    bars.push({ date: key, count: (daily[key]?.[report] || 0) });
  }
  return bars;
}

function Sparkline({ bars, color = '#3b82f6' }) {
  const max = Math.max(...bars.map(b => b.count), 1);
  const first = bars[0]?.date.slice(5).replace('-', '/');
  const last  = bars[bars.length - 1]?.date.slice(5).replace('-', '/');
  return (
    <div>
      <div className="sparkline-bars">
        {bars.map((b, i) => (
          <div
            key={i}
            className="sparkline-bar"
            style={{ height: `${Math.max((b.count / max) * 100, b.count > 0 ? 8 : 2)}%`, background: color }}
            title={`${b.date}: ${b.count} views`}
          />
        ))}
      </div>
      <div className="sparkline-dates">
        <span>{first}</span>
        <span>{last}</span>
      </div>
    </div>
  );
}

function App() {
  const orgSlug = useMemo(() => window.location.pathname.split('/').filter(Boolean)[0] || '', []);
  const [days, setDays]         = useState(30);
  const [data, setData]         = useState(null);
  const [loading, setLoading]   = useState(true);
  const [error, setError]       = useState(null);
  const [orgName, setOrgName]   = useState('');

  useEffect(() => {
    setLoading(true); setError(null);
    fetch(withToken(`/${orgSlug}/metrics/api/data?days=${days}`))
      .then(r => { if (!r.ok) throw new Error(`Server returned ${r.status}`); return r.json(); })
      .then(json => { setData(json); setLoading(false); })
      .catch(err => { setError(err.message); setLoading(false); });
  }, [days, orgSlug]);

  // Compute report keys present in data
  const reports = useMemo(() => {
    if (!data) return [];
    // Show all configured reports for this org (zeros if no events yet)
    const configured = data.configuredReports || [];
    const fromSummary = Object.keys(data.summary || {});
    const allReports = [...new Set([...configured, ...fromSummary])];
    const ordered = REPORT_ORDER.filter(r => allReports.includes(r));
    const extras  = allReports.filter(r => !REPORT_ORDER.includes(r));
    return [...ordered, ...extras];
  }, [data]);

  // Summary totals across all reports
  const totals = useMemo(() => {
    if (!data) return {};
    const t = { view: 0, fetch: 0, pdf: 0, excel: 0, print: 0 };
    Object.values(data.summary || {}).forEach(r => {
      Object.keys(t).forEach(k => { t[k] += r[k] || 0; });
    });
    return t;
  }, [data]);

  const displayDays = days === 9999 ? 'All time' : `Last ${days} days`;

  function renderBreakdownTable() {
    if (!reports.length) return <div className="empty">No activity recorded yet.</div>;
    return (
      <table className="breakdown-table">
        <thead>
          <tr>
            <th>Report</th>
            <th style={{textAlign:'right'}}>Views</th>
            <th style={{textAlign:'right'}}>Fetches</th>
            <th style={{textAlign:'right'}}>PDFs</th>
            <th style={{textAlign:'right'}}>Excel</th>
            <th style={{textAlign:'right'}}>Print</th>
          </tr>
        </thead>
        <tbody>
          {reports.map(r => {
            const s = data.summary[r] || {};
            const meta = REPORT_META[r] || { label: r, badgeClass: '' };
            return (
              <tr key={r}>
                <td>
                  <span className={`report-badge ${meta.badgeClass}`}>{r}</span>
                  <span className="report-name">{meta.label}</span>
                </td>
                {numCell(s.view)}
                {numCell(s.fetch)}
                {numCell(s.pdf)}
                {numCell(s.excel)}
                {numCell(s.print)}
              </tr>
            );
          })}
        </tbody>
      </table>
    );
  }

  function renderSparklines() {
    if (!reports.length) return null;
    const actualDays = Math.min(days === 9999 ? 90 : days, 90);
    return (
      <>
        <div className="section-title">Daily Page Views (last {actualDays} days)</div>
        <div className="sparkline-grid">
          {reports.map(r => {
            const bars = buildSparkline(data.daily || {}, r, actualDays);
            const total = bars.reduce((s, b) => s + b.count, 0);
            if (!total && days !== 9999) return null;
            const meta = REPORT_META[r] || { label: r };
            const colors = REPORT_COLORS;
            return (
              <div className="sparkline-card" key={r}>
                <div className="sk-header">
                  <span className="sk-title">{meta.label}</span>
                  <span className="sk-total">{total}</span>
                </div>
                <Sparkline bars={bars} color={colors[r] || '#3b82f6'} />
              </div>
            );
          }).filter(Boolean)}
        </div>
      </>
    );
  }

  function renderActivityChart() {
    const daily = data?.daily || {};
    const labels = [];
    for (let i = days === 9999 ? 89 : days - 1; i >= 0; i--) {
      const d = new Date(); d.setDate(d.getDate() - i);
      labels.push(d.toISOString().slice(0, 10));
    }
    const COLORS = REPORT_COLORS;
    const datasets = reports.map(r => ({
      label: r,
      data: labels.map(d => daily[d]?.[r] || 0),
      borderColor: COLORS[r] || '#888',
      backgroundColor: (COLORS[r] || '#888') + '22',
      borderWidth: 2, pointRadius: 2, tension: 0.3, fill: true,
    }));
    const chartId = 'activity-chart-' + days;
    return (
      <div className="chart-card">
        <div className="section-title" style={{marginBottom:12}}>Activity Over Time</div>
        <div className="chart-wrap">
          <canvas id={chartId} ref={el => {
            if (!el) return;
            const existing = Chart.getChart(el);
            if (existing) existing.destroy();
            new Chart(el.getContext('2d'), {
              type: 'line',
              data: { labels: labels.map(d => d.slice(5)), datasets },
              options: {
                responsive: true, maintainAspectRatio: false,
                plugins: {
                  legend: { position: 'top', labels: { font: { size: 11 }, boxWidth: 12, padding: 12 } },
                  tooltip: { mode: 'index', intersect: false },
                },
                scales: {
                  x: { grid: { display: false }, ticks: { font: { size: 10 }, maxTicksLimit: 12 } },
                  y: { beginAtZero: true, ticks: { font: { size: 10 }, precision: 0 }, grid: { color: '#f5f4f1' } },
                },
              },
            });
          }} />
        </div>
      </div>
    );
  }

  function renderSubscriptions() {
    return null;
  }

  return (
    <div>
      {/* Toolbar */}
      <div className="toolbar">
        <span className="toolbar-title">Usage Metrics</span>
        <div className="toolbar-divider" />
        {[7, 30, 90].map(d => (
          <button key={d} className={`range-btn${days === d ? ' active' : ''}`} onClick={() => setDays(d)}>
            {d}d
          </button>
        ))}
        <button className={`range-btn${days === 9999 ? ' active' : ''}`} onClick={() => setDays(9999)}>All</button>
        <div className="toolbar-spacer" />
        <a href={withToken(`/${orgSlug}`)}     className="nav-link">← Back</a>
      </div>

      <div className="page">
        {/* Header */}
        <div className="report-header">
          <div>
            <div className="org-label">{orgSlug}</div>
            <div className="title">Usage Metrics</div>
          </div>
          <div className="subtitle">{displayDays}</div>
        </div>

        {loading && (
          <div className="loading">
            <div className="spinner" />
            <div>Loading metrics…</div>
          </div>
        )}
        {error && <div className="empty" style={{color:'#b91c1c'}}>Error: {error}</div>}

        {data && !loading && (
          <>
            {/* Summary cards */}
            <div className="summary-row">
              <div className="summary-card accent-green">
                <div className="sc-label">Page Views</div>
                <div className="sc-value">{totals.view || 0}</div>
                <div className="sc-sub">report pages opened</div>
              </div>
              <div className="summary-card accent-blue">
                <div className="sc-label">Data Fetches</div>
                <div className="sc-value">{totals.fetch || 0}</div>
                <div className="sc-sub">Run Report clicks</div>
              </div>
              <div className="summary-card accent-red">
                <div className="sc-label">PDF Downloads</div>
                <div className="sc-value">{totals.pdf || 0}</div>
                <div className="sc-sub">PDF files generated</div>
              </div>
              <div className="summary-card accent-amber">
                <div className="sc-label">Excel Exports</div>
                <div className="sc-value">{totals.excel || 0}</div>
                <div className="sc-sub">spreadsheets downloaded</div>
              </div>
              <div className="summary-card accent-teal">
                <div className="sc-label">Prints</div>
                <div className="sc-value">{totals.print || 0}</div>
                <div className="sc-sub">print actions</div>
              </div>
              <div className="summary-card" style={{borderLeft:'3px solid #10b981'}}>
                <div className="sc-label">AI Insights</div>
                <div className="sc-value">{data.insights?.calls || 0}</div>
                <div className="sc-sub">{(() => { const c = data.insights?.costUsd || 0; return '$' + c.toFixed(c >= 1 ? 2 : 4); })()} est. spend</div>
              </div>
            </div>

            {/* Breakdown table */}
            <div className="section-title">By Report Type</div>
            {renderBreakdownTable()}

            {/* Activity timeline chart */}
            {renderActivityChart()}

            {/* Sparklines */}
            {renderSparklines()}

            {/* Subscriptions */}
            {renderSubscriptions()}
          </>
        )}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
