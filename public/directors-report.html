<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Director's Report</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'IBM Plex Sans', -apple-system, sans-serif; background: #f5f4f1; color: #111; }
    .print-mode .no-print { display: none !important; }

    /* ── Generator UI ── */
    .gen-wrapper { max-width: 680px; margin: 60px auto; text-align: center; padding: 0 20px; }
    .gen-logo { height: 56px; margin-bottom: 16px; border-radius: 8px; }
    .gen-title { font-size: 24px; font-weight: 700; margin-bottom: 6px; }
    .gen-sub { font-size: 14px; color: #6b7280; margin-bottom: 28px; }
    .gen-btn { padding: 14px 36px; background: #16a34a; color: #fff; border: none; border-radius: 8px; font-size: 15px; font-weight: 700; cursor: pointer; transition: background .15s; }
    .gen-btn:hover { background: #15803d; }
    .gen-btn:disabled { background: #9ca3af; cursor: default; }
    .gen-range { margin-top: 16px; font-size: 13px; color: #9ca3af; }

    /* ── Report layout ── */
    .report-page { max-width: 1040px; margin: 0 auto; padding: 0 20px 40px; }
    .report-page .header { display: flex; justify-content: space-between; align-items: flex-start; padding: 24px 0 16px; border-bottom: 3px solid #16a34a; margin-bottom: 20px; }
    .header-left { display: flex; gap: 14px; align-items: center; }
    .header-logo { height: 44px; border-radius: 6px; }
    .header-org { font-size: 10px; letter-spacing: 1.5px; color: #6b7280; text-transform: uppercase; font-weight: 600; }
    .header-title { font-size: 20px; font-weight: 700; }
    .header-right { text-align: right; font-size: 12px; color: #6b7280; }

    /* KPI strip */
    .kpi-strip { display: flex; gap: 10px; margin-bottom: 18px; flex-wrap: wrap; }
    .kpi-card { flex: 1; min-width: 110px; background: #fff; border: 1px solid #e5e7eb; border-radius: 8px; padding: 12px 14px; }
    .kpi-card .kl { font-size: 9.5px; text-transform: uppercase; letter-spacing: .6px; font-weight: 600; margin-bottom: 3px; }
    .kpi-card .kv { font-size: 22px; font-weight: 700; font-variant-numeric: tabular-nums; }
    .kpi-card .ks { font-size: 10.5px; color: #9ca3af; margin-top: 2px; }

    /* Two-column body */
    .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 18px; }
    @media (max-width: 700px) { .two-col { grid-template-columns: 1fr; } }
    .section { background: #fff; border: 1px solid #e5e7eb; border-radius: 8px; padding: 16px; }
    .section-title { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .6px; margin-bottom: 10px; display: flex; align-items: center; gap: 6px; }
    .section p { font-size: 12.5px; line-height: 1.65; color: #374151; }
    .mini-table { width: 100%; border-collapse: collapse; font-size: 11.5px; margin-top: 8px; }
    .mini-table thead th { text-align: left; font-size: 9.5px; text-transform: uppercase; letter-spacing: .4px; color: #9ca3af; padding: 4px 6px; border-bottom: 1px solid #e5e7eb; }
    .mini-table thead th.r { text-align: right; }
    .mini-table tbody td { padding: 5px 6px; border-bottom: 1px solid #f3f4f6; }
    .mini-table tbody td.r { text-align: right; font-variant-numeric: tabular-nums; }
    .mini-table tbody td.bold { font-weight: 600; }

    /* Footer */
    .report-footer { border-top: 1px solid #ddd; padding-top: 10px; display: flex; justify-content: space-between; font-size: 10.5px; color: #9ca3af; }

    /* Actions bar */
    .actions { display: flex; gap: 10px; margin-bottom: 20px; }
    .btn-action { padding: 8px 20px; border: 1px solid #d1d5db; background: #fff; border-radius: 6px; font-size: 12px; font-weight: 600; cursor: pointer; }
    .btn-action:hover { background: #f9fafb; }
    .btn-pdf { padding: 8px 20px; background: #374151; color: #fff; border: none; border-radius: 6px; font-size: 12px; font-weight: 600; cursor: pointer; }
    .btn-pdf:hover { background: #1f2937; }

    @media print { .no-print { display: none !important; } body { background: #fff; } }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
const { useState, useMemo, useCallback, useEffect } = React;

function App() {
  const cfg = window.ORG_CONFIG || {};
  const slug = cfg.slug || '';
  const orgName = cfg.displayName || slug;
  const logoUrl = cfg.logoUrl || '';
  const token = cfg.token || '';
  const isPrint = new URLSearchParams(window.location.search).get('_print') === '1';

  const [state, setState] = useState('idle'); // idle | loading | done | error
  const [metrics, setMetrics] = useState(null);
  const [errMsg, setErrMsg] = useState('');
  const [pdfLoading, setPdfLoading] = useState(false);
  const [aiInsights, setAiInsights] = useState(null);
  const [aiLoading, setAiLoading] = useState(false);

  // Compute last month date range
  const lastMonth = useMemo(() => {
    var now = new Date();
    var end = new Date(now.getFullYear(), now.getMonth(), 0);
    var start = new Date(end.getFullYear(), end.getMonth(), 1);
    var fmt = d => d.toISOString().slice(0,10);
    var monthName = start.toLocaleString('default', { month: 'long', year: 'numeric' });
    return { start: fmt(start), end: fmt(end), label: monthName };
  }, []);

  function withToken(url) {
    return token ? url + (url.includes('?') ? '&' : '?') + 'token=' + encodeURIComponent(token) : url;
  }

  async function fetchData(report, params) {
    var qs = new URLSearchParams(params || {}).toString();
    var url = withToken('/' + slug + '/' + report + '/api/data' + (qs ? '?' + qs : ''));
    var resp = await fetch(url);
    if (!resp.ok) throw new Error(report + ': HTTP ' + resp.status);
    var json = await resp.json();
    return json.rows || json.data || json || [];
  }

  function fmtMoney(n) { return '$' + Math.round(n).toLocaleString(); }
  function pct(a,b) { return b > 0 ? ((a/b)*100).toFixed(1) + '%' : '—'; }

  const generate = useCallback(async () => {
    setState('loading');
    setErrMsg('');
    try {
      // Fetch data in parallel
      var [glRows, progRows, userRows, ftRows] = await Promise.all([
        fetchData('gl', { start_date: lastMonth.start, end_date: lastMonth.end }).catch(() => []),
        fetchData('programs', { start_date: lastMonth.start, end_date: lastMonth.end }).catch(() => []),
        fetchData('users').catch(() => []),
        fetchData('fasttrack').catch(() => []),
      ]);

      // ── GL Revenue metrics ──
      var glNet = 0, glGross = 0, glRefunds = 0;
      glRows.forEach(r => {
        var net = parseFloat(r['Net Amount'] || r['Net Revenue'] || r['net_amount'] || 0);
        var gross = parseFloat(r['Gross Amount'] || r['Gross Revenue'] || r['Total Payments'] || r['gross_amount'] || 0);
        var ref = Math.abs(parseFloat(r['Total Refunds'] || r['Refund Amount'] || r['Refunds'] || r['refunds'] || 0));
        if (!isNaN(net)) glNet += net;
        if (!isNaN(gross)) glGross += gross;
        if (!isNaN(ref)) glRefunds += ref;
      });

      // ── Programs metrics ──
      var progMap = {};
      progRows.forEach(r => {
        var name = r['Program'] || r['program'] || 'Unknown';
        if (!progMap[name]) progMap[name] = { name, enrolled: 0, capacity: 0, received: 0, sections: 0, netRev: 0 };
        var p = progMap[name];
        p.enrolled += parseInt(r['Enrollments'] || r['Enrolled'] || r['enrolled'] || 0) || 0;
        p.capacity += parseInt(r['Capacity'] || r['capacity'] || 0) || 0;
        p.received += parseFloat(r['Received'] || r['received'] || 0) || 0;
        p.netRev += parseFloat(r['Net Revenue'] || r['Net Total'] || r['net_total'] || 0) || 0;
        p.sections += parseInt(r['Sections'] || 1) || 0;
      });
      var programs = Object.values(progMap).sort((a,b) => b.enrolled - a.enrolled);
      var totalEnroll = programs.reduce((s,p) => s + p.enrolled, 0);
      var totalCap = programs.reduce((s,p) => s + p.capacity, 0);
      var progRevenue = programs.reduce((s,p) => s + p.received, 0);
      if (progRevenue === 0) progRevenue = programs.reduce((s,p) => s + p.netRev, 0);

      // ── Users/CI metrics ──
      var hohs = userRows.filter(r => r['Role'] === 'Head of Household');
      var members = userRows.filter(r => r['Role'] === 'Member');
      var totalHH = hohs.length;
      var totalPeople = userRows.length;
      var thirtyDaysAgo = new Date(Date.now() - 30 * 86400000).toISOString();
      var newHH = hohs.filter(r => r['Created At'] && new Date(r['Created At']).toISOString() >= thirtyDaysAgo).length;
      var ages = userRows.map(r => parseInt(r['Age'])).filter(a => a > 0 && a < 120);
      var medianAge = ages.length > 0 ? (a => { a.sort((x,y) => x-y); return a[Math.floor(a.length/2)]; })(ages.slice()) : null;
      var residents = userRows.filter(r => r['Residency?'] === 'Yes').length;
      var resRate = totalPeople > 0 ? ((residents/totalPeople)*100).toFixed(1) : '0';
      var netRevArr = hohs.map(r => parseFloat(String(r['Net Revenue'] || 0).replace(/,/g,'')) || 0).filter(v => v > 0);
      var avgHHSpend = netRevArr.length > 0 ? Math.round(netRevArr.reduce((s,v) => s+v, 0) / netRevArr.length) : 0;
      var topCity = {};
      userRows.forEach(r => { var c = (r['City']||'').trim(); if (c) topCity[c] = (topCity[c]||0)+1; });
      var topCityName = Object.entries(topCity).sort((a,b) => b[1]-a[1])[0];

      // Revenue mix (from HoH revenue breakdowns)
      var revMix = { program: 0, facility: 0, fee: 0, product: 0 };
      hohs.forEach(r => {
        revMix.program  += parseFloat(String(r['Program Revenue']||0).replace(/,/g,''))||0;
        revMix.facility += parseFloat(String(r['Facility Revenue']||0).replace(/,/g,''))||0;
        revMix.fee      += parseFloat(String(r['Fee Revenue']||0).replace(/,/g,''))||0;
        revMix.product  += parseFloat(String(r['Product Revenue']||0).replace(/,/g,''))||0;
      });
      var revTotal = revMix.program + revMix.facility + revMix.fee + revMix.product;

      // Data completeness
      var hasAge = userRows.filter(r => { var a = parseInt(r['Age']); return a > 0 && a < 120; }).length;
      var hasGender = userRows.filter(r => { var g = (r['Gender']||'').trim(); return g && g.toLowerCase() !== 'unknown'; }).length;
      var hasGrade = userRows.filter(r => { var g = (r['Grade']||'').trim(); return g !== ''; }).length;
      var hasPhone = userRows.filter(r => { var p = (r['Phone']||'').trim(); return p !== ''; }).length;
      var dataComp = {
        age: totalPeople > 0 ? ((hasAge/totalPeople)*100).toFixed(0) : '0',
        gender: totalPeople > 0 ? ((hasGender/totalPeople)*100).toFixed(0) : '0',
        grade: totalPeople > 0 ? ((hasGrade/totalPeople)*100).toFixed(0) : '0',
        phone: totalPeople > 0 ? ((hasPhone/totalPeople)*100).toFixed(0) : '0',
        missingAge: totalPeople - hasAge,
        missingGender: totalPeople - hasGender,
      };

      // Bottom programs (low fill rate with meaningful capacity)
      var bottomProgs = Object.values(progMap)
        .filter(p => p.capacity > 10 && p.enrolled > 0)
        .map(p => ({ name: p.name, enrolled: p.enrolled, capacity: p.capacity, fill: p.capacity > 0 ? ((p.enrolled/p.capacity)*100).toFixed(1) : 0 }))
        .sort((a,b) => parseFloat(a.fill) - parseFloat(b.fill))
        .slice(0, 5);

      // ── Fast Track metrics ──
      var ftSection = ftRows.filter(r => (r['Row Type']||'section') !== 'user');
      var ftSignups = ftSection.reduce((s,r) => s + (parseInt(r['FT Signups'])||0), 0);
      var ftConverted = ftSection.reduce((s,r) => s + (parseInt(r['FT Converted'])||0), 0);
      var ftConvRate = ftSignups > 0 ? ((ftConverted/ftSignups)*100).toFixed(1) : '0';
      var ftPrograms = new Set(ftSection.map(r => r['Program']).filter(Boolean)).size;

      var allMetrics = {
        gl: { net: glNet, gross: glGross, refunds: glRefunds },
        prog: { total: totalEnroll, capacity: totalCap, revenue: progRevenue, count: programs.length, top5: programs.slice(0,5), bottom5: bottomProgs },
        users: { hh: totalHH, people: totalPeople, newHH, medianAge, resRate, avgHHSpend, topCity: topCityName ? topCityName[0] : '—', hohCount: hohs.length, memCount: members.length },
        ft: { signups: ftSignups, converted: ftConverted, convRate: ftConvRate, programs: ftPrograms },
        revMix: revMix,
        revTotal: revTotal,
        dataComp: dataComp,
      };

      setMetrics(allMetrics);
      setState('done');
      // Kick off AI narrative in background
      setAiLoading(true);
      fetch(withToken('/' + slug + '/directors-report/api/insights'), {
        method: 'POST', headers: {'Content-Type':'application/json'},
        body: JSON.stringify(allMetrics),
      }).then(r => r.json()).then(j => {
        if (j.ok && j.insights) setAiInsights(j.insights);
      }).catch(() => {}).finally(() => setAiLoading(false));
    } catch (err) {
      setErrMsg(err.message);
      setState('error');
    }
  }, [slug, token, lastMonth]);

  // Auto-generate in print mode
  useEffect(() => { if (isPrint) generate(); }, []);

  function downloadPdf() {
    setPdfLoading(true);
    fetch(withToken('/' + slug + '/directors-report/api/pdf'))
      .then(r => r.blob())
      .then(blob => {
        var a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = 'directors-report-' + slug + '-' + lastMonth.start.slice(0,7) + '.pdf';
        a.click(); URL.revokeObjectURL(a.href);
      })
      .catch(e => alert('PDF failed: ' + e.message))
      .finally(() => setPdfLoading(false));
  }

  var m = metrics;

  // ── Idle state: show generate button ──
  if (state === 'idle') return (
    <div className="gen-wrapper no-print">
      {logoUrl && <img src={logoUrl} className="gen-logo" alt="" />}
      <div className="gen-title">{orgName}</div>
      <div className="gen-sub">Monthly Director's Report</div>
      <button className="gen-btn" onClick={generate}>Generate Report</button>
      <div className="gen-range">{lastMonth.label}</div>
    </div>
  );

  if (state === 'loading') return (
    <div style={{paddingTop:80}}><JuiceLoader /></div>
  );

  if (state === 'error') return (
    <div className="gen-wrapper">
      <div style={{color:'#dc2626',marginBottom:16}}>Error: {errMsg}</div>
      <button className="gen-btn" onClick={generate}>Retry</button>
    </div>
  );

  // ── Report render ──
  return (
    <div className="report-page">
      <div className="actions no-print">
        <button className="btn-action" onClick={() => { setState('idle'); setMetrics(null); }}>&larr; Back</button>
        <button className="btn-pdf" onClick={downloadPdf} disabled={pdfLoading}>
          {pdfLoading ? 'Generating PDF…' : '📄 Download PDF'}
        </button>
      </div>

      <div className="header">
        <div className="header-left">
          {logoUrl && <img src={logoUrl} className="header-logo" alt="" onError={e => e.target.style.display='none'} />}
          <div>
            <div className="header-org">{orgName}</div>
            <div className="header-title">Monthly Director's Report</div>
          </div>
        </div>
        <div className="header-right">
          <div style={{fontWeight:600,color:'#111'}}>{lastMonth.label}</div>
          <div>Generated {new Date().toLocaleDateString()}</div>
        </div>
      </div>

      {/* Executive KPI strip */}
      <div className="kpi-strip">
        <div className="kpi-card"><div className="kl" style={{color:'#16a34a'}}>Net Revenue</div><div className="kv">{fmtMoney(m.gl.net)}</div>{m.gl.refunds > 0 && <div className="ks">{fmtMoney(m.gl.refunds)} refunded</div>}</div>
        <div className="kpi-card"><div className="kl" style={{color:'#6366f1'}}>Enrollments</div><div className="kv">{m.prog.total.toLocaleString()}</div><div className="ks">{m.prog.count} programs</div></div>
        <div className="kpi-card"><div className="kl" style={{color:'#d97706'}}>Households</div><div className="kv">{m.users.hh.toLocaleString()}</div><div className="ks">+{m.users.newHH} new (30d)</div></div>
        <div className="kpi-card"><div className="kl" style={{color:'#2563eb'}}>Avg HH Spend</div><div className="kv">{fmtMoney(m.users.avgHHSpend)}</div><div className="ks">per spending HH</div></div>
        <div className="kpi-card"><div className="kl" style={{color:'#10b981'}}>Fast Track</div><div className="kv">{m.ft.converted.toLocaleString()}</div><div className="ks">{m.ft.convRate}% conversion</div></div>
        {m.users.medianAge && <div className="kpi-card"><div className="kl" style={{color:'#db2777'}}>Median Age</div><div className="kv">{m.users.medianAge}</div><div className="ks">{m.users.resRate}% residents</div></div>}
      </div>

      {/* AI Executive Insights */}
      {(aiInsights || aiLoading) && (
        <div style={{background:'linear-gradient(135deg,#f0fdf4,#ecfdf5)',border:'1px solid #bbf7d0',borderRadius:10,padding:18,marginBottom:18}}>
          <div style={{fontSize:11,fontWeight:700,textTransform:'uppercase',letterSpacing:'.6px',color:'#065f46',marginBottom:aiInsights?10:0,display:'flex',alignItems:'center',gap:6}}>
            <span>✨</span> Executive Insights
            {aiLoading && <span style={{fontWeight:400,textTransform:'none',color:'#6b7280',letterSpacing:0}}> — analyzing...</span>}
          </div>
          {aiInsights && (
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
              {aiInsights.map((ins, i) => {
                var colors = {positive:'#059669',warning:'#d97706',action:'#2563eb',neutral:'#6b7280'};
                var icons = {positive:'↗',warning:'⚠',action:'→',neutral:'•'};
                return (
                  <div key={i} style={{background:'#fff',borderRadius:6,padding:'10px 12px',borderLeft:'3px solid '+(colors[ins.type]||'#ccc')}}>
                    <div style={{fontSize:12,fontWeight:700,color:colors[ins.type]||'#111',marginBottom:3}}>{icons[ins.type]||'•'} {ins.title}</div>
                    <div style={{fontSize:11.5,color:'#374151',lineHeight:1.55}}>{ins.body}</div>
                  </div>
                );
              })}
            </div>
          )}
        </div>
      )}

      <div className="two-col">
        {/* Left column */}
        <div style={{display:'flex',flexDirection:'column',gap:16}}>
          {/* Revenue summary */}
          <div className="section">
            <div className="section-title"><span style={{color:'#16a34a'}}>💰</span> Revenue Summary</div>
            <p>
              Net revenue of <strong>{fmtMoney(m.gl.net)}</strong> for {lastMonth.label}
              {m.gl.refunds > 0 ? ' with ' + fmtMoney(m.gl.refunds) + ' in refunds (' + pct(m.gl.refunds, m.gl.gross) + ' of gross)' : ''}.
              {m.prog.revenue > 0 ? ' Program registrations contributed ' + fmtMoney(m.prog.revenue) + '.' : ''}
            </p>
          </div>

          {/* Top programs */}
          <div className="section">
            <div className="section-title"><span style={{color:'#6366f1'}}>🎯</span> Top Programs</div>
            {m.prog.top5.length > 0 ? (
              <React.Fragment>
              <table className="mini-table">
                <thead><tr><th>Program</th><th className="r">Enrolled</th><th className="r">Fill %</th><th className="r">Revenue</th></tr></thead>
                <tbody>
                  {m.prog.top5.map((p,i) => {
                    var maxEnroll = m.prog.top5[0].enrolled || 1;
                    return (
                    <tr key={i}>
                      <td className="bold">{p.name}</td>
                      <td className="r" style={{position:'relative'}}>
                        <div style={{position:'absolute',right:0,top:2,bottom:2,width:pct(p.enrolled,maxEnroll),background:'#c7d2fe',borderRadius:3,opacity:.4}} />
                        <span style={{position:'relative'}}>{p.enrolled}</span>
                      </td>
                      <td className="r">{p.capacity > 0 ? pct(p.enrolled, p.capacity) : '—'}</td>
                      <td className="r">{p.received > 0 ? fmtMoney(p.received) : (p.netRev > 0 ? fmtMoney(p.netRev) : '—')}</td>
                    </tr>
                  );})}
                </tbody>
              </table>
              {m.prog.total > 0 && m.prog.capacity > 0 && (
                <div style={{marginTop:8,fontSize:11,color:'#6b7280'}}>Overall fill rate: <strong>{pct(m.prog.total, m.prog.capacity)}</strong> across {m.prog.count} programs</div>
              )}
              </React.Fragment>
            ) : <p style={{color:'#9ca3af'}}>No program data for this period</p>}
          </div>
        </div>

        {/* Right column */}
        <div style={{display:'flex',flexDirection:'column',gap:16}}>
          {/* Community profile */}
          <div className="section">
            <div className="section-title"><span style={{color:'#d97706'}}>👥</span> Community Profile</div>
            <p>
              <strong>{m.users.people.toLocaleString()}</strong> people across <strong>{m.users.hh.toLocaleString()}</strong> households
              ({m.users.hohCount.toLocaleString()} HoH + {m.users.memCount.toLocaleString()} members).
              {m.users.medianAge ? ' Median age ' + m.users.medianAge + '.' : ''}
              {' '}{m.users.resRate}% are verified residents.
              {m.users.topCity !== '—' ? ' Top city: ' + m.users.topCity + '.' : ''}
            </p>
            <p style={{marginTop:8}}>
              <strong>+{m.users.newHH}</strong> new households in the last 30 days.
              {m.users.avgHHSpend > 0 ? ' Average household spend: ' + fmtMoney(m.users.avgHHSpend) + '.' : ''}
            </p>
          </div>

          {/* Fast Track */}
          <div className="section">
            <div className="section-title"><span style={{color:'#10b981'}}>⚡</span> Fast Track Adoption</div>
            <p>
              <strong>{m.ft.signups.toLocaleString()}</strong> Fast Track signups across <strong>{m.ft.programs}</strong> programs.
              {' '}<strong>{m.ft.converted.toLocaleString()}</strong> confirmed enrollments ({m.ft.convRate}% conversion rate).
              {m.ft.converted > 0 ? ' Self-service registrations save staff time and capture revenue 24/7.' : ''}
            </p>
          </div>

          {/* Data quality note */}
          <div className="section" style={{background:'#f9fafb'}}>
            <div className="section-title"><span style={{color:'#6b7280'}}>📋</span> Data Notes</div>
            <p style={{fontSize:11.5,color:'#6b7280'}}>
              Revenue figures from GL Code Rollup. Enrollment data from confirmed program registrations.
              Community demographics from all-time household data (not date-filtered).
              Fast Track metrics are all-time cumulative.
            </p>
          </div>
        </div>
      </div>

      {/* Revenue Mix + Programs Needing Attention */}
      <div className="two-col">
        {/* Revenue Mix */}
        {m.revTotal > 0 && (
          <div className="section">
            <div className="section-title"><span style={{color:'#6366f1'}}>📊</span> Revenue Mix (All-Time)</div>
            {(() => {
              var segs = [
                { label: 'Programs', val: m.revMix.program, color: '#6366f1' },
                { label: 'Facility', val: m.revMix.facility, color: '#059669' },
                { label: 'Products', val: m.revMix.product, color: '#d97706' },
                { label: 'Fees', val: m.revMix.fee, color: '#dc2626' },
              ].filter(s => s.val > 0);
              return (<div>
                <div style={{display:'flex',height:20,borderRadius:6,overflow:'hidden',marginBottom:10}}>
                  {segs.map((s,i) => <div key={i} style={{width:((s.val/m.revTotal)*100)+'%',background:s.color,minWidth:2}} title={s.label+': '+fmtMoney(s.val)} />)}
                </div>
                <div style={{display:'flex',flexWrap:'wrap',gap:'4px 14px',fontSize:11}}>
                  {segs.map((s,i) => <span key={i}><span style={{display:'inline-block',width:8,height:8,borderRadius:2,background:s.color,marginRight:4}} />{s.label} <strong>{fmtMoney(s.val)}</strong> <span style={{color:'#9ca3af'}}>({((s.val/m.revTotal)*100).toFixed(0)}%)</span></span>)}
                </div>
              </div>);
            })()}
          </div>
        )}

        {/* Programs Needing Attention */}
        {m.prog.bottom5 && m.prog.bottom5.length > 0 && (
          <div className="section">
            <div className="section-title"><span style={{color:'#d97706'}}>⚠️</span> Programs Needing Attention</div>
            <table className="mini-table">
              <thead><tr><th>Program</th><th className="r">Enrolled</th><th className="r">Capacity</th><th className="r">Fill %</th></tr></thead>
              <tbody>
                {m.prog.bottom5.map((p,i) => (
                  <tr key={i}>
                    <td className="bold">{p.name}</td>
                    <td className="r">{p.enrolled}</td>
                    <td className="r">{p.capacity}</td>
                    <td className="r" style={{color: parseFloat(p.fill) < 25 ? '#dc2626' : '#d97706', fontWeight: 600}}>{p.fill}%</td>
                  </tr>
                ))}
              </tbody>
            </table>
            <div style={{marginTop:8,fontSize:11,color:'#6b7280'}}>Programs with capacity &gt;10 and lowest fill rates. Consider marketing, rescheduling, or consolidating.</div>
          </div>
        )}
      </div>

      {/* Data Completeness */}
      {m.dataComp && (
        <div className="section" style={{marginBottom:18}}>
          <div className="section-title"><span style={{color:'#7c3aed'}}>📋</span> Data Completeness</div>
          <div style={{display:'flex',gap:16,flexWrap:'wrap'}}>
            {[
              { label: 'Age/DOB', pct: m.dataComp.age, color: '#6366f1' },
              { label: 'Gender', pct: m.dataComp.gender, color: '#db2777' },
              { label: 'Grade', pct: m.dataComp.grade, color: '#059669' },
              { label: 'Phone', pct: m.dataComp.phone, color: '#d97706' },
            ].map((d,i) => (
              <div key={i} style={{flex:1,minWidth:100}}>
                <div style={{display:'flex',justifyContent:'space-between',fontSize:11,marginBottom:3}}>
                  <span style={{color:'#6b7280'}}>{d.label}</span>
                  <span style={{fontWeight:600,color:parseInt(d.pct)<50?'#dc2626':'#374151'}}>{d.pct}%</span>
                </div>
                <div style={{height:8,background:'#f3f4f6',borderRadius:4,overflow:'hidden'}}>
                  <div style={{height:'100%',width:d.pct+'%',background:d.color,borderRadius:4}} />
                </div>
              </div>
            ))}
          </div>
          {(parseInt(m.dataComp.age) < 60 || parseInt(m.dataComp.gender) < 60) && (
            <div style={{marginTop:10,fontSize:11.5,color:'#6b7280',lineHeight:1.5}}>
              {m.dataComp.missingAge > 0 && <span><strong style={{color:'#dc2626'}}>{m.dataComp.missingAge.toLocaleString()}</strong> people missing age data. </span>}
              {m.dataComp.missingGender > 0 && <span><strong style={{color:'#dc2626'}}>{m.dataComp.missingGender.toLocaleString()}</strong> missing gender. </span>}
              Improving completeness strengthens compliance reporting and program targeting.
            </div>
          )}
        </div>
      )}

      <div className="report-footer">
        <span>Powered by Rec Technologies &middot; rec.us</span>
        <span>Confidential &mdash; {orgName}</span>
      </div>

      {m && <div id="report-ready" style={{display:'none'}} />}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
  <script src="/juice-loader.js" defer></script>
  <script src="/nav-breadcrumb.js" defer></script>
<script src="/feedback-widget.js" defer></script>
</body>
</html>
