<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Memberships</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'IBM Plex Sans', 'Segoe UI', system-ui, sans-serif;
      font-size: 12px;
      color: #1a1a1a;
      background: #f5f4f1;
      line-height: 1.35;
    }

    /* ── Toolbar ── */
    .toolbar {
      position: sticky;
      top: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 20px;
      background: #2c2c2c;
      color: #eee;
      font-size: 13px;
      flex-wrap: wrap;
    }
    .toolbar-title { font-weight: 600; margin-right: 8px; }
    .toolbar-spacer { flex: 1; }
    .toolbar input[type="text"], .toolbar input[type="search"] {
      padding: 5px 10px;
      border: 1px solid rgba(255,255,255,.25);
      border-radius: 4px;
      background: rgba(255,255,255,.08);
      color: #fff;
      font-size: 12px;
      font-family: inherit;
      outline: none;
      min-width: 200px;
    }
    .toolbar input[type="text"]:focus, .toolbar input[type="search"]:focus { border-color: #db2777; }
    .toolbar input::placeholder { color: rgba(255,255,255,.5); }
    .toolbar button {
      padding: 6px 14px;
      border: 1px solid rgba(255,255,255,.25);
      border-radius: 4px;
      background: rgba(255,255,255,.08);
      color: #fff;
      font-size: 12px;
      font-family: inherit;
      cursor: pointer;
      transition: background .15s;
    }
    .toolbar button:hover { background: rgba(255,255,255,.18); }
    .toolbar button.active { background: rgba(255,255,255,.22); border-color: rgba(255,255,255,.55); }
    .toolbar .btn-pdf { background: #3b82f6; border-color: #3b82f6; font-weight: 600; }
    .toolbar .btn-pdf:hover { background: #2563eb; }
    .toolbar input[type="date"] {
      padding: 4px 8px;
      border: 1px solid rgba(255,255,255,.25);
      border-radius: 4px;
      background: rgba(255,255,255,.08);
      color: #fff;
      font-size: 12px;
      font-family: inherit;
      outline: none;
      color-scheme: dark;
    }
    .toolbar input[type="date"]:focus { border-color: #db2777; }
    .toolbar input[type="date"]::-webkit-calendar-picker-indicator {
      filter: invert(1); cursor: pointer; opacity: .6;
    }
    .toolbar label { display: flex; align-items: center; gap: 4px; font-size: 11px; white-space: nowrap; }
    .toolbar .divider { width: 1px; height: 24px; background: rgba(255,255,255,.2); margin: 0 2px; }
    .btn-run {
      padding: 6px 14px !important;
      background: #22c55e !important;
      border-color: #22c55e !important;
      color: #fff !important;
      font-weight: 600 !important;
      transition: background .15s, box-shadow .15s;
    }
    .btn-run:hover { background: #16a34a !important; }
    .btn-run:disabled { opacity: .6; cursor: wait; }
    .btn-spinner {
      display: inline-block; width: 12px; height: 12px;
      border: 2px solid rgba(255,255,255,.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin .6s linear infinite;
      margin-right: 6px; vertical-align: middle;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .view-group { display: flex; gap: 0; }
    .view-group button {
      border-radius: 0;
      border-right: none;
    }
    .view-group button:first-child { border-radius: 4px 0 0 4px; }
    .view-group button:last-child  { border-radius: 0 4px 4px 0; border-right: 1px solid rgba(255,255,255,.25); }
    .view-group button.active { background: #db2777; border-color: #db2777; }

    /* multi-select dropdown */
    .ms-wrap { position: relative; }
    .ms-trigger {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 6px 12px;
      border: 1px solid rgba(255,255,255,.25);
      border-radius: 4px;
      background: rgba(255,255,255,.08);
      color: #fff;
      font-size: 12px;
      cursor: pointer;
    }
    .ms-trigger:hover { background: rgba(255,255,255,.18); }
    .ms-trigger .ms-badge {
      background: #f59e0b; color: #1a1a1a; font-weight: 600;
      padding: 1px 6px; border-radius: 8px; font-size: 11px;
    }
    .ms-trigger .ms-badge.all { background: rgba(255,255,255,.2); color: #fff; }
    .ms-panel {
      position: absolute; top: calc(100% + 4px); left: 0;
      background: #fff; color: #1a1a1a;
      border: 1px solid #ddd; border-radius: 6px;
      box-shadow: 0 4px 12px rgba(0,0,0,.15);
      min-width: 280px; max-width: 360px;
      z-index: 200;
      padding: 8px;
    }
    .ms-search {
      width: 100%; padding: 6px 10px;
      border: 1px solid #ddd; border-radius: 4px;
      font-size: 12px; font-family: inherit;
      margin-bottom: 6px;
    }
    .ms-actions {
      display: flex; gap: 6px; padding: 4px 0;
      border-bottom: 1px solid #eee; margin-bottom: 4px;
    }
    .ms-actions button {
      padding: 3px 8px; font-size: 11px;
      border: 1px solid #ddd; border-radius: 3px;
      background: #f7f7f7; color: #333;
      cursor: pointer;
    }
    .ms-actions button:hover { background: #ebebeb; }
    .ms-list { max-height: 280px; overflow-y: auto; }
    .ms-item {
      display: flex; align-items: center; gap: 8px;
      padding: 5px 6px;
      font-size: 12px;
      cursor: pointer;
      border-radius: 3px;
    }
    .ms-item:hover { background: #f5f4f1; }
    .ms-item input { cursor: pointer; }

    /* ── Page ── */
    .page {
      max-width: 1400px; margin: 16px auto; padding: 24px 28px;
      background: #fff; box-shadow: 0 1px 4px rgba(0,0,0,.08);
    }

    /* ── Header ── */
    .report-header {
      display: flex; justify-content: space-between; align-items: center;
      border-bottom: 2.5px solid #111; padding-bottom: 10px; margin-bottom: 18px; gap: 16px;
    }
    .report-header-left { display: flex; align-items: center; gap: 14px; }
    .report-header-logo { height: 42px; max-width: 140px; object-fit: contain; object-position: left center; }
    .report-header .org-label { font-size: 10px; letter-spacing: 1.6px; text-transform: uppercase; color: #777; font-weight: 600; }
    .report-header .title { font-size: 17px; font-weight: 700; margin-top: 1px; }
    .report-header-right { text-align: right; }
    .report-header .date-range { font-size: 11px; color: #666; }

    /* ── Summary Cards ── */
    .summary-cards { display: flex; gap: 12px; margin-bottom: 18px; flex-wrap: wrap; }
    .summary-card {
      flex: 1; min-width: 120px; background: #f5f4f1;
      border: 1px solid #ddd; border-radius: 6px; padding: 10px 14px;
    }
    .summary-card .card-label { font-size: 9.5px; text-transform: uppercase; letter-spacing: 0.8px; color: #888; font-weight: 600; margin-bottom: 4px; }
    .summary-card .card-value { font-size: 18px; font-weight: 700; font-variant-numeric: tabular-nums; color: #111; }
    .summary-card .card-value.green  { color: #15803d; }
    .summary-card .card-value.red    { color: #b91c1c; }
    .summary-card .card-value.blue   { color: #2563eb; }
    .summary-card .card-value.purple { color: #7c3aed; }
    .summary-card .card-value.pink   { color: #db2777; }
    .summary-card .card-value.amber  { color: #d97706; }
    .summary-card .card-sub { font-size: 10px; color: #999; margin-top: 2px; }

    /* ── Footer ── */
    .report-footer {
      display: flex; justify-content: space-between;
      border-top: 2.5px solid #111; margin-top: 16px; padding-top: 6px;
      font-size: 10px; color: #777;
    }

    /* ── Content area ── */
    .content { padding: 0; }

    /* ── Table ── */
    table.report {
      width: 100%;
      border-collapse: collapse;
      background: #fff;
      border: 1px solid #e5e5e5;
      font-size: 11px;
    }
    table.report th, table.report td {
      padding: 6px 10px;
      text-align: left;
      border-bottom: 1px solid #eee;
      vertical-align: middle;
    }
    table.report th {
      background: #2c2c2c;
      color: #fff;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .4px;
      font-size: 10px;
      position: sticky;
      top: 52px;
      z-index: 50;
      cursor: pointer;
      user-select: none;
    }
    table.report th:hover { background: #404040; }
    table.report th.sorted-asc::after  { content: ' ▲'; opacity: .7; }
    table.report th.sorted-desc::after { content: ' ▼'; opacity: .7; }
    table.report td.num, table.report th.num { text-align: right; font-variant-numeric: tabular-nums; }
    table.report tr:hover { background: #fafaf7; }

    .status-pill {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 10px;
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .3px;
    }
    .status-pill.active   { background: #dcfce7; color: #166534; }
    .status-pill.canceled { background: #fee2e2; color: #991b1b; }
    .status-pill.expired  { background: #fef3c7; color: #92400e; }
    .status-pill.inactive { background: #e2e8f0; color: #475569; }

    .renewal-pill {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 10px;
      font-size: 10px;
      font-weight: 600;
    }
    .renewal-pill.auto    { background: #fce7f3; color: #9d174d; }
    .renewal-pill.onetime { background: #f1f5f9; color: #475569; }

    .empty-state {
      text-align: center;
      padding: 80px 40px;
      color: #999;
      background: #fff;
      border: 1px dashed #ddd;
      border-radius: 6px;
    }
    .error-state { color: #b91c1c; }
    .loading { padding: 40px; text-align: center; color: #666; font-size: 13px; }

    /* ── Chart container ── */
    .chart-card {
      background: #fff;
      border: 1px solid #e5e5e5;
      border-radius: 6px;
      padding: 18px 22px;
    }
    .chart-card h3 {
      font-size: 13px;
      font-weight: 600;
      color: #1a1a1a;
      margin-bottom: 12px;
    }
    .chart-card canvas { max-width: 100%; }
    .chart-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 14px;
    }

    @media (min-width: 1000px) {
      .chart-grid.two-col { grid-template-columns: 1fr 1fr; }
    }

    /* ── Print ── */
    @media print {
      .toolbar { display: none; }
      body { background: #fff; }
      .page { box-shadow: none; margin: 0; padding: 12px 16px; max-width: 100%; }
      .summary-card { break-inside: avoid; }
      .chart-card { break-inside: avoid; }
    }
    body.print-mode .toolbar { display: none !important; }
    body.print-mode { background: #fff; }
    body.print-mode .page { box-shadow: none; margin: 0; padding: 12px 16px; max-width: 100%; }
    /* ── Print-friendly table: hide non-essential columns, compact spacing ── */
    /* Cols: 1=Name 2=Email 3=Type 4=Status 5=Renewal 6=Price 7=Paid 8=Refunded 9=Net 10=Start 11=NextRenewal 12=LastUsed 13=Uses */
    body.print-mode table.report th:nth-child(2),
    body.print-mode table.report td:nth-child(2),
    body.print-mode table.report th:nth-child(7),
    body.print-mode table.report td:nth-child(7),
    body.print-mode table.report th:nth-child(8),
    body.print-mode table.report td:nth-child(8),
    body.print-mode table.report th:nth-child(12),
    body.print-mode table.report td:nth-child(12),
    body.print-mode table.report th:nth-child(13),
    body.print-mode table.report td:nth-child(13) { display: none; }
    body.print-mode table.report th,
    body.print-mode table.report td { font-size: 10px; padding: 3px 6px; }
    body.print-mode table.report { font-size: 10px; }
    body.print-mode .summary-cards { gap: 8px; }
    body.print-mode .summary-card { padding: 8px 10px; }
    body.print-mode .summary-card .card-value { font-size: 16px; }
    body.print-mode .insights-section { display: none; }
    body.print-mode .view-tabs { display: none; }
    body.print-mode .filter-bar { display: none; }

    /* ── AI Insights ── */
    .insights-section { margin: 0 0 16px; padding: 16px 0 0; }
    .insights-head { display: flex; align-items: center; gap: 12px; margin-bottom: 10px; }
    .insights-btn { background: linear-gradient(135deg, #6366f1, #8b5cf6); color: #fff; border: none; border-radius: 8px; padding: 8px 18px; font-size: 13px; font-weight: 600; cursor: pointer; font-family: inherit; }
    .insights-btn:hover { filter: brightness(1.08); }
    .insights-btn:disabled { opacity: .6; cursor: wait; }
    .insights-sub { font-size: 12px; color: #888; }
    .insights-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(230px, 1fr)); gap: 12px; }
    .insight-card { border: 1px solid #e5e7eb; border-left-width: 4px; border-radius: 8px; padding: 14px 16px; background: #fff; }
    .insight-opportunity { border-left-color: #10b981; } .insight-opportunity .insight-type { color: #059669; }
    .insight-risk { border-left-color: #ef4444; } .insight-risk .insight-type { color: #dc2626; }
    .insight-signal { border-left-color: #3b82f6; } .insight-signal .insight-type { color: #2563eb; }
    .insight-type { font-size: 10px; font-weight: 700; letter-spacing: .6px; text-transform: uppercase; margin-bottom: 6px; }
    .insight-title { font-size: 14px; font-weight: 700; color: #111827; margin-bottom: 5px; line-height: 1.3; }
    .insight-detail { font-size: 13px; color: #4b5563; line-height: 1.5; }
    .insight-action { font-size: 12px; color: #6b7280; margin-top: 8px; font-weight: 500; }
    .insights-feedback { display:flex; align-items:center; gap:8px; margin-top:12px; padding:8px 4px; font-size:13px; color:#666; }
    .insights-feedback button { background:none; border:1px solid #e5e7eb; border-radius:6px; padding:4px 10px; cursor:pointer; font-size:13px; transition:all .15s; }
    .insights-feedback button:hover { background:#f3f4f6; border-color:#d1d5db; }
    .insights-feedback .fb-label { color:#888; font-size:12px; }
    .insights-feedback .fb-thanks { color:#10b981; font-weight:600; font-size:13px; }
    .insights-feedback .fb-down-form { display:flex; align-items:center; gap:6px; flex:1; }
    .insights-feedback .fb-down-form input { flex:1; border:1px solid #d1d5db; border-radius:6px; padding:5px 10px; font-size:13px; font-family:inherit; outline:none; }
    .insights-feedback .fb-down-form input:focus { border-color:#6366f1; box-shadow:0 0 0 2px rgba(99,102,241,.15); }
    .insights-feedback .fb-send { background:#6366f1!important; color:#fff!important; border-color:#6366f1!important; font-weight:600; }
    .insights-feedback .fb-send:hover { background:#4f46e5!important; }
    .ai-loading { padding: 24px 16px; text-align: center; }
    .ai-spinner { border:3px solid #e5e7eb; border-top:3px solid #6366f1; border-radius:50%; width:24px; height:24px; margin:0 auto; animation:ai-spin 1s linear infinite; }
    @keyframes ai-spin { to { transform:rotate(360deg); } }

    /* ── Retention Tab ── */
    .ret-kpis { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 10px; margin-bottom: 16px; }
    .ret-kpi { background: #fff; border: 1px solid #e8e6e0; border-radius: 6px; padding: 12px 14px; }
    .ret-kpi .rl { font-size: 10px; font-weight: 600; color: #888; text-transform: uppercase; letter-spacing: .4px; margin-bottom: 3px; }
    .ret-kpi .rv { font-size: 20px; font-weight: 700; color: #111; font-variant-numeric: tabular-nums; }
    .ret-kpi .rs { font-size: 10px; color: #999; margin-top: 2px; }
    .ret-table-wrap { overflow-x: auto; margin-top: 16px; }
    .ret-table { width: 100%; border-collapse: collapse; font-size: 10px; }
    .ret-table th { padding: 5px 7px; text-align: right; font-weight: 600; color: #888; border-bottom: 1.5px solid #ddd; font-size: 9px; white-space: nowrap; }
    .ret-table th:first-child { text-align: left; }
    .ret-table td { padding: 5px 7px; text-align: right; border-bottom: 0.5px solid #eee; font-weight: 500; font-variant-numeric: tabular-nums; }
    .ret-table td:first-child { text-align: left; font-weight: 600; color: #333; white-space: nowrap; }
    .ret-table td:nth-child(2) { color: #666; }

    /* ── Report Tabs (FT-style) ── */
    .report-tabs { display: flex; gap: 0; border-bottom: 2px solid #e0ddd8; margin-bottom: 20px; }
    .report-tabs .tab-btn { padding: 10px 20px; font-size: 13px; font-weight: 600; font-family: inherit; background: none; border: none; border-bottom: 2px solid transparent; margin-bottom: -2px; cursor: pointer; color: #888; transition: color .15s, border-color .15s; }
    .report-tabs .tab-btn:hover { color: #333; }
    .report-tabs .tab-btn.active { color: #111; border-bottom-color: #6366f1; }
    .report-tabs .tab-badge { font-size: 10px; font-weight: 700; padding: 2px 7px; border-radius: 10px; margin-left: 6px; background: #6366f122; color: #6366f1; }

    /* ── Check-In Dashboard ── */
    .ci-kpis { display: grid; grid-template-columns: repeat(auto-fit, minmax(170px, 1fr)); gap: 10px; margin-bottom: 16px; }
    .ci-kpi { background: #fff; border: 1px solid #e8e6e0; border-radius: 6px; padding: 12px 14px; }
    .ci-kpi .kl { font-size: 11px; font-weight: 600; color: #888; text-transform: uppercase; letter-spacing: .4px; margin-bottom: 4px; }
    .ci-kpi .kv { font-size: 20px; font-weight: 700; color: #111; font-variant-numeric: tabular-nums; }
    .ci-kpi .ks { font-size: 11px; color: #999; margin-top: 2px; }
    .ci-charts { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 12px; }
    @media (max-width: 700px) { .ci-charts { grid-template-columns: 1fr; } }
    .ci-chart-box { background: #fff; border: 1px solid #e8e6e0; border-radius: 6px; padding: 14px 16px; }
    .ci-chart-title { font-size: 12px; font-weight: 700; color: #333; margin-bottom: 10px; }
    .ci-bar-row { display: flex; align-items: center; gap: 6px; margin-bottom: 4px; }
    .ci-bar-label { font-size: 11px; color: #666; width: 48px; text-align: right; flex-shrink: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .ci-bar-track { flex: 1; height: 14px; background: #f0eeea; border-radius: 3px; overflow: hidden; }
    .ci-bar-fill { height: 100%; border-radius: 3px; transition: width .3s; }
    .ci-bar-val { font-size: 10px; color: #888; width: 32px; text-align: right; font-variant-numeric: tabular-nums; }
    .ci-table { width: 100%; border-collapse: collapse; font-size: 11px; }
    .ci-table th { background: #333; color: #fff; padding: 6px 8px; text-align: left; font-weight: 600; font-size: 10px; text-transform: uppercase; letter-spacing: .3px; position: sticky; top: 0; }
    .ci-table td { padding: 5px 8px; border-bottom: 1px solid #f0eeea; }
    .ci-table tr:hover { background: #fafaf7; }

    body.print-mode .report-tabs { display: none; }
    @media print { .report-tabs { display: none; } }
  </style>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <script>
    // ── Token auth (injected) ────────────────────────────────────────
    const URL_TOKEN = new URLSearchParams(window.location.search).get('token') || '';
    const TOKEN_QS  = URL_TOKEN ? '?token=' + encodeURIComponent(URL_TOKEN) : '';
    function withToken(url) {
      if (!URL_TOKEN) return url;
      return url + (url.includes('?') ? '&' : '?') + 'token=' + encodeURIComponent(URL_TOKEN);
    }
  </script>
</head>
<body>
  <div id="root"></div>

  <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.3.1/umd/react.production.min.js"></script>
  <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.3.1/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.26.9/babel.min.js"></script>

  <script type="text/babel" data-presets="env,react">

    const { useState, useEffect, useMemo, useRef, useCallback } = React;

    // ── Localstorage keys ──
    const LS_VIEW         = 'memberships.viewMode';
    const LS_STATUS       = 'memberships.statusFilter';
    const LS_RENEWAL      = 'memberships.renewalFilter';
    const LS_TYPES        = 'memberships.typeFilter';
    const LS_PRICEMIN     = 'memberships.priceMin';
    const LS_PRICEMAX     = 'memberships.priceMax';
    const LS_DATEFIELD    = 'memberships.dateField';
    const LS_SORTKEY      = 'memberships.sortKey';
    const LS_SORTDIR      = 'memberships.sortDir';
    const LS_STARTDATE    = 'memberships.startDate';
    const LS_ENDDATE      = 'memberships.endDate';

    // ── Helpers ──
    const safeNum = (v) => {
      const n = parseFloat(v);
      return Number.isFinite(n) ? n : 0;
    };
    const money = (v) => safeNum(v).toLocaleString('en-US', { style: 'currency', currency: 'USD' });
    const dateOnly = (s) => {
      if (!s) return '';
      const d = new Date(s);
      if (Number.isNaN(d.getTime())) return s;
      return d.toLocaleDateString('en-US', { year: 'numeric', month: 'short', day: 'numeric' });
    };
    const monthKey = (s) => {
      if (!s) return '';
      const d = new Date(s);

    // ── Cohort retention computation ──
    function buildCohorts(rows) {
      var now = new Date();
      var cohortMap = {};
      rows.forEach(function(r) {
        if (!r.createdAt) return;
        var created = new Date(r.createdAt);
        if (isNaN(created.getTime())) return;
        var key = created.getFullYear() + '-' + String(created.getMonth()+1).padStart(2,'0');
        if (!cohortMap[key]) cohortMap[key] = [];
        var endMs;
        if (r.status === 'active') {
          endMs = now.getTime();
        } else if (r.canceledAt) {
          endMs = new Date(r.canceledAt).getTime();
          if (isNaN(endMs)) endMs = now.getTime();
        } else if (r.endDate) {
          endMs = new Date(r.endDate).getTime();
          if (isNaN(endMs)) endMs = now.getTime();
        } else {
          endMs = created.getTime();
        }
        var survivalMonths = Math.max(0, (endMs - created.getTime()) / (1000*60*60*24*30.44));
        cohortMap[key].push({ created: created, survivalMonths: survivalMonths, status: r.status });
      });

      var keys = Object.keys(cohortMap).sort();
      if (keys.length > 12) keys = keys.slice(-12);

      return keys.map(function(key) {
        var members = cohortMap[key];
        var size = members.length;
        var retention = [100];
        var monthsSinceStart = (now.getTime() - new Date(key + '-01').getTime()) / (1000*60*60*24*30.44);
        for (var m = 1; m <= 12; m++) {
          if (m > monthsSinceStart + 0.5) {
            retention.push(null);
          } else {
            var alive = members.filter(function(mb){ return mb.survivalMonths >= m; }).length;
            retention.push(Math.round(alive / size * 100));
          }
        }
        var parts = key.split('-');
        var label = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][parseInt(parts[1])-1] + ' ' + parts[0];
        return { key: key, label: label, size: size, retention: retention };
      });
    }

    // ── MultiSelect component (mirrors GL Locations pattern) ──
    function MultiSelect({ label, options, selected, onChange, allowAll = true }) {
      const [open, setOpen] = useState(false);
      const [search, setSearch] = useState('');
      const ref = useRef(null);

      useEffect(() => {
        function onDoc(e) {
          if (ref.current && !ref.current.contains(e.target)) setOpen(false);
        }
        document.addEventListener('mousedown', onDoc);
        return () => document.removeEventListener('mousedown', onDoc);
      }, []);

      const filtered = useMemo(() => {
        const q = search.trim().toLowerCase();
        if (!q) return options;
        return options.filter(o => o.toLowerCase().includes(q));
      }, [options, search]);

      const allSelected = selected.length === options.length && options.length > 0;
      const noneSelected = selected.length === 0;
      const partial = !allSelected && !noneSelected;

      const toggle = (val) => {
        if (selected.includes(val)) onChange(selected.filter(v => v !== val));
        else onChange([...selected, val]);
      };

      const badge = allSelected
        ? <span className="ms-badge all">All ({options.length})</span>
        : noneSelected
          ? <span className="ms-badge" style={{background:'#94a3b8'}}>None</span>
          : <span className="ms-badge">{selected.length} / {options.length}</span>;

      return (
        <div className="ms-wrap" ref={ref}>
          <button className="ms-trigger" onClick={() => setOpen(!open)} type="button">
            <span>{label}</span>
            {badge}
            <span style={{opacity:.6}}>{open ? '▾' : '▸'}</span>
          </button>
          {open && (
            <div className="ms-panel">
              <input
                className="ms-search"
                type="search"
                placeholder={`Search ${label.toLowerCase()}…`}
                value={search}
                onChange={e => setSearch(e.target.value)}
              />
              <div className="ms-actions">
                <button onClick={() => onChange([...options])} type="button">Select All</button>
                <button onClick={() => onChange([])} type="button">Select None</button>
                {partial && <span style={{fontSize:11,color:'#777',padding:'3px 4px'}}>{selected.length} selected</span>}
              </div>
              <div className="ms-list">
                {filtered.map(opt => (
                  <label key={opt} className="ms-item">
                    <input
                      type="checkbox"
                      checked={selected.includes(opt)}
                      onChange={() => toggle(opt)}
                    />
                    <span>{opt}</span>
                  </label>
                ))}
                {filtered.length === 0 && <div style={{padding:'8px',color:'#999',fontSize:11}}>No matches</div>}
              </div>
            </div>
          )}
        </div>
      );

    function sortRows(rows, key, dir) {
      if (!key) return rows;
      const mult = dir === 'desc' ? -1 : 1;
      const get = (r) => r[key];
      return [...rows].sort((a, b) => {
        const av = get(a), bv = get(b);
        if (typeof av === 'number' && typeof bv === 'number') return (av - bv) * mult;
        return String(av || '').localeCompare(String(bv || '')) * mult;
      });
    }

        for (let ri = 1; ri <= range.e.r; ri++) {
          dateCols.forEach(dc => {
            const ci = hdr.indexOf(dc); if (ci < 0) return;
            const addr = XLSX.utils.encode_cell({ r: ri, c: ci });
            if (ws[addr] && ws[addr].t === 'd') ws[addr].z = 'MM/DD/YY';
          });
        }
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, 'Memberships');
        const fname = `${orgSlug}-memberships-${new Date().toISOString().slice(0,10)}.xlsx`;
        XLSX.writeFile(wb, fname);
        // log
        fetch(withToken(`/${orgSlug}/${reportType}/api/log`), {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({ action: 'excel' })
        }).catch(()=>{});
      };

      const printPage = () => {
        fetch(withToken(`/${orgSlug}/${reportType}/api/log`), {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({ action: 'print' })
        }).catch(()=>{});
        window.print();
      };

      const [pdfLoading, setPdfLoading] = useState(false);
      const downloadPdf = () => {
        setPdfLoading(true);
        const qs = new URLSearchParams();
        if (loadedStart) qs.set('start_date', loadedStart);
        if (loadedEnd)   qs.set('end_date',   loadedEnd);
        qs.set('view', viewMode);
        const url = withToken(`/${orgSlug}/${reportType}/api/pdf?${qs.toString()}`);
        fetch(url)
          .then(r => {
            if (!r.ok) return r.text().then(t => { throw new Error(t); });
            return r.blob();
          })
          .then(blob => {
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = `${orgSlug}-memberships-${loadedStart || 'report'}.pdf`;
            a.click();
            URL.revokeObjectURL(a.href);
          })
          .catch(err => alert('PDF generation failed: ' + err.message))
          .finally(() => setPdfLoading(false));
      };

      // ── Status pill ──
      const StatusPill = ({ status }) => (
        <span className={`status-pill ${status}`}>{status}</span>
      );
      const RenewalPill = ({ type }) => (
        <span className={`renewal-pill ${type === 'Auto-renew' ? 'auto' : 'onetime'}`}>{type}</span>
      );

      // ── Render content ──
      const PDF_ROW_LIMIT = 500;

      function renderTable() {
        const displayRows = isPrint && sortedRows.length > PDF_ROW_LIMIT
          ? sortedRows.slice(0, PDF_ROW_LIMIT) : sortedRows;
        const isTruncated = isPrint && sortedRows.length > PDF_ROW_LIMIT;
        const cols = [
          { key: 'lastName',    label: 'Name' },
          { key: 'email',       label: 'Email' },
          { key: 'type',        label: 'Membership Type' },
          { key: 'status',      label: 'Status' },
          { key: 'renewalType', label: 'Renewal' },
          { key: 'price',       label: 'Price', num: true },
          { key: 'paid',        label: 'Paid', num: true },
          { key: 'refunded',    label: 'Refunded', num: true },
          { key: 'netCollected', label: 'Net Collected', num: true },
          { key: 'startDate',   label: 'Start' },
          { key: 'nextRenewal', label: 'Next Renewal' },
          { key: 'lastUsed',    label: 'Last Used' },
          { key: 'usageCount',  label: 'Uses', num: true },
        ];
        return (
          <React.Fragment>
          <table className="report">
            <thead>
              <tr>
                {cols.map(c => (
                  <th
                    key={c.key}
                    className={`${c.num ? 'num' : ''} ${sortKey === c.key ? 'sorted-' + sortDir : ''}`}
                    onClick={() => onSort(c.key)}
                  >
                    {c.label}
                  </th>
                ))}
              </tr>
            </thead>
            <tbody>
              {displayRows.map((r, i) => (
                <tr key={r.membershipId + '-' + i}>
                  <td><strong>{r.lastName && r.firstName ? `${r.lastName}, ${r.firstName}` : r.lastName || r.firstName || '—'}</strong></td>
                  <td style={{color:'#666'}}>{r.email}</td>
                  <td>{r.type}</td>
                  <td><StatusPill status={r.status} /></td>
                  <td><RenewalPill type={r.renewalType} /></td>
                  <td className="num">{money(r.price)}</td>
                  <td className="num">{money(r.paid)}</td>
                  <td className="num" style={{color: r.refunded > 0 ? '#ef4444' : undefined}}>{money(r.refunded)}</td>
                  <td className="num" style={{fontWeight: 600}}>{money(r.netCollected)}</td>
                  <td>{r.startDate ? dateOnly(r.startDate) : <span style={{color:'#ccc'}}>—</span>}</td>
                  <td>{r.nextRenewal ? dateOnly(r.nextRenewal) : <span style={{color:'#ccc'}}>—</span>}</td>
                  <td>{r.lastUsed ? dateOnly(r.lastUsed) : <span style={{color:'#ccc'}}>—</span>}</td>
                  <td className="num">{r.usageCount}</td>
                </tr>
              ))}
            </tbody>
          </table>
          {isTruncated && (
            <div style={{textAlign:'center', padding:'12px 0', color:'#888', fontSize:11, borderTop:'1px solid #eee', marginTop:8}}>
              Showing first {PDF_ROW_LIMIT.toLocaleString()} of {sortedRows.length.toLocaleString()} memberships. Use Excel export for the full dataset.
            </div>
          )}
        </React.Fragment>
        );
      }

      function renderByType() {
        const counts = {};
        for (const r of filtered) {
          counts[r.type] = (counts[r.type] || 0) + 1;
        }
        const entries = Object.entries(counts).sort((a,b) => b[1] - a[1]);
        return (
          <div className="chart-card">
            <h3>Memberships by Type ({entries.length} types, {filtered.length} total)</h3>
            <ChartView
              type="bar"
              height={Math.min(900, Math.max(320, entries.length * 32))}
              data={{
                labels: entries.map(e => e[0]),
                datasets: [{
                  label: 'Count',
                  data: entries.map(e => e[1]),
                  backgroundColor: '#db2777',
                  borderRadius: 3,
                }]
              }}
              options={{
                indexAxis: 'y',
                plugins: { legend: { display: false } },
                scales: { x: { beginAtZero: true, ticks: { stepSize: 1 } } },
                maintainAspectRatio: false,
              }}
            />
          </div>
        );
      }

      function renderByStatus() {
        const counts = { active:0, canceled:0, expired:0, inactive:0 };
        for (const r of filtered) {
          counts[r.status] = (counts[r.status] || 0) + 1;
        }
        const labels = Object.keys(counts).filter(k => counts[k] > 0);
        const colors = { active:'#16a34a', canceled:'#ef4444', expired:'#f59e0b', inactive:'#94a3b8' };
        return (
          <div className="chart-card" style={{maxWidth:560, margin:'0 auto'}}>
            <h3>Memberships by Status</h3>
            <ChartView
              type="doughnut"
              height={320}
              data={{
                labels: labels.map(l => `${l} (${counts[l]})`),
                datasets: [{
                  data: labels.map(l => counts[l]),
                  backgroundColor: labels.map(l => colors[l]),
                  borderWidth: 2,
                  borderColor: '#fff',
                }]
              }}
              options={{
                plugins: { legend: { position: 'right' } },
                maintainAspectRatio: false,
              }}
            />
          </div>
        );
      }

      function renderRenewalMix() {
        let auto = 0, one = 0, autoRev = 0, oneRev = 0;
        for (const r of filtered) {
          if (r.renewalType === 'Auto-renew') { auto++; autoRev += r.netCollected; }
          else { one++; oneRev += r.netCollected; }
        }
        return (
          <div className="chart-grid two-col">
            <div className="chart-card">
              <h3>Renewal Mix — Count</h3>
              <ChartView
                type="doughnut"
                height={300}
                data={{
                  labels: [`Auto-renew (${auto})`, `One-time (${one})`],
                  datasets: [{
                    data: [auto, one],
                    backgroundColor: ['#db2777', '#94a3b8'],
                    borderWidth: 2,
                    borderColor: '#fff',
                  }]
                }}
                options={{
                  plugins: { legend: { position: 'right' } },
                  maintainAspectRatio: false,
                }}
              />
            </div>
            <div className="chart-card">
              <h3>Renewal Mix — Revenue</h3>
              <ChartView
                type="doughnut"
                height={300}
                data={{
                  labels: [`Auto-renew (${money(autoRev)})`, `One-time (${money(oneRev)})`],
                  datasets: [{
                    data: [autoRev, oneRev],
                    backgroundColor: ['#db2777', '#94a3b8'],
                    borderWidth: 2,
                    borderColor: '#fff',
                  }]
                }}
                options={{
                  plugins: {
                    legend: { position: 'right' },
                    tooltip: { callbacks: { label: (c) => `${c.label}: ${money(c.parsed)}` } },
                  },
                  maintainAspectRatio: false,
                }}
              />
            </div>
          </div>
        );
      }

      function renderRevenueByType() {
        const byType = {};
        for (const r of filtered) {
          if (!byType[r.type]) byType[r.type] = { active:0, canceled:0, expired:0, inactive:0 };
          byType[r.type][r.status] = (byType[r.type][r.status] || 0) + r.netCollected;
        }
        const entries = Object.entries(byType)
          .map(([k, v]) => ({ key: k, total: v.active + v.canceled + v.expired + v.inactive, ...v }))
          .sort((a,b) => b.total - a.total);
        return (
          <div className="chart-card">
            <h3>Revenue by Membership Type (stacked by status)</h3>
            <ChartView
              type="bar"
              height={Math.min(900, Math.max(320, entries.length * 34))}
              data={{
                labels: entries.map(e => e.key),
                datasets: [
                  { label: 'Active',   data: entries.map(e => e.active),   backgroundColor: '#16a34a' },
                  { label: 'Canceled', data: entries.map(e => e.canceled), backgroundColor: '#ef4444' },
                  { label: 'Expired',  data: entries.map(e => e.expired),  backgroundColor: '#f59e0b' },
                  { label: 'Inactive', data: entries.map(e => e.inactive), backgroundColor: '#94a3b8' },
                ]
              }}
              options={{
                indexAxis: 'y',
                plugins: {
                  legend: { position: 'top' },
                  tooltip: { callbacks: { label: (c) => `${c.dataset.label}: ${money(c.parsed.x)}` } },
                },
                scales: {
                  x: { stacked: true, beginAtZero: true, ticks: { callback: (v) => '$' + v.toLocaleString() } },
                  y: { stacked: true },
                },
                maintainAspectRatio: false,
              }}
            />
          </div>
        );
      }

      function renderMonthlyRevenue() {
        const byMonth = {};
        for (const r of filtered) {
          const m = monthKey(r.createdAt);
          if (!m) continue;
          byMonth[m] = (byMonth[m] || 0) + r.netCollected;
        }
        const sortedKeys = Object.keys(byMonth).sort();
        const labels = sortedKeys.map(k => {
          const [y,mo] = k.split('-');
          return new Date(parseInt(y), parseInt(mo)-1, 1)
            .toLocaleDateString('en-US', { year: 'numeric', month: 'short' });
        });
        return (
          <div className="chart-card">
            <h3>Net Collected by Month (based on Created Date)</h3>
            <ChartView
              type="bar"
              height={340}
              data={{
                labels,
                datasets: [{
                  label: 'Revenue',
                  data: sortedKeys.map(k => byMonth[k]),
                  backgroundColor: '#3b82f6',
                  borderRadius: 3,
                }]
              }}
              options={{
                plugins: {
                  legend: { display: false },
                  tooltip: { callbacks: { label: (c) => money(c.parsed.y) } },
                },
                scales: {
                  y: { beginAtZero: true, ticks: { callback: (v) => '$' + v.toLocaleString() } },
                },
                maintainAspectRatio: false,
              }}
            />
          </div>
        );
      }

      function renderUpcomingRenewals() {
        const buckets = { '7':0, '30':0, '60':0, '90':0, 'beyond':0 };
        const bucketRev = { '7':0, '30':0, '60':0, '90':0, 'beyond':0 };
        for (const r of filtered) {
          if (r.renewalType !== 'Auto-renew' || r.status !== 'active') continue;
          const d = daysUntil(r.nextRenewal);
          if (d === null || d < 0) continue;
          let key;
          if (d <= 7) key = '7';
          else if (d <= 30) key = '30';
          else if (d <= 60) key = '60';
          else if (d <= 90) key = '90';
          else key = 'beyond';
          buckets[key]++;
          bucketRev[key] += r.price;
        }
        const labels = ['Next 7 days', '8–30 days', '31–60 days', '61–90 days', 'Beyond 90 days'];
        const keys = ['7','30','60','90','beyond'];
        return (
          <div className="chart-card">
            <h3>Upcoming Auto-Renewals (active only)</h3>
            <ChartView
              type="bar"
              height={300}
              data={{
                labels,
                datasets: [{
                  label: 'Count',
                  data: keys.map(k => buckets[k]),
                  backgroundColor: '#db2777',
                  borderRadius: 3,
                }]
              }}
              options={{
                plugins: {
                  legend: { display: false },
                  tooltip: {
                    callbacks: {
                      label: (c) => {
                        const k = keys[c.dataIndex];
                        return `${c.parsed.y} memberships · ${money(bucketRev[k])} renewal value`;
                      }
                    }
                  }
                },
                scales: { y: { beginAtZero: true, ticks: { stepSize: 1 } } },
                maintainAspectRatio: false,
              }}
            />
          </div>
        );
      }

      function renderView() {
        if (loading) return <div className="loading">Loading membership data…</div>;
        if (error)   return <div className="empty-state error-state" style={{textAlign:'center',padding:'3rem 1rem'}}><span style={{fontSize:'2.5rem'}}>😔</span><br/><span style={{fontSize:'1.1rem',color:'#666'}}>Looks like reporting has encountered an issue — try loading this report again later.</span></div>;
        if (filtered.length === 0) return <div className="empty-state">No memberships match the current filters.</div>;

        switch (viewMode) {
          case 'byType':           return renderByType();
          case 'byStatus':         return renderByStatus();
          case 'renewalMix':       return renderRenewalMix();
          case 'revenueByType':    return renderRevenueByType();
          case 'monthlyRevenue':   return renderMonthlyRevenue();
          case 'upcomingRenewals': return renderUpcomingRenewals();
          default:                 return renderByType();
        }
      }

      // ── View definitions ──
      const VIEWS = [
        { key: 'byType',           label: 'By Type' },
        { key: 'byStatus',         label: 'By Status' },
        { key: 'renewalMix',       label: 'Renewal Mix' },
        { key: 'revenueByType',    label: 'Revenue' },
        { key: 'monthlyRevenue',   label: 'Monthly' },
        { key: 'upcomingRenewals', label: 'Upcoming' },
      ];

      const orgName = meta.org_name || (meta.org_slug ? meta.org_slug.charAt(0).toUpperCase() + meta.org_slug.slice(1) : orgSlug || 'rec.us');
      const logoUrl = meta.logo_url || null;
      const now = new Date();
      const runDate = `${String(now.getMonth()+1).padStart(2,'0')}/${String(now.getDate()).padStart(2,'0')}/${now.getFullYear()} @ ${now.toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit',hour12:true}).toLowerCase()}`;

      return (
        <React.Fragment>
          {!isPrint && (
            <div className="toolbar">
              <span className="toolbar-title">🎫 Memberships</span>
              <label>
                Start
                <input type="date" value={startDate} onChange={e => { setStartDate(e.target.value); setActiveRange(null); }} />
              </label>
              <label>
                End
                <input type="date" value={endDate} onChange={e => { setEndDate(e.target.value); setActiveRange(null); }} />
              </label>

              {[
                { key:'last-month',  label:'Last Month',  action:() => setMonth(-1) },
                { key:'this-month',  label:'This Month',  action:() => setMonth(0)  },
                { key:'next-month',  label:'Next Month',  action:() => setMonth(1)  },
              ].map(({ key, label, action }) => (
                <button
                  key={key}
                  onClick={action}
                  style={{
                    fontSize:11, padding:'4px 8px',
                    ...(activeRange === key ? {
                      background: '#f59e0b',
                      borderColor: '#f59e0b',
                      color: '#1a1a1a',
                      fontWeight: 600,
                    } : {}),
                  }}
                >{label}</button>
              ))}

              <button
                className="btn-run"
                onClick={handleRunReport}
                disabled={loading}
                style={datesChanged && !loading ? {boxShadow:'0 0 0 2px #4ade80'} : {}}
              >
                {loading ? <><span className="btn-spinner" />Loading…</> : '▶ Run Report'}
              </button>

              {(activeTab === 'memberships') && <React.Fragment>
              <div className="divider" />

              <MultiSelect
                label="Status"
                options={['active','canceled','expired','inactive']}
                selected={statusFilter}
                onChange={setStatusFilter}
              />

              <MultiSelect
                label="Renewal"
                options={['Auto-renew', 'One-time']}
                selected={renewalFilter}
                onChange={setRenewalFilter}
              />

              {allTypes.length > 0 && (
                <MultiSelect
                  label="Type"
                  options={allTypes}
                  selected={typeFilter || []}
                  onChange={setTypeFilter}
                />
              )}

              <input
                type="search"
                placeholder="Search name, email, or type…"
                value={search}
                onChange={e => setSearch(e.target.value)}
              />

              <span className="toolbar-spacer" />

              <div className="view-group">
                {VIEWS.map(v => (
                  <button
                    key={v.key}
                    className={viewMode === v.key ? 'active' : ''}
                    onClick={() => setViewMode(v.key)}
                  >
                    {v.label}
                  </button>
                ))}
              </div>
              </React.Fragment>}
              {(activeTab === 'checkins' || activeTab === 'retention') && <span className="toolbar-spacer" />}

              <button onClick={printPage} title="Print">🖨️ Print</button>
              <button onClick={exportExcel} title="Excel">📊 Excel</button>
              <button className="btn-pdf" onClick={downloadPdf} disabled={pdfLoading} title="PDF">{pdfLoading ? "Generating…" : "📄 PDF"}</button>
            </div>
          )}

          <div className="page" style={(activeTab === 'memberships' && loading) ? {opacity:0.5,pointerEvents:'none'} : {}}>

            {/* Shared Report Header */}
            <div className="report-header">
              <div className="report-header-left">
                {logoUrl && <img src={logoUrl} alt="" className="report-header-logo" onError={e => e.target.style.display='none'} />}
                <div>
                  <div className="org-label">{orgName}</div>
                  <div className="title">Memberships</div>
                </div>
              </div>
              <div className="report-header-right">
                {loadedStart && loadedEnd && (
                  <div className="date-range" style={{fontWeight:600,marginBottom:2}}>
                    {new Date(loadedStart + 'T12:00:00').toLocaleDateString('en-US', {month:'short',day:'numeric',year:'numeric'})}
                    {' – '}
                    {new Date(loadedEnd + 'T12:00:00').toLocaleDateString('en-US', {month:'short',day:'numeric',year:'numeric'})}
                  </div>
                )}
                <div className="date-range">
                  {activeTab === 'memberships' && <span>{filtered.length.toLocaleString()} memberships · {summary.total.toLocaleString()} after filters</span>}
                  {activeTab === 'checkins' && ciRows && <span>{ciRows.length.toLocaleString()} check-ins</span>}
                  {activeTab === 'retention' && <span>Cohort retention analysis</span>}
                </div>
              </div>
            </div>

            {/* Tab bar */}
            <div className="report-tabs no-print">
              <button className={'tab-btn' + (activeTab === 'memberships' ? ' active' : '')} onClick={function(){ setActiveTab('memberships'); }}>
                🎟️ Memberships
              </button>
              <button className={'tab-btn' + (activeTab === 'checkins' ? ' active' : '')} onClick={function(){ setActiveTab('checkins'); if (!ciRows) fetchCheckins(startDate, endDate); }}>
                ✅ Check-Ins
                {ciRows && ciRows.length > 0 && <span className="tab-badge">{ciRows.length.toLocaleString()}</span>}
              </button>
              <button className={'tab-btn' + (activeTab === 'retention' ? ' active' : '')} onClick={function(){ setActiveTab('retention'); }}>
                📈 Retention
              </button>
            </div>

          {activeTab === 'checkins' && (
            <div style={{maxWidth:1100,margin:'0 auto',padding:'0'}}>
              {ciLoading && <div style={{textAlign:'center',padding:40,color:'#999'}}>Loading check-in data...</div>}
              {!ciLoading && ciRows && ciRows.length > 0 && (() => {
                var uniqueMembers = new Set(); var hourCounts = {}; var dayCounts = {}; var deskCounts = {}; var prodCounts = {};
                var dayTypeCounts = {};
                ciRows.forEach(function(r) {
                  uniqueMembers.add(r['Member ID']);
                  var h = parseInt(r['Hour']); hourCounts[h] = (hourCounts[h]||0)+1;
                  var dow = (r['Day of Week']||'').trim(); dayCounts[dow] = (dayCounts[dow]||0)+1;
                  var desk = r['Desk Location']||'Unknown'; deskCounts[desk] = (deskCounts[desk]||0)+1;
                  var prod = r['Product Name']||'Unknown'; prodCounts[prod] = (prodCounts[prod]||0)+1;
                  var dt = (r['Day Type']||'').trim(); if (dt) dayTypeCounts[dt] = (dayTypeCounts[dt]||0)+1;
                });
                var uniqueDates = new Set(ciRows.map(function(r){ return r['Date']; }));
                var avgPerDay = uniqueDates.size > 0 ? Math.round(ciRows.length / uniqueDates.size) : 0;
                var peakEntry = Object.entries(hourCounts).sort(function(a,b){return b[1]-a[1];})[0];
                var pH = peakEntry ? parseInt(peakEntry[0]) : 0;
                var peakLabel = peakEntry ? (pH === 0 ? '12am' : pH === 12 ? '12pm' : pH > 12 ? (pH-12)+'pm' : pH+'am') : 'N/A';
                var maxH = Math.max.apply(null, Object.values(hourCounts).concat([1]));
                var maxDk = Math.max.apply(null, Object.values(deskCounts).concat([1]));
                var maxPr = Math.max.apply(null, Object.values(prodCounts).concat([1]));
                var dayOrd = ['Monday','Tuesday','Wednesday','Thursday','Friday','Saturday','Sunday'];
                var maxDy = Math.max.apply(null, dayOrd.map(function(d){return dayCounts[d]||0;}).concat([1]));
                var memCount = ciRows.filter(function(r){return r['Check-In Type']==='membership';}).length;
                var passCount = ciRows.filter(function(r){return r['Check-In Type']==='pass';}).length;
                return (
                  <React.Fragment>
                    <div className="ci-kpis">
                      <div className="ci-kpi" style={{borderLeft:'3px solid #3b82f6'}}><div className="kl">Total Check-Ins</div><div className="kv">{ciRows.length.toLocaleString()}</div><div className="ks">{uniqueDates.size} days</div></div>
                      <div className="ci-kpi" style={{borderLeft:'3px solid #10b981'}}><div className="kl">Unique Members</div><div className="kv">{uniqueMembers.size.toLocaleString()}</div><div className="ks">{(ciRows.length / Math.max(uniqueMembers.size,1)).toFixed(1)} visits/member</div></div>
                      <div className="ci-kpi" style={{borderLeft:'3px solid #f59e0b'}}><div className="kl">Avg per Day</div><div className="kv">{avgPerDay.toLocaleString()}</div><div className="ks">{dayTypeCounts['Weekday']||0} weekday / {dayTypeCounts['Weekend']||0} weekend</div></div>
                      <div className="ci-kpi" style={{borderLeft:'3px solid #8b5cf6'}}><div className="kl">Peak Hour</div><div className="kv">{peakLabel}</div><div className="ks">{peakEntry ? peakEntry[1]+' check-ins' : ''}</div></div>
                      <div className="ci-kpi" style={{borderLeft:'3px solid #06b6d4'}}><div className="kl">Membership vs Pass</div><div className="kv">{Math.round(memCount/Math.max(ciRows.length,1)*100)}% / {Math.round(passCount/Math.max(ciRows.length,1)*100)}%</div><div className="ks">{memCount.toLocaleString()} / {passCount.toLocaleString()}</div></div>
                    </div>
                    <div className="ci-charts">
                      <div className="ci-chart-box">
                        <div className="ci-chart-title">Hourly Distribution</div>
                        {Array.from({length:17}, function(_,i){ var h=i+5; var c=hourCounts[h]||0; return (
                          <div key={h} className="ci-bar-row"><span className="ci-bar-label">{h===0?'12am':h===12?'12pm':h>12?(h-12)+'pm':h+'am'}</span><div className="ci-bar-track"><div className="ci-bar-fill" style={{width:(c/maxH*100)+'%',background:'#3b82f6'}}/></div><span className="ci-bar-val">{c||''}</span></div>
                        );})}
                      </div>
                      <div className="ci-chart-box">
                        <div className="ci-chart-title">Day of Week</div>
                        {dayOrd.map(function(d){ var c=dayCounts[d]||0; return (
                          <div key={d} className="ci-bar-row"><span className="ci-bar-label">{d.slice(0,3)}</span><div className="ci-bar-track"><div className="ci-bar-fill" style={{width:(c/maxDy*100)+'%',background:'#10b981'}}/></div><span className="ci-bar-val">{c||''}</span></div>
                        );})}
                      </div>
                    </div>
                    <div className="ci-charts">
                      <div className="ci-chart-box">
                        <div className="ci-chart-title">Desk Locations</div>
                        {Object.entries(deskCounts).sort(function(a,b){return b[1]-a[1];}).map(function(e){ return (
                          <div key={e[0]} className="ci-bar-row"><span className="ci-bar-label" title={e[0]}>{e[0]}</span><div className="ci-bar-track"><div className="ci-bar-fill" style={{width:(e[1]/maxDk*100)+'%',background:'#f59e0b'}}/></div><span className="ci-bar-val">{e[1]}</span></div>
                        );})}
                      </div>
                      <div className="ci-chart-box">
                        <div className="ci-chart-title">Top Membership / Pass Types</div>
                        {Object.entries(prodCounts).sort(function(a,b){return b[1]-a[1];}).slice(0,10).map(function(e){ return (
                          <div key={e[0]} className="ci-bar-row"><span className="ci-bar-label" style={{width:180}} title={e[0]}>{e[0].length>28?e[0].slice(0,26)+'...':e[0]}</span><div className="ci-bar-track"><div className="ci-bar-fill" style={{width:(e[1]/maxPr*100)+'%',background:e[0].toLowerCase().indexOf('pass')!==-1?'#8b5cf6':'#06b6d4'}}/></div><span className="ci-bar-val">{e[1]}</span></div>
                        );})}
                      </div>
                    </div>
                    <div style={{background:'#fff',border:'1px solid #e8e6e0',borderRadius:6,padding:16,boxShadow:'0 1px 3px rgba(0,0,0,.05)'}}>
                      <div className="ci-chart-title" style={{marginBottom:8}}>Recent Check-Ins ({ciRows.length.toLocaleString()} total)</div>
                      <div style={{maxHeight:400,overflow:'auto'}}>
                        <table className="ci-table"><thead><tr><th>Date</th><th>Time</th><th>Member</th><th>Product</th><th>Type</th><th>Desk</th><th>Recorded By</th></tr></thead>
                          <tbody>{ciRows.slice(0,200).map(function(r,i){ return (
                            <tr key={i}><td>{r['Date']}</td><td>{r['Time']}</td><td>{(r['First Name']||'')+' '+(r['Last Name']||'')}</td><td style={{maxWidth:200,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}} title={r['Product Name']}>{r['Product Name']}</td><td><span style={{fontSize:9,fontWeight:600,padding:'2px 6px',borderRadius:3,background:r['Check-In Type']==='membership'?'#dbeafe':'#ede9fe',color:r['Check-In Type']==='membership'?'#1e40af':'#5b21b6'}}>{r['Check-In Type']}</span></td><td>{r['Desk Location']}</td><td>{r['Recorded By']}</td></tr>
                          );})}</tbody>
                        </table>
                        {ciRows.length > 200 && <div style={{textAlign:'center',padding:8,color:'#999',fontSize:11}}>Showing 200 of {ciRows.length.toLocaleString()}</div>}
                      </div>
                    </div>
                  </React.Fragment>
                );
              })()}
              {!ciLoading && (!ciRows || ciRows.length === 0) && !ciLoading && <div style={{textAlign:'center',padding:40,color:'#999'}}>Click Run Report to load check-in data</div>}
            </div>
          )}

          {activeTab === 'retention' && (
            <div style={{maxWidth:1100,margin:'0 auto'}}>
              {(() => {
                var cohorts = buildCohorts(data);
                if (!cohorts || cohorts.length === 0) return <div style={{textAlign:'center',padding:40,color:'#999'}}>Not enough membership data to build cohorts. Need memberships with Created At dates.</div>;

                var retAt6 = cohorts.filter(function(c){ return c.retention[6] !== null; });
                var avg6 = retAt6.length > 0 ? Math.round(retAt6.reduce(function(s,c){ return s + c.retention[6]; }, 0) / retAt6.length) : null;
                var best6 = retAt6.length > 0 ? retAt6.reduce(function(a,b){ return (b.retention[6]||0) > (a.retention[6]||0) ? b : a; }) : null;
                var worst6 = retAt6.length > 0 ? retAt6.reduce(function(a,b){ return (b.retention[6]||0) < (a.retention[6]||0) ? b : a; }) : null;
                var m1drops = cohorts.filter(function(c){ return c.retention[1] !== null; });
                var avgM1drop = m1drops.length > 0 ? Math.round(m1drops.reduce(function(s,c){ return s + (100 - c.retention[1]); },0) / m1drops.length) : null;

                return (
                  <React.Fragment>
                    <div className="ret-kpis">
                      {avg6 !== null && <div className="ret-kpi"><div className="rl">Avg 6-month retention</div><div className="rv">{avg6}%</div><div className="rs">{retAt6.length} cohorts measured</div></div>}
                      {best6 && <div className="ret-kpi"><div className="rl">Best cohort</div><div className="rv" style={{color:'#10b981'}}>{best6.label}</div><div className="rs">{best6.retention[6]}% at 6 months ({best6.size} members)</div></div>}
                      {worst6 && <div className="ret-kpi"><div className="rl">Worst cohort</div><div className="rv" style={{color:'#ef4444'}}>{worst6.label}</div><div className="rs">{worst6.retention[6]}% at 6 months ({worst6.size} members)</div></div>}
                      {avgM1drop !== null && <div className="ret-kpi"><div className="rl">Avg month-1 churn</div><div className="rv">{avgM1drop}%</div><div className="rs">Biggest drop-off window</div></div>}
                    </div>

                    <RetentionChart cohorts={cohorts} />

                    <div className="ret-table-wrap">
                      <table className="ret-table">
                        <thead><tr><th>Cohort</th><th>Size</th>{Array.from({length:12}, function(_,i){ return <th key={i}>M{i+1}</th>; })}</tr></thead>
                        <tbody>
                          {cohorts.map(function(c) {
                            return (
                              <tr key={c.key}>
                                <td>{c.label}</td>
                                <td>{c.size.toLocaleString()}</td>
                                {Array.from({length:12}, function(_,i) {
                                  var val = c.retention[i+1];
                                  if (val === null) return <td key={i} style={{color:'#ddd'}}>-</td>;
                                  var bg, fg;
                                  if (val >= 70) { bg = '#dcfce7'; fg = '#166534'; }
                                  else if (val >= 50) { bg = '#dbeafe'; fg = '#1e40af'; }
                                  else if (val >= 30) { bg = '#fef3c7'; fg = '#92400e'; }
                                  else { bg = '#fee2e2'; fg = '#991b1b'; }
                                  return <td key={i} style={{background:bg,color:fg}}>{val}%</td>;
                                })}
                              </tr>
                            );
                          })}
                        </tbody>
                      </table>
                    </div>
                    <div style={{fontSize:9,color:'#aaa',textAlign:'center',marginTop:6}}>Green = healthy retention · Blue = moderate · Amber = caution · Red = high churn</div>
                  </React.Fragment>
                );
              })()}
            </div>
          )}

          {activeTab === 'memberships' && (
            <React.Fragment>

            {/* Summary cards */}
            <div className="summary-cards">
              <div className="summary-card">
                <div className="card-label">Active</div>
                <div className="card-value green">{summary.active.toLocaleString()}</div>
              </div>
              <div className="summary-card">
                <div className="card-label">Canceled</div>
                <div className="card-value red">{summary.canceled.toLocaleString()}</div>
              </div>
              <div className="summary-card">
                <div className="card-label">Expired</div>
                <div className="card-value amber">{summary.expired.toLocaleString()}</div>
              </div>
              <div className="summary-card">
                <div className="card-label">Inactive</div>
                <div className="card-value">{summary.inactive.toLocaleString()}</div>
              </div>
              <div className="summary-card">
                <div className="card-label">Auto-Renew</div>
                <div className="card-value pink">{summary.autoRenewCount.toLocaleString()}</div>
                <div className="card-sub">≈ {money(summary.mrrEstimate)} renewal value</div>
              </div>
              <div className="summary-card">
                <div className="card-label">Net Collected</div>
                <div className="card-value blue">{money(summary.totalNetCollected)}</div>
                <div className="card-sub">{money(summary.totalRevenue)} contract value</div>
              </div>
            </div>


        {/* AI Insights */}
        {data && data.length > 0 && (
          <div className="insights-section no-print">
            <div className="insights-head">
              <button type="button" className="insights-btn" onClick={getInsights} disabled={insightsLoading}>
                {insightsLoading ? 'Analyzing…' : (insights ? '↻ Refresh' : '✨ Rec Insights')}
              </button>
              {insights && !insightsLoading && (
                <span className="insights-sub">{'Analyzed ' + data.length + ' memberships'}</span>
              )}
            </div>
            {insightsLoading && <div className="ai-loading"><div className="ai-spinner" /></div>}
            {insightsError && !insightsLoading && (
              <div style={{color:'#dc2626',fontSize:13,padding:'8px 0'}}><strong>Insights unavailable:</strong> {insightsError}</div>
            )}
            {insights && !insightsLoading && (
              <div className="insights-grid">
                {insights.map((ins, i) => (
                  <div key={i} className={'insight-card insight-' + (ins.type || 'signal')}>
                    <div className="insight-type">{ins.type || 'signal'}</div>
                    <div className="insight-title">{ins.title}</div>
                    <div className="insight-detail">{ins.detail}</div>
                    {ins.action && <div className="insight-action">→ {ins.action}</div>}
                  </div>
                ))}
              </div>
            )}
            {insights && !insightsLoading && (
              <div className="insights-feedback">
                {fbSent ? (
                  <span className="fb-thanks">✅ Thanks for the feedback!</span>
                ) : fbMode === 'down' ? (
                  <div className="fb-down-form">
                    <input placeholder="What could be better?" value={fbComment}
                      onChange={e => setFbComment(e.target.value)}
                      onKeyDown={e => e.key === 'Enter' && sendInsightsFeedback(0)}
                      autoFocus maxLength={500} />
                    <button className="fb-send" onClick={() => sendInsightsFeedback(0)}>Send</button>
                    <button onClick={() => setFbMode(null)}>Cancel</button>
                  </div>
                ) : (
                  <React.Fragment>
                    <span className="fb-label">Were these insights helpful?</span>
                    <button onClick={() => sendInsightsFeedback(1)} title="Yes">👍</button>
                    <button onClick={() => setFbMode('down')} title="Not helpful">👎</button>
                  </React.Fragment>
                )}
              </div>
            )}
          </div>
        )}

            <StaleCacheBanner meta={meta} />
            {/* Content */}
            <div className="content">
              {renderView()}
            </div>

            </React.Fragment>
          )}

            {/* Shared footer */}
            <div className="report-footer">
              <span>{orgName} — Memberships</span>
              <span>Run Date/Time: {runDate}</span>
            </div>

            {!loading && !error && <div id="report-ready" style={{display:'none'}} />}
          </div>
</React.Fragment>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
    <script src="/share-widget.js" defer></script>
    <script src="/feedback-widget.js" defer></script>
      <script src="/nav-breadcrumb.js" defer></script>
  </body>
</html>
