<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Facility Reservations by Date - Historic Buildings</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'IBM Plex Sans', 'Segoe UI', system-ui, sans-serif;
      font-size: 12px;
      color: #1a1a1a;
      background: #f5f4f1;
      line-height: 1.35;
    }

    /* ── Toolbar ── */
    .toolbar {
      position: sticky;
      top: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 20px;
      background: #2c2c2c;
      color: #eee;
      font-size: 13px;
      flex-wrap: wrap;
    }
    .toolbar-title { font-weight: 600; margin-right: 4px; font-size: 13px; }
    .toolbar-spacer { flex: 1; }
    .toolbar label {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: #aaa;
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    .toolbar input[type="date"] {
      padding: 4px 8px;
      border: 1px solid rgba(255,255,255,.2);
      border-radius: 4px;
      background: rgba(255,255,255,.1);
      color: #fff;
      font-size: 12px;
      font-family: inherit;
      outline: none;
    }
    .toolbar input[type="date"]:focus { border-color: #3b82f6; }
    .toolbar input[type="date"]::-webkit-calendar-picker-indicator { filter: invert(1); cursor: pointer; }
    .toolbar button {
      padding: 6px 14px;
      border: 1px solid rgba(255,255,255,.25);
      border-radius: 4px;
      background: rgba(255,255,255,.08);
      color: #fff;
      font-size: 12px;
      font-family: inherit;
      cursor: pointer;
      transition: background .15s;
      white-space: nowrap;
    }
    .toolbar button:hover { background: rgba(255,255,255,.18); }
    .toolbar .btn-run { background: #16a34a; border-color: #16a34a; font-weight: 600; }
    .toolbar .btn-run:hover { background: #15803d; }
    .toolbar .btn-run:disabled { opacity: .5; cursor: not-allowed; }
    .toolbar .btn-pdf { background: #3b82f6; border-color: #3b82f6; font-weight: 600; }
    .toolbar .btn-pdf:hover { background: #2563eb; }
    .toolbar .btn-pdf:disabled { opacity: .5; cursor: not-allowed; }
    .toolbar .row-count { font-size: 11px; color: #aaa; }
    .toolbar .divider { width: 1px; height: 28px; background: rgba(255,255,255,.15); margin: 0 2px; }

    /* ── Report page ── */
    .page {
      max-width: 1100px;
      margin: 16px auto;
      padding: 24px 28px;
      background: #fff;
      box-shadow: 0 1px 4px rgba(0,0,0,.08);
    }

    /* ── Report header ── */
    .report-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 2.5px solid #111;
      padding-bottom: 10px;
      margin-bottom: 18px;
      gap: 16px;
    }
    .report-header-left { display: flex; align-items: center; gap: 14px; }
    .report-header-logo {
      height: 42px;
      max-width: 140px;
      object-fit: contain;
      object-position: left center;
    }
    .report-header .org-label {
      font-size: 10px;
      letter-spacing: 1.6px;
      text-transform: uppercase;
      color: #777;
      font-weight: 600;
    }
    .report-header .title { font-size: 17px; font-weight: 700; margin-top: 1px; }
    .report-header-right { text-align: right; }
    .report-header .date-range { font-size: 11px; color: #666; }

    /* ── Date group ── */
    .date-group { margin-bottom: 20px; }

    .date-heading {
      font-size: 13px;
      font-weight: 700;
      padding: 6px 0 4px;
      border-bottom: 2px solid #333;
      margin-bottom: 0;
    }

    /* ── Per-group table ── */
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 11.5px;
      margin-bottom: 0;
    }

    thead tr {
      background: #e8e8e8;
      border-top: none;
      border-bottom: 1px solid #bbb;
    }

    th {
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.4px;
      color: #444;
      padding: 5px 8px;
      text-align: left;
      white-space: nowrap;
    }

    td {
      padding: 5px 8px;
      vertical-align: top;
      border-bottom: 1px solid #eee;
    }
    tr:last-child td { border-bottom: none; }
    tr:nth-child(even) td { background: #fafaf8; }

    /* ── Column widths ── */
    /* ── Filter dropdowns ── */
    .loc-filter-wrap { position: relative; }
    .btn-loc-filter { display: flex; align-items: center; gap: 6px; white-space: nowrap; }
    .btn-loc-filter .badge { background: #f59e0b; color: #1a1a1a; border-radius: 10px; font-size: 10px; font-weight: 700; padding: 1px 6px; line-height: 1.4; }
    .loc-dropdown { position: absolute; top: calc(100% + 6px); left: 0; z-index: 200; background: #1e1e1e; border: 1px solid rgba(255,255,255,.15); border-radius: 6px; min-width: 220px; max-height: 360px; display: flex; flex-direction: column; box-shadow: 0 8px 24px rgba(0,0,0,.5); }
    .loc-dropdown-header { display: flex; justify-content: space-between; align-items: center; padding: 8px 12px; border-bottom: 1px solid rgba(255,255,255,.1); font-size: 10px; text-transform: uppercase; letter-spacing: 0.5px; color: #aaa; flex-shrink: 0; }
    .loc-dropdown-header-actions { display: flex; gap: 8px; }
    .loc-dropdown-header button { padding: 2px 6px; font-size: 10px; border-color: rgba(255,255,255,.15); background: rgba(255,255,255,.06); }
    .loc-dropdown-search { padding: 6px 10px; border-bottom: 1px solid rgba(255,255,255,.08); flex-shrink: 0; }
    .loc-dropdown-search input { width: 100%; padding: 4px 8px; background: rgba(255,255,255,.08); border: 1px solid rgba(255,255,255,.15); border-radius: 4px; color: #fff; font-size: 11px; font-family: inherit; outline: none; }
    .loc-dropdown-search input::placeholder { color: #777; }
    .loc-dropdown-search input:focus { border-color: #3b82f6; }
    .loc-dropdown-list { overflow-y: auto; flex: 1; padding: 4px 0; }
    .loc-dropdown-list::-webkit-scrollbar { width: 4px; }
    .loc-dropdown-list::-webkit-scrollbar-track { background: transparent; }
    .loc-dropdown-list::-webkit-scrollbar-thumb { background: rgba(255,255,255,.2); border-radius: 2px; }
    .loc-item { display: flex; align-items: center; gap: 8px; padding: 5px 12px; cursor: pointer; transition: background .1s; font-size: 12px; color: #ddd; }
    .loc-item:hover { background: rgba(255,255,255,.07); }
    .loc-item input[type="checkbox"] { accent-color: #3b82f6; width: 13px; height: 13px; flex-shrink: 0; cursor: pointer; }
    .loc-item span { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex: 1; }

    .col-location  { width: 14%; }
    .col-datetime  { width: 14%; white-space: nowrap; }
    .col-title     { width: 13%; }
    .col-invoice   { width: 7%;  font-family: 'IBM Plex Mono', monospace; font-size: 10.5px; }
    .col-renter    { width: 10%; }
    .col-phone     { width: 9%;  white-space: nowrap; }
    .col-email     { width: 14%; font-size: 10.5px; word-break: break-all; }
    .col-alcohol   { width: 5%;  text-align: center; }
    .col-hcnt      { width: 4%;  text-align: center; }
    .col-total     { width: 6%;  text-align: right; white-space: nowrap; }

    .alcohol-yes { color: #b91c1c; font-weight: 600; }
    .muted       { color: #ccc; }

    /* ── Notes sub-row ── */
    .notes-row td {
      padding: 1px 8px 4px;
      font-size: 10px;
      color: #888;
      font-family: 'IBM Plex Mono', monospace;
      border-bottom: 1px solid #eee;
    }

    /* ── Footer ── */
    .report-footer {
      display: flex;
      justify-content: space-between;
      border-top: 2.5px solid #111;
      margin-top: 16px;
      padding-top: 6px;
      font-size: 10px;
      color: #777;
    }

    /* ── Loading / Error ── */
    .loading { text-align: center; padding: 80px 20px; color: #888; font-size: 14px; }
    .loading .spinner {
      position: relative;
      display: inline-block;
      width: 34px;
      height: 44px;
      margin: 0 auto;
      box-sizing: border-box;
      border: 2px solid #e07b1a;
      border-top-color: #f7b96b;
      border-radius: 4px 4px 14px 14px;
      background: rgba(255, 248, 240, 0.5);
      overflow: hidden;
      box-shadow: inset -4px 0 0 rgba(255, 255, 255, 0.35);
    }
    .loading .spinner::before {
      content: '';
      position: absolute;
      left: 0; right: 0; bottom: 0;
      height: 60%;
      background: linear-gradient(180deg, #ffb24d 0%, #ff8c1f 55%, #f2710a 100%);
      box-shadow: inset 0 2px 0 rgba(255, 255, 255, 0.45);
      animation: juice-fill 2s ease-in-out infinite;
    }
    .loading .spinner::after {
      content: '';
      position: absolute;
      left: 50%; bottom: 6px;
      width: 3px; height: 3px;
      margin-left: -1.5px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.85);
      box-shadow: -5px 7px 0 0 rgba(255, 255, 255, 0.65), 5px 12px 0 -0.5px rgba(255, 255, 255, 0.5);
      animation: juice-bubbles 2.2s ease-out infinite;
    }
    @keyframes juice-fill {
      0%   { height: 42%; }
      50%  { height: 80%; }
      100% { height: 42%; }
    }
    @keyframes juice-bubbles {
      0%   { transform: translateY(2px) scale(0.5); opacity: 0; }
      30%  { opacity: 0.9; }
      70%  { opacity: 0.6; }
      100% { transform: translateY(-22px) scale(1); opacity: 0; }
    }
    .loading { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 14px; }
    .juice-msg { position: relative; height: 1.4em; line-height: 1.4em; min-width: 190px; }
    .juice-msg span { position: absolute; left: 0; right: 0; text-align: center; opacity: 0; animation: juice-phrase 10s infinite; }
    .juice-msg span:nth-child(1) { animation-delay: 0s; }
    .juice-msg span:nth-child(2) { animation-delay: 2s; }
    .juice-msg span:nth-child(3) { animation-delay: 4s; }
    .juice-msg span:nth-child(4) { animation-delay: 6s; }
    .juice-msg span:nth-child(5) { animation-delay: 8s; }
    @keyframes juice-phrase {
      0%   { opacity: 0; transform: translateY(5px); }
      2%   { opacity: 1; transform: translateY(0); }
      18%  { opacity: 1; transform: translateY(0); }
      20%  { opacity: 0; transform: translateY(-5px); }
      100% { opacity: 0; }
    }
    .error { text-align: center; padding: 60px 20px; color: #b91c1c; font-size: 14px; }

    /* ── Print / PDF ── */
    @media print {
      body { background: #fff; }
      .toolbar { display: none !important; }
      .page { box-shadow: none; margin: 0; padding: 12px 16px; max-width: 100%; }
      .date-group { page-break-inside: avoid; }
    }
    body.print-mode .toolbar { display: none !important; }
    body.print-mode { background: #fff; }
    body.print-mode .page { box-shadow: none; margin: 0; padding: 12px 16px; max-width: 100%; }

    /* ── Button loading spinner ── */
    @keyframes btn-spin { to { transform: rotate(360deg); } }
    .btn-spinner {
      display: inline-block;
      width: 12px;
      height: 12px;
      border: 2px solid rgba(0,0,0,.15);
      border-top-color: #333;
      border-radius: 50%;
      animation: btn-spin .6s linear infinite;
      vertical-align: middle;
      margin-right: 5px;
    }
    .toolbar button:disabled .btn-spinner {
      border-top-color: #888;
    }

    /* ── AI Insights ── */
    .insights-section { margin: 0 0 16px; padding: 16px 0 0; }
    .insights-head { display: flex; align-items: center; gap: 12px; margin-bottom: 10px; }
    .insights-btn { background: linear-gradient(135deg, #6366f1, #8b5cf6); color: #fff; border: none; border-radius: 8px; padding: 8px 18px; font-size: 13px; font-weight: 600; cursor: pointer; font-family: inherit; }
    .insights-btn:hover { filter: brightness(1.08); }
    .insights-btn:disabled { opacity: .6; cursor: wait; }
    .insights-sub { font-size: 12px; color: #888; }
    .insights-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(230px, 1fr)); gap: 12px; }
    .insight-card { border: 1px solid #e5e7eb; border-left-width: 4px; border-radius: 8px; padding: 14px 16px; background: #fff; }
    .insight-opportunity { border-left-color: #10b981; } .insight-opportunity .insight-type { color: #059669; }
    .insight-risk { border-left-color: #ef4444; } .insight-risk .insight-type { color: #dc2626; }
    .insight-signal { border-left-color: #3b82f6; } .insight-signal .insight-type { color: #2563eb; }
    .insight-type { font-size: 10px; font-weight: 700; letter-spacing: .6px; text-transform: uppercase; margin-bottom: 6px; }
    .insight-title { font-size: 14px; font-weight: 700; color: #111827; margin-bottom: 5px; line-height: 1.3; }
    .insight-detail { font-size: 13px; color: #4b5563; line-height: 1.5; }
    .insight-action { font-size: 12px; color: #6b7280; margin-top: 8px; font-weight: 500; }
    .insights-feedback { display:flex; align-items:center; gap:8px; margin-top:12px; padding:8px 4px; font-size:13px; color:#666; }
    .insights-feedback button { background:none; border:1px solid #e5e7eb; border-radius:6px; padding:4px 10px; cursor:pointer; font-size:13px; transition:all .15s; }
    .insights-feedback button:hover { background:#f3f4f6; border-color:#d1d5db; }
    .insights-feedback .fb-label { color:#888; font-size:12px; }
    .insights-feedback .fb-thanks { color:#10b981; font-weight:600; font-size:13px; }
    .insights-feedback .fb-down-form { display:flex; align-items:center; gap:6px; flex:1; }
    .insights-feedback .fb-down-form input { flex:1; border:1px solid #d1d5db; border-radius:6px; padding:5px 10px; font-size:13px; font-family:inherit; outline:none; }
    .insights-feedback .fb-down-form input:focus { border-color:#6366f1; box-shadow:0 0 0 2px rgba(99,102,241,.15); }
    .insights-feedback .fb-send { background:#6366f1!important; color:#fff!important; border-color:#6366f1!important; font-weight:600; }
    .insights-feedback .fb-send:hover { background:#4f46e5!important; }
    .ai-loading { padding: 24px 16px; text-align: center; }
    .ai-spinner { border:3px solid #e5e7eb; border-top:3px solid #6366f1; border-radius:50%; width:24px; height:24px; margin:0 auto; animation:ai-spin 1s linear infinite; }
    @keyframes ai-spin { to { transform:rotate(360deg); } }
  </style>
  <script>
    // ── Token auth (injected) ────────────────────────────────────────
    const URL_TOKEN = new URLSearchParams(window.location.search).get('token') || '';
    const TOKEN_QS  = URL_TOKEN ? '?token=' + encodeURIComponent(URL_TOKEN) : '';
    function withToken(url) {
      if (!URL_TOKEN) return url;
      return url + (url.includes('?') ? '&' : '?') + 'token=' + encodeURIComponent(URL_TOKEN);
    }
  </script>
</head>
<body>
<div id="root"></div>

<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>

<script type="text/babel">
const { useState, useEffect, useMemo, useCallback, useRef } = React;

function getOrgAndBase() {
  const parts = window.location.pathname.split('/').filter(Boolean);
  return { orgSlug: parts[0] || 'unknown', basePath: `/${parts[0]}/${parts[1]}` };
}

function getParams() {
  const p = new URLSearchParams(window.location.search);
  return { start_date: p.get('start_date'), end_date: p.get('end_date'), site_type: p.get('site_type'), _print: p.get('_print') };
}

function getCurrentMonthRange() {
  const now = new Date(), y = now.getFullYear(), m = now.getMonth();
  return { start: toISO(new Date(y, m, 1)), end: toISO(new Date(y, m + 1, 0)) };
}

function toISO(d) {
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function formatDisplayDate(iso) {
  if (!iso) return '';
  const d = new Date(iso + 'T12:00:00');
  const months = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  return `${months[d.getMonth()]} ${d.getDate()}, ${d.getFullYear()}`;
}

function formatDateHeading(dateStr) {
  const d = new Date(dateStr + (dateStr.includes('T') ? '' : 'T12:00:00'));
  const days   = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  const months = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  const day = d.getDate();
  const suffix = [,'st','nd','rd'][day % 10 > 3 || Math.floor(day/10) === 1 ? 0 : day % 10] || 'th';
  return `${days[d.getDay()]} ${months[d.getMonth()]} ${day}${suffix}, ${d.getFullYear()}`;
}

function formatMoney(v) {
  if (v == null || v === '') return '';
  const n = typeof v === 'string' ? parseFloat(v) : v;
  if (isNaN(n) || n === 0) return '';
  return '$' + n.toFixed(2);
}

function normalizeRow(raw) {
  return {
    orgName:          raw['Org Name']          || raw['org_name']          || '',
    date:             raw['Date']              || raw['date']               || '',
    locationFacility: raw['Location/Facility'] || raw['location_facility'] || '',
    location:         raw['Location']           || raw['location']          || '',
    siteType:         raw['Type']               || raw['Site Type']         || raw['site_type'] || '',
    rentalDateTime:   raw['Rental Date/Time']  || raw['rental_date_time']  || '',
    eventTitle:       raw['Event Title']       || raw['event_title']       || '',
    invoiceNum:       raw['Invoice #']         || raw['invoice_num']       || '',
    renter:           raw['Renter']            || raw['renter']            || '',
    phone:            raw['Phone']             || raw['phone']             || '',
    email:            raw['Email']             || raw['email']             || '',
    headCnt:          raw['Head Cnt']          || raw['head_cnt']          || '',
    alcohol:          raw['Alcohol']           || raw['alcohol']           || '',
    notes:            raw['Notes']             || raw['notes']             || '',
    addOns:           raw['Add Ons']           || raw['add_ons']           || '',
    total:            raw['Total']             ?? raw['total']             ?? null,
  };
}

const COL_HEADERS = () => (
  <thead>
    <tr>
      <th className="col-location">Location/Facility</th>
      <th className="col-datetime">Rental Date/Time</th>
      <th className="col-title">Event Title</th>
      <th className="col-invoice">Invoice #</th>
      <th className="col-renter">Renter</th>
      <th className="col-phone">Phone</th>
      <th className="col-email">Email</th>
      <th className="col-alcohol">Alc.</th>
      <th className="col-hcnt">Cnt</th>
      <th className="col-total">Total</th>
    </tr>
  </thead>
);

// ── Location Filter Dropdown ──────────────────────────────────────────
function LocationFilter({ allLocations, selectedLocations, onChange }) {
  var [open, setOpen]     = useState(false);
  var [search, setSearch] = useState('');
  var wrapRef             = useRef(null);
  useEffect(function() {
    function handleClick(e) { if (wrapRef.current && !wrapRef.current.contains(e.target)) setOpen(false); }
    document.addEventListener('mousedown', handleClick);
    return function() { document.removeEventListener('mousedown', handleClick); };
  }, []);
  var filtered    = allLocations.filter(function(l) { return l.toLowerCase().includes(search.toLowerCase()); });
  var allSelected = selectedLocations.size === allLocations.length;
  var noneSelected = selectedLocations.size === 0;
  function toggle(loc) { var next = new Set(selectedLocations); next.has(loc) ? next.delete(loc) : next.add(loc); onChange(next); }
  function selectAll() { onChange(new Set(allLocations)); }
  function clearAll()  { onChange(new Set()); }
  var badgeCount = allSelected ? null : selectedLocations.size;
  return (
    <div className="loc-filter-wrap" ref={wrapRef}>
      <button className="btn-loc-filter" onClick={function() { setOpen(function(o) { return !o; }); }}
        style={!allSelected ? { borderColor: '#f59e0b', color: '#fde68a' } : {}}>
        📍 Locations
        {badgeCount !== null && <span className="badge">{badgeCount}/{allLocations.length}</span>}
      </button>
      {open && (
        <div className="loc-dropdown">
          <div className="loc-dropdown-header">
            <span>Filter Locations</span>
            <div className="loc-dropdown-header-actions">
              <button onClick={selectAll} disabled={allSelected}>All</button>
              <button onClick={clearAll}  disabled={noneSelected}>None</button>
            </div>
          </div>
          {allLocations.length > 5 && (
            <div className="loc-dropdown-search">
              <input type="text" placeholder="Search locations…" value={search} onChange={function(e) { setSearch(e.target.value); }} autoFocus />
            </div>
          )}
          <div className="loc-dropdown-list">
            {filtered.length === 0 && <div style={{padding:'10px 12px', color:'#666', fontSize:11}}>No matches</div>}
            {filtered.map(function(loc) {
              return (<label key={loc} className="loc-item">
                <input type="checkbox" checked={selectedLocations.has(loc)} onChange={function() { toggle(loc); }} />
                <span title={loc}>{loc}</span>
              </label>);
            })}
          </div>
        </div>
      )}
    </div>
  );
}

// ── Site Type Filter Dropdown ─────────────────────────────────────────
function SiteFilter({ allSites, selectedSites, onChange }) {
  var [open, setOpen]     = useState(false);
  var [search, setSearch] = useState('');
  var wrapRef             = useRef(null);
  useEffect(function() {
    function handleClick(e) { if (wrapRef.current && !wrapRef.current.contains(e.target)) setOpen(false); }
    document.addEventListener('mousedown', handleClick);
    return function() { document.removeEventListener('mousedown', handleClick); };
  }, []);
  var filtered    = allSites.filter(function(s) { return s.toLowerCase().includes(search.toLowerCase()); });
  var allSelected = selectedSites.size === allSites.length;
  var noneSelected = selectedSites.size === 0;
  function toggle(site) { var next = new Set(selectedSites); next.has(site) ? next.delete(site) : next.add(site); onChange(next); }
  function selectAll() { onChange(new Set(allSites)); }
  function clearAll()  { onChange(new Set()); }
  var badgeCount = allSelected ? null : selectedSites.size;
  return (
    <div className="loc-filter-wrap" ref={wrapRef}>
      <button className="btn-loc-filter" onClick={function() { setOpen(function(o) { return !o; }); }}
        style={!allSelected ? { borderColor: '#f59e0b', color: '#fde68a' } : {}}>
        🏢 Site Types
        {badgeCount !== null && <span className="badge">{badgeCount}/{allSites.length}</span>}
      </button>
      {open && (
        <div className="loc-dropdown">
          <div className="loc-dropdown-header">
            <span>Filter Site Types</span>
            <div className="loc-dropdown-header-actions">
              <button onClick={selectAll} disabled={allSelected}>All</button>
              <button onClick={clearAll}  disabled={noneSelected}>None</button>
            </div>
          </div>
          {allSites.length > 5 && (
            <div className="loc-dropdown-search">
              <input type="text" placeholder="Search site types…" value={search} onChange={function(e) { setSearch(e.target.value); }} autoFocus />
            </div>
          )}
          <div className="loc-dropdown-list">
            {filtered.length === 0 && <div style={{padding:'10px 12px', color:'#666', fontSize:11}}>No matches</div>}
            {filtered.map(function(site) {
              return (<label key={site} className="loc-item">
                <input type="checkbox" checked={selectedSites.has(site)} onChange={function() { toggle(site); }} />
                <span title={site}>{site}</span>
              </label>);
            })}
          </div>
        </div>
      )}
    </div>
  );
}

function App() {
  const { orgSlug, basePath } = useMemo(() => getOrgAndBase(), []);
  const params   = useMemo(() => getParams(), []);
  const defaults = useMemo(() => getCurrentMonthRange(), []);

  const [startDate,   setStartDate]   = useState(params.start_date || defaults.start);
  const [endDate,     setEndDate]     = useState(params.end_date   || defaults.end);
  const [rows,        setRows]        = useState(null);
  const [meta,        setMeta]        = useState({});
  const [error,       setError]       = useState(null);
  const [loading,     setLoading]     = useState(false);
  const [pdfLoading,  setPdfLoading]  = useState(false);
  const [loadedStart, setLoadedStart] = useState(null);
  const [loadedEnd,   setLoadedEnd]   = useState(null);
  const [insights, setInsights] = useState(null);
  const [insightsLoading, setInsightsLoading] = useState(false);
  const [insightsError, setInsightsError] = useState(null);
  const [insightsTraceId, setInsightsTraceId] = useState(null);
  const [fbSent, setFbSent] = useState(false);
  const [fbMode, setFbMode] = useState(null);
  const [fbComment, setFbComment] = useState('');
  const [selectedLocations, setSelectedLocations] = useState(null);
  const [selectedSites,     setSelectedSites]     = useState(null);

  // Share Link: expose the live applied filter state so the floating Share
  // widget copies a URL that reproduces the on-screen view (mirrors the PDF).
  useEffect(() => {
    window.recShareLink = () => {
      const qs = new URLSearchParams();
      qs.set('start_date', loadedStart || startDate);
      qs.set('end_date',   loadedEnd   || endDate);
      if (params.site_type) qs.set('site_type', params.site_type);
      if (selectedLocations && selectedLocations.size < allLocations.length) qs.set('locations', [...selectedLocations].join(','));
      if (selectedSites && selectedSites.size < allSites.length) qs.set('sites', [...selectedSites].join(','));
      if (URL_TOKEN) qs.set('token', URL_TOKEN);
      return `${window.location.pathname}?${qs.toString()}`;
    };
    return () => { try { delete window.recShareLink; } catch (e) { window.recShareLink = undefined; } };
  }, [loadedStart, loadedEnd, startDate, endDate, params.site_type, selectedLocations, selectedSites, allLocations, allSites]);

  useEffect(() => {
    if (params._print === '1') document.body.classList.add('print-mode');
  }, []);

  const fetchData = useCallback((sd, ed) => {
    setLoading(true); setError(null);
    const qs = new URLSearchParams();
    if (sd) qs.set('start_date', sd);
    if (ed) qs.set('end_date',   ed);
    if (params.site_type) qs.set('site_type', params.site_type);
    fetch(withToken(`${basePath}/api/data?${qs}`))
      .then(r => { if (!r.ok) throw new Error(`Server returned ${r.status}`); return r.json(); })
      .then(json => {
        setRows((json.rows || []).map(normalizeRow));
        setMeta(json.meta || {});
        setLoadedStart(sd);
        setLoadedEnd(ed);
      })
      .catch(err => setError(err.message))
      .finally(() => setLoading(false));
  }, [basePath, params.site_type]);

  useEffect(() => { fetchData(startDate, endDate); }, []);

  function setMonth(offset) {
    const now = new Date();
    const t = new Date(now.getFullYear(), now.getMonth() + offset, 1);
    setStartDate(toISO(t));
    setEndDate(toISO(new Date(t.getFullYear(), t.getMonth() + 1, 0)));
  }

  function downloadPdf() {
    setPdfLoading(true);
    const qs = new URLSearchParams();
    if (loadedStart) qs.set('start_date', loadedStart);
    if (loadedEnd)   qs.set('end_date',   loadedEnd);
    if (params.site_type) qs.set('site_type', params.site_type);
    fetch(withToken(`${basePath}/api/pdf?${qs}`))
      .then(r => r.blob())
      .then(blob => {
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = `historic-reservations-${loadedStart || 'report'}.pdf`;
        a.click();
        URL.revokeObjectURL(a.href);
      })
      .catch(err => alert('PDF failed: ' + err.message))
      .finally(() => setPdfLoading(false));
  }

  const isPrint      = params._print === '1';
  const datesChanged = startDate !== loadedStart || endDate !== loadedEnd;

  // ── Derive filter options from ALL rows (always visible) ──
  var allLocations = useMemo(function() {
    if (!rows) return [];
    var set = new Set();
    rows.forEach(function(r) { if (r.location) set.add(r.location); });
    return Array.from(set).sort();
  }, [rows]);

  var allSites = useMemo(function() {
    if (!rows) return [];
    var set = new Set();
    rows.forEach(function(r) { if (r.siteType) set.add(r.siteType); });
    return Array.from(set).sort();
  }, [rows]);

  useEffect(function() {
    if (allLocations.length && !selectedLocations) setSelectedLocations(new Set(allLocations));
  }, [allLocations]);
  useEffect(function() {
    if (allSites.length && !selectedSites) setSelectedSites(new Set(allSites));
  }, [allSites]);

  var filteredRows = useMemo(function() {
    if (!rows) return null;
    var result = rows;
    if (selectedLocations && allLocations.length > 0 && selectedLocations.size < allLocations.length) {
      result = result.filter(function(r) { return selectedLocations.has(r.location || ''); });
    }
    if (selectedSites && allSites.length > 0 && selectedSites.size < allSites.length) {
      result = result.filter(function(r) { return selectedSites.has(r.siteType || ''); });
    }
    return result;
  }, [rows, selectedLocations, allLocations, selectedSites, allSites]);

  const grouped = useMemo(function() {
    if (!filteredRows) return null;
    var byDate = {};
    filteredRows.forEach(function(row) {
      var dk = (row.date || '').split('T')[0] || '';
      if (!byDate[dk]) byDate[dk] = [];
      byDate[dk].push(row);
    });
    return byDate;
  }, [filteredRows]);

  const sortedDates = grouped ? Object.keys(grouped).sort() : [];


  // ── AI Insights ──
  const buildInsightsBlob = useCallback(() => {
    if (!rows || !rows.length) return null;
    const byLoc = {}; let totalRev = 0;
    rows.forEach(r => { const loc = r.location||r.facility||'Unknown';
      if (!byLoc[loc]) byLoc[loc] = {count:0,revenue:0};
      byLoc[loc].count++; byLoc[loc].revenue += Number(r.total||r.amount||0);
      totalRev += Number(r.total||r.amount||0); });
    return { rowCount: rows.length, totalRevenue: totalRev, byLocation: byLoc };
  }, [rows]);

  const sendInsightsFeedback = useCallback((score) => {
    if (!insightsTraceId) return;
    fetch(withToken(basePath + '/api/insights/score'), {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ traceId: insightsTraceId, score, comment: score === 0 ? fbComment : '' }),
    }).catch(() => {});
    setFbSent(true); setFbMode(null);
  }, [insightsTraceId, fbComment]);

  const getInsights = useCallback(async () => {
    const blob = buildInsightsBlob();
    if (!blob) return;
    setInsightsLoading(true); setInsightsError(null);
    try {
      const resp = await fetch(withToken(basePath + '/api/insights'), {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(blob),
      });
      const json = await resp.json().catch(() => ({}));
      if (!resp.ok || !json.ok) throw new Error(json.error || 'Request failed');
      setInsights(json.insights || []);
      setInsightsTraceId(json.traceId || null);
      setFbSent(false); setFbMode(null); setFbComment('');
    } catch (err) {
      setInsightsError(err.message);
    } finally {
      setInsightsLoading(false);
    }
  }, [buildInsightsBlob]);

  function renderToolbar() {
    if (isPrint) return null;
    return (
      <div className="toolbar">
        <span className="toolbar-title">Historic Schedule</span>
        <div className="divider" />
        <label>Start<input type="date" value={startDate} onChange={e => setStartDate(e.target.value)} /></label>
        <label>End<input type="date" value={endDate} onChange={e => setEndDate(e.target.value)} /></label>
        <button onClick={() => setMonth(-1)} style={{fontSize:11,padding:'4px 8px'}}>Last Month</button>
        <button onClick={() => setMonth(0)}  style={{fontSize:11,padding:'4px 8px'}}>This Month</button>
        <button onClick={() => setMonth(1)}  style={{fontSize:11,padding:'4px 8px'}}>Next Month</button>
        <button
          className="btn-run"
          onClick={() => fetchData(startDate, endDate)}
          disabled={loading}
          style={datesChanged && !loading ? {boxShadow:'0 0 0 2px #4ade80'} : {}}
        >
          {loading ? <><span className="btn-spinner" />Loading…</> : '▶ Run Report'}
        </button>
        {allLocations.length > 0 && selectedLocations && (
          <LocationFilter allLocations={allLocations} selectedLocations={selectedLocations} onChange={setSelectedLocations} />
        )}
        {allSites.length > 0 && selectedSites && (
          <SiteFilter allSites={allSites} selectedSites={selectedSites} onChange={setSelectedSites} />
        )}
        <div className="toolbar-spacer" />
        {filteredRows && <span className="row-count">{filteredRows.length}{filteredRows.length !== rows.length ? '/' + rows.length : ''} rental{filteredRows.length !== 1 ? 's' : ''}</span>}
        <div className="divider" />
        <button onClick={() => window.print()}>🖨️ Print</button>
        <button className="btn-pdf" onClick={downloadPdf} disabled={pdfLoading || !rows || rows.length === 0}>
          {pdfLoading ? 'Generating…' : '📄 PDF'}
        </button>
      </div>
    );
  }

  if (error && !rows) return (
    <div>{renderToolbar()}
      <div className="page"><div className="error">
        <p><strong>Failed to load report data</strong></p><p>{error}</p>
        <p style={{marginTop:12,color:'#666',fontSize:12}}>Check that Metabase public sharing is enabled and the UUID is correct.</p>
      </div></div>
    </div>
  );

  if (!rows) return (
    <div>{renderToolbar()}
      <div className="page"><div className="loading">
        <div className="spinner" /><div className="juice-msg"><span>Squeezing the oranges…</span><span>Juicing!</span><span>Adding the pulp…</span><span>Chilling the glass…</span><span>Pouring it out…</span></div>
      </div></div>
    </div>
  );

  const now     = new Date();
  const runDate = `${String(now.getMonth()+1).padStart(2,'0')}/${String(now.getDate()).padStart(2,'0')}/${now.getFullYear()} @ ${now.toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit',hour12:true}).toLowerCase()}`;
  const orgName = (rows.length > 0 && rows[0].orgName) ? rows[0].orgName : (meta.org_name || 'rec.us');
  const logoUrl = meta.logo_url || null;
  const dateRangeLabel = [loadedStart && formatDisplayDate(loadedStart), loadedEnd && formatDisplayDate(loadedEnd)].filter(Boolean).join(' – ') || 'Current Month';

  return (
    <div>
      {renderToolbar()}
      <div className="page" style={loading ? {opacity:0.5,pointerEvents:'none'} : {}}>

        <div className="report-header">
          <div className="report-header-left">
            {logoUrl && <img src={logoUrl} alt="" className="report-header-logo" onError={e => e.target.style.display='none'} />}
            <div>
              <div className="org-label">{orgName}</div>
              <div className="title">Facility Reservations by Date</div>
            </div>
          </div>
          <div className="report-header-right">
            <div className="date-range">{dateRangeLabel}</div>
          </div>
        </div>

        {sortedDates.map(dateKey => (
          <div key={dateKey} className="date-group">
            <div className="date-heading">{formatDateHeading(dateKey)}</div>

        {/* AI Insights */}
        {rows && rows.length > 0 && (
          <div className="insights-section no-print">
            <div className="insights-head">
              <button type="button" className="insights-btn" onClick={getInsights} disabled={insightsLoading}>
                {insightsLoading ? 'Analyzing…' : (insights ? '↻ Refresh' : '✨ Rec Insights')}
              </button>
              {insights && !insightsLoading && (
                <span className="insights-sub">{'Analyzed ' + (filteredRows || rows).length + ' reservations'}</span>
              )}
            </div>
            {insightsLoading && <div className="ai-loading"><div className="ai-spinner" /></div>}
            {insightsError && !insightsLoading && (
              <div style={{color:'#dc2626',fontSize:13,padding:'8px 0'}}><strong>Insights unavailable:</strong> {insightsError}</div>
            )}
            {insights && !insightsLoading && (
              <div className="insights-grid">
                {insights.map((ins, i) => (
                  <div key={i} className={'insight-card insight-' + (ins.type || 'signal')}>
                    <div className="insight-type">{ins.type || 'signal'}</div>
                    <div className="insight-title">{ins.title}</div>
                    <div className="insight-detail">{ins.detail}</div>
                    {ins.action && <div className="insight-action">→ {ins.action}</div>}
                  </div>
                ))}
              </div>
            )}
            {insights && !insightsLoading && (
              <div className="insights-feedback">
                {fbSent ? (
                  <span className="fb-thanks">✅ Thanks for the feedback!</span>
                ) : fbMode === 'down' ? (
                  <div className="fb-down-form">
                    <input placeholder="What could be better?" value={fbComment}
                      onChange={e => setFbComment(e.target.value)}
                      onKeyDown={e => e.key === 'Enter' && sendInsightsFeedback(0)}
                      autoFocus maxLength={500} />
                    <button className="fb-send" onClick={() => sendInsightsFeedback(0)}>Send</button>
                    <button onClick={() => setFbMode(null)}>Cancel</button>
                  </div>
                ) : (
                  <React.Fragment>
                    <span className="fb-label">Were these insights helpful?</span>
                    <button onClick={() => sendInsightsFeedback(1)} title="Yes">👍</button>
                    <button onClick={() => setFbMode('down')} title="Not helpful">👎</button>
                  </React.Fragment>
                )}
              </div>
            )}
          </div>
        )}

            <table>
              <COL_HEADERS />
              <tbody>
                {grouped[dateKey].map((r, i) => (
                  <React.Fragment key={i}>
                    <tr>
                      <td className="col-location">{r.locationFacility || <span className="muted">—</span>}</td>
                      <td className="col-datetime">{r.rentalDateTime   || <span className="muted">—</span>}</td>
                      <td className="col-title">{r.eventTitle          || <span className="muted">N/A</span>}</td>
                      <td className="col-invoice">{r.invoiceNum        || <span className="muted">—</span>}</td>
                      <td className="col-renter">{r.renter             || <span className="muted">—</span>}</td>
                      <td className="col-phone">{r.phone               || ''}</td>
                      <td className="col-email">{r.email               || ''}</td>
                      <td className={`col-alcohol${r.alcohol === 'Yes' ? ' alcohol-yes' : ''}`}>{r.alcohol || '—'}</td>
                      <td className="col-hcnt">{r.headCnt              || ''}</td>
                      <td className="col-total">{formatMoney(r.total)}</td>
                    </tr>
                    {(r.notes || r.addOns) && (
                      <tr className="notes-row">
                        <td colSpan={10}>
                          {r.notes || ''}{r.addOns ? ` | Add-ons: ${r.addOns}` : ''}
                        </td>
                      </tr>
                    )}
                  </React.Fragment>
                ))}
              </tbody>
            </table>
          </div>
        ))}

        {rows.length === 0 && (
          <div style={{textAlign:'center',padding:'40px 0',color:'#888'}}>
            No reservations found for the selected date range.
          </div>
        )}

        <div className="report-footer">
          <span>{orgName} — Facility Reservations by Date</span>
          <span>Run Date/Time: {runDate}</span>
        </div>

        <div id="report-ready" style={{display:'none'}} />
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
    <script src="/share-widget.js" defer></script>
    <script src="/feedback-widget.js" defer></script>
      <script src="/nav-breadcrumb.js" defer></script>
  </body>
</html>
