<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Weekly Rental Schedule</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'IBM Plex Sans', 'Segoe UI', system-ui, sans-serif;
      font-size: 12px;
      color: #1a1a1a;
      background: #f5f4f1;
      line-height: 1.35;
    }

    /* ── Toolbar ── */
    .toolbar {
      position: sticky;
      top: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 20px;
      background: #2c2c2c;
      color: #eee;
      font-size: 13px;
      flex-wrap: wrap;
    }
    .toolbar-title { font-weight: 600; margin-right: 8px; }
    .toolbar-spacer { flex: 1; }

    .toolbar label {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: #aaa;
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    .toolbar input[type="date"] {
      padding: 4px 8px;
      border: 1px solid rgba(255,255,255,.2);
      border-radius: 4px;
      background: rgba(255,255,255,.1);
      color: #fff;
      font-size: 12px;
      font-family: inherit;
      outline: none;
    }
    .toolbar input[type="date"]:focus { border-color: #3b82f6; }
    .toolbar input[type="date"]::-webkit-calendar-picker-indicator {
      filter: invert(1);
      cursor: pointer;
    }

    .toolbar button {
      padding: 6px 14px;
      border: 1px solid rgba(255,255,255,.25);
      border-radius: 4px;
      background: rgba(255,255,255,.08);
      color: #fff;
      font-size: 12px;
      font-family: inherit;
      cursor: pointer;
      transition: background .15s;
    }
    .toolbar button:hover { background: rgba(255,255,255,.18); }
    .toolbar .btn-run {
      background: #16a34a;
      border-color: #16a34a;
      font-weight: 600;
    }
    .toolbar .btn-run:hover { background: #15803d; }
    .toolbar .btn-run:disabled { opacity: .5; cursor: not-allowed; }
    .toolbar .btn-pdf {
      background: #3b82f6;
      border-color: #3b82f6;
      font-weight: 600;
    }
    .toolbar .btn-pdf:hover { background: #2563eb; }
    .toolbar .btn-pdf:disabled { opacity: .5; cursor: not-allowed; }
    .toolbar .btn-excel {
      background: #16803c;
      border-color: #16803c;
      font-weight: 600;
    }
    .toolbar .btn-excel:hover { background: #15692f; }
    .toolbar .btn-excel:disabled { opacity: .5; cursor: not-allowed; }

    /* ── View toggle ── */
    .view-toggle {
      display: flex;
      border: 1px solid rgba(255,255,255,.25);
      border-radius: 4px;
      overflow: hidden;
    }
    .view-toggle button {
      border: none;
      border-radius: 0;
      padding: 5px 12px;
      font-size: 11px;
      font-weight: 500;
    }
    .view-toggle button + button {
      border-left: 1px solid rgba(255,255,255,.2);
    }
    .view-toggle button.active {
      background: #3b82f6;
      border-color: #3b82f6;
    }

    .toolbar .row-count {
      font-size: 11px;
      color: #aaa;
      margin-left: 4px;
    }

    .toolbar .divider {
      width: 1px;
      height: 28px;
      background: rgba(255,255,255,.15);
      margin: 0 4px;
    }

    /* ── Location filter dropdown ── */
    .loc-filter-wrap {
      position: relative;
    }

    .btn-loc-filter {
      display: flex;
      align-items: center;
      gap: 6px;
      white-space: nowrap;
    }

    .btn-loc-filter .badge {
      background: #f59e0b;
      color: #1a1a1a;
      border-radius: 10px;
      font-size: 10px;
      font-weight: 700;
      padding: 1px 6px;
      line-height: 1.4;
    }

    .loc-dropdown {
      position: absolute;
      top: calc(100% + 6px);
      left: 0;
      z-index: 200;
      background: #1e1e1e;
      border: 1px solid rgba(255,255,255,.15);
      border-radius: 6px;
      min-width: 220px;
      max-height: 360px;
      display: flex;
      flex-direction: column;
      box-shadow: 0 8px 24px rgba(0,0,0,.5);
    }

    .loc-dropdown-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 12px;
      border-bottom: 1px solid rgba(255,255,255,.1);
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: #aaa;
      flex-shrink: 0;
    }

    .loc-dropdown-header-actions {
      display: flex;
      gap: 8px;
    }

    .loc-dropdown-header button {
      padding: 2px 6px;
      font-size: 10px;
      border-color: rgba(255,255,255,.15);
      background: rgba(255,255,255,.06);
    }

    .loc-dropdown-search {
      padding: 6px 10px;
      border-bottom: 1px solid rgba(255,255,255,.08);
      flex-shrink: 0;
    }

    .loc-dropdown-search input {
      width: 100%;
      padding: 4px 8px;
      background: rgba(255,255,255,.08);
      border: 1px solid rgba(255,255,255,.15);
      border-radius: 4px;
      color: #fff;
      font-size: 11px;
      font-family: inherit;
      outline: none;
    }
    .loc-dropdown-search input::placeholder { color: #777; }
    .loc-dropdown-search input:focus { border-color: #3b82f6; }

    .loc-dropdown-list {
      overflow-y: auto;
      flex: 1;
      padding: 4px 0;
    }

    .loc-dropdown-list::-webkit-scrollbar { width: 4px; }
    .loc-dropdown-list::-webkit-scrollbar-track { background: transparent; }
    .loc-dropdown-list::-webkit-scrollbar-thumb { background: rgba(255,255,255,.2); border-radius: 2px; }

    .loc-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 5px 12px;
      cursor: pointer;
      transition: background .1s;
      font-size: 12px;
      color: #ddd;
    }
    .loc-item:hover { background: rgba(255,255,255,.07); }

    .loc-item input[type="checkbox"] {
      accent-color: #3b82f6;
      width: 13px;
      height: 13px;
      flex-shrink: 0;
      cursor: pointer;
    }

    .loc-item span {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      flex: 1;
    }

    /* ── Color swatch for location items ── */
    .loc-color-swatch {
      width: 12px;
      height: 12px;
      border-radius: 3px;
      flex-shrink: 0;
      cursor: pointer;
      border: 1px solid rgba(255,255,255,.25);
      position: relative;
    }
    .loc-color-swatch:hover {
      transform: scale(1.2);
      border-color: rgba(255,255,255,.6);
    }
    .loc-color-picker-pop {
      position: fixed;
      z-index: 9500;
      background: #1e1e1e;
      border: 1px solid rgba(255,255,255,.2);
      border-radius: 6px;
      padding: 8px;
      box-shadow: 0 8px 24px rgba(0,0,0,.6);
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .loc-color-picker-pop .swatch-grid {
      display: grid;
      grid-template-columns: repeat(6, 18px);
      gap: 4px;
    }
    .loc-color-picker-pop .swatch-opt {
      width: 18px;
      height: 18px;
      border-radius: 3px;
      cursor: pointer;
      border: 2px solid transparent;
      transition: transform .1s;
    }
    .loc-color-picker-pop .swatch-opt:hover { transform: scale(1.15); border-color: rgba(255,255,255,.5); }
    .loc-color-picker-pop .swatch-opt.selected { border-color: #fff; }
    .loc-color-picker-pop .custom-row {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 10px;
      color: #aaa;
    }
    .loc-color-picker-pop input[type="color"] {
      width: 24px;
      height: 20px;
      padding: 0;
      border: none;
      background: none;
      cursor: pointer;
    }

    /* ── Column visibility checkboxes ── */
    .col-toggles {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 11px;
      color: #ccc;
    }
    .col-toggles label {
      display: flex;
      flex-direction: row;
      align-items: center;
      gap: 4px;
      cursor: pointer;
      font-size: 11px;
      text-transform: none;
      letter-spacing: 0;
      color: #ccc;
    }
    .col-toggles input[type="checkbox"] {
      accent-color: #3b82f6;
      cursor: pointer;
    }

    /* ── Report page ── */
    .page {
      max-width: 1100px;
      margin: 16px auto;
      padding: 24px 28px;
      background: #fff;
      box-shadow: 0 1px 4px rgba(0,0,0,.08);
    }

    /* ── Header ── */
    .report-header-logo { height: 42px; max-width: 140px; object-fit: contain; object-position: left center; }
    .report-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      border-bottom: 2.5px solid #111;
      padding-bottom: 8px;
      margin-bottom: 14px;
    }
    .report-header .org-label {
      font-size: 10.5px;
      letter-spacing: 1.6px;
      text-transform: uppercase;
      color: #777;
      font-weight: 600;
    }
    .report-header .title {
      font-size: 17px;
      font-weight: 700;
      margin-top: 1px;
    }
    .report-header .date-range {
      font-size: 11px;
      color: #666;
      text-align: right;
    }

    /* ── Column header row ── */
    .col-header-row {
      display: flex;
      gap: 6px;
      padding: 5px 8px;
      background: #e4e4e4;
      border-top: 1px solid #bbb;
      border-bottom: 1px solid #bbb;
      font-weight: 600;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.4px;
      color: #333;
    }

    /* Keep section + column headers together across page breaks */
    .loc-section { break-inside: avoid-column; }
    .section-header + .col-header-row { border-top: none; }

    /* ── Date + Location section header ── */
    .section-header {
      display: flex;
      align-items: baseline;
      gap: 10px;
      padding: 7px 8px 4px;
      margin-top: 8px;
      background: #edeae4;
      border-bottom: 1px solid #ccc;
    }
    .section-header .date-label { font-weight: 700; font-size: 12.5px; }
    .section-header .loc-label { font-weight: 600; font-size: 11.5px; color: #444; }

    /* ── Data rows ── */
    .data-row {
      display: flex;
      gap: 6px;
      padding: 4px 8px;
      border-bottom: 1px solid #eee;
      align-items: baseline;
      font-size: 11.5px;
    }
    .data-row:nth-child(even) { background: #fafaf8; }

    .data-row .cell {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    /* ── Sub-row for notes/add-ons ── */
    .sub-row {
      padding: 0 8px 3px;
      font-size: 10px;
      color: #888;
      font-family: 'IBM Plex Mono', monospace;
      padding-left: 160px;
    }

    /* ── Footer ── */
    .report-footer {
      display: flex;
      justify-content: space-between;
      border-top: 2.5px solid #111;
      margin-top: 14px;
      padding-top: 6px;
      font-size: 10px;
      color: #777;
    }

    /* ── Loading / Error ── */
    .loading {
      text-align: center;
      padding: 80px 20px;
      color: #888;
      font-size: 14px;
    }
    .loading .spinner {
      position: relative;
      display: inline-block;
      width: 34px;
      height: 44px;
      margin: 0 auto;
      box-sizing: border-box;
      border: 2px solid #e07b1a;
      border-top-color: #f7b96b;
      border-radius: 4px 4px 14px 14px;
      background: rgba(255, 248, 240, 0.5);
      overflow: hidden;
      box-shadow: inset -4px 0 0 rgba(255, 255, 255, 0.35);
    }
    .loading .spinner::before {
      content: '';
      position: absolute;
      left: 0; right: 0; bottom: 0;
      height: 60%;
      background: linear-gradient(180deg, #ffb24d 0%, #ff8c1f 55%, #f2710a 100%);
      box-shadow: inset 0 2px 0 rgba(255, 255, 255, 0.45);
      animation: juice-fill 2s ease-in-out infinite;
    }
    .loading .spinner::after {
      content: '';
      position: absolute;
      left: 50%; bottom: 6px;
      width: 3px; height: 3px;
      margin-left: -1.5px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.85);
      box-shadow: -5px 7px 0 0 rgba(255, 255, 255, 0.65), 5px 12px 0 -0.5px rgba(255, 255, 255, 0.5);
      animation: juice-bubbles 2.2s ease-out infinite;
    }
    @keyframes juice-fill {
      0%   { height: 42%; }
      50%  { height: 80%; }
      100% { height: 42%; }
    }
    @keyframes juice-bubbles {
      0%   { transform: translateY(2px) scale(0.5); opacity: 0; }
      30%  { opacity: 0.9; }
      70%  { opacity: 0.6; }
      100% { transform: translateY(-22px) scale(1); opacity: 0; }
    }
    .loading { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 14px; }
    .juice-msg { position: relative; height: 1.4em; line-height: 1.4em; min-width: 190px; }
    .juice-msg span { position: absolute; left: 0; right: 0; text-align: center; opacity: 0; animation: juice-phrase 10s infinite; }
    .juice-msg span:nth-child(1) { animation-delay: 0s; }
    .juice-msg span:nth-child(2) { animation-delay: 2s; }
    .juice-msg span:nth-child(3) { animation-delay: 4s; }
    .juice-msg span:nth-child(4) { animation-delay: 6s; }
    .juice-msg span:nth-child(5) { animation-delay: 8s; }
    @keyframes juice-phrase {
      0%   { opacity: 0; transform: translateY(5px); }
      2%   { opacity: 1; transform: translateY(0); }
      18%  { opacity: 1; transform: translateY(0); }
      20%  { opacity: 0; transform: translateY(-5px); }
      100% { opacity: 0; }
    }

    .error {
      text-align: center;
      padding: 60px 20px;
      color: #b91c1c;
      font-size: 14px;
    }

    /* ── Column widths ── */
    .col-start   { width: 68px; }
    .col-end     { width: 68px; }
    .col-site    { width: 170px; font-weight: 500; white-space: normal !important; overflow: visible !important; text-overflow: clip !important; line-height: 1.3; }
    .col-name    { flex: 1; }
    .col-hcnt    { width: 46px; text-align: center; }
    .col-reservee{ width: 150px; }
    .col-phone   { width: 110px; }
    .col-email   { width: 175px; font-size: 10.5px; }
    .col-purpose { width: 120px; }
    .col-resident{ width: 72px; text-align: center; }
    .col-booktype{ width: 72px; text-align: center; font-size: 10px; }
    .col-total   { width: 62px; text-align: right; }
    .col-addon-fees { width: 72px; text-align: right; }

    /* ═══════════════════════════════════════════════════════════════
       CALENDAR VIEW
    ═══════════════════════════════════════════════════════════════ */

    .cal-wrapper {
      padding: 0;
    }

    /* Month nav bar */
    .cal-month-nav {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 16px;
      margin-bottom: 16px;
    }
    .cal-month-nav .cal-month-label {
      font-size: 18px;
      font-weight: 700;
      min-width: 200px;
      text-align: center;
    }
    .cal-nav-btn {
      background: none;
      border: 1px solid #ccc;
      border-radius: 4px;
      padding: 5px 12px;
      font-size: 16px;
      cursor: pointer;
      color: #333;
      line-height: 1;
      transition: background .12s;
    }
    .cal-nav-btn:hover { background: #f0f0f0; }
    .cal-nav-btn:disabled { opacity: .3; cursor: default; }

    /* Day-of-week header */
    .cal-dow-row {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 2px;
      margin-bottom: 2px;
    }
    .cal-dow-cell {
      text-align: center;
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.6px;
      color: #888;
      padding: 4px 0;
    }

    /* Calendar grid */
    .cal-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 2px;
    }

    .cal-day {
      min-height: 100px;
      border: 1px solid #e0deda;
      border-radius: 4px;
      background: #fff;
      padding: 4px;
      vertical-align: top;
      overflow: hidden;
      position: relative;
    }
    .cal-day.other-month {
      background: #faf9f7;
      opacity: 0.5;
    }
    .cal-day.today {
      border-color: #3b82f6;
      border-width: 2px;
    }
    .cal-day.has-events {
      background: #fff;
    }

    .cal-day-num {
      font-size: 11px;
      font-weight: 700;
      color: #555;
      margin-bottom: 3px;
      line-height: 1;
    }
    .cal-day.today .cal-day-num {
      color: #3b82f6;
    }

    /* Reservation chip */
    .cal-chip {
      display: block;
      border-radius: 3px;
      padding: 2px 5px;
      margin-bottom: 2px;
      font-size: 10px;
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      cursor: pointer;
      line-height: 1.4;
      color: #fff;
      position: relative;
      transition: filter .1s, transform .1s;
    }
    .cal-chip:hover {
      filter: brightness(1.1);
      transform: translateY(-1px);
      z-index: 2;
    }

    .cal-more {
      font-size: 9px;
      color: #999;
      padding: 1px 3px;
      cursor: pointer;
    }
    .cal-more:hover { color: #3b82f6; }

    /* ── Hover card ── */
    .cal-hover-card {
      position: fixed;
      z-index: 9999;
      background: #fff;
      border: 1px solid #ddd;
      border-radius: 8px;
      box-shadow: 0 8px 32px rgba(0,0,0,.18);
      padding: 12px 14px;
      min-width: 220px;
      max-width: 300px;
      pointer-events: none;
    }
    .cal-hover-card .hc-loc {
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.7px;
      margin-bottom: 4px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .cal-hover-card .hc-loc-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .cal-hover-card .hc-site {
      font-size: 13px;
      font-weight: 700;
      margin-bottom: 6px;
    }
    .cal-hover-card .hc-time {
      font-size: 12px;
      color: #444;
      margin-bottom: 6px;
    }
    .cal-hover-card .hc-divider {
      border: none;
      border-top: 1px solid #eee;
      margin: 6px 0;
    }
    .cal-hover-card .hc-row {
      display: flex;
      gap: 6px;
      font-size: 11px;
      margin-bottom: 3px;
      align-items: baseline;
    }
    .cal-hover-card .hc-label {
      color: #999;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.4px;
      width: 62px;
      flex-shrink: 0;
    }
    .cal-hover-card .hc-val {
      color: #222;
      flex: 1;
      word-break: break-word;
    }
    .cal-hover-card .hc-notes {
      margin-top: 5px;
      padding: 5px 7px;
      background: #f9f9f7;
      border-radius: 4px;
      font-size: 10px;
      color: #666;
      font-family: 'IBM Plex Mono', monospace;
    }


    /* ── Heatmap strip ── */
    .heatmap-strip {
      max-width: 1100px;
      margin: 0 auto;
      padding: 12px 0;
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
    }
    .heatmap-panel {
      flex: 1;
      min-width: 320px;
      background: #fff;
      border: 1px solid #e8e6e0;
      border-radius: 6px;
      padding: 12px 14px;
      box-shadow: 0 1px 3px rgba(0,0,0,.05);
    }
    .heatmap-panel .hm-title {
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.7px;
      color: #888;
      margin-bottom: 10px;
    }
    .hm-legend {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-top: 8px;
      font-size: 9px;
      color: #aaa;
    }
    .hm-legend-bar { display: flex; gap: 1px; flex: 1; }
    .hm-legend-cell { height: 6px; flex: 1; border-radius: 1px; }

    /* ── Residency Analysis Panel ── */
    .residency-strip {
      max-width: 1100px;
      margin: 0 auto;
      padding: 0 0 12px;
    }
    .residency-toggle-btn {
      display: flex;
      align-items: center;
      gap: 6px;
      background: none;
      border: 1px solid #e0ddd6;
      border-radius: 6px;
      padding: 6px 14px;
      font-size: 11px;
      font-weight: 600;
      color: #666;
      cursor: pointer;
      letter-spacing: 0.3px;
    }
    .residency-toggle-btn:hover { background: #f9f8f6; }
    .residency-toggle-btn .arrow { font-size: 9px; transition: transform .15s; }
    .residency-toggle-btn .arrow.open { transform: rotate(90deg); }
    .residency-cards {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 16px;
    }
    .res-card {
      flex: 1;
      min-width: 140px;
      background: #fff;
      border: 1px solid #e8e6e0;
      border-radius: 6px;
      padding: 14px 16px;

<body>

<div id="root"></div>

<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<script type="text/babel">
const { useState, useEffect, useMemo, useCallback, useRef } = React;

// ── Default location color palette ──────────────────────────────────
const DEFAULT_PALETTE = [
  '#e63946','#457b9d','#2a9d8f','#e9c46a','#f4a261','#a8dadc',
  '#6a4c93','#f77f00','#4cc9f0','#80b918','#e07a5f','#3d405b',
  '#81b29a','#9b5de5','#f15bb5','#00bbf9','#00f5d4','#fee440',
];

// ── Read query params ────────────────────────────────────────────────
function getParams() {
  const p = new URLSearchParams(window.location.search);
  return {
    start_date:    p.get('start_date'),
    end_date:      p.get('end_date'),
    location_name: p.get('location_name'),
    site_type:     p.get('site_type'),
    _print:        p.get('_print'),
    locations:     p.get('locations'),  // comma-separated, from share URL
    sites:         p.get('sites'),      // comma-separated, from share URL
    book_type:     p.get('book_type'),  // instant | managed | all
  };
}

function getCurrentMonthRange() {
  const now = new Date();
  const y = now.getFullYear(), m = now.getMonth();
  return { start: toISO(new Date(y, m, 1)), end: toISO(new Date(y, m + 1, 0)) };
}

function toISO(d) {
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function formatDisplayDate(isoStr) {
  if (!isoStr) return '';
  const d = new Date(isoStr + 'T12:00:00');
  const months = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  return `${months[d.getMonth()]} ${d.getDate()}, ${d.getFullYear()}`;
}

function formatTime(t) {
  if (!t) return '';
  const s = t.trim().toLowerCase();
  const ampmMatch = s.match(/^(\d{1,2}):(\d{2})\s*(am|pm)$/);
  if (ampmMatch) {
    const hr = parseInt(ampmMatch[1], 10);
    return `${hr}:${ampmMatch[2]}${ampmMatch[3]}`;
  }
  const parts = s.match(/^(\d{1,2}):(\d{2})/);
  if (!parts) return t;
  const h = parseInt(parts[1], 10);
  const ampm = h >= 12 ? 'pm' : 'am';
  const hr = h % 12 || 12;
  return `${hr}:${parts[2]}${ampm}`;
}

function formatDateHeader(dateStr) {
  const d = new Date(dateStr + (dateStr.includes('T') ? '' : 'T12:00:00'));
  const days = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  const months = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  return `${days[d.getDay()]}, ${months[d.getMonth()]} ${d.getDate()}, ${d.getFullYear()}`;
}

function formatMoney(v) {
  if (v == null || v === '') return '';
  const n = typeof v === 'string' ? parseFloat(v) : v;
  if (isNaN(n) || n === 0) return '';
  return '$' + n.toFixed(2);
}

function formatPhone(p) {
  if (!p) return '';
  const digits = String(p).replace(/\D/g, '');
  if (digits.length === 10) return `(${digits.slice(0,3)})${digits.slice(3,6)}-${digits.slice(6)}`;
  if (digits.length === 11 && digits[0] === '1') return `(${digits.slice(1,4)})${digits.slice(4,7)}-${digits.slice(7)}`;
  return p;
}

function normalizeRow(raw) {
  return {
    orgName:   raw['Org Name']  || raw['org_name']  || '',
    date:      raw['Date']      || raw['date']       || '',
    day:       raw['Day']       || raw['day']        || '',
    start:     raw['Start']     || raw['start']      || raw['Begin'] || '',
    end:       raw['End']       || raw['end']        || '',
    location:  raw['Location']  || raw['location']   || '',
    site:      raw['Site/Room'] || raw['Site']      || raw['site']       || raw['Facility'] || '',
    siteType:  raw['Type']      || raw['Site Type'] || raw['site_type']  || '',
    resName:   raw['Name']      || raw['Res Name']  || raw['res_name']   || raw['Purpose'] || '',
    headCount: raw['Attendees'] || raw["H'Cnt"]     || raw['Head Cnt']   || raw['headcount'] || raw['attendee_count'] || '',
    reservee:  raw['Reservee']  || raw['reservee']   || '',
    email:     raw['Email']     || raw['email']      || '',
    phone:     raw['Phone']     || raw['phone']      || '',
    notes:     raw['Notes']     || raw['notes']      || '',
    addons:    raw['Add Ons?']  || raw['Add Ons']   || raw['addons']     || '',
    addonFees: raw['Add-On Fees'] || raw['addon_fees'] || raw['addonFees'] || null,
    resident:  raw['Resident?'] || raw['Resident']  || raw['resident']   || '',
    bookingType: raw['Booking Type'] || raw['booking_type'] || raw['bookingType'] || '',
    total:     raw['Total']     || raw['total']      || null,
  };
}

// ── Location color helpers ───────────────────────────────────────────
function loadLocationColors(orgSlug) {
  try {
    const stored = localStorage.getItem(`locationColors_${orgSlug}`);
    return stored ? JSON.parse(stored) : {};
  } catch { return {}; }
}
function saveLocationColors(orgSlug, colors) {
  try { localStorage.setItem(`locationColors_${orgSlug}`, JSON.stringify(colors)); } catch {}
}
function assignColors(locations, existing) {
  const result = { ...existing };
  let paletteIdx = Object.keys(result).length;
  locations.forEach(loc => {
    if (!result[loc]) {
      result[loc] = DEFAULT_PALETTE[paletteIdx % DEFAULT_PALETTE.length];
      paletteIdx++;
    }
  });
  return result;
}

// ── Location Filter Dropdown component ──────────────────────────────
function LocationFilter({ allLocations, selectedLocations, onChange, locationColors, onColorChange }) {
  const [open, setOpen]         = useState(false);
  const [search, setSearch]     = useState('');
  const [pickerFor, setPickerFor] = useState(null); // loc name that has picker open
  const [pickerPos, setPickerPos] = useState({ top: 0, left: 0 });
  const wrapRef                 = useRef(null);
  const pickerRef               = useRef(null);

  // Close on outside click
  useEffect(() => {
    function handleClick(e) {
      if (wrapRef.current && !wrapRef.current.contains(e.target)) {
        setOpen(false);
        setPickerFor(null);
      }
    }
    document.addEventListener('mousedown', handleClick);
    return () => document.removeEventListener('mousedown', handleClick);
  }, []);

  const filtered = allLocations.filter(l =>
    l.toLowerCase().includes(search.toLowerCase())
  );

  const allSelected  = selectedLocations.size === allLocations.length;
  const noneSelected = selectedLocations.size === 0;

  function toggle(loc) {
    const next = new Set(selectedLocations);
    next.has(loc) ? next.delete(loc) : next.add(loc);
    onChange(next);
  }

  function selectAll()  { onChange(new Set(allLocations)); }
  function clearAll()   { onChange(new Set()); }

  const badgeCount = allSelected ? null : selectedLocations.size;

  return (
    <div className="loc-filter-wrap" ref={wrapRef}>
      <button
        className="btn-loc-filter"
        onClick={() => { setOpen(o => !o); setPickerFor(null); }}
        style={!allSelected ? { borderColor: '#f59e0b', color: '#fde68a' } : {}}
      >
        📍 Locations
        {badgeCount !== null && (
          <span className="badge">{badgeCount}/{allLocations.length}</span>
        )}
      </button>

      {open && (
        <div className="loc-dropdown">
          <div className="loc-dropdown-header">
            <span>Filter Locations</span>
            <div className="loc-dropdown-header-actions">
              <button onClick={selectAll} disabled={allSelected}>All</button>
              <button onClick={clearAll}  disabled={noneSelected}>None</button>
            </div>
          </div>

          {allLocations.length > 5 && (
            <div className="loc-dropdown-search">
              <input
                type="text"
                placeholder="Search locations…"
                value={search}
                onChange={e => setSearch(e.target.value)}
                autoFocus
              />
            </div>
          )}

          <div className="loc-dropdown-list">
            {filtered.length === 0 && (
              <div style={{padding:'10px 12px', color:'#666', fontSize:11}}>No matches</div>
            )}
            {filtered.map(loc => (
              <label key={loc} className="loc-item" onClick={e => {
                // Don't toggle checkbox if clicking the swatch
                if (e.target.closest('.loc-color-swatch')) e.preventDefault();
              }}>
                <input
                  type="checkbox"
                  checked={selectedLocations.has(loc)}
                  onChange={() => toggle(loc)}
                />
                {/* Color swatch */}
                <div style={{position:'relative', flexShrink:0}}>
                  <div
                    className="loc-color-swatch"
                    style={{background: locationColors[loc] || '#888'}}
                    onClick={e => {
                      e.stopPropagation();
                      e.preventDefault();
                      if (pickerFor === loc) { setPickerFor(null); return; }
                      const rect = e.currentTarget.getBoundingClientRect();
                      const popW = 140; // approx picker width
                      let left = rect.right + 6;
                      if (left + popW > window.innerWidth - 8) left = rect.left - popW - 6;
                      setPickerPos({ top: rect.top, left });
                      setPickerFor(loc);
                    }}
                    title="Change color"
                  />
                  {pickerFor === loc && (
                    <div className="loc-color-picker-pop" ref={pickerRef}
                      style={{top: pickerPos.top, left: pickerPos.left}}
                      onClick={e => e.stopPropagation()}>
                      <div className="swatch-grid">
                        {DEFAULT_PALETTE.map(c => (
                          <div
                            key={c}
                            className={`swatch-opt${locationColors[loc] === c ? ' selected' : ''}`}
                            style={{background: c}}
                            onClick={() => { onColorChange(loc, c); setPickerFor(null); }}
                          />
                        ))}
                      </div>
                      <div className="custom-row">
                        <span>Custom:</span>
                        <input
                          type="color"
                          value={locationColors[loc] || '#888888'}
                          onChange={e => onColorChange(loc, e.target.value)}
                        />
                      </div>
                    </div>
                  )}
                </div>
                <span title={loc}>{loc}</span>
              </label>
            ))}
          </div>
        </div>
      )}
    </div>
  );
}

// ── Site Filter Dropdown component ───────────────────────────────────
function SiteFilter({ allSites, selectedSites, onChange }) {
  const [open, setOpen]     = useState(false);
  const [search, setSearch] = useState('');
  const wrapRef             = useRef(null);

  useEffect(() => {
    function handleClick(e) {
      if (wrapRef.current && !wrapRef.current.contains(e.target)) setOpen(false);
    }
    document.addEventListener('mousedown', handleClick);
    return () => document.removeEventListener('mousedown', handleClick);
  }, []);

  const filtered    = allSites.filter(s => s.toLowerCase().includes(search.toLowerCase()));
  const allSelected = selectedSites.size === allSites.length;
  const noneSelected = selectedSites.size === 0;

  function toggle(site) {
    const next = new Set(selectedSites);
    next.has(site) ? next.delete(site) : next.add(site);
    onChange(next);
  }

  function selectAll() { onChange(new Set(allSites)); }
  function clearAll()  { onChange(new Set()); }

  const badgeCount = allSelected ? null : selectedSites.size;

  return (
    <div className="loc-filter-wrap" ref={wrapRef}>
      <button
        className="btn-loc-filter"
        onClick={() => setOpen(o => !o)}
        style={!allSelected ? { borderColor: '#f59e0b', color: '#fde68a' } : {}}
      >
        🏢 Sites
        {badgeCount !== null && (
          <span className="badge">{badgeCount}/{allSites.length}</span>
        )}
      </button>

      {open && (
        <div className="loc-dropdown">
          <div className="loc-dropdown-header">
            <span>Filter Sites</span>
            <div className="loc-dropdown-header-actions">
              <button onClick={selectAll} disabled={allSelected}>All</button>
              <button onClick={clearAll}  disabled={noneSelected}>None</button>
            </div>
          </div>

          {allSites.length > 5 && (
            <div className="loc-dropdown-search">
              <input
                type="text"
                placeholder="Search sites…"
                value={search}
                onChange={e => setSearch(e.target.value)}
                autoFocus
              />
            </div>
          )}

          <div className="loc-dropdown-list">
            {filtered.length === 0 && (
              <div style={{padding:'10px 12px', color:'#666', fontSize:11}}>No matches</div>
            )}
            {filtered.map(site => (
              <label key={site} className="loc-item">
                <input
                  type="checkbox"
                  checked={selectedSites.has(site)}
                  onChange={() => toggle(site)}
                />
                <span title={site}>{site}</span>
              </label>
            ))}
          </div>
        </div>
      )}
    </div>
  );
}

// ── Add-On Filter component ───────────────────────────────────────
// Parses comma-separated add-on strings into individual items.
// Mirrors SiteFilter UX: all selected = show everything; deselect = hide.
// Special "(No add-ons)" entry controls rows with empty addons field.
function stripAddonPrice(s) {
  return s.replace(/\s*\(\$[\d,.]+\)$/, '').trim();
}

function parseAddOnItems(addonsStr) {
  if (!addonsStr || !addonsStr.trim()) return [];
  return addonsStr.split(',').map(s => s.trim()).filter(Boolean);
}

const NO_ADDONS_KEY = '(No add-ons)';

function getAddOnEmoji(name) {
  if (!name) return '🏷️';
  const n = name.toLowerCase();
  if (n.includes('light'))       return '💡';
  if (n.includes('clean'))       return '🧹';
  if (n.includes('security'))    return '🛡️';
  if (n.includes('auditorium'))  return '🎭';
  if (n.includes('stage'))       return '🎤';
  if (n.includes('sound') || n.includes('audio') || n.includes('speaker')) return '🔊';
  if (n.includes('projector') || n.includes('screen'))  return '📽️';
  if (n.includes('boathouse'))   return '⛵';
  if (n.includes('patio'))       return '☕';
  if (n.includes('kitchen'))     return '🍳';
  if (n.includes('table') || n.includes('chair') || n.includes('furniture')) return '🪑';
  if (n.includes('tent'))        return '⛺';
  if (n.includes('parking'))     return '🅿️';
  if (n.includes('banner') || n.includes('sign'))  return '🚩';
  if (n.includes('scoreboard'))  return '📋';
  if (n.includes('field') || n.includes('turf'))   return '🏟️';
  if (n.includes('gym'))         return '🏋️';
  if (n.includes('pool') || n.includes('aqua'))    return '🏊';
  if (n.includes('game'))        return '🎮';
  if (n.includes('fee'))         return '💲';
  return '🏷️';
}

// ── Hover Card component ─────────────────────────────────────────────
function HoverCard({ reservation, position, locationColors }) {
  const cardRef = useRef(null);
  const [pos, setPos] = useState(position);

  useEffect(() => {
    if (!cardRef.current) return;
    const card = cardRef.current;
    const rect = card.getBoundingClientRect();
    const vw = window.innerWidth;
    const vh = window.innerHeight;
    let { x, y } = position;
    if (x + rect.width + 16 > vw) x = x - rect.width - 16;
    if (y + rect.height + 16 > vh) y = vh - rect.height - 16;
    if (x < 8) x = 8;
    if (y < 8) y = 8;
    setPos({ x, y });
  }, [position, reservation]);

  if (!reservation) return null;
  const r = reservation;
  const color = locationColors[r.location] || '#888';

  return (
    <div
      className="cal-hover-card"
      ref={cardRef}
      style={{ left: pos.x + 12, top: pos.y }}
    >
      <div className="hc-loc">
        <div className="hc-loc-dot" style={{background: color}} />
        {r.location}
      </div>
      <div className="hc-site">{r.site}</div>
      <div className="hc-time">{formatTime(r.start)} – {formatTime(r.end)}</div>
      <hr className="hc-divider" />
      {r.reservee && (
        <div className="hc-row">
          <span className="hc-label">Reservee</span>
          <span className="hc-val">{r.reservee}</span>
        </div>
      )}
      {r.resName && (
        <div className="hc-row">
          <span className="hc-label">Purpose</span>
          <span className="hc-val">{r.resName}</span>
        </div>
      )}
      {r.headCount !== '' && r.headCount != null && (
        <div className="hc-row">
          <span className="hc-label">Head Cnt</span>
          <span className="hc-val">{r.headCount}</span>
        </div>
      )}
      {r.phone && (
        <div className="hc-row">
          <span className="hc-label">Phone</span>
          <span className="hc-val">{formatPhone(r.phone)}</span>
        </div>
      )}
      {r.email && (
        <div className="hc-row">
          <span className="hc-label">Email</span>
          <span className="hc-val" style={{fontSize:10}}>{r.email}</span>
        </div>
      )}
      {r.total != null && r.total !== '' && parseFloat(r.total) !== 0 && (
        <div className="hc-row">
          <span className="hc-label">Total</span>
          <span className="hc-val">{formatMoney(r.total)}</span>
        </div>
      )}
      {r.addonFees != null && r.addonFees !== '' && parseFloat(r.addonFees) !== 0 && (
        <div className="hc-row">
          <span className="hc-label">Add-On Fees</span>
          <span className="hc-val">{formatMoney(r.addonFees)}</span>
        </div>
      )}
      {(r.notes || r.addons) && (
        <div className="hc-notes">
          {r.notes}
          {r.addons ? ` | ${r.addons}` : ''}
        </div>
      )}
    </div>
  );
}


// ── DayPopover component ─────────────────────────────────────────────
function DayPopover({ date, reservations, locationColors, onClose, selectedLocations, selectedSites }) {
  const popRef = useRef(null);
  const [pos, setPos]   = useState({ top: 80, left: '50%', transform: 'translateX(-50%)' });

  // Center on screen
  useEffect(() => {
    if (!popRef.current) return;
    const rect = popRef.current.getBoundingClientRect();
    const vw = window.innerWidth;
    const vh = window.innerHeight;
    const top  = Math.max(16, Math.min((vh - rect.height) / 2, vh - rect.height - 16));
    const left = Math.max(16, Math.min((vw - rect.width)  / 2, vw - rect.width  - 16));
    setPos({ top, left, transform: 'none' });
  }, [date]);

  const [pdfLoading, setPdfLoading] = useState(false);

  const sorted = useMemo(() =>
    [...reservations].sort((a,b) => (a.start||'').localeCompare(b.start||'')),
  [reservations]);

  function handlePrint() {
    // Build a minimal print window with just this day's reservations
    const MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];
    const DAYS   = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
    const d      = new Date(date + 'T12:00:00');
    const dateStr = `${DAYS[d.getDay()]}, ${MONTHS[d.getMonth()]} ${d.getDate()}, ${d.getFullYear()}`;

    const rows = sorted.map(r => `
      <tr>
        <td style="padding:5px 8px;border-bottom:1px solid #eee;white-space:nowrap">${formatTime(r.start)}${r.end ? ' – ' + formatTime(r.end) : ''}</td>
        <td style="padding:5px 8px;border-bottom:1px solid #eee;font-weight:600">${r.site || ''}</td>
        <td style="padding:5px 8px;border-bottom:1px solid #eee;color:#666">${r.location || ''}</td>
        <td style="padding:5px 8px;border-bottom:1px solid #eee">${r.reservee || ''}</td>
        <td style="padding:5px 8px;border-bottom:1px solid #eee;color:#777">${r.resName || ''}</td>
        <td style="padding:5px 8px;border-bottom:1px solid #eee;text-align:center">${r.headCount || ''}</td>
      </tr>`).join('');

    const win = window.open('', '_blank');
    win.document.write(`<!DOCTYPE html><html><head>
      <title>Rental Schedule — ${dateStr}</title>
      <style>
        body { font-family: sans-serif; font-size: 12px; margin: 24px; color: #111; }
        h2   { margin: 0 0 4px; font-size: 16px; }
        p    { margin: 0 0 16px; color: #777; font-size: 11px; }
        table { width: 100%; border-collapse: collapse; }
        th   { text-align: left; padding: 5px 8px; background: #f0f0f0; font-size: 10px;
               text-transform: uppercase; letter-spacing: 0.4px; border-bottom: 2px solid #ccc; }
        @media print { @page { size: Letter landscape; margin: 0.5in; } }
      </style>
    </head><body>
      <h2>${dateStr}</h2>
      <p>${sorted.length} reservation${sorted.length !== 1 ? 's' : ''}</p>
      <table>
        <thead><tr>
          <th>Time</th><th>Facility/Site</th><th>Location</th>
          <th>Reservee</th><th>Purpose</th><th>Head Cnt</th>
        </tr></thead>
        <tbody>${rows}</tbody>
      </table>
  </body></html>`);
    win.document.close();
    win.focus();
    setTimeout(() => { win.print(); }, 400);
  }

  function handlePdf() {
    setPdfLoading(true);
    const parts = window.location.pathname.replace(/\/$/, '').split('/');
    const pdfBase = parts.length >= 3 ? `/${parts[1]}/${parts[2]}/api/pdf` : '/api/pdf';
    const qs = new URLSearchParams({ start_date: date, end_date: date });
    if (selectedLocations) { const a = [...selectedLocations]; if (a.length) qs.set('locations', a.join(',')); }
    if (selectedSites)     { const a = [...selectedSites];     if (a.length) qs.set('sites',     a.join(',')); }
    if (bookTypeFilter && bookTypeFilter !== 'all') qs.set('book_type', bookTypeFilter);
    if (selectedAddOns)    { const a = [...selectedAddOns];    if (a.length) qs.set('addons',    a.join(',')); }
    fetch(withToken(`${pdfBase}?${qs}`))
      .then(r => r.blob())
      .then(blob => {
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = `rental-schedule-${date}.pdf`;
        a.click();
        URL.revokeObjectURL(a.href);
      })
      .catch(err => alert('PDF failed: ' + err.message))
      .finally(() => setPdfLoading(false));
  }

  const MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  const DAYS   = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  const d      = new Date(date + 'T12:00:00');
  const dateLabel = `${DAYS[d.getDay()]}, ${MONTHS[d.getMonth()]} ${d.getDate()}, ${d.getFullYear()}`;

  return (
    <>
      {/* Backdrop */}
      <div className="day-popover-overlay" onClick={onClose} />

      {/* Popover */}
      <div className="day-popover" ref={popRef} style={pos}>
        <div className="day-popover-header">
          <div>
            <div className="dp-date">{dateLabel}</div>
            <div className="dp-count">{sorted.length} reservation{sorted.length !== 1 ? 's' : ''}</div>
          </div>
          <div style={{display:'flex',gap:6,alignItems:'center'}}>
            <button
              className="day-popover-close"
              onClick={handlePrint}
              title="Print this day"
              style={{fontSize:11,padding:'3px 9px'}}
            >🖨️ Print</button>
            <button
              className="day-popover-close"
              onClick={handlePdf}
              disabled={pdfLoading}
              title="Download PDF for this day"
              style={{fontSize:11,padding:'3px 9px',background: pdfLoading ? '#f5f5f5' : undefined}}
            >{pdfLoading ? '…' : '📄 PDF'}</button>
            <button className="day-popover-close" onClick={onClose}>✕</button>
          </div>
        </div>

        <div className="day-popover-list">
          {sorted.map((r, i) => {
            const color = locationColors[r.location] || '#888';
            return (
              <div key={i} className="dp-item">
                <div className="dp-color-bar" style={{background: color}} />
                <div className="dp-item-body">
                  <div className="dp-item-top">
                    <span className="dp-item-site">{r.site || r.location}</span>
                    <span className="dp-item-time">{formatTime(r.start)}{r.end ? ` – ${formatTime(r.end)}` : ''}</span>
                  </div>
                  {r.location && r.site && (
                    <div className="dp-item-loc">{r.location}</div>
                  )}
                  {(r.reservee || r.resName) && (
                    <div className="dp-item-meta">
                      {r.reservee && <span>{r.reservee}</span>}
                      {r.reservee && r.resName && <span style={{color:'#ccc'}}> · </span>}
                      {r.resName  && <span style={{color:'#777'}}>{r.resName}</span>}
                    </div>
                  )}
                  {r.headCount != null && r.headCount !== '' && (
                    <div className="dp-item-meta" style={{color:'#888'}}>
                      {r.headCount} attendees
                      {r.total && parseFloat(r.total) > 0 ? ` · ${formatMoney(r.total)}` : ''}
                    </div>
                  )}
                  {(r.notes || r.addons) && (
                    <div className="dp-item-notes">
                      {r.notes}{r.addons ? ` | ${r.addons}` : ''}
                    </div>
                  )}
                </div>
              </div>
            );
          })}
        </div>
      </div>
    </>
  );
}

// ── Calendar View component ──────────────────────────────────────────
function CalendarView({ filteredRows, locationColors, loadedStart, loadedEnd, selectedLocations, selectedSites, selectedAddOns }) {
  const [calMonth, setCalMonth] = useState(() => {
    // Start at first month of loaded range
    if (loadedStart) {
      const d = new Date(loadedStart + 'T12:00:00');
      return { year: d.getFullYear(), month: d.getMonth() };
    }
    const now = new Date();
    return { year: now.getFullYear(), month: now.getMonth() };
  });

  const [hoverRes, setHoverRes]     = useState(null);
  const [hoverPos, setHoverPos]     = useState({ x: 0, y: 0 });
  const [selectedDay, setSelectedDay] = useState(null); // ISO date string

  // Derived: min/max months from loaded range
  const minMonth = useMemo(() => {
    if (!loadedStart) return null;
    const d = new Date(loadedStart + 'T12:00:00');
    return { year: d.getFullYear(), month: d.getMonth() };
  }, [loadedStart]);

  const maxMonth = useMemo(() => {
    if (!loadedEnd) return null;
    const d = new Date(loadedEnd + 'T12:00:00');
    return { year: d.getFullYear(), month: d.getMonth() };
  }, [loadedEnd]);

  const canPrev = useMemo(() => {
    if (!minMonth) return false;
    if (calMonth.year > minMonth.year) return true;
    return calMonth.month > minMonth.month;
  }, [calMonth, minMonth]);

  const canNext = useMemo(() => {
    if (!maxMonth) return false;
    if (calMonth.year < maxMonth.year) return true;
    return calMonth.month < maxMonth.month;
  }, [calMonth, maxMonth]);

  function prevMonth() {
    setCalMonth(cm => {
      if (cm.month === 0) return { year: cm.year - 1, month: 11 };
      return { year: cm.year, month: cm.month - 1 };
    });
  }
  function nextMonth() {
    setCalMonth(cm => {
      if (cm.month === 11) return { year: cm.year + 1, month: 0 };
      return { year: cm.year, month: cm.month + 1 };
    });
  }

  // Build a map: isoDate → [rows]
  const byDate = useMemo(() => {
    const map = {};
    filteredRows.forEach(r => {
      if (!map[r.date]) map[r.date] = [];
      map[r.date].push(r);
    });
    // Sort each day by start time
    Object.values(map).forEach(arr => arr.sort((a,b) => (a.start||'').localeCompare(b.start||'')));
    return map;
  }, [filteredRows]);

  // Build calendar grid for current calMonth
  const calDays = useMemo(() => {
    const { year, month } = calMonth;
    const firstDay = new Date(year, month, 1);
    const lastDay  = new Date(year, month + 1, 0);
    const startDow = firstDay.getDay(); // 0=Sun
    const days = [];

    // Pad start with prev month days
    for (let i = 0; i < startDow; i++) {
      const d = new Date(year, month, -startDow + i + 1);
      days.push({ iso: toISO(d), inMonth: false, dayNum: d.getDate() });
    }
    // Current month
    for (let d = 1; d <= lastDay.getDate(); d++) {
      days.push({ iso: toISO(new Date(year, month, d)), inMonth: true, dayNum: d });
    }
    // Pad end
    const remaining = 42 - days.length;
    for (let i = 1; i <= remaining; i++) {
      const d = new Date(year, month + 1, i);
      days.push({ iso: toISO(d), inMonth: false, dayNum: d.getDate() });
    }
    return days;
  }, [calMonth]);

  const todayISO = toISO(new Date());

  const MONTH_NAMES = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  const DOW = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];

  const MAX_CHIPS = 2; // show at most this many chips before "+N more"

  return (
    <div className="cal-wrapper">
      {/* Month navigation */}
      <div className="cal-month-nav">
        <button className="cal-nav-btn" onClick={prevMonth} disabled={!canPrev}>‹</button>
        <div className="cal-month-label">
          {MONTH_NAMES[calMonth.month]} {calMonth.year}
        </div>
        <button className="cal-nav-btn" onClick={nextMonth} disabled={!canNext}>›</button>
      </div>

      {/* Day-of-week headers */}
      <div className="cal-dow-row">
        {DOW.map(d => <div key={d} className="cal-dow-cell">{d}</div>)}
      </div>

      {/* Grid */}
      <div className="cal-grid">
        {calDays.map(({ iso, inMonth, dayNum }) => {
          const dayRows = byDate[iso] || [];
          const isToday = iso === todayISO;
          const visible = dayRows.slice(0, MAX_CHIPS);
          const overflow = dayRows.length - MAX_CHIPS;

          return (
            <div
              key={iso}
              className={[
                'cal-day',
                !inMonth ? 'other-month' : '',
                isToday ? 'today' : '',
                dayRows.length > 0 ? 'has-events' : '',
              ].filter(Boolean).join(' ')}
              onClick={() => dayRows.length > 0 && setSelectedDay(iso)}
            >
              <div className="cal-day-num">{dayNum}</div>

              {visible.map((r, i) => {
                const color = locationColors[r.location] || '#888';
                return (
                  <div
                    key={i}
                    className="cal-chip"
                    style={{ background: color }}
                    onMouseEnter={e => {
                      setHoverRes(r);
                      setHoverPos({ x: e.clientX, y: e.clientY });
                    }}
                    onMouseMove={e => setHoverPos({ x: e.clientX, y: e.clientY })}
                    onMouseLeave={() => setHoverRes(null)}
                    onClick={e => { e.stopPropagation(); setSelectedDay(iso); }}
                    title={`${r.site} ${formatTime(r.start)}`}
                  >
                    {formatTime(r.start)} {r.site || r.location}
                  </div>
                );
              })}

              {overflow > 0 && (
                <div
                  className="cal-more"
                  onClick={e => { e.stopPropagation(); setSelectedDay(iso); }}
                >
                  +{overflow} more — click to expand
                </div>
              )}
            </div>
          );
        })}
      </div>

      {/* Hover card */}
      {hoverRes && !selectedDay && (
        <HoverCard
          reservation={hoverRes}
          position={hoverPos}

}

function heatColor(val, max) {
  if (max === 0 || val === 0) return '#f0ede8';
  const t = Math.min(val / max, 1);
  if (t < 0.5) {
    const g = Math.round(235 - (235 - 160) * (t * 2));
    const b = Math.round(220 - 220 * (t * 2));
    return `rgb(255,${g},${b})`;
  }
  const t2 = (t - 0.5) * 2;
  return `rgb(${Math.round(255 - 30*t2)},${Math.round(160 - 100*t2)},0)`;
}

function parseHour(timeStr) {
  if (!timeStr) return null;
  const s = timeStr.trim().toLowerCase();
  const m = s.match(/^(\d{1,2}):(\d{2})\s*(am|pm)$/);
  if (m) { let h = parseInt(m[1]); if (m[3]==='pm'&&h!==12) h+=12; if (m[3]==='am'&&h===12) h=0; return h; }
  const p = s.match(/^(\d{1,2}):\d{2}/);
  return p ? parseInt(p[1]) : null;
}
