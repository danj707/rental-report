<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Weekly Rental Schedule</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'IBM Plex Sans', 'Segoe UI', system-ui, sans-serif;
      font-size: 12px;
      color: #1a1a1a;
      background: #f5f4f1;
      line-height: 1.35;
    }

    /* ── Toolbar ── */
    .toolbar {
      position: sticky;
      top: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 20px;
      background: #2c2c2c;
      color: #eee;
      font-size: 13px;
      flex-wrap: wrap;
    }
    .toolbar-title { font-weight: 600; margin-right: 8px; }
    .toolbar-spacer { flex: 1; }

    .toolbar label {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: #aaa;
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    .toolbar input[type="date"] {
      padding: 4px 8px;
      border: 1px solid rgba(255,255,255,.2);
      border-radius: 4px;
      background: rgba(255,255,255,.1);
      color: #fff;
      font-size: 12px;
      font-family: inherit;
      outline: none;
    }
    .toolbar input[type="date"]:focus { border-color: #3b82f6; }
    .toolbar input[type="date"]::-webkit-calendar-picker-indicator {
      filter: invert(1);
      cursor: pointer;
    }

    .toolbar button {
      padding: 6px 14px;
      border: 1px solid rgba(255,255,255,.25);
      border-radius: 4px;
      background: rgba(255,255,255,.08);
      color: #fff;
      font-size: 12px;
      font-family: inherit;
      cursor: pointer;
      transition: background .15s;
    }
    .toolbar button:hover { background: rgba(255,255,255,.18); }
    .toolbar .btn-run {
      background: #16a34a;
      border-color: #16a34a;
      font-weight: 600;
    }
    .toolbar .btn-run:hover { background: #15803d; }
    .toolbar .btn-run:disabled { opacity: .5; cursor: not-allowed; }
    .toolbar .btn-pdf {
      background: #3b82f6;
      border-color: #3b82f6;
      font-weight: 600;
    }
    .toolbar .btn-pdf:hover { background: #2563eb; }
    .toolbar .btn-pdf:disabled { opacity: .5; cursor: not-allowed; }
    .toolbar .btn-excel {
      background: #16803c;
      border-color: #16803c;
      font-weight: 600;
    }
    .toolbar .btn-excel:hover { background: #15692f; }
    .toolbar .btn-excel:disabled { opacity: .5; cursor: not-allowed; }

    /* ── View toggle ── */
    .view-toggle {
      display: flex;
      border: 1px solid rgba(255,255,255,.25);
      border-radius: 4px;
      overflow: hidden;
    }
    .view-toggle button {
      border: none;
      border-radius: 0;
      padding: 5px 12px;
      font-size: 11px;
      font-weight: 500;
    }
    .view-toggle button + button {
      border-left: 1px solid rgba(255,255,255,.2);
    }
    .view-toggle button.active {
      background: #3b82f6;
      border-color: #3b82f6;
    }

    .toolbar .row-count {
      font-size: 11px;
      color: #aaa;
      margin-left: 4px;
    }

    .toolbar .divider {
      width: 1px;
      height: 28px;
      background: rgba(255,255,255,.15);
      margin: 0 4px;
    }

    /* ── Location filter dropdown ── */
    .loc-filter-wrap {
      position: relative;
    }

    .btn-loc-filter {
      display: flex;
      align-items: center;
      gap: 6px;
      white-space: nowrap;
    }

    .btn-loc-filter .badge {
      background: #f59e0b;
      color: #1a1a1a;
      border-radius: 10px;
      font-size: 10px;
      font-weight: 700;
      padding: 1px 6px;
      line-height: 1.4;
    }

    .loc-dropdown {
      position: absolute;
      top: calc(100% + 6px);
      left: 0;
      z-index: 200;
      background: #1e1e1e;
      border: 1px solid rgba(255,255,255,.15);
      border-radius: 6px;
      min-width: 220px;
      max-height: 360px;
      display: flex;
      flex-direction: column;
      box-shadow: 0 8px 24px rgba(0,0,0,.5);
    }

    .loc-dropdown-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 12px;
      border-bottom: 1px solid rgba(255,255,255,.1);
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: #aaa;
      flex-shrink: 0;
    }

    .loc-dropdown-header-actions {
      display: flex;
      gap: 8px;
    }

    .loc-dropdown-header button {
      padding: 2px 6px;
      font-size: 10px;
      border-color: rgba(255,255,255,.15);
      background: rgba(255,255,255,.06);
    }

    .loc-dropdown-search {
      padding: 6px 10px;
      border-bottom: 1px solid rgba(255,255,255,.08);
      flex-shrink: 0;
    }

    .loc-dropdown-search input {
      width: 100%;
      padding: 4px 8px;
      background: rgba(255,255,255,.08);
      border: 1px solid rgba(255,255,255,.15);
      border-radius: 4px;
      color: #fff;
      font-size: 11px;
      font-family: inherit;
      outline: none;
    }
    .loc-dropdown-search input::placeholder { color: #777; }
    .loc-dropdown-search input:focus { border-color: #3b82f6; }

    .loc-dropdown-list {
      overflow-y: auto;
      flex: 1;
      padding: 4px 0;
    }

    .loc-dropdown-list::-webkit-scrollbar { width: 4px; }
    .loc-dropdown-list::-webkit-scrollbar-track { background: transparent; }
    .loc-dropdown-list::-webkit-scrollbar-thumb { background: rgba(255,255,255,.2); border-radius: 2px; }

    .loc-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 5px 12px;
      cursor: pointer;
      transition: background .1s;
      font-size: 12px;
      color: #ddd;
    }
    .loc-item:hover { background: rgba(255,255,255,.07); }

    .loc-item input[type="checkbox"] {
      accent-color: #3b82f6;
      width: 13px;
      height: 13px;
      flex-shrink: 0;
      cursor: pointer;
    }

    .loc-item span {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      flex: 1;
    }

    /* ── Color swatch for location items ── */
    .loc-color-swatch {
      width: 12px;
      height: 12px;
      border-radius: 3px;
      flex-shrink: 0;
      cursor: pointer;
      border: 1px solid rgba(255,255,255,.25);
      position: relative;
    }
    .loc-color-swatch:hover {
      transform: scale(1.2);
      border-color: rgba(255,255,255,.6);
    }
    .loc-color-picker-pop {
      position: fixed;
      z-index: 9500;
      background: #1e1e1e;
      border: 1px solid rgba(255,255,255,.2);
      border-radius: 6px;
      padding: 8px;
      box-shadow: 0 8px 24px rgba(0,0,0,.6);
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .loc-color-picker-pop .swatch-grid {
      display: grid;
      grid-template-columns: repeat(6, 18px);
      gap: 4px;
    }
    .loc-color-picker-pop .swatch-opt {
      width: 18px;
      height: 18px;
      border-radius: 3px;
      cursor: pointer;
      border: 2px solid transparent;
      transition: transform .1s;
    }
    .loc-color-picker-pop .swatch-opt:hover { transform: scale(1.15); border-color: rgba(255,255,255,.5); }
    .loc-color-picker-pop .swatch-opt.selected { border-color: #fff; }
    .loc-color-picker-pop .custom-row {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 10px;
      color: #aaa;
    }
    .loc-color-picker-pop input[type="color"] {
      width: 24px;
      height: 20px;
      padding: 0;
      border: none;
      background: none;
      cursor: pointer;
    }

    /* ── Column visibility checkboxes ── */
    .col-toggles {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 11px;
      color: #ccc;
    }
    .col-toggles label {
      display: flex;
      flex-direction: row;
      align-items: center;
      gap: 4px;
      cursor: pointer;
      font-size: 11px;
      text-transform: none;
      letter-spacing: 0;
      color: #ccc;
    }
    .col-toggles input[type="checkbox"] {
      accent-color: #3b82f6;
      cursor: pointer;
    }

    /* ── Report page ── */
    .page {
      max-width: 1100px;
      margin: 16px auto;
      padding: 24px 28px;
      background: #fff;
      box-shadow: 0 1px 4px rgba(0,0,0,.08);
    }

    /* ── Header ── */
    .report-header-logo { height: 42px; max-width: 140px; object-fit: contain; object-position: left center; }
    .report-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      border-bottom: 2.5px solid #111;
      padding-bottom: 8px;
      margin-bottom: 14px;
    }
    .report-header .org-label {
      font-size: 10.5px;
      letter-spacing: 1.6px;
      text-transform: uppercase;
      color: #777;
      font-weight: 600;
    }
    .report-header .title {
      font-size: 17px;
      font-weight: 700;
      margin-top: 1px;
    }
    .report-header .date-range {
      font-size: 11px;
      color: #666;
      text-align: right;
    }

    /* ── Column header row ── */
    .col-header-row {
      display: flex;
      gap: 6px;
      padding: 5px 8px;
      background: #e4e4e4;
      border-top: 1px solid #bbb;
      border-bottom: 1px solid #bbb;
      font-weight: 600;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.4px;
      color: #333;
    }

    /* Keep section + column headers together across page breaks */
    .loc-section { break-inside: avoid-column; }
    .section-header + .col-header-row { border-top: none; }

    /* ── Date + Location section header ── */
    .section-header {
      display: flex;
      align-items: baseline;
      gap: 10px;
      padding: 7px 8px 4px;
      margin-top: 8px;
      background: #edeae4;
      border-bottom: 1px solid #ccc;
    }
    .section-header .date-label { font-weight: 700; font-size: 12.5px; }
    .section-header .loc-label { font-weight: 600; font-size: 11.5px; color: #444; }

    /* ── Data rows ── */
    .data-row {
      display: flex;
      gap: 6px;
      padding: 4px 8px;
      border-bottom: 1px solid #eee;
      align-items: baseline;
      font-size: 11.5px;
    }
    .data-row:nth-child(even) { background: #fafaf8; }

    .data-row .cell {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    /* ── Sub-row for notes/add-ons ── */
    .sub-row {
      padding: 0 8px 3px;
      font-size: 10px;
      color: #888;
      font-family: 'IBM Plex Mono', monospace;
      padding-left: 160px;
    }

    /* ── Footer ── */
    .report-footer {
      display: flex;
      justify-content: space-between;
      border-top: 2.5px solid #111;
      margin-top: 14px;
      padding-top: 6px;
      font-size: 10px;
      color: #777;
    }

    /* ── Loading / Error ── */
    .loading {
      text-align: center;
      padding: 80px 20px;
      color: #888;
      font-size: 14px;
    }
    .loading .spinner {
      position: relative;
      display: inline-block;
      width: 34px;
      height: 44px;
      margin: 0 auto;
      box-sizing: border-box;
      border: 2px solid #e07b1a;
      border-top-color: #f7b96b;
      border-radius: 4px 4px 14px 14px;
      background: rgba(255, 248, 240, 0.5);
      overflow: hidden;
      box-shadow: inset -4px 0 0 rgba(255, 255, 255, 0.35);
    }
    .loading .spinner::before {
      content: '';
      position: absolute;
      left: 0; right: 0; bottom: 0;
      height: 60%;
      background: linear-gradient(180deg, #ffb24d 0%, #ff8c1f 55%, #f2710a 100%);
      box-shadow: inset 0 2px 0 rgba(255, 255, 255, 0.45);
      animation: juice-fill 2s ease-in-out infinite;
    }
    .loading .spinner::after {
      content: '';
      position: absolute;
      left: 50%; bottom: 6px;
      width: 3px; height: 3px;
      margin-left: -1.5px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.85);
      box-shadow: -5px 7px 0 0 rgba(255, 255, 255, 0.65), 5px 12px 0 -0.5px rgba(255, 255, 255, 0.5);
      animation: juice-bubbles 2.2s ease-out infinite;
    }
    @keyframes juice-fill {
      0%   { height: 42%; }
      50%  { height: 80%; }
      100% { height: 42%; }
    }
    @keyframes juice-bubbles {
      0%   { transform: translateY(2px) scale(0.5); opacity: 0; }
      30%  { opacity: 0.9; }
      70%  { opacity: 0.6; }
      100% { transform: translateY(-22px) scale(1); opacity: 0; }
    }
    .loading { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 14px; }
    .juice-msg { position: relative; height: 1.4em; line-height: 1.4em; min-width: 190px; }
    .juice-msg span { position: absolute; left: 0; right: 0; text-align: center; opacity: 0; animation: juice-phrase 10s infinite; }
    .juice-msg span:nth-child(1) { animation-delay: 0s; }
    .juice-msg span:nth-child(2) { animation-delay: 2s; }
    .juice-msg span:nth-child(3) { animation-delay: 4s; }
    .juice-msg span:nth-child(4) { animation-delay: 6s; }
    .juice-msg span:nth-child(5) { animation-delay: 8s; }
    @keyframes juice-phrase {
      0%   { opacity: 0; transform: translateY(5px); }
      2%   { opacity: 1; transform: translateY(0); }
      18%  { opacity: 1; transform: translateY(0); }
      20%  { opacity: 0; transform: translateY(-5px); }
      100% { opacity: 0; }
    }

    .error {
      text-align: center;
      padding: 60px 20px;
      color: #b91c1c;
      font-size: 14px;
    }

    /* ── Column widths ── */
    .col-start   { width: 68px; }
    .col-end     { width: 68px; }
    .col-site    { width: 170px; font-weight: 500; white-space: normal !important; overflow: visible !important; text-overflow: clip !important; line-height: 1.3; }
    .col-name    { flex: 1; }
    .col-hcnt    { width: 46px; text-align: center; }
    .col-reservee{ width: 150px; }
    .col-phone   { width: 110px; }
    .col-email   { width: 175px; font-size: 10.5px; }
    .col-purpose { width: 160px; white-space: normal; word-break: break-word; }
    .col-resident{ width: 72px; text-align: center; }
    .col-booktype{ width: 72px; text-align: center; font-size: 10px; }
    .col-total   { width: 62px; text-align: right; }
    .col-addon-fees { width: 72px; text-align: right; }
    .col-rec-link { width: 28px; text-align: center; }

    /* ═══════════════════════════════════════════════════════════════
       CALENDAR VIEW
    ═══════════════════════════════════════════════════════════════ */

    .cal-wrapper {
      padding: 0;
    }

    /* Month nav bar */
    .cal-month-nav {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 16px;
      margin-bottom: 16px;
    }
    .cal-month-nav .cal-month-label {
      font-size: 18px;
      font-weight: 700;
      min-width: 200px;
      text-align: center;
    }
    .cal-nav-btn {
      background: none;
      border: 1px solid #ccc;
      border-radius: 4px;
      padding: 5px 12px;
      font-size: 16px;
      cursor: pointer;
      color: #333;
      line-height: 1;
      transition: background .12s;
    }
    .cal-nav-btn:hover { background: #f0f0f0; }
    .cal-nav-btn:disabled { opacity: .3; cursor: default; }

    /* Day-of-week header */
    .cal-dow-row {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 2px;
      margin-bottom: 2px;
    }
    .cal-dow-cell {
      text-align: center;
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.6px;
      color: #888;
      padding: 4px 0;
    }

    /* Calendar grid */
    .cal-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 2px;
    }

    .cal-day {
      min-height: 100px;
      border: 1px solid #e0deda;
      border-radius: 4px;
      background: #fff;
      padding: 4px;
      vertical-align: top;
      overflow: hidden;
      position: relative;
    }
    .cal-day.other-month {
      background: #faf9f7;
      opacity: 0.5;
    }
    .cal-day.today {
      border-color: #3b82f6;
      border-width: 2px;
    }
    .cal-day.has-events {
      background: #fff;
    }

    .cal-day-num {
      font-size: 11px;
      font-weight: 700;
      color: #555;
      margin-bottom: 3px;
      line-height: 1;
    }
    .cal-day.today .cal-day-num {
      color: #3b82f6;
    }

    /* Reservation chip */
    .cal-chip {
      display: block;
      border-radius: 3px;
      padding: 2px 5px;
      margin-bottom: 2px;
      font-size: 10px;
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      cursor: pointer;
      line-height: 1.4;
      color: #fff;
      position: relative;
      transition: filter .1s, transform .1s;
    }
    .cal-chip:hover {
      filter: brightness(1.1);
      transform: translateY(-1px);
      z-index: 2;
    }

    .cal-more {
      font-size: 9px;
      color: #999;
      padding: 1px 3px;
      cursor: pointer;
    }
    .cal-more:hover { color: #3b82f6; }

    /* ── Hover card ── */
    .cal-hover-card {
      position: fixed;
      z-index: 9999;
      background: #fff;
      border: 1px solid #ddd;
      border-radius: 8px;
      box-shadow: 0 8px 32px rgba(0,0,0,.18);
      padding: 12px 14px;
      min-width: 220px;
      max-width: 300px;
      pointer-events: none;
    }
    .cal-hover-card .hc-loc {
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.7px;
      margin-bottom: 4px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .cal-hover-card .hc-loc-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .cal-hover-card .hc-site {
      font-size: 13px;
      font-weight: 700;
      margin-bottom: 6px;
    }
    .cal-hover-card .hc-time {
      font-size: 12px;
      color: #444;
      margin-bottom: 6px;
    }
    .cal-hover-card .hc-divider {
      border: none;
      border-top: 1px solid #eee;
      margin: 6px 0;
    }
    .cal-hover-card .hc-row {
      display: flex;
      gap: 6px;
      font-size: 11px;
      margin-bottom: 3px;
      align-items: baseline;
    }
    .cal-hover-card .hc-label {
      color: #999;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.4px;
      width: 62px;
      flex-shrink: 0;
    }
    .cal-hover-card .hc-val {
      color: #222;
      flex: 1;
      word-break: break-word;
    }
    .cal-hover-card .hc-notes {
      margin-top: 5px;
      padding: 5px 7px;
      background: #f9f9f7;
      border-radius: 4px;
      font-size: 10px;
      color: #666;
      font-family: 'IBM Plex Mono', monospace;
    }


    /* ── Heatmap strip ── */
    .heatmap-strip {
      max-width: 1100px;
      margin: 0 auto;
      padding: 12px 0;
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
    }
    .heatmap-panel {
      flex: 1;
      min-width: 320px;
      background: #fff;
      border: 1px solid #e8e6e0;
      border-radius: 6px;
      padding: 12px 14px;
      box-shadow: 0 1px 3px rgba(0,0,0,.05);
    }
    .heatmap-panel .hm-title {
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.7px;
      color: #888;
      margin-bottom: 10px;
    }
    .hm-legend {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-top: 8px;
      font-size: 9px;
      color: #aaa;
    }
    .hm-legend-bar { display: flex; gap: 1px; flex: 1; }
    .hm-legend-cell { height: 6px; flex: 1; border-radius: 1px; }

    /* ── Residency Analysis Panel ── */
    .residency-strip {
      max-width: 1100px;
      margin: 0 auto;
      padding: 0 0 12px;
    }
    .residency-toggle-btn {
      display: flex;
      align-items: center;
      gap: 6px;
      background: none;
      border: 1px solid #e0ddd6;
      border-radius: 6px;
      padding: 6px 14px;
      font-size: 11px;
      font-weight: 600;
      color: #666;
      cursor: pointer;
      letter-spacing: 0.3px;
    }
    .residency-toggle-btn:hover { background: #f9f8f6; }
    .residency-toggle-btn .arrow { font-size: 9px; transition: transform .15s; }
    .residency-toggle-btn .arrow.open { transform: rotate(90deg); }
    .residency-cards {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 16px;
    }
    .res-card {
      flex: 1;
      min-width: 140px;
      background: #fff;

<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>

<script type="text/babel">
const { useState, useEffect, useMemo, useCallback, useRef } = React;

// ── Default location color palette ──────────────────────────────────
const DEFAULT_PALETTE = [
  '#e63946','#457b9d','#2a9d8f','#e9c46a','#f4a261','#a8dadc',
  '#6a4c93','#f77f00','#4cc9f0','#80b918','#e07a5f','#3d405b',
  '#81b29a','#9b5de5','#f15bb5','#00bbf9','#00f5d4','#fee440',
];

// ── Read query params ────────────────────────────────────────────────
function getParams() {
  const p = new URLSearchParams(window.location.search);
  return {
    start_date:    p.get('start_date'),
    end_date:      p.get('end_date'),
    location_name: p.get('location_name'),
    site_type:     p.get('site_type'),
    _print:        p.get('_print'),
    locations:     p.get('locations'),  // comma-separated, from share URL
    sites:         p.get('sites'),      // comma-separated, from share URL
    book_type:     p.get('book_type'),  // instant | managed | all
    addons:        p.get('addons'),     // comma-separated, from share/PDF URL
  };
}

function getCurrentMonthRange() {
  const now = new Date();
  const y = now.getFullYear(), m = now.getMonth();
  return { start: toISO(new Date(y, m, 1)), end: toISO(new Date(y, m + 1, 0)) };
}

function toISO(d) {
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function formatDisplayDate(isoStr) {
  if (!isoStr) return '';
  const d = new Date(isoStr + 'T12:00:00');
  const months = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  return `${months[d.getMonth()]} ${d.getDate()}, ${d.getFullYear()}`;
}

function formatTime(t) {
  if (!t) return '';
  const s = t.trim().toLowerCase();
  const ampmMatch = s.match(/^(\d{1,2}):(\d{2})\s*(am|pm)$/);
  if (ampmMatch) {
    const hr = parseInt(ampmMatch[1], 10);
    return `${hr}:${ampmMatch[2]}${ampmMatch[3]}`;
  }
  const parts = s.match(/^(\d{1,2}):(\d{2})/);
  if (!parts) return t;
  const h = parseInt(parts[1], 10);
  const ampm = h >= 12 ? 'pm' : 'am';
  const hr = h % 12 || 12;
  return `${hr}:${parts[2]}${ampm}`;
}

function parseHour(t) {
  if (!t) return null;
  const s = t.trim().toLowerCase();
  const ampm = s.match(/^(\d{1,2}):(\d{2})\s*(am|pm)$/);
  if (ampm) {
    let h = parseInt(ampm[1], 10);
    const p = ampm[3];
    if (p === 'am' && h === 12) h = 0;
    else if (p === 'pm' && h !== 12) h += 12;
    return h;
  }
  const parts = s.match(/^(\d{1,2}):/);
  return parts ? parseInt(parts[1], 10) : null;
}

function formatDateHeader(dateStr) {
  const d = new Date(dateStr + (dateStr.includes('T') ? '' : 'T12:00:00'));
  const days = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  const months = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  return `${days[d.getDay()]}, ${months[d.getMonth()]} ${d.getDate()}, ${d.getFullYear()}`;
}

function formatMoney(v) {
  if (v == null || v === '') return '';
  const n = typeof v === 'string' ? parseFloat(v) : v;
  if (isNaN(n) || n === 0) return '';
  return '$' + n.toFixed(2);
}

function formatPhone(p) {
  if (!p) return '';
  const digits = String(p).replace(/\D/g, '');
  if (digits.length === 10) return `(${digits.slice(0,3)})${digits.slice(3,6)}-${digits.slice(6)}`;
  if (digits.length === 11 && digits[0] === '1') return `(${digits.slice(1,4)})${digits.slice(4,7)}-${digits.slice(7)}`;
  return p;
}

function StaleCacheBanner({ meta }) {
  if (!meta?.stale_cache) return null;
  const when = meta.cached_at ? new Date(meta.cached_at).toLocaleString() : 'recently';
  return (
    <div style={{background:'#fef3c7',borderBottom:'1px solid #f59e0b',padding:'8px 16px',textAlign:'center',fontSize:13,color:'#92400e'}}>
      ⚠️ Showing cached data from {when} — live data is temporarily unavailable
    </div>
  );
}

function timeToMinutes(t) {
  if (!t) return 9999;
  const s = t.trim().toLowerCase();
  const m = s.match(/^(\d{1,2}):(\d{2})\s*(am|pm)?$/);
  if (!m) return 9999;
  let h = parseInt(m[1], 10);
  const min = parseInt(m[2], 10);
  const ap = m[3];
  if (ap) {
    if (ap === 'am' && h === 12) h = 0;
    if (ap === 'pm' && h !== 12) h += 12;
  }
  return h * 60 + min;
}

function normalizeRow(raw) {
  return {
    orgName:   raw['Org Name']  || raw['org_name']  || '',
    date:      raw['Date']      || raw['date']       || '',
    day:       raw['Day']       || raw['day']        || '',
    start:     raw['Start']     || raw['start']      || raw['Begin'] || '',
    end:       raw['End']       || raw['end']        || '',
    location:  raw['Location']  || raw['location']   || '',
    site:      raw['Site/Room'] || raw['Site']      || raw['site']       || raw['Facility'] || '',
    siteType:  raw['Type']      || raw['Site Type'] || raw['site_type']  || '',
    resName:   raw['Name']      || raw['Res Name']  || raw['res_name']   || raw['Purpose'] || '',
    headCount: raw['Attendees'] || raw["H'Cnt"]     || raw['Head Cnt']   || raw['headcount'] || raw['attendee_count'] || '',
    reservee:  raw['Reservee']  || raw['reservee']   || '',
    email:     raw['Email']     || raw['email']      || '',
    phone:     raw['Phone']     || raw['phone']      || '',
    notes:     raw['Notes']     || raw['notes']      || '',
    instructions: raw['Instructions'] || raw['instructions'] || raw['admin_instructions_md'] || '',
    addons:    raw['Add Ons?']  || raw['Add Ons']   || raw['addons']     || '',
    addonFees: raw['Add-On Fees'] || raw['addon_fees'] || raw['addonFees'] || null,
    resident:  raw['Resident?'] || raw['Resident']  || raw['resident']   || '',
    bookingType: raw['Booking Type'] || raw['booking_type'] || raw['bookingType'] || '',
    total:     raw['Total']     || raw['total']      || null,
    status:    raw['Status']    || raw['status']     || '',
    resId:     raw['Reservation ID'] || raw['reservation_id'] || raw['res_id'] || raw['id'] || '',
    lighting:     raw['Lighting']      || '',
    litFrom:      raw['Lit From']       || '',
    litUntil:     raw['Lit Until']      || '',
    lightingSync: raw['Lighting Sync']  || '',
  };
}

// ── Location color helpers ───────────────────────────────────────────
function loadLocationColors(orgSlug) {
  try {
    const stored = localStorage.getItem(`locationColors_${orgSlug}`);
    return stored ? JSON.parse(stored) : {};
  } catch { return {}; }
}
function saveLocationColors(orgSlug, colors) {
  try { localStorage.setItem(`locationColors_${orgSlug}`, JSON.stringify(colors)); } catch {}
}
function assignColors(locations, existing) {
  const result = { ...existing };
  let paletteIdx = Object.keys(result).length;
  locations.forEach(loc => {
    if (!result[loc]) {
      result[loc] = DEFAULT_PALETTE[paletteIdx % DEFAULT_PALETTE.length];
      paletteIdx++;
    }
  });
  return result;
}

// ── Location Filter Dropdown component ──────────────────────────────
function LocationFilter({ allLocations, selectedLocations, onChange }) {
  const [open, setOpen]     = useState(false);
  const [search, setSearch] = useState('');
  const wrapRef             = useRef(null);

  useEffect(() => {
    function handleClick(e) {
      if (wrapRef.current && !wrapRef.current.contains(e.target)) setOpen(false);
    }
    document.addEventListener('mousedown', handleClick);
    return () => document.removeEventListener('mousedown', handleClick);
  }, []);

  const filtered = allLocations.filter(l =>
    l.toLowerCase().includes(search.toLowerCase())
  );

  const allSelected  = selectedLocations.size === allLocations.length;
  const noneSelected = selectedLocations.size === 0;

  function toggle(loc) {
    const next = new Set(selectedLocations);
    next.has(loc) ? next.delete(loc) : next.add(loc);
    onChange(next);
  }

  function selectAll()  { onChange(new Set(allLocations)); }
  function clearAll()   { onChange(new Set()); }

  const badgeCount = allSelected ? null : selectedLocations.size;

  return (
    <div className="loc-filter-wrap" ref={wrapRef}>
      <button
        className="btn-loc-filter"
        onClick={() => setOpen(o => !o)}
        style={!allSelected ? { borderColor: '#f59e0b', color: '#fde68a' } : {}}
      >
        📍 Locations
        {badgeCount !== null && (
          <span className="badge">{badgeCount}/{allLocations.length}</span>
        )}
      </button>

      {open && (
        <div className="loc-dropdown">
          <div className="loc-dropdown-header">
            <span>Filter Locations</span>
            <div className="loc-dropdown-header-actions">
              <button onClick={selectAll} disabled={allSelected}>All</button>
              <button onClick={clearAll}  disabled={noneSelected}>None</button>
            </div>
          </div>

          {allLocations.length > 5 && (
            <div className="loc-dropdown-search">
              <input
                type="text"
                placeholder="Search locations…"
                value={search}
                onChange={e => setSearch(e.target.value)}

  const n = name.toLowerCase();
  if (n.includes('alcohol') || n.includes('beer') || n.includes('wine') || n.includes('liquor')) return '🍺';
  if (n.includes('light'))       return '💡';
  if (n.includes('clean'))       return '🧹';
  if (n.includes('security'))    return '🛡️';
  if (n.includes('auditorium'))  return '🎭';
  if (n.includes('stage'))       return '🎤';
  if (n.includes('sound') || n.includes('audio') || n.includes('speaker')) return '🔊';
  if (n.includes('projector') || n.includes('screen'))  return '📽️';
  if (n.includes('boathouse'))   return '⛵';
  if (n.includes('patio'))       return '☕';
  if (n.includes('kitchen'))     return '🍳';
  if (n.includes('table') || n.includes('chair') || n.includes('furniture')) return '🪑';
  if (n.includes('tent'))        return '⛺';
  if (n.includes('parking'))     return '🅿️';
  if (n.includes('banner') || n.includes('sign'))  return '🚩';
  if (n.includes('scoreboard'))  return '📋';
  if (n.includes('field') || n.includes('turf'))   return '🏟️';

function heatColor(count, max) {
  if (!count || !max) return '#f0ede8';
  const t = Math.min(count / max, 1);
  const r = Math.round(240 - t * 171);
  const g = Math.round(237 - t * 114);
  const b = Math.round(232 - t * 75);
  return `rgb(${r},${g},${b})`;
}

function HeatmapStrip({ filteredRows, locationColors }) {
  const HOURS = Array.from({length:15}, (_,i) => i+7);
  const HOUR_LABELS = HOURS.map(h => h<=12 ? `${h}${h===12?'p':'a'}` : `${h-12}p`);
  const DAYS = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  const CELL_H = 14;
  const LEGEND_STEPS = 5;

  const dowHourGrid = useMemo(() => {
    const grid = Array.from({length:7}, () => new Array(HOURS.length).fill(0));
    filteredRows.forEach(r => {
      if (!r.date || !r.start) return;
      const dow = new Date(r.date + 'T12:00:00').getDay();
      const h = parseHour(r.start);
      const hi = h != null ? HOURS.indexOf(h) : -1;
      if (hi >= 0) grid[dow][hi]++;
    });
    return grid;
  }, [filteredRows]);

  const dowHourMax = useMemo(() => Math.max(1, ...dowHourGrid.flat()), [dowHourGrid]);

  const datLocData = useMemo(() => {
    const locations = [...new Set(filteredRows.map(r => r.location).filter(Boolean))].sort();
    const dates = [...new Set(filteredRows.map(r => r.date).filter(Boolean))].sort().slice(-31);
    const grid = {};
    filteredRows.forEach(r => {
      if (!dates.includes(r.date) || !r.location) return;
      if (!grid[r.date]) grid[r.date] = {};
      grid[r.date][r.location] = (grid[r.date][r.location] || 0) + 1;
    });
    return { locations, dates, grid };
  }, [filteredRows]);

  const datLocMax = useMemo(() => {
    let max = 1;
    Object.values(datLocData.grid).forEach(row => Object.values(row).forEach(v => { if (v > max) max = v; }));
    return max;
  }, [datLocData]);

  if (!filteredRows || filteredRows.length === 0) return null;

  return (
    <div className="heatmap-strip">

      {/* Panel 1: Day of week x Hour */}
      <div className="heatmap-panel">
        <div className="hm-title">Busiest Times — Day of Week x Hour</div>
        <div style={{display:'grid', gridTemplateColumns:`32px repeat(${HOURS.length},1fr)`, gap:'2px', marginBottom:'2px'}}>
          <div/>
          {HOUR_LABELS.map(l => <div key={l} style={{fontSize:8,color:'#bbb',textAlign:'center',lineHeight:1}}>{l}</div>)}
        </div>
        {DAYS.map((day, dow) => (
          <div key={day} style={{display:'grid', gridTemplateColumns:`32px repeat(${HOURS.length},1fr)`, gap:'2px', marginBottom:'2px'}}>
            <div style={{fontSize:9,color:'#999',display:'flex',alignItems:'center',justifyContent:'flex-end',paddingRight:4}}>{day}</div>
            {HOURS.map((h, hi) => {
              const count = dowHourGrid[dow][hi];
              return <div key={h} style={{height:CELL_H, background:heatColor(count,dowHourMax), borderRadius:2}}
                title={count > 0 ? `${day} ${HOUR_LABELS[hi]}: ${count} rental${count!==1?'s':''}` : ''} />;
            })}
          </div>
        ))}
        <div className="hm-legend">
          <span>0</span>
          <div className="hm-legend-bar">
            {Array.from({length:LEGEND_STEPS},(_,i) => <div key={i} className="hm-legend-cell" style={{background:heatColor(i+1,LEGEND_STEPS)}} />)}
          </div>
          <span>{dowHourMax}</span>
        </div>
      </div>

      {/* Panel 2: Date x Location */}
      {datLocData.locations.length > 0 && datLocData.dates.length > 0 && (
        <div className="heatmap-panel">
          <div className="hm-title">Bookings by Date x Location</div>
          {(() => {
            const step = Math.max(1, Math.ceil(datLocData.dates.length / 8));
            return (
              <div style={{display:'grid', gridTemplateColumns:`80px repeat(${datLocData.dates.length},1fr)`, gap:'2px', marginBottom:'2px'}}>
                <div/>
                {datLocData.dates.map((d,i) => {
                  const dt = new Date(d + 'T12:00:00');
                  return <div key={d} style={{fontSize:7,color:'#bbb',textAlign:'center',lineHeight:1,overflow:'hidden'}}>
                    {i % step === 0 ? `${dt.getMonth()+1}/${dt.getDate()}` : ''}
                  </div>;
                })}
              </div>
            );
          })()}
          {datLocData.locations.map(loc => (
            <div key={loc} style={{display:'grid', gridTemplateColumns:`80px repeat(${datLocData.dates.length},1fr)`, gap:'2px', marginBottom:'2px'}}>
              <div style={{fontSize:9,color:'#666',display:'flex',alignItems:'center',overflow:'hidden',paddingRight:4}}>
                <div style={{width:6,height:6,borderRadius:1,background:locationColors[loc]||'#888',flexShrink:0,marginRight:4}} />
                <span style={{overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{loc}</span>
              </div>
              {datLocData.dates.map(d => {
                const count = (datLocData.grid[d] && datLocData.grid[d][loc]) || 0;
                return <div key={d} style={{
                  height: CELL_H,
                  background: count > 0 ? (locationColors[loc] || '#888') : '#f0ede8',
                  borderRadius: 2,
                  opacity: count > 0 ? Math.max(0.18, count / datLocMax) : 1,
                }} title={count > 0 ? `${loc} ${d}: ${count} rental${count!==1?'s':''}` : ''} />;
              })}
            </div>
          ))}
          <div className="hm-legend">
            <span>0</span>
            <div className="hm-legend-bar">
              {Array.from({length:LEGEND_STEPS},(_,i) => <div key={i} className="hm-legend-cell" style={{background:'#457b9d',opacity:(i+1)/LEGEND_STEPS}} />)}
            </div>
            <span>{datLocMax}</span>
          </div>
        </div>
      )}

    </div>
  );
}

function renderNotes(text) {
  if (!text) return "";
  // Escape HTML entities first for safety
  var s = text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  // Markdown links [text](url) -> clickable links
  s = s.replace(/\[([^\]]+)\]\((https?:\/\/[^)]+)\)/g, function(m, label, url) {
    return '<a href="' + url + '" target="_blank" rel="noopener noreferrer" style="color:#2563eb;text-decoration:underline;font-weight:500">' + label + '</a>';
  });
  // Bold **text** or __text__
  s = s.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
  s = s.replace(/__([^_]+)__/g, '<strong>$1</strong>');
  // Italic *text* or _text_ (but not inside URLs/tags)
  s = s.replace(/(?<![\/\w])\*([^*]+)\*(?!\w)/g, '<em>$1</em>');
  s = s.replace(/(?<![\/\w])_([^_]+)_(?!\w)/g, '<em>$1</em>');
  // Bullet points: lines starting with - or *
  s = s.replace(/(?:^|\\n|\n)\s*[-*]\s+/g, ' &bull; ');
  // Trailing backslashes (line break artifacts)
  s = s.replace(/\\\s*/g, ' ');
  // Bare URLs not already inside an href
  s = s.replace(/(?<!href=")(?<!">)(https?:\/\/[^\s,;<]+)/g, function(url) {
    var label = "\uD83D\uDD17 View";
    var lower = url.toLowerCase();
    if (lower.indexOf("contract") !== -1) label = "\uD83D\uDCCE Contract";
    else if (lower.indexOf("insurance") !== -1) label = "\uD83D\uDCCB Insurance";
    else if (lower.indexOf("invoice") !== -1) label = "\uD83D\uDCC4 Invoice";
    else if (lower.indexOf("permit") !== -1) label = "\uD83D\uDCDD Permit";
    return '<a href="' + url + '" target="_blank" rel="noopener noreferrer" style="color:#2563eb;text-decoration:underline;font-weight:500">' + label + '</a>';
  });
  // Clean up multiple spaces
  s = s.replace(/\s{2,}/g, ' ').trim();
  return s;
}

      const end   = new Date(today);
      end.setDate(today.getDate() + range - 1);
      return { start: toISO(today), end: toISO(end) };
    }
    // Default to this week (today + 6 days)
    const today = new Date();
    const end   = new Date(today);
    end.setDate(today.getDate() + 6);
    return { start: toISO(today), end: toISO(end) };

  // ── Location filter state ────────────────────────────────────────
  const [allLocations,      setAllLocations]      = useState([]);
  const [allSites,          setAllSites]          = useState([]);
  const [selectedLocations, setSelectedLocations] = useState(null);
  const [selectedSites,     setSelectedSites]     = useState(null);
  const [selectedAddOns,    setSelectedAddOns]    = useState(null);

  // Share Link: expose the live applied filter state so the floating Share
  // widget copies a URL that reproduces the on-screen view (mirrors the PDF).
  useEffect(() => {
    window.recShareLink = () => {
      const qs = new URLSearchParams();
      qs.set('start_date', loadedStart || startDate);
      qs.set('end_date',   loadedEnd   || endDate);
      if (selectedLocations) { const a = [...selectedLocations]; if (a.length) qs.set('locations', a.join(',')); }
      if (selectedSites)     { const a = [...selectedSites];     if (a.length) qs.set('sites',     a.join(',')); }
      if (bookTypeFilter && bookTypeFilter !== 'all') qs.set('book_type', bookTypeFilter);
      if (selectedAddOns)    { const a = [...selectedAddOns];    if (a.length) qs.set('addons',    a.join(',')); }
      if (URL_TOKEN) qs.set('token', URL_TOKEN);
      return `${window.location.pathname}?${qs.toString()}`;
    };
    return () => { try { delete window.recShareLink; } catch (e) { window.recShareLink = undefined; } };
  }, [loadedStart, loadedEnd, startDate, endDate, selectedLocations, selectedSites, selectedAddOns]);

  useEffect(() => {
    if (params._print === '1') document.body.classList.add('print-mode');
  }, [params._print]);

  // ── Fetch ────────────────────────────────────────────────────────
  const fetchData = useCallback((sd, ed) => {
    setLoading(true);
    setError(null);

    const qs = new URLSearchParams();
    if (sd) qs.set('start_date', sd);
    if (ed) qs.set('end_date',   ed);
    if (params.location_name) qs.set('location_name', params.location_name);
    if (params.site_type)     qs.set('site_type',     params.site_type);
    if (params._nocache === '1' || params._refresh === '1') qs.set('_nocache', '1');

    const pathParts = window.location.pathname.replace(/\/$/, '').split('/');
    const apiBase = pathParts.length >= 3
      ? `/${pathParts[1]}/${pathParts[2]}/api/data`
      : '/api/data';

    fetch(withToken(`${apiBase}?${qs.toString()}`))
      .then(r => {
        if (!r.ok) throw new Error(`Server returned ${r.status}`);
        return r.json();
      })
      .then(json => {
        const normalized = json.rows.map(normalizeRow);
        setRows(normalized);
        setMeta(json.meta || {});
        setLoadedStart(sd);
        setLoadedEnd(ed);

        // Assign colors to any new locations
        const locs = [...new Set(normalized.map(r => r.location).filter(Boolean))].sort();
        setLocationColors(prev => {
          const next = assignColors(locs, prev);
          saveLocationColors(orgSlug, next);
          return next;
        });

        // Accumulate all known locations (never remove historical ones)
        setAllLocations(prev => {
          const merged = new Set(prev);
          locs.forEach(l => merged.add(l));
          return [...merged].sort();
        });

        setSelectedLocations(prev => {
          if (prev === null) {
            // Respect shared URL locations param
            if (params.locations) {
              const shared = params.locations.split(',').map(l => l.trim()).filter(l => locs.includes(l));
              if (shared.length > 0) return new Set(shared);
            }
            const defaultLoc = window.ORG_CONFIG?.defaultLocationFilter;
            if (defaultLoc && locs.includes(defaultLoc)) return new Set([defaultLoc]);
            return new Set(locs);
          }
          const next = new Set(prev);
          locs.forEach(l => { if (!next.has(l)) next.add(l); });
          return next;
        });

        // Accumulate all known site types (never remove historical ones)
        {
          const sites = [...new Set(normalized.map(r => r.site).filter(Boolean))].sort();
          setAllSites(prev => {
            const merged = new Set(prev);
            sites.forEach(s => merged.add(s));
            return [...merged].sort();
          });
        }

        setSelectedSites(prev => {
          if (prev === null) {
            const sites = [...new Set(normalized.map(r => r.site).filter(Boolean))].sort();
            // Respect shared URL sites param
            if (params.sites) {
              const shared = params.sites.split(',').map(s => s.trim()).filter(s => sites.includes(s));
              if (shared.length > 0) return new Set(shared);
            }
            return new Set(sites);
          }
          const sites = [...new Set(normalized.map(r => r.site).filter(Boolean))].sort();
          const next = new Set(prev);
          sites.forEach(s => { if (!next.has(s)) next.add(s); });
          return next;
        });

        setSelectedAddOns(prev => {
          const items = new Set();
          normalized.forEach(r => {
            parseAddOnItems(r.addons).forEach(p => items.add(stripAddonPrice(p)));
          });
          const all = [...items].sort();
          if (prev === null) {
            // Respect shared URL addons param
            if (params.addons) {
              const shared = params.addons.split(',').map(s => s.trim()).filter(s => all.includes(s));
              if (shared.length > 0) return new Set(shared);
            }
            return new Set(all);
          }
          const next = new Set(prev);
          all.forEach(a => { if (!next.has(a)) next.add(a); });
          return next;
        });
      })
      .catch(err => setError(err.message))
      .finally(() => setLoading(false));
  }, [params.location_name, params.site_type, orgSlug]);

  useEffect(() => { fetchData(startDate, endDate); }, []);

  // ── Seed all locations/sites with a wide date range (background, silent) ──
  useEffect(() => {
    const pathParts = window.location.pathname.replace(/\/$/, '').split('/');
    const apiBase = pathParts.length >= 3
      ? '/' + pathParts[1] + '/' + pathParts[2] + '/api/data'
      : '/api/data';
    const now = new Date();
    const seedStart = new Date(now.getFullYear() - 1, now.getMonth(), 1);
    const seedEnd   = new Date(now.getFullYear() + 1, now.getMonth(), 0);
    const toISO = d => d.toISOString().split('T')[0];
    const qs = new URLSearchParams();
    qs.set('start_date', toISO(seedStart));
    qs.set('end_date',   toISO(seedEnd));
    if (params.location_name) qs.set('location_name', params.location_name);
    if (params.site_type)     qs.set('site_type',     params.site_type);
    fetch(withToken(apiBase + '?' + qs.toString()))
      .then(r => r.ok ? r.json() : null)
      .then(json => {
        if (!json || !json.rows) return;
        const normalized = json.rows.map(normalizeRow);
        const locs  = [...new Set(normalized.map(r => r.location).filter(Boolean))].sort();
        const sites = [...new Set(normalized.map(r => r.site).filter(Boolean))].sort();
        setLocationColors(prev => {
          const next = assignColors(locs, prev);
          saveLocationColors(orgSlug, next);
          return next;
        });
        setAllLocations(prev => {
          const merged = new Set(prev);
          locs.forEach(l => merged.add(l));
          return [...merged].sort();
        });
        setAllSites(prev => {
          const merged = new Set(prev);
          sites.forEach(s => merged.add(s));
          return [...merged].sort();
        });
        // Also add to selected sets so they're checked by default
        setSelectedLocations(prev => {
          if (!prev) return new Set(locs);
          const next = new Set(prev);
          locs.forEach(l => next.add(l));
          return next;
        });
        setSelectedSites(prev => {
          if (!prev) return new Set(sites);
          const next = new Set(prev);
          sites.forEach(s => next.add(s));
          return next;
        });
      })
      .catch(() => {}); // silent — don't block anything
  }, []);

  function handleRunReport() { fetchData(startDate, endDate); }

  const datesChanged = startDate !== loadedStart || endDate !== loadedEnd;

  // allLocations / allSites are now STATE that accumulates across fetches
  // so historical locations always remain visible in the filter dropdowns.
  // They are updated in the fetch callback below (setAllLocations / setAllSites).

  const allAddOns = useMemo(() => {
    if (!rows) return [];
    const items = new Set();
    rows.forEach(r => {
      parseAddOnItems(r.addons).forEach(p => items.add(stripAddonPrice(p)));
    });
    return [...items].sort();
  }, [rows]);

  const hasLighting = useMemo(() => rows && rows.some(r => r.lighting === 'Yes'), [rows]);

  const filteredRows = useMemo(() => {
    if (!rows) return null;
    let result = rows.filter(r => !r.status || !/cancel/i.test(r.status));
    if (selectedLocations && selectedLocations.size < allLocations.length) {
      result = result.filter(r => selectedLocations.has(r.location));
    }
    if (selectedSites && selectedSites.size < allSites.length) {
      result = result.filter(r => selectedSites.has(r.site));
    }
    if (bookTypeFilter !== 'all') {
      result = result.filter(r => (r.bookingType || '').trim().toLowerCase() === bookTypeFilter);
    }
    if (selectedAddOns && allAddOns.length > 0 && selectedAddOns.size < allAddOns.length) {
      result = result.filter(r => {
        const parts = parseAddOnItems(r.addons).map(p => stripAddonPrice(p));
        return parts.some(p => selectedAddOns.has(p));
      });
    }
    if (filterLighting) {
      result = result.filter(r => r.lighting === 'Yes');
    }
    return result;
  }, [rows, selectedLocations, allLocations, selectedSites, allSites, bookTypeFilter, selectedAddOns, allAddOns, filterLighting]);

  const grouped = useMemo(() => {
    if (!filteredRows) return null;
    // Belt-and-suspenders: in print mode, re-apply URL location filter directly
    // to guard against React state timing issues
    let finalRows = filteredRows;
    if (params._print === '1' && params.locations) {
      const allowed = new Set(params.locations.split(',').map(l => l.trim()));
      finalRows = filteredRows.filter(r => allowed.has(r.location));
    }
    const byDate = {};
    finalRows.forEach(row => {
      const dk = row.date;
      if (!byDate[dk]) byDate[dk] = { locations: {} };
      const lk = row.location || 'Unknown';
      if (!byDate[dk].locations[lk]) byDate[dk].locations[lk] = [];
      byDate[dk].locations[lk].push(row);
    });
    Object.values(byDate).forEach(dg => {
      Object.values(dg.locations).forEach(locRows => {
        locRows.sort((a, b) => timeToMinutes(a.start) - timeToMinutes(b.start));
      });
    });
    return byDate;
  }, [filteredRows]);

  const sortedDates = grouped ? Object.keys(grouped).sort() : [];

  function setMonth(offset) {
    const now = new Date();
    const target = new Date(now.getFullYear(), now.getMonth() + offset, 1);
    const last   = new Date(target.getFullYear(), target.getMonth() + 1, 0);
    setStartDate(toISO(target));
    setEndDate(toISO(last));
    setActiveRange(offset === -1 ? 'last-month' : offset === 0 ? 'this-month' : 'next-month');
  }

  function setWeek(offsetWeeks) {
    const now = new Date();
    const start = new Date(now);
    start.setDate(now.getDate() + (offsetWeeks * 7));
    const end = new Date(start);
    end.setDate(start.getDate() + 6);
    setStartDate(toISO(start));
    setEndDate(toISO(end));
    setActiveRange(offsetWeeks === 0 ? 'this-week' : 'next-week');
  }

  function downloadPdf() {
    setPdfLoading(true);
    const qs = new URLSearchParams();
    if (loadedStart) qs.set('start_date', loadedStart);
    if (loadedEnd)   qs.set('end_date',   loadedEnd);
    if (params.location_name) qs.set('location_name', params.location_name);
    if (params.site_type)     qs.set('site_type',     params.site_type);
    // Respect the current on-screen filter selections so the PDF matches exactly
    // what's shown. Mirrors the share-URL serialization; the print page reads
    // these back into selectedLocations/selectedSites on load.
    if (selectedLocations && selectedLocations.size < allLocations.length) { qs.set('locations', [...selectedLocations].join(',')); }
    if (selectedSites && selectedSites.size < allSites.length) { qs.set('sites', [...selectedSites].join(',')); }
    if (bookTypeFilter && bookTypeFilter !== 'all') qs.set('book_type', bookTypeFilter);
    if (selectedAddOns)    { const a = [...selectedAddOns];    if (a.length) qs.set('addons',    a.join(',')); }

    const pathParts = window.location.pathname.replace(/\/$/, '').split('/');
    const pdfBase = pathParts.length >= 3
      ? `/${pathParts[1]}/${pathParts[2]}/api/pdf`
      : '/api/pdf';

    fetch(withToken(`${pdfBase}?${qs.toString()}`))

      .then(r => r.blob())
      .then(blob => {
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = `rental-schedule-${loadedStart || 'report'}.pdf`;
        a.click();
        URL.revokeObjectURL(a.href);
      })
      .catch(err => alert('PDF generation failed: ' + err.message))
      .finally(() => setPdfLoading(false));
  }

  function downloadExcel() {
    if (!filteredRows || filteredRows.length === 0) return;
    const headers = [
      'Org Name', 'Date', 'Day', 'Location', 'Facility/Site',
      'Begin', 'End', 'Purpose', 'Reservee', 'Phone', 'Email',
    ];
    if (showHeadCount) headers.push('Head Cnt');
    if (showTotal)     headers.push('Total');
    if (showAddonFees) headers.push('Add-On Fees');
    if (showNotes)     headers.push('Instructions', 'Notes', 'Add-ons');
    if (showResident)  headers.push('Resident?');
    if (showBookType)  headers.push('Booking Type');
    if (showLighting)  headers.push('Lighting', 'Lit From', 'Lit Until');

    const dataRows = filteredRows.map(r => {
      const dp = (r.date || '').split('T')[0].split('-');
      const dateVal = dp.length === 3 ? new Date(+dp[0], +dp[1]-1, +dp[2]) : r.date;
      const row = [
        r.orgName, dateVal, (r.day || '').trim(), r.location, r.site,
        formatTime(r.start), formatTime(r.end), r.resName, r.reservee,
        formatPhone(r.phone), r.email,
      ];
      if (showHeadCount) row.push(r.headCount !== '' ? Number(r.headCount) || r.headCount : '');
      if (showTotal) { const n = parseFloat(r.total); row.push(!isNaN(n) && n !== 0 ? n : ''); }
      if (showAddonFees) { const n = parseFloat(r.addonFees); row.push(!isNaN(n) && n !== 0 ? n : ''); }
      if (showNotes) { row.push(r.instructions || ''); row.push(r.notes || ''); row.push(r.addons || ''); }
      if (showResident) row.push(r.resident || '');
      if (showBookType) row.push(r.bookingType || '');
      if (showLighting) { row.push(r.lighting || ''); row.push(r.litFrom || ''); row.push(r.litUntil || ''); }
      return row;
    });

    const wsData = [headers, ...dataRows];
    const ws = XLSX.utils.aoa_to_sheet(wsData, { cellDates: true });
    // Format date column as MM/DD/YY
    for (let rowIdx = 1; rowIdx <= dataRows.length; rowIdx++) {
      const cellAddr = XLSX.utils.encode_cell({ r: rowIdx, c: 1 });
      if (ws[cellAddr] && ws[cellAddr].t === 'd') ws[cellAddr].z = 'MM/DD/YY';
    }
    ws['!cols'] = [
      {wch:28},{wch:12},{wch:10},{wch:22},{wch:22},{wch:9},{wch:9},
      {wch:20},{wch:20},{wch:14},{wch:28},
      ...(showHeadCount?[{wch:8}]:[]),
      ...(showTotal?[{wch:10}]:[]),
      ...(showAddonFees?[{wch:12}]:[]),
      ...(showNotes?[{wch:30},{wch:30},{wch:30}]:[]),
      ...(showResident?[{wch:10}]:[]),
      ...(showBookType?[{wch:14}]:[]),
      ...(showLighting?[{wch:8},{wch:14},{wch:14}]:[]),
    ];
    if (showTotal) {
      const totalColIdx = headers.indexOf('Total');
      for (let rowIdx = 1; rowIdx <= dataRows.length; rowIdx++) {
        const cellAddr = XLSX.utils.encode_cell({ r: rowIdx, c: totalColIdx });
        if (ws[cellAddr] && typeof ws[cellAddr].v === 'number') ws[cellAddr].z = '"$"#,##0.00';
      }
    }
    if (showAddonFees) {
      const afColIdx = headers.indexOf('Add-On Fees');
      for (let rowIdx = 1; rowIdx <= dataRows.length; rowIdx++) {
        const cellAddr = XLSX.utils.encode_cell({ r: rowIdx, c: afColIdx });
        if (ws[cellAddr] && typeof ws[cellAddr].v === 'number') ws[cellAddr].z = '"$"#,##0.00';
      }
    }
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, 'Rental Schedule');
    const slug = (filteredRows[0]?.orgName || 'report').replace(/\s+/g, '-').toLowerCase();
    XLSX.writeFile(wb, `rental-schedule-${slug}-${loadedStart || 'report'}.xlsx`);
    logClientEvent('excel');
  }

  function logClientEvent(event) {
    try {
      const parts = window.location.pathname.split('/').filter(Boolean);
      if (parts.length >= 2) fetch(withToken(`/${parts[0]}/${parts[1]}/api/log?event=${event}`), { method: 'POST' }).catch(() => {});
    } catch {}
  }

  const isPrint = params._print === '1';

  // ── Toolbar ──────────────────────────────────────────────────────
  function renderToolbar() {
    if (isPrint) return null;
    return (
      <div className="toolbar">
        <span className="toolbar-title">Rental Schedule</span>

        <label>
          Start
          <input type="date" value={startDate} onChange={e => { setStartDate(e.target.value); setActiveRange(null); }} />
        </label>
        <label>
          End
          <input type="date" value={endDate} onChange={e => { setEndDate(e.target.value); setActiveRange(null); }} />
        </label>

        {[
          { key:'last-month',  label:'Last Month',  action:() => setMonth(-1) },
          { key:'this-month',  label:'This Month',  action:() => setMonth(0)  },
          { key:'next-month',  label:'Next Month',  action:() => setMonth(1)  },
          { key:'this-week',   label:'This Week',   action:() => setWeek(0)   },
          { key:'next-week',   label:'Next Week',   action:() => setWeek(1)   },
        ].map(({ key, label, action }) => (
          <button
            key={key}
            onClick={action}
            style={{
              fontSize:11, padding:'4px 8px',
              ...(activeRange === key ? {
                background: '#f59e0b',
                borderColor: '#f59e0b',
                color: '#1a1a1a',
                fontWeight: 600,
              } : {}),
            }}
          >{label}</button>
        ))}

        <button
          className="btn-run"
          onClick={handleRunReport}
          disabled={loading}
          style={datesChanged && !loading ? {boxShadow:'0 0 0 2px #4ade80'} : {}}
        >
          {loading ? <><span className="btn-spinner" />Loading…</> : '▶ Run Report'}
        </button>

        {allLocations.length > 0 && selectedLocations && (
          <>
            <div className="divider" />
            <LocationFilter
              allLocations={allLocations}
              selectedLocations={selectedLocations}
              onChange={setSelectedLocations}

            />
          </>
        )}

        {allSites.length > 0 && selectedSites && (
          <>
            <div className="divider" />
            <SiteFilter
              allSites={allSites}
              selectedSites={selectedSites}
              onChange={setSelectedSites}
            />
          </>
        )}

        {allAddOns.length > 0 && selectedAddOns && (
          <>
            <div className="divider" />
            <AddOnFilter
              allAddOns={allAddOns}
              selectedAddOns={selectedAddOns}
              onChange={setSelectedAddOns}
            />
          </>
        )}
        {hasLighting && (
          <>
            <div className="divider" />
            <button type="button" className={'musco-btn' + (filterLighting ? ' active' : '')}
              onClick={() => setFilterLighting(!filterLighting)}
              title={filterLighting ? 'Show all reservations' : 'Show only reservations with Musco lighting'}>
              💡 {filterLighting ? 'Lit Only' : 'Lighting'}
            </button>
          </>
        )}

        {rows && rows.some(r => r.bookingType && r.bookingType.trim()) && (
          <>
            <div className="divider" />
            <div className="bt-filter">
              <button className={bookTypeFilter === 'all' ? 'active' : ''} onClick={() => setBookTypeFilter('all')}>All</button>
              <button className={bookTypeFilter === 'instant' ? 'active' : ''} onClick={() => setBookTypeFilter('instant')}>Instant</button>
              <button className={bookTypeFilter === 'managed' ? 'active' : ''} onClick={() => setBookTypeFilter('managed')}>Managed</button>
            </div>
          </>
        )}

        <div className="toolbar-spacer" />

        {filteredRows && (
          <span className="row-count">
            {filteredRows.length} rental{filteredRows.length !== 1 ? 's' : ''}
            {rows && filteredRows.length !== rows.length && (
              <span style={{color:'#f59e0b'}}> ({rows.length} total)</span>
            )}
          </span>
        )}

        <div className="divider" />

        {/* View toggle */}
        <div className="view-toggle">
          
        </div>

        {(
          <>
            <div className="divider" />
            <div className="col-toggles">
              <label>
                <input type="checkbox" checked={showHeadCount} onChange={e => setShowHeadCount(e.target.checked)} />
                Head Cnt
              </label>
              <label>
                <input type="checkbox" checked={showTotal} onChange={e => setShowTotal(e.target.checked)} />
                Total
              </label>
              <label>
                <input type="checkbox" checked={showAddonFees} onChange={e => setShowAddonFees(e.target.checked)} />
                Add-On $
              </label>
              <label>
                <input type="checkbox" checked={showNotes} onChange={e => setShowNotes(e.target.checked)} />
                Notes
              </label>
              <label style={{display:'flex',alignItems:'center',gap:4,cursor:'pointer',fontSize:11}}>
                <input type="checkbox" checked={showLink} onChange={e => setShowLink(e.target.checked)} />
                Rec Link
              </label>
              <label>
                <input type="checkbox" checked={showResident} onChange={e => setShowResident(e.target.checked)} />
                Resident?
              </label>
              <label>
                <input type="checkbox" checked={showBookType} onChange={e => setShowBookType(e.target.checked)} />
                Book Type
              </label>
            </div>
          </>
        )}

        <div className="divider" />

        <button type="button" className={'metrics-toggle' + (showHeatmap ? ' active' : '')}
          onClick={() => setShowHeatmap(!showHeatmap)}
          title="Toggle heatmap visualization">
          {showHeatmap ? '📊 Heatmap' : '📊 Heatmap'}
        </button>

        <button type="button" className={'metrics-toggle' + (showMetrics ? ' active' : '')}
          onClick={() => setShowMetrics(!showMetrics)}
          title="Toggle revenue metrics panels">
          {showMetrics ? '💰 Metrics' : '💰 Metrics'}
        </button>

        <div className="divider" />

        <button onClick={() => window.print()}>🖨️ Print</button>
        <button
          className="btn-pdf"
          onClick={downloadPdf}
          disabled={pdfLoading || !filteredRows || filteredRows.length === 0}
        >
          {pdfLoading ? 'Generating…' : '📄 PDF'}
        </button>
        <button
          className="btn-excel"
          onClick={downloadExcel}
          disabled={!filteredRows || filteredRows.length === 0}
        >
          📊 Excel
        </button>


      </div>
    );
  }

  // ── Error ────────────────────────────────────────────────────────
  if (error && !rows) {
    return (
      <div>
        {renderToolbar()}
        <StaleCacheBanner meta={meta} />
        <div className="page">
          <div className="error" style={{textAlign:'center',padding:'3rem 1rem'}}>
            <p style={{fontSize:'2.5rem',marginBottom:'0.5rem'}}>😔</p>
            <p style={{fontSize:'1.1rem',color:'#666'}}>Looks like reporting has encountered an issue — try loading this report again later.</p>
          </div>
        </div>
      </div>
    );
  }

  if (!rows) {
    return (
      <div>
        {renderToolbar()}
        <div className="page">
          <div className="loading">
            <div className="spinner" />
            <div className="juice-msg"><span>Squeezing the oranges…</span><span>Juicing!</span><span>Adding the pulp…</span><span>Chilling the glass…</span><span>Pouring it out…</span></div>
          </div>
        </div>
      </div>
    );
  }

  const now = new Date();
  const runDate = `${(now.getMonth()+1).toString().padStart(2,'0')}/${now.getDate().toString().padStart(2,'0')}/${now.getFullYear()} @ ${now.toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit',hour12:true}).toLowerCase()}`;

  const orgName = (rows.length > 0 && rows[0].orgName) ? rows[0].orgName : (meta.org_name || 'rec.us');
  const logoUrl = meta.logo_url || null;

  const dateRangeLabel = [
    loadedStart ? formatDisplayDate(loadedStart) : null,
    loadedEnd   ? formatDisplayDate(loadedEnd)   : null,
  ].filter(Boolean).join(' – ') || 'Current Month';

  return (
    <div>
      {renderToolbar()}

      {showHeatmap && filteredRows && filteredRows.length > 0 && !isPrint && (
        <HeatmapStrip filteredRows={filteredRows} locationColors={locationColors} />
      )}

      {showMetrics && filteredRows && filteredRows.length > 0 && !isPrint && (() => {
        var fmt = function(n) { return '$' + (n||0).toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g, ','); };
        // Residency breakdown
        var hasRes = filteredRows.some(function(r){ return r.resident === 'Yes' || r.resident === 'No'; });
        var resRows = filteredRows.filter(function(r){ return r.resident === 'Yes'; });
        var nonResRows = filteredRows.filter(function(r){ return r.resident === 'No'; });
        var resRev = resRows.reduce(function(s,r){ return s + (parseFloat(r.total)||0); }, 0);
        var nonResRev = nonResRows.reduce(function(s,r){ return s + (parseFloat(r.total)||0); }, 0);
        var totalRev = filteredRows.reduce(function(s,r){ return s + (parseFloat(r.total)||0); }, 0);
        var resPct = totalRev > 0 ? (resRev / totalRev * 100).toFixed(1) : '0';
        // Booking channel breakdown
        var instantRows = filteredRows.filter(function(r){ return (r.bookingType||'').toLowerCase() === 'instant'; });
        var managedRows = filteredRows.filter(function(r){ return (r.bookingType||'').toLowerCase() === 'managed'; });
        var instantRev = instantRows.reduce(function(s,r){ return s + (parseFloat(r.total)||0); }, 0);
        var managedRev = managedRows.reduce(function(s,r){ return s + (parseFloat(r.total)||0); }, 0);
        var instantAvg = instantRows.length > 0 ? instantRev / instantRows.length : 0;
        var managedAvg = managedRows.length > 0 ? managedRev / managedRows.length : 0;
        // Location breakdown for residency
        var locMap = {};
        filteredRows.forEach(function(r) {
          var loc = r.location || 'Unknown';
          if (!locMap[loc]) locMap[loc] = { res: 0, nonRes: 0, total: 0 };
          var v = parseFloat(r.total) || 0;
          locMap[loc].total += v;
          if (r.resident === 'Yes') locMap[loc].res += v;
          else if (r.resident === 'No') locMap[loc].nonRes += v;
        });
        var locEntries = Object.entries(locMap).sort(function(a,b){ return b[1].total - a[1].total; });
        var maxLoc = locEntries.length > 0 ? locEntries[0][1].total : 1;
        return (
          <div className="residency-strip">
            {hasRes && (
              <div style={{marginBottom: 20}}>
                <div style={{fontSize:11,fontWeight:700,color:'#666',textTransform:'uppercase',letterSpacing:'0.5px',marginBottom:10}}>Residency Revenue Analysis</div>
                <div className="residency-cards">
                  <div className="res-card total-card">
                    <div className="rc-label">Total Revenue</div>
                    <div className="rc-value">{fmt(totalRev)}</div>
                    <div className="rc-sub">{filteredRows.length} bookings</div>
                  </div>
                  <div className="res-card resident">
                    <div className="rc-label">Resident Revenue</div>
                    <div className="rc-value">{fmt(resRev)}</div>
                    <div className="rc-sub">{resRows.length} bookings</div>
                  </div>
                  <div className="res-card nonresident">
                    <div className="rc-label">Non-Resident Revenue</div>
                    <div className="rc-value">{fmt(nonResRev)}</div>
                    <div className="rc-sub">{nonResRows.length} bookings</div>
                  </div>
                  <div className="res-card pct-card">
                    <div className="rc-label">Resident Share</div>
                    <div className="rc-value">{resPct}%</div>
                    <div className="rc-sub">of total revenue</div>
                  </div>
                </div>
                {locEntries.length > 0 && (
                  <div style={{marginTop:8}}>
                    {locEntries.map(function(e) {
                      var loc = e[0], d = e[1];
                      var rW = maxLoc > 0 ? (d.res / maxLoc * 100) : 0;
                      var nW = maxLoc > 0 ? (d.nonRes / maxLoc * 100) : 0;
                      return (
                        <div key={loc} style={{display:'flex',alignItems:'center',gap:8,marginBottom:4,fontSize:11}}>
                          <span style={{width:140,textAlign:'right',color:'#555',flexShrink:0,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{loc}</span>
                          <div style={{flex:1,display:'flex',height:16,background:'#f3f2ee',borderRadius:3,overflow:'hidden'}}>
                            <div style={{width:rW+'%',background:'#10b981',transition:'width .3s'}} title={'Resident: ' + fmt(d.res)} />
                            <div style={{width:nW+'%',background:'#f59e0b',transition:'width .3s'}} title={'Non-Resident: ' + fmt(d.nonRes)} />
                          </div>
                          <span style={{width:70,textAlign:'right',fontWeight:600,color:'#333',fontSize:10}}>{fmt(d.total)}</span>
                        </div>
                      );
                    })}
                    <div style={{display:'flex',gap:16,marginTop:6,fontSize:9,color:'#888'}}>
                      <span>{'\u25A0'} <span style={{color:'#10b981'}}>Resident</span></span>
                      <span>{'\u25A0'} <span style={{color:'#f59e0b'}}>Non-Resident</span></span>
                    </div>
                  </div>
                )}
              </div>
            )}
            <div style={{marginBottom: 12}}>
              <div style={{fontSize:11,fontWeight:700,color:'#666',textTransform:'uppercase',letterSpacing:'0.5px',marginBottom:10}}>Booking Channel Analysis</div>
              <div className="residency-cards">
                <div className="res-card" style={{borderLeft:'3px solid #3b82f6'}}>
                  <div className="rc-label">Instant Book</div>
                  <div className="rc-value">{fmt(instantRev)}</div>
                  <div className="rc-sub">{instantRows.length} bookings {instantRows.length > 0 ? '\u00b7 avg ' + fmt(instantAvg) : ''}</div>
                </div>
                <div className="res-card" style={{borderLeft:'3px solid #8b5cf6'}}>
                  <div className="rc-label">Managed / Admin</div>
                  <div className="rc-value">{fmt(managedRev)}</div>
                  <div className="rc-sub">{managedRows.length} bookings {managedRows.length > 0 ? '\u00b7 avg ' + fmt(managedAvg) : ''}</div>
                </div>
                <div className="res-card" style={{borderLeft:'3px solid #6b7280'}}>
                  <div className="rc-label">Channel Split</div>
                  <div className="rc-value">{instantRows.length > 0 || managedRows.length > 0 ? Math.round(instantRows.length / (instantRows.length + managedRows.length) * 100) + '% / ' + Math.round(managedRows.length / (instantRows.length + managedRows.length) * 100) + '%' : 'N/A'}</div>
                  <div className="rc-sub">instant / managed</div>
                </div>
              </div>
            </div>
          </div>
        );
      })()}

      <div className="page" style={loading ? {opacity:0.5,pointerEvents:'none'} : {}}>
        {/* Report header */}
        <div className="report-header">
          <div>
            {logoUrl && <img src={logoUrl} alt="" className="report-header-logo" onError={e => e.target.style.display='none'} />}
            <div className="org-label">{orgName}</div>
            <div className="title">Weekly Rental Schedule</div>
          </div>
          <div className="date-range">{dateRangeLabel}</div>
        </div>

        

        {/* ── Table View ── */}
        {(
          <>
            {sortedDates.map(dateKey => {
              const dateGroup = grouped[dateKey];
              const sortedLocs = Object.keys(dateGroup.locations).sort();
              return (
                <div key={dateKey}>
                  {sortedLocs.map(locName => {
                    const locRows = dateGroup.locations[locName];
                    return (
                      <div key={locName} className="loc-section">
                        <div className="section-header">
                          <span className="date-label">{formatDateHeader(dateKey)}</span>
                          <span className="loc-label">—  {locName}</span>
                        </div>
                        <div className="col-header-row">
                          <span className="col-start">Begin</span>
                          <span className="col-end">End</span>
                          <span className="col-site">Facility / Site</span>
                          <span className="col-reservee">Reservee</span>
                          <span className="col-phone">Phone #</span>
                          <span className="col-email">Email</span>
                          <span className="col-purpose">Purpose</span>
                          {showResident  && <span className="col-resident">Resident?</span>}
                          {showBookType  && <span className="col-booktype">Book Type</span>}
                          {showHeadCount && <span className="col-hcnt">Cnt</span>}
                          {showTotal     && <span className="col-total">Total</span>}
                          {showAddonFees && <span className="col-addon-fees">Add-On $</span>}
                          {showLink && <span className="col-rec-link">↗</span>}
                        </div>
                        {locRows.map((r, i) => (
                          <div key={i}>
                            <div className="data-row">
                              <span className="cell col-start">{formatTime(r.start)}</span>
                              <span className="cell col-end">{formatTime(r.end)}</span>
                              <span className="cell col-site">{r.site}</span>
                              <span className="cell col-reservee">{r.reservee}</span>
                              <span className="cell col-phone">{formatPhone(r.phone)}</span>
                              <span className="cell col-email">
                                {r.email
                                  ? <a href={`mailto:${r.email}`} style={{color:'inherit',textDecoration:'none'}}>{r.email}</a>
                                  : ''}
                              </span>
                              <span className="cell col-purpose">{r.resName}</span>
                              {showResident  && <span className="cell col-resident">{r.resident}</span>}
                              {showBookType  && <span className="cell col-booktype">{r.bookingType}</span>}
                              {showHeadCount && <span className="cell col-hcnt">{r.headCount}</span>}
                              {showTotal     && <span className="cell col-total">{formatMoney(r.total)}</span>}
                              {showAddonFees && <span className="cell col-addon-fees">{formatMoney(r.addonFees)}</span>}
                              {showLink && <span className="cell col-rec-link">{r.resId ? <a href={`https://www.rec.us/admin/o/${meta.org_id}/facility-rentals/${r.resId}`} target="_blank" rel="noopener noreferrer" title="Open in Rec" style={{color:'#2563eb',textDecoration:'none',fontSize:13}}>↗️</a> : ''}</span>}
                            </div>
                            {showNotes && (() => {
                              let visAddons = r.addons || '';
                              if (visAddons && selectedAddOns && selectedAddOns.size < allAddOns.length) {
                                visAddons = visAddons.split(',').map(s => s.trim()).filter(s => {
                                  const name = s.replace(/\s*\(\$[\d,.]+\)$/, '').trim();
                                  return selectedAddOns.has(name);
                                }).join(', ');
                              }
                              var litStr = ''; if (r.lighting === 'Yes') { var _fmt = function(s) { if (!s) return ''; try { var d = new Date(s); var h = d.getHours(); var m = d.getMinutes(); var ap = h >= 12 ? 'PM' : 'AM'; h = h % 12 || 12; return h + ':' + String(m).padStart(2,'0') + ' ' + ap; } catch(e) { return s; } }; litStr = '💡 Lit: ' + _fmt(r.litFrom) + ' – ' + _fmt(r.litUntil); }
                              if (!r.notes && !visAddons && !r.instructions && !litStr) return null;
                              var parts = [];
                              if (litStr) parts.push(litStr);
                              if (r.instructions) parts.push("📝 " + r.instructions);
                              if (r.notes) parts.push(r.notes);
                              if (visAddons) parts.push("Add-ons: " + visAddons.split(',').map(s => {
                                    const trimmed = s.trim();
                                    const rawName = trimmed.replace(/\s*\(\$[\d,.]+\)$/, '').trim();
                                    return getAddOnEmoji(rawName) + ' ' + trimmed;
                                  }).join(', '));
                              return (
                                <div className="sub-row" dangerouslySetInnerHTML={{__html: renderNotes(parts.join(' | '))}} />
                              );
                            })()}
                          </div>
                        ))}
                      </div>
                    );
                  })}
                </div>
              );
            })}

            {filteredRows && filteredRows.length === 0 && (
              <div style={{textAlign:'center',padding:'40px 0',color:'#888'}}>
                {rows.length > 0
                  ? 'No rentals match the current location filter.'
                  : 'No rentals found for the selected date range.'}
              </div>
            )}
          </>
        )}

        {/* Footer */}
        <div className="report-footer">
          <span>{orgName}</span>
          <span>Run Date/Time: {runDate}</span>
        </div>

        {filteredRows && !loading && <div id="report-ready" data-ready="true" style={{display:'none'}} />}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
    <script src="/share-widget.js" defer></script>
    <script src="/feedback-widget.js" defer></script>
      <script src="/nav-breadcrumb.js" defer></script>
  </body>
</html>
