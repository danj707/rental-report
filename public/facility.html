function HeatmapStrip({ filteredRows, locationColors }) {
  const HOURS = Array.from({length:15}, (_,i) => i+7);
  const HOUR_LABELS = HOURS.map(h => h<=12 ? `${h}${h===12?'p':'a'}` : `${h-12}p`);
  const DAYS = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  const CELL_H = 14;
  const LEGEND_STEPS = 5;

  const dowHourGrid = useMemo(() => {
    const grid = Array.from({length:7}, () => new Array(HOURS.length).fill(0));
    filteredRows.forEach(r => {
      if (!r.date || !r.start) return;
      const dow = new Date(r.date + 'T12:00:00').getDay();
      const h = parseHour(r.start);
      const hi = h != null ? HOURS.indexOf(h) : -1;
      if (hi >= 0) grid[dow][hi]++;
    });
    return grid;
  }, [filteredRows]);

  const dowHourMax = useMemo(() => Math.max(1, ...dowHourGrid.flat()), [dowHourGrid]);

  const datLocData = useMemo(() => {
    const locations = [...new Set(filteredRows.map(r => r.location).filter(Boolean))].sort();
    const dates = [...new Set(filteredRows.map(r => r.date).filter(Boolean))].sort().slice(-31);
    const grid = {};
    filteredRows.forEach(r => {
      if (!dates.includes(r.date) || !r.location) return;
      if (!grid[r.date]) grid[r.date] = {};
      grid[r.date][r.location] = (grid[r.date][r.location] || 0) + 1;
    });
    return { locations, dates, grid };
  }, [filteredRows]);

  const datLocMax = useMemo(() => {
    let max = 1;
    Object.values(datLocData.grid).forEach(row => Object.values(row).forEach(v => { if (v > max) max = v; }));
    return max;
  }, [datLocData]);

  if (!filteredRows || filteredRows.length === 0) return null;

  return (
    <div className="heatmap-strip">

      {/* Panel 1: Day of week x Hour */}
      <div className="heatmap-panel">
        <div className="hm-title">Busiest Times — Day of Week x Hour</div>
        <div style={{display:'grid', gridTemplateColumns:`32px repeat(${HOURS.length},1fr)`, gap:'2px', marginBottom:'2px'}}>
          <div/>
          {HOUR_LABELS.map(l => <div key={l} style={{fontSize:8,color:'#bbb',textAlign:'center',lineHeight:1}}>{l}</div>)}
        </div>
        {DAYS.map((day, dow) => (
          <div key={day} style={{display:'grid', gridTemplateColumns:`32px repeat(${HOURS.length},1fr)`, gap:'2px', marginBottom:'2px'}}>
            <div style={{fontSize:9,color:'#999',display:'flex',alignItems:'center',justifyContent:'flex-end',paddingRight:4}}>{day}</div>
            {HOURS.map((h, hi) => {
              const count = dowHourGrid[dow][hi];
              return <div key={h} style={{height:CELL_H, background:heatColor(count,dowHourMax), borderRadius:2}}
                title={count > 0 ? `${day} ${HOUR_LABELS[hi]}: ${count} rental${count!==1?'s':''}` : ''} />;
            })}
          </div>
        ))}
        <div className="hm-legend">
          <span>0</span>
          <div className="hm-legend-bar">
            {Array.from({length:LEGEND_STEPS},(_,i) => <div key={i} className="hm-legend-cell" style={{background:heatColor(i+1,LEGEND_STEPS)}} />)}
          </div>
          <span>{dowHourMax}</span>
        </div>
      </div>

      {/* Panel 2: Date x Location */}
      {datLocData.locations.length > 0 && datLocData.dates.length > 0 && (
        <div className="heatmap-panel">
          <div className="hm-title">Bookings by Date x Location</div>
          {(() => {
            const step = Math.max(1, Math.ceil(datLocData.dates.length / 8));
            return (
              <div style={{display:'grid', gridTemplateColumns:`80px repeat(${datLocData.dates.length},1fr)`, gap:'2px', marginBottom:'2px'}}>
                <div/>
                {datLocData.dates.map((d,i) => {
                  const dt = new Date(d + 'T12:00:00');
                  return <div key={d} style={{fontSize:7,color:'#bbb',textAlign:'center',lineHeight:1,overflow:'hidden'}}>
                    {i % step === 0 ? `${dt.getMonth()+1}/${dt.getDate()}` : ''}
                  </div>;
                })}
              </div>
            );
          })()}
          {datLocData.locations.map(loc => (
            <div key={loc} style={{display:'grid', gridTemplateColumns:`80px repeat(${datLocData.dates.length},1fr)`, gap:'2px', marginBottom:'2px'}}>
              <div style={{fontSize:9,color:'#666',display:'flex',alignItems:'center',overflow:'hidden',paddingRight:4}}>
                <div style={{width:6,height:6,borderRadius:1,background:locationColors[loc]||'#888',flexShrink:0,marginRight:4}} />
                <span style={{overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{loc}</span>
              </div>
              {datLocData.dates.map(d => {
                const count = (datLocData.grid[d] && datLocData.grid[d][loc]) || 0;
                return <div key={d} style={{
                  height: CELL_H,
                  background: count > 0 ? (locationColors[loc] || '#888') : '#f0ede8',
                  borderRadius: 2,
                  opacity: count > 0 ? Math.max(0.18, count / datLocMax) : 1,
                }} title={count > 0 ? `${loc} ${d}: ${count} rental${count!==1?'s':''}` : ''} />;
              })}
            </div>
          ))}
          <div className="hm-legend">
            <span>0</span>
            <div className="hm-legend-bar">
              {Array.from({length:LEGEND_STEPS},(_,i) => <div key={i} className="hm-legend-cell" style={{background:'#457b9d',opacity:(i+1)/LEGEND_STEPS}} />)}
            </div>
            <span>{datLocMax}</span>
          </div>
        </div>
      )}

    </div>
  );
}

// ── Main App ─────────────────────────────────────────────────────────
function App() {
  const params   = useMemo(() => getParams(), []);
  const defaults = useMemo(() => {
    const range = window.ORG_CONFIG?.defaultDateRange;
    if (typeof range === 'number') {
      const today = new Date();
      const end   = new Date(today);
      end.setDate(today.getDate() + range - 1);
      return { start: toISO(today), end: toISO(end) };
    }
    // Default to this week (today + 6 days)
    const today = new Date();
    const end   = new Date(today);
    end.setDate(today.getDate() + 6);
    return { start: toISO(today), end: toISO(end) };
  }, []);

  const orgSlug = useMemo(() => {
    const parts = window.location.pathname.split('/').filter(Boolean);
    return parts[0] || '';
  }, []);

  const [startDate, setStartDate] = useState(params.start_date || defaults.start);
  const [endDate,   setEndDate]   = useState(params.end_date   || defaults.end);

  const [rows,       setRows]       = useState(null);
  const [meta,       setMeta]       = useState({});
  const [error,      setError]      = useState(null);
  const [loading,    setLoading]    = useState(false);
  const [pdfLoading, setPdfLoading] = useState(false);

  const [loadedStart, setLoadedStart] = useState(null);
  const [loadedEnd,   setLoadedEnd]   = useState(null);
  const [activeRange, setActiveRange] = useState('this-week'); // tracks which quick button is active

  // ── View mode: 'table' | 'calendar' ─────────────────────────────
  const [viewMode, setViewMode] = useState(() => {
    try { return localStorage.getItem('facilityViewMode') || 'table'; } catch { return 'table'; }
  });
  useEffect(() => {
    try { localStorage.setItem('facilityViewMode', viewMode); } catch {}
  }, [viewMode]);

  // ── Location colors ──────────────────────────────────────────────
  const [locationColors, setLocationColors] = useState(() => loadLocationColors(orgSlug));

  function handleColorChange(loc, color) {
    setLocationColors(prev => {
      const next = { ...prev, [loc]: color };
      saveLocationColors(orgSlug, next);
      return next;
    });
  }

  // ── Column visibility (persisted) ───────────────────────────────
  const [showHeadCount, setShowHeadCount] = useState(() => {
    try { return localStorage.getItem('col_headcount') !== 'false'; } catch { return true; }
  });
  const [showTotal, setShowTotal] = useState(() => {
    try { return localStorage.getItem('col_total') !== 'false'; } catch { return true; }
  });
  const [showAddonFees, setShowAddonFees] = useState(() => {
    try { return localStorage.getItem('col_addon_fees') !== 'false'; } catch { return true; }
  });
  const [showNotes, setShowNotes] = useState(() => {
    try { return localStorage.getItem('col_notes') !== 'false'; } catch { return true; }
  });
  const [showResident, setShowResident] = useState(() => {
    try { return localStorage.getItem('col_resident') !== 'false'; } catch { return true; }
  });
  const [showBookType, setShowBookType] = useState(() => {
    try { return localStorage.getItem('col_booktype') !== 'false'; } catch { return true; }
  });
  const [bookTypeFilter, setBookTypeFilter] = useState(params.book_type || 'all');
  const [showMetrics, setShowMetrics] = useState(() => {
    try { return localStorage.getItem('facility_metrics') === 'true'; } catch { return false; }
  });
  useEffect(() => { try { localStorage.setItem('facility_metrics', showMetrics); } catch {} }, [showMetrics]);
  const [showHeatmap, setShowHeatmap] = useState(() => {
    try { return localStorage.getItem('facility_heatmap') === 'true'; } catch { return false; }
  });
  useEffect(() => { try { localStorage.setItem('facility_heatmap', showHeatmap); } catch {} }, [showHeatmap]);

  useEffect(() => { try { localStorage.setItem('col_headcount', showHeadCount); } catch {} }, [showHeadCount]);
  useEffect(() => { try { localStorage.setItem('col_total',     showTotal);     } catch {} }, [showTotal]);
  useEffect(() => { try { localStorage.setItem('col_addon_fees', showAddonFees); } catch {} }, [showAddonFees]);
  useEffect(() => { try { localStorage.setItem('col_notes',     showNotes);     } catch {} }, [showNotes]);
  useEffect(() => { try { localStorage.setItem('col_resident',  showResident);  } catch {} }, [showResident]);
  useEffect(() => { try { localStorage.setItem('col_booktype',  showBookType);  } catch {} }, [showBookType]);

  // ── Location filter state ────────────────────────────────────────
  const [selectedLocations, setSelectedLocations] = useState(null);
  const [selectedSites,     setSelectedSites]     = useState(null);
  const [selectedAddOns,    setSelectedAddOns]    = useState(null);

  // Share Link: expose the live applied filter state so the floating Share
  // widget copies a URL that reproduces the on-screen view (mirrors the PDF).
  useEffect(() => {
    window.recShareLink = () => {
      const qs = new URLSearchParams();
      qs.set('start_date', loadedStart || startDate);
      qs.set('end_date',   loadedEnd   || endDate);
      if (selectedLocations) { const a = [...selectedLocations]; if (a.length) qs.set('locations', a.join(',')); }
      if (selectedSites)     { const a = [...selectedSites];     if (a.length) qs.set('sites',     a.join(',')); }
      if (bookTypeFilter && bookTypeFilter !== 'all') qs.set('book_type', bookTypeFilter);
      if (selectedAddOns)    { const a = [...selectedAddOns];    if (a.length) qs.set('addons',    a.join(',')); }
      if (URL_TOKEN) qs.set('token', URL_TOKEN);
      return `${window.location.pathname}?${qs.toString()}`;
    };
    return () => { try { delete window.recShareLink; } catch (e) { window.recShareLink = undefined; } };
  }, [loadedStart, loadedEnd, startDate, endDate, selectedLocations, selectedSites, selectedAddOns]);

  useEffect(() => {
    if (params._print === '1') document.body.classList.add('print-mode');
  }, [params._print]);

  // ── Fetch ────────────────────────────────────────────────────────
  const fetchData = useCallback((sd, ed) => {
    setLoading(true);
    setError(null);

    const qs = new URLSearchParams();
    if (sd) qs.set('start_date', sd);
    if (ed) qs.set('end_date',   ed);
    if (params.location_name) qs.set('location_name', params.location_name);
    if (params.site_type)     qs.set('site_type',     params.site_type);

    const pathParts = window.location.pathname.replace(/\/$/, '').split('/');
    const apiBase = pathParts.length >= 3
      ? `/${pathParts[1]}/${pathParts[2]}/api/data`
      : '/api/data';

    fetch(withToken(`${apiBase}?${qs.toString()}`))
      .then(r => {
        if (!r.ok) throw new Error(`Server returned ${r.status}`);
        return r.json();
      })
      .then(json => {
        const normalized = json.rows.map(normalizeRow);
        setRows(normalized);
        setMeta(json.meta || {});
        setLoadedStart(sd);
        setLoadedEnd(ed);

        // Assign colors to any new locations
        const locs = [...new Set(normalized.map(r => r.location).filter(Boolean))].sort();
        setLocationColors(prev => {
          const next = assignColors(locs, prev);
          saveLocationColors(orgSlug, next);
          return next;
        });

        setSelectedLocations(prev => {
          if (prev === null) {
            // Respect shared URL locations param
            if (params.locations) {
              const shared = params.locations.split(',').map(l => l.trim()).filter(l => locs.includes(l));
              if (shared.length > 0) return new Set(shared);
            }
            const defaultLoc = window.ORG_CONFIG?.defaultLocationFilter;
            if (defaultLoc && locs.includes(defaultLoc)) return new Set([defaultLoc]);
            return new Set(locs);
          }
          const next = new Set(prev);
          locs.forEach(l => { if (!next.has(l)) next.add(l); });
          return next;
        });

        setSelectedSites(prev => {
          if (prev === null) {
            const sites = [...new Set(normalized.map(r => r.site).filter(Boolean))].sort();
            // Respect shared URL sites param
            if (params.sites) {
              const shared = params.sites.split(',').map(s => s.trim()).filter(s => sites.includes(s));
              if (shared.length > 0) return new Set(shared);
            }
            return new Set(sites);
          }
          const sites = [...new Set(normalized.map(r => r.site).filter(Boolean))].sort();
          const next = new Set(prev);
          sites.forEach(s => { if (!next.has(s)) next.add(s); });
          return next;
        });

        setSelectedAddOns(prev => {
          const items = new Set();
          normalized.forEach(r => {
            parseAddOnItems(r.addons).forEach(p => items.add(stripAddonPrice(p)));
          });
          const all = [...items].sort();
          if (prev === null) {
            // Respect shared URL addons param
            if (params.addons) {
              const shared = params.addons.split(',').map(s => s.trim()).filter(s => all.includes(s));
              if (shared.length > 0) return new Set(shared);
            }
            return new Set(all);
          }
          const next = new Set(prev);
          all.forEach(a => { if (!next.has(a)) next.add(a); });
          return next;
        });
      })
      .catch(err => setError(err.message))
      .finally(() => setLoading(false));
  }, [params.location_name, params.site_type, orgSlug]);

  useEffect(() => { fetchData(startDate, endDate); }, []);

  function handleRunReport() { fetchData(startDate, endDate); }

  const datesChanged = startDate !== loadedStart || endDate !== loadedEnd;

  const allLocations = useMemo(() => {
    if (!rows) return [];
    return [...new Set(rows.map(r => r.location).filter(Boolean))].sort();
  }, [rows]);

  const allSites = useMemo(() => {
    if (!rows) return [];
    return [...new Set(rows.map(r => r.site).filter(Boolean))].sort();
  }, [rows]);

  const allAddOns = useMemo(() => {
    if (!rows) return [];
    const items = new Set();
    rows.forEach(r => {
      parseAddOnItems(r.addons).forEach(p => items.add(stripAddonPrice(p)));
    });
    return [...items].sort();
  }, [rows]);

  const filteredRows = useMemo(() => {
    if (!rows) return null;
    let result = rows;
    if (selectedLocations && selectedLocations.size < allLocations.length) {
      result = result.filter(r => selectedLocations.has(r.location));
    }
    if (selectedSites && selectedSites.size < allSites.length) {
      result = result.filter(r => selectedSites.has(r.site));
    }
    if (bookTypeFilter !== 'all') {
      result = result.filter(r => (r.bookingType || '').trim().toLowerCase() === bookTypeFilter);
    }
    return result;
  }, [rows, selectedLocations, allLocations, selectedSites, allSites, bookTypeFilter]);

  const grouped = useMemo(() => {
    if (!filteredRows) return null;
    const byDate = {};
    filteredRows.forEach(row => {
      const dk = row.date;
      if (!byDate[dk]) byDate[dk] = { locations: {} };
      const lk = row.location || 'Unknown';
      if (!byDate[dk].locations[lk]) byDate[dk].locations[lk] = [];
      byDate[dk].locations[lk].push(row);
    });
    Object.values(byDate).forEach(dg => {
      Object.values(dg.locations).forEach(locRows => {
        locRows.sort((a, b) => (a.start || '').localeCompare(b.start || ''));
      });
    });
    return byDate;
  }, [filteredRows]);

  const sortedDates = grouped ? Object.keys(grouped).sort() : [];

  function setMonth(offset) {
    const now = new Date();
    const target = new Date(now.getFullYear(), now.getMonth() + offset, 1);
    const last   = new Date(target.getFullYear(), target.getMonth() + 1, 0);
    setStartDate(toISO(target));
    setEndDate(toISO(last));
    setActiveRange(offset === -1 ? 'last-month' : offset === 0 ? 'this-month' : 'next-month');
  }

  function setWeek(offsetWeeks) {
    const now = new Date();
    const start = new Date(now);
    start.setDate(now.getDate() + (offsetWeeks * 7));
    const end = new Date(start);
    end.setDate(start.getDate() + 6);
    setStartDate(toISO(start));
    setEndDate(toISO(end));
    setActiveRange(offsetWeeks === 0 ? 'this-week' : 'next-week');
  }

  function downloadPdf() {
    setPdfLoading(true);
    const qs = new URLSearchParams();
    if (loadedStart) qs.set('start_date', loadedStart);
    if (loadedEnd)   qs.set('end_date',   loadedEnd);
    if (params.location_name) qs.set('location_name', params.location_name);
    if (params.site_type)     qs.set('site_type',     params.site_type);
    // Respect the current on-screen filter selections so the PDF matches exactly
    // what's shown. Mirrors the share-URL serialization; the print page reads
    // these back into selectedLocations/selectedSites on load.
    if (selectedLocations) { const a = [...selectedLocations]; if (a.length) qs.set('locations', a.join(',')); }
    if (selectedSites)     { const a = [...selectedSites];     if (a.length) qs.set('sites',     a.join(',')); }
    if (bookTypeFilter && bookTypeFilter !== 'all') qs.set('book_type', bookTypeFilter);
    if (selectedAddOns)    { const a = [...selectedAddOns];    if (a.length) qs.set('addons',    a.join(',')); }

    const pathParts = window.location.pathname.replace(/\/$/, '').split('/');
    const pdfBase = pathParts.length >= 3
      ? `/${pathParts[1]}/${pathParts[2]}/api/pdf`
      : '/api/pdf';

    fetch(withToken(`${pdfBase}?${qs.toString()}`))
      .then(r => r.blob())
      .then(blob => {
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = `rental-schedule-${loadedStart || 'report'}.pdf`;
        a.click();
        URL.revokeObjectURL(a.href);
      })
      .catch(err => alert('PDF generation failed: ' + err.message))
      .finally(() => setPdfLoading(false));
  }

  function downloadExcel() {
    if (!filteredRows || filteredRows.length === 0) return;
    const headers = [
      'Org Name', 'Date', 'Day', 'Location', 'Facility/Site',
      'Begin', 'End', 'Purpose', 'Reservee', 'Phone', 'Email',
    ];
    if (showHeadCount) headers.push('Head Cnt');
    if (showTotal)     headers.push('Total');
    if (showAddonFees) headers.push('Add-On Fees');
    if (showNotes)     headers.push('Notes', 'Add-ons');
    if (showResident)  headers.push('Resident?');
    if (showBookType)  headers.push('Booking Type');

    const dataRows = filteredRows.map(r => {
      const dp = (r.date || '').split('T')[0].split('-');
      const dateVal = dp.length === 3 ? new Date(+dp[0], +dp[1]-1, +dp[2]) : r.date;
      const row = [
        r.orgName, dateVal, (r.day || '').trim(), r.location, r.site,
        formatTime(r.start), formatTime(r.end), r.resName, r.reservee,
        formatPhone(r.phone), r.email,
      ];
      if (showHeadCount) row.push(r.headCount !== '' ? Number(r.headCount) || r.headCount : '');
      if (showTotal) { const n = parseFloat(r.total); row.push(!isNaN(n) && n !== 0 ? n : ''); }
      if (showAddonFees) { const n = parseFloat(r.addonFees); row.push(!isNaN(n) && n !== 0 ? n : ''); }
      if (showNotes) { row.push(r.notes || ''); row.push(r.addons || ''); }
      if (showResident) row.push(r.resident || '');
      if (showBookType) row.push(r.bookingType || '');
      return row;
    });

    const wsData = [headers, ...dataRows];
    const ws = XLSX.utils.aoa_to_sheet(wsData, { cellDates: true });
    // Format date column as MM/DD/YY
    for (let rowIdx = 1; rowIdx <= dataRows.length; rowIdx++) {
      const cellAddr = XLSX.utils.encode_cell({ r: rowIdx, c: 1 });
      if (ws[cellAddr] && ws[cellAddr].t === 'd') ws[cellAddr].z = 'MM/DD/YY';
    }
    ws['!cols'] = [
      {wch:28},{wch:12},{wch:10},{wch:22},{wch:22},{wch:9},{wch:9},
      {wch:20},{wch:20},{wch:14},{wch:28},
      ...(showHeadCount?[{wch:8}]:[]),
      ...(showTotal?[{wch:10}]:[]),
      ...(showAddonFees?[{wch:12}]:[]),
      ...(showNotes?[{wch:30},{wch:30}]:[]),
      ...(showResident?[{wch:10}]:[]),
      ...(showBookType?[{wch:14}]:[]),
    ];
    if (showTotal) {
      const totalColIdx = headers.indexOf('Total');
      for (let rowIdx = 1; rowIdx <= dataRows.length; rowIdx++) {
        const cellAddr = XLSX.utils.encode_cell({ r: rowIdx, c: totalColIdx });
        if (ws[cellAddr] && typeof ws[cellAddr].v === 'number') ws[cellAddr].z = '"$"#,##0.00';
      }
    }
    if (showAddonFees) {
      const afColIdx = headers.indexOf('Add-On Fees');
      for (let rowIdx = 1; rowIdx <= dataRows.length; rowIdx++) {
        const cellAddr = XLSX.utils.encode_cell({ r: rowIdx, c: afColIdx });
        if (ws[cellAddr] && typeof ws[cellAddr].v === 'number') ws[cellAddr].z = '"$"#,##0.00';
      }
    }
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, 'Rental Schedule');
    const slug = (filteredRows[0]?.orgName || 'report').replace(/\s+/g, '-').toLowerCase();
    XLSX.writeFile(wb, `rental-schedule-${slug}-${loadedStart || 'report'}.xlsx`);
    logClientEvent('excel');
  }

  function logClientEvent(event) {
    try {
      const parts = window.location.pathname.split('/').filter(Boolean);
      if (parts.length >= 2) fetch(withToken(`/${parts[0]}/${parts[1]}/api/log?event=${event}`), { method: 'POST' }).catch(() => {});
    } catch {}
  }

  const isPrint = params._print === '1';

  // ── Toolbar ──────────────────────────────────────────────────────
  function renderToolbar() {
    if (isPrint) return null;
    return (
      <div className="toolbar">
        <span className="toolbar-title">Rental Schedule</span>

        <label>
          Start
          <input type="date" value={startDate} onChange={e => { setStartDate(e.target.value); setActiveRange(null); }} />
        </label>
        <label>
          End
          <input type="date" value={endDate} onChange={e => { setEndDate(e.target.value); setActiveRange(null); }} />
        </label>

        {[
          { key:'last-month',  label:'Last Month',  action:() => setMonth(-1) },
          { key:'this-month',  label:'This Month',  action:() => setMonth(0)  },
          { key:'next-month',  label:'Next Month',  action:() => setMonth(1)  },
          { key:'this-week',   label:'This Week',   action:() => setWeek(0)   },
          { key:'next-week',   label:'Next Week',   action:() => setWeek(1)   },
        ].map(({ key, label, action }) => (
          <button
            key={key}
            onClick={action}
            style={{
              fontSize:11, padding:'4px 8px',
              ...(activeRange === key ? {
                background: '#f59e0b',
                borderColor: '#f59e0b',
                color: '#1a1a1a',
                fontWeight: 600,
              } : {}),
            }}
          >{label}</button>
        ))}

        <button
          className="btn-run"
          onClick={handleRunReport}
          disabled={loading}
          style={datesChanged && !loading ? {boxShadow:'0 0 0 2px #4ade80'} : {}}
        >
          {loading ? <><span className="btn-spinner" />Loading…</> : '▶ Run Report'}
        </button>

        {allLocations.length > 1 && selectedLocations && (
          <>
            <div className="divider" />
            <LocationFilter
              allLocations={allLocations}
              selectedLocations={selectedLocations}
              onChange={setSelectedLocations}
              locationColors={locationColors}
              onColorChange={handleColorChange}
            />
          </>
        )}

        {allSites.length > 1 && selectedSites && (
          <>
            <div className="divider" />
            <SiteFilter
              allSites={allSites}
              selectedSites={selectedSites}
              onChange={setSelectedSites}
            />
          </>
        )}

        {allAddOns.length > 0 && selectedAddOns && (
          <>
            <div className="divider" />
            <AddOnFilter
              allAddOns={allAddOns}
              selectedAddOns={selectedAddOns}
              onChange={setSelectedAddOns}
            />
          </>
        )}

        {filteredRows && filteredRows.some(r => r.bookingType && r.bookingType.trim()) && (
          <>
            <div className="divider" />
            <div className="bt-filter">
              <button className={bookTypeFilter === 'all' ? 'active' : ''} onClick={() => setBookTypeFilter('all')}>All</button>
              <button className={bookTypeFilter === 'instant' ? 'active' : ''} onClick={() => setBookTypeFilter('instant')}>Instant</button>
              <button className={bookTypeFilter === 'managed' ? 'active' : ''} onClick={() => setBookTypeFilter('managed')}>Managed</button>
            </div>
          </>
        )}

        <div className="toolbar-spacer" />

        {filteredRows && (
          <span className="row-count">
            {filteredRows.length} rental{filteredRows.length !== 1 ? 's' : ''}
            {rows && filteredRows.length !== rows.length && (
              <span style={{color:'#f59e0b'}}> ({rows.length} total)</span>
            )}
          </span>
        )}

        <div className="divider" />

        {/* View toggle */}
        <div className="view-toggle">
          <button
            className={viewMode === 'table' ? 'active' : ''}
            onClick={() => setViewMode('table')}
          >☰ Table</button>
          <button
            className={viewMode === 'calendar' ? 'active' : ''}
            onClick={() => setViewMode('calendar')}
          >🗓 Calendar</button>
        </div>

        {viewMode === 'table' && (
          <>
            <div className="divider" />
            <div className="col-toggles">
              <label>
                <input type="checkbox" checked={showHeadCount} onChange={e => setShowHeadCount(e.target.checked)} />
                Head Cnt
              </label>
              <label>
                <input type="checkbox" checked={showTotal} onChange={e => setShowTotal(e.target.checked)} />
                Total
              </label>
              <label>
                <input type="checkbox" checked={showAddonFees} onChange={e => setShowAddonFees(e.target.checked)} />
                Add-On $
              </label>
              <label>
                <input type="checkbox" checked={showNotes} onChange={e => setShowNotes(e.target.checked)} />
                Notes
              </label>
              <label>
                <input type="checkbox" checked={showResident} onChange={e => setShowResident(e.target.checked)} />
                Resident?
              </label>
              <label>
                <input type="checkbox" checked={showBookType} onChange={e => setShowBookType(e.target.checked)} />
                Book Type
              </label>
            </div>
          </>
        )}

        <div className="divider" />

        <button type="button" className={'metrics-toggle' + (showHeatmap ? ' active' : '')}
          onClick={() => setShowHeatmap(!showHeatmap)}
          title="Toggle heatmap visualization">
          {showHeatmap ? '📊 Heatmap' : '📊 Heatmap'}
        </button>

        <button type="button" className={'metrics-toggle' + (showMetrics ? ' active' : '')}
          onClick={() => setShowMetrics(!showMetrics)}
          title="Toggle revenue metrics panels">
          {showMetrics ? '💰 Metrics' : '💰 Metrics'}
        </button>

        <div className="divider" />

        <button onClick={() => window.print()}>🖨️ Print</button>
        <button
          className="btn-pdf"
          onClick={downloadPdf}
          disabled={pdfLoading || !filteredRows || filteredRows.length === 0}
        >
          {pdfLoading ? 'Generating…' : '📄 PDF'}
        </button>
        <button
          className="btn-excel"
          onClick={downloadExcel}
          disabled={!filteredRows || filteredRows.length === 0}
        >
          📊 Excel
        </button>


      </div>
    );
  }

  // ── Error ────────────────────────────────────────────────────────
  if (error && !rows) {
    return (
      <div>
        {renderToolbar()}
        <div className="page">
          <div className="error">
            <p><strong>Failed to load report data</strong></p>
            <p>{error}</p>
            <p style={{marginTop:12,color:'#666',fontSize:12}}>
              Check that Metabase public sharing is enabled and the UUID is correct.
            </p>
          </div>
        </div>
      </div>
    );
  }

  if (!rows) {
    return (
      <div>
        {renderToolbar()}
        <div className="page">
          <div className="loading">
            <div className="spinner" />
            <div className="juice-msg"><span>Squeezing the oranges…</span><span>Juicing!</span><span>Adding the pulp…</span><span>Chilling the glass…</span><span>Pouring it out…</span></div>
          </div>
        </div>
      </div>
    );
  }

  const now = new Date();
  const runDate = `${(now.getMonth()+1).toString().padStart(2,'0')}/${now.getDate().toString().padStart(2,'0')}/${now.getFullYear()} @ ${now.toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit',hour12:true}).toLowerCase()}`;

  const orgName = (rows.length > 0 && rows[0].orgName) ? rows[0].orgName : (meta.org_name || 'rec.us');
  const logoUrl = meta.logo_url || null;

  const dateRangeLabel = [
    loadedStart ? formatDisplayDate(loadedStart) : null,
    loadedEnd   ? formatDisplayDate(loadedEnd)   : null,
  ].filter(Boolean).join(' – ') || 'Current Month';

  return (
    <div>
      {renderToolbar()}

      {showHeatmap && filteredRows && filteredRows.length > 0 && !isPrint && (
        <HeatmapStrip filteredRows={filteredRows} locationColors={locationColors} />
      )}

      {filteredRows && filteredRows.length > 0 && !isPrint && (
        <div>
          {showMetrics && (
            <>
              <ResidencyAnalysis filteredRows={filteredRows} />
              <BookingTypeAnalysis filteredRows={filteredRows} />
            </>
          )}
        </div>
      )}

      <div className="page" style={loading ? {opacity:0.5,pointerEvents:'none'} : {}}>
        {/* Report header */}
        <div className="report-header">
          <div>
            {logoUrl && <img src={logoUrl} alt="" className="report-header-logo" onError={e => e.target.style.display='none'} />}
            <div className="org-label">{orgName}</div>
            <div className="title">Weekly Rental Schedule</div>
          </div>
          <div className="date-range">{dateRangeLabel}</div>
        </div>

        {/* ── Calendar View ── */}
        {viewMode === 'calendar' && filteredRows && (
          <CalendarView
            filteredRows={filteredRows}
            locationColors={locationColors}
            loadedStart={loadedStart}
            loadedEnd={loadedEnd}
            selectedLocations={selectedLocations}
            selectedSites={selectedSites}
            selectedAddOns={selectedAddOns}
          />
        )}

        {/* ── Table View ── */}
        {viewMode === 'table' && (
          <>
            {sortedDates.map(dateKey => {
              const dateGroup = grouped[dateKey];
              const sortedLocs = Object.keys(dateGroup.locations).sort();
              return (
                <div key={dateKey}>
                  {sortedLocs.map(locName => {
                    const locRows = dateGroup.locations[locName];
                    return (
                      <div key={locName} className="loc-section">
                        <div className="section-header">
                          <span className="date-label">{formatDateHeader(dateKey)}</span>
                          <span className="loc-label">—  {locName}</span>
                        </div>
                        <div className="col-header-row">
                          <span className="col-start">Begin</span>
                          <span className="col-end">End</span>
                          <span className="col-site">Facility / Site</span>
                          <span className="col-reservee">Reservee</span>
                          <span className="col-phone">Phone #</span>
                          <span className="col-email">Email</span>
                          <span className="col-purpose">Purpose</span>
                          {showResident  && <span className="col-resident">Resident?</span>}
                          {showBookType  && <span className="col-booktype">Book Type</span>}
                          {showHeadCount && <span className="col-hcnt">Cnt</span>}
                          {showTotal     && <span className="col-total">Total</span>}
                          {showAddonFees && <span className="col-addon-fees">Add-On $</span>}
                        </div>
                        {locRows.map((r, i) => (
                          <div key={i}>
                            <div className="data-row">
                              <span className="cell col-start">{formatTime(r.start)}</span>
                              <span className="cell col-end">{formatTime(r.end)}</span>
                              <span className="cell col-site">{r.site}</span>
                              <span className="cell col-reservee">{r.reservee}</span>
                              <span className="cell col-phone">{formatPhone(r.phone)}</span>
                              <span className="cell col-email">
                                {r.email
                                  ? <a href={`mailto:${r.email}`} style={{color:'inherit',textDecoration:'none'}}>{r.email}</a>
                                  : ''}
                              </span>
                              <span className="cell col-purpose">{r.resName}</span>
                              {showResident  && <span className="cell col-resident">{r.resident}</span>}
                              {showBookType  && <span className="cell col-booktype">{r.bookingType}</span>}
                              {showHeadCount && <span className="cell col-hcnt">{r.headCount}</span>}
                              {showTotal     && <span className="cell col-total">{formatMoney(r.total)}</span>}
                              {showAddonFees && <span className="cell col-addon-fees">{formatMoney(r.addonFees)}</span>}
                            </div>
                            {showNotes && (() => {
                              let visAddons = r.addons || '';
                              if (visAddons && selectedAddOns && selectedAddOns.size < allAddOns.length) {
                                visAddons = visAddons.split(',').map(s => s.trim()).filter(s => {
                                  const name = s.replace(/\s*\(\$[\d,.]+\)$/, '').trim();
                                  return selectedAddOns.has(name);
                                }).join(', ');
                              }
                              if (!r.notes && !visAddons) return null;
                              return (
                                <div className="sub-row">
                                  {r.notes || ''}
                                  {visAddons ? ` | Add-ons: ${visAddons.split(',').map(s => {
                                    const trimmed = s.trim();
                                    const rawName = trimmed.replace(/\s*\(\$[\d,.]+\)$/, '').trim();
                                    return getAddOnEmoji(rawName) + ' ' + trimmed;
                                  }).join(', ')}` : ''}
                                </div>
                              );
                            })()}
                          </div>
                        ))}
                      </div>
                    );
                  })}
                </div>
              );
            })}

            {filteredRows && filteredRows.length === 0 && (
              <div style={{textAlign:'center',padding:'40px 0',color:'#888'}}>
                {rows.length > 0
                  ? 'No rentals match the current location filter.'
                  : 'No rentals found for the selected date range.'}
              </div>
            )}
          </>
        )}

        {/* Footer */}
        <div className="report-footer">
          <span>{orgName}</span>
          <span>Run Date/Time: {runDate}</span>
        </div>

        <div id="report-ready" style={{display:'none'}} />
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
    <script src="/share-widget.js" defer></script>
    <script src="/feedback-widget.js" defer></script>
      <script src="/nav-breadcrumb.js" defer></script>
  </body>
</html>
