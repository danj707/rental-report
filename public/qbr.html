<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>QBR · rec.us</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;1,9..144,400&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css" />
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script src="/juice-loader.js"></script>
<style>
  :root {
    --ink:    #0F1B2D;
    --slate:  #5A6B82;
    --faint:  #8A97A8;
    --paper:  #FFFFFF;
    --mist:   #F4F6F9;
    --line:   #E4E8EE;
    --emerald:#1F7A5A;
    --emerald-soft:#E7F1EC;
    --up:     #15803D;
    --down:   #C2410C;
    --shadow: 0 1px 2px rgba(15,27,45,.04), 0 8px 24px rgba(15,27,45,.05);
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: 'IBM Plex Sans', system-ui, sans-serif;
    color: var(--ink);
    background: #ECEFF3;
    -webkit-font-smoothing: antialiased;
  }
  .wrap { max-width: 1180px; margin: 0 auto; padding: 28px 22px 60px; }

  /* ── Picker ── */
  .picker {
    background: var(--paper); border: 1px solid var(--line); border-radius: 14px;
    box-shadow: var(--shadow); padding: 18px 20px; margin-bottom: 26px;
    display: flex; flex-wrap: wrap; align-items: flex-end; gap: 16px;
  }
  .picker .field { display: flex; flex-direction: column; gap: 6px; }
  .picker label {
    font-size: 11px; font-weight: 600; letter-spacing: .08em; text-transform: uppercase;
    color: var(--faint);
  }
  .picker select {
    font-family: inherit; font-size: 15px; font-weight: 500; color: var(--ink);
    background: var(--mist); border: 1px solid var(--line); border-radius: 9px;
    padding: 9px 13px; min-width: 150px; cursor: pointer;
  }
  .picker select:focus-visible { outline: 2px solid var(--emerald); outline-offset: 1px; }
  .picker .go {
    margin-left: auto; font-family: inherit; font-size: 15px; font-weight: 600;
    color: #fff; background: var(--emerald); border: none; border-radius: 9px;
    padding: 11px 26px; cursor: pointer; transition: background .15s;
  }
  .picker .go:hover { background: #1a6a4e; }
  .picker .org-input {
    font-family: inherit; font-size: 15px; font-weight: 500; color: var(--ink);
    background: var(--mist); border: 1px solid var(--line); border-radius: 9px;
    padding: 9px 13px; min-width: 240px;
  }
  .picker .org-input:focus-visible { outline: 2px solid var(--emerald); outline-offset: 1px; }
  .org-drop {
    position: absolute; top: 100%; left: 0; right: 0; margin-top: 4px; background: #fff;
    border: 1px solid var(--line); border-radius: 10px; box-shadow: var(--shadow);
    max-height: 300px; overflow-y: auto; z-index: 30;
  }
  .org-opt { display: flex; align-items: baseline; justify-content: space-between; gap: 10px; padding: 9px 13px; cursor: pointer; }
  .org-opt:hover { background: var(--mist); }
  .org-opt-name { font-size: 14px; font-weight: 500; color: var(--ink); }
  .org-opt-slug { font-size: 11px; color: var(--faint); }
  .pdf-btn {
    font-family: inherit; font-size: 15px; font-weight: 600; color: var(--emerald);
    background: var(--emerald-soft); border: 1px solid #cfe6da; border-radius: 9px;
    padding: 11px 18px; text-decoration: none; align-self: flex-end;
  }
  .pdf-btn:hover { background: #d9ede3; }
  .picker .tag {
    font-size: 11px; font-weight: 600; color: var(--emerald); background: var(--emerald-soft);
    padding: 4px 9px; border-radius: 20px; align-self: center; letter-spacing: .03em;
  }

  /* ── Report page ── */
  .page {
    background: var(--paper); border-radius: 14px; box-shadow: var(--shadow);
    overflow: hidden; position: relative;
  }

  /* Header band */
  .band {
    display: flex; align-items: center; justify-content: space-between; gap: 20px;
    padding: 26px 34px; border-bottom: 1px solid var(--line);
  }
  .band-l { display: flex; align-items: center; gap: 16px; }
  .logo { height: 44px; width: auto; display: block; }
  .monogram {
    height: 44px; width: 44px; border-radius: 10px; background: var(--ink); color: #fff;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Fraunces', serif; font-weight: 600; font-size: 20px;
  }
  .org-name { font-size: 20px; font-weight: 600; letter-spacing: -.01em; line-height: 1.1; }
  .org-sub { font-size: 12px; color: var(--slate); margin-top: 3px; }
  .band-r { text-align: right; }
  .eyebrow {
    font-family: 'Fraunces', serif; font-style: italic; font-size: 15px; color: var(--emerald);
    letter-spacing: .01em;
  }
  .period { font-size: 22px; font-weight: 600; letter-spacing: -.01em; margin-top: 2px; }
  .prepared { font-size: 11.5px; color: var(--faint); margin-top: 4px; letter-spacing: .02em; }

  /* Reconciliation strip — the signature */
  .recon {
    margin: 22px 34px 0; background: var(--mist); border: 1px solid var(--line);
    border-radius: 13px; padding: 20px 26px;
    display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
  }
  .recon-seg { display: flex; flex-direction: column; gap: 3px; }
  .recon-lab {
    font-size: 11px; font-weight: 600; letter-spacing: .08em; text-transform: uppercase; color: var(--faint);
  }
  .recon-val { font-family: 'Fraunces', serif; font-size: 30px; font-weight: 600; color: var(--ink); font-variant-numeric: tabular-nums; letter-spacing: -.01em; line-height: 1; }
  .recon-val.refund { color: var(--down); }
  .recon-op { font-family: 'Fraunces', serif; font-size: 30px; color: #B9C2CE; font-weight: 400; padding: 0 16px; align-self: center; }
  .recon-net { margin-left: auto; display: flex; align-items: baseline; gap: 14px; }
  .recon-net .net-lab {
    font-size: 11px; font-weight: 600; letter-spacing: .08em; text-transform: uppercase; color: var(--emerald);
  }
  .recon-net .net-val {
    font-family: 'Fraunces', serif; font-size: 46px; font-weight: 600; color: var(--emerald);
    letter-spacing: -.02em; line-height: 1; font-variant-numeric: tabular-nums;
  }

  /* KPI row */
  .kpis { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 14px; padding: 22px 34px 0; }
  .kpi { border: 1px solid var(--line); border-radius: 12px; padding: 15px 16px 16px; }
  .kpi-lab {
    font-size: 11px; font-weight: 600; letter-spacing: .07em; text-transform: uppercase; color: var(--faint);
  }
  .kpi-val {
    font-size: 27px; font-weight: 600; font-variant-numeric: tabular-nums; letter-spacing: -.02em;
    margin-top: 8px; line-height: 1;
  }
  .kpi-sub { font-size: 12px; color: var(--slate); margin-top: 7px; }
  .chip {
    display: inline-flex; align-items: center; gap: 3px; font-size: 12px; font-weight: 600;
    padding: 2px 8px; border-radius: 20px; margin-top: 9px;
  }
  .chip.up   { color: var(--up);   background: #E7F4EC; }
  .chip.down { color: var(--down); background: #FBEAE1; }
  .chip.flat { color: var(--slate); background: var(--mist); }
  .est { font-size: 10px; font-weight: 600; color: var(--faint); background: var(--mist);
         padding: 2px 6px; border-radius: 5px; margin-left: 6px; letter-spacing: .03em; vertical-align: middle; }

  /* Lower split */
  .lower { display: grid; grid-template-columns: 1.35fr 1fr; gap: 22px; padding: 24px 34px 30px; }
  .sec-lab {
    font-family: 'Fraunces', serif; font-style: italic; font-size: 15px; color: var(--ink);
    margin: 0 0 11px;
  }
  .summary { font-size: 14.5px; line-height: 1.62; color: #2A3848; }
  .highlights { list-style: none; margin: 20px 0 0; padding: 0; display: flex; flex-direction: column; gap: 12px; }
  .highlights li { display: flex; gap: 11px; }
  .hl-dot { flex: none; width: 7px; height: 7px; border-radius: 50%; background: var(--emerald); margin-top: 7px; }
  .hl-t { font-size: 13.5px; font-weight: 600; }
  .hl-d { font-size: 13px; color: var(--slate); line-height: 1.5; margin-top: 1px; }
  .chart-card { border: 1px solid var(--line); border-radius: 12px; padding: 16px 18px; }
  .chart-wrap { position: relative; height: 200px; margin-top: 6px; }

  /* Footer */
  .foot {
    border-top: 1px solid var(--line); padding: 16px 34px 22px; background: var(--mist);
  }
  .season { font-family: 'Fraunces', serif; font-style: italic; font-size: 13px; color: #3A4754; line-height: 1.5; }
  .method { font-size: 10.5px; color: var(--faint); margin-top: 8px; line-height: 1.5; letter-spacing: .01em; }

  /* Print */
  @page { size: letter landscape; margin: 0.35in; }
  body.print { background: #fff; }
  body.print .wrap { max-width: none; padding: 0; }
  body.print .picker { display: none; }
  body.print .page { box-shadow: none; border-radius: 0; }
  @media (max-width: 1000px) { .lower { grid-template-columns: 1fr; } }
  @media (max-width: 820px) {
    .kpis { grid-template-columns: repeat(2, 1fr); }
    .recon { row-gap: 6px; }
    .recon-net { margin-left: 0; width: 100%; margin-top: 12px; }
  }
  /* ── Dashboard chrome ── */
  .qbr-head { display:flex; align-items:flex-start; justify-content:space-between; margin-bottom:18px; gap:16px; }
  .qbr-head h1 { font-family:'Fraunces',serif; font-size:24px; font-weight:600; color:var(--ink); margin:0; letter-spacing:-.01em; }
  .qbr-head .sub { font-size:12.5px; color:var(--faint); margin-top:3px; }

  .stats { display:grid; grid-template-columns:repeat(auto-fit,minmax(132px,1fr)); gap:11px; margin-bottom:18px; }
  .stat { background:var(--paper); border:1px solid var(--line); border-radius:12px; padding:13px 15px; }
  .stat-num { font-family:'Fraunces',serif; font-size:26px; font-weight:600; color:var(--ink); line-height:1; font-variant-numeric:tabular-nums; }
  .stat-lab { font-size:10.5px; font-weight:600; letter-spacing:.07em; text-transform:uppercase; color:var(--faint); margin-top:7px; }
  .hist { background:var(--paper); border:1px solid var(--line); border-radius:14px; box-shadow:var(--shadow); margin-top:24px; overflow:hidden; }
  .hist-h { font-family:'Fraunces',serif; font-style:italic; font-size:15px; color:var(--ink); padding:16px 20px 4px; }
  .hist-empty { padding:14px 20px 24px; color:var(--faint); font-size:13px; line-height:1.5; }
  .hrow { display:grid; grid-template-columns:1fr 92px 150px auto; align-items:center; gap:12px; padding:12px 20px; border-top:1px solid var(--line); }
  .hrow .org { display:flex; align-items:center; gap:10px; min-width:0; }
  .hrow .org img { height:24px; width:24px; border-radius:5px; object-fit:contain; background:var(--mist); }
  .hrow .org .nm { font-size:13.5px; font-weight:600; color:var(--ink); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .hrow .qtr { font-size:12.5px; color:var(--slate); font-weight:500; }
  .hrow .gen { font-size:11.5px; color:var(--faint); }
  .hrow .acts { display:flex; align-items:center; gap:7px; justify-self:end; }
  .rbtn { font-size:11.5px; font-weight:600; padding:5px 11px; border-radius:7px; border:1px solid var(--line); background:var(--paper); color:var(--slate); cursor:pointer; text-decoration:none; white-space:nowrap; }
  .rbtn:hover { background:var(--mist); }
  .rbtn.em { color:var(--emerald); border-color:var(--emerald-soft); background:var(--emerald-soft); }
  .email-pop { display:flex; align-items:center; gap:9px; padding:11px 20px 14px; border-top:1px dashed var(--line); background:var(--mist); flex-wrap:wrap; }
  .email-pop input { flex:0 1 280px; font-family:inherit; font-size:13px; padding:7px 10px; border:1px solid var(--line); border-radius:7px; background:var(--paper); color:var(--ink); }
  .email-pop .hint { font-size:11px; color:var(--faint); }
  .toast { position:fixed; bottom:22px; left:50%; transform:translateX(-50%); background:var(--ink); color:#fff; font-size:13px; padding:10px 18px; border-radius:9px; box-shadow:var(--shadow); z-index:50; }
  body.print .qbr-head, body.print .stats, body.print .hist, body.print .toast { display:none !important; }
  /* ── Tabs ── */
  .tabs { display:flex; gap:4px; border-bottom:1px solid var(--line); margin-bottom:20px; }
  .tab { font-family:inherit; font-size:13.5px; font-weight:600; color:var(--faint); background:none; border:none; border-bottom:2px solid transparent; padding:9px 14px 11px; cursor:pointer; margin-bottom:-1px; }
  .tab:hover { color:var(--slate); }
  .tab.on { color:var(--emerald); border-bottom-color:var(--emerald); }
  /* ── Org map ── */
  .omap-card { background:var(--paper); border:1px solid var(--line); border-radius:14px; box-shadow:var(--shadow); overflow:hidden; }
  .omap-head { display:flex; align-items:center; gap:12px; padding:16px 20px 12px; flex-wrap:wrap; }
  .omap-head h2 { font-family:'Fraunces',serif; font-style:italic; font-size:16px; font-weight:600; color:var(--ink); margin:0; }
  .omap-toggle { display:inline-flex; background:var(--mist); border:1px solid var(--line); border-radius:8px; overflow:hidden; }
  .omap-toggle button { font-family:inherit; font-size:12px; font-weight:600; color:var(--slate); background:none; border:none; padding:6px 12px; cursor:pointer; }
  .omap-toggle button.on { background:var(--emerald); color:#fff; }
  .tf-pick { display:inline-flex; gap:6px; }
  .tf-pick select { font-family:inherit; font-size:12px; font-weight:600; color:var(--slate); background:var(--mist); border:1px solid var(--line); border-radius:8px; padding:5px 9px; cursor:pointer; }
  .tf-pick select:disabled { opacity:.55; cursor:default; }
  .omap-wrap { height:520px; width:100%; }
  .omap-foot { font-size:11px; color:var(--faint); padding:10px 20px 14px; display:flex; align-items:center; gap:14px; flex-wrap:wrap; }
  .omap-foot .lg { display:inline-flex; align-items:center; gap:3px; font-size:10px; }
  .omap-foot .dot { width:10px; height:10px; border-radius:50%; display:inline-block; }
  .refresh-btn { font-family:inherit; font-size:11.5px; font-weight:600; color:var(--slate); background:var(--paper); border:1px solid var(--line); border-radius:7px; padding:5px 11px; cursor:pointer; }
  .refresh-btn:hover { background:var(--mist); }
  .omap-cta { text-align:center; padding:60px 24px; }
  .orgbar-scroll { max-height:540px; overflow-y:auto; padding:6px 14px 14px; }
  .omap-cta h3 { font-family:'Fraunces',serif; font-size:19px; color:var(--ink); margin:0 0 8px; }
  .omap-cta p { font-size:13px; color:var(--faint); max-width:440px; margin:0 auto 20px; line-height:1.55; }
  .build-btn { font-family:inherit; font-size:14px; font-weight:600; color:#fff; background:var(--emerald); border:none; border-radius:9px; padding:11px 24px; cursor:pointer; }
  .build-btn:disabled { opacity:.6; cursor:default; }
  .leaflet-tooltip.org-tip { font-family:'IBM Plex Sans',sans-serif; font-size:12px; line-height:1.45; padding:8px 11px; border-radius:8px; border:1px solid var(--line); box-shadow:var(--shadow); }
  .leaflet-tooltip.org-tip .tn { font-weight:700; color:var(--ink); font-size:13px; }
  body.print .tabs { display:none !important; }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useRef } = React;

// ── In production this is injected/fetched; preview uses Watertown-shaped mock ──
const PREVIEW = !window.__QBR_LIVE__;
const MOCK = {
  org: {
    slug: 'watertown',
    displayName: 'Watertown Parks & Recreation',
    logoUrl: 'https://www.rec.us/_next/image?url=https%3A%2F%2Fprod-rec-tech-img-bucket-8656aa2.s3.us-west-1.amazonaws.com%2Forganization-d781690b-c5a0-43c5-8443-9ae43899528c%2FfullLogo.png%3F1750270261391&w=256&q=75',
    orgId: 'd781690b-c5a0-43c5-8443-9ae43899528c',
  },
  period:     { year: 2025, quarter: 3, start: '2025-07-01', end: '2025-09-30', label: 'Q3 2025' },
  comparison: { start: '2025-04-01', end: '2025-06-30', label: 'Q2 2025' },
  metrics: {
    financial: { gross: 487200, refunds: 18940, net: 468260, netDelta: 34, grossDelta: 31, transactions: 3120, transactionsDelta: 18, refundCount: 214 },
    programs:  { enrollments: 4210, sections: 312, programs: 88, enrollmentsDelta: 41 },
    facility:  { bookings: 1847, locations: 22, revenue: 214500, bookingsDelta: 28 },
    court:     { hoursBooked: 3120, courts: 13, utilization: 41, utilizationEstimated: true, hrsPerDay: 12 },
    retention: { rate: 73.5 },
    users: { total: 18450, new: 1240, newDelta: 9 },
  },
  narrative: {
    executiveSummary: "Watertown closed Q3 at $468,260 in net revenue, up 34% over Q2 as summer programming and field rentals reached their seasonal peak. Program enrollments led the quarter at 4,210 across 312 sections, a 41% jump, while facility bookings reached 1,847 across 22 locations. Court time stayed busy at 3,120 booked hours over 13 courts, and program retention held at 73.5%.",
    highlights: [
      { label: 'Programs drove the quarter', detail: '4,210 enrollments (+41% QoQ) across 88 programs — the largest single contributor to the revenue jump.' },
      { label: 'Facility demand climbed', detail: '1,847 bookings (+28%) generated $214,500 in rental revenue across 22 locations.' },
      { label: 'Refunds stayed contained', detail: '$18,940 refunded against $487,200 gross — 3.9% of gross, steady with prior quarters.' },
    ],
    seasonality: "Q3 (Jul–Sep) typically runs well above Q2 in Watertown on summer camps, programs, and field rentals — read the quarter-over-quarter jumps with that seasonal pattern in mind.",
  },
};

const ORG_OPTIONS = [
  ['watertown','Watertown Parks & Recreation'], ['clarksville','Clarksville Parks and Recreation'],
  ['norman','Norman'], ['smyrna','Smyrna'], ['apex','Apex'], ['theranch','The Ranch Parks and Recreation'],
  ['westsacramento','City of West Sacramento'], ['joplin','Joplin'], ['shrewsbury','Shrewsbury'],
  ['littleton','Littleton'], ['danvers','Danvers'], ['rec','Rec'],
];

const fmtMoney = (n) => '$' + Math.round(n).toLocaleString('en-US');
const fmtNum   = (n) => Math.round(n).toLocaleString('en-US');

// Draw the % value at the end of each bar — the chart is a static PDF artifact, no hover.
const barEndLabels = {
  id: 'barEndLabels',
  afterDatasetsDraw(chart) {
    const ctx = chart.ctx;
    const ds = chart.data.datasets[0];
    const meta = chart.getDatasetMeta(0);
    ctx.save();
    ctx.font = "600 12px 'IBM Plex Sans', system-ui, sans-serif";
    ctx.textBaseline = 'middle';
    meta.data.forEach((bar, i) => {
      const v = ds.data[i];
      const txt = (v > 0 ? '+' : '') + v + '%';
      ctx.fillStyle = v >= 0 ? '#15803D' : '#C2410C';
      if (v >= 0) { ctx.textAlign = 'left';  ctx.fillText(txt, bar.x + 8, bar.y); }
      else        { ctx.textAlign = 'right'; ctx.fillText(txt, bar.x - 8, bar.y); }
    });
    ctx.restore();
  },
};

function Chip({ delta }) {
  if (delta === null || delta === undefined) return null;
  const cls = delta > 0 ? 'up' : delta < 0 ? 'down' : 'flat';
  const arrow = delta > 0 ? '▲' : delta < 0 ? '▼' : '–';
  const sign = delta > 0 ? '+' : '';
  return <span className={`chip ${cls}`}>{arrow} {sign}{delta}% <span style={{fontWeight:500,opacity:.7}}>QoQ</span></span>;
}

function Kpi({ lab, val, sub, delta, est }) {
  return (
    <div className="kpi">
      <div className="kpi-lab">{lab}</div>
      <div className="kpi-val">{val}{est && <span className="est">EST.</span>}</div>
      {sub && <div className="kpi-sub">{sub}</div>}
      <Chip delta={delta} />
    </div>
  );
}

function MovementChart({ metrics }) {
  const ref = useRef(null);
  const inst = useRef(null);
  const f = metrics.financial, p = metrics.programs, fa = metrics.facility, u = metrics.users;
  const rows = [];
  if (f && typeof f.netDelta === 'number')          rows.push(['Net revenue', f.netDelta]);
  if (f && typeof f.transactionsDelta === 'number') rows.push(['Transactions', f.transactionsDelta]);
  if (p && typeof p.enrollmentsDelta === 'number')  rows.push(['Enrollments', p.enrollmentsDelta]);
  if (fa && typeof fa.bookingsDelta === 'number')   rows.push(['Bookings', fa.bookingsDelta]);
  if (u && typeof u.newDelta === 'number')          rows.push(['New users', u.newDelta]);

  useEffect(() => {
    if (!ref.current || rows.length === 0) return;
    if (inst.current) inst.current.destroy();
    inst.current = new Chart(ref.current.getContext('2d'), {
      type: 'bar',
      plugins: [barEndLabels],
      data: {
        labels: rows.map(r => r[0]),
        datasets: [{
          data: rows.map(r => r[1]),
          backgroundColor: rows.map(r => r[1] >= 0 ? '#1F7A5A' : '#C2410C'),
          borderRadius: 5, barThickness: 22,
        }],
      },
      options: {
        indexAxis: 'y', responsive: true, maintainAspectRatio: false,
        layout: { padding: { left: 6, right: 24, top: 4, bottom: 2 } },
        plugins: {
          legend: { display: false },
          tooltip: { callbacks: { label: (c) => (c.raw >= 0 ? '+' : '') + c.raw + '% vs prior quarter' } },
        },
        scales: {
          x: { beginAtZero: true, grace: '12%',
               ticks: { callback: (v) => v + '%', font: { family: 'IBM Plex Sans', size: 11 }, color: '#8A97A8' },
               grid: { color: '#EEF1F5' }, border: { display: false } },
          y: { ticks: { font: { family: 'IBM Plex Sans', size: 12, weight: 500 }, color: '#0F1B2D' },
               grid: { display: false }, border: { display: false } },
        },
      },
    });
    if (document.fonts && document.fonts.ready) {
      document.fonts.ready.then(() => { if (inst.current) inst.current.update(); });
    }
    return () => { if (inst.current) inst.current.destroy(); };
  }, [metrics]);

  if (rows.length === 0) {
    return (
      <div style={{ height: 200, display: 'flex', alignItems: 'center', justifyContent: 'center', textAlign: 'center', color: 'var(--faint)', fontSize: 13, lineHeight: 1.5, padding: '0 24px' }}>
        No prior-quarter baseline to compare — figures reflect the first comparable quarter.
      </div>
    );
  }
  return <div className="chart-wrap"><canvas ref={ref}></canvas></div>;
}

function qbrMoneyShort(v) {
  v = Math.round(v || 0);
  if (v >= 1000000) return '$' + (v / 1000000).toFixed(v >= 10000000 ? 0 : 1) + 'M';
  if (v >= 1000) return '$' + Math.round(v / 1000) + 'k';
  return '$' + v;
}
const orgBarLabels = {
  id: 'orgBarLabels',
  afterDatasetsDraw(chart) {
    const ctx = chart.ctx, ds = chart.data.datasets[0], meta = chart.getDatasetMeta(0);
    ctx.save();
    ctx.font = "600 10px 'IBM Plex Sans', system-ui, sans-serif";
    ctx.textBaseline = 'middle'; ctx.textAlign = 'left'; ctx.fillStyle = '#5A6B82';
    meta.data.forEach((bar, i) => { ctx.fillText(qbrMoneyShort(ds.data[i]), bar.x + 6, bar.y); });
    ctx.restore();
  },
};

function OrgRevChart({ orgs, tfLabel }) {
  const ref = useRef(null);
  const inst = useRef(null);
  const [sort, setSort] = useState('az');
  useEffect(() => {
    if (!ref.current) return;
    if (inst.current) { inst.current.destroy(); inst.current = null; }
    const list = orgs.slice();
    if (sort === 'rev') list.sort((a, b) => (b.revenue || 0) - (a.revenue || 0));
    else list.sort((a, b) => (a.displayName || a.slug || '').localeCompare(b.displayName || b.slug || ''));
    const labels = list.map(o => o.displayName || o.slug || '?');
    const data = list.map(o => Math.max(o.revenue || 0, 0));
    const maxVal = Math.max.apply(null, data.concat([1]));
    const colorFor = (v) => { const p = v / (maxVal || 1); if (p < 0.15) return '#6ee7b7'; if (p < 0.3) return '#0d9488'; if (p < 0.5) return '#0284c7'; if (p < 0.7) return '#f59e0b'; if (p < 0.85) return '#ea580c'; return '#dc2626'; };
    inst.current = new Chart(ref.current.getContext('2d'), {
      type: 'bar',
      plugins: [orgBarLabels],
      data: { labels, datasets: [{ data, backgroundColor: data.map(colorFor), borderRadius: 3, barThickness: 11, minBarLength: 2 }] },
      options: {
        indexAxis: 'y', responsive: true, maintainAspectRatio: false,
        layout: { padding: { left: 4, right: 64, top: 2, bottom: 2 } },
        plugins: { legend: { display: false }, tooltip: { callbacks: { label: (c) => '$' + Math.round(c.raw).toLocaleString('en-US') + ' net revenue' } } },
        scales: {
          x: { position: 'top', beginAtZero: true, ticks: { callback: (v) => v >= 1000 ? '$' + Math.round(v / 1000) + 'k' : '$' + v, font: { family: 'IBM Plex Sans', size: 10 }, color: '#8A97A8' }, grid: { color: '#EEF1F5' }, border: { display: false } },
          y: { ticks: { font: { family: 'IBM Plex Sans', size: 10.5 }, color: '#0F1B2D', autoSkip: false }, grid: { display: false }, border: { display: false } },
        },
      },
    });
    return () => { if (inst.current) { inst.current.destroy(); inst.current = null; } };
  }, [orgs, sort]);
  const H = Math.max(orgs.length * 21 + 24, 200);
  return (
    <div className="omap-card" style={{ marginTop: 14 }}>
      <div className="omap-head">
        <h2>Revenue by organization</h2>
        <div className="omap-toggle" style={{ marginLeft: 'auto' }}>
          <button className={sort === 'az' ? 'on' : ''} onClick={() => setSort('az')}>A{'\u2013'}Z</button>
          <button className={sort === 'rev' ? 'on' : ''} onClick={() => setSort('rev')}>By revenue</button>
        </div>
      </div>
      <div className="orgbar-scroll">
        <div style={{ height: H }}><canvas ref={ref}></canvas></div>
      </div>
      <div className="omap-foot"><span>{orgs.length} orgs {'\u00b7'} {tfLabel || 'Q1 2026'} net revenue (gross {'\u2212'} refunds) {'\u00b7'} hover or read the bar-end value</span></div>
    </div>
  );
}

function OrgMap() {
  const mapRef = useRef(null);
  const mapInst = useRef(null);
  const markers = useRef([]);
  const pollRef = useRef(null);
  const [snap, setSnap] = useState(null);
  const [loading, setLoading] = useState(true);
  const [building, setBuilding] = useState(false);
  const [progress, setProgress] = useState({ done: 0, total: 0 });
  const [coords, setCoords] = useState({});
  const [mode, setMode] = useState('revenue');
  const [year, setYear] = useState(2026);
  const [quarter, setQuarter] = useState(1);

  const load = (y, qn) => {
    setLoading(true);
    fetch('/qbr/api/orgmap?year=' + y + '&quarter=' + qn).then(r => r.json()).then(d => {
      setSnap(d && d.ok ? d : { orgs: [] });
      setBuilding(!!(d && d.building));
    }).catch(() => setSnap({ orgs: [] })).finally(() => setLoading(false));
  };
  useEffect(() => { load(year, quarter); }, []);
  useEffect(() => () => { if (mapInst.current) { mapInst.current.remove(); mapInst.current = null; } }, []);
  const changeTf = (y, qn) => { setYear(y); setQuarter(qn); setBuilding(false); setSnap(null); load(y, qn); };

  useEffect(() => {
    if (!building) { if (pollRef.current) { clearInterval(pollRef.current); pollRef.current = null; } return; }
    pollRef.current = setInterval(() => {
      fetch('/qbr/api/orgmap/status').then(r => r.json()).then(s => {
        setProgress(s.progress || { done: 0, total: 0 });
        if (!s.building) { setBuilding(false); load(year, quarter); }
      }).catch(() => {});
    }, 3000);
    return () => { if (pollRef.current) clearInterval(pollRef.current); };
  }, [building, year, quarter]);

  const build = () => {
    setBuilding(true); setProgress({ done: 0, total: 0 });
    fetch('/qbr/api/orgmap/refresh', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ year: year, quarter: quarter }) }).then(r => r.json()).catch(() => {});
  };

  const orgs = (snap && snap.orgs) || [];
  const placeable = orgs.filter(o => o.zip);

  // Geocode modal zips client-side (shared _zipGeo localStorage cache)
  useEffect(() => {
    if (!placeable.length) return;
    let cache = {}; try { cache = JSON.parse(localStorage.getItem('_zipGeo') || '{}'); } catch (e) {}
    const need = placeable.filter(o => !cache[o.zip]);
    if (!need.length) { setCoords(Object.assign({}, cache)); return; }
    let batch = 0; const size = 8; let stop = false;
    const run = () => {
      if (stop) return;
      const slice = need.slice(batch * size, (batch + 1) * size);
      if (!slice.length) { try { localStorage.setItem('_zipGeo', JSON.stringify(cache)); } catch (e) {} setCoords(Object.assign({}, cache)); return; }
      Promise.all(slice.map(o => fetch('https://api.zippopotam.us/us/' + encodeURIComponent(o.zip))
        .then(r => r.ok ? r.json() : null)
        .then(d => { if (d && d.places && d.places[0]) cache[o.zip] = [parseFloat(d.places[0].latitude), parseFloat(d.places[0].longitude)]; })
        .catch(() => {}))).then(() => { batch++; setCoords(Object.assign({}, cache)); setTimeout(run, 180); });
    };
    run();
    return () => { stop = true; };
  }, [snap]);

  // Build / update map
  useEffect(() => {
    if (!mapRef.current) { if (mapInst.current) { mapInst.current.remove(); mapInst.current = null; } return; }
    if (!placeable.length) return;
    const pts = placeable.filter(o => coords[o.zip]).map(o => Object.assign({}, o, { lat: coords[o.zip][0], lng: coords[o.zip][1] }));
    if (!mapInst.current) {
      mapInst.current = L.map(mapRef.current, { scrollWheelZoom: true, zoomControl: true }).setView([39.5, -98.35], 4);
      L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { attribution: '\u00A9 OpenStreetMap', maxZoom: 18, opacity: 0.9 }).addTo(mapInst.current);
    }
    const map = mapInst.current;
    markers.current.forEach(m => map.removeLayer(m)); markers.current = [];
    if (!pts.length) return;
    const valOf = (o) => mode === 'revenue' ? (o.revenue || 0) : mode === 'transactions' ? (o.transactions || 0) : (o.users || 0);
    const maxVal = Math.max.apply(null, pts.map(valOf)) || 1;
    const money = (n) => '$' + Math.round(n || 0).toLocaleString('en-US');
    const num = (n) => Math.round(n || 0).toLocaleString('en-US');
    pts.forEach(o => {
      const val = valOf(o); const pct = val / maxVal;
      const r = Math.max(Math.sqrt(pct) * 30, 6);
      let color;
      if (pct < 0.15) color = '#6ee7b7'; else if (pct < 0.3) color = '#0d9488'; else if (pct < 0.5) color = '#0284c7';
      else if (pct < 0.7) color = '#f59e0b'; else if (pct < 0.85) color = '#ea580c'; else color = '#dc2626';
      const mk = L.circleMarker([o.lat, o.lng], { radius: r, fillColor: color, fillOpacity: 0.72, color: '#fff', weight: 2 }).addTo(map);
      mk.bindTooltip(
        '<div class="tn">' + o.displayName + '</div>' +
        (o.city ? ('<div style="color:#8A97A8">' + o.city + (o.state ? ', ' + o.state : '') + '</div>') : '') +
        '<div style="margin-top:4px">' + money(o.revenue) + ' revenue</div>' +
        '<div>' + num(o.transactions) + ' transactions</div>' +
        '<div>' + num(o.users) + ' users</div>',
        { direction: 'top', className: 'org-tip', opacity: 1 }
      );
      markers.current.push(mk);
    });
  }, [coords, mode, snap]);

  const hasMap = !loading && !building && orgs.length > 0;
  const placed = placeable.length, totalOrgs = orgs.length;
  const gen = snap && snap.generatedAt ? new Date(snap.generatedAt).toLocaleString('en-US', { month: 'short', day: 'numeric', hour: 'numeric', minute: '2-digit' }) : '';
  const tfLabel = 'Q' + quarter + ' ' + year;
  const pc = progress.total ? Math.round(progress.done / progress.total * 100) : 0;
  return (
    <React.Fragment>
    <div className="omap-card">
      <div className="omap-head">
        <h2>Where are your orgs?</h2>
        <div className="tf-pick" style={{ marginLeft: 'auto' }}>
          <select value={quarter} onChange={e => changeTf(year, +e.target.value)} disabled={building}>
            {[1,2,3,4].map(n => <option key={n} value={n}>Q{n}</option>)}
          </select>
          <select value={year} onChange={e => changeTf(+e.target.value, quarter)} disabled={building}>
            {[2024,2025,2026].map(y => <option key={y} value={y}>{y}</option>)}
          </select>
        </div>
        {hasMap && (
          <div className="omap-toggle">
            <button className={mode === 'revenue' ? 'on' : ''} onClick={() => setMode('revenue')}>Revenue</button>
            <button className={mode === 'transactions' ? 'on' : ''} onClick={() => setMode('transactions')}>Transactions</button>
            <button className={mode === 'users' ? 'on' : ''} onClick={() => setMode('users')}>Users</button>
          </div>
        )}
      </div>

      {loading && <div className="omap-cta" style={{ color: '#8A97A8', fontSize: 13 }}>Loading…</div>}

      {!loading && building && <div className="omap-cta">
        <h3>Building the {tfLabel} snapshot…</h3>
        <p>Pulling {tfLabel} revenue, transactions, and users for every org. This takes a couple of minutes{progress.total ? ' (' + progress.done + ' of ' + progress.total + ' orgs · ' + pc + '%)' : ''}.</p>
        {window.JuiceLoader ? <JuiceLoader messages={['Sweeping the fleet\u2026', 'Counting users\u2026', 'Reconciling revenue\u2026', 'Mapping the country\u2026']} /> : null}
      </div>}

      {!loading && !building && !orgs.length && <div className="omap-cta">
        <h3>No {tfLabel} snapshot yet</h3>
        <p>A national map of every rec.us org — revenue, transactions, and users for {tfLabel}, placed by where each org's users cluster. Building pulls data for all ~58 orgs, so it runs once and caches per quarter.</p>
        <button className="build-btn" onClick={build}>Build {tfLabel} snapshot</button>
      </div>}

      {hasMap && <div ref={mapRef} className="omap-wrap"></div>}
      {hasMap && <div className="omap-foot">
        <span>{placed} of {totalOrgs} orgs placed · {tfLabel} · sized and colored by {mode} · hover for details</span>
        <span className="lg"><span className="dot" style={{ background: '#6ee7b7' }} />Low<span className="dot" style={{ background: '#0284c7', marginLeft: 6 }} />Med<span className="dot" style={{ background: '#f59e0b', marginLeft: 6 }} />High<span className="dot" style={{ background: '#dc2626', marginLeft: 6 }} />Top</span>
        <button className="refresh-btn" style={{ marginLeft: 'auto' }} onClick={build}>Rebuild</button>
        {gen && <span>Updated {gen}</span>}
      </div>}
    </div>
    {hasMap && <OrgRevChart orgs={orgs} tfLabel={tfLabel} />}
    </React.Fragment>
  );
}

function App() {
  const params = new URLSearchParams(location.search);
  const printMode = params.get('_print') === '1';
  const [data, setData] = useState(PREVIEW ? MOCK : null);
  const [q, setQ] = useState(parseInt(params.get('quarter')) || 3);
  const [year, setYear] = useState(parseInt(params.get('year')) || 2025);
  const [ready, setReady] = useState(false);
  const [loading, setLoading] = useState(false);

  // Org combobox — local ORGS list + live search across every platform org
  const [localOrgs, setLocalOrgs] = useState(ORG_OPTIONS.map(([slug, displayName]) => ({ slug, displayName, orgId: null })));
  const [sel, setSel] = useState(null);
  const [orgQuery, setOrgQuery] = useState('');
  const [results, setResults] = useState([]);
  const [openDrop, setOpenDrop] = useState(false);

  // Dashboard: metrics strip, saved-QBR history, email box, toast
  const [metrics, setMetrics] = useState(null);
  const [history, setHistory] = useState([]);
  const [savedId, setSavedId] = useState(null);
  const [emailRow, setEmailRow] = useState(null);
  const [emailTo, setEmailTo] = useState('');
  const [toast, setToast] = useState(null);
  const [tab, setTab] = useState('generate');

  const refreshDash = () => {
    if (PREVIEW || printMode) return;
    fetch('/qbr/api/metrics').then(r => r.ok ? r.json() : null).then(d => { if (d) setMetrics(d); }).catch(() => {});
    fetch('/qbr/api/history?limit=100').then(r => r.ok ? r.json() : null).then(d => { if (d) setHistory(d.items || []); }).catch(() => {});
  };
  useEffect(() => { refreshDash(); }, []);

  useEffect(() => {
    fetch('/qbr/api/orgs').then(r => r.ok ? r.json() : null).then(d => {
      const list = (d && Array.isArray(d.orgs) && d.orgs.length) ? d.orgs : null;
      if (list) setLocalOrgs(list);
      const pool = list || localOrgs;
      const def = pool.find(o => o.slug === (params.get('org') || 'watertown')) || pool[0];
      if (def) { setSel(s => s || def); setOrgQuery(s => s || def.displayName); }
    }).catch(() => {
      const def = localOrgs.find(o => o.slug === (params.get('org') || 'watertown')) || localOrgs[0];
      if (def) { setSel(def); setOrgQuery(def.displayName); }
    });
  }, []);

  useEffect(() => {
    if (!openDrop) return;
    const q = orgQuery.trim().toLowerCase();
    if (!q || (sel && orgQuery === sel.displayName)) { setResults(localOrgs); return; }
    setResults(localOrgs.filter(o => o.displayName.toLowerCase().includes(q) || (o.slug || '').toLowerCase().includes(q)));
  }, [orgQuery, openDrop, localOrgs]);

  useEffect(() => {
    if (printMode) document.body.classList.add('print');
  }, [printMode]);

  useEffect(() => {
    if (!data) return;
    let cancelled = false;
    const fontsReady = (document.fonts && document.fonts.ready) ? document.fonts.ready : Promise.resolve();
    fontsReady.then(() => { if (!cancelled) setTimeout(() => setReady(true), 200); });
    return () => { cancelled = true; };
  }, [data]);

  const generate = (payload) => {
    if (PREVIEW) { setData({ ...MOCK }); return; }
    setReady(false); setLoading(true); setData(null); setSavedId(null);
    fetch('/qbr/api/generate', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload),
    }).then(r => r.json()).then(d => {
      if (d && d.ok) { setData(d); setSavedId(d.savedId || null); refreshDash(); }
      else setData(MOCK);
    }).catch(() => setData(MOCK)).finally(() => setLoading(false));
  };
  const openSaved = (id) => {
    setReady(false); setLoading(true); setData(null); setTab('generate');
    fetch('/qbr/api/saved/' + encodeURIComponent(id)).then(r => r.json()).then(d => {
      if (d && d.ok) { setData(d); setSavedId(d.savedId || id); window.scrollTo({ top: 0, behavior: 'smooth' }); }
    }).catch(() => {}).finally(() => setLoading(false));
  };
  const sendEmail = (id) => {
    const addr = emailTo.trim();
    if (!/^[^@\s]+@rec\.us$/i.test(addr)) { setToast('Enter a @rec.us address'); setTimeout(() => setToast(null), 2600); return; }
    setToast('Sending\u2026');
    fetch('/qbr/api/email', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ id, to: addr }) })
      .then(r => r.json()).then(d => {
        setToast(d && d.ok ? ('Emailed to ' + addr) : ('Email failed: ' + ((d && d.error) || 'error')));
        if (d && d.ok) { try { localStorage.setItem('qbrEmail', addr); } catch (e) {} setEmailRow(null); setEmailTo(''); refreshDash(); }
      }).catch(() => setToast('Email failed')).finally(() => setTimeout(() => setToast(null), 3400));
  };
  const run = () => { const o = sel || {}; generate({ orgSlug: o.slug, orgId: o.orgId, displayName: o.displayName, year, quarter: q }); };
  const pick = (o) => { setSel(o); setOrgQuery(o.displayName); setOpenDrop(false); };
  const pdfUrl = () => {
    if (savedId) return '/qbr/api/pdf?saved=' + encodeURIComponent(savedId);
    const o = sel || {};
    const qs = new URLSearchParams({ org: o.slug || '', year: String(year), quarter: String(q) });
    if (o.orgId) qs.set('orgId', o.orgId);
    if (o.displayName) qs.set('displayName', o.displayName);
    return '/qbr/api/pdf?' + qs.toString();
  };

  // Auto-generate on mount ONLY for the PDF/print route; the interactive page waits for the Generate button.
  useEffect(() => {
    if (PREVIEW || !printMode) return;
    const sid = params.get('saved');
    if (sid) {
      fetch('/qbr/api/saved/' + encodeURIComponent(sid)).then(r => r.json()).then(d => { if (d && d.ok) setData(d); }).catch(() => {});
      return;
    }
    generate({ orgSlug: params.get('org') || 'watertown', orgId: params.get('orgId') || undefined, displayName: params.get('displayName') || undefined, year: parseInt(params.get('year')) || 2025, quarter: parseInt(params.get('quarter')) || 3 });
  }, []);

  const years = [2024, 2025, 2026];
  const fmtGen = (iso) => { try { return new Date(iso).toLocaleString('en-US', { month:'short', day:'numeric', hour:'numeric', minute:'2-digit' }); } catch (e) { return iso; } };

  if (printMode) {
    return (
      <div className="wrap">
        {loading && (window.JuiceLoader
          ? <div className="page"><JuiceLoader messages={['Pulling the GL\u2026','Charting the quarter\u2026']} /></div>
          : <div className="page" style={{ padding: 48, textAlign: 'center', color: '#888' }}>Generating…</div>)}
        {!loading && data && <Report data={data} />}
        {ready && <div id="report-ready" style={{ display: 'none' }}></div>}
      </div>
    );
  }

  return (
    <div className="wrap">
      <div className="qbr-head">
        <div>
          <h1>Quarterly Business Review</h1>
          <div className="sub">Cross-org partner reviews {'\u2014'} generate, save, and share</div>
        </div>
      </div>

      <div className="tabs">
        <button className={tab === 'generate' ? 'tab on' : 'tab'} onClick={() => setTab('generate')}>Generate</button>
        <button className={tab === 'saved' ? 'tab on' : 'tab'} onClick={() => setTab('saved')}>Saved QBRs</button>
        <button className={tab === 'map' ? 'tab on' : 'tab'} onClick={() => setTab('map')}>Organization Metrics</button>
      </div>

      {tab === 'generate' && <React.Fragment>
      {!PREVIEW && metrics && (
        <div className="stats">
          <div className="stat"><div className="stat-num">{fmtNum(metrics.generated30)}</div><div className="stat-lab">Generated {'\u00b7'} 30d</div></div>
          <div className="stat"><div className="stat-num">{fmtNum(metrics.views30)}</div><div className="stat-lab">Views {'\u00b7'} 30d</div></div>
          <div className="stat"><div className="stat-num">{fmtNum(metrics.pdf30)}</div><div className="stat-lab">PDFs {'\u00b7'} 30d</div></div>
          <div className="stat"><div className="stat-num">{fmtNum(metrics.email30)}</div><div className="stat-lab">Emails {'\u00b7'} 30d</div></div>
          <div className="stat"><div className="stat-num">{fmtNum(metrics.orgs30)}</div><div className="stat-lab">Orgs {'\u00b7'} 30d</div></div>
          <div className="stat"><div className="stat-num">{fmtNum(metrics.saved)}</div><div className="stat-lab">Saved total</div></div>
        </div>
      )}

      <div className="picker">
        <div className="field" style={{ position: 'relative' }}>
          <label>Organization</label>
          <input className="org-input" type="text" value={orgQuery} placeholder="Search any org…"
            onChange={e => { setOrgQuery(e.target.value); setOpenDrop(true); }}
            onFocus={() => setOpenDrop(true)}
            onBlur={() => setTimeout(() => setOpenDrop(false), 180)} />
          {openDrop && results.length > 0 && (
            <div className="org-drop">
              {results.map(o => (
                <div key={o.slug || o.orgId} className="org-opt" onMouseDown={() => pick(o)}>
                  <span className="org-opt-name">{o.displayName}</span>
                  {o.slug && <span className="org-opt-slug">{o.slug}</span>}
                </div>
              ))}
            </div>
          )}
        </div>
        <div className="field">
          <label>Quarter</label>
          <select value={q} onChange={e => setQ(+e.target.value)}>
            {[1,2,3,4].map(n => <option key={n} value={n}>Q{n}</option>)}
          </select>
        </div>
        <div className="field">
          <label>Year</label>
          <select value={year} onChange={e => setYear(+e.target.value)}>
            {years.map(y => <option key={y} value={y}>{y}</option>)}
          </select>
        </div>
        {PREVIEW && <span className="tag">PREVIEW · mock data</span>}
        <button className="go" onClick={run}>Generate QBR</button>
        {!PREVIEW && data && <a className="pdf-btn" href={pdfUrl()} target="_blank" rel="noopener">Download PDF</a>}
      </div>

      {loading && (window.JuiceLoader
        ? <div className="page"><JuiceLoader messages={['Pulling the GL\u2026','Tallying enrollments\u2026','Counting reservations\u2026','Reconciling refunds\u2026','Charting the quarter\u2026']} /></div>
        : <div className="page" style={{ padding: 48, textAlign: 'center', color: '#888' }}>Generating…</div>)}
      {!loading && data && <Report data={data} />}
      {ready && <div id="report-ready" style={{ display: 'none' }}></div>}
      </React.Fragment>}

      {tab === 'map' && <OrgMap />}

      {tab === 'saved' && (
        <div className="hist">
          <div className="hist-h">Saved QBRs</div>
          {history.length === 0
            ? <div className="hist-empty">No saved QBRs yet {'\u2014'} generate one above and it will be archived here, frozen at the moment you ran it (numbers stay as-shown even as later data lands).</div>
            : history.map(h => (
              <React.Fragment key={h.id}>
                <div className="hrow">
                  <div className="org">
                    {h.logoUrl
                      ? <img src={h.logoUrl} alt="" onError={e => { e.target.style.display = 'none'; }} />
                      : <span style={{ height: 24, width: 24, borderRadius: 5, background: 'var(--mist)', display: 'inline-block' }}></span>}
                    <span className="nm">{h.displayName}</span>
                  </div>
                  <div className="qtr">{h.periodLabel}</div>
                  <div className="gen">{fmtGen(h.generatedAt)}</div>
                  <div className="acts">
                    <button className="rbtn" onClick={() => openSaved(h.id)}>Open</button>
                    <a className="rbtn" href={'/qbr/api/pdf?saved=' + encodeURIComponent(h.id)} target="_blank" rel="noopener">PDF</a>
                    <button className="rbtn em" onClick={() => { const open = emailRow === h.id ? null : h.id; setEmailRow(open); if (open) { try { setEmailTo(localStorage.getItem('qbrEmail') || ''); } catch (e) { setEmailTo(''); } } }}>Email</button>
                  </div>
                </div>
                {emailRow === h.id && (
                  <div className="email-pop">
                    <input type="email" placeholder="you@rec.us" value={emailTo} autoFocus
                      onChange={e => setEmailTo(e.target.value)}
                      onKeyDown={e => { if (e.key === 'Enter') sendEmail(h.id); }} />
                    <button className="rbtn em" onClick={() => sendEmail(h.id)}>Send</button>
                    <span className="hint">@rec.us addresses only</span>
                  </div>
                )}
              </React.Fragment>
            ))
          }
        </div>
      )}

      {toast && <div className="toast">{toast}</div>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
