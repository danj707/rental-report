<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Facility Rentals</title>
<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.3.1/umd/react.production.min.js"></script>
<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.3.1/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.26.9/babel.min.js"></script>
<style>
:root{--bg:#f5f6f8;--card:#fff;--ink:#1f2430;--muted:#5b6472;--line:#e5e7eb;
  --accent:#2563eb;--reserved:#fed7aa;--reserved-dark:#c2410c;--closed:#e5e7eb;--closed-dark:#9ca3af;
  --shadow:0 1px 3px rgba(16,24,40,.08),0 1px 2px rgba(16,24,40,.06)}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);color:var(--ink);font:14px/1.45 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif}
.embed .wrap{padding:4px}
.embed .sticky-hdr{border-radius:0}
.wrap{max-width:1080px;margin:0 auto;padding:20px}
.toolbar-row{display:flex;flex-wrap:wrap;gap:8px;align-items:center;padding:8px 14px;border-bottom:1px solid var(--line)}
.toolbar-row .grow{flex:1}
.tb-weather{font-size:13px;color:#374151;font-weight:500;margin-left:10px;white-space:nowrap;cursor:default}
.tb-date{padding:4px 6px;border:1px solid #d1d5db;border-radius:6px;font-size:12px;font-family:inherit;margin-left:8px;color:#374151;cursor:pointer}
.tb-legend{display:flex;gap:10px;align-items:center;font-size:11px;color:#6b7280;margin-right:8px}
.tb-legend .sw{width:14px;height:14px;border-radius:2px;display:inline-block;vertical-align:middle;margin-right:3px}
@media(max-width:700px){.tb-legend{display:none}.tb-date{display:none}.tb-weather{display:none}}
button,select{font:inherit;border:1px solid var(--line);background:#fff;color:var(--ink);
  border-radius:8px;padding:6px 12px;cursor:pointer;font-size:13px;transition:border-color .12s,background .12s}
button:hover{border-color:#cbd5e1;background:#f8fafc}
button.primary{background:var(--accent);border-color:var(--accent);color:#fff}
button.primary:hover{filter:brightness(.95)}
.seg{display:inline-flex;border:1px solid var(--line);border-radius:8px;overflow:hidden}
.seg button{border:none;border-radius:0;background:#fff;font-weight:500;padding:6px 14px;font-size:13px}
.seg button.on{background:var(--accent);color:#fff;font-weight:600}
.hdr{display:flex;align-items:center;gap:12px;margin:4px 2px 4px}
.hdr img{height:40px;max-width:160px;object-fit:contain}
.hdr h1{font-size:20px;margin:0}
.hdr .sub{color:var(--muted);font-size:13px}
.range{font-weight:600;font-size:14px;color:var(--ink)}
.wiz-bar{padding:14px 16px;background:linear-gradient(135deg,#eef2ff,#e0e7ff);border:2px solid #818cf8;border-radius:12px;cursor:pointer;text-align:center;font-size:14px;color:#3730a3;font-weight:600;transition:all .15s;box-shadow:0 2px 8px rgba(99,102,241,0.12)}
.wiz-bar:hover{background:linear-gradient(135deg,#e0e7ff,#c7d2fe)}
.wiz-wrap{padding:20px 24px;background:linear-gradient(135deg,#eef2ff,#f5f3ff);border:2px solid #818cf8;border-radius:12px;margin:12px 12px 0;box-shadow:0 4px 16px rgba(99,102,241,0.15)}
.wiz-head{display:flex;justify-content:space-between;align-items:center;font-size:15px;font-weight:600;color:#312e81;margin-bottom:12px}
.wiz-x{background:none;border:none;font-size:16px;cursor:pointer;color:#6b7280;padding:2px 6px}
.wiz-x:hover{color:#111}
.wiz-step{animation:wizFade .2s ease}
@keyframes wizFade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.wiz-q{font-size:14px;color:#374151;margin-bottom:10px;font-weight:500}
.wiz-crumb{font-size:12px;color:#6366f1;font-weight:600;margin-bottom:8px}
.wiz-crumb-link{cursor:pointer;text-decoration:underline;text-decoration-style:dotted;text-underline-offset:2px}
.wiz-crumb-link:hover{color:#4338ca}
.wiz-opts{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:8px}
.wiz-pill{padding:8px 14px;border-radius:20px;border:1px solid #c7d2fe;background:#fff;font-size:13px;cursor:pointer;color:#312e81;transition:all .15s;font-family:inherit;font-weight:500}
.wiz-pill:hover{background:#e0e7ff;border-color:#818cf8}
.wiz-alt{border-style:dashed;color:#6b7280}
.wiz-go{background:#4f46e5;color:#fff;border-color:#4f46e5}
.wiz-go:hover{background:#4338ca}
.wiz-datepick{padding:8px 14px;border-radius:20px;border:1px dashed #c7d2fe;background:#fff;font-size:13px;cursor:pointer;color:#6b7280;font-family:inherit}
.wiz-back{background:none;border:none;font-size:12px;color:#6b7280;cursor:pointer;padding:4px 0;margin-top:4px}
.wiz-back:hover{color:#374151}
.wiz-results{background:linear-gradient(135deg,#f0fdf4,#ecfdf5);border-color:#86efac}
.wiz-results-row{display:flex;align-items:center;gap:12px;flex-wrap:wrap;font-size:14px;color:#166534}
.wiz-results-row strong{font-weight:600}
.wiz-fb-inline{margin-left:auto;display:flex;align-items:center;gap:4px}
.wiz-collapsed .wiz-bar{margin:0;border-radius:12px 12px 0 0}
.wiz-fb{display:flex;align-items:center;gap:8px;padding:8px 16px;background:#f5f3ff;border:2px solid #818cf8;border-top:none;border-radius:0 0 12px 12px;font-size:13px;color:#4b5563}
.wiz-fb-btn{background:none;border:none;font-size:18px;cursor:pointer;padding:2px 6px;border-radius:6px;transition:background .15s}
.wiz-fb-btn:hover{background:#e0e7ff}
.wiz-fb-ty{padding:8px 16px;background:#f0fdf4;border:2px solid #86efac;border-top:none;border-radius:0 0 12px 12px;font-size:13px;color:#166534;text-align:center}
.wiz-sparkle{margin-right:6px}
.modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.5);z-index:1000;display:flex;align-items:center;justify-content:center;padding:20px}
.modal-card{background:#fff;border-radius:12px;max-width:480px;width:100%;max-height:90vh;overflow-y:auto;position:relative;box-shadow:0 20px 60px rgba(0,0,0,0.3)}
.modal-close{position:absolute;top:12px;right:12px;background:rgba(0,0,0,0.4);color:#fff;border:none;width:28px;height:28px;border-radius:50%;cursor:pointer;font-size:14px;z-index:1;display:flex;align-items:center;justify-content:center}
.modal-close:hover{background:rgba(0,0,0,0.6)}
.modal-img{width:100%;height:200px;object-fit:cover;border-radius:12px 12px 0 0}
.modal-body{padding:20px}
.modal-body h2{margin:0 0 4px;font-size:20px;color:#111}
.modal-type{font-size:13px;color:#6b7280;margin-bottom:4px}
.modal-loc{font-size:13px;color:#6b7280;margin-bottom:12px}
.modal-desc{font-size:14px;color:#374151;line-height:1.5;margin:0 0 16px}
.modal-details{display:flex;flex-wrap:wrap;gap:12px;font-size:13px;color:#4b5563;margin-bottom:16px}
.modal-details span{display:flex;align-items:center;gap:4px}
.modal-book{display:inline-block;padding:10px 20px;background:#1e40af;color:#fff;text-decoration:none;border-radius:8px;font-size:14px;font-weight:600;transition:background .15s}
.modal-book:hover{background:#1e3a8a}
.wiz-result{padding:12px 20px;background:linear-gradient(135deg,#f0fdf4,#ecfdf5);border:1px solid #86efac;border-radius:10px;margin:10px 12px 0;font-size:14px;color:#166534;display:flex;align-items:center;gap:8px}
.wiz-result strong{font-weight:600}
.wiz-result-x{background:none;border:none;color:#6b7280;cursor:pointer;font-size:14px;margin-left:auto;padding:2px 6px}
.wiz-result-x:hover{color:#111}
.filters{padding:10px 16px;display:flex;flex-direction:column;gap:8px;border-bottom:1px solid #e5e7eb}
.filter-row{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.filter-label{font-size:11px;font-weight:600;color:#6b7280;text-transform:uppercase;letter-spacing:0.5px;min-width:60px}
.filter-pills{display:flex;gap:4px;flex-wrap:wrap}
.pill{padding:4px 10px;border-radius:12px;border:1px solid #d1d5db;background:#fff;font-size:12px;cursor:pointer;color:#374151;transition:all .15s;font-family:inherit}
.pill:hover{background:#f3f4f6;border-color:#9ca3af}
.pill.active{background:#1e40af;color:#fff;border-color:#1e40af}
.nightly-bar{display:flex;align-items:center;justify-content:center;flex:1;min-height:56px;border-radius:8px;gap:12px;padding:8px 16px}
.nightly-bar.avail{background:#dcfce7;border:1px solid #86efac}
.nightly-bar.unknown{background:#f0fdf4;border:1px dashed #86efac}
.nightly-avail-badge{font-weight:600;font-size:13px;color:#166534}
.nightly-detail{font-size:12px;color:#4b5563;display:flex;gap:12px;align-items:center}
.nightly-detail span{white-space:nowrap}
.fac-list{background:var(--card);border:1px solid var(--line);border-top:none;border-radius:0 0 12px 12px;box-shadow:var(--shadow);overflow:hidden}
.sticky-hdr{position:sticky;top:0;z-index:10;background:var(--card);border:1px solid var(--line);border-radius:10px 10px 0 0;box-shadow:0 2px 6px rgba(0,0,0,.06)}
.time-ruler{display:flex;align-items:center;height:42px}
.time-ruler .tr-label{width:340px;min-width:340px;padding:0 12px;font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;border-right:1px solid var(--line)}
.time-ruler .tr-track{flex:1;position:relative;height:100%;padding-right:12px}
.time-ruler .tr-tick{position:absolute;font-size:11px;color:#374151;font-weight:600;transform:translateX(-50%);top:50%;margin-top:-6px}
.fac-row{display:flex;contain:layout style;align-items:center;border-bottom:1px solid #f0f1f3;min-height:48px;transition:background .08s}
.fac-row:last-child{border-bottom:none}
.fac-row:hover{background:#fafbfc}
.fac-label{width:340px;min-width:340px;padding:8px 12px;display:flex;align-items:center;gap:10px;border-right:1px solid var(--line)}
.fac-thumb{width:100px;height:100px;border-radius:6px;object-fit:cover;flex-shrink:0;background:#eef0f2}
.fac-thumb-placeholder{width:100px;height:100px;font-size:32px;border-radius:6px;flex-shrink:0;background:#eef0f2;display:flex;align-items:center;justify-content:center;font-size:20px}
.fac-label .ficon{font-size:16px;flex-shrink:0;line-height:1}
.fac-label .finfo{flex:1;min-width:0}
.fac-label .fname{font-size:12.5px;font-weight:600;color:var(--ink);line-height:1.3;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.fac-label .fmeta{font-size:10px;color:var(--muted);line-height:1.35}
.book-sm{flex-shrink:0;padding:3px 10px;border-radius:6px;font-size:11px;font-weight:600;
  background:var(--accent);color:#fff;border:none;cursor:pointer;text-decoration:none;transition:filter .12s;white-space:nowrap}
.book-sm:hover{filter:brightness(.9);background:var(--accent)}
.book-sm.secondary{background:#fff;color:var(--accent);border:1px solid var(--accent)}
.book-sm.secondary:hover{background:#eff6ff}
.fac-bar{flex:1;min-height:0;padding:6px 12px 6px 0;display:flex;align-items:center}
.bar-track{position:relative;width:100%;height:72px;background:#f8f9fa;border-radius:5px;overflow:hidden;border:1px solid #e0e2e6}
.bar-block{position:absolute;top:2px;bottom:2px;border-radius:3px}
.bar-block.avail{background:#bbf7d0;border:2px solid #16a34a;background-image:none}
.bar-block.avail .blabel{color:#15803d}
.bar-block.reserved{background:repeating-linear-gradient(-45deg,#fed7aa,#fed7aa 4px,#fde0b0 4px,#fde0b0 8px);border:2px solid #c2410c}
.bar-block.gap{background:repeating-linear-gradient(-45deg,#fed7aa,#fed7aa 4px,#fde0b0 4px,#fde0b0 8px);border:2px solid #c2410c}
.bar-block.gap .blabel{color:var(--reserved-dark)}
.bar-block.closed{background:repeating-linear-gradient(45deg,#e5e7eb,#e5e7eb 4px,#d4d6da 4px,#d4d6da 8px);border:2px solid #6b7280}
.bar-block.past{background:#f3f4f6;border:2px solid #d1d5db}
.bar-block .blabel{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
  font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.03em;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;padding:0 4px}
.bar-block.reserved .blabel{color:var(--reserved-dark)}
.bar-block.closed .blabel{color:var(--closed-dark)}
.bar-gridline{position:absolute;top:0;bottom:0;width:1px;background:rgba(0,0,0,.18);z-index:1}
.bar-gridline.half{background:rgba(0,0,0,.10)}
.bar-now{position:absolute;top:-3px;bottom:-3px;width:2.5px;background:#dc2626;border-radius:1px;z-index:5}
.global-now{position:absolute;top:0;bottom:0;width:2px;background:#dc2626;z-index:15;pointer-events:none}
.global-now::before{content:'Now';position:absolute;top:-16px;left:50%;transform:translateX(-50%);font-size:8px;color:#dc2626;font-weight:700;white-space:nowrap}
.bar-now::before{content:'';position:absolute;top:-3px;left:-3px;width:8px;height:8px;border-radius:50%;background:#ef4444}
.bar-timelabel{position:absolute;top:1px;transform:translateX(-50%);font-size:8.5px;color:rgba(0,0,0,.38);z-index:2;pointer-events:none;font-variant-numeric:tabular-nums;font-weight:500}
.group-hdr{display:flex;align-items:center;gap:10px;padding:10px 14px;border-bottom:1px solid var(--line);
  background:#fafbfc;cursor:pointer;user-select:none;transition:background .08s}
.group-hdr:hover{background:#f0f1f4}
.group-hdr .gicon{font-size:18px;line-height:1}
.group-hdr .gname{font-size:13px;font-weight:700;color:var(--ink);flex:1}
.group-hdr .gcount{font-size:11px;font-weight:600;padding:2px 10px;border-radius:99px}
.group-hdr .gcount.has-avail{background:#dcfce7;color:#166534}
.group-hdr .gcount.some-avail{background:#fef9c3;color:#854d0e}
.group-hdr .gcount.all-booked{background:#fee2e2;color:#991b1b}
.group-hdr .garrow{font-size:12px;color:var(--muted);transition:transform .15s}
.group-hdr .garrow.open{transform:rotate(90deg)}
.week-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:8px}
.week-card{background:var(--card);border:1px solid var(--line);border-radius:10px;box-shadow:var(--shadow);overflow:hidden;cursor:pointer;transition:border-color .12s,box-shadow .12s}
.week-card:hover{border-color:#94a3b8;box-shadow:0 2px 8px rgba(0,0,0,.08)}
.week-card.today{border-color:var(--accent);border-width:2px}
.week-card .wday{padding:8px 10px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);border-bottom:1px solid var(--line)}
.week-card.today .wday{color:var(--accent);background:#eff6ff}
.week-card .wday small{display:block;font-size:14px;font-weight:700;text-transform:none;letter-spacing:0;color:var(--ink);margin-top:2px}
.week-card.today .wday small{color:var(--accent)}
.wfac{padding:5px 10px;border-bottom:1px solid #f4f5f7;display:flex;align-items:center;gap:6px;font-size:11.5px}
.wfac:last-child{border-bottom:none}
.wfac .wicon{font-size:12px;flex-shrink:0}
.wfac .wname{flex:1;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.wfac .wstatus{font-size:10px;font-weight:700;padding:2px 8px;border-radius:99px;white-space:nowrap}
.wfac .wstatus.open{background:#dcfce7;color:#166534}
.wfac .wstatus.partial{background:#fef9c3;color:#854d0e}
.wfac .wstatus.full{background:#fee2e2;color:#991b1b}
.loading{text-align:center;padding:60px 20px;color:var(--muted)}
.loading .spin{display:inline-block;width:20px;height:20px;border:2.5px solid var(--line);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;margin-right:10px;vertical-align:middle}
@keyframes spin{to{transform:rotate(360deg)}}
.error-box{background:#fef2f2;border:1px solid #fecaca;border-radius:12px;padding:20px;text-align:center;color:#991b1b;margin:20px 0}
.footer{text-align:center;font-size:12px;color:var(--muted);margin-top:24px}
.footer a{color:var(--muted);font-weight:600;text-decoration:none}
.footer a:hover{text-decoration:underline}
.date-cap{padding:14px 20px;background:#fffbeb;border:1px solid #fcd34d;border-radius:10px;margin:12px 0 0;text-align:center;font-size:13px;color:#92400e;line-height:1.5}
.date-cap a{color:#92400e;font-weight:600;text-decoration:underline;text-underline-offset:2px}
.sr-only{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border:0}
@media(max-width:800px){.week-grid{grid-template-columns:1fr 1fr}.fac-label{width:200px;min-width:200px}.time-ruler .tr-label{width:200px;min-width:200px}.fac-thumb,.fac-thumb-placeholder{width:72px;height:72px}}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useMemo,useCallback,useRef} = React;

/* ── config injected by server ── */
const CFG = window.__RC__ || {};
const ORG_SLUG = CFG.slug || window.location.pathname.split('/').filter(Boolean)[0] || '';

// Analytics tracking — fire-and-forget
function trackCalendarEvent(type, entity, meta) {
  console.log('[track]', type, entity, meta);
  try {
    fetch('/' + ORG_SLUG + '/api/track', {
      method: 'POST', headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ type: type, source: 'rentalcalendar', entity: entity || null, meta: meta || {} })
    }).then(function(r){ console.log('[track] response:', r.status); })
     .catch(function(e){ console.error('[track] error:', e); });
  } catch(e) { console.error('[track] exception:', e); }
}
const LOCATION_ID = new URLSearchParams(window.location.search).get('locationId') || CFG.locationId || '';
const EMBED = new URLSearchParams(window.location.search).get('embed') === '1';
const REFRESH = new URLSearchParams(window.location.search).get('refresh') === '1';
const URL_TYPE = new URLSearchParams(window.location.search).get('type') || '';
const URL_LOC = new URLSearchParams(window.location.search).get('location') || '';

/* ── emoji map ── */
const E={"court":"\u{1F3BE}","pool":"\u{1F3CA}","room":"\u{1F3DB}\uFE0F","outdoor-event-space":"\u26FA","picnic-table":"\u{1F9FA}","field":"\u26BD","rink":"\u26F8\uFE0F","gym":"\u{1F3CB}\uFE0F","golf":"\u26F3","campsite":"\u{1F3D5}\uFE0F","bounce-house":"\u{1F389}","other":"\u{1F4CD}"};
function emojiFor(t){return E[t]||"\u{1F4CD}";}
var SITE_TYPES = [
  {key:"field", label:"Fields"},
  {key:"court", label:"Courts"},
  {key:"rink", label:"Rinks"},
  {key:"pool", label:"Pools"},
  {key:"room", label:"Rooms"},
  {key:"gym", label:"Gyms"},
  {key:"outdoor-event-space", label:"Outdoor Event Spaces"},
  {key:"picnic-table", label:"Picnic Tables"},
  {key:"golf", label:"Golf"},
  {key:"campsite", label:"Campsites"},
  {key:"bounce-house", label:"Bounce Houses"},
  {key:"other", label:"Other"},
];

/* ── weather ── */
function weatherEmoji(fc) {
  if (!fc) return "☁️";
  var f = fc.toLowerCase();
  if (f.includes("thunder") || f.includes("storm")) return "⛈️";
  if (f.includes("rain") || f.includes("shower") || f.includes("drizzle")) return "🌧️";
  if (f.includes("snow") || f.includes("blizzard") || f.includes("flurr")) return "❄️";
  if (f.includes("fog") || f.includes("haze") || f.includes("mist")) return "🌫️";
  if (f.includes("cloud") || f.includes("overcast")) return "☁️";
  if (f.includes("partly")) return "⛅";
  if (f.includes("sun") || f.includes("clear") || f.includes("fair")) return "☀️";
  if (f.includes("wind")) return "💨";
  if (f.includes("hot")) return "🔥";
  return "🌤️";
}

function useWeather(coords, dateISO) {
  var state = useState(null);
  var weather = state[0], setWeather = state[1];
  var cacheRef = useRef({});

  useEffect(function() {
    if (!coords || !coords.lat || !dateISO) return;
    var key = dateISO;
    if (cacheRef.current[key]) { setWeather(cacheRef.current[key]); return; }
    // Clear stale weather while we fetch — if no forecast exists for this date, stays null
    setWeather(null);

    var ua = "rec.us-reports/1.0 (dan@rec.us)";
    fetch("https://api.weather.gov/points/" + coords.lat + "," + coords.lon, {headers:{"User-Agent":ua}})
      .then(function(r){return r.json();})
      .then(function(d){
        var url = d.properties && d.properties.forecast;
        if (!url) return;
        return fetch(url, {headers:{"User-Agent":ua}});
      })
      .then(function(r){return r && r.json();})
      .then(function(d){
        if (!d || !d.properties || !d.properties.periods) return;
        var periods = d.properties.periods;
        var match = null, night = null;
        for (var i = 0; i < periods.length; i++) {
          var p = periods[i];
          if (p.startTime && p.startTime.substring(0,10) === dateISO) {
            if (p.isDaytime && !match) match = p;
            if (!p.isDaytime && !night) night = p;
          }
        }
        if (match) {
          var w = {hi:match.temperature, lo:night?night.temperature:null, unit:match.temperatureUnit||"F", desc:match.shortForecast, emoji:weatherEmoji(match.shortForecast)};
          cacheRef.current[key] = w;
          setWeather(w);
        }
      })
      .catch(function(){});
  }, [coords, dateISO]);

  return weather;
}

/* ── helpers ── */
function pad(n){return n<10?'0'+n:''+n;}
function fmtISO(d){return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate());}
function addDays(d,n){var x=new Date(d);x.setDate(x.getDate()+n);return x;}
function startOfWeek(d){var x=new Date(d);x.setDate(x.getDate()-x.getDay());x.setHours(0,0,0,0);return x;}
var DOW=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
var MON=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
var DOWL=['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
function fmtCheckTime(t) {
  if (!t) return '';
  var parts = t.split(':');
  var h = parseInt(parts[0]), m = parseInt(parts[1] || '0');
  var ap = h >= 12 ? 'pm' : 'am';
  var hh = h % 12; if (hh === 0) hh = 12;
  return hh + (m > 0 ? ':' + pad(m) : '') + ap;
}
function minToLabel(min){var h=Math.floor(min/60),m=min%60;var ap=h>=12?'pm':'am';var hh=h%12;if(hh===0)hh=12;return hh+(m?':'+pad(m):'')+ap;}

/* Parse "08:00am" / "05:00pm" / "17:00" → minutes since midnight */
function parseTimeToMin(t) {
  if (!t) return null;
  var s = String(t).toLowerCase().replace(/\s/g, '');
  var m = s.match(/^(\d{1,2}):(\d{2})(am|pm)?$/);
  if (!m) return null;
  var h = parseInt(m[1]), min = parseInt(m[2]), ap = m[3];
  if (ap === 'pm' && h !== 12) h += 12;
  if (ap === 'am' && h === 12) h = 0;
  return h * 60 + min;
}

/* Normalize Metabase date to ISO "YYYY-MM-DD" */
function parseDateToISO(d) {
  if (!d) return '';
  if (/^\d{4}-\d{2}-\d{2}/.test(d)) return d.substring(0, 10);
  var dt = new Date(d);
  if (!isNaN(dt.getTime())) return fmtISO(dt);
  return '';
}

var GROUP_THRESHOLD = 1;
var MAX_DAYS_AHEAD = 30;

/* ── Derive timeline blocks from MCP availability + Metabase reservations ── */
function deriveBlocks(availSlots, dateStr, globalStart, globalEnd, siteOpStart, siteOpEnd, hasAnyData, reservations, dateWithinMcp) {
  // availSlots:    MCP bookable start times { "08:00:00": {availableDurationsMinutes:[60,120]}, ... }
  // reservations:  Metabase actual bookings [{s: startMin, e: endMin}, ...]
  // hasAnyData:    true if MCP returned availability for ANY date for this site
  // dateWithinMcp: true if the selected date falls within the MCP's ~30-day window
  // Returns array of {type:'avail'|'reserved'|'past'|'closed', s, e}
  var now = new Date();
  var nowMin = now.getHours() * 60 + now.getMinutes();
  var isToday = dateStr === fmtISO(now);
  var hasReservations = reservations && reservations.length > 0;
  var hasAvailSlots = availSlots && Object.keys(availSlots).length > 0;
  var hasAnyInfo = hasAnyData || hasReservations;

  // No data from either source — loading fallback
  if (!hasAvailSlots && !hasReservations && !hasAnyData) {
    var blocks = [];
    if (siteOpStart > globalStart) blocks.push({type: 'closed', s: globalStart, e: siteOpStart});
    if (isToday && nowMin > siteOpStart) {
      blocks.push({type: 'past', s: siteOpStart, e: Math.min(nowMin, siteOpEnd)});
      if (nowMin < siteOpEnd) blocks.push({type: 'avail', s: Math.max(nowMin, siteOpStart), e: siteOpEnd});
    } else {
      blocks.push({type: 'avail', s: siteOpStart, e: siteOpEnd});
    }
    if (siteOpEnd < globalEnd) blocks.push({type: 'closed', s: siteOpEnd, e: globalEnd});
    return blocks;
  }

  // Build reserved set from actual Metabase bookings (highest priority)
  var reservedSet = {};
  (reservations || []).forEach(function(r) {
    for (var c = r.s; c < r.e; c += 30) { reservedSet[c] = true; }
  });

  // Build covered set from MCP bookable slots
  var coveredSet = {};
  if (availSlots) {
    Object.keys(availSlots).forEach(function(t) {
      var parts = t.split(':');
      var startMin = parseInt(parts[0]) * 60 + parseInt(parts[1]);
      var durs = availSlots[t].availableDurationsMinutes || [60];
      var maxDur = Math.max.apply(null, durs);
      for (var c = startMin; c < startMin + maxDur; c += 30) { coveredSet[c] = true; }
    });
  }

  // Walk timeline in 30-min slots, assigning each slot a type
  var blocks = [];
  var curType = null;
  var curStart = null;
  for (var m = globalStart; m < globalEnd; m += 30) {
    var type;
    if (m < siteOpStart || m >= siteOpEnd) {
      type = 'closed';
    } else if (reservedSet[m]) {
      // Metabase confirms a booking here → reserved regardless of MCP
      type = 'reserved';
    } else if (coveredSet[m]) {
      // MCP says bookable, Metabase has no booking
      type = isToday && m < nowMin ? 'past' : 'avail';
    } else if (hasAvailSlots || dateWithinMcp) {
      // MCP covers this date (has slots, or date is within its window but fully booked)
      // → slots not covered by MCP are gaps (buffer time, min duration, etc.)
      type = isToday && m < nowMin ? 'past' : 'gap';
    } else {
      // Beyond MCP window — trust Metabase: no reservation here = available
      type = isToday && m < nowMin ? 'past' : 'avail';
    }
    if (type !== curType) {
      if (curType !== null) blocks.push({type: curType, s: curStart, e: m});
      curType = type;
      curStart = m;
    }
  }
  if (curType !== null) blocks.push({type: curType, s: curStart, e: globalEnd});
  return blocks;
}

/* ── Derive operating hours from availability data (fullest day) ── */
function deriveOpHours(availData) {
  var earliest = 24*60, latest = 0;
  Object.keys(availData || {}).forEach(function(dateStr) {
    var slots = availData[dateStr];
    Object.keys(slots).forEach(function(t) {
      var parts = t.split(':');
      var m = parseInt(parts[0]) * 60 + parseInt(parts[1]);
      if (m < earliest) earliest = m;
      var durs = slots[t].availableDurationsMinutes || [60];
      var end = m + Math.max.apply(null, durs);
      if (end > latest) latest = end;
    });
  });
  if (earliest >= latest) return {start: 8*60, end: 22*60};
  return {start: earliest, end: Math.min(latest, 24*60)};
}

/* ── Derive per-site operating hours from its own availability data ── */
function deriveSiteOpHours(siteAvailData) {
  // Look at the fullest future day to determine this site's schedule
  var earliest = 24*60, latest = 0, maxSlots = 0;
  Object.keys(siteAvailData || {}).forEach(function(dateStr) {
    var slots = siteAvailData[dateStr];
    var keys = Object.keys(slots);
    if (keys.length > maxSlots) {
      maxSlots = keys.length;
      var dayEarliest = 24*60, dayLatest = 0;
      keys.forEach(function(t) {
        var parts = t.split(':');
        var m = parseInt(parts[0]) * 60 + parseInt(parts[1]);
        if (m < dayEarliest) dayEarliest = m;
        var durs = slots[t].availableDurationsMinutes || [60];
        var end = m + Math.max.apply(null, durs);
        if (end > dayLatest) dayLatest = end;
      });
      earliest = dayEarliest;
      latest = dayLatest;
    }
  });
  if (earliest >= latest) return {start: 8*60, end: 22*60};
  return {start: earliest, end: Math.min(latest, 24*60)};
}

/* ── Components ── */
function TimeRuler({opStart, opEnd}) {
  var hrs = [];
  var startH = Math.floor(opStart/60);
  var endH = Math.ceil(opEnd/60);
  for (var h = startH; h <= endH; h++) hrs.push(h);
  var total = opEnd - opStart;
  return (
    <div className="time-ruler">
      <div className="tr-label">Facility</div>
      <div className="tr-track">
        {hrs.map(function(h) {
          var pct = ((h*60 - opStart) / total) * 100;
          if (pct < 0 || pct > 100) return null;
          return <div key={h} className="tr-tick" style={{left: pct + '%'}}>{minToLabel(h*60)}</div>;
        })}
        {(function(){ var n=new Date(),nMin=n.getHours()*60+n.getMinutes(),nPct=((nMin-opStart)/(opEnd-opStart))*100; return nPct>0&&nPct<100 ? <div className="global-now" style={{left:nPct+'%'}}/> : null; })()}
      </div>
    </div>
  );
}

function TimelineBar({avail, dateStr, opStart, opEnd, siteOpStart, siteOpEnd, hasAnyData, reservations, dateWithinMcp}) {
  var blocks = deriveBlocks(avail, dateStr, opStart, opEnd, siteOpStart || opStart, siteOpEnd || opEnd, hasAnyData, reservations, dateWithinMcp);
  var total = opEnd - opStart;
  var toPct = function(m) { return ((m - opStart) / total) * 100; };
  var now = new Date();
  var nowMin = now.getHours()*60 + now.getMinutes();
  var isToday = dateStr === fmtISO(now);
  var showNow = isToday && nowMin >= opStart && nowMin <= opEnd;
  var nowPct = ((nowMin - opStart) / total) * 100;
  // Render hour gridlines
  var gridlines = [];
  for (var gh = Math.ceil(opStart/30); gh <= Math.floor(opEnd/30); gh++) {
    var mins = gh * 30;
    var gPct = ((mins - opStart) / total) * 100;
    if (gPct > 0 && gPct < 100) gridlines.push({pct: gPct, hour: mins % 60 === 0});
  }

  return (
    <div className="fac-bar"><div className="bar-track" role="img" aria-label={blocks.map(function(b){var tS=minToLabel(b.s),tE=minToLabel(b.e);return (b.type==='avail'?'Available':b.type==='reserved'?'Reserved':b.type==='gap'?'Unavailable':b.type==='closed'?'Closed':'Past')+' '+tS+' to '+tE;}).join(', ')}>
      {gridlines.map(function(gl, gi) {
        return <div key={'g'+gi} className={'bar-gridline' + (gl.hour ? '' : ' half')} style={{left: gl.pct + '%'}}/>;
      })}
      {gridlines.filter(function(gl) { return gl.hour; }).map(function(gl, gi) {
        return <div key={'t'+gi} className="bar-timelabel" style={{left: gl.pct + '%'}}>{minToLabel(opStart + (gl.pct/100)*total)}</div>;
      })}
      {blocks.map(function(b, i) {
        var l = toPct(b.s), w = toPct(b.e) - l;
        var tStart = minToLabel(b.s), tEnd = minToLabel(b.e);
        var timeRange = tStart + '–' + tEnd;
        var hoverTip = b.type === 'reserved' ? 'Reserved ' + timeRange
          : b.type === 'gap' ? 'Unavailable ' + timeRange
          : b.type === 'closed' ? 'Closed ' + timeRange
          : b.type === 'avail' ? 'Available ' + timeRange
          : timeRange;
        return (
          <div key={i} className={'bar-block ' + b.type} style={{left: l+'%', width: w+'%'}} title={hoverTip} role="img" aria-label={hoverTip}>
            {b.type === 'avail' && w > 4 && <div className="blabel">{w > 20 ? 'AVAILABLE ' + timeRange : w > 8 ? 'AVAILABLE' : '✓'}</div>}
            {b.type === 'reserved' && w > 4 && <div className="blabel">{w > 20 ? 'UNAVAILABLE ' + timeRange : w > 10 ? 'UNAVAILABLE' : '✗'}</div>}
            {b.type === 'gap' && w > 4 && <div className="blabel">{w > 20 ? 'UNAVAILABLE ' + timeRange : w > 10 ? 'UNAVAILABLE' : '–'}</div>}
            {b.type === 'closed' && w > 10 && <div className="blabel">{(b.s >= 6*60 && b.e <= 22*60) ? 'Unavailable' : 'Closed'}</div>}
          </div>
        );
      })}
      {showNow && <div className="bar-now" style={{left: nowPct + '%'}}/>}
    </div></div>
  );
}

function FacRow({site, avail, dateStr, opStart, opEnd, siteAvailAll, onSiteClick, siteReservations}) {

function SiteGroup({type, sites, availMap, dateStr, opStart, opEnd, allAvail, onSiteClick, forceOpen, reservationMap}) {

              return <button key={t.key} className="wiz-pill" onClick={function(){setChosenType(t.key); setStep(2);}}>{emojiFor(t.key)} {t.label}</button>;
            })}
          </div>
          <button className="wiz-back" onClick={function(){setStep(0);setChosenDate(null);}}>← Back</button>
        </div>
      )}
      {step === 2 && (
        <div className="wiz-step">
          <div className="wiz-crumb"><span className="wiz-crumb-link" onClick={function(){setStep(0);setChosenDate(null);}}>{chosenDate && (MON[chosenDate.getMonth()]+' '+chosenDate.getDate())} ✏️</span> · <span className="wiz-crumb-link" onClick={function(){setStep(1);setChosenType(null);}}>{emojiFor(chosenType)} {(SITE_TYPES.find(function(t){return t.key===chosenType;})||{}).label} ✏️</span></div>
          <div>
            <div className="wiz-q">Any location preference?</div>
            <div className="wiz-opts">
              <button className="wiz-pill" onClick={function(){handleApply(null);}}>Anywhere</button>
              {relevantLocs.map(function(loc){return <button key={loc} className="wiz-pill" onClick={function(){handleApply(loc);}}>{loc}</button>;})}
            </div>
          </div>
          <button className="wiz-back" onClick={function(){setStep(1);setChosenType(null);}}>← Back</button>
        </div>
      )}
    </div>
  );
}

function SiteModal({site, onClose}) {
  if (!site) return null;
  var typeLabel = (site.type||'').replace(/-/g,' ').replace(/\b\w/g, function(c){return c.toUpperCase();});
  var priceStr = '';
  if (site.priceCents) {
    var d = site.priceCents / 100;
    priceStr = '$' + (d % 1 === 0 ? d.toFixed(0) : d.toFixed(2)) + ((site.bookingUnit === 'nightly' || site.pricingType === 'perNight') ? '/night' : '/hr');
    if (site.residentPriceCents != null && site.residentPriceCents !== site.priceCents) {
      var rd = site.residentPriceCents / 100;
      priceStr += ' \u00b7 $' + (rd % 1 === 0 ? rd.toFixed(0) : rd.toFixed(2)) + ' resident';
    }
  }
  var durStr = '';
  if (site.durationMinutes && site.durationMinutes.length > 0) {
    durStr = site.durationMinutes.map(function(m){return m >= 60 ? (m/60)+'hr' : m+'min';}).join(' / ');
  }
  return (
    <div className="modal-overlay" onClick={onClose}>
      <div className="modal-card" onClick={function(e){e.stopPropagation();}}>
        <button className="modal-close" onClick={onClose} aria-label="Close detail panel">✕</button>
        {site.imageUrl && <img className="modal-img" src={site.imageUrl} alt={(site.courtNumber || site.name) + " photo"}/>}
        <div className="modal-body">
          <h2>{site.courtNumber || site.name}</h2>
          <div className="modal-type">{emojiFor(site.type)} {typeLabel}</div>
          {site.locationName && <div className="modal-loc">📍 {site.locationName}</div>}
          {site.description && <p className="modal-desc">{site.description}</p>}
          <div className="modal-details">
            {priceStr && <span>💰 {priceStr}</span>}
            {durStr && <span>⏱️ {durStr}</span>}
            {site.capacity && <span>👥 {site.capacity} capacity</span>}
          </div>
          {site.bookingUrl && (
            <a className="modal-book" href={site.bookingUrl} target="_blank" rel="noopener noreferrer"
              onClick={function(){trackCalendarEvent('book_click',site.name,{siteId:site.id,type:site.type});}}>
              {site.isInstantBookable ? 'Book Now on rec.us' : 'Request on rec.us'} → <span className="sr-only">(opens in new tab)</span>
            </a>
          )}
        </div>
      </div>
    </div>
  );
}

function DayView({sites, availMap, dateStr, opStart, opEnd, allAvail, onSiteClick, forceOpen, toolbar, reservationMap}) {
  var typeCounts = {};
  sites.forEach(function(s){typeCounts[s.type]=(typeCounts[s.type]||0)+1;});
  var grouped = [];
  var done = {};
  sites.forEach(function(s) {
    if (done[s.type]) return;
    if (typeCounts[s.type] >= GROUP_THRESHOLD) {
      done[s.type] = true;
      grouped.push({k:'group', type:s.type, sites: sites.filter(function(x){return x.type===s.type;})});
    } else {
      grouped.push({k:'single', site: s});
    }
  });
  return (
    <div>
      <div className="sticky-hdr">
        {toolbar}
        <TimeRuler opStart={opStart} opEnd={opEnd}/>
      </div>
      <div className="fac-list">
        {grouped.map(function(g, i) {
          if (g.k === 'group') {
            return <SiteGroup key={g.type} type={g.type} sites={g.sites} availMap={availMap} dateStr={dateStr} opStart={opStart} opEnd={opEnd} allAvail={allAvail} onSiteClick={onSiteClick} forceOpen={forceOpen} reservationMap={reservationMap}/>;
          }
          return <FacRow key={g.site.id} site={g.site} avail={availMap[g.site.id]} dateStr={dateStr} opStart={opStart} opEnd={opEnd} siteAvailAll={allAvail[g.site.id] || {}} onSiteClick={onSiteClick} siteReservations={reservationMap[g.site.id]}/>;
        })}
      </div>
    </div>
  );
}

function WeekOverview({sites, allAvail, weekStart, onDayClick}) {
  var days = Array.from({length:7}, function(_,i){return fmtISO(addDays(weekStart,i));});
  var todayISO = fmtISO(new Date());
  var typeGroups = useMemo(function() {
    var m = {};
    sites.forEach(function(s){if(!m[s.type])m[s.type]={type:s.type,sites:[]};m[s.type].sites.push(s);});
    return Object.values(m);
  }, [sites]);
  return (
    <div className="week-grid">
      {days.map(function(d, i) {
        var dt = addDays(weekStart, i);
        var isToday = d === todayISO;
        return (
          <div key={d} className={'week-card' + (isToday ? ' today' : '')} onClick={function(){onDayClick(d);}}>
            <div className="wday">{DOW[i]}<small>{MON[dt.getMonth()]+' '+dt.getDate()}</small></div>
            {typeGroups.map(function(g) {
              var avail = g.sites.filter(function(s) {
                var dayData = (allAvail[s.id] || {})[d];
                return dayData && Object.keys(dayData).length > 0;
              }).length;
              var pct = Math.round(((g.sites.length - avail) / g.sites.length) * 100);
              var status = pct === 0 ? 'open' : pct >= 80 ? 'full' : 'partial';
              var tn = g.type.replace(/-/g,' ').replace(/\b\w/g, function(c){return c.toUpperCase();});
              var label = g.sites.length > 1 ? avail+'/'+g.sites.length+' open' : (pct === 0 ? 'Open' : 'Booked');
              return (
                <div className="wfac" key={g.type}>
                  <span className="wicon">{emojiFor(g.type)}</span>
                  <span className="wname">{tn}{g.sites.length > 1 ? 's' : ''}</span>
                  <span className={'wstatus ' + status}>{label}</span>
                </div>
              );
            })}
          </div>
        );
      })}
    </div>
  );
}

/* ── Main App ── */
function App() {
  var dateState = useState(new Date());
  var date = dateState[0], setDate = dateState[1];
  var viewState = useState('day');
  var view = viewState[0], setView = viewState[1];
  var sitesState = useState(null);
  var sites = sitesState[0], setSites = sitesState[1];
  var availState = useState({});
  var allAvail = availState[0], setAllAvail = availState[1];
  var resState = useState([]);
  var rawReservations = resState[0], setRawReservations = resState[1];
  var resWindowRef = useRef({start: null, end: null});  // tracks loaded Metabase reservation range
  var errorState = useState(null);
  var error = errorState[0], setError = errorState[1];
  var loadingState = useState(true);
  var loading = loadingState[0], setLoading = loadingState[1];

  var dateISO = fmtISO(date);
  var weather = useWeather(CFG.coords, dateISO);
  var todayISO = fmtISO(new Date());
  var isToday = dateISO === todayISO;
  var maxDateISO = fmtISO(addDays(new Date(), MAX_DAYS_AHEAD));
  var beyondRealtime = dateISO > maxDateISO;
  var ws = startOfWeek(date);
  var dt = new Date(dateISO + 'T00:00:00');

  // Fetch sites on mount
  useEffect(function() {
    var locParam = LOCATION_ID ? '?locationId=' + LOCATION_ID : '';
    fetch('/' + ORG_SLUG + '/rentalcalendar/api/sites' + locParam)
      .then(function(r){return r.json();})
      .then(function(data) {
        if (data.error) throw new Error(data.error);
        setSites((data.sites || []).filter(function(s){ return !!s.type; }));
        setLoading(false);
        // Fetch availability for ALL sites in one batch call (replaces 60+ individual fetches)
        var siteIds = (data.sites || []).map(function(s) { return s.id; }).join(',');
        var refreshParam = REFRESH ? '&refresh=1' : '';
        fetch('/' + ORG_SLUG + '/rentalcalendar/api/availability-batch?siteIds=' + siteIds + refreshParam)
          .then(function(r) { return r.json(); })
          .then(function(batchData) {
            setAllAvail(batchData.data || {});
            console.log('[rentalcalendar] Batch availability loaded for ' + Object.keys(batchData.data || {}).length + ' sites');
          })
          .catch(function(e) { console.warn('Batch availability failed:', e); });
        // Fetch actual reservations from Metabase facility report (PII-stripped)
        var today = fmtISO(new Date());
        var future = fmtISO(addDays(new Date(), 90));
        resWindowRef.current = {start: today, end: future};
        fetch('/' + ORG_SLUG + '/rentalcalendar/api/reservations?start_date=' + today + '&end_date=' + future + refreshParam)
          .then(function(r){return r.json();})
          .then(function(resData) {
            setRawReservations(resData.reservations || []);
            console.log('[rentalcalendar] Loaded ' + (resData.reservations || []).length + ' reservations (' + today + ' to ' + future + ')');
          })
          .catch(function(e) { console.warn('Reservations fetch failed:', e); });
      })
      .catch(function(e) { setError(e.message); setLoading(false); });
  }, []);

  // Re-fetch reservations when user navigates outside the loaded date window
  useEffect(function() {
    var win = resWindowRef.current;
    if (!win.start || !sites || sites.length === 0) return;
    if (dateISO >= win.start && dateISO <= win.end) return;
    // Extend window 90 days in direction of navigation
    var fetchStart, fetchEnd;
    if (dateISO > win.end) {
      fetchStart = win.end;
      fetchEnd = fmtISO(addDays(new Date(dateISO + 'T12:00:00'), 60));
    } else {
      fetchStart = fmtISO(addDays(new Date(dateISO + 'T12:00:00'), -60));
      fetchEnd = win.start;
    }
    console.log('[rentalcalendar] Date outside window, fetching reservations ' + fetchStart + ' to ' + fetchEnd);
    resWindowRef.current = {
      start: fetchStart < win.start ? fetchStart : win.start,
      end: fetchEnd > win.end ? fetchEnd : win.end
    };
    fetch('/' + ORG_SLUG + '/rentalcalendar/api/reservations?start_date=' + fetchStart + '&end_date=' + fetchEnd)
      .then(function(r) { return r.json(); })
      .then(function(resData) {
        var newRes = resData.reservations || [];
        console.log('[rentalcalendar] Extended range: +' + newRes.length + ' reservations');
        setRawReservations(function(prev) { return prev.concat(newRes); });
      })
      .catch(function(e) { console.warn('Reservations re-fetch failed:', e); });
  }, [dateISO, sites]);

  // Derive operating hours from all availability data
  var opHours = useMemo(function() {
    var earliest = 24*60, latest = 0;
    Object.values(allAvail).forEach(function(siteData) {
      var h = deriveOpHours(siteData);
      if (h.start < earliest) earliest = h.start;
      if (h.end > latest) latest = h.end;
    });
    if (earliest >= latest) return {start: 8*60, end: 22*60};
    return {start: earliest, end: latest};
  }, [allAvail]);

  // ── Filters ──
  var typeFilterState = useState(null);
  var selectedTypes = typeFilterState[0], setSelectedTypes = typeFilterState[1];
  var bookFilterState = useState('all');
  var bookFilter = bookFilterState[0], setBookFilter = bookFilterState[1];
  var locFilterState = useState(null);
  var selectedLocs = locFilterState[0], setSelectedLocs = locFilterState[1];
  var modalState = useState(null);
  var modalSite = modalState[0], setModalSite = modalState[1];
  var wizResultState = useState(null);
  var wizResult = wizResultState[0], setWizResult = wizResultState[1];

  var allTypes = useMemo(function() {
    if (!sites) return [];
    var present = new Set();
    sites.forEach(function(x) { if (x.type) present.add(x.type); });
    return SITE_TYPES.filter(function(t) { return present.has(t.key); });
  }, [sites]);

  var allLocations = useMemo(function() {
    if (!sites) return [];
    var s = new Set();
    sites.forEach(function(x) { if (x.locationName) s.add(x.locationName); });
    return Array.from(s).sort();
  }, [sites]);

  useEffect(function() {
    if (sites && sites.length > 0 && selectedTypes === null) {
      if (URL_TYPE) { setSelectedTypes(new Set([URL_TYPE])); }
      else { setSelectedTypes(new Set(allTypes.map(function(t){return t.key;}))); }
    }
  }, [allTypes]);
  useEffect(function() {
    if (sites && sites.length > 0 && selectedLocs === null) {
      if (URL_LOC) { setSelectedLocs(new Set([decodeURIComponent(URL_LOC)])); }
      else { setSelectedLocs(new Set(allLocations)); }
    }
  }, [allLocations]);

  var filteredSites = useMemo(function() {
    if (!sites) return [];
    return sites.filter(function(s) {
      if (selectedTypes && allTypes.length > 0 && selectedTypes.size < allTypes.length && !selectedTypes.has(s.type)) return false;
      if (selectedLocs && allLocations.length > 0 && selectedLocs.size < allLocations.length && !selectedLocs.has(s.locationName)) return false;
      if (bookFilter !== 'all') { if (bookFilter === 'instant' && !s.isInstantBookable) return false; if (bookFilter === 'request' && s.isInstantBookable) return false; }
      return true;
    });
  }, [sites, selectedTypes, selectedLocs, allTypes, allLocations, bookFilter]);

  // Precache site thumbnails so they load instantly when groups expand
  useEffect(function() {
    if (!sites) return;
    sites.forEach(function(s) {
      if (s.imageUrl) { var img = new Image(); img.src = s.imageUrl; }
    });
  }, [sites]);

  // Build per-site availability map for selected date
  var dayAvailMap = useMemo(function() {
    var m = {};
    Object.keys(allAvail).forEach(function(siteId) {
      m[siteId] = (allAvail[siteId] || {})[dateISO] || null;
    });
    return m;
  }, [allAvail, dateISO]);

  // Build reservation map: siteId → date → [{s: startMin, e: endMin}]
  // Matches Metabase site names to MCP site IDs via courtNumber.
  // Metabase returns names like "Outdoor Event Space: Arsenal Park - Pavilion A, Arsenal Park"
  // while MCP uses bare courtNumber like "Arsenal Park - Pavilion A".
  var reservationMap = useMemo(function() {
    if (!sites || !rawReservations || rawReservations.length === 0) return {};
    // Normalize Metabase site name: strip "Type: " prefix and ", Location" suffix
    function normName(raw) {
      var s = (raw || '').toLowerCase().trim();
      var colon = s.indexOf(':');
      if (colon > 0 && colon < 30) s = s.substring(colon + 1).trim();
      var lastComma = s.lastIndexOf(',');
      if (lastComma > 0) s = s.substring(0, lastComma).trim();
      return s;
    }
    // Build courtNumber → siteId lookup (case-insensitive)
    var nameToId = {};
    sites.forEach(function(s) {
      var cn = (s.courtNumber || s.name || '').toLowerCase().trim();
      if (cn) nameToId[cn] = s.id;
    });
    // Also build locationName → [siteIds] for location-level fallback
    var locToSiteIds = {};
    sites.forEach(function(s) {
      var loc = (s.locationName || '').toLowerCase().trim();
      if (loc) {
        if (!locToSiteIds[loc]) locToSiteIds[loc] = [];
        locToSiteIds[loc].push(s.id);
      }
    });
    // Process reservation rows into siteId → date → [{s, e}]
    var map = {};
    var matched = 0, unmatched = 0;
    var unmatchedNames = {};
    rawReservations.forEach(function(r) {
      var rawName = (r.site || '').toLowerCase().trim();
      var normSite = normName(r.site);
      // Try exact match on raw name, then normalized name
      var siteId = nameToId[rawName] || nameToId[normSite];
      var siteIds = siteId ? [siteId] : [];
      // If still no match, try location-level fallback (applies to all sites at that location)
      if (siteIds.length === 0) {
        var loc = (r.location || '').toLowerCase().trim();
        if (loc && locToSiteIds[loc]) siteIds = locToSiteIds[loc];
      }
      if (siteIds.length === 0) {
        unmatched++;
        if (!unmatchedNames[rawName]) unmatchedNames[rawName] = 0;
        unmatchedNames[rawName]++;
        return;
      }
      matched++;
      var dateKey = parseDateToISO(r.date);
      if (!dateKey) return;
      var sMin = parseTimeToMin(r.start);
      var eMin = parseTimeToMin(r.end);
      if (sMin === null || eMin === null || sMin >= eMin) return;
      siteIds.forEach(function(sid) {
        if (!map[sid]) map[sid] = {};
        if (!map[sid][dateKey]) map[sid][dateKey] = [];
        map[sid][dateKey].push({s: sMin, e: eMin});
      });
    });
    console.log('[rentalcalendar] Reservation matching: ' + matched + ' matched, ' + unmatched + ' unmatched');
    if (unmatched > 0) {
      console.log('[rentalcalendar] Unmatched Metabase site names:', unmatchedNames);
      console.log('[rentalcalendar] Known MCP site names:', Object.keys(nameToId));
    }
    return map;
  }, [sites, rawReservations]);

  var nav = useCallback(function(delta) {
    setDate(function(d) {
      var n = new Date(d);
      n.setDate(n.getDate() + (view === 'week' ? delta * 7 : delta));
      return n;
    });
  }, [view]);

  var goToday = useCallback(function(){setDate(new Date());}, []);
  var handleDayClick = useCallback(function(iso){setDate(new Date(iso+'T00:00:00'));setView('day');}, []);

  var dateLabel = view === 'day'
    ? DOWL[dt.getDay()]+', '+MON[dt.getMonth()]+' '+dt.getDate()+', '+dt.getFullYear()
    : MON[ws.getMonth()]+' '+ws.getDate()+' \u2013 '+MON[addDays(ws,6).getMonth()]+' '+addDays(ws,6).getDate()+', '+addDays(ws,6).getFullYear();

  var locationName = CFG.locationName || (LOCATION_ID && sites && sites.length > 0 ? sites[0].locationName : 'Facility Rentals');

  if (loading) return <div className="wrap"><div className="loading"><span className="spin"></span>Loading facilities...</div></div>;
  if (error) return <div className="wrap"><div className="error-box">Failed to load: {error}</div></div>;
  if (!sites || sites.length === 0) return <div className="wrap"><div className="error-box">No facilities found for this location.</div></div>;
  var noFilterResults = filteredSites.length === 0 && sites.length > 0;

  var toolbarEl = (
    <div className="toolbar-row">
      <button onClick={function(){nav(-1);}}>&lsaquo; Prev</button>
      <button onClick={goToday} className={isToday && view === 'day' ? 'primary' : ''}>Today</button>
      <button onClick={function(){nav(1);}}>Next &rsaquo;</button>
      <span className="range" style={{marginLeft:8}}>{dateLabel}</span>
      {weather && <span className="tb-weather" title={weather.desc}>{weather.emoji} {weather.hi}°{weather.unit}{weather.lo != null ? ' / '+weather.lo+'°' : ''}</span>}
      <input type="date" className="tb-date" value={dateISO} min={fmtISO(new Date())} onChange={function(e){if(e.target.value){setDate(new Date(e.target.value+'T12:00:00'));setView('day');}}}/>
      <div className="grow"></div>
      <div className="tb-legend" role="group" aria-label="Timeline legend">
        <span><span className="sw" style={{background:'#bbf7d0',border:'2px solid #16a34a'}}></span>✓ Available</span>
        <span><span className="sw" style={{background:'repeating-linear-gradient(-45deg,#fed7aa,#fed7aa 3px,#fde0b0 3px,#fde0b0 6px)',border:'2px solid #c2410c'}}></span>✗ Unavailable</span>
        <span><span className="sw" style={{background:'repeating-linear-gradient(45deg,#e5e7eb,#e5e7eb 3px,#d4d6da 3px,#d4d6da 6px)',border:'2px solid #6b7280'}}></span>— Closed</span>
        {view === 'day' && <span><span className="sw" style={{background:'#ef4444',width:3,borderRadius:2}}></span>Now</span>}
      </div>
    </div>
  );

  return (
    <div className="wrap">
      {/* toolbar rendered inside DayView sticky header */}
      <div className="hdr">
        {CFG.logoUrl && <img src={CFG.logoUrl} alt={(CFG.displayName || 'Organization') + ' logo'}/>}
        <div>
          <h1>{locationName}</h1>
          {CFG.displayName && <div className="sub">{CFG.displayName}</div>}
        </div>
      </div>
      <BookingWizard allTypes={allTypes} allLocations={allLocations} sites={sites} resultCount={filteredSites.length}
        onApply={function(r) {
          if (r.type) setSelectedTypes(new Set([r.type]));
          if (r.location) setSelectedLocs(new Set([r.location]));
          else if (allLocations.length > 0) setSelectedLocs(new Set(allLocations));
          if (r.date) { setDate(r.date); setView('day'); }
          setWizResult(r);
        }}/>


      {allTypes.length > 0 && (
        <div className="filters">
          {allTypes.length > 1 && (
            <div className="filter-row">
              <span className="filter-label">Type</span>
              <div className="filter-pills">
                <button className={!selectedTypes || selectedTypes.size === allTypes.length ? 'pill active' : 'pill'}
                  onClick={function(){setSelectedTypes(new Set(allTypes.map(function(t){return t.key;})));}}>All</button>
                {allTypes.map(function(t) {
                  var isOn = selectedTypes && selectedTypes.has(t.key);
                  return <button key={t.key} className={'pill' + (isOn && selectedTypes.size < allTypes.length ? ' active' : '')}
                    onClick={function(){
                      var allKeys = new Set(allTypes.map(function(x){return x.key;}));
                      var next = new Set(selectedTypes || allKeys);
                      if (next.size === allTypes.length) { next = new Set([t.key]); }
                      else if (next.has(t.key) && next.size > 1) { next.delete(t.key); }
                      else { next.add(t.key); }
                      setSelectedTypes(next);
                    }}>{emojiFor(t.key)} {t.label}</button>;
                })}
              </div>
            </div>
          )}
          {allLocations.length > 1 && (
            <div className="filter-row">
              <span className="filter-label">Location</span>
              <div className="filter-pills">
                <button className={!selectedLocs || selectedLocs.size === allLocations.length ? 'pill active' : 'pill'}
                  onClick={function(){setSelectedLocs(new Set(allLocations));}}>All</button>
                {allLocations.map(function(loc) {
                  var isOn = selectedLocs && selectedLocs.has(loc);
                  return <button key={loc} className={'pill' + (isOn && selectedLocs.size < allLocations.length ? ' active' : '')}
                    onClick={function(){
                      var next = new Set(selectedLocs || new Set(allLocations));
                      if (next.size === allLocations.length) { next = new Set([loc]); }
                      else if (next.has(loc) && next.size > 1) { next.delete(loc); }
                      else { next.add(loc); }
                      setSelectedLocs(next);
                    }}>{loc}</button>;
                })}
              </div>
            </div>
          )}
          <div className="filter-row">
            <span className="filter-label">Booking</span>
            <div className="filter-pills">
              {[{k:'all',l:'All'},{k:'instant',l:'⚡ Instant Book'},{k:'request',l:'📋 Request'}].map(function(o){
                return <button key={o.k} className={'pill' + (bookFilter===o.k?' active':'')}
                  onClick={function(){setBookFilter(o.k);}}>{o.l}</button>;
              })}
            </div>
          </div>
        </div>
      )}
      {filteredSites.length === 0 && sites && sites.length > 0 && (
        <div style={{padding:'40px 20px',textAlign:'center',color:'#6b7280',fontSize:14}}>No facilities match the current filters.</div>
      )}
      {beyondRealtime && (
        <div className="date-cap">
          Availability beyond 30 days is based on confirmed facility bookings and may not reflect all holds. Call or email to confirm before submitting a request.
        </div>
      )}
      {view === 'day'
        ? <DayView sites={filteredSites} availMap={dayAvailMap} dateStr={dateISO} opStart={opHours.start} opEnd={opHours.end} allAvail={allAvail} onSiteClick={function(s){setModalSite(s);trackCalendarEvent('facility_view',s.name,{siteId:s.id,type:s.type});}} forceOpen={selectedTypes && selectedTypes.size === 1} toolbar={toolbarEl} reservationMap={reservationMap}/>
        : null
      }
      {modalSite && <SiteModal site={modalSite} onClose={function(){setModalSite(null);}}/>}
      <div aria-live="polite" role="status" className="sr-only">
        {loading ? 'Loading facilities' : filteredSites.length === 0 ? 'No facilities match the current filters' : 'Showing ' + filteredSites.length + ' of ' + sites.length + ' facilities'}
      </div>
      <div className="footer">
        Availability updates in real time &middot; Powered by <a href="https://www.rec.us" target="_blank" rel="noopener">rec.us</a>
      </div>
    </div>
  );
}

if(EMBED)document.body.classList.add('embed');
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
