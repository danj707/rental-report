<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Program Revenue</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'IBM Plex Sans', system-ui, sans-serif;
      font-size: 12px;
      color: #1a1a1a;
      background: #f5f4f1;
      line-height: 1.35;
    }

    /* ── Toolbar ── */
    .toolbar {
      position: sticky; top: 0; z-index: 100;
      display: flex; align-items: center; gap: 10px;
      padding: 8px 20px;
      background: #2c2c2c; color: #eee;
      font-size: 13px; flex-wrap: wrap;
    }
    .toolbar-title { font-weight: 600; margin-right: 4px; }
    .toolbar-spacer { flex: 1; }
    .toolbar label {
      font-size: 10px; text-transform: uppercase; letter-spacing: 0.5px;
      color: #aaa; display: flex; flex-direction: column; gap: 2px;
    }
    .toolbar input[type="date"] {
      padding: 4px 8px; border: 1px solid rgba(255,255,255,.2); border-radius: 4px;
      background: rgba(255,255,255,.1); color: #fff; font-size: 12px;
      font-family: inherit; outline: none;
    }
    .toolbar input[type="date"]:focus { border-color: #3b82f6; }
    .toolbar input[type="date"]::-webkit-calendar-picker-indicator { filter: invert(1); cursor: pointer; }
    .toolbar button {
      padding: 6px 14px; border: 1px solid rgba(255,255,255,.25); border-radius: 4px;
      background: rgba(255,255,255,.08); color: #fff; font-size: 12px;
      font-family: inherit; cursor: pointer; transition: background .15s; white-space: nowrap;
    }
    .toolbar button:hover { background: rgba(255,255,255,.18); }
    .toolbar .btn-run { background: #16a34a; border-color: #16a34a; font-weight: 600; }
    .toolbar .btn-run:hover { background: #15803d; }
    .toolbar .btn-run:disabled { opacity: .5; cursor: not-allowed; }
    .toolbar .btn-pdf { background: #3b82f6; border-color: #3b82f6; font-weight: 600; }
    .toolbar .btn-pdf:hover { background: #2563eb; }
    .toolbar .btn-pdf:disabled { opacity: .5; cursor: not-allowed; }
    .toolbar .btn-excel { background: #16803c; border-color: #16803c; font-weight: 600; }
    .toolbar .btn-excel:hover { background: #15692f; }
    .toolbar .btn-excel:disabled { opacity: .5; cursor: not-allowed; }
    .toolbar .btn-toggle-on {
      background: rgba(251,191,36,.18); border-color: #fbbf24; color: #fbbf24; font-weight: 600;
    }
    .toolbar .btn-toggle-on:hover { background: rgba(251,191,36,.28); }
    .toolbar .row-count { font-size: 11px; color: #aaa; }
    .toolbar .divider { width: 1px; height: 28px; background: rgba(255,255,255,.15); margin: 0 2px; }

    /* ── Page ── */
    .page {
      max-width: 1400px; margin: 16px auto; padding: 24px 28px;
      background: #fff; box-shadow: 0 1px 4px rgba(0,0,0,.08);
    }
    .table-scroll { overflow-x: auto; -webkit-overflow-scrolling: touch; }

    /* ── Header ── */
    .report-header {
      display: flex; justify-content: space-between; align-items: center;
      border-bottom: 2.5px solid #111; padding-bottom: 10px; margin-bottom: 18px; gap: 16px;
    }
    .report-header-left { display: flex; align-items: center; gap: 14px; }
    .report-header-logo { height: 42px; max-width: 140px; object-fit: contain; object-position: left center; }
    .report-header .org-label { font-size: 10px; letter-spacing: 1.6px; text-transform: uppercase; color: #777; font-weight: 600; }
    .report-header .title { font-size: 17px; font-weight: 700; margin-top: 1px; }
    .report-header-right { text-align: right; }
    .report-header .date-range { font-size: 11px; color: #666; }

    /* ── Info blurb ── */
    .report-blurb {
      background: #f0f4f8; border-left: 3px solid #6b7280; padding: 10px 14px;
      margin-bottom: 16px; font-size: 12.5px; line-height: 1.55; color: #374151;
      border-radius: 4px;
    }
    .report-blurb strong { color: #111827; }
    .report-blurb em { font-style: normal; font-weight: 600; }
    @media print { .report-blurb { background: #f5f5f5; -webkit-print-color-adjust: exact; } }

    /* ── Summary cards ── */
    .summary-cards { display: flex; gap: 12px; margin-bottom: 18px; flex-wrap: wrap; }
    .summary-card {
      flex: 1; min-width: 120px; background: #f5f4f1;
      border: 1px solid #ddd; border-radius: 6px; padding: 10px 14px;
    }
    .summary-card .card-label { font-size: 9.5px; text-transform: uppercase; letter-spacing: 0.8px; color: #888; font-weight: 600; margin-bottom: 4px; }
    .summary-card .card-value { font-size: 18px; font-weight: 700; font-variant-numeric: tabular-nums; color: #111; }
    .summary-card .card-value.green { color: #15803d; }
    .summary-card .card-value.red   { color: #b91c1c; }
    .summary-card .card-value.blue  { color: #2563eb; }
    .summary-card .card-sub { font-size: 10px; color: #999; margin-top: 2px; }

    /* ── Table ── */
    .prog-table { width: 100%; border-collapse: collapse; font-size: 11.5px; }

    /* Column headers */
    .prog-table thead tr {
      background: #e4e4e4; border-top: 1px solid #bbb; border-bottom: 1px solid #bbb;
    }
    .prog-table thead th {
      padding: 6px 8px; font-weight: 600; font-size: 10px;
      text-transform: uppercase; letter-spacing: 0.4px; color: #333;
      white-space: nowrap; text-align: right;
    }
    .prog-table thead th.left { text-align: left; }

    /* Program header rows */
    .prog-table tr.prog-header td {
      background: #2c2c2c; color: #fff;
      padding: 7px 8px; font-weight: 600; font-size: 11.5px;
      border-top: 3px solid #111;
    }
    .prog-table tr.prog-header td.prog-name {
      font-size: 12px; letter-spacing: 0.2px;
    }
    .prog-table tr.prog-header td { text-align: right; }
    .prog-table tr.prog-header td.prog-name { text-align: left; }

    /* Data rows */
    .prog-table tbody tr.data-row { border-bottom: 1px solid #eee; }
    .prog-table tbody tr.data-row:nth-child(even) { background: #fafaf8; }
    .prog-table tbody tr.data-row:hover { background: #f0eeea; }
    .prog-table tbody tr.data-row td {
      padding: 5px 8px; text-align: right; vertical-align: middle;
    }
    .prog-table tbody tr.data-row td.left { text-align: left; }
    .prog-table tbody tr.data-row td.mono {
      font-family: 'IBM Plex Mono', monospace; font-size: 10.5px;
    }
    .prog-table tbody tr.data-row td.muted { color: #aaa; }
    .prog-table .money { font-variant-numeric: tabular-nums; }
    .prog-table .zero  { color: #ccc; }

    /* Program subtotal rows */
    .prog-table tr.prog-subtotal td {
      background: #edeae4; padding: 5px 8px; text-align: right;
      font-weight: 700; font-size: 11px; font-variant-numeric: tabular-nums;
      border-top: 1px solid #ccc; border-bottom: 2px solid #bbb;
      color: #444;
    }
    .prog-table tr.prog-subtotal td.left { text-align: left; font-style: italic; color: #888; }

    /* Grand total row */
    .prog-table tfoot tr td {
      background: #2c2c2c; color: #fff; padding: 7px 8px;
      font-weight: 700; font-size: 11.5px; text-align: right;
      font-variant-numeric: tabular-nums;
      border-top: 3px solid #111;
    }
    .prog-table tfoot tr td.left { text-align: left; font-size: 10.5px; letter-spacing: 0.4px; text-transform: uppercase; }

    /* Fill % badge */
    .fill-high { color: #15803d; font-weight: 600; }
    .fill-mid  { color: #b45309; }
    .fill-low  { color: #b91c1c; }
    .prog-table .chev { display:inline-block; margin-right:6px; font-size:9px; color:#16a34a; transition:transform .12s ease; }
    .prog-table .chev.open { transform:rotate(90deg); }
    .prog-table tr.prog-clickable { cursor:pointer; }
    .prog-table tr.prog-clickable:hover td { background:#eef4ee; }
    .prog-table tr.section-row td { background:#fbfbf9; border-bottom:1px solid #f1efea; font-size:11px; color:#3f3f3f; padding:6px 8px; }
    .prog-table tr.section-row:hover td { background:#f4f3ef; }
    .prog-table tr.section-row td.left { text-align:left; padding-left:26px; }
    .prog-table tr.section-row .sec-status { font-size:9px; color:#9a9a9a; margin-left:8px; text-transform:uppercase; letter-spacing:.04em; }

    /* ── Footer ── */
    .report-footer {
      display: flex; justify-content: space-between;
      border-top: 2.5px solid #111; margin-top: 16px; padding-top: 6px;
      font-size: 10px; color: #777;
    }

    /* ── Loading / Error ── */
    .loading { text-align: center; padding: 80px 20px; color: #888; font-size: 14px; }
    .loading .spinner {
      position: relative;
      display: inline-block;
      width: 34px;
      height: 44px;
      margin: 0 auto;
      box-sizing: border-box;
      border: 2px solid #e07b1a;
      border-top-color: #f7b96b;
      border-radius: 4px 4px 14px 14px;
      background: rgba(255, 248, 240, 0.5);
      overflow: hidden;
      box-shadow: inset -4px 0 0 rgba(255, 255, 255, 0.35);
    }
    .loading .spinner::before {
      content: '';
      position: absolute;
      left: 0; right: 0; bottom: 0;
      height: 60%;
      background: linear-gradient(180deg, #ffb24d 0%, #ff8c1f 55%, #f2710a 100%);
      box-shadow: inset 0 2px 0 rgba(255, 255, 255, 0.45);
      animation: juice-fill 2s ease-in-out infinite;
    }
    .loading .spinner::after {
      content: '';
      position: absolute;
      left: 50%; bottom: 6px;
      width: 3px; height: 3px;
      margin-left: -1.5px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.85);
      box-shadow: -5px 7px 0 0 rgba(255, 255, 255, 0.65), 5px 12px 0 -0.5px rgba(255, 255, 255, 0.5);
      animation: juice-bubbles 2.2s ease-out infinite;
    }
    @keyframes juice-fill {
      0%   { height: 42%; }
      50%  { height: 80%; }
      100% { height: 42%; }
    }
    @keyframes juice-bubbles {
      0%   { transform: translateY(2px) scale(0.5); opacity: 0; }
      30%  { opacity: 0.9; }
      70%  { opacity: 0.6; }
      100% { transform: translateY(-22px) scale(1); opacity: 0; }
    }
    .loading { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 14px; }
    .juice-msg { position: relative; height: 1.4em; line-height: 1.4em; min-width: 190px; }
    .juice-msg span { position: absolute; left: 0; right: 0; text-align: center; opacity: 0; animation: juice-phrase 10s infinite; }
    .juice-msg span:nth-child(1) { animation-delay: 0s; }
    .juice-msg span:nth-child(2) { animation-delay: 2s; }
    .juice-msg span:nth-child(3) { animation-delay: 4s; }
    .juice-msg span:nth-child(4) { animation-delay: 6s; }
    .juice-msg span:nth-child(5) { animation-delay: 8s; }
    @keyframes juice-phrase {
      0%   { opacity: 0; transform: translateY(5px); }
      2%   { opacity: 1; transform: translateY(0); }
      18%  { opacity: 1; transform: translateY(0); }
      20%  { opacity: 0; transform: translateY(-5px); }
      100% { opacity: 0; }
    }
    .error { text-align: center; padding: 60px 20px; color: #b91c1c; font-size: 14px; }

    /* ── Print / PDF ── */
    /* ── AI Insights ── */
    .insights-section { margin: 4px 0 18px; }
    .insights-head { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; margin-bottom: 12px; }
    .insights-btn {
      display: inline-flex; align-items: center; gap: 6px;
      background: #111827; color: #fff;
      border: none; border-radius: 6px;
      padding: 8px 16px; font-size: 13px; font-weight: 600;
      font-family: inherit; cursor: pointer;
      transition: background .15s ease, opacity .15s ease;
    }
    .insights-btn:hover:not(:disabled) { background: #374151; }
    .insights-btn:disabled { opacity: .6; cursor: default; }
    .insights-sub { font-size: 11.5px; color: #9ca3af; }
    .insights-section .loading { padding: 36px 16px; }
    .insights-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(230px, 1fr)); gap: 12px; }
    .insight-card { border: 1px solid #e5e7eb; border-left-width: 4px; border-radius: 8px; padding: 14px 16px; background: #fff; }
    .insight-type { font-size: 10px; font-weight: 700; letter-spacing: .6px; text-transform: uppercase; margin-bottom: 6px; }
    .insight-title { font-size: 14px; font-weight: 700; color: #111827; margin-bottom: 5px; line-height: 1.3; }
    .insight-detail { font-size: 12.5px; color: #374151; line-height: 1.45; }
    .insight-action { font-size: 12px; color: #6b7280; margin-top: 8px; font-weight: 500; }
    .insight-opportunity { border-left-color: #10b981; }
    .insight-opportunity .insight-type { color: #059669; }
    .insight-risk { border-left-color: #f59e0b; }
    .insight-risk .insight-type { color: #d97706; }
    .insight-signal { border-left-color: #6366f1; }
    .insight-signal .insight-type { color: #4f46e5; }

    @media print {
      body { background: #fff; }
      .toolbar { display: none !important; }
      .page { box-shadow: none; margin: 0; padding: 12px 16px; max-width: 100%; }
    }
    body.print-mode .toolbar { display: none !important; }
    body.print-mode { background: #fff; }
    body.print-mode .page { box-shadow: none; margin: 0; padding: 12px 16px; max-width: 100%; }
    body.print-mode .table-scroll { overflow: visible; }
    /* Charts */
    .chart-section { margin: 20px 0; }
    .chart-toggle { display: inline-flex; border: 1px solid #e0ddd8; border-radius: 6px; overflow: hidden; margin-bottom: 14px; }
    .chart-toggle button { border: none; background: #fff; padding: 6px 14px; font-size: 12px; font-weight: 600; cursor: pointer; color: #888; transition: all .15s; }
    .chart-toggle button.active { background: #2c2c2c; color: #fff; }
    .chart-container { background: #fff; border: 1px solid #e0ddd8; border-radius: 10px; padding: 16px 20px; }
    .chart-row { display: flex; align-items: center; gap: 10px; margin-bottom: 6px; }
    .chart-label { width: 200px; flex-shrink: 0; font-size: 12px; font-weight: 500; color: #333; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; text-align: right; }
    .chart-bar-wrap { flex: 1; height: 24px; background: #f5f4f1; border-radius: 4px; position: relative; overflow: hidden; }
    .chart-bar { height: 100%; border-radius: 4px; transition: width .4s ease; min-width: 2px; position: absolute; left: 0; top: 0; }
    .chart-bar.charged { background: #d1d5db; z-index: 1; }
    .chart-bar.received { background: #22c55e; z-index: 2; }
    .chart-bar.outstanding { background: #f59e0b; z-index: 2; }
    .chart-bar.fill-high { background: #22c55e; }
    .chart-bar.fill-mid { background: #f59e0b; }
    .chart-bar.fill-low { background: #ef4444; }
    .chart-val { width: 80px; flex-shrink: 0; font-size: 12px; font-weight: 600; color: #333; font-variant-numeric: tabular-nums; }
    .chart-val-sub { font-weight: 400; color: #999; font-size: 11px; }
    .chart-legend { display: flex; gap: 16px; margin-top: 10px; padding-top: 8px; border-top: 1px solid #f0eeeb; }
    .chart-legend-item { display: flex; align-items: center; gap: 5px; font-size: 11px; color: #666; }
    .chart-legend-dot { width: 10px; height: 10px; border-radius: 2px; }
    .chart-expand { background: none; border: 1px dashed #d0cdc8; border-radius: 6px; padding: 6px 16px; font-size: 11px; color: #888; cursor: pointer; margin-top: 8px; width: 100%; }
    .chart-expand:hover { background: #fafaf8; border-color: #aaa; }
    @media print { .chart-section { page-break-inside: avoid; } }
  </style>
  <script>
    // ── Token auth (injected) ────────────────────────────────────────
    const URL_TOKEN = new URLSearchParams(window.location.search).get('token') || '';
    const TOKEN_QS  = URL_TOKEN ? '?token=' + encodeURIComponent(URL_TOKEN) : '';
    function withToken(url) {
      if (!URL_TOKEN) return url;
      return url + (url.includes('?') ? '&' : '?') + 'token=' + encodeURIComponent(URL_TOKEN);
    }
  </script>
</head>
<body>
<div id="root"></div>

<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<script type="text/babel">
const { useState, useEffect, useMemo, useCallback } = React;

const LS_SHOW_DETAILS  = 'prog_show_details';
const LS_SHOW_REGMODE  = 'prog_show_regmode';
const LS_SHOW_WAITLIST = 'prog_show_waitlist';
const LS_SHOW_CANCELS  = 'prog_show_cancels';

function getOrgAndBase() {
  const parts = window.location.pathname.split('/').filter(Boolean);
  return { orgSlug: parts[0] || 'unknown', basePath: `/${parts[0]}/${parts[1]}` };
}

function getParams() {
  const p = new URLSearchParams(window.location.search);
  return { start_date: p.get('start_date'), end_date: p.get('end_date'), _print: p.get('_print') };
}

function getCurrentMonthRange() {
  const now = new Date(), y = now.getFullYear(), m = now.getMonth();
  return { start: toISO(new Date(y, m, 1)), end: toISO(new Date(y, m + 1, 0)) };
}

function toISO(d) {
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function formatDisplayDate(iso) {
  if (!iso) return '';
  const d = new Date(iso + 'T12:00:00');
  const months = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  return `${months[d.getMonth()]} ${d.getDate()}, ${d.getFullYear()}`;
}

function fmtMoney(v) {
  if (v == null || v === '') return '$0.00';
  const n = parseFloat(v);
  if (isNaN(n)) return '$0.00';
  return (n < 0 ? '-$' : '$') + Math.abs(n).toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g, ',');
}

function fmtNum(v) {
  const n = parseFloat(v);
  return isNaN(n) ? 0 : n;
}

function fillClass(v) {
  if (v == null || v === '') return '';
  const n = parseFloat(v);
  if (isNaN(n)) return '';
  if (n >= 90) return 'fill-high';
  if (n >= 70) return 'fill-mid';
  return 'fill-low';
}

// ── Reg-mode helpers (section-based vs session-based) ────────────────
function regModeVis(regMode) {
  const m = (regMode || '').toLowerCase();
  if (m.includes('section')) return { sec: true,  sess: false };
  if (m.includes('session')) return { sec: false, sess: true  };
  return { sec: true, sess: true }; // unknown → show both (back-compat)
}
function regModeLabel(regMode) {
  const m = (regMode || '').toLowerCase();
  if (m.includes('section')) return 'Section';
  if (m.includes('session')) return 'Session';
  return regMode || '';
}
// Dominant mode across a program's sections; '' when mixed/unknown.
function progMode(sections) {
  let sec = false, sess = false;
  sections.forEach(r => {
    const m = (r.regMode || '').toLowerCase();
    if (m.includes('section')) sec = true;
    else if (m.includes('session')) sess = true;
  });
  if (sec && !sess) return 'Section-based';
  if (sess && !sec) return 'Session-based';
  return '';
}
// Cancellation rate = cancellations ÷ enrollments (null when no enrollments).
function cancelPct(cancellations, enrollments) {
  const c = parseFloat(cancellations), e = parseFloat(enrollments);
  if (!isFinite(e) || e <= 0 || !isFinite(c)) return null;
  return (c / e) * 100;
}

// Reads BOTH the program-grain feed (legacy, Title-Case aggregate columns) and
// the section-grain feed (one row per section, with a 'Section' column). When a
// 'Section' is present the row is flagged isSection and rolled up below.
function normalizeRow(raw) {
  const pick = (...keys) => { for (const k of keys) { if (raw[k] != null && raw[k] !== '') return raw[k]; } return null; };
  const sectionName = raw['Section'] ?? raw['section'] ?? '';
  const isSection   = (sectionName !== '') || raw['Section Id'] != null || raw['section_id'] != null;
  return {
    isSection,
    programName:   raw['Program'] ?? raw['program'] ?? '',
    programId:     raw['Program Id'] ?? raw['program_id'] ?? raw['Program'] ?? raw['program'] ?? '',
    sectionName,
    sectionId:     raw['Section Id'] ?? raw['section_id'] ?? sectionName,
    status:        raw['Status'] ?? raw['Section Status'] ?? raw['section_status'] ?? '',
    season:        raw['Season'] ?? raw['program_season'] ?? '',
    regMode:       raw['Reg Mode'] ?? raw['registration_mode'] ?? '',
    startDate:     raw['Start Date'] ?? raw['start_date'] ?? '',
    endDate:       raw['End Date'] ?? raw['end_date'] ?? '',
    sections:      raw['Sections'] ?? (isSection ? 1 : 0),
    enrollments:   raw['Enrollments'] ?? raw['Enrolled'] ?? raw['enrolled'] ?? 0,
    utilized:      pick('Utilized','utilized'),
    capacity:      pick('Capacity','capacity'),
    utilization:   raw['Utilization'] ?? '',
    fillPct:       raw['Fill %'] ?? raw['fill_pct'] ?? null,
    waitlist:      raw['Waitlist'] ?? 0,
    cancellations: raw['Cancellations'] ?? 0,
    refunds:       raw['Refunds'] ?? raw['refunds'] ?? 0,
    charged:       raw['Charged'] ?? raw['charged'] ?? 0,
    received:      raw['Received'] ?? raw['received'] ?? 0,
    outstanding:   raw['Outstanding'] ?? raw['outstanding'] ?? 0,
    netRevenue:    raw['Net Revenue'] ?? raw['Net Total'] ?? raw['net_total'] ?? 0,
  };
}

// Section-grain → one row per PROGRAM (sum of its sections), each carrying its
// section rows in _sections for the expand/breakout. Program totals are the sum
// of their sections by construction, so parent always reconciles to children.
function rollupToPrograms(secRows) {
  const map = new Map();
  for (const r of secRows) {
    const key = r.programId || r.programName;
    if (!map.has(key)) map.set(key, {
      isSection:false, programId:key, programName:r.programName, season:r.season,
      regMode:'', startDate:null, endDate:null, sections:0, enrollments:0,
      _util:0, _cap:0, waitlist:0, cancellations:0,
      charged:0, received:0, outstanding:0, refunds:0, netRevenue:0, _sections:[],
    });
    const g = map.get(key);
    g._sections.push(r);
    g.sections     += 1;
    g.enrollments  += fmtNum(r.enrollments);
    g._util        += fmtNum(r.utilized);
    g._cap         += (r.capacity == null ? 0 : fmtNum(r.capacity));
    g.waitlist     += fmtNum(r.waitlist);
    g.cancellations+= fmtNum(r.cancellations);
    g.charged      += fmtNum(r.charged);
    g.received     += fmtNum(r.received);
    g.outstanding  += fmtNum(r.outstanding);
    g.refunds      += fmtNum(r.refunds);
    g.netRevenue   += fmtNum(r.netRevenue);
    if (r.startDate && (!g.startDate || r.startDate < g.startDate)) g.startDate = r.startDate;
    if (r.endDate   && (!g.endDate   || r.endDate   > g.endDate))   g.endDate   = r.endDate;
  }
  const out = [];
  for (const g of map.values()) {
    g.regMode     = progMode(g._sections);
    g.utilization = `${fmtNum(g._util).toLocaleString()} / ${fmtNum(g._cap).toLocaleString()}`;
    g.fillPct     = g._cap > 0 ? Math.round((g._util / g._cap) * 1000) / 10 : null;
    g._sections.forEach(sx => {
      sx.utilization = `${fmtNum(sx.utilized).toLocaleString()} / ${(sx.capacity == null ? '\u221E' : fmtNum(sx.capacity).toLocaleString())}`;
      sx.fillPct     = (sx.capacity != null && fmtNum(sx.capacity) > 0) ? Math.round((fmtNum(sx.utilized) / fmtNum(sx.capacity)) * 1000) / 10 : null;
    });
    out.push(g);
  }
  out.sort((a, b) => a.programName.localeCompare(b.programName));
  return out;
}

function App() {
  const { orgSlug, basePath } = useMemo(() => getOrgAndBase(), []);
  const params   = useMemo(() => getParams(), []);
  const defaults = useMemo(() => getCurrentMonthRange(), []);

  const [startDate,   setStartDate]   = useState(params.start_date || defaults.start);
  const [endDate,     setEndDate]     = useState(params.end_date   || defaults.end);
  const [rows,        setRows]        = useState(null);
  const [sectionGrain, setSectionGrain] = useState(false);
  const [open,        setOpen]        = useState(() => new Set());
  const [meta,        setMeta]        = useState({});
  const [error,       setError]       = useState(null);
  const [loading,     setLoading]     = useState(false);
  const [pdfLoading,  setPdfLoading]  = useState(false);
  const [loadedStart, setLoadedStart] = useState(null);
  const [loadedEnd,   setLoadedEnd]   = useState(null);

  // Share Link: expose the live applied filter state so the floating Share
  // widget copies a URL that reproduces the on-screen view (mirrors the PDF).
  useEffect(() => {
    window.recShareLink = () => {
      const qs = new URLSearchParams();
      qs.set('start_date', loadedStart || startDate);
      qs.set('end_date',   loadedEnd   || endDate);
      if (URL_TOKEN) qs.set('token', URL_TOKEN);
      return `${window.location.pathname}?${qs.toString()}`;
    };
    return () => { try { delete window.recShareLink; } catch (e) { window.recShareLink = undefined; } };
  }, [loadedStart, loadedEnd, startDate, endDate]);

  const [search, setSearch] = useState(() => new URLSearchParams(window.location.search).get('search') || '');

  const [colPresence, setColPresence] = useState({ regMode: false, cancellations: false });
  const [insights,        setInsights]        = useState(null);
  const [insightsLoading, setInsightsLoading] = useState(false);
  const [insightsError,   setInsightsError]   = useState(null);
  const [showRegMode,  setShowRegMode]  = useState(() => { try { return localStorage.getItem(LS_SHOW_REGMODE)  === 'true'; } catch { return false; } });
  const [showWaitlist, setShowWaitlist] = useState(() => { try { return localStorage.getItem(LS_SHOW_WAITLIST) === 'true'; } catch { return false; } });
  const [showCancels,  setShowCancels]  = useState(() => { try { return localStorage.getItem(LS_SHOW_CANCELS)  === 'true'; } catch { return false; } });
  const [chartView, setChartView] = useState('revenue');
  const [chartExpanded, setChartExpanded] = useState(false);

  useEffect(() => {
    if (params._print === '1') document.body.classList.add('print-mode');
  }, []);

  const fetchData = useCallback((sd, ed) => {
    setLoading(true); setError(null);
    const qs = new URLSearchParams();
    if (sd) qs.set('start_date', sd);
    if (ed) qs.set('end_date',   ed);
    fetch(withToken(`${basePath}/api/data?${qs}`))
      .then(r => { if (!r.ok) throw new Error(`Server returned ${r.status}`); return r.json(); })
      .then(json => {
        const raw = json.rows || [];
        const normalized = raw.map(normalizeRow);
        const isSecGrain = normalized.some(r => r.isSection);
        setSectionGrain(isSecGrain);
        setRows(isSecGrain ? rollupToPrograms(normalized) : normalized);
        setMeta(json.meta || {});
        setLoadedStart(sd);
        setLoadedEnd(ed);
        setColPresence({
          regMode:       isSecGrain ? normalized.some(r => r.regMode) : raw.some(r => r['Reg Mode'] != null && r['Reg Mode'] !== ''),
          cancellations: raw.some(r => (r['Cancellations'] != null) || (r['cancellations'] != null)),
        });
      })
      .catch(err => setError(err.message))
      .finally(() => setLoading(false));
  }, [basePath]);

  useEffect(() => { fetchData(startDate, endDate); }, []);

  function setMonth(offset) {
    const now = new Date();
    const t = new Date(now.getFullYear(), now.getMonth() + offset, 1);
    setStartDate(toISO(t));
    setEndDate(toISO(new Date(t.getFullYear(), t.getMonth() + 1, 0)));
  }

  function setYear() {
    const y = new Date().getFullYear();
    setStartDate(`${y}-01-01`);
    setEndDate(`${y}-12-31`);
  }

  function downloadPdf() {
    setPdfLoading(true);
    const qs = new URLSearchParams();
    if (loadedStart) qs.set('start_date', loadedStart);
    if (loadedEnd)   qs.set('end_date',   loadedEnd);
    if (search && search.trim()) qs.set('search', search.trim());
    fetch(withToken(`${basePath}/api/pdf?${qs}`))
      .then(r => r.blob())
      .then(blob => {
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = `program-revenue-${loadedStart || 'report'}.pdf`;
        a.click();
        URL.revokeObjectURL(a.href);
      })
      .catch(err => alert('PDF failed: ' + err.message))
      .finally(() => setPdfLoading(false));
  }

  function downloadExcel() {
    if (!rows || rows.length === 0) return;
    const headers = [
      'Program','Season',
      ...(showRegModeCol ? ['Reg Mode'] : []),
      'Start Date','End Date','Sections','Enrollments','Utilization','Fill %',
      ...(showWaitlist ? ['Waitlist'] : []),
      ...(showCancelsCol ? ['Cancellations','Cancellation %'] : []),
      'Charged','Received','Outstanding','Refunds','Net Revenue'
    ];
    const data = rows.map(r => {
      const cp  = cancelPct(r.cancellations, r.enrollments);
      return [
        r.programName, r.season,
        ...(showRegModeCol ? [regModeLabel(r.regMode)] : []),
        r.startDate, r.endDate,
        fmtNum(r.sections), fmtNum(r.enrollments), r.utilization,
        r.fillPct != null ? fmtNum(r.fillPct) : '',
        ...(showWaitlist ? [fmtNum(r.waitlist)] : []),
        ...(showCancelsCol ? [fmtNum(r.cancellations), cp != null ? `${Math.round(cp)}%` : ''] : []),
        fmtNum(r.charged), fmtNum(r.received), fmtNum(r.outstanding),
        fmtNum(r.refunds), fmtNum(r.netRevenue),
      ];
    });
    const ws = XLSX.utils.aoa_to_sheet([headers, ...data]);
    ws['!cols'] = [
      {wch:30},{wch:14},
      ...(showRegModeCol ? [{wch:14}] : []),
      {wch:12},{wch:12},{wch:10},{wch:12},{wch:16},{wch:8},
      ...(showWaitlist ? [{wch:10}] : []),
      ...(showCancelsCol ? [{wch:13},{wch:12}] : []),
      {wch:12},{wch:12},{wch:12},{wch:12},{wch:12},
    ];
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, 'Program Revenue');
    XLSX.writeFile(wb, `program-revenue-${orgSlug}-${loadedStart || 'report'}.xlsx`);
    logClientEvent('excel');
  }


  // Fire-and-forget log to server for client-side events (excel, print)
  function logClientEvent(event) {
    try {
      const parts = window.location.pathname.split('/').filter(Boolean);
      if (parts.length >= 2) fetch(withToken(`/${parts[0]}/${parts[1]}/api/log?event=${event}`), { method: 'POST' }).catch(() => {});
    } catch {}
  }

  // ── AI Insights ────────────────────────────────────────────────────
  const buildInsightsBlob = useCallback(() => {
    if (!filteredRows || filteredRows.length === 0) return {};
    const r2 = n => Math.round(n * 100) / 100;
    const programs = filteredRows
      .slice()
      .sort((a, b) => fmtNum(b.charged) - fmtNum(a.charged))
      .slice(0, 30)
      .map(r => ({
        name: r.programName,
        sections: fmtNum(r.sections),
        charged: r2(fmtNum(r.charged)),
        received: r2(fmtNum(r.received)),
        outstanding: r2(fmtNum(r.outstanding)),
        enrollments: fmtNum(r.enrollments),
        fillPct: r.fillPct != null ? fmtNum(r.fillPct) : null,
        waitlist: fmtNum(r.waitlist) || 0,
        cancellations: fmtNum(r.cancellations) || 0,
        cancellationRate: fmtNum(r.enrollments) > 0 ? Math.round((fmtNum(r.cancellations)/fmtNum(r.enrollments))*100) : null,
        refunds: r2(fmtNum(r.refunds)),
        netRevenue: r2(fmtNum(r.netRevenue)),
      }));
    return {
      period: { start: loadedStart, end: loadedEnd },
      summary: {
        programCount,
        totalSections: totals.sections,
        totalCharged: r2(totals.charged),
        totalReceived: r2(totals.received),
        totalOutstanding: r2(totals.outstanding),
        totalEnrollments: totals.enrollments,
        totalWaitlist: totals.waitlist,
        totalCancellations: totals.cancellations || 0,
        totalRefunds: r2(totals.refunds),
        netRevenue: r2(totals.netRevenue),
        overallCancellationPct: totals.enrollments > 0
          ? Math.round(((totals.cancellations||0)/totals.enrollments)*100) : null,
      },
      programs,
    };
  }, [filteredRows, totals, programCount, loadedStart, loadedEnd]);

  const getInsights = useCallback(async () => {
    setInsightsLoading(true);
    setInsightsError(null);
    setInsights(null);
    try {
      const blob = buildInsightsBlob();
      const resp = await fetch(withToken(`${basePath}/api/insights`), {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(blob),
      });
      const json = await resp.json().catch(() => ({}));
      if (!resp.ok || !json.ok) throw new Error(json.error || `Request failed (${resp.status})`);
      setInsights(json.insights || []);
    } catch (err) {
      setInsightsError(err.message || 'Could not generate insights');
    } finally {
      setInsightsLoading(false);
    }
  }, [buildInsightsBlob, basePath]);

  // ── Computed values ────────────────────────────────────────────────
  const grouped = useMemo(() => {
    if (!rows) return null;
    const map = {};
    rows.forEach(r => {
      if (!map[r.programName]) map[r.programName] = [];
      map[r.programName].push(r);
    });
    if (!search.trim()) return map;
    const q = search.trim().toLowerCase();
    const filtered = {};
    Object.entries(map).forEach(([prog, sections]) => {
      if (prog.toLowerCase().includes(q)) filtered[prog] = sections;
    });
    return filtered;
  }, [rows, search]);

  // Rows remaining after the program search filter — drives summary cards + grand total
  const filteredRows = useMemo(() => (grouped ? Object.values(grouped).flat() : []), [grouped]);

  const totals = useMemo(() => {
    if (!filteredRows || filteredRows.length === 0) return null;
    return filteredRows.reduce((acc, r) => ({
      charged:            acc.charged            + fmtNum(r.charged),
      received:           acc.received           + fmtNum(r.received),
      outstanding:        acc.outstanding        + fmtNum(r.outstanding),
      refunds:            acc.refunds            + fmtNum(r.refunds),
      netRevenue:         acc.netRevenue         + fmtNum(r.netRevenue),
      enrollments:        acc.enrollments        + fmtNum(r.enrollments),
      sections:           acc.sections           + fmtNum(r.sections),
      waitlist:           acc.waitlist           + fmtNum(r.waitlist),
      cancellations:      acc.cancellations      + fmtNum(r.cancellations),
    }), { charged:0, received:0, outstanding:0, refunds:0, netRevenue:0, enrollments:0, sections:0, waitlist:0, cancellations:0 });
  }, [filteredRows]);

  const programCount = grouped ? Object.keys(grouped).length : 0;
  const allOpen  = sectionGrain && rows && rows.length > 0 && rows.every(r => open.has(r.programId));
  const toggle   = (id) => setOpen(prev => { const n = new Set(prev); n.has(id) ? n.delete(id) : n.add(id); return n; });
  const toggleAll = () => setOpen(allOpen ? new Set() : new Set((rows || []).map(r => r.programId)));
  const hasRegMode       = colPresence.regMode;
  const hasCancellations = colPresence.cancellations;
  const showRegModeCol   = hasRegMode && showRegMode;
  const showCancelsCol   = hasCancellations && showCancels;
  const leftCols         = 4 + (showRegModeCol ? 1 : 0);
  const isPrint = params._print === '1';
  const datesChanged = startDate !== loadedStart || endDate !== loadedEnd;

  // ── Toolbar ────────────────────────────────────────────────────────
  function renderToolbar() {
    if (isPrint) return null;
    return (
      <div className="toolbar">
        <span className="toolbar-title">Program Revenue</span>
        <div className="divider" />
        <label>Start<input type="date" value={startDate} onChange={e => setStartDate(e.target.value)} /></label>
        <label>End<input type="date" value={endDate} onChange={e => setEndDate(e.target.value)} /></label>
        <button onClick={() => setMonth(-1)} style={{fontSize:11,padding:'4px 8px'}}>Last Month</button>
        <button onClick={() => setMonth(0)}  style={{fontSize:11,padding:'4px 8px'}}>This Month</button>
        <button onClick={() => setMonth(1)}  style={{fontSize:11,padding:'4px 8px'}}>Next Month</button>
        <button onClick={setYear}            style={{fontSize:11,padding:'4px 8px'}}>This Year</button>
        <button
          className="btn-run"
          onClick={() => fetchData(startDate, endDate)}
          disabled={loading}
          style={datesChanged && !loading ? {boxShadow:'0 0 0 2px #4ade80'} : {}}
        >
          {loading ? 'Loading…' : '▶ Run Report'}
        </button>
        <div className="divider" />
        <div style={{display:'flex',alignItems:'center',gap:8,fontSize:11}}>
          <span style={{color:'#999',fontSize:10,textTransform:'uppercase',letterSpacing:'0.05em'}}>Cols</span>
          {hasRegMode && (
            <label style={{display:'flex',alignItems:'center',gap:4,cursor:'pointer',color:'#ccc',userSelect:'none'}}>
              <input type="checkbox" checked={showRegMode} onChange={e => { const v=e.target.checked; setShowRegMode(v); try{localStorage.setItem(LS_SHOW_REGMODE,String(v))}catch{} }} />
              Reg Mode
            </label>
          )}
          <label style={{display:'flex',alignItems:'center',gap:4,cursor:'pointer',color:'#ccc',userSelect:'none'}}>
            <input type="checkbox" checked={showWaitlist} onChange={e => { const v=e.target.checked; setShowWaitlist(v); try{localStorage.setItem(LS_SHOW_WAITLIST,String(v))}catch{} }} />
            Waitlist
          </label>
          {hasCancellations && (
            <label style={{display:'flex',alignItems:'center',gap:4,cursor:'pointer',color:'#ccc',userSelect:'none'}}>
              <input type="checkbox" checked={showCancels} onChange={e => { const v=e.target.checked; setShowCancels(v); try{localStorage.setItem(LS_SHOW_CANCELS,String(v))}catch{} }} />
              Cancels
            </label>
          )}
        </div>
        {sectionGrain && (
          <>
            <div className="divider" />
            <label style={{display:'flex',alignItems:'center',gap:6,cursor:'pointer',color:'#fff',userSelect:'none',fontWeight:600,fontSize:12}}>
              <input type="checkbox" checked={allOpen} onChange={toggleAll} />
              Breakout sections
            </label>
          </>
        )}
        <div className="divider" />
        <div style={{position:'relative',display:'flex',alignItems:'center'}}>
          <span style={{position:'absolute',left:8,color:'#666',fontSize:12,pointerEvents:'none'}}>🔍</span>
          <input
            type="text"
            placeholder="Filter programs…"
            value={search}
            onChange={e => setSearch(e.target.value)}
            style={{
              paddingLeft:26, paddingRight: search ? 24 : 8,
              paddingTop:4, paddingBottom:4,
              border:'1px solid rgba(255,255,255,.2)', borderRadius:4,
              background:'rgba(255,255,255,.1)', color:'#fff',
              fontSize:12, fontFamily:'inherit', outline:'none', width:180,
            }}
          />
          {search && (
            <button
              onClick={() => setSearch('')}
              style={{position:'absolute',right:4,background:'none',border:'none',color:'#aaa',fontSize:14,padding:'0 2px',cursor:'pointer',lineHeight:1}}
            >×</button>
          )}
        </div>
        <div className="toolbar-spacer" />
        {rows && (
          <span className="row-count">
            {search.trim()
              ? `${programCount} of ${new Set(rows.map(r => r.programName)).size} programs`
              : `${totals ? totals.sections : rows.length} section${(totals ? totals.sections : rows.length) !== 1 ? 's' : ''} \u00b7 ${programCount} program${programCount !== 1 ? 's' : ''}`
            }
          </span>
        )}
        <div className="divider" />
        <button onClick={() => window.print()}>🖨️ Print</button>
        <button className="btn-pdf" onClick={downloadPdf} disabled={pdfLoading || !rows || rows.length === 0}>
          {pdfLoading ? 'Generating…' : '📄 PDF'}
        </button>
        <button className="btn-excel" onClick={downloadExcel} disabled={!rows || rows.length === 0}>
          📊 Excel
        </button>
        {orgSlug && (
          <>
            <div className="divider" />
            <a href={withToken(`/${orgSlug}/admin`)} style={{color:'#aaa',fontSize:11,textDecoration:'none',padding:'4px 8px',border:'1px solid rgba(255,255,255,.18)',borderRadius:4,whiteSpace:'nowrap'}}>
              📧 Subscriptions
            </a>
          </>
        )}
      </div>
    );
  }

  // ── Error / Loading ────────────────────────────────────────────────
  if (error && !rows) return (
    <div>{renderToolbar()}
      <div className="page"><div className="error">
        <p><strong>Failed to load report data</strong></p><p>{error}</p>
      </div></div>
    </div>
  );

  if (!rows) return (
    <div>{renderToolbar()}
      <div className="page"><div className="loading">
        <div className="spinner" /><div className="juice-msg"><span>Squeezing the oranges…</span><span>Juicing!</span><span>Adding the pulp…</span><span>Chilling the glass…</span><span>Pouring it out…</span></div>
      </div></div>
    </div>
  );

  const now = new Date();
  const runDate = `${String(now.getMonth()+1).padStart(2,'0')}/${String(now.getDate()).padStart(2,'0')}/${now.getFullYear()} @ ${now.toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit',hour12:true}).toLowerCase()}`;
  const orgName = meta.org_name || (meta.org_slug ? meta.org_slug.charAt(0).toUpperCase() + meta.org_slug.slice(1) : 'rec.us');
  const logoUrl = meta.logo_url || null;
  const dateRangeLabel = [loadedStart && formatDisplayDate(loadedStart), loadedEnd && formatDisplayDate(loadedEnd)].filter(Boolean).join(' – ') || 'All Dates';

  // Column span helpers
  const totalCols  = 13 + (showRegModeCol ? 1 : 0) + (showWaitlist ? 1 : 0) + (showCancelsCol ? 2 : 0);

  return (
    <div>
      {renderToolbar()}
      <div className="page" style={loading ? {opacity:0.5,pointerEvents:'none'} : {}}>

        {/* Header */}
        <div className="report-header">
          <div className="report-header-left">
            {logoUrl && <img src={logoUrl} alt="" className="report-header-logo" onError={e => e.target.style.display='none'} />}
            <div>
              <div className="org-label">{orgName}</div>
              <div className="title">Program Revenue</div>
            </div>
          </div>
          <div className="report-header-right">
            <div className="date-range">{dateRangeLabel}</div>
          </div>
        </div>

        {/* Info blurb */}
        <div className="report-blurb">
          <strong>How revenue is calculated:</strong> Revenue is transaction-based. <em>Received</em> is cash actually collected — succeeded payments plus any canceled-status payment that is the sole or partial collection on an item (reversed or retried charges already covered by a successful payment are excluded, so nothing is double-counted); for payment plans, only paid installments count. <em>Charged</em> is the invoiced amount after discounts. <em>Outstanding</em> is the balance still collectible — unpaid, un-waived installments for payment-plan registrations, or the uncollected balance otherwise; waived installments and canceled registrations are excluded. <em>Net Rev</em> = Received minus Refunds. <em>Fill %</em> compares filled seats to capacity (a section registration counts across all of its sessions; session-based programs sum each session's bookings).
        </div>

        {/* Summary cards */}
        {totals && (
          <div className="summary-cards">
            <div className="summary-card">
              <div className="card-label">Charged</div>
              <div className="card-value green">{fmtMoney(totals.charged)}</div>
              <div className="card-sub">Total amount billed to registrants</div>
            </div>
            <div className="summary-card">
              <div className="card-label">Received</div>
              <div className="card-value green">{fmtMoney(totals.received)}</div>
              <div className="card-sub">Payments collected to date</div>
            </div>
            <div className="summary-card">
              <div className="card-label">Outstanding</div>
              <div className={`card-value ${fmtNum(totals.outstanding) > 0 ? 'red' : ''}`}>{fmtMoney(totals.outstanding)}</div>
              <div className="card-sub">Charged minus received — unpaid balance</div>
            </div>
            <div className="summary-card">
              <div className="card-label">Refunds</div>
              <div className="card-value red">{fmtMoney(totals.refunds)}</div>
              <div className="card-sub">Total refunded back to registrants</div>
            </div>
            <div className="summary-card">
              <div className="card-label">Net Revenue</div>
              <div className={`card-value ${totals.netRevenue < 0 ? 'red' : 'green'}`}>{fmtMoney(totals.netRevenue)}</div>
              <div className="card-sub">Received minus refunds</div>
            </div>
            <div className="summary-card">
              <div className="card-label">Enrollments</div>
              <div className="card-value blue">{totals.enrollments.toLocaleString()}</div>
              <div className="card-sub">{totals.waitlist > 0 ? `${totals.waitlist} on waitlist` : 'Active confirmed registrations'}</div>
            </div>
            <div className="summary-card">
              <div className="card-label">Programs</div>
              <div className="card-value">{programCount}</div>
              <div className="card-sub">{totals.sections} total sections across all programs</div>
            </div>
          </div>
        )}

        {/* Charts */}
        {!loading && filteredRows.length > 0 && (() => {
          const MAX_DEFAULT = 15;
          const revSorted = filteredRows.slice().sort((a,b) => fmtNum(b.charged) - fmtNum(a.charged));
          const fillSorted = filteredRows.slice().sort((a,b) => fmtNum(b.fillPct) - fmtNum(a.fillPct));
          const source = chartView === 'revenue' ? revSorted : fillSorted;
          const visible = chartExpanded || source.length <= MAX_DEFAULT ? source : source.slice(0, MAX_DEFAULT);
          const remaining = source.length - MAX_DEFAULT;
          const maxCharged = Math.max(...revSorted.map(r => fmtNum(r.charged)), 1);

          return (
            <div className="chart-section no-print">
              <div className="chart-toggle">
                <button className={chartView==='revenue'?'active':''} onClick={()=>{setChartView('revenue');setChartExpanded(false);}}>Revenue</button>
                <button className={chartView==='fill'?'active':''} onClick={()=>{setChartView('fill');setChartExpanded(false);}}>Fill Rate</button>
              </div>
              <div className="chart-container">
                {visible.map((r, i) => {
                  if (chartView === 'revenue') {
                    const charged = fmtNum(r.charged);
                    const received = fmtNum(r.received);
                    const outstanding = fmtNum(r.outstanding);
                    const chargedPct = (charged / maxCharged) * 100;
                    const receivedPct = (received / maxCharged) * 100;
                    return (
                      <div className="chart-row" key={i}>
                        <div className="chart-label" title={r.programName}>{r.programName}</div>
                        <div className="chart-bar-wrap">
                          <div className="chart-bar charged" style={{width: chargedPct + '%'}} />
                          <div className="chart-bar received" style={{width: receivedPct + '%'}} />
                        </div>
                        <div className="chart-val">
                          {fmtMoney(charged)}
                          {outstanding > 0 && <div className="chart-val-sub">{fmtMoney(outstanding)} due</div>}
                        </div>
                      </div>
                    );
                  } else {
                    const fill = fmtNum(r.fillPct);
                    const fc = fill >= 75 ? 'fill-high' : fill >= 25 ? 'fill-mid' : 'fill-low';
                    return (
                      <div className="chart-row" key={i}>
                        <div className="chart-label" title={r.programName}>{r.programName}</div>
                        <div className="chart-bar-wrap">
                          <div className={`chart-bar ${fc}`} style={{width: Math.min(fill || 0, 100) + '%'}} />
                        </div>
                        <div className="chart-val">
                          {fill != null ? fill + '%' : '\u2014'}
                          <div className="chart-val-sub">{r.utilization || ''}</div>
                        </div>
                      </div>
                    );
                  }
                })}
                {!chartExpanded && remaining > 0 && (
                  <button className="chart-expand" onClick={() => setChartExpanded(true)}>Show {remaining} more program{remaining !== 1 ? 's' : ''}</button>
                )}
                {chartExpanded && source.length > MAX_DEFAULT && (
                  <button className="chart-expand" onClick={() => setChartExpanded(false)}>Show top {MAX_DEFAULT} only</button>
                )}
                <div className="chart-legend">
                  {chartView === 'revenue' ? (<>
                    <div className="chart-legend-item"><div className="chart-legend-dot" style={{background:'#22c55e'}} />Received</div>
                    <div className="chart-legend-item"><div className="chart-legend-dot" style={{background:'#d1d5db'}} />Charged (full bar)</div>
                    <div className="chart-legend-item"><div className="chart-legend-dot" style={{background:'#f59e0b'}} />Outstanding noted in value</div>
                  </>) : (<>
                    <div className="chart-legend-item"><div className="chart-legend-dot" style={{background:'#22c55e'}} />{'\u2265'}75% filled</div>
                    <div className="chart-legend-item"><div className="chart-legend-dot" style={{background:'#f59e0b'}} />25\u201374% filled</div>
                    <div className="chart-legend-item"><div className="chart-legend-dot" style={{background:'#ef4444'}} />&lt;25% filled</div>
                  </>)}
                </div>
              </div>
            </div>
          );
        })()}

        {/* AI Insights */}
        {!loading && rows.length > 0 && (
          <div className="insights-section no-print">
            <div className="insights-head">
              <button type="button" className="insights-btn" onClick={getInsights} disabled={insightsLoading}>
                {insightsLoading ? 'Analyzing…' : (insights ? '↻ Refresh insights' : '✨ Get insights')}
              </button>
              {insights && !insightsLoading && (
                <span className="insights-sub">Generated from {programCount} program{programCount !== 1 ? 's' : ''}</span>
              )}
            </div>
            {insightsLoading && (
              <div className="loading"><div className="spinner" /><div className="juice-msg"><span>Squeezing the oranges…</span><span>Juicing!</span><span>Adding the pulp…</span><span>Chilling the glass…</span><span>Pouring it out…</span></div></div>
            )}
            {insightsError && !insightsLoading && (
              <div className="error"><strong>Insights unavailable:</strong> {insightsError}</div>
            )}
            {insights && !insightsLoading && (
              <div className="insights-grid">
                {insights.map((ins, i) => (
                  <div key={i} className={`insight-card insight-${ins.type || 'signal'}`}>
                    <div className="insight-type">{ins.type || 'signal'}</div>
                    <div className="insight-title">{ins.title}</div>
                    <div className="insight-detail">{ins.detail}</div>
                    {ins.action && <div className="insight-action">→ {ins.action}</div>}
                  </div>
                ))}
              </div>
            )}
          </div>
        )}

        {/* Table */}
        {rows.length === 0 ? (
          <div style={{textAlign:'center',padding:'40px 0',color:'#888'}}>No program data found for the selected date range.</div>
        ) : (
          <div className="table-scroll">
          <table className="prog-table">
            <thead>
              <tr>
                <th className="left" style={{minWidth:200}}>Program</th>
                <th className="left" style={{minWidth:100}}>Season</th>
                {showRegModeCol && <th className="left" style={{width:100}}>Reg Mode</th>}
                <th className="left" style={{width:88}}>Start</th>
                <th className="left" style={{width:88}}>End</th>
                <th style={{width:64}}>Sections</th>
                <th style={{width:76}}>Enroll</th>
                <th style={{width:96}}>Utilization</th>
                <th style={{width:60}}>Fill %</th>
                {showWaitlist && <th style={{width:64}}>Waitlist</th>}
                {showCancelsCol && <>
                  <th style={{width:84}}>Cancels</th>
                  <th style={{width:72}}>Cancel %</th>
                </>}
                <th style={{width:90}}>Charged</th>
                <th style={{width:90}}>Received</th>
                <th style={{width:90}}>Outstanding</th>
                <th style={{width:90}}>Refunds</th>
                <th style={{width:90}}>Net Rev</th>
              </tr>
            </thead>
            <tbody>
              {filteredRows.map((r, i) => {
                const cp = cancelPct(r.cancellations, r.enrollments);
                const hasSecs = Array.isArray(r._sections) && r._sections.length > 0;
                const isOpen  = hasSecs && open.has(r.programId);
                return (
                  <React.Fragment key={i}>
                  <tr className={"data-row" + (hasSecs ? " prog-clickable" : "")} onClick={hasSecs ? () => toggle(r.programId) : undefined}>
                    <td className="left" style={{fontWeight:600}}>{hasSecs && <span className={"chev" + (isOpen ? " open" : "")}>{"\u25B6"}</span>}{r.programName}</td>
                    <td className="left mono">{r.season}</td>
                    {showRegModeCol && <td className="left">{regModeLabel(r.regMode)}</td>}
                    <td className="left mono">{r.startDate}</td>
                    <td className="left mono">{r.endDate}</td>
                    <td>{fmtNum(r.sections) || '—'}</td>
                    <td>{fmtNum(r.enrollments) || '—'}</td>
                    <td className="mono">{r.utilization || '—'}</td>
                    <td className={fillClass(r.fillPct)}>{r.fillPct != null ? `${fmtNum(r.fillPct)}%` : '—'}</td>
                    {showWaitlist && <td className={fmtNum(r.waitlist) === 0 ? 'muted' : ''}>{fmtNum(r.waitlist) || '—'}</td>}
                    {showCancelsCol && <>
                      <td className={fmtNum(r.cancellations) === 0 ? 'muted' : ''}>{fmtNum(r.cancellations) || '—'}</td>
                      <td className={cp == null ? 'muted' : ''}>{cp != null ? `${Math.round(cp)}%` : '—'}</td>
                    </>}
                    <td className={`money ${fmtNum(r.charged) === 0 ? 'zero' : ''}`}>{fmtMoney(r.charged)}</td>
                    <td className={`money ${fmtNum(r.received) === 0 ? 'zero' : ''}`}>{fmtMoney(r.received)}</td>
                    <td className={`money ${fmtNum(r.outstanding) === 0 ? 'zero' : ''}`}>{fmtMoney(r.outstanding)}</td>
                    <td className={`money ${fmtNum(r.refunds) === 0 ? 'zero' : ''}`}>{fmtMoney(r.refunds)}</td>
                    <td className="money" style={fmtNum(r.netRevenue) < 0 ? {color:'#b91c1c'} : {}}>{fmtMoney(r.netRevenue)}</td>
                  </tr>
                  {isOpen && r._sections.map((sx, j) => {
                    const scp = cancelPct(sx.cancellations, sx.enrollments);
                    return (
                      <tr key={i + '-' + j} className="section-row">
                        <td className="left">{sx.sectionName}{sx.status && <span className="sec-status">{sx.status}</span>}</td>
                        <td className="left mono">{sx.season}</td>
                        {showRegModeCol && <td className="left">{regModeLabel(sx.regMode)}</td>}
                        <td className="left mono">{sx.startDate}</td>
                        <td className="left mono">{sx.endDate}</td>
                        <td className="muted">—</td>
                        <td>{fmtNum(sx.enrollments) || '—'}</td>
                        <td className="mono">{sx.utilization || '—'}</td>
                        <td className={fillClass(sx.fillPct)}>{sx.fillPct != null ? `${fmtNum(sx.fillPct)}%` : '—'}</td>
                        {showWaitlist && <td className={fmtNum(sx.waitlist) === 0 ? 'muted' : ''}>{fmtNum(sx.waitlist) || '—'}</td>}
                        {showCancelsCol && <>
                          <td className={fmtNum(sx.cancellations) === 0 ? 'muted' : ''}>{fmtNum(sx.cancellations) || '—'}</td>
                          <td className={scp == null ? 'muted' : ''}>{scp != null ? `${Math.round(scp)}%` : '—'}</td>
                        </>}
                        <td className={`money ${fmtNum(sx.charged) === 0 ? 'zero' : ''}`}>{fmtMoney(sx.charged)}</td>
                        <td className={`money ${fmtNum(sx.received) === 0 ? 'zero' : ''}`}>{fmtMoney(sx.received)}</td>
                        <td className={`money ${fmtNum(sx.outstanding) === 0 ? 'zero' : ''}`}>{fmtMoney(sx.outstanding)}</td>
                        <td className={`money ${fmtNum(sx.refunds) === 0 ? 'zero' : ''}`}>{fmtMoney(sx.refunds)}</td>
                        <td className="money" style={fmtNum(sx.netRevenue) < 0 ? {color:'#b91c1c'} : {}}>{fmtMoney(sx.netRevenue)}</td>
                      </tr>
                    );
                  })}
                  </React.Fragment>
                );
              })}
            </tbody>

            {/* Grand totals */}
            {totals && (
              <tfoot>
                <tr>
                  <td className="left" colSpan={leftCols}>Grand Total — {programCount} program{programCount !== 1 ? 's' : ''}</td>
                  <td>{totals.sections}</td>
                  <td>{totals.enrollments.toLocaleString()}</td>
                  <td>—</td>
                  <td>—</td>
                  {showWaitlist && <td>{totals.waitlist > 0 ? totals.waitlist : '—'}</td>}
                  {showCancelsCol && <>
                    <td>{totals.cancellations > 0 ? totals.cancellations : '—'}</td>
                    <td>{cancelPct(totals.cancellations, totals.enrollments) != null ? `${Math.round(cancelPct(totals.cancellations, totals.enrollments))}%` : '—'}</td>
                  </>}
                  <td>{fmtMoney(totals.charged)}</td>
                  <td>{fmtMoney(totals.received)}</td>
                  <td>{fmtMoney(totals.outstanding)}</td>
                  <td>{fmtMoney(totals.refunds)}</td>
                  <td>{fmtMoney(totals.netRevenue)}</td>
                </tr>
              </tfoot>
            )}
          </table>
          </div>
        )}

        <div className="report-footer">
          <span>{orgName} — Program Revenue</span>
          <span>Run Date/Time: {runDate}</span>
        </div>

        <div id="report-ready" style={{display:'none'}} />
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
    <script src="/share-widget.js" defer></script>
    <script src="/feedback-widget.js" defer></script>
  </body>
</html>
