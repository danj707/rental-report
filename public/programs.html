<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Program Revenue</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'IBM Plex Sans', system-ui, sans-serif;
      font-size: 12px;
      color: #1a1a1a;
      background: #f5f4f1;
      line-height: 1.35;
    }

    /* ── Toolbar ── */
    .toolbar {
      position: sticky; top: 0; z-index: 100;
      display: flex; align-items: center; gap: 10px;
      padding: 8px 20px;
      background: #2c2c2c; color: #eee;
      font-size: 13px; flex-wrap: wrap;
    }
    .toolbar-title { font-weight: 600; margin-right: 4px; }
    .toolbar-spacer { flex: 1; }
    .toolbar label {
      font-size: 10px; text-transform: uppercase; letter-spacing: 0.5px;
      color: #aaa; display: flex; flex-direction: column; gap: 2px;
    }
    .toolbar input[type="date"] {
      padding: 4px 8px; border: 1px solid rgba(255,255,255,.2); border-radius: 4px;
      background: rgba(255,255,255,.1); color: #fff; font-size: 12px;
      font-family: inherit; outline: none;
    }
    .toolbar input[type="date"]:focus { border-color: #3b82f6; }
    .toolbar input[type="date"]::-webkit-calendar-picker-indicator { filter: invert(1); cursor: pointer; }
    .toolbar button {
      padding: 6px 14px; border: 1px solid rgba(255,255,255,.25); border-radius: 4px;
      background: rgba(255,255,255,.08); color: #fff; font-size: 12px;
      font-family: inherit; cursor: pointer; transition: background .15s; white-space: nowrap;
    }
    .toolbar button:hover { background: rgba(255,255,255,.18); }
    .toolbar .btn-run { background: #16a34a; border-color: #16a34a; font-weight: 600; }
    .toolbar .btn-run:hover { background: #15803d; }
    .toolbar .btn-run:disabled { opacity: .5; cursor: not-allowed; }
    .toolbar .btn-pdf { background: #3b82f6; border-color: #3b82f6; font-weight: 600; }
    .toolbar .btn-pdf:hover { background: #2563eb; }
    .toolbar .btn-pdf:disabled { opacity: .5; cursor: not-allowed; }
    .toolbar .btn-excel { background: #16803c; border-color: #16803c; font-weight: 600; }
    .toolbar .btn-excel:hover { background: #15692f; }
    .toolbar .btn-excel:disabled { opacity: .5; cursor: not-allowed; }
    .toolbar .btn-toggle-on {
      background: rgba(251,191,36,.18); border-color: #fbbf24; color: #fbbf24; font-weight: 600;
    }
    .toolbar .btn-toggle-on:hover { background: rgba(251,191,36,.28); }
    .toolbar .row-count { font-size: 11px; color: #aaa; }
    .toolbar .divider { width: 1px; height: 28px; background: rgba(255,255,255,.15); margin: 0 2px; }

    /* ── Page ── */
    .page {
      max-width: 1400px; margin: 16px auto; padding: 24px 28px;
      background: #fff; box-shadow: 0 1px 4px rgba(0,0,0,.08);
    }
    .table-scroll { overflow-x: auto; -webkit-overflow-scrolling: touch; }

    /* ── Header ── */
    .report-header {
      display: flex; justify-content: space-between; align-items: center;
      border-bottom: 2.5px solid #111; padding-bottom: 10px; margin-bottom: 18px; gap: 16px;
    }
    .report-header-left { display: flex; align-items: center; gap: 14px; }
    .report-header-logo { height: 42px; max-width: 140px; object-fit: contain; object-position: left center; }
    .report-header .org-label { font-size: 10px; letter-spacing: 1.6px; text-transform: uppercase; color: #777; font-weight: 600; }
    .report-header .title { font-size: 17px; font-weight: 700; margin-top: 1px; }
    .report-header-right { text-align: right; }
    .report-header .date-range { font-size: 11px; color: #666; }

    /* ── Info blurb ── */
    .report-blurb {
      background: #f0f4f8; border-left: 3px solid #6b7280; padding: 10px 14px;
      margin-bottom: 16px; font-size: 12.5px; line-height: 1.55; color: #374151;
      border-radius: 4px;
    }
    .report-blurb strong { color: #111827; }
    .report-blurb em { font-style: normal; font-weight: 600; }
    @media print { .report-blurb { background: #f5f5f5; -webkit-print-color-adjust: exact; } }

    /* ── Summary cards ── */
    .summary-cards { display: flex; gap: 12px; margin-bottom: 18px; flex-wrap: wrap; }
    .summary-card {
      flex: 1; min-width: 120px; background: #f5f4f1;
      border: 1px solid #ddd; border-radius: 6px; padding: 10px 14px;
    }
    .summary-card .card-label { font-size: 9.5px; text-transform: uppercase; letter-spacing: 0.8px; color: #888; font-weight: 600; margin-bottom: 4px; }
    .summary-card .card-value { font-size: 18px; font-weight: 700; font-variant-numeric: tabular-nums; color: #111; }
    .summary-card .card-value.green { color: #15803d; }
    .summary-card .card-value.red   { color: #b91c1c; }
    .summary-card .card-value.blue  { color: #2563eb; }
    .summary-card .card-sub { font-size: 10px; color: #999; margin-top: 2px; }

    /* ── Table ── */
    .prog-table { width: 100%; border-collapse: collapse; font-size: 11.5px; font-variant-numeric: tabular-nums; }

    /* Column headers */
    .prog-table thead tr {
      background: #e4e4e4; border-top: 1px solid #bbb; border-bottom: 1px solid #bbb;
    }
    .prog-table thead th {
      padding: 6px 8px; font-weight: 600; font-size: 10px;
      text-transform: uppercase; letter-spacing: 0.4px; color: #333;
      white-space: nowrap; text-align: right;
    }
    .prog-table thead th.left { text-align: left; }

    /* Program header rows */
    .prog-table tr.prog-header td {
      background: #2c2c2c; color: #fff;
      padding: 7px 8px; font-weight: 600; font-size: 11.5px;
      border-top: 3px solid #111;
    }
    .prog-table tr.prog-header td.prog-name {
      font-size: 12px; letter-spacing: 0.2px;
    }
    .prog-table tr.prog-header td { text-align: right; }
    .prog-table tr.prog-header td.prog-name { text-align: left; }

    /* Data rows */
    .prog-table tbody tr.data-row { border-bottom: 1px solid #eee; }
    .prog-table tbody tr.data-row:nth-child(even) { background: #fafaf8; }
    .prog-table tbody tr.data-row:hover { background: #f0eeea; }
    .prog-table tbody tr.data-row td {
      padding: 5px 8px; text-align: right; vertical-align: middle;
    }
    .prog-table tbody tr.data-row td.left { text-align: left; white-space: normal; overflow: visible; text-overflow: clip; word-break: break-word; }
    .prog-table tbody tr.data-row td.mono {
      font-family: 'IBM Plex Mono', monospace; font-size: 10.5px;
    }
    .prog-table tbody tr.data-row td.muted { color: #aaa; }
    .prog-table .money { font-variant-numeric: tabular-nums; }
    .prog-table .zero  { color: #ccc; }

    /* Program subtotal rows */
    .prog-table tr.prog-subtotal td {
      background: #edeae4; padding: 5px 8px; text-align: right;
      font-weight: 700; font-size: 11px; font-variant-numeric: tabular-nums;
      border-top: 1px solid #ccc; border-bottom: 2px solid #bbb;
      color: #444;
    }
    .prog-table tr.prog-subtotal td.left { text-align: left; font-style: italic; color: #888; }

    /* Grand total row */
    .prog-table tfoot tr td {
      background: #2c2c2c; color: #fff; padding: 7px 8px;
      font-weight: 700; font-size: 11.5px; text-align: right;
      font-variant-numeric: tabular-nums;
      border-top: 3px solid #111;
    }
    .prog-table tfoot tr td.left { text-align: left; font-size: 10.5px; letter-spacing: 0.4px; text-transform: uppercase; }

    /* Fill % badge */
    .fill-high { color: #15803d; font-weight: 600; }
    .fill-mid  { color: #b45309; }
    .fill-low  { color: #b91c1c; }
    .prog-table .chev { display:inline-block; margin-right:6px; font-size:9px; color:#16a34a; transition:transform .12s ease; }
    .prog-table .chev.open { transform:rotate(90deg); }
    .prog-table tr.prog-clickable { cursor:pointer; }
    .prog-table tr.prog-clickable:hover td { background:#eef4ee; }

    /* ── Tabs ── */
    .tabs { display:flex; gap:0; border-bottom:2px solid #e5e7eb; margin-bottom:16px; }
    .tab { padding:10px 20px; font-size:13px; font-weight:600; color:#6b7280; cursor:pointer; border-bottom:2px solid transparent; margin-bottom:-2px; transition:all .15s; display:flex; align-items:center; gap:6px; }
    .tab:hover { color:#111; }
    .tab.active { color:#059669; border-bottom-color:#059669; }
    .tab .tab-badge { font-size:10px; padding:2px 7px; border-radius:10px; font-weight:600; }
    .tab .tab-lock { font-size:10px; padding:2px 7px; border-radius:10px; background:#f3f4f6; color:#9ca3af; }
    /* ── KPI cards ── */
    .kpi-row { display:flex; gap:12px; margin-bottom:16px; flex-wrap:wrap; }
    .kpi { flex:1; min-width:140px; border:1px solid #e5e7eb; border-radius:8px; padding:14px 16px; background:#fff; }
    .kpi-label { font-size:10px; text-transform:uppercase; letter-spacing:.5px; color:var(--accent,#6b7280); font-weight:600; margin-bottom:4px; }
    .kpi-val { font-size:24px; font-weight:700; color:#111; font-variant-numeric:tabular-nums; line-height:1.1; }
    .kpi-sub { font-size:11px; color:#9ca3af; margin-top:4px; }
    /* ── Observations ── */
    .obs { background:#f0fdf4; border:1px solid #bbf7d0; border-radius:8px; padding:16px; margin-bottom:16px; font-size:12.5px; line-height:1.6; color:#1a1a1a; }
    .obs-title { font-weight:700; font-size:11px; text-transform:uppercase; letter-spacing:.5px; color:#065f46; margin-bottom:10px; }
    .obs-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px 20px; }
    @media (max-width:700px) { .obs-grid { grid-template-columns:1fr; } }
    /* ── Demo table ── */
    .demo-table { width:100%; border-collapse:collapse; font-size:11.5px; margin-bottom:16px; }
    .demo-table thead th { background:#f9fafb; padding:8px 10px; text-align:right; font-size:10px; text-transform:uppercase; letter-spacing:.4px; color:#6b7280; border-bottom:2px solid #e5e7eb; }
    .demo-table thead th.left { text-align:left; }
    .demo-table tbody td { padding:7px 10px; text-align:right; border-bottom:1px solid #f3f4f6; }
    .demo-table tbody td.left { text-align:left; font-weight:500; }
    .demo-table tbody tr:hover { background:#f0fdf4; }
    .demo-table .bar-cell { position:relative; }
    .demo-table .bar-bg { position:absolute; left:0; top:2px; bottom:2px; border-radius:3px; opacity:.18; }
    /* ── Demographics program rows (lighter than revenue dark headers) ── */
    .prog-table tr.demo-prog td { background:#f5f4f1; font-weight:600; font-size:11.5px; padding:8px 8px; border-top:1px solid #ddd; text-align:right; }
    .prog-table tr.demo-prog td.left { text-align:left; }
    .prog-table tr.demo-prog.prog-clickable:hover td { background:#eef4ee; }
    .prog-table tr.section-row td { background:#fbfbf9; border-bottom:1px solid #f1efea; font-size:11px; color:#3f3f3f; padding:6px 8px; }
    .prog-table tr.section-row:hover td { background:#f4f3ef; }
    .prog-table tr.section-row td.left { text-align:left; padding-left:26px; }
    .prog-table tr.section-row .sec-status { font-size:9px; color:#9a9a9a; margin-left:8px; text-transform:uppercase; letter-spacing:.04em; }

    /* ── Footer ── */
    .report-footer {
      display: flex; justify-content: space-between;
      border-top: 2.5px solid #111; margin-top: 16px; padding-top: 6px;
      font-size: 10px; color: #777;
    }

    /* ── Loading / Error ── */
    .loading { text-align: center; padding: 80px 20px; color: #888; font-size: 14px; }
    .loading .spinner {
      position: relative;
      display: inline-block;
      width: 34px;
      height: 44px;
      margin: 0 auto;
      box-sizing: border-box;
      border: 2px solid #e07b1a;
      border-top-color: #f7b96b;
      border-radius: 4px 4px 14px 14px;
      background: rgba(255, 248, 240, 0.5);
      overflow: hidden;
      box-shadow: inset -4px 0 0 rgba(255, 255, 255, 0.35);
    }
    .loading .spinner::before {
      content: '';
      position: absolute;
      left: 0; right: 0; bottom: 0;
      height: 60%;
      background: linear-gradient(180deg, #ffb24d 0%, #ff8c1f 55%, #f2710a 100%);
      box-shadow: inset 0 2px 0 rgba(255, 255, 255, 0.45);
      animation: juice-fill 2s ease-in-out infinite;
    }
    .loading .spinner::after {
      content: '';
      position: absolute;
      left: 50%; bottom: 6px;
      width: 3px; height: 3px;
      margin-left: -1.5px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.85);
      box-shadow: -5px 7px 0 0 rgba(255, 255, 255, 0.65), 5px 12px 0 -0.5px rgba(255, 255, 255, 0.5);
      animation: juice-bubbles 2.2s ease-out infinite;
    }
    @keyframes juice-fill {
      0%   { height: 42%; }
      50%  { height: 80%; }
      100% { height: 42%; }
    }
    @keyframes juice-bubbles {
      0%   { transform: translateY(2px) scale(0.5); opacity: 0; }
      30%  { opacity: 0.9; }
      70%  { opacity: 0.6; }
      100% { transform: translateY(-22px) scale(1); opacity: 0; }
    }
    .loading { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 14px; }
    .juice-msg { position: relative; height: 1.4em; line-height: 1.4em; min-width: 190px; }
    .juice-msg span { position: absolute; left: 0; right: 0; text-align: center; opacity: 0; animation: juice-phrase 10s infinite; }
    .juice-msg span:nth-child(1) { animation-delay: 0s; }
    .juice-msg span:nth-child(2) { animation-delay: 2s; }
    .juice-msg span:nth-child(3) { animation-delay: 4s; }
    .juice-msg span:nth-child(4) { animation-delay: 6s; }
    .juice-msg span:nth-child(5) { animation-delay: 8s; }
    @keyframes juice-phrase {
      0%   { opacity: 0; transform: translateY(5px); }
      2%   { opacity: 1; transform: translateY(0); }
      18%  { opacity: 1; transform: translateY(0); }
      20%  { opacity: 0; transform: translateY(-5px); }
      100% { opacity: 0; }
    }
    .error { text-align: center; padding: 60px 20px; color: #b91c1c; font-size: 14px; }

    /* ── Print / PDF ── */
    /* ── AI Insights ── */
    .insights-section { margin: 4px 0 18px; }
    .insights-head { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; margin-bottom: 12px; }
    .insights-btn {
      display: inline-flex; align-items: center; gap: 6px;
      background: linear-gradient(135deg, #6366f1, #8b5cf6); color: #fff;
      border: none; border-radius: 6px;
      padding: 8px 16px; font-size: 13px; font-weight: 600;
      font-family: inherit; cursor: pointer;
      transition: background .15s ease, opacity .15s ease;
    }
    .insights-btn:hover:not(:disabled) { background: #374151; }
    .insights-btn:disabled { opacity: .6; cursor: default; }
    .insights-sub { font-size: 11.5px; color: #9ca3af; }
    .insights-section .loading { padding: 36px 16px; }
    .insights-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(230px, 1fr)); gap: 12px; }
    .insight-card { border: 1px solid #e5e7eb; border-left-width: 4px; border-radius: 8px; padding: 14px 16px; background: #fff; }
    .insight-type { font-size: 10px; font-weight: 700; letter-spacing: .6px; text-transform: uppercase; margin-bottom: 6px; }
    .insight-title { font-size: 14px; font-weight: 700; color: #111827; margin-bottom: 5px; line-height: 1.3; }
    .insight-detail { font-size: 12.5px; color: #374151; line-height: 1.45; }
    .insight-action { font-size: 12px; color: #6b7280; margin-top: 8px; font-weight: 500; }
    .detail-table { table-layout:fixed; width:100%; }
    .detail-table th, .detail-table td { padding:5px 8px; font-size:11px; white-space:nowrap; }
    .detail-table th.col-name { width:160px; }
    .detail-table th.col-email { width:140px; }
    .detail-table th.col-date { width:80px; }
    .detail-table th.col-status { width:60px; }
    .detail-table th.col-money { width:75px; text-align:right; }
    .detail-table td.money { text-align:right; font-variant-numeric:tabular-nums; }
    .detail-table th.col-prorated { width:90px; text-align:right; background:#eef2ff; color:#4338ca; }
    .detail-table tfoot td { padding:6px 8px; }
    body[data-hide-widgets] .feedback-widget,
    body[data-hide-widgets] .share-fab,
    body[data-hide-widgets] [class*="feedback"],
    body[data-hide-widgets] [class*="share-btn"],
    body[data-hide-widgets] .floating-share { display:none!important; }
    @media print { .detail-table { font-size:9px; } .detail-table th, .detail-table td { padding:3px 5px; } }
    .insights-feedback { display:flex; align-items:center; gap:8px; margin-top:12px; padding:8px 4px; font-size:13px; color:#666; }
    .insights-feedback button { background:none; border:1px solid #e5e7eb; border-radius:6px; padding:4px 10px; cursor:pointer; font-size:13px; transition:all .15s; }
    .insights-feedback button:hover { background:#f3f4f6; border-color:#d1d5db; }
    .insights-feedback .fb-label { color:#888; font-size:12px; }
    .insights-feedback .fb-thanks { color:#10b981; font-weight:600; font-size:13px; }
    .insights-feedback .fb-down-form { display:flex; align-items:center; gap:6px; flex:1; }
    .insights-feedback .fb-down-form input { flex:1; border:1px solid #d1d5db; border-radius:6px; padding:5px 10px; font-size:13px; font-family:inherit; outline:none; }
    .insights-feedback .fb-down-form input:focus { border-color:#6366f1; box-shadow:0 0 0 2px rgba(99,102,241,.15); }
    .insights-feedback .fb-send { background:#6366f1!important; color:#fff!important; border-color:#6366f1!important; font-weight:600; }
    .insights-feedback .fb-send:hover { background:#4f46e5!important; }
    .insight-opportunity { border-left-color: #10b981; }
    .insight-opportunity .insight-type { color: #059669; }
    .insight-risk { border-left-color: #f59e0b; }
    .insight-risk .insight-type { color: #d97706; }
    .insight-signal { border-left-color: #6366f1; }
    .insight-signal .insight-type { color: #4f46e5; }

    @media print {
      body { background: #fff; }
      .toolbar { display: none !important; }
      .page { box-shadow: none; margin: 0; padding: 12px 16px; max-width: 100%; }
    }
    body.print-mode .toolbar { display: none !important; }
    body.print-mode { background: #fff; }
    body.print-mode .page { box-shadow: none; margin: 0; padding: 12px 16px; max-width: 100%; }
    body.print-mode .table-scroll { overflow: visible; }
    /* Charts */
    .chart-section { margin: 20px 0; }
    .chart-toggle { display: inline-flex; border: 1px solid #e0ddd8; border-radius: 6px; overflow: hidden; margin-bottom: 14px; }
    .chart-toggle button { border: none; background: #fff; padding: 6px 14px; font-size: 12px; font-weight: 600; cursor: pointer; color: #888; transition: all .15s; }
    .chart-toggle button.active { background: #2c2c2c; color: #fff; }
    .chart-container { background: #fff; border: 1px solid #e0ddd8; border-radius: 10px; padding: 16px 20px; }
    .chart-row { display: flex; align-items: center; gap: 10px; margin-bottom: 6px; }
    .chart-label { width: 240px; flex-shrink: 0; font-size: 12px; font-weight: 500; color: #333; text-align: right; line-height: 1.25; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; word-break: break-word; }
    .chart-bar-wrap { flex: 1; height: 24px; background: #f5f4f1; border-radius: 4px; position: relative; overflow: hidden; }
    .chart-bar { height: 100%; border-radius: 4px; transition: width .4s ease; min-width: 2px; position: absolute; left: 0; top: 0; }
    .chart-bar.charged { background: #d1d5db; z-index: 1; }
    .chart-bar.received { background: #22c55e; z-index: 2; }
    .chart-bar.outstanding { background: #f59e0b; z-index: 2; }
    .chart-bar.fill-high { background: #22c55e; }
    .chart-bar.fill-mid { background: #f59e0b; }
    .chart-bar.fill-low { background: #ef4444; }
    .chart-bar-wrap:hover .chart-bar.received { filter: brightness(1.07); }
    .chart-bar-wrap:hover .chart-bar.charged { filter: brightness(0.96); }
    .chart-tooltip { position: fixed; z-index: 60; pointer-events: none; background: #1f2937; color: #fff; border-radius: 8px; padding: 9px 11px; font-size: 11px; line-height: 1.5; box-shadow: 0 8px 28px rgba(0,0,0,.28); width: 240px; }
    .chart-tooltip .tt-name { font-weight: 700; margin-bottom: 5px; font-size: 11.5px; }
    .chart-tooltip .tt-row { display: flex; justify-content: space-between; gap: 14px; }
    .chart-tooltip .tt-k { color: #cbd5e1; }
    .chart-val { width: 80px; flex-shrink: 0; font-size: 12px; font-weight: 600; color: #333; font-variant-numeric: tabular-nums; }
    .chart-val-sub { font-weight: 400; color: #999; font-size: 11px; }
    .chart-legend { display: flex; gap: 16px; margin-top: 10px; padding-top: 8px; border-top: 1px solid #f0eeeb; }
    .chart-legend-item { display: flex; align-items: center; gap: 5px; font-size: 11px; color: #666; }
    .chart-legend-dot { width: 10px; height: 10px; border-radius: 2px; }
    .chart-expand { background: none; border: 1px dashed #d0cdc8; border-radius: 6px; padding: 6px 16px; font-size: 11px; color: #888; cursor: pointer; margin-top: 8px; width: 100%; }
    .chart-expand:hover { background: #fafaf8; border-color: #aaa; }
    @media print { .chart-section { page-break-inside: avoid; } }

    /* ── Button loading spinner ── */
    @keyframes btn-spin { to { transform: rotate(360deg); } }
    .btn-spinner {
      display: inline-block;
      width: 12px;
      height: 12px;
      border: 2px solid rgba(0,0,0,.15);
      border-top-color: #333;
      border-radius: 50%;
      animation: btn-spin .6s linear infinite;
      vertical-align: middle;
      margin-right: 5px;
    }
    .toolbar button:disabled .btn-spinner {
      border-top-color: #888;
    }
  </style>
  <script>
    // ── Token auth (injected) ────────────────────────────────────────
    const URL_TOKEN = new URLSearchParams(window.location.search).get('token') || '';
    const TOKEN_QS  = URL_TOKEN ? '?token=' + encodeURIComponent(URL_TOKEN) : '';
    function withToken(url) {
      if (!URL_TOKEN) return url;
      return url + (url.includes('?') ? '&' : '?') + 'token=' + encodeURIComponent(URL_TOKEN);
    }
  </script>
</head>
<body>
<div id="root"></div>

<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>

<script type="text/babel">
const { useState, useEffect, useMemo, useCallback } = React;

const LS_SHOW_DETAILS  = 'prog_show_details';
const LS_SHOW_REGMODE  = 'prog_show_regmode';
const LS_SHOW_WAITLIST = 'prog_show_waitlist';
const LS_SHOW_CANCELS  = 'prog_show_cancels';

function getOrgAndBase() {
  const parts = window.location.pathname.split('/').filter(Boolean);
  return { orgSlug: parts[0] || 'unknown', basePath: `/${parts[0]}/${parts[1]}` };
}

function getParams() {
  const p = new URLSearchParams(window.location.search);
  return { start_date: p.get('start_date'), end_date: p.get('end_date'), _print: p.get('_print'), tab: p.get('tab'), section_id: p.get('section_id') };
}

function getCurrentMonthRange() {
  const now = new Date(), y = now.getFullYear(), m = now.getMonth();
  return { start: toISO(new Date(y, m, 1)), end: toISO(new Date(y, m + 1, 0)) };
}

function toISO(d) {
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function formatDisplayDate(iso) {
  if (!iso) return '';
  const d = new Date(iso + 'T12:00:00');
  const months = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  return `${months[d.getMonth()]} ${d.getDate()}, ${d.getFullYear()}`;
}

function fmtMoney(v) {
  if (v == null || v === '') return '$0.00';
  const n = parseFloat(v);
  if (isNaN(n)) return '$0.00';
  return (n < 0 ? '-$' : '$') + Math.abs(n).toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g, ',');
}

function fmtNum(v) {
  const n = parseFloat(v);
  return isNaN(n) ? 0 : n;
}

function fillClass(v) {
  if (v == null || v === '') return '';
  const n = parseFloat(v);
  if (isNaN(n)) return '';
  if (n >= 90) return 'fill-high';
  if (n >= 70) return 'fill-mid';
  return 'fill-low';
}

// ── Reg-mode helpers (section-based vs session-based) ────────────────
function regModeVis(regMode) {
  const m = (regMode || '').toLowerCase();
  if (m.includes('section')) return { sec: true,  sess: false };
  if (m.includes('session')) return { sec: false, sess: true  };
  return { sec: true, sess: true }; // unknown → show both (back-compat)
}
function regModeLabel(regMode) {
  const m = (regMode || '').toLowerCase();
  if (m.includes('section')) return 'Section';
  if (m.includes('session')) return 'Session';
  return regMode || '';
}
// Dominant mode across a program's sections; '' when mixed/unknown.
function progMode(sections) {
  let sec = false, sess = false;
  sections.forEach(r => {
    const m = (r.regMode || '').toLowerCase();
    if (m.includes('section')) sec = true;
    else if (m.includes('session')) sess = true;
  });
  if (sec && !sess) return 'Section-based';
  if (sess && !sec) return 'Session-based';
  return '';
}
// Cancellation rate = cancellations ÷ enrollments (null when no enrollments).
function cancelPct(cancellations, enrollments) {
  const c = parseFloat(cancellations), e = parseFloat(enrollments);
  if (!isFinite(e) || e <= 0 || !isFinite(c)) return null;
  return (c / e) * 100;
}

// Reads BOTH the program-grain feed (legacy, Title-Case aggregate columns) and
// the section-grain feed (one row per section, with a 'Section' column). When a
// 'Section' is present the row is flagged isSection and rolled up below.
function StaleCacheBanner({ meta }) {
  if (!meta?.stale_cache) return null;
  const when = meta.cached_at ? new Date(meta.cached_at).toLocaleString() : 'recently';
  return (
    <div style={{background:'#fef3c7',borderBottom:'1px solid #f59e0b',padding:'8px 16px',textAlign:'center',fontSize:13,color:'#92400e'}}>
      ⚠️ Showing cached data from {when} — live data is temporarily unavailable
    </div>
  );
}

function normalizeRow(raw) {
  const pick = (...keys) => { for (const k of keys) { if (raw[k] != null && raw[k] !== '') return raw[k]; } return null; };
  const sectionName = raw['Section'] ?? raw['section'] ?? '';
  const isSection   = (sectionName !== '') || raw['Section Id'] != null || raw['section_id'] != null;
  return {
    isSection,
    programName:   raw['Program'] ?? raw['program'] ?? '',
    programId:     raw['Program Id'] ?? raw['program_id'] ?? raw['Program'] ?? raw['program'] ?? '',
    sectionName,
    sectionId:     raw['Section Id'] ?? raw['section_id'] ?? sectionName,
    status:        raw['Status'] ?? raw['Section Status'] ?? raw['section_status'] ?? '',
    season:        raw['Season'] ?? raw['program_season'] ?? '',
    regMode:       raw['Reg Mode'] ?? raw['registration_mode'] ?? '',
    startDate:     raw['Start Date'] ?? raw['start_date'] ?? '',
    endDate:       raw['End Date'] ?? raw['end_date'] ?? '',
    sections:      raw['Sections'] ?? (isSection ? 1 : 0),
    enrollments:   raw['Enrollments'] ?? raw['Enrolled'] ?? raw['enrolled'] ?? 0,
    utilized:      pick('Utilized','utilized'),
    capacity:      pick('Capacity','capacity'),
    utilization:   raw['Utilization'] ?? '',
    fillPct:       raw['Fill %'] ?? raw['fill_pct'] ?? null,
    waitlist:      raw['Waitlist'] ?? 0,
    cancellations: raw['Cancellations'] ?? 0,
    refunds:       raw['Refunds'] ?? raw['refunds'] ?? 0,
    charged:       raw['Charged'] ?? raw['charged'] ?? 0,
    received:      raw['Received'] ?? raw['received'] ?? 0,
    outstanding:   raw['Outstanding'] ?? raw['outstanding'] ?? 0,
    netRevenue:    raw['Net Revenue'] ?? raw['Net Total'] ?? raw['net_total'] ?? 0,
  };
}

// Section-grain → one row per PROGRAM (sum of its sections), each carrying its
// section rows in _sections for the expand/breakout. Program totals are the sum
// of their sections by construction, so parent always reconciles to children.
function rollupToPrograms(secRows) {
  const map = new Map();
  for (const r of secRows) {
    const key = r.programId || r.programName;
    if (!map.has(key)) map.set(key, {
      isSection:false, programId:key, programName:r.programName, season:r.season,
      regMode:'', startDate:null, endDate:null, sections:0, enrollments:0,
      _util:0, _cap:0, waitlist:0, cancellations:0,
      charged:0, received:0, outstanding:0, refunds:0, netRevenue:0, _sections:[],
    });
    const g = map.get(key);
    g._sections.push(r);
    g.sections     += 1;
    g.enrollments  += fmtNum(r.enrollments);
    g._util        += fmtNum(r.utilized);
    g._cap         += (r.capacity == null ? 0 : fmtNum(r.capacity));
    g.waitlist     += fmtNum(r.waitlist);
    g.cancellations+= fmtNum(r.cancellations);
    g.charged      += fmtNum(r.charged);
    g.received     += fmtNum(r.received);
    g.outstanding  += fmtNum(r.outstanding);
    g.refunds      += fmtNum(r.refunds);
    g.netRevenue   += fmtNum(r.netRevenue);
    if (r.startDate && (!g.startDate || r.startDate < g.startDate)) g.startDate = r.startDate;
    if (r.endDate   && (!g.endDate   || r.endDate   > g.endDate))   g.endDate   = r.endDate;
  }
  const out = [];
  for (const g of map.values()) {
    g.regMode     = progMode(g._sections);
    g.utilization = `${fmtNum(g._util).toLocaleString()} / ${fmtNum(g._cap).toLocaleString()}`;
    g.fillPct     = g._cap > 0 ? Math.round((g._util / g._cap) * 1000) / 10 : null;
    g._sections.forEach(sx => {
      sx.utilization = `${fmtNum(sx.utilized).toLocaleString()} / ${(sx.capacity == null ? '\u221E' : fmtNum(sx.capacity).toLocaleString())}`;
      sx.fillPct     = (sx.capacity != null && fmtNum(sx.capacity) > 0) ? Math.round((fmtNum(sx.utilized) / fmtNum(sx.capacity)) * 1000) / 10 : null;
    });
    out.push(g);
  }
  out.sort((a, b) => a.programName.localeCompare(b.programName));
  return out;
}

function FillRateChart({ sections, colors, selected }) {
  var canvasRef = React.useRef(null); var chartRef = React.useRef(null);
  React.useEffect(function(){
    if (!canvasRef.current || !sections || !sections.length) return;
    if (chartRef.current) chartRef.current.destroy();
    var allDates = {}; sections.forEach(function(sec){ sec.timeline.forEach(function(pt){ allDates[pt.date] = true; }); });
    var labels = Object.keys(allDates).sort();
    var datasets = sections.map(function(sec, i){
      var ci = selected ? selected.indexOf(sec.section) : i;
      var color = colors[ci % colors.length];
      var dataMap = {}; sec.timeline.forEach(function(pt){ dataMap[pt.date] = pt.count; });
      var lastVal = 0;
      var data = labels.map(function(d){ if (dataMap[d] !== undefined) lastVal = dataMap[d]; if (d < sec.timeline[0].date) return null; return lastVal; });
      return { label: sec.section.length > 30 ? sec.section.slice(0,28) + '…' : sec.section, data: data, borderColor: color, backgroundColor: color + '18', borderWidth: 2.5, fill: false, tension: 0.25, pointRadius: 2, pointHoverRadius: 5, spanGaps: true };
    });
    sections.forEach(function(sec){
      if (sec.capacity) {
        datasets.push({ label: sec.section.slice(0,20) + ' cap', data: labels.map(function(){ return sec.capacity; }),
          borderColor: colors[(selected ? selected.indexOf(sec.section) : 0) % colors.length] + '40', borderWidth: 1.5, borderDash: [6, 4], fill: false, pointRadius: 0, pointHoverRadius: 0 });
      }
    });
    var fmtDate = function(d){ var p=d.split('-'); return new Date(p[0],p[1]-1,p[2]).toLocaleDateString('en-US',{month:'short',day:'numeric'}); };
    chartRef.current = new Chart(canvasRef.current, { type: 'line', data: { labels: labels.map(fmtDate), datasets: datasets },
      options: { responsive: true, maintainAspectRatio: false, interaction: { mode: 'index', intersect: false },
        scales: { x: { grid: { display: false }, ticks: { maxRotation: 45, minRotation: 25, font: { size: 10 }, maxTicksLimit: 20 } }, y: { grid: { color: '#f1f5f9' }, beginAtZero: true, title: { display: true, text: 'Enrollments', font: { size: 11 } } } },
        plugins: { legend: { display: true, position: 'top', labels: { boxWidth: 12, font: { size: 10 }, filter: function(item){ return item.text.indexOf('cap') === -1; } } } } } });
    return function(){ if(chartRef.current) chartRef.current.destroy(); };
  }, [sections, selected]);
  if (!sections || !sections.length) return React.createElement('div', {style:{textAlign:'center',padding:'40px 20px',color:'#888',fontSize:13}}, 'Select sections to view fill curves.');
  return React.createElement('div', {style:{background:'#fff',border:'1px solid #e5e7eb',borderRadius:8,padding:14,marginBottom:16}},
    React.createElement('div', {style:{fontSize:13,fontWeight:700,color:'#111827',marginBottom:8}}, 'Enrollment Fill Rate Over Time'),
    React.createElement('div', {style:{height: Math.min(400, 200 + sections.length * 20)}}, React.createElement('canvas', {ref:canvasRef}))
  );
}

// ── Re-engagement + Flow Components ──
var COHORT_COLORS = ['#e34948','#eb6834','#eda100','#008300','#1baf7a','#2a78d6','#4a3aa7','#e87ba4','#1d9e75','#d85a30','#d4537e','#639922'];

function deriveActivity(progName) {
  var p = progName.toLowerCase();
  if (p.includes('swim') || p.includes('aquatic')) return 'Swimming';
  if (p.includes('summer camp') || p.includes('camp')) return 'Camps';
  if (p.includes('basketball')) return 'Basketball';
  if (p.includes('soccer') || p.includes('futsal')) return 'Soccer';
  if (p.includes('tennis')) return 'Tennis';
  if (p.includes('judo') || p.includes('kung fu') || p.includes('martial') || p.includes('karate') || p.includes('taekwondo') || p.includes('stick science')) return 'Martial Arts';
  if (p.includes('dance') || p.includes('ballet')) return 'Dance';
  if (p.includes('baseball') || p.includes('softball') || p.includes('t-ball')) return 'Baseball/Softball';
  if (p.includes('gymnastics') || p.includes('tumbl')) return 'Gymnastics';
  if (p.includes('football') || p.includes('flag football')) return 'Football';
  if (p.includes('fitness') || p.includes('yoga') || p.includes('zumba') || p.includes('pilates') || p.includes('aerobic')) return 'Fitness';
  if (p.includes('art') || p.includes('paint') || p.includes('craft') || p.includes('pottery')) return 'Arts & Crafts';
  if (p.includes('music') || p.includes('piano') || p.includes('guitar') || p.includes('drum')) return 'Music';
  if (p.includes('volleyball')) return 'Volleyball';
  if (p.includes('lacrosse')) return 'Lacrosse';
  if (p.includes('water polo')) return 'Water Polo';
  if (p.includes('cheer')) return 'Cheer';
  if (p.includes('golf')) return 'Golf';
  if (p.includes('hockey') || p.includes('ice ')) return 'Ice Sports';
  if (p.includes('preschool') || p.includes('tiny tot') || p.includes('toddler')) return 'Early Childhood';
  return '';
}

function buildReengagement(demoRows) {
  if (!demoRows || demoRows.length === 0) return null;
  var now = new Date();
  var partMap = {};
  demoRows.forEach(function(r) {
    var pid = r['Participant ID'] || r['participant_id'] || '';
    var dateRaw = r['Enrolled Date'] || r['enrolled_date'] || r['Enrolled date'] || '';
    var prog = r['Program'] || r['program'] || '';
    var activity = r['Activity'] || r['activity'] || '';
    if (!pid || !dateRaw) return;
    var d = String(dateRaw).split('T')[0];
    var monthKey = d.slice(0, 7);
    if (!partMap[pid]) partMap[pid] = { firstMonth: monthKey, enrollMonths: new Set(), programs: new Set(), activities: new Set() };
    if (monthKey < partMap[pid].firstMonth) partMap[pid].firstMonth = monthKey;
    partMap[pid].enrollMonths.add(monthKey);
    if (prog) partMap[pid].programs.add(prog);
    if (activity) partMap[pid].activities.add(activity);
  });

  // Use Activity column if available, else derive from program name
  var hasNativeActivity = Object.values(partMap).some(function(p) { return p.activities.size > 0; });
  if (!hasNativeActivity) {
    demoRows.forEach(function(r) {
      var pid = r['Participant ID'] || r['participant_id'] || '';
      var prog = r['Program'] || r['program'] || '';
      if (!pid || !prog || !partMap[pid]) return;
      var act = deriveActivity(prog);
      if (act) partMap[pid].activities.add(act);
    });
  }

  // Build sorted month index
  var allMonths = new Set();
  Object.values(partMap).forEach(function(p) { p.enrollMonths.forEach(function(m) { allMonths.add(m); }); });
  var sortedMonths = Array.from(allMonths).sort();
  var monthIdx = {}; sortedMonths.forEach(function(m, i) { monthIdx[m] = i; });

  // Cumulative re-engagement cohorts
  var cutoff = new Date(now.getFullYear(), now.getMonth() - 11, 1).toISOString().slice(0, 7);
  var cohortMap = {};
  var pids = Object.keys(partMap);
  pids.forEach(function(pid) {
    var p = partMap[pid];
    if (p.firstMonth < cutoff) return;
    var fm = p.firstMonth;
    if (!cohortMap[fm]) cohortMap[fm] = { size: 0, reengagedWithin: {} };
    cohortMap[fm].size++;
    var firstIdx = monthIdx[fm] || 0;
    var offsets = [];
    p.enrollMonths.forEach(function(m) {
      var offset = (monthIdx[m] || 0) - firstIdx;
      if (offset > 0) offsets.push(offset);
    });
    if (offsets.length > 0) {
      var firstRe = Math.min.apply(null, offsets);
      for (var n = firstRe; n <= 12; n++) {
        cohortMap[fm].reengagedWithin[n] = (cohortMap[fm].reengagedWithin[n] || 0) + 1;
      }
    }
  });

  var cohortKeys = Object.keys(cohortMap).filter(function(k) { return cohortMap[k].size >= 5; }).sort();
  var maxOffset = 0;
  var monthsSinceMap = {};
  cohortKeys.forEach(function(k) {
    var ms = (now.getTime() - new Date(k + '-01').getTime()) / (1000 * 60 * 60 * 24 * 30.44);
    monthsSinceMap[k] = ms;
    var mo = Math.min(12, Math.floor(ms));
    if (mo > maxOffset) maxOffset = mo;
  });

  var cumulative = cohortKeys.map(function(k) {
    var c = cohortMap[k];
    var cells = [{ offset: 0, pct: 0 }];
    var maxM = Math.min(12, Math.floor(monthsSinceMap[k]));
    for (var m = 1; m <= maxM; m++) {
      cells.push({ offset: m, pct: Math.round(((c.reengagedWithin[m] || 0) / c.size) * 100) });
    }
    var parts = k.split('-');
    var label = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][parseInt(parts[1])-1] + ' ' + parts[0].slice(2);
    return { month: k, label: label, size: c.size, cells: cells };
  });

  // Activity flow matrix
  var activityParts = {};
  pids.forEach(function(pid) {
    partMap[pid].activities.forEach(function(act) {
      if (!activityParts[act]) activityParts[act] = new Set();
      activityParts[act].add(pid);
    });
  });
  var actNames = Object.keys(activityParts).filter(function(a) { return activityParts[a].size >= 5; }).sort(function(a, b) { return activityParts[b].size - activityParts[a].size; });

  var flowMatrix = [];
  for (var i = 0; i < Math.min(actNames.length, 15); i++) {
    var row = { activity: actNames[i], size: activityParts[actNames[i]].size, flows: [] };
    for (var j = 0; j < Math.min(actNames.length, 15); j++) {
      if (i === j) { row.flows.push({ target: actNames[j], shared: row.size, pct: 100 }); continue; }
      var shared = 0;
      activityParts[actNames[i]].forEach(function(pid) { if (activityParts[actNames[j]].has(pid)) shared++; });
      row.flows.push({ target: actNames[j], shared: shared, pct: row.size > 0 ? Math.round((shared / row.size) * 100) : 0 });
    }
    flowMatrix.push(row);
  }

  // Miss detection
  var misses = [];
  for (var i = 0; i < actNames.length; i++) {
    for (var j = i + 1; j < actNames.length; j++) {
      var a = actNames[i], b = actNames[j];
      var shared = 0;
      activityParts[a].forEach(function(pid) { if (activityParts[b].has(pid)) shared++; });
      var sizeA = activityParts[a].size, sizeB = activityParts[b].size;
      var pctA = sizeA > 0 ? Math.round((shared / sizeA) * 100) : 0;
      var pctB = sizeB > 0 ? Math.round((shared / sizeB) * 100) : 0;
      if (Math.min(sizeA, sizeB) >= 10 && pctA < 10 && pctB < 10) {
        misses.push({ actA: a, actB: b, sizeA: sizeA, sizeB: sizeB, shared: shared, pctA: pctA, pctB: pctB, opportunity: Math.min(sizeA, sizeB) - shared });
      }
    }
  }
  misses.sort(function(a, b) { return b.opportunity - a.opportunity; });

  return { cumulative: cumulative, maxOffset: maxOffset, flowMatrix: flowMatrix, actNames: actNames.slice(0, 15), misses: misses.slice(0, 10), hasActivity: Object.keys(activityParts).length > 0 };
}

function CumulativeReengagementChart({ data, maxOffset }) {
  var canvasRef = React.useRef(null);
  var chartRef = React.useRef(null);

  React.useEffect(function() {
    if (!canvasRef.current || !data || data.length === 0) return;
    if (chartRef.current) chartRef.current.destroy();

    var labels = ['0'];
    for (var i = 1; i <= maxOffset; i++) labels.push(String(i));

    var datasets = data.map(function(row, idx) {
      var color = COHORT_COLORS[idx % COHORT_COLORS.length];
      var vals = row.cells.map(function(c) { return c.pct; });
      while (vals.length < maxOffset + 1) vals.push(null);
      return {
        label: row.label + ' (' + row.size + ')',
        data: vals,
        borderColor: color,
        backgroundColor: color + '18',
        borderWidth: 2,
        pointRadius: 3,
        pointHoverRadius: 5,
        pointBackgroundColor: color,
        pointBorderColor: '#fff',
        pointBorderWidth: 2,
        tension: 0.3,
        fill: false,
        spanGaps: false,
      };
    });

    chartRef.current = new Chart(canvasRef.current, {
      type: 'line',
      data: { labels: labels, datasets: datasets },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        interaction: { mode: 'index', intersect: false },
        plugins: {
          legend: { display: true, position: 'bottom', labels: { boxWidth: 10, padding: 12, font: { size: 10 } } },
          tooltip: {
            callbacks: {
              title: function(items) { return 'Within ' + items[0].label + ' months'; },
              label: function(item) { return item.dataset.label + ': ' + item.raw + '% came back'; }
            }
          }
        },
        scales: {
          y: { min: 0, grid: { color: '#e5e7eb' }, border: { color: '#e5e7eb' }, ticks: { color: '#6b7280', font: { size: 10 }, callback: function(v) { return v + '%'; } } },
          x: { title: { display: true, text: 'Months since first enrollment', color: '#6b7280', font: { size: 10 } }, grid: { display: false }, border: { color: '#e5e7eb' }, ticks: { color: '#6b7280', font: { size: 10 } } }
        }
      }
    });

    return function() { if (chartRef.current) chartRef.current.destroy(); };
  }, [data, maxOffset]);

  return <div style={{position:'relative',height:300}}><canvas ref={canvasRef}></canvas></div>;
}


function App() {
  const { orgSlug, basePath } = useMemo(() => getOrgAndBase(), []);
  const params   = useMemo(() => getParams(), []);
  const defaults = useMemo(() => getCurrentMonthRange(), []);

  const [startDate,   setStartDate]   = useState(params.start_date || defaults.start);
  const [endDate,     setEndDate]     = useState(params.end_date   || defaults.end);
  const [rows,        setRows]        = useState(null);
  const [sectionGrain, setSectionGrain] = useState(false);

      var dateRaw = r['Enrolled Date'] || r['enrolled_date'] || r['Enrolled date'] || '';
      if (!sec || !dateRaw) return;
      var dKey = String(dateRaw).split('T')[0];
      if (!secMap[sec]) secMap[sec] = { program: prog, section: sec, dates: {}, total: 0 };
      if (!secMap[sec].dates[dKey]) secMap[sec].dates[dKey] = 0;
      secMap[sec].dates[dKey]++; secMap[sec].total++;
    });
    var sections = Object.keys(secMap).map(k => secMap[k]).filter(s => s.total >= 3).sort((a,b) => b.total - a.total);
    sections.forEach(sec => {
      var sd = Object.keys(sec.dates).sort(); var cumul = 0;
      sec.timeline = sd.map(d => { cumul += sec.dates[d]; return { date: d, count: cumul }; });
      sec.firstDate = sd[0]; sec.lastDate = sd[sd.length - 1];
      sec.fillDays = Math.max(1, Math.round((new Date(sec.lastDate+'T12:00:00') - new Date(sec.firstDate+'T12:00:00')) / 86400000));
      sec.fillPct = sec.capacity ? Math.round(sec.total / sec.capacity * 100) : null;
    });
    var atCap = sections.filter(s => s.fillPct && s.fillPct >= 95).length;
    var withPct = sections.filter(s => s.fillPct);
    var avgPct = withPct.length > 0 ? Math.round(withPct.reduce((a,s) => a + s.fillPct, 0) / withPct.length) : null;
    var fast = sections.filter(s => s.fillDays > 0 && s.total >= 5).sort((a,b) => a.fillDays - b.fillDays)[0] || null;
    var slow = sections.filter(s => s.fillDays > 0 && s.total >= 5).sort((a,b) => b.fillDays - a.fillDays)[0] || null;
    return { sections, totalSections: sections.length, atCapacity: atCap, avgPct, fastestFill: fast, slowestFill: slow, top: sections.slice(0, 30) };
  }, [demoRows]);

  var sortedRetPrograms = useMemo(() => {

    var col = retSort.col, dir = retSort.dir;
    return retStats.programs.slice().sort((a, b) => {

      if (typeof va === 'string') { va = va.toLowerCase(); vb = (vb||'').toLowerCase(); }
      if (va < vb) return dir === 'asc' ? -1 : 1;
      if (va > vb) return dir === 'asc' ? 1 : -1;

    });

  function toXlDate(s) { if (!s) return ''; const p = String(s).split('T')[0].split('-'); return p.length === 3 ? new Date(+p[0], +p[1]-1, +p[2]) : s; }
  function downloadExcel() {

  const buildInsightsBlob = useCallback(() => {

        totalWaitlist: totals.waitlist,
        totalCancellations: totals.cancellations || 0,
        totalRefunds: r2(totals.refunds),
        netRevenue: r2(totals.netRevenue),
        overallCancellationPct: totals.enrollments > 0

  const getInsights = useCallback(async () => {

    try {

        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(blob),
      });
      const json = await resp.json().catch(() => ({}));
      if (!resp.ok || !json.ok) throw new Error(json.error || `Request failed (${resp.status})`);
      setInsights(json.insights || []);
      setInsightsTraceId(json.traceId || null);

      setInsightsMeta({ programCount, names: (grouped ? Object.keys(grouped) : []) });

  const allOpen  = sectionGrain && rows && rows.length > 0 && rows.every(r => open.has(r.programId));
  const toggle   = (id) => setOpen(prev => { const n = new Set(prev); n.has(id) ? n.delete(id) : n.add(id); return n; });

        <div className="divider" />
        <div style={{position:'relative',display:'flex',alignItems:'center'}}>
          <span style={{position:'absolute',left:8,color:'#666',fontSize:12,pointerEvents:'none'}}>🔍</span>

            >×</button>

        </div>
        <div className="toolbar-spacer" />
        {rows && (
          <span className="row-count">
            {search.trim()
              ? `${programCount} of ${new Set(rows.map(r => r.programName)).size} programs`
              : `${totals ? totals.sections : rows.length} section${(totals ? totals.sections : rows.length) !== 1 ? 's' : ''} \u00b7 ${programCount} program${programCount !== 1 ? 's' : ''}`
            }

        <div className="divider" />
        <button onClick={() => window.print()}>🖨️ Print</button>
        <button className="btn-pdf" onClick={downloadPdf} disabled={pdfLoading || !rows || rows.length === 0}>

        </button>

  }

  // ── Error / Loading ────────────────────────────────────────────────
  if (error && !rows) return (
    <div>{renderToolbar()}
      <StaleCacheBanner meta={meta} />
      <div className="page"><div className="error" style={{textAlign:'center',padding:'3rem 1rem'}}>
        <p style={{fontSize:'2.5rem',marginBottom:'0.5rem'}}>😔</p>
        <p style={{fontSize:'1.1rem',color:'#666'}}>Looks like reporting has encountered an issue — try loading this report again later.</p>
      </div></div>

  if (!rows) return (
    <div>{renderToolbar()}
      <div className="page"><div className="loading">
        <div className="spinner" /><div className="juice-msg"><span>Squeezing the oranges…</span><span>Juicing!</span><span>Adding the pulp…</span><span>Chilling the glass…</span><span>Pouring it out…</span></div>
      </div></div>

  const now = new Date();
  const runDate = `${String(now.getMonth()+1).padStart(2,'0')}/${String(now.getDate()).padStart(2,'0')}/${now.getFullYear()} @ ${now.toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit',hour12:true}).toLowerCase()}`;
  const orgName = meta.org_name || (meta.org_slug ? meta.org_slug.charAt(0).toUpperCase() + meta.org_slug.slice(1) : 'rec.us');

  const totalCols  = 13 + (showRegModeCol ? 1 : 0) + (showWaitlist ? 1 : 0) + (showCancelsCol ? 2 : 0);

        {!isPrint && (
          <div className="tabs">

              Revenue
            </div>
            {participantsEnabled ? (
              <div className={'tab'+(tab==='participants'?' active':'')} onClick={()=>switchTab('participants')}>

              </div>
            ) : (
              <div className="tab" style={{opacity:0.5,cursor:'default'}}>

              </div>
            )}
            {retentionEnabled ? (

                        <div style={{background:'#f3f4f6',borderRadius:4,height:8,overflow:'hidden'}}>
                          <div style={{height:'100%',borderRadius:4,background:tier.color,width:pct+'%',transition:'width 0.5s'}}></div>
                        </div>
                      </div>
                    );
                  })}
                </div>
                {cohortAnalytics.affinities.length > 0 && (
                  <div style={{background:'#fff',border:'1px solid #e5e7eb',borderRadius:8,padding:14}}>
                    <div style={{fontSize:13,fontWeight:700,color:'#111827',marginBottom:4}}>Cross-Program Affinity</div>
                    <div style={{fontSize:11,color:'#6b7280',marginBottom:10}}>Programs sharing the most participants — natural cross-sell and bundling candidates.</div>
                    {cohortAnalytics.affinities.slice(0, 8).map((af, i) => (
                      <div key={i} style={{display:'flex',alignItems:'center',gap:8,marginBottom:8,fontSize:11}}>
                        <span style={{fontWeight:700,color:'#2563eb',minWidth:28,textAlign:'right'}}>{af.shared}</span>
                        <span style={{color:'#374151'}}>
                          <strong>{af.progA.length > 25 ? af.progA.slice(0,23) + '\u2026' : af.progA}</strong>
                          {" \u2194 "}
                          <strong>{af.progB.length > 25 ? af.progB.slice(0,23) + '\u2026' : af.progB}</strong>
                          <span style={{color:'#9ca3af',marginLeft:6}}>({af.pctA}% / {af.pctB}%)</span>
                        </span>
                      </div>
                    ))}
                  </div>
                )}
              </div>
            )}

            {!cohortAnalytics && demoLoading && (
              <div style={{textAlign:'center',padding:'30px 20px',color:'#888',fontSize:13}}>
                <div className="spinner" style={{margin:'0 auto 12px'}} />Loading enrollment history for cohort analysis…
              </div>
            )}
          </React.Fragment>
        )}

        {/* Fill Rate Tab */}
        {tab === 'fillrate' && (
          <React.Fragment>
            {!fillRateAnalytics && demoLoading && <JuiceLoader />}
            {fillRateAnalytics && (() => {
              var fr = fillRateAnalytics;
              var FILL_COLORS = ['#2563eb','#dc2626','#059669','#d97706','#7c3aed','#db2777','#0891b2','#4f46e5','#ea580c','#16a34a','#6d28d9','#e11d48'];
              var selected = fillSelected || fr.top.slice(0,5).map(s => s.section);
              var chartSections = fr.sections.filter(s => selected.indexOf(s.section) !== -1);
              return (
                <React.Fragment>
                  <div className="summary-cards">
                    <div className="summary-card"><div className="card-label">Sections Tracked</div><div className="card-value">{fr.totalSections}</div><div className="card-sub">3+ enrollments</div></div>
                    {fr.avgPct!==null&&<div className="summary-card"><div className="card-label">Avg Fill Rate</div><div className="card-value">{fr.avgPct}%</div><div className="card-sub">{fr.atCapacity} at capacity</div></div>}
                    {fr.fastestFill&&<div className="summary-card"><div className="card-label">Fastest Fill</div><div className="card-value">{fr.fastestFill.fillDays}d</div><div className="card-sub">{fr.fastestFill.section.slice(0,25)}</div></div>}
                    {fr.slowestFill&&<div className="summary-card"><div className="card-label">Slowest Fill</div><div className="card-value">{fr.slowestFill.fillDays}d</div><div className="card-sub">{fr.slowestFill.section.slice(0,25)}</div></div>}
                  </div>
                  <div style={{marginBottom:14,display:"flex",flexWrap:"wrap",gap:6,alignItems:"center"}}>
                    <span style={{fontSize:11,fontWeight:700,color:"#6b7280",textTransform:"uppercase",letterSpacing:".06em",marginRight:4}}>Sections:</span>
                    {fr.top.slice(0,20).map((sec,i) => { var isOn=selected.indexOf(sec.section)!==-1; var ci=selected.indexOf(sec.section); var col=ci>=0?FILL_COLORS[ci%FILL_COLORS.length]:"#d1d5db"; return <button key={i} onClick={()=>{var next;if(isOn)next=selected.filter(s=>s!==sec.section);else next=selected.concat([sec.section]);setFillSelected(next.length>0?next:null);}} style={{fontSize:11,padding:"3px 10px",borderRadius:20,border:"1.5px solid "+(isOn?col:"#d1d5db"),background:isOn?col+"18":"#fff",color:isOn?col:"#9ca3af",fontWeight:isOn?700:500,cursor:"pointer",fontFamily:"inherit",lineHeight:"1.5"}}>{sec.section.length>28?sec.section.slice(0,26)+"…":sec.section} <span style={{opacity:0.7}}>{sec.total}</span></button>; })}
                  </div>
                  <FillRateChart sections={chartSections} colors={FILL_COLORS} selected={selected} />
                  <div style={{marginTop:20,background:"#fff",border:"1px solid #e5e7eb",borderRadius:8,padding:14}}>
                    <div style={{fontSize:13,fontWeight:700,color:"#111827",marginBottom:10}}>All Tracked Sections</div>
                    <div style={{overflowX:"auto"}}><table style={{width:"100%",borderCollapse:"collapse",fontSize:12}}>
                      <thead><tr style={{borderBottom:"2px solid #e5e7eb"}}>{[{k:"section",l:"Section",a:"left"},{k:"program",l:"Program",a:"left"},{k:"total",l:"Enrolled",a:"right"},{k:"capacity",l:"Capacity",a:"right"},{k:"fillPct",l:"Fill %",a:"right"},{k:"fillDays",l:"Fill Days",a:"right"}].map(h=>{var ac=fillSort.col===h.k;return <th key={h.k} style={{textAlign:h.a,padding:"8px 10px",fontWeight:700,color:ac?"#2563eb":"#374151",cursor:"pointer",userSelect:"none",whiteSpace:"nowrap"}} onClick={()=>setFillSort({col:h.k,dir:ac&&fillSort.dir==="desc"?"asc":"desc"})}>{h.l}{ac?(fillSort.dir==="desc"?" ▼":" ▲"):""}</th>;})}</tr></thead>
                      <tbody>{fr.top.slice().sort((a,b)=>{var c=fillSort.col,d=fillSort.dir==="asc"?1:-1;var va=c==="section"?a.section:c==="program"?a.program:c==="total"?a.total:c==="capacity"?(a.capacity||0):c==="fillPct"?(a.fillPct||0):a.fillDays;var vb=c==="section"?b.section:c==="program"?b.program:c==="total"?b.total:c==="capacity"?(b.capacity||0):c==="fillPct"?(b.fillPct||0):b.fillDays;if(typeof va==="string")return va.localeCompare(vb)*d;return((va||0)-(vb||0))*d;}).map((sec,i)=>{var bp=sec.fillPct?Math.min(sec.fillPct,100):0;var bc=bp>=95?"#059669":bp>=70?"#d97706":bp>=40?"#2563eb":"#9ca3af";return <tr key={i} style={{borderBottom:"1px solid #f3f4f6"}}><td style={{padding:"7px 10px",fontWeight:600,color:"#111827",maxWidth:200,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{sec.section}</td><td style={{padding:"7px 10px",color:"#6b7280",maxWidth:180,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{sec.program}</td><td style={{padding:"7px 10px",textAlign:"right",fontWeight:600}}>{sec.total}</td><td style={{padding:"7px 10px",textAlign:"right"}}>{sec.capacity||"—"}</td><td style={{padding:"7px 10px",textAlign:"right"}}>{sec.fillPct!==null?<span style={{display:"inline-flex",alignItems:"center",gap:6}}><span style={{width:48,height:6,borderRadius:3,background:"#f3f4f6",display:"inline-block",position:"relative",overflow:"hidden"}}><span style={{position:"absolute",left:0,top:0,bottom:0,borderRadius:3,background:bc,width:Math.min(bp,100)+"%"}}></span></span>{sec.fillPct>100?<span style={{fontWeight:700,color:"#059669",fontSize:11}}>Full ({sec.total}/{sec.capacity})</span>:<span style={{fontWeight:600,color:bc}}>{sec.fillPct}%</span>}</span>:"—"}</td><td style={{padding:"7px 10px",textAlign:"right",color:"#6b7280"}}>{sec.fillDays}d</td></tr>;})}</tbody>
                    </table></div>
                  </div>
                </React.Fragment>
              );
            })()}
          </React.Fragment>
        )}

        {tab === 'detail' && detailSection && (
          <React.Fragment>
            <div style={{marginBottom:16}}>
              <span onClick={()=>{setTab('revenue');document.body.removeAttribute('data-hide-widgets');}} style={{cursor:'pointer',color:'#6366f1',fontSize:13,fontWeight:600}}>← Back to Revenue</span>
            </div>
            <div style={{background:'#f8f7f4',border:'1px solid #e4e4e0',borderRadius:8,padding:'16px 20px',marginBottom:20}}>
              <div style={{fontSize:18,fontWeight:700,color:'#111827',marginBottom:4}}>{detailSection}</div>
              <div style={{fontSize:13,color:'#6b7280'}}>Registrant revenue detail — {startDate || 'all dates'} to {endDate || 'present'}</div>
            </div>
            {detailLoading && <div style={{textAlign:'center',padding:40,color:'#6b7280'}}>Loading registrant data…</div>}
            {detailError && <div style={{textAlign:'center',padding:40,color:'#b91c1c'}}>{detailError}</div>}
            {detailRows && detailRows.length === 0 && <div style={{textAlign:'center',padding:40,color:'#6b7280'}}>No registrations found for this section in the selected date range.</div>}
            {detailRows && detailRows.length > 0 && (() => {
              const dr = detailRows;
              const totalSessions = parseInt(dr[0].total_sessions || dr[0]['total_sessions']) || 0;
              const sessInRange = parseInt(dr[0].sessions_in_range || dr[0]['sessions_in_range']) || 0;
              const regMode = dr[0].reg_mode || dr[0]['reg_mode'] || '';
              const secStart = dr[0].section_start || dr[0]['section_start'] || '';
              const secEnd = dr[0].section_end || dr[0]['section_end'] || '';
              const sumCharged = dr.reduce((s,r) => s + parseFloat(r.charged || 0), 0);
              const sumReceived = dr.reduce((s,r) => s + parseFloat(r.received || 0), 0);
              const sumOutstanding = dr.reduce((s,r) => s + parseFloat(r.outstanding || 0), 0);
              const sumRefunds = dr.reduce((s,r) => s + parseFloat(r.refunds || 0), 0);
              const sumNet = dr.reduce((s,r) => s + parseFloat(r.net || 0), 0);
              const sumProratedCharged = dr.reduce((s,r) => s + parseFloat(r.prorated_charged || 0), 0);
              const sumProratedNet = dr.reduce((s,r) => s + parseFloat(r.prorated_net || 0), 0);
              const activeCount = dr.filter(r => (r.reg_status || r['reg_status']) === 'Active').length;
              const canceledCount = dr.filter(r => (r.reg_status || r['reg_status']) === 'Canceled').length;
              const uniqueNames = new Set(dr.map(r => r.registrant)).size;
              const prorateLabel = totalSessions > 0 ? sessInRange + ' of ' + totalSessions + ' sessions in range' : 'all sessions';
              return (
                <React.Fragment>
                  <div className="summary-cards" style={{marginBottom:20}}>
                    <div className="summary-card"><div className="card-label">Section Dates</div><div className="card-value" style={{fontSize:15}}>{secStart} → {secEnd}</div><div className="card-sub">{regMode === 'per-session' ? 'Per-Session' : 'Per-Section'} registration</div></div>
                    <div className="summary-card"><div className="card-label">Sessions in Range</div><div className="card-value">{sessInRange} / {totalSessions}</div><div className="card-sub">{totalSessions > 0 ? Math.round(sessInRange/totalSessions*100) + '% of program' : '—'}</div></div>
                    <div className="summary-card"><div className="card-label">Registrants</div><div className="card-value">{uniqueNames}</div><div className="card-sub">{activeCount} active{canceledCount > 0 ? ', ' + canceledCount + ' canceled' : ''}</div></div>
                    <div className="summary-card"><div className="card-label">Full Net Revenue</div><div className="card-value">{fmtMoney(sumNet)}</div><div className="card-sub">Entire registration period</div></div>
                    <div className="summary-card" style={{borderLeft:'3px solid #6366f1'}}><div className="card-label">Prorated Net Revenue</div><div className="card-value" style={{color:'#6366f1'}}>{fmtMoney(sumProratedNet)}</div><div className="card-sub">{prorateLabel}</div></div>
                  </div>
                  <div className="table-scroll">
                  <table className="prog-table detail-table">
                    <thead><tr>
                      <th className="left col-name">Registrant</th>
                      <th className="left col-email">Email</th>
                      <th className="col-date">Registered</th>
                      <th className="col-status">Status</th>
                      {regMode === 'per-session' && <th className="col-date">Session</th>}
                      <th className="col-money">Charged</th>
                      <th className="col-money">Received</th>
                      <th className="col-money">Outstanding</th>
                      <th className="col-money" style={{color:'#b91c1c'}}>Refunds</th>
                      <th className="col-money">Net</th>
                      <th className="col-prorated">Prorated Chg</th>
                      <th className="col-prorated">Prorated Net</th>
                    </tr></thead>
                    <tbody>
                      {dr.map((r, i) => {
                        const isCanceled = (r.reg_status || r['reg_status']) === 'Canceled';
                        return (
                          <tr key={i} style={isCanceled ? {opacity:0.5} : {}}>
                            <td className="left" style={{fontWeight:600}}>{r.registrant || 'Unknown'}</td>
                            <td className="left" style={{fontSize:11,color:'#6b7280'}}>{r.email || '—'}</td>
                            <td className="mono">{r.registered_on || r['registered_on'] || '—'}</td>
                            <td>{isCanceled ? <span style={{color:'#b91c1c',fontWeight:600,fontSize:11}}>Canceled</span> : <span style={{color:'#059669',fontSize:11}}>Active</span>}</td>
                            {regMode === 'per-session' && <td className="mono">{r.session_date || r['session_date'] || '—'}</td>}
                            <td className="money">{fmtMoney(parseFloat(r.charged || 0))}</td>
                            <td className="money">{fmtMoney(parseFloat(r.received || 0))}</td>
                            <td className="money">{fmtMoney(parseFloat(r.outstanding || 0))}</td>
                            <td className="money" style={parseFloat(r.refunds || 0) > 0 ? {color:'#b91c1c'} : {}}>{fmtMoney(parseFloat(r.refunds || 0))}</td>
                            <td className="money" style={{fontWeight:600}}>{fmtMoney(parseFloat(r.net || 0))}</td>
                            <td className="money" style={{background:'#f5f3ff',color:'#4338ca',fontWeight:600}}>{fmtMoney(parseFloat(r.prorated_charged || 0))}</td>
                            <td className="money" style={{background:'#f5f3ff',color:'#4338ca',fontWeight:700}}>{fmtMoney(parseFloat(r.prorated_net || 0))}</td>
                          </tr>
                        );
                      })}
                    </tbody>
                    <tfoot>
                      <tr style={{background:'#2c2c2c',color:'#fff',fontWeight:700}}>
                        <td className="left">TOTAL — {uniqueNames} REGISTRANTS</td>
                        <td></td><td></td><td></td>{regMode === 'per-session' && <td></td>}
                        <td className="money">{fmtMoney(sumCharged)}</td>
                        <td className="money">{fmtMoney(sumReceived)}</td>
                        <td className="money">{fmtMoney(sumOutstanding)}</td>
                        <td className="money" style={{color:'#ff6b6b'}}>{fmtMoney(sumRefunds)}</td>
                        <td className="money">{fmtMoney(sumNet)}</td>
                        <td className="money" style={{background:'#312e81',color:'#c7d2fe'}}>{fmtMoney(sumProratedCharged)}</td>
                        <td className="money" style={{background:'#312e81',color:'#c7d2fe'}}>{fmtMoney(sumProratedNet)}</td>
                      </tr>
                    </tfoot>
                  </table>
                  </div>
                </React.Fragment>
              );
            })()}
          </React.Fragment>
        )}

                <div className="report-footer">
          <span>{orgName} — Programs</span>
          <span>Run Date/Time: {runDate}</span>
        </div>

        {((tab === 'revenue' && rows) || (tab === 'participants' && demoRows) || (tab === 'retention' && retRows) || (tab === 'fillrate' && demoRows) || (tab === 'detail' && detailRows)) && <div id="report-ready" style={{display:'none'}} />}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
    <script src="/share-widget.js" defer></script>
    <script src="/feedback-widget.js" defer></script>
    <script src="/nav-breadcrumb.js" defer></script>
    <script src="/juice-loader.js" defer></script>
  </body>
</html>
