<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reports</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'IBM Plex Sans', system-ui, sans-serif;
      background: #f5f4f1;
      color: #1a1a1a;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── Top bar ── */
    .topbar {
      background: #2c2c2c;
      color: #eee;
      padding: 12px 32px;
      display: flex;
      align-items: center;
      gap: 16px;
      flex-shrink: 0;
    }
    .topbar-logo {
      height: 36px;
      max-width: 130px;
      object-fit: contain;
      object-position: left center;
      display: block;
    }
    .topbar-text { line-height: 1.3; }
    .topbar-name { font-size: 15px; font-weight: 700; }
    .topbar-sub  { font-size: 11px; color: #aaa; text-transform: uppercase; letter-spacing: 1px; margin-top: 1px; }

    /* ── Main layout ── */
    .main {
      flex: 1;
      max-width: 700px;
      width: 100%;
      margin: 0 auto;
      padding: 48px 24px 64px;
    }

    /* ── Section label ── */
    .section-label {
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1.4px;
      color: #aaa;
      margin-bottom: 12px;
    }

    /* ── Report cards ── */
    .cards {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-bottom: 32px;
    }

    .card {
      display: flex;
      align-items: center;
      gap: 16px;
      background: #fff;
      border: 1px solid #e0ddd8;
      border-radius: 8px;
      padding: 16px 20px;
      text-decoration: none;
      color: inherit;
      transition: box-shadow 0.15s, border-color 0.15s;
      position: relative;
    }
    .card:hover {
      box-shadow: 0 2px 12px rgba(0,0,0,0.10);
      border-color: #bbb;
    }
    .card.pinned {
      border-left: 4px solid #d97706;
    }

    .card-icon {
      font-size: 24px;
      width: 36px;
      text-align: center;
      flex-shrink: 0;
      line-height: 1;
    }

    .card-body { flex: 1; min-width: 0; }

    .card-label {
      font-size: 14px;
      font-weight: 600;
      color: #111;
      margin-bottom: 2px;
    }

    .card-desc {
      font-size: 12px;
      color: #888;
      line-height: 1.4;
    }
    .ai-pill { display: inline-flex; align-items: center; gap: 3px; font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; padding: 2px 7px; border-radius: 20px; background: linear-gradient(90deg, #6d28d9, #0d9488); color: #fff; margin-top: 5px; }
    .health-badge { display: inline-flex; align-items: center; gap: 3px; font-size: 9px; font-weight: 600; padding: 1px 6px; border-radius: 8px; margin-top: 3px; }
    .health-ok { background: #dcfce7; color: #15803d; }
    .health-empty { background: #fef9c3; color: #a16207; }
    .health-error { background: #fee2e2; color: #b91c1c; }

    /* ── Metrics bar ── */
    .metrics-bar {
      max-width: 700px;
      width: 100%;
      margin: 0 auto;
      padding: 24px 24px 0;
      display: flex;
      gap: 0;
    }
    .metrics-bar-inner {
      display: flex;
      width: 100%;
      background: linear-gradient(135deg, #1e1b4b 0%, #312e81 40%, #4338ca 100%);
      border-radius: 10px;
      overflow: hidden;
    }
    .metric-item {
      flex: 1;
      padding: 18px 0;
      text-align: center;
      border-right: 1px solid rgba(165,180,252,0.15);
    }
    .metric-item:last-child { border-right: none; }
    .metric-value {
      font-size: 26px;
      font-weight: 700;
      color: #fff;
      line-height: 1.1;
    }
    .metric-label {
      font-size: 9px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1.2px;
      color: #a5b4fc;
      margin-top: 4px;
    }
    @media (max-width: 480px) {
      .metrics-bar { padding: 16px 16px 0; }
      .metric-value { font-size: 20px; }
      .metric-label { font-size: 8px; letter-spacing: 0.8px; }
    }

    /* ── Calendar Analytics ── */
    .cal-analytics-panel {
      max-width: 700px; width: 100%; margin: 0 auto 18px;
      background: linear-gradient(135deg, #065f46 0%, #047857 40%, #059669 100%);
      border-radius: 16px; padding: 16px 24px 0;
      box-sizing: border-box;
      box-shadow: 0 2px 12px rgba(5,150,105,0.12);
    }
    .cal-analytics-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
    .cal-analytics-title { font-weight: 800; font-size: 15px; color: #fff; }
    .cal-analytics-sub { font-size: 11px; color: rgba(255,255,255,0.6); }
    .cal-analytics-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; padding-bottom: 14px; }
    .cal-card { background: rgba(255,255,255,0.12); border-radius: 12px; padding: 14px 12px 10px; text-align: center; backdrop-filter: blur(4px); border: 1px solid rgba(255,255,255,0.08); }
    .cal-card-val { font-size: 24px; font-weight: 800; color: #fff; line-height: 1.1; }
    .cal-card-label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; color: rgba(255,255,255,0.7); margin-top: 2px; }
    .cal-card-sub { font-size: 10px; color: rgba(255,255,255,0.45); margin-top: 1px; }
    @media (max-width: 600px) { .cal-analytics-grid { grid-template-columns: repeat(2, 1fr); } .cal-analytics-panel { padding: 12px 16px 0; } }

    /* ── Pulse executive summary ── */
    .pulse-panel {
      max-width: 700px;
      width: 100%;
      margin: 0 auto;
      padding: 16px 24px 0;
    }
    .pulse-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 10px;
    }
    .pulse-title {
      font-size: 14px;
      font-weight: 700;
      color: #1a1a1a;
    }
    .pulse-ts {
      font-size: 10px;
      color: #999;
    }
    .pulse-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
    }
    .pulse-card {
      background: linear-gradient(135deg, #312e81 0%, #4338ca 100%);
      border-radius: 8px;
      padding: 10px 12px;
      text-align: center;
    }
    .pulse-card-icon { font-size: 14px; margin-bottom: 2px; }
    .pulse-card-val { font-size: 17px; font-weight: 700; color: #fff; line-height: 1.1; }
    .pulse-card-label { font-size: 9px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.7px; color: #a5b4fc; margin-top: 2px; }
    .pulse-card-sub { font-size: 9px; color: rgba(165,180,252,0.65); margin-top: 1px; }
    @media (max-width: 480px) {
      .pulse-panel { padding: 12px 16px 0; }
      .pulse-grid { grid-template-columns: repeat(2, 1fr); gap: 6px; }
      .pulse-card-val { font-size: 15px; }
    }

    .card-right {
      display: flex;
      align-items: center;
      gap: 6px;
      flex-shrink: 0;
    }

    .card-arrow {
      font-size: 18px;
      color: #ccc;
      font-family: 'IBM Plex Mono', monospace;
      transition: color 0.15s, transform 0.15s;
    }
    .card:hover .card-arrow {
      color: #16a34a;
      transform: translateX(3px);
    }

    /* ── Pin button ── */
    .pin-btn {
      background: none;
      border: none;
      cursor: pointer;
      font-size: 14px;
      padding: 4px 6px;
      border-radius: 4px;
      opacity: 0;
      transition: opacity 0.15s, background 0.12s;
      color: #ccc;
      line-height: 1;
    }
    .card:hover .pin-btn,
    .card.pinned .pin-btn {
      opacity: 1;
    }
    .card.pinned .pin-btn {
      color: #d97706;
    }
    .pin-btn:hover {
      background: #f5f4f1;
      color: #d97706;
    }

    /* ── Divider ── */
    .section-divider {
      font-size: 9px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1.2px;
      color: #ccc;
      margin: 16px 0 8px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .section-divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: #e2dfd9;
    }

    /* ── Footer ── */
    footer {
      text-align: center;
      padding: 24px;
      font-size: 11px;
      color: #bbb;
      font-family: 'IBM Plex Mono', monospace;
      flex-shrink: 0;
    }

    /* ── Empty state ── */
    .empty {
      text-align: center;
      padding: 48px 0;
      color: #bbb;
      font-size: 13px;
    }

    @media (max-width: 480px) {
      .topbar { padding: 10px 16px; gap: 12px; }
      .main { padding: 32px 16px 48px; }
      .pin-btn { opacity: 1; }
    }
  
    .prerelease-banner {
      background: #f97316;
      color: #fff;
      text-align: center;
      padding: 10px 16px;
      font-size: 14px;
      font-weight: 500;
      letter-spacing: 0.3px;
    }
    .prerelease-banner a {
      color: #fff;
      text-decoration: underline;
      font-weight: 600;
    }
</style>
</head>
<body>

<header class="topbar" id="topbar"></header>
<div class="prerelease-banner">Enhanced Reports in Pre-Release — Contact <a href="mailto:dan@rec.us">dan@rec.us</a> with Feedback or Questions</div>

<div class="metrics-bar" id="metrics-bar"></div>

<div class="pulse-panel" id="pulse-panel" style="display:none">
  <div class="pulse-header">
    <span class="pulse-title">📊 Daily Pulse</span>
    <span class="pulse-ts" id="pulse-ts"></span>
  </div>
  <div class="pulse-grid" id="pulse-grid"></div>
</div>

<div class="cal-analytics-panel" id="cal-analytics" style="display:none">
  <div class="cal-analytics-header">
    <span class="cal-analytics-title">📈 Calendar Performance</span>
    <span class="cal-analytics-sub" id="cal-analytics-sub"></span>
  </div>
  <div class="cal-analytics-grid" id="cal-analytics-grid"></div>
</div>

<main class="main">
  <div class="section-label">Reports</div>
  <div class="cards" id="cards">
    <div class="empty">No reports configured.</div>
  </div>

</main>

<footer id="footer">rec.us</footer>

<script>
  var cfg = window.ORG_CONFIG || {};
  var slug = cfg.slug || '';
  var tokenQS = cfg.token ? '?token=' + encodeURIComponent(cfg.token) : '';

  var REPORT_META = {
    facility:  { label: 'Facility Rental Schedule', icon: '📅',  desc: 'Reservations grouped by date and location' },
    gl:        { label: 'GL Code Rollup',           icon: '📊',  desc: 'Payment and refund summary by GL code' },
    programs:  { label: 'Programs',          icon: '🎯',  desc: 'Enrollment, revenue, and participant demographics', ai: true },
    historic:  { label: 'Historic Buildings',       icon: '🏛️',  desc: 'Reservations for historic building sites' },
    roster:    { label: 'Class Roster',             icon: '📋',  desc: 'Enrolled and cancelled participants by section' },
    overview:  { label: 'Facility Overview',        icon: '📈',  desc: 'Revenue and activity summary by location' },
    products:  { label: 'Product Sales',            icon: '🛒',  desc: 'Daily revenue, refunds, and net by product' },
    memberships: { label: 'Memberships',            icon: '🎫',  desc: 'Active and lapsed memberships with renewal tracking' },
    'court-utilization': { label: 'Court Utilization', icon: '🎾', desc: 'Court utilization and reserved hours by court', ai: true },
    calendar:  { label: 'Program Calendar',                 icon: '🗓️',  desc: 'Public class & rental schedule' },
    fasttrack: { label: 'Fast Track',               icon: '⚡',  desc: 'Pre-registration demand signal with conversion tracking', ai: true },
    users:     { label: 'Community Intel',            icon: '👥',  desc: 'Demographics, revenue, and strategy intelligence across your community', ai: true },
    'instructor-payout': { label: 'Instructor Payout', icon: '💰', desc: 'Revenue splits and payout calculations by instructor' },
    'rentalcalendar':    { label: 'Rental Calendar', icon: '🏟️', desc: 'Real-time facility availability with live booking data' },
  };

  /* ── Pin storage ── */
  var LS_KEY = 'rec_pinned_' + slug;

  function getPins() {
    try { return JSON.parse(localStorage.getItem(LS_KEY)) || []; }
    catch(e) { return []; }
  }
  function savePins(arr) {
    localStorage.setItem(LS_KEY, JSON.stringify(arr));
  }
  function togglePin(reportType) {
    var pins = getPins();
    var idx = pins.indexOf(reportType);
    if (idx > -1) pins.splice(idx, 1);
    else pins.push(reportType);
    savePins(pins);
    render();
  }

  /* ── Page title ── */
  if (cfg.displayName) {
    document.title = cfg.displayName + ' — Reports';
  }

  /* ── Top bar ── */
  document.getElementById('topbar').innerHTML = [
    cfg.logoUrl
      ? '<img src="' + cfg.logoUrl + '" alt="" class="topbar-logo" onerror="this.style.display=\'none\'" />'
      : '',
    '<div class="topbar-text">',
      '<div class="topbar-name">' + (cfg.displayName || 'Reports') + '</div>',
      '<div class="topbar-sub">rec.us Reports</div>',
    '</div>',
  ].join('');

  /* ── Metrics bar — admin-only, hidden on org landing page ── */
  /* Views/Exports/AI Insights are surfaced on the admin dashboard instead */

  /* ── Sparkline SVG generator ── */
  function sparkSVG(trail) {
    if (!trail || trail.length < 2) return '';
    var w = 56, h = 20, pad = 2;
    var max = -Infinity, min = Infinity;
    for (var i = 0; i < trail.length; i++) {
      if (trail[i] > max) max = trail[i];
      if (trail[i] < min) min = trail[i];
    }
    var range = max - min || 1;
    var pts = [];
    for (var i = 0; i < trail.length; i++) {
      var x = (i / (trail.length - 1)) * w;
      var y = (h - pad) - ((trail[i] - min) / range) * (h - pad * 2);
      pts.push(x.toFixed(1) + ',' + y.toFixed(1));
    }
    var last = trail[trail.length - 1], first = trail[0];
    var color = last > first * 1.03 ? '#4ade80' : last < first * 0.97 ? '#f87171' : '#a5b4fc';
    var lastPt = pts[pts.length - 1].split(',');
    return '<svg width="' + w + '" height="' + h + '" viewBox="0 0 ' + w + ' ' + h + '" style="display:block;margin:4px auto 0;opacity:0.85">'
      + '<polyline points="' + pts.join(' ') + '" fill="none" stroke="' + color + '" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>'
      + '<circle cx="' + lastPt[0] + '" cy="' + lastPt[1] + '" r="1.5" fill="' + color + '"/>'
      + '</svg>';
  }

  /* ── Executive Pulse ── */
  (function() {
    var p = cfg.pulse;
    if (!p || !p.items || p.items.length === 0) return;
    // Priority: revenue, refunds, enrollments, then products or households
    var priority = ['revenue', 'refunds', 'enrollments', 'products', 'households', 'bookings'];
    var sorted = p.items.slice().sort(function(a, b) {
      var ai = priority.indexOf(a.key); var bi = priority.indexOf(b.key);
      return (ai === -1 ? 99 : ai) - (bi === -1 ? 99 : bi);
    });
    var items = sorted.slice(0, 4);
    var panel = document.getElementById('pulse-panel');
    var grid = document.getElementById('pulse-grid');
    var ts = document.getElementById('pulse-ts');
    panel.style.display = 'block';
    if (p.generated) {
      var d = new Date(p.generated);
      ts.textContent = 'Updated ' + d.toLocaleTimeString([], {hour:'numeric',minute:'2-digit'});
    }
    grid.innerHTML = items.map(function(it) {
      var deltaHtml = '';
      if (it.delta) {
        var color = it.direction === 'up' ? '#4ade80' : it.direction === 'down' ? '#f87171' : '#a5b4fc';
        var arrow = it.direction === 'up' ? '↑' : it.direction === 'down' ? '↓' : '';
        deltaHtml = '<div style="font-size:11px;color:' + color + ';margin-top:3px;font-weight:600">' + arrow + ' ' + it.delta + ' vs last month</div>';
      }
      var sparkHtml = sparkSVG(it.trail);
      return '<div class="pulse-card">'
        + '<div class="pulse-card-icon">' + (it.icon || '') + '</div>'
        + '<div class="pulse-card-val">' + it.value + '</div>'
        + '<div class="pulse-card-label">' + it.label + '</div>'
        + '<div class="pulse-card-sub">' + (it.sub || '') + '</div>'
        + deltaHtml
        + sparkHtml
      + '</div>';
    }).join('');
  })();

  /* ── Calendar Analytics ── */
  (function() {
    var reports = cfg.reports || [];
    var hasCal = reports.indexOf('calendar') > -1 || reports.indexOf('rentalcalendar') > -1;
    if (!hasCal) return;
    var panel = document.getElementById('cal-analytics');
    var grid = document.getElementById('cal-analytics-grid');
    var sub = document.getElementById('cal-analytics-sub');
    var url = '/' + slug + '/api/calendar-analytics?days=30';
    if (cfg.token) url += '&token=' + encodeURIComponent(cfg.token);
    fetch(url)
      .then(function(r) { if (!r.ok) throw new Error(r.status); return r.json(); })
      .then(function(d) {
        if (d.totals.pageViews === 0 && d.totals.detailViews === 0) return;
        panel.style.display = 'block';
        sub.textContent = 'Last ' + d.days + ' days';
        var rcLabel = d.rental.pageViews > 0 && d.program.pageViews > 0 ? 'both calendars' : d.rental.pageViews > 0 ? 'rental calendar' : 'program calendar';
        var items = [
          { val: d.totals.pageViews.toLocaleString(), label: 'Page Views', sub: rcLabel, trail: d.daily.map(function(x){return x.rcViews+x.pcViews;}) },
          { val: d.totals.detailViews.toLocaleString(), label: 'Program Clicks', sub: 'section clicks + facility taps', trail: d.daily.map(function(x){return x.rcFacViews+x.pcClicks;}) },
          { val: d.totals.bookClicks.toLocaleString(), label: 'Rental Clicks', sub: 'book now taps', trail: d.daily.map(function(x){return x.rcClicks;}) },
          { val: d.totals.convPct + '%', label: 'Conversion', sub: 'engagement \u2192 book', trail: null },
        ];
        grid.innerHTML = items.map(function(it) {
          var spark = it.trail ? sparkSVG(it.trail) : '';
          return '<div class="cal-card">'
            + '<div class="cal-card-val">' + it.val + '</div>'
            + '<div class="cal-card-label">' + it.label + '</div>'
            + '<div class="cal-card-sub">' + it.sub + '</div>'
            + spark
          + '</div>';
        }).join('');
      })
      .catch(function(e) { console.warn('[cal-analytics]', e); });
  })();

  /* ── Render cards ── */
  function render() {
    var reports = cfg.reports || [];
    if (reports.length === 0) return;

    var pins = getPins();
    // Split into pinned (preserve pin order) and unpinned (preserve original order)
    var pinned = pins.filter(function(r) { return reports.indexOf(r) > -1; });
    var unpinned = reports.filter(function(r) { return pinned.indexOf(r) === -1; });

    var html = '';

    if (pinned.length > 0) {
      html += '<div class="section-divider">Pinned</div>';
      pinned.forEach(function(r) { html += cardHTML(r, true); });
      if (unpinned.length > 0) {
        html += '<div class="section-divider">All reports</div>';
      }
    }
    unpinned.forEach(function(r) { html += cardHTML(r, false); });

    document.getElementById('cards').innerHTML = html;

    // Bind pin buttons (event delegation would also work, but explicit is fine for ≤12 cards)
    document.querySelectorAll('.pin-btn').forEach(function(btn) {
      btn.addEventListener('click', function(e) {
        e.preventDefault();
        e.stopPropagation();
        togglePin(btn.getAttribute('data-report'));
      });
    });
  }

  function healthBadge(r) {
    return ''; // health badges shown only on admin portal
  }

  function cardHTML(r, isPinned) {
    var m = REPORT_META[r] || { label: r, icon: '📄', desc: '' };
    return '<a href="/' + slug + '/' + r + tokenQS + '" class="card' + (isPinned ? ' pinned' : '') + '">'
      + '<div class="card-icon">' + m.icon + '</div>'
      + '<div class="card-body">'
        + '<div class="card-label">' + m.label + '</div>'
        + '<div class="card-desc">' + m.desc + '</div>'
        + (m.ai ? '<span class="ai-pill">✦ AI enhanced</span>' : '')
        + healthBadge(r)
      + '</div>'
      + '<div class="card-right">'
        + '<button class="pin-btn" data-report="' + r + '" title="' + (isPinned ? 'Unpin' : 'Pin to top') + '">'
          + (isPinned ? '📌' : '📌')
        + '</button>'
        + '<div class="card-arrow">→</div>'
      + '</div>'
    + '</a>';
  }

  render();

  /* ── Rec AI Chat card (always shown, after reports) ── */
  if (cfg.reports && cfg.reports.length > 0 && cfg.chatVisible !== false) {
    var chatCard = document.createElement('a');
    chatCard.href = '/' + slug + '/chat' + tokenQS;
    chatCard.className = 'card';
    chatCard.style.cssText = 'border:1.5px solid #e0e7ff;background:linear-gradient(135deg,#f5f3ff 0%,#eef2ff 100%)';
    chatCard.innerHTML = '<div class="card-icon">✦</div>'
      + '<div class="card-body">'
        + '<div class="card-label" style="color:#312e81">Rec AI Chat</div>'
        + '<div class="card-desc">Ask anything about your data across all reports</div>'
        + '<span class="ai-pill">✦ AI powered</span>'
      + '</div>'
      + '<div class="card-right"><div class="card-arrow">→</div></div>';
    document.getElementById('cards').appendChild(chatCard);
  }

  /* ── Report Wizard card ── */
  if (cfg.reports && cfg.reports.length > 0 && cfg.wizardVisible !== false) {
    var wizCard = document.createElement('a');
    wizCard.href = '/' + slug + '/report-wizard' + tokenQS;
    wizCard.className = 'card';
    wizCard.style.cssText = 'border:1.5px solid #e9d5ff;background:linear-gradient(135deg,#faf5ff 0%,#f3e8ff 100%)';
    wizCard.innerHTML = '<div class="card-icon">\u{1FA84}</div>'
      + '<div class="card-body">'
        + '<div class="card-label" style="color:#581c87">Report Wizard</div>'
        + '<div class="card-desc">Build custom dashboards from plain English prompts</div>'
        + '<span class="ai-pill">✦ AI powered</span>'
      + '</div>'
      + '<div class="card-right"><div class="card-arrow">\u2192</div></div>';
    document.getElementById('cards').appendChild(wizCard);
  }

  /* ── Footer ── */
  document.getElementById('footer').textContent = 'rec.us · ' + slug;
</script>
