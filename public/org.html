<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reports</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root { --shell-w: min(80%, 1200px); }
    @media (max-width: 760px) { :root { --shell-w: 100%; } }

    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background: #f5f4f1;
      color: #1a1a1a;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── Top bar ── */
    .topbar {
      background: #2c2c2c;
      color: #eee;
      padding: 12px 32px;
      display: flex;
      align-items: center;
      gap: 16px;
      flex-shrink: 0;
    }
    .topbar-logo {
      height: 36px;
      max-width: 130px;
      object-fit: contain;
      object-position: left center;
      display: block;
    }
    .topbar-text { line-height: 1.3; }
    .topbar-name { font-size: 15px; font-weight: 700; }
    .topbar-sub  { font-size: 11px; color: #aaa; text-transform: uppercase; letter-spacing: 1px; margin-top: 1px; }

    /* ── Main layout ── */
    .main {
      flex: 1;
      width: var(--shell-w);
      max-width: 100%;
      margin: 0 auto;
      padding: 48px 24px 64px;
    }

    /* ── Section label ── */
    .section-label {
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1.4px;
      color: #aaa;
      margin-bottom: 12px;
    }

    /* ── Report cards ── */
    .cards {
      display: flex;
      flex-direction: column;
      gap: 28px;
      margin-bottom: 32px;
    }

    /* Report groups (themed sections) */
    .report-group-head {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1.1px;
      color: #6b7280;
      margin-bottom: 14px;
    }
    .report-group-head .rg-icon { font-size: 15px; line-height: 1; }
    .report-group-head::after { content: ''; flex: 1; height: 1px; background: #e2dfd9; }
    .report-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 12px;
    }
    @media (max-width: 520px) { .report-grid { grid-template-columns: 1fr; } }

    .card {
      display: flex;
      align-items: center;
      gap: 16px;
      background: #fff;
      border: 1px solid #e0ddd8;
      border-radius: 8px;
      padding: 16px 20px;
      text-decoration: none;
      color: inherit;
      transition: box-shadow 0.15s, border-color 0.15s;
      position: relative;
    }
    .card:hover {
      box-shadow: 0 2px 12px rgba(0,0,0,0.10);
      border-color: #bbb;
    }
    .card.pinned {
      border-left: 4px solid #d97706;
    }

    .card-icon {
      font-size: 24px;
      width: 36px;
      text-align: center;
      flex-shrink: 0;
      line-height: 1;
    }

    .card-body { flex: 1; min-width: 0; }

    .card-label {
      font-size: 14px;
      font-weight: 600;
      color: #111;
      margin-bottom: 2px;
    }

    .card-desc {
      font-size: 12px;
      color: #888;
      line-height: 1.4;
    }
    .ai-pill { display: inline-flex; align-items: center; gap: 3px; font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; padding: 2px 7px; border-radius: 20px; background: linear-gradient(90deg, #6d28d9, #0d9488); color: #fff; margin-top: 5px; }
    .health-badge { display: inline-flex; align-items: center; gap: 3px; font-size: 9px; font-weight: 600; padding: 1px 6px; border-radius: 8px; margin-top: 3px; }
    .health-ok { background: #dcfce7; color: #15803d; }
    .health-empty { background: #fef9c3; color: #a16207; }
    .health-error { background: #fee2e2; color: #b91c1c; }

    /* ── Metrics bar ── */
    .metrics-bar {
      width: var(--shell-w);
      max-width: 100%;
      margin: 0 auto;
      padding: 24px 24px 0;
      display: flex;
      gap: 0;
    }
    .metrics-bar-inner {
      display: flex;
      width: 100%;
      background: linear-gradient(135deg, #1e1b4b 0%, #312e81 40%, #4338ca 100%);
      border-radius: 10px;
      overflow: hidden;
    }
    .metric-item {
      flex: 1;
      padding: 18px 0;
      text-align: center;
      border-right: 1px solid rgba(165,180,252,0.15);
    }
    .metric-item:last-child { border-right: none; }
    .metric-value {
      font-size: 26px;
      font-weight: 700;
      color: #fff;
      line-height: 1.1;
    }
    .metric-label {
      font-size: 9px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1.2px;
      color: #a5b4fc;
      margin-top: 4px;
    }
    @media (max-width: 480px) {
      .metrics-bar { padding: 16px 16px 0; }
      .metric-value { font-size: 20px; }
      .metric-label { font-size: 8px; letter-spacing: 0.8px; }
    }


    /* ── Rec Daily Insights panel ── */
    .daily-insights-panel {
      width: var(--shell-w); max-width: 100%; margin: 0 auto;
      padding: 16px 24px 0;
    }
    .daily-insights-inner {
      background: linear-gradient(135deg, #1e1b4b 0%, #312e81 100%);
      border-radius: 14px; padding: 16px 24px;
    }
    .daily-insights-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
    .daily-insights-title { font-weight: 800; font-size: 15px; color: #e0e7ff; }
    .daily-insights-ts { font-size: 11px; color: #818cf8; }
    .daily-insights-list { list-style: none; margin: 0; padding: 0; }
    .daily-insights-list li {
      font-size: 13px; color: #c7d2fe; line-height: 1.55; padding: 8px 0;
      border-bottom: 1px solid rgba(129,140,248,0.15);
    }
    .daily-insights-list li:last-child { border-bottom: none; }
    .daily-insights-list li::before { content: '✨ '; }
    .daily-insights-empty { font-size: 12px; color: #818cf8; font-style: italic; }

    /* ── Pulse executive summary ── */
    .pulse-panel {
      width: var(--shell-w);
      max-width: 100%;
      margin: 0 auto;
      padding: 16px 24px 0;
    }
    .pulse-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 10px;
    }
    .pulse-title {
      font-size: 14px;
      font-weight: 700;
      color: #1a1a1a;
    }
    .pulse-ts {
      font-size: 10px;
      color: #999;
    }
    .pulse-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
    }
    .pulse-card {
      background: linear-gradient(135deg, #312e81 0%, #4338ca 100%);
      border-radius: 8px;
      padding: 10px 12px;
      text-align: center;
    }
    .pulse-card-icon { font-size: 14px; margin-bottom: 2px; }
    .pulse-card-val { font-size: 17px; font-weight: 700; color: #fff; line-height: 1.1; }
    .pulse-card-label { font-size: 9px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.7px; color: #a5b4fc; margin-top: 2px; }
    .pulse-card-sub { font-size: 9px; color: rgba(165,180,252,0.65); margin-top: 1px; }
    .pulse-goal-wrap { display: flex; align-items: center; gap: 10px; margin-top: 6px; }
    .pulse-goal-ring { width: 36px; height: 36px; flex-shrink: 0; }
    .pulse-goal-text { font-size: 9px; color: #c7d2fe; line-height: 1.3; }
    .pulse-goal-pct { font-weight: 700; font-size: 11px; }
    .goal-edit-row { display: flex; align-items: center; gap: 6px; margin-top: 4px; }
    .goal-edit-row input { width: 80px; padding: 3px 6px; border: 1px solid rgba(255,255,255,0.2); border-radius: 4px; background: rgba(255,255,255,0.1); color: #fff; font-size: 10px; font-family: inherit; }
    .goal-edit-row button { padding: 3px 8px; border: none; border-radius: 4px; background: rgba(255,255,255,0.2); color: #fff; font-size: 10px; cursor: pointer; font-family: inherit; }
    .goal-edit-row button:hover { background: rgba(255,255,255,0.35); }
    .pulse-goal-toggle { position: absolute; top: 6px; right: 6px; background: none; border: none; color: rgba(165,180,252,0.5); cursor: pointer; font-size: 11px; padding: 2px; }
    .pulse-goal-toggle:hover { color: #fff; }
    .pulse-card { position: relative; }
    @media (max-width: 480px) {
      .pulse-panel { padding: 12px 16px 0; }
      .pulse-grid { grid-template-columns: repeat(2, 1fr); gap: 6px; }
      .pulse-card-val { font-size: 15px; }
    }

    .card-right {
      display: flex;
      align-items: center;
      gap: 6px;
      flex-shrink: 0;
    }

    .card-arrow {
      font-size: 18px;
      color: #ccc;
      font-family: 'IBM Plex Mono', monospace;
      transition: color 0.15s, transform 0.15s;
    }
    .card:hover .card-arrow {
      color: #16a34a;
      transform: translateX(3px);
    }

    /* ── Pin button ── */
    .pin-btn {
      background: none;
      border: none;
      cursor: pointer;
      font-size: 14px;
      padding: 4px 6px;
      border-radius: 4px;
      opacity: 0;
      transition: opacity 0.15s, background 0.12s;
      color: #ccc;
      line-height: 1;
    }
    .card:hover .pin-btn,
    .card.pinned .pin-btn {
      opacity: 1;
    }
    .card.pinned .pin-btn {
      color: #d97706;
    }
    .pin-btn:hover {
      background: #f5f4f1;
      color: #d97706;
    }

    /* ── Divider ── */
    .section-divider {
      font-size: 9px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1.2px;
      color: #ccc;
      margin: 16px 0 8px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .section-divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: #e2dfd9;
    }

    /* ── Footer ── */
    footer {
      text-align: center;
      padding: 24px;
      font-size: 11px;
      color: #bbb;
      font-family: 'IBM Plex Mono', monospace;
      flex-shrink: 0;
    }

    /* ── Empty state ── */
    .empty {
      text-align: center;
      padding: 48px 0;
      color: #bbb;
      font-size: 13px;
    }

    @media (max-width: 480px) {
      .topbar { padding: 10px 16px; gap: 12px; }
      .main { padding: 32px 16px 48px; }
      .pin-btn { opacity: 1; }
    }
  

</style>
</head>
<body>

<header class="topbar" id="topbar"></header>


<div class="metrics-bar" id="metrics-bar"></div>

<div class="pulse-panel" id="pulse-panel" style="display:none">
  <div class="pulse-header">
    <span class="pulse-title">📊 Daily Pulse</span>
    <span class="pulse-ts" id="pulse-ts"></span>
  </div>
  <div class="pulse-grid" id="pulse-grid"></div>
</div>


<div class="daily-insights-panel" id="daily-insights" style="display:none">
  <div class="daily-insights-inner">
    <div class="daily-insights-header">
      <span class="daily-insights-title">✨ Rec Daily Insights</span>
      <span class="daily-insights-ts" id="daily-insights-ts"></span>
    </div>
    <ul class="daily-insights-list" id="daily-insights-list"></ul>
  </div>
</div>

<main class="main">
  <div class="section-label">Reports</div>
  <div class="cards" id="cards">
    <div class="empty">No reports configured.</div>
  </div>

</main>

<footer id="footer">rec.us</footer>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<script>
  var cfg = window.ORG_CONFIG || {};
  var slug = cfg.slug || '';
  var tokenQS = cfg.token ? '?token=' + encodeURIComponent(cfg.token) : '';

  var REPORT_META = {
    facility:  { label: 'Facility Rental Schedule', icon: '📅',  desc: 'Reservations grouped by date and location' },
    gl:        { label: 'GL Code Rollup',           icon: '📊',  desc: 'Payment and refund summary by GL code' },
    programs:  { label: 'Programs',          icon: '🎯',  desc: 'Enrollment, revenue, and participant demographics', ai: true },
    historic:  { label: 'Historic Buildings',       icon: '🏛️',  desc: 'Reservations for historic building sites' },
    roster:    { label: 'Class Roster',             icon: '📋',  desc: 'Enrolled and cancelled participants by section' },
    overview:  { label: 'Facility Overview',        icon: '📈',  desc: 'Revenue and activity summary by location' },
    products:  { label: 'Product Sales',            icon: '🛒',  desc: 'Daily revenue, refunds, and net by product' },
    memberships: { label: 'Memberships',            icon: '🎫',  desc: 'Active and lapsed memberships with renewal tracking' },
    'court-utilization': { label: 'Court Utilization', icon: '🎾', desc: 'Court utilization and reserved hours by court', ai: true },
    calendar:  { label: 'Program Calendar',                 icon: '🗓️',  desc: 'Public class & rental schedule' },
    fasttrack: { label: 'Fast Track',               icon: '⚡',  desc: 'Pre-registration demand signal with conversion tracking', ai: true },
    users:     { label: 'Community Intel',            icon: '👥',  desc: 'Demographics, revenue, and strategy intelligence across your community', ai: true },
    'instructor-payout': { label: 'Instructor Payout', icon: '💰', desc: 'Revenue splits and payout calculations by instructor' },
    'rentalcalendar':    { label: 'Rental Calendar', icon: '🏟️', desc: 'Real-time facility availability with live booking data' },
    'campmap':           { label: 'Campsite Map', icon: '🏕️', desc: 'Interactive campground map with per-night availability overlay' },
    'ice-calendar':      { label: 'Ice Participant Calendar', icon: '❄️', desc: 'Participant-filtered monthly ice program calendar' },
    qoq:                 { label: 'QoQ Revenue Comparison', icon: '📉', desc: 'Quarter-over-quarter GL revenue comparison with delta analysis' },
  };

  /* ── Pin storage ── */
  /* Report groups (themed sections) */
  var CATEGORIES = [
    { label: 'Programs & Enrollment',    icon: '\u{1F3AF}', keys: ['programs','roster','calendar','fasttrack','ice-calendar'] },
    { label: 'Facilities & Rentals',     icon: '\u{1F4C5}', keys: ['facility','rentalcalendar','campmap','overview','historic','court-utilization'] },
    { label: 'Revenue & Finance',        icon: '\u{1F4B0}', keys: ['gl','products','memberships','qoq','instructor-payout'] },
    { label: 'Community & Intelligence', icon: '\u{1F465}', keys: ['users'] },
  ];

  var LS_KEY = 'rec_pinned_' + slug;

  function getPins() {
    try { return JSON.parse(localStorage.getItem(LS_KEY)) || []; }
    catch(e) { return []; }
  }
  function savePins(arr) {
    localStorage.setItem(LS_KEY, JSON.stringify(arr));
  }
  function togglePin(reportType) {
    var pins = getPins();
    var idx = pins.indexOf(reportType);
    if (idx > -1) pins.splice(idx, 1);
    else pins.push(reportType);
    savePins(pins);
    render();
  }

  /* ── Page title ── */
  if (cfg.displayName) {
    document.title = cfg.displayName + ' — Reports';
  }

  /* ── Top bar ── */
  document.getElementById('topbar').innerHTML = [
    cfg.logoUrl
      ? '<img src="' + cfg.logoUrl + '" alt="" class="topbar-logo" onerror="this.style.display=\'none\'" />'
      : '',
    '<div class="topbar-text">',
      '<div class="topbar-name">' + (cfg.displayName || 'Reports') + '</div>',
      '<div class="topbar-sub">rec.us Reports</div>',
    '</div>',
  ].join('');

  /* ── Public mode: strip admin chrome, show reports only ── */
  if (cfg.publicMode) {
    document.getElementById('pulse-panel').remove();
    document.getElementById('metrics-bar').remove();
    var sub = document.querySelector('.topbar-sub');
    if (sub) sub.textContent = 'Reports';
  }

  /* ── Metrics bar — admin-only, hidden on org landing page ── */
  /* Views/Exports/AI Insights are surfaced on the admin dashboard instead */

  /* ── Sparkline SVG generator ── */
  function sparkSVG(trail) {
    if (!trail || trail.length < 2) return '';
    var w = 56, h = 20, pad = 2;
    var max = -Infinity, min = Infinity;
    for (var i = 0; i < trail.length; i++) {
      if (trail[i] > max) max = trail[i];
      if (trail[i] < min) min = trail[i];
    }
    var range = max - min || 1;
    var pts = [];
    for (var i = 0; i < trail.length; i++) {
      var x = (i / (trail.length - 1)) * w;
      var y = (h - pad) - ((trail[i] - min) / range) * (h - pad * 2);
      pts.push(x.toFixed(1) + ',' + y.toFixed(1));
    }
    var last = trail[trail.length - 1], first = trail[0];
    var color = last > first * 1.03 ? '#4ade80' : last < first * 0.97 ? '#f87171' : '#a5b4fc';
    var lastPt = pts[pts.length - 1].split(',');
    return '<svg width="' + w + '" height="' + h + '" viewBox="0 0 ' + w + ' ' + h + '" style="display:block;margin:4px auto 0;opacity:0.85">'
      + '<polyline points="' + pts.join(' ') + '" fill="none" stroke="' + color + '" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>'
      + '<circle cx="' + lastPt[0] + '" cy="' + lastPt[1] + '" r="1.5" fill="' + color + '"/>'
      + '</svg>';
  }

  /* ── Executive Pulse (enhanced with goal rings for Watertown) ── */
  (function() {
    if (cfg.publicMode) return;
    var p = cfg.pulse;
    if (!p || !p.items || p.items.length === 0) return;
    var goals = cfg.goals || {};
    var isWatertown = slug === 'watertown';
    var priority = ['revenue', 'refunds', 'enrollments', 'products', 'households', 'bookings'];
    var sorted = p.items.slice().sort(function(a, b) {
      var ai = priority.indexOf(a.key); var bi = priority.indexOf(b.key);
      return (ai === -1 ? 99 : ai) - (bi === -1 ? 99 : bi);
    });
    var items = sorted.slice(0, 4);
    var panel = document.getElementById('pulse-panel');
    var grid = document.getElementById('pulse-grid');
    var ts = document.getElementById('pulse-ts');
    panel.style.display = 'block';
    if (p.generated) {
      var d = new Date(p.generated);
      ts.textContent = 'Updated ' + d.toLocaleTimeString([], {hour:'numeric',minute:'2-digit'});
    }

    function parseVal(s) {
      if (!s) return 0;
      var str = String(s).replace(/[$,%]/g, '').replace(/,/g, '');
      var hasK = /k$/i.test(str);
      var num = parseFloat(str) || 0;
      return hasK ? num * 1000 : num;
    }

    grid.innerHTML = items.map(function(it, idx) {
      var deltaHtml = '';
      if (it.delta) {
        var color = it.direction === 'up' ? '#4ade80' : it.direction === 'down' ? '#f87171' : '#a5b4fc';
        var arrow = it.direction === 'up' ? '↑' : it.direction === 'down' ? '↓' : '';
        deltaHtml = '<div style="font-size:11px;color:' + color + ';margin-top:3px;font-weight:600">' + arrow + ' ' + it.delta + ' vs prior pace</div>';
      }
      var sparkHtml = sparkSVG(it.trail);
      var goalHtml = '';
      var goal = goals[it.key];
      if (isWatertown && goal && goal.target > 0) {
        var actual = parseVal(it.value);
        var pct = Math.min(Math.round((actual / goal.target) * 100), 100);
        var gColor = pct >= 80 ? '#4ade80' : pct >= 50 ? '#fbbf24' : '#f87171';
        var prefix = (it.key === 'revenue' || it.key === 'refunds' || it.key === 'productRev') ? '$' : '';
        goalHtml = '<div class="pulse-goal-wrap">'
          + '<canvas class="pulse-goal-ring" id="goal-ring-' + idx + '" width="36" height="36"></canvas>'
          + '<div class="pulse-goal-text"><span class="pulse-goal-pct" style="color:' + gColor + '">' + pct + '%</span> of ' + prefix + goal.target.toLocaleString() + ' goal</div>'
          + '</div>';
      }
      var editHtml = isWatertown ? '<button class="pulse-goal-toggle" data-key="' + it.key + '" title="Set goal">⚙</button>' : '';
      return '<div class="pulse-card" data-key="' + it.key + '">'
        + editHtml
        + '<div class="pulse-card-icon">' + (it.icon || '') + '</div>'
        + '<div class="pulse-card-val">' + it.value + '</div>'
        + '<div class="pulse-card-label">' + it.label + '</div>'
        + '<div class="pulse-card-sub">' + (it.sub || '') + '</div>'
        + deltaHtml
        + goalHtml
        + sparkHtml
      + '</div>';
    }).join('');

    /* Animated count-up on pulse values (Watertown) */
    if (isWatertown) {
      grid.querySelectorAll('.pulse-card-val').forEach(function(el) {
        var text = el.textContent;
        var num = parseVal(text);
        if (num === 0) return;
        var isMoney = text.indexOf('$') !== -1;
        var steps = 30; var step = 0;
        el.textContent = isMoney ? '$0' : '0';
        var iv = setInterval(function() {
          step++;
          var eased = 1 - Math.pow(1 - step / steps, 3);
          var cur = Math.round(num * eased);
          el.textContent = isMoney ? '$' + cur.toLocaleString() : cur.toLocaleString();
          if (step >= steps) { el.textContent = text; clearInterval(iv); }
        }, 25);
      });
    }

    /* Initialize Chart.js doughnut rings */
    if (isWatertown && typeof Chart !== 'undefined') {
      items.forEach(function(it, idx) {
        var goal = goals[it.key];
        if (!goal || goal.target <= 0) return;
        var canvas = document.getElementById('goal-ring-' + idx);
        if (!canvas) return;
        var actual = parseVal(it.value);
        var pct = Math.min((actual / goal.target) * 100, 100);
        var remaining = Math.max(100 - pct, 0);
        var gColor = pct >= 80 ? '#4ade80' : pct >= 50 ? '#fbbf24' : '#f87171';
        new Chart(canvas.getContext('2d'), {
          type: 'doughnut',
          data: { datasets: [{ data: [pct, remaining], backgroundColor: [gColor, 'rgba(255,255,255,0.08)'], borderWidth: 0, borderRadius: pct > 0 && pct < 100 ? 3 : 0 }] },
          options: { cutout: '72%', responsive: false, plugins: { legend: { display: false }, tooltip: { enabled: false } }, animation: { duration: 800, easing: 'easeOutQuart' } }
        });
      });
    }

    /* Goal edit handlers (Watertown) */
    if (isWatertown) {
      grid.querySelectorAll('.pulse-goal-toggle').forEach(function(btn) {
        btn.addEventListener('click', function() {
          var key = btn.getAttribute('data-key');
          var card = btn.closest('.pulse-card');
          var existing = card.querySelector('.goal-edit-row');
          if (existing) { existing.remove(); return; }
          var goal = goals[key] || {};
          var row = document.createElement('div');
          row.className = 'goal-edit-row';
          row.innerHTML = '<input type="number" placeholder="Target" value="' + (goal.target || '') + '" /><button>Save</button>';
          card.appendChild(row);
          var inp = row.querySelector('input');
          inp.focus();
          function save() {
            var val = parseFloat(inp.value) || 0;
            if (val > 0) goals[key] = { target: val }; else delete goals[key];
            var url = '/' + slug + '/api/goals';
            if (cfg.token) url += '?token=' + encodeURIComponent(cfg.token);
            fetch(url, { method: 'PUT', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(goals) })
              .then(function() { window.location.reload(); })
              .catch(function(e) { alert('Save failed: ' + e.message); });
          }
          row.querySelector('button').addEventListener('click', save);
          inp.addEventListener('keydown', function(e) { if (e.key === 'Enter') save(); });
        });
      });
    }
  })();

  /* ── Rec Daily Insights ── */
  (function() {
    if (cfg.publicMode) return;
    var p = cfg.pulse;
    if (!p || !p.narrative || p.narrative.length === 0) return;
    var panel = document.getElementById('daily-insights');
    var list = document.getElementById('daily-insights-list');
    var ts = document.getElementById('daily-insights-ts');
    panel.style.display = 'block';
    if (p.generated) {
      var d = new Date(p.generated);
      ts.textContent = d.toLocaleDateString('en-US', { weekday: 'long', month: 'short', day: 'numeric' });
    }
    list.innerHTML = p.narrative.map(function(insight) {
      return '<li>' + insight + '</li>';
    }).join('');
  })();

  /* Render cards */
  function groupHTML(icon, label, cardHtmlArr) {
    return '<section class="report-group">'
      + '<div class="report-group-head"><span class="rg-icon">' + icon + '</span>' + label + '</div>'
      + '<div class="report-grid">' + cardHtmlArr.join('') + '</div>'
    + '</section>';
  }

  function render() {
    var reports = cfg.reports || [];
    if (reports.length === 0) return;

    var pins = getPins();
    var pinned = pins.filter(function(r) { return reports.indexOf(r) > -1; });
    var used = {};
    pinned.forEach(function(r) { used[r] = true; });

    var html = '';

    // Pinned reports float to the top (preserve pin order)
    if (pinned.length > 0) {
      html += groupHTML('\u{1F4CC}', 'Pinned', pinned.map(function(r) { return cardHTML(r, true); }));
    }

    // Themed category sections
    CATEGORIES.forEach(function(cat) {
      var cards = [];
      cat.keys.forEach(function(r) {
        if (reports.indexOf(r) > -1 && !used[r]) { used[r] = true; cards.push(cardHTML(r, false)); }
      });
      if (cards.length) html += groupHTML(cat.icon, cat.label, cards);
    });

    // Any reports not covered by a category
    var leftover = reports.filter(function(r) { return !used[r]; });
    if (leftover.length > 0) {
      html += groupHTML('\u{1F4C4}', 'More reports', leftover.map(function(r) { return cardHTML(r, false); }));
    }

    // Rec AI & Tools section (subject to per-org gating)
    var tools = [];
    if (cfg.chatVisible !== false) tools.push(chatCardHTML());
    if (cfg.wizardVisible !== false) tools.push(wizardCardHTML());
    if (cfg.emailEnabled) tools.push(emailCardHTML());
    if (tools.length > 0) html += groupHTML('✦', 'Rec AI & Tools', tools);

    document.getElementById('cards').innerHTML = html;

    document.querySelectorAll('.pin-btn').forEach(function(btn) {
      btn.addEventListener('click', function(e) {
        e.preventDefault();
        e.stopPropagation();
        togglePin(btn.getAttribute('data-report'));
      });
    });
  }

  function chatCardHTML() {
    return '<a href="/' + slug + '/chat' + tokenQS + '" class="card" style="border:1.5px solid #e0e7ff;background:linear-gradient(135deg,#f5f3ff 0%,#eef2ff 100%)">'
      + '<div class="card-icon">✦</div>'
      + '<div class="card-body">'
        + '<div class="card-label" style="color:#312e81">Rec AI Chat</div>'
        + '<div class="card-desc">Ask anything about your data across all reports</div>'
        + '<span class="ai-pill">✦ AI powered</span>'
      + '</div>'
      + '<div class="card-right"><div class="card-arrow">→</div></div>'
    + '</a>';
  }

  function wizardCardHTML() {
    return '<a href="/' + slug + '/report-wizard' + tokenQS + '" class="card" style="border:1.5px solid #e9d5ff;background:linear-gradient(135deg,#faf5ff 0%,#f3e8ff 100%)">'
      + '<div class="card-icon">\u{1FA84}</div>'
      + '<div class="card-body">'
        + '<div class="card-label" style="color:#581c87">Report Wizard</div>'
        + '<div class="card-desc">Build custom dashboards from plain English prompts</div>'
        + '<span class="ai-pill">✦ AI powered</span>'
      + '</div>'
      + '<div class="card-right"><div class="card-arrow">→</div></div>'
    + '</a>';
  }

  function emailCardHTML() {
    return '<a href="/' + slug + '/admin' + tokenQS + '" class="card" style="border:1.5px solid #bbf7d0;background:linear-gradient(135deg,#f0fdf4 0%,#dcfce7 100%)">'
      + '<div class="card-icon">\u{1F4E7}</div>'
      + '<div class="card-body">'
        + '<div class="card-label" style="color:#166534">Email Subscriptions</div>'
        + '<div class="card-desc">Manage scheduled report emails for your team</div>'
      + '</div>'
      + '<div class="card-right"><div class="card-arrow">→</div></div>'
    + '</a>';
  }

  function healthBadge(r) {
    return ''; // health badges shown only on admin portal
  }

  function cardHTML(r, isPinned) {
    var m = REPORT_META[r] || { label: r, icon: '📄', desc: '' };
    return '<a href="/' + slug + '/' + r + tokenQS + '" class="card' + (isPinned ? ' pinned' : '') + '">'
      + '<div class="card-icon">' + m.icon + '</div>'
      + '<div class="card-body">'
        + '<div class="card-label">' + m.label + '</div>'
        + '<div class="card-desc">' + m.desc + '</div>'
        + (m.ai ? '<span class="ai-pill">✦ AI enhanced</span>' : '')
        + healthBadge(r)
      + '</div>'
      + '<div class="card-right">'
        + '<button class="pin-btn" data-report="' + r + '" title="' + (isPinned ? 'Unpin' : 'Pin to top') + '">'
          + (isPinned ? '📌' : '📌')
        + '</button>'
        + '<div class="card-arrow">→</div>'
      + '</div>'
    + '</a>';
  }

  render();

  /* ── Footer ── */
  document.getElementById('footer').textContent = 'rec.us · ' + slug;
</script>
<script src="/feedback-widget.js" defer></script>
</body>
</html>
