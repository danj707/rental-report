<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Facilities — Camping / Golf / Aquatics (mockup)</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css" />
  <style>
    /* ── Design system copied verbatim from public/facilities.html so the mockup
         renders native to the Facilities hub. ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Inter', system-ui, -apple-system, sans-serif; font-size: 12px; color: #1a1a1a; background: #f5f4f1; line-height: 1.35; }

    /* ── Toolbar ── */
    .toolbar { position: sticky; top: 0; z-index: 100; display: flex; align-items: center; gap: 10px; padding: 8px 20px; background: #2c2c2c; color: #eee; font-size: 13px; flex-wrap: wrap; }
    .toolbar-title { font-weight: 600; margin-right: 4px; }
    .toolbar-back { color: #9ca3af; text-decoration: none; font-size: 12px; }
    .toolbar-back:hover { color: #fff; }
    .toolbar-spacer { flex: 1; }
    .toolbar label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.5px; color: #aaa; display: flex; flex-direction: column; gap: 2px; }
    .toolbar input[type="date"] { padding: 4px 8px; border: 1px solid rgba(255,255,255,.2); border-radius: 4px; background: rgba(255,255,255,.1); color: #fff; font-size: 12px; font-family: inherit; outline: none; }
    .toolbar input[type="date"]::-webkit-calendar-picker-indicator { filter: invert(1); cursor: pointer; }
    .toolbar button { padding: 6px 14px; border: 1px solid rgba(255,255,255,.25); border-radius: 4px; background: rgba(255,255,255,.08); color: #fff; font-size: 12px; font-family: inherit; cursor: pointer; transition: background .15s; white-space: nowrap; }
    .toolbar button:hover { background: rgba(255,255,255,.18); }
    .toolbar .btn-run { background: #16a34a; border-color: #16a34a; font-weight: 600; }
    .toolbar .btn-run:hover { background: #15803d; }
    .toolbar .btn-pdf { background: #3b82f6; border-color: #3b82f6; font-weight: 600; }
    .toolbar .btn-excel { background: #16803c; border-color: #16803c; font-weight: 600; }
    .toolbar .row-count { font-size: 11px; color: #aaa; }
    .toolbar .divider { width: 1px; height: 28px; background: rgba(255,255,255,.15); margin: 0 2px; }

    /* ── Page ── */
    .page { max-width: 1400px; margin: 16px auto; padding: 24px 28px; background: #fff; box-shadow: 0 1px 4px rgba(0,0,0,.08); }

    /* ── Header ── */
    .report-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2.5px solid #111; padding-bottom: 10px; margin-bottom: 18px; gap: 16px; }
    .report-header-left { display: flex; align-items: center; gap: 14px; }
    .report-header .org-label { font-size: 10px; letter-spacing: 1.6px; text-transform: uppercase; color: #777; font-weight: 600; }
    .report-header .title { font-size: 17px; font-weight: 700; margin-top: 1px; }
    .report-header-right { text-align: right; }
    .report-header .date-range { font-size: 11px; color: #666; }

    /* ── Sample-data ribbon (mockup only) ── */
    .sample-ribbon { background: #fffbeb; border: 1px solid #fde68a; border-left: 3px solid #f59e0b; color: #92400e; padding: 9px 14px; margin-bottom: 14px; border-radius: 4px; font-size: 12.5px; line-height: 1.5; }
    .sample-ribbon strong { color: #78350f; }
    .src-badge { display: inline-block; font-size: 9px; font-weight: 700; letter-spacing: .4px; text-transform: uppercase; padding: 2px 7px; border-radius: 3px; margin-left: 8px; vertical-align: middle; }
    .src-real { background: #dcfce7; color: #166534; }
    .src-rep  { background: #fef3c7; color: #92400e; }

    /* ── Tabs ── */
    .tabs { display:flex; gap:4px; border-bottom:2px solid #d1d5db; margin-bottom:16px; padding:0 4px; align-items:flex-end; flex-wrap: wrap; }
    .tab { padding:9px 18px 8px; font-size:13px; font-weight:600; color:#6b7280; cursor:pointer; transition:all .15s; display:flex; align-items:center; gap:6px; border-radius:8px 8px 0 0; border:1px solid transparent; border-bottom:none; margin-bottom:-2px; position:relative; background:transparent; }
    .tab:hover { color:#111; background:#f3f4f6; }
    .tab.active { color:#059669; background:#f0fdf4; border-color:#d1d5db; border-top:2px solid #059669; box-shadow:0 -2px 4px rgba(0,0,0,.04); z-index:1; }
    .tab .tab-badge { font-size:10px; padding:2px 7px; border-radius:10px; font-weight:600; background:#e5e7eb; color:#6b7280; }

    /* ── KPI cards ── */
    .sum-cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 10px; margin: 16px 0; }
    .sum-card { background: #fff; border: 1px solid #e8e6e0; border-radius: 8px; padding: 14px 16px; }
    .sum-card .sc-label { font-size: 10px; text-transform: uppercase; letter-spacing: .5px; color: #888; font-weight: 700; margin-bottom: 4px; }
    .sum-card .sc-val { font-size: 24px; font-weight: 800; line-height: 1.1; font-variant-numeric: tabular-nums; }
    .sum-card .sc-sub { font-size: 11px; color: #999; margin-top: 3px; }
    .sc-green { color: #16a34a; } .sc-blue { color: #2563eb; } .sc-amber { color: #d97706; } .sc-red { color: #dc2626; } .sc-purple { color: #7c3aed; } .sc-muted { color: #64748b; }

    /* ── Stacked mix bar ── */
    .sum-bar-wrap { margin: 16px 0; }
    .sum-bar-label { font-size: 10px; color: #888; font-weight: 600; text-transform: uppercase; letter-spacing: .5px; margin-bottom: 4px; }
    .sum-bar { display: flex; height: 24px; border-radius: 4px; overflow: hidden; border: 1px solid #e8e6e0; background: #f3f4f6; }
    .sum-bar .seg { display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 700; color: #fff; overflow: hidden; white-space: nowrap; }
    .sum-legend { display: flex; gap: 14px; margin-top: 5px; font-size: 10px; color: #888; flex-wrap: wrap; }
    .sum-legend span { display: flex; align-items: center; gap: 4px; }
    .sum-dot { width: 7px; height: 7px; border-radius: 50%; display: inline-block; }

    /* ── Table ── */
    .sum-cat-table { width: 100%; border-collapse: collapse; font-size: 12px; margin-top: 16px; }
    .sum-cat-table caption { text-align: left; font-size: 12px; font-weight: 700; color: #333; margin-bottom: 8px; }
    .sum-cat-table th { background: #f5f3ef; padding: 7px 12px; text-align: left; font-size: 10px; text-transform: uppercase; letter-spacing: .5px; color: #888; font-weight: 700; border-bottom: 1px solid #e8e6e0; }
    .sum-cat-table th.num, .sum-cat-table td.num { text-align: right; font-variant-numeric: tabular-nums; }
    .sum-cat-table td { padding: 6px 12px; border-bottom: 1px solid #f0eeea; color: #555; }
    .sum-cat-table tr:last-child td { border-bottom: none; }

    .section-note { font-size: 11px; color: #9ca3af; margin-top: 18px; text-align: center; }

    /* ── Section headings + layout (mockup) ── */
    .vsec { margin: 24px 0 6px; }
    .vsec-t { font-size: 13px; font-weight: 700; color: #1e1b4b; display: flex; align-items: center; gap: 8px; margin-bottom: 2px; }
    .vsec-s { font-size: 11px; color: #9ca3af; margin-bottom: 10px; }
    .two-col { display: grid; grid-template-columns: 1.05fr .95fr; gap: 22px; align-items: start; }
    @media (max-width: 900px) { .two-col { grid-template-columns: 1fr; } }

    /* ── Seasonal / monthly trend ── */
    .vtrend { display: flex; flex-direction: column; gap: 4px; margin-top: 8px; }
    .vtrend-row { display: grid; grid-template-columns: 56px 1fr 70px 88px; align-items: center; gap: 10px; font-size: 12px; }
    .vtrend-mo { color: #6b7280; font-weight: 600; font-variant-numeric: tabular-nums; }
    .vtrend-track { background: #f1efe9; border-radius: 4px; height: 16px; overflow: hidden; }
    .vtrend-bar { height: 100%; background: linear-gradient(90deg,#0d9488,#14b8a6); border-radius: 4px; min-width: 2px; }
    .vtrend-rev { text-align: right; font-weight: 700; color: #111827; font-variant-numeric: tabular-nums; }
    .vtrend-bk { text-align: right; color: #9ca3af; font-variant-numeric: tabular-nums; }

    /* ── Court-native widgets (bars / heatmap / map / insights), scoped ── */
    .court-native .kpi-card { flex: 1; min-width: 140px; background: #fff; border: 1px solid #e5e7eb; border-radius: 8px; padding: 12px 16px; }
    .court-native .cu-tabs { display: flex; gap: 0; margin: 8px 0 0; border-bottom: 2px solid #e5e7eb; flex-wrap: wrap; }
    .court-native .cu-tab { padding: 8px 20px; font-size: 13px; font-weight: 600; color: #6b7280; cursor: pointer; border: none; border-bottom: 2px solid transparent; margin-bottom: -2px; background: none; font-family: inherit; }
    .court-native .cu-tab:hover { color: #374151; }
    .court-native .cu-tab.active { color: #0d9488; border-bottom-color: #0d9488; }
    .court-native .cu-bars { display: flex; flex-direction: column; gap: 6px; margin-top: 10px; }
    .court-native .cu-bar-row { display: grid; grid-template-columns: minmax(150px, 250px) 1fr 84px; align-items: center; gap: 10px; font-size: 12px; }
    .court-native .cu-bar-name { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: #374151; }
    .court-native .cu-bar-track { position: relative; background: #f1efe9; border-radius: 4px; height: 18px; overflow: hidden; display: flex; }
    .court-native .cu-bar-seg { height: 100%; }
    .court-native .cu-bar-val { text-align: right; font-weight: 700; font-variant-numeric: tabular-nums; color: #111827; }
    .court-native .cu-bar-sub { text-align: right; font-size: 10px; color: #9ca3af; font-variant-numeric: tabular-nums; }
    .court-native .cu-legend { display: flex; gap: 14px; justify-content: center; margin: 10px 0 2px; font-size: 11px; color: #666; flex-wrap: wrap; }
    .court-native .cu-legend .sw { display: inline-block; width: 10px; height: 10px; border-radius: 2px; margin-right: 4px; vertical-align: -1px; }
    .court-native .cu-map-wrap { height: 460px; border-radius: 8px; overflow: hidden; border: 1px solid #e5e7eb; margin-top: 12px; }
    .court-native .cu-map-legend { display: flex; gap: 16px; align-items: center; padding: 10px 0; font-size: 11px; color: #666; flex-wrap: wrap; }
    .court-native .cu-map-dot { width: 12px; height: 12px; border-radius: 50%; display: inline-block; margin-right: 4px; vertical-align: -1px; }

    .court-native .heatmap-grid { display: grid; grid-template-columns: minmax(120px, 1fr) repeat(7, 1fr); gap: 2px; font-size: 11px; }
    .court-native .heatmap-hdr { text-align: center; font-weight: 700; font-size: 10px; text-transform: uppercase; letter-spacing: .5px; color: #888; padding: 4px 2px; }
    .court-native .heatmap-label { padding: 5px 8px; font-size: 11px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; display: flex; align-items: center; gap: 4px; border-radius: 3px; background: #f8f8f6; }
    .court-native .heatmap-cell { text-align: center; padding: 6px 2px; border-radius: 3px; font-family: 'IBM Plex Mono', monospace; font-size: 10px; font-weight: 600; }
    .court-native .heatmap-legend { display: flex; align-items: center; gap: 12px; margin-top: 8px; font-size: 10px; color: #888; flex-wrap: wrap; }
    .court-native .heatmap-legend-swatch { display: inline-block; width: 14px; height: 14px; border-radius: 3px; vertical-align: middle; margin-right: 3px; }

    .court-native .insights-section { margin: 20px 0 8px; }
    .court-native .insights-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(230px, 1fr)); gap: 12px; }
    .court-native .insight-card { border: 1px solid #e5e7eb; border-left-width: 4px; border-radius: 8px; padding: 14px 16px; background: #fff; }
    .court-native .insight-type { font-size: 10px; font-weight: 700; letter-spacing: .6px; text-transform: uppercase; margin-bottom: 6px; }
    .court-native .insight-title { font-size: 14px; font-weight: 700; color: #111827; margin-bottom: 5px; line-height: 1.3; }
    .court-native .insight-detail { font-size: 12.5px; color: #374151; line-height: 1.45; }
    .court-native .insight-action { font-size: 12px; color: #6b7280; margin-top: 8px; font-weight: 500; }
    .court-native .insight-opportunity { border-left-color: #10b981; } .court-native .insight-opportunity .insight-type { color: #059669; }
    .court-native .insight-risk { border-left-color: #f59e0b; } .court-native .insight-risk .insight-type { color: #d97706; }
    .court-native .insight-signal { border-left-color: #6366f1; } .court-native .insight-signal .insight-type { color: #4f46e5; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
  <script type="text/babel">
    /* =====================================================================
       Facilities hub — Camping / Golf / Aquatics vertical views  (MOCKUP)

       Standalone demo of how the three verticals could look "fully built
       out," at the same quality bar as the hub's Court Utilization view.
       ALL DATA IS BAKED (no live DB calls):
         • Camping   — grounded in the REAL Pleasant Hill (12 sites) +
                       Topaz Lake (41 sites) inventory from campmap-seeds.json,
                       with deterministically-synthesized booking activity.
         • Golf      — representative municipal course.
         • Aquatics  — representative community aquatics center.
       Numbers are generated with a fixed seed, so they are stable & realistic.
       This file is NOT wired into server.js. Components are written so they
       can later be ported into facilities.html (as court-utilization.html was).
       ===================================================================== */
    const e = React.createElement;

    // ── helpers ──────────────────────────────────────────────────────────
    const clamp = (n, lo, hi) => Math.max(lo, Math.min(hi, n));
    const money = n => '$' + Math.round(n || 0).toLocaleString();
    const money1k = n => n >= 1000 ? '$' + (n / 1000).toFixed(n >= 10000 ? 0 : 1) + 'k' : money(n);
    const pct = n => Math.round(n) + '%';
    const num = n => Math.round(n).toLocaleString();
    // Deterministic PRNG (mulberry32) — stable output, no Date/Math.random.
    function mul(a) { return function () { a |= 0; a = a + 0x6D2B79F5 | 0; let t = Math.imul(a ^ a >>> 15, 1 | a); t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t; return ((t ^ t >>> 14) >>> 0) / 4294967296; }; }

    // Utilization/occupancy "heat" scale — same convention as Court Utilization
    // (hot = busy). Used for per-unit bars.
    const CU_UTIL_COLOR = p => p >= 70 ? '#dc2626' : p >= 50 ? '#ea580c' : p >= 30 ? '#f59e0b' : p >= 15 ? '#16a34a' : '#94a3b8';
    const CU_MAP_COLOR  = p => p >= 70 ? '#dc2626' : p >= 40 ? '#f59e0b' : p >= 15 ? '#22c55e' : '#94a3b8';
    // Pick the ramp stop for value v (ramp sorted high→low by .min).
    const rampPick = (v, ramp) => { for (const s of ramp) if (v >= s.min) return s; return ramp[ramp.length - 1]; };

    // ── Per-vertical themes — each section "feels" like its site type ──────
    // Camping = warm/woodsy (its heatmap ember scale is kept verbatim — Dan's
    // favorite); Golf = fairway greens; Aquatics = water blues.
    const THEMES = {
      camping: {
        accent: '#3f6212', accentSoft: '#65a30d', heatLabel: 'occupancy',
        curve: 'linear-gradient(90deg,#4d7c0f,#84cc16)', wash: '#fcfdf4',
        emoji: '🏕️', title: 'Camping', sub: '2 lakeside campgrounds · 53 sites · Pleasant Hill + Topaz Lake',
        band: { bg: 'linear-gradient(135deg,#f7fee7,#ecfccb)', border: '#bef264', color: '#3f6212' },
        heat: [ { min: 80, bg: '#991b1b', fg: '#fff' }, { min: 65, bg: '#dc2626', fg: '#fff' }, { min: 50, bg: '#ea580c', fg: '#fff' }, { min: 35, bg: '#f59e0b', fg: '#3a2606' }, { min: 20, bg: '#fcd34d', fg: '#3a2606' }, { min: 8, bg: '#d1fae5', fg: '#065f46' }, { min: 0, bg: '#f3f4f6', fg: '#c0c0c0' } ],
        bar: [ { min: 70, color: '#dc2626' }, { min: 50, color: '#ea580c' }, { min: 30, color: '#f59e0b' }, { min: 15, color: '#16a34a' }, { min: 0, color: '#94a3b8' } ],
      },
      golf: {
        accent: '#15803d', accentSoft: '#16a34a', heatLabel: 'utilization',
        curve: 'linear-gradient(90deg,#15803d,#4ade80)', wash: '#f7fdf8',
        emoji: '⛳', title: 'Golf', sub: '18-hole course · driving range · practice green',
        band: { bg: 'linear-gradient(135deg,#f0fdf4,#dcfce7)', border: '#86efac', color: '#15803d' },
        heat: [ { min: 80, bg: '#14532d', fg: '#fff' }, { min: 65, bg: '#166534', fg: '#fff' }, { min: 50, bg: '#15803d', fg: '#fff' }, { min: 35, bg: '#22c55e', fg: '#052e16' }, { min: 20, bg: '#4ade80', fg: '#052e16' }, { min: 8, bg: '#dcfce7', fg: '#166534' }, { min: 0, bg: '#f5f3ec', fg: '#c0c0c0' } ],
        bar: [ { min: 70, color: '#166534' }, { min: 50, color: '#15803d' }, { min: 30, color: '#22c55e' }, { min: 15, color: '#4ade80' }, { min: 0, color: '#c7b899' } ],
      },
      aquatics: {
        accent: '#0369a1', accentSoft: '#0891b2', heatLabel: 'utilization',
        curve: 'linear-gradient(90deg,#0369a1,#38bdf8)', wash: '#f6fcff',
        emoji: '🏊', title: 'Pool / Aquatics', sub: 'Indoor center · 4 pools · 8 lap lanes',
        band: { bg: 'linear-gradient(135deg,#ecfeff,#e0f2fe)', border: '#7dd3fc', color: '#0369a1' },
        heat: [ { min: 80, bg: '#0c4a6e', fg: '#fff' }, { min: 65, bg: '#0369a1', fg: '#fff' }, { min: 50, bg: '#0284c7', fg: '#fff' }, { min: 35, bg: '#38bdf8', fg: '#08303f' }, { min: 20, bg: '#7dd3fc', fg: '#0c4a6e' }, { min: 8, bg: '#e0f2fe', fg: '#0369a1' }, { min: 0, bg: '#f3f4f6', fg: '#c0c0c0' } ],
        bar: [ { min: 70, color: '#0369a1' }, { min: 50, color: '#0284c7' }, { min: 30, color: '#38bdf8' }, { min: 15, color: '#7dd3fc' }, { min: 0, color: '#cbd5e1' } ],
      },
    };
    // Bar-legend labels shared by every ramp (thresholds 15/30/50/70).
    const BAR_LEGEND = t => [
      { color: rampPick(0, t.bar).color, l: '<15%' }, { color: rampPick(15, t.bar).color, l: '15–30%' },
      { color: rampPick(30, t.bar).color, l: '30–50%' }, { color: rampPick(50, t.bar).color, l: '50–70%' },
      { color: rampPick(70, t.bar).color, l: '70%+' },
    ];
    const DOW = ['Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat', 'Sun'];
    // Trailing 12 months ending Jul 2026 (fixed — matches the demo date range).
    const MONTHS = [
      { l: 'Aug', days: 31 }, { l: 'Sep', days: 30 }, { l: 'Oct', days: 31 }, { l: 'Nov', days: 30 },
      { l: 'Dec', days: 31 }, { l: 'Jan', days: 31 }, { l: 'Feb', days: 28 }, { l: 'Mar', days: 31 },
      { l: 'Apr', days: 30 }, { l: 'May', days: 31 }, { l: 'Jun', days: 30 }, { l: 'Jul', days: 31 },
    ];

    // ── shared widgets ─────────────────────────────────────────────────────
    function Kpis({ cards, accent }) {
      return e('div', { className: 'sum-cards' },
        cards.map((c, i) => e('div', { className: 'sum-card', key: i, style: accent ? { borderLeft: '3px solid ' + accent } : null },
          e('div', { className: 'sc-label' }, c.label),
          e('div', { className: 'sc-val ' + (c.cls || 'sc-muted') }, c.val),
          e('div', { className: 'sc-sub' }, c.sub))));
    }

    function SectionTitle({ title, sub, color }) {
      return e('div', { className: 'vsec' },
        e('div', { className: 'vsec-t', style: color ? { color } : null }, title),
        sub ? e('div', { className: 'vsec-s' }, sub) : null);
    }

    function UtilBars({ rows, theme }) {
      const t = theme || THEMES.camping;
      return e('div', { className: 'court-native' },
        e('div', { className: 'cu-bars' },
          rows.map((r, i) => e('div', { className: 'cu-bar-row', key: i },
            e('div', { className: 'cu-bar-name' }, r.name),
            e('div', { className: 'cu-bar-track' },
              e('div', { className: 'cu-bar-seg', style: { width: clamp(r.pct, 0, 100) + '%', background: rampPick(r.pct, t.bar).color } })),
            e('div', null,
              e('div', { className: 'cu-bar-val' }, r.val),
              r.sub ? e('div', { className: 'cu-bar-sub' }, r.sub) : null)))),
        e('div', { className: 'cu-legend' },
          BAR_LEGEND(t).map((s, i) => e('span', { key: i }, e('span', { className: 'sw', style: { background: s.color } }), s.l))));
    }

    // Heatmap: rowLabels × the 7 days of week. values = [row][col] (0–100).
    function Heatmap({ rowLabels, values, theme }) {
      const t = theme || THEMES.camping;
      const cells = [];
      cells.push(e('div', { className: 'heatmap-hdr', key: 'h-' }, ''));
      DOW.forEach(d => cells.push(e('div', { className: 'heatmap-hdr', key: 'h-' + d }, d)));
      rowLabels.forEach((rl, ri) => {
        cells.push(e('div', { className: 'heatmap-label', key: 'l-' + ri }, rl));
        values[ri].forEach((v, ci) => {
          const c = rampPick(v, t.heat);

    // Real Topaz sites 01–06 (true coords); 07–41 synthesized around the loop.

    function buildCamping() {

      for (let n = 1; n <= 41; n++) {
        let lat, lng;
        if (n <= 6) { lat = TZ_REAL[n - 1][0]; lng = TZ_REAL[n - 1][1]; }
        else { const idx = n - 7, row = Math.floor(idx / 7), col = idx % 7, rr = mul(500 + n); lat = 38.69505 - row * 0.00034 + (rr() - 0.5) * 0.00008; lng = -119.52075 + col * 0.00044 + (rr() - 0.5) * 0.00008; }
        sites.push({ loc: 'tz', name: 'Site ' + String(n).padStart(2, '0'), area: 'Topaz Lake', kind: 'tent-and-rv', lat, lng, rate: n <= 26 ? 30 : 40, resFee: 5 });
      }
      // Per-site occupancy / nights / revenue / cancellation.
      let totNights = 0, totRev = 0, totResFeeRev = 0, weightedCancel = 0, totReservations = 0;
      sites.forEach((s, i) => {
        const rng = mul(1000 + i);

        const occAnnual = clamp(seasonMean * dowMeanF * pop * 1.9, 0.10, 0.93);
        const nights = Math.round(occAnnual * 365);
        const cancel = 5 + 14 * rng();                        // 5–19%

        const reservations = Math.max(1, Math.round(nights / (2.4 + rng())));
        s.occ = occAnnual * 100; s.nights = nights; s.cancel = cancel; s.rev = rev; s.reservations = reservations;
        totNights += nights; totRev += rev; totResFeeRev += reservations * s.resFee; totReservations += reservations; weightedCancel += cancel * nights;
      });
      const nSites = sites.length;
      // Monthly aggregate (season curve).
      const months = MONTHS.map((m, mi) => {
        const occ = clamp(seasonMult[mi] * dowMeanF * 1.9 * 0.97, 0.05, 0.95);
        const nights = Math.round(occ * m.days * nSites);
        const rev = nights * 31.7 * 0.9;
        return { l: m.l, bar: occ * 100, right: pct(occ * 100), sub: num(nights) + ' nights' };
      });
      // Heatmap: month rows × DOW cols (occupancy %).
      const hm = MONTHS.map((m, mi) => DOW.map(d => clamp(seasonMult[mi] * dowFactor[d] * 100, 0, 98)));

        { name: '2 nights', pct: 100 * 0.35, val: '35%', sub: 'most common' },
        { name: '3 nights', pct: 100 * 0.24, val: '24%', sub: '' },
        { name: '4 nights', pct: 100 * 0.12, val: '12%', sub: '' },
        { name: '5+ nights', pct: 100 * 0.12, val: '12%', sub: '' },
      ];
      const avgLos = 1 * .17 + 2 * .35 + 3 * .24 + 4 * .12 + 5.4 * .12;
      const occOverall = totNights / (nSites * 365) * 100;
      const adr = totRev / totNights;
      const cancelRate = weightedCancel / totNights;
      return {
        sites, months, hm, los, avgLos,
        kpis: [
          { label: 'Occupancy', val: pct(occOverall), cls: 'sc-green', sub: 'site-nights booked ÷ available' },
          { label: 'Site-nights', val: num(totNights), cls: 'sc-blue', sub: nSites + ' sites · 2 locations' },
          { label: 'Net revenue', val: money(totRev), cls: 'sc-green', sub: 'excludes canceled' },
          { label: 'Avg nightly rate', val: money(adr), cls: 'sc-purple', sub: 'ADR across sites' },
          { label: 'Avg length of stay', val: avgLos.toFixed(1) + ' nts', cls: 'sc-amber', sub: num(totReservations) + ' reservations' },
          { label: 'Cancellation', val: pct(cancelRate), cls: 'sc-red', sub: 'of booked nights' },
          { label: 'Reservation fees', val: money(totResFeeRev), cls: 'sc-muted', sub: 'Topaz $5/reservation' },
          { label: 'Repeat guests', val: '34%', cls: 'sc-muted', sub: 'est. returning households' },
        ],

    }

          { label: 'Lane-hours booked', val: num(laneHours), cls: 'sc-blue', sub: '8 lap lanes · trailing 12 mo' },
          { label: 'Pool utilization', val: pct(util), cls: 'sc-green', sub: 'reserved ÷ available water time' },
          { label: 'Revenue', val: money(revenue), cls: 'sc-green', sub: 'lessons + passes + rentals' },
          { label: 'Lessons enrolled', val: '3,180', cls: 'sc-purple', sub: 'across 5 session terms' },
          { label: 'Avg swimmers / session', val: '19', cls: 'sc-amber', sub: 'open-swim blocks' },
          { label: 'Peak capacity', val: '96%', cls: 'sc-red', sub: 'Sat 10a–1p open swim' },
          { label: 'Cancellation', val: '9%', cls: 'sc-muted', sub: 'lessons + rentals' },
          { label: 'Programs mix', val: '4', cls: 'sc-muted', sub: 'lessons / lap / open / rental' },
        ],
      };
    }
    const AQUA = buildAqua();

    function AquaticsView() {
      const T = THEMES.aquatics;
      return e('div', { style: { background: T.wash, borderRadius: 12, padding: '2px 14px 16px' } },
        e(VHead, { theme: T, note: 'Sample data' }),
        e(Kpis, { cards: AQUA.kpis, accent: T.accentSoft }),
        e(SectionTitle, { title: '🏊 Water-time utilization by hour × day', sub: 'Early-morning lap swim and evening lessons drive twin daily peaks; weekend midday is open swim.', color: T.accent }),
        e(Heatmap, { rowLabels: AQUA.hours.map(AQUA.label), values: AQUA.hm, theme: T }),
        e('div', { className: 'two-col', style: { marginTop: 22 } },
          e('div', null,
            e(SectionTitle, { title: '🌊 Utilization by pool', sub: 'Each body of water at the center.', color: T.accent }),
            e(UtilBars, { rows: AQUA.pools, theme: T }),
            e(SectionTitle, { title: '🩱 Revenue by program', sub: 'Where aquatics revenue comes from.', color: T.accent }),
            e(MixBar, { label: 'Program revenue mix', segs: AQUA.mix })),
          e('div', null,
            e(SectionTitle, { title: '💧 Utilization by month', sub: 'Indoor center holds steadier than camping/golf, with a summer bump.', color: T.accent }),
            e(SeasonCurve, { items: AQUA.months, gradient: T.curve }))),
        e(SectionTitle, { title: '🛟 Insights', sub: 'Auto-generated from the pool schedule.', color: T.accent }),
        e(Insights, { items: [
          { type: 'opportunity', title: 'Late morning is the soft spot', detail: 'Lap Pool sits under 50% from 9am–2pm on weekdays — room for aqua-fit, senior swim, or school programs.', action: 'Add mid-morning aqua-fitness classes' },
          { type: 'risk', title: 'Saturday open swim at capacity', detail: 'Weekend 10a–1p hits 96% — safety/comfort risk and turned-away families.', action: 'Add a second lifeguarded block or timed sessions' },
          { type: 'signal', title: 'Lessons are the revenue engine', detail: 'Swim lessons are the largest single revenue line (42% of program revenue) and fill months ahead.', action: 'Expand lesson capacity in the evening peak' },
        ] }),
        e('div', { className: 'section-note' }, 'Pool / Aquatics · representative sample data for a community aquatics center.'));
    }

    /* ── Shell ──────────────────────────────────────────────────────────── */
    const TABS = [
      { key: 'camping', label: 'Camping', icon: '🏕️', src: 'real' },
      { key: 'golf', label: 'Golf', icon: '⛳', src: 'rep' },
      { key: 'aquatics', label: 'Pool / Aquatics', icon: '🏊', src: 'rep' },
    ];

    function Toolbar() {
      return e('div', { className: 'toolbar' },
        e('a', { className: 'toolbar-back', href: '#' }, '‹ Sample Parks & Rec'),
        e('span', { className: 'toolbar-title' }, 'Facilities'),
        e('span', { className: 'divider' }),
        e('label', null, 'Start', e('input', { type: 'date', defaultValue: '2025-08-01' })),
        e('label', null, 'End', e('input', { type: 'date', defaultValue: '2026-07-31' })),
        e('button', { className: 'btn-run' }, '▶ Run Report'),
        e('button', null, 'COLS'),
        e('span', { className: 'toolbar-spacer' }),
        e('span', { className: 'row-count' }, '106 sites · 3 verticals'),
        e('span', { className: 'divider' }),
        e('button', { className: 'btn-pdf' }, 'PDF'),
        e('button', { className: 'btn-excel' }, 'Excel'));
    }

    function App() {
      const [tab, setTab] = React.useState('camping');
      const active = TABS.find(t => t.key === tab);
      return e(React.Fragment, null,
        e(Toolbar, null),
        e('div', { className: 'page' },
          e('div', { className: 'report-header' },
            e('div', { className: 'report-header-left' },
              e('div', null,
                e('div', { className: 'org-label' }, 'Sample Parks & Recreation'),
                e('div', { className: 'title' }, 'Facilities'))),
            e('div', { className: 'report-header-right' },
              e('div', { className: 'date-range' }, 'August 1, 2025 – July 31, 2026'))),
          e('div', { className: 'sample-ribbon' },
            e('strong', null, 'Mockup — sample data. '),
            'Design study for fully built-out vertical views (quality bar = Court Utilization). ',
            e('strong', null, 'Camping'), ' is grounded in the real Pleasant Hill + Topaz Lake site inventory; ',
            e('strong', null, 'Golf'), ' and ', e('strong', null, 'Aquatics'), ' use representative data. Not wired to live reporting.'),
          e('div', { className: 'tabs' },
            TABS.map(t => e('div', {
              key: t.key, className: 'tab' + (t.key === tab ? ' active' : ''), onClick: () => setTab(t.key),
            }, e('span', null, t.icon), t.label,
               e('span', { className: 'src-badge ' + (t.src === 'real' ? 'src-real' : 'src-rep') }, t.src === 'real' ? 'real inventory' : 'sample')))),
          tab === 'camping' ? e(CampingView, null) : tab === 'golf' ? e(GolfView, null) : e(AquaticsView, null)));
    }

    ReactDOM.createRoot(document.getElementById('root')).render(e(App));
  </script>
</body>
</html>
