<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fast Track Report</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Inter', system-ui, -apple-system, sans-serif; font-size: 12px; color: #1a1a1a; background: #f5f4f1; line-height: 1.35; }

    /* ── Toolbar ── */
    .toolbar { position: sticky; top: 0; z-index: 100; display: flex; align-items: center; gap: 10px; padding: 8px 20px; background: #2c2c2c; color: #eee; font-size: 13px; flex-wrap: wrap; }
    .toolbar-title { font-weight: 600; margin-right: 4px; }
    .toolbar-spacer { flex: 1; }
    .toolbar label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.5px; color: #aaa; display: flex; flex-direction: column; gap: 2px; }
    .toolbar select { padding: 4px 8px; border: 1px solid rgba(255,255,255,.2); border-radius: 4px; background: rgba(255,255,255,.1); color: #fff; font-size: 12px; font-family: inherit; outline: none; max-width: 220px; }
    .toolbar select option { background: #2c2c2c; color: #fff; }
    .toolbar input[type="text"] { padding: 4px 8px; border: 1px solid rgba(255,255,255,.2); border-radius: 4px; background: rgba(255,255,255,.1); color: #fff; font-size: 12px; font-family: inherit; outline: none; width: 160px; }
    .toolbar input:focus, .toolbar select:focus { border-color: #3b82f6; }
    .toolbar button { padding: 6px 14px; border: 1px solid rgba(255,255,255,.25); border-radius: 4px; background: rgba(255,255,255,.08); color: #fff; font-size: 12px; font-family: inherit; cursor: pointer; transition: background .15s; white-space: nowrap; }
    .toolbar button:hover { background: rgba(255,255,255,.18); }
    .toolbar .btn-pdf { background: #3b82f6; border-color: #3b82f6; font-weight: 600; }
    .toolbar .btn-pdf:hover { background: #2563eb; }

    /* ── Print ── */
    .print-mode .toolbar, .print-mode .no-print { display: none !important; }
    .print-mode .report { padding: 12px 16px; box-shadow: none; margin: 0; }
    @media print { .toolbar, .no-print { display: none !important; } }

    /* ── Report body ── */
    .report { max-width: 1200px; margin: 16px auto; padding: 24px 28px 48px; background: #fff; box-shadow: 0 1px 4px rgba(0,0,0,.08); }
    .report-header { display: flex; align-items: center; gap: 18px; margin-bottom: 24px; }
    .report-header-logo { max-height: 48px; max-width: 120px; object-fit: contain; }
    .org-label { font-size: 14px; font-weight: 700; color: #333; }
    .title { font-size: 19px; font-weight: 700; color: #111; margin-top: 2px; }
    .subtitle { font-size: 12px; color: #888; margin-top: 3px; }

    /* ── Loading / Error ── */
    .loading { display: flex; flex-direction: column; align-items: center; padding: 48px 0; gap: 14px; }
    .spinner { width: 30px; height: 30px; border: 3px solid #ddd; border-top-color: #3b82f6; border-radius: 50%; animation: spin .7s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .juice-msg { font-size: 12px; color: #999; }
    .juice-msg span { display: none; }
    .juice-msg span:first-child { display: inline; }
    .error { padding: 20px; color: #dc2626; font-size: 13px; text-align: center; }

    /* ── Summary cards ── */
    .summary-cards { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 20px; }
    .summary-card { flex: 1; min-width: 130px; border: 1px solid #e0ddd8; border-radius: 8px; padding: 14px 16px; background: #fff; }
    .summary-card .sc-label { font-size: 10px; text-transform: uppercase; letter-spacing: .8px; color: #888; margin-bottom: 4px; font-weight: 600; }
    .summary-card .sc-value { font-size: 22px; font-weight: 700; }
    .summary-card .sc-sub { font-size: 11px; color: #888; margin-top: 2px; }

    /* ── Tooltips ── */
    .tip-wrap { position: relative; display: inline-flex; align-items: center; gap: 5px; }
    .tip-icon { display: inline-flex; align-items: center; justify-content: center; width: 15px; height: 15px; border-radius: 50%; background: #6b7280; color: #fff; font-size: 10px; font-weight: 700; font-family: Georgia, serif; font-style: italic; cursor: help; flex-shrink: 0; line-height: 1; transition: background .15s; }
    .tip-icon:hover { background: #374151; }
    .tip-bubble { display: none; position: absolute; left: 50%; transform: translateX(-50%); bottom: calc(100% + 8px); z-index: 50; width: 220px; padding: 8px 11px; background: #1f2937; color: #f3f4f6; font-size: 11.5px; font-weight: 400; line-height: 1.5; border-radius: 6px; text-transform: none; letter-spacing: 0; box-shadow: 0 4px 16px rgba(0,0,0,.25); pointer-events: none; }
    .tip-bubble::after { content: ''; position: absolute; top: 100%; left: 50%; transform: translateX(-50%); border: 5px solid transparent; border-top-color: #1f2937; }
    .tip-wrap:hover .tip-bubble { display: block; }
    @media print { .tip-bubble, .tip-icon { display: none !important; } }

    /* ── Explainer ── */
    .explainer { background: #fff; border: 1px solid #e0ddd8; border-radius: 8px; padding: 14px 18px; margin-bottom: 20px; font-size: 12px; color: #555; line-height: 1.6; }
    .explainer strong { color: #333; }
    .explainer-toggle { background: none; border: none; cursor: pointer; font-size: 12px; font-weight: 600; color: #3b82f6; padding: 0; font-family: inherit; }
    .explainer ul { margin: 8px 0 0 16px; }
    .explainer li { margin-bottom: 3px; }

    /* ── Chart ── */
    .chart-section { margin: 20px 0; }
    .chart-container { background: #fff; border: 1px solid #e0ddd8; border-radius: 10px; padding: 16px 20px; }
    .chart-row { display: flex; align-items: center; gap: 10px; margin-bottom: 6px; }
    .chart-label { width: 240px; flex-shrink: 0; font-size: 12px; font-weight: 500; color: #333; text-align: right; line-height: 1.25; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; word-break: break-word; }
    .chart-bar-wrap { flex: 1; height: 24px; background: #f5f4f1; border-radius: 4px; position: relative; overflow: hidden; }
    .chart-bar { height: 100%; border-radius: 4px; transition: width .4s ease; min-width: 0; position: absolute; top: 0; cursor: pointer; }
    .chart-bar.ft-total { background: #d1d5db; z-index: 1; left: 0; }
    .chart-bar.ft-conv { background: #22c55e; z-index: 3; left: 0; }
    .chart-bar.ft-pend { background: #f59e0b; z-index: 2; }
    .chart-bar:hover { filter: brightness(1.1); }
    .chart-val { font-size: 11px; font-weight: 600; color: #555; width: 56px; text-align: right; flex-shrink: 0; }
    .chart-tooltip { position: fixed; z-index: 60; pointer-events: none; background: #1f2937; color: #fff; border-radius: 8px; padding: 9px 11px; font-size: 11px; line-height: 1.5; box-shadow: 0 8px 28px rgba(0,0,0,.28); width: 220px; }
    .chart-tooltip .tt-name { font-weight: 700; margin-bottom: 5px; font-size: 11.5px; }

    /* ── AI Insights ── */
    .insights-section { margin: 4px 0 18px; }
    .insights-head { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; margin-bottom: 12px; }
    .insights-btn { display: inline-flex; align-items: center; gap: 6px; padding: 8px 18px; border: 1px solid #e5e7eb; border-radius: 8px; background: linear-gradient(135deg, #6366f1, #8b5cf6); color: #fff; font-size: 13px; font-weight: 600; font-family: inherit; cursor: pointer; transition: background .15s; 
      position: relative; overflow: visible;
      box-shadow: 0 2px 12px rgba(99,102,241,.3);
    }
    .insights-btn:hover:not(:disabled) { background: linear-gradient(135deg, #4f46e5, #7c3aed); transform: translateY(-1px); box-shadow: 0 4px 20px rgba(99,102,241,.4); }
    .insights-btn:disabled { opacity: .6; cursor: default; }
    .insights-btn .sparkle {
      position: absolute; pointer-events: none;
      font-size: 10px; opacity: 0;
      animation: sparkle-float 2.5s ease-in-out infinite;
    }
    .insights-btn .sparkle:nth-child(1) { top: -8px; left: 8%; animation-delay: 0s; }
    .insights-btn .sparkle:nth-child(2) { top: -6px; right: 12%; animation-delay: 0.7s; font-size: 8px; }
    .insights-btn .sparkle:nth-child(3) { bottom: -7px; left: 25%; animation-delay: 1.4s; font-size: 7px; }
    .insights-btn .sparkle:nth-child(4) { top: -5px; left: 50%; animation-delay: 0.3s; font-size: 6px; }
    .insights-btn .sparkle:nth-child(5) { bottom: -6px; right: 20%; animation-delay: 1.1s; font-size: 9px; }
    .insights-btn .sparkle:nth-child(6) { top: -9px; right: 3%; animation-delay: 1.9s; font-size: 7px; }
    @keyframes sparkle-float {
      0%, 100% { opacity: 0; transform: translateY(0) scale(0.5); }
      15% { opacity: 1; transform: translateY(-3px) scale(1.1); }
      30% { opacity: 0.7; transform: translateY(-7px) scale(0.9); }
      50% { opacity: 0.3; transform: translateY(-11px) scale(0.6); }
      70% { opacity: 0; transform: translateY(-15px) scale(0.3); }
    }
    .insights-sub { font-size: 11.5px; color: #9ca3af; }
    .insights-section .loading { padding: 36px 16px; }
    .insights-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(230px, 1fr)); gap: 12px; }
    .insight-card { border: 1px solid #e5e7eb; border-left-width: 4px; border-radius: 8px; padding: 14px 16px; background: #fff; }
    .insight-type { font-size: 10px; font-weight: 700; letter-spacing: .6px; text-transform: uppercase; margin-bottom: 6px; }
    .insight-title { font-size: 14px; font-weight: 700; color: #111827; margin-bottom: 5px; line-height: 1.3; }
    .insight-detail { font-size: 12.5px; color: #374151; line-height: 1.45; }
    .insight-action { font-size: 12px; color: #6b7280; margin-top: 8px; font-weight: 500; }
    .insight-opportunity { border-left-color: #10b981; }
    .insight-opportunity .insight-type { color: #059669; }
    .insight-risk { border-left-color: #f59e0b; }
    .insight-risk .insight-type { color: #d97706; }
    .insight-signal { border-left-color: #6366f1; }
    .insight-signal .insight-type { color: #4f46e5; }

    /* ── Table ── */
    .table-scroll { overflow-x: auto; }
    .ft-table { width: 100%; border-collapse: collapse; font-size: 12px; }
    .ft-table th { background: #2c2c2c; color: #fff; padding: 8px 10px; font-size: 10px; text-transform: uppercase; letter-spacing: .6px; font-weight: 700; position: sticky; top: 0; z-index: 10; white-space: nowrap; }
    .ft-table th.left { text-align: left; }
    .ft-table td { padding: 7px 10px; border-bottom: 1px solid #e8e5e0; text-align: right; white-space: nowrap; }
    .ft-table td.left { text-align: left; }

    .prog-row { background: #f0eeea; cursor: pointer; }
    .prog-row:hover { background: #e8e5df; }
    .prog-row td { font-weight: 700; }
    .sec-row td { font-weight: 400; color: #444; }
    .sec-row td:first-child { padding-left: 32px; }
    .totals-row { background: #2c2c2c; color: #fff; }
    .totals-row td { font-weight: 700; border: none; }

    .cell-zero { color: #ccc; }
    .pct-bar { display: inline-flex; align-items: center; gap: 6px; }
    .pct-fill { height: 6px; border-radius: 3px; display: inline-block; }


    /* ── Tabs ── */
    .tabs { display: flex; gap: 4px; border-bottom: 2px solid #d1d5db; margin-bottom: 20px; padding: 0 4px; align-items: flex-end; }
    .tab-btn { padding: 9px 18px 8px; font-size: 13px; font-weight: 600; font-family: inherit; background: transparent; border: 1px solid transparent; border-bottom: none; border-radius: 8px 8px 0 0; margin-bottom: -2px; cursor: pointer; color: #888; transition: all .15s; position: relative; }
    .tab-btn:hover { color: #333; background: #f3f4f6; }
    .tab-btn.active { color: #111; background: #fff; border-color: #d1d5db; box-shadow: 0 -2px 4px rgba(0,0,0,.04); z-index: 1; }
    .tab-badge { font-size: 10px; font-weight: 700; padding: 2px 7px; border-radius: 10px; margin-left: 6px; }


    /* ── Triage Panel ── */
    .triage-panel{background:#fff;border:1px solid #e0ddd8;border-radius:10px;padding:20px;margin-bottom:20px}
    .triage-header{font-size:15px;font-weight:700;color:#111;margin-bottom:16px;padding-bottom:12px;border-bottom:2px solid #f1f0ed}
    .triage-header-count{display:inline-flex;align-items:center;justify-content:center;background:#dc2626;color:#fff;font-size:13px;font-weight:700;width:24px;height:24px;border-radius:99px;margin-right:6px}
    .triage-bucket{margin-bottom:14px}.triage-bucket:last-child{margin-bottom:0}
    .triage-bucket-head{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;padding:6px 10px;border-radius:6px;display:flex;align-items:center;justify-content:space-between}
    .triage-bucket-head.crit{background:#fef2f2;color:#991b1b}
    .triage-bucket-head.ready{background:#eff6ff;color:#1e40af}
    .triage-bucket-head.stalled{background:#fffbeb;color:#92400e}
    .triage-bucket-head.ok{background:#f0fdf4;color:#166534}
    .triage-bucket-count{background:rgba(0,0,0,.1);padding:1px 8px;border-radius:99px;font-size:11px}
    .triage-row{padding:10px 12px;border-left:3px solid #e5e7eb;margin:6px 0 6px 8px}
    .triage-bucket-head.crit~.triage-row{border-left-color:#fca5a5}
    .triage-bucket-head.ready~.triage-row{border-left-color:#93c5fd}
    .triage-bucket-head.stalled~.triage-row{border-left-color:#fcd34d}
    .triage-row-head{font-size:13px;color:#111}.triage-row-head strong{font-weight:700}
    .triage-row-stats{color:#6b7280;font-size:12px;margin-left:6px}
    .triage-row-action{font-size:12px;color:#374151;margin-top:4px;font-style:italic}
    .triage-row-meta{font-size:11px;color:#9ca3af;margin-top:4px;display:flex;flex-wrap:wrap;gap:8px;align-items:center}
    .triage-chip{background:#f3f4f6;padding:2px 8px;border-radius:4px;font-size:10px;font-weight:600}
    .triage-chip.soon{background:#dbeafe;color:#1e40af}

    .triage-admin-link{display:inline-block;background:#3b82f6;color:#fff;font-size:10px;font-weight:700;padding:3px 10px;border-radius:4px;text-decoration:none;margin-right:8px;letter-spacing:.02em}
    .triage-admin-link:hover{background:#2563eb}
    .triage-chip.urgent{background:#fef2f2;color:#991b1b}
    /* ── Demand Leaderboard ── */
    .lb-section { margin-bottom: 24px; }
    .lb-title { font-size: 13px; font-weight: 700; text-transform: uppercase; letter-spacing: .8px; color: #444; margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }
    .lb-title .lb-sub { font-weight: 400; font-size: 11px; color: #999; text-transform: none; letter-spacing: 0; }
    .lb-grid { display: flex; flex-direction: column; gap: 6px; }
    .lb-row { display: flex; align-items: center; gap: 12px; padding: 10px 14px; background: #fafaf8; border: 1px solid #e8e5e0; border-radius: 6px; transition: background .15s; }
    .lb-row:hover { background: #f0efeb; }
    .lb-rank { font-size: 18px; font-weight: 800; color: #ccc; width: 28px; text-align: center; font-family: 'IBM Plex Mono', monospace; }
    .lb-row:nth-child(1) .lb-rank { color: #f59e0b; }
    .lb-row:nth-child(2) .lb-rank { color: #94a3b8; }
    .lb-row:nth-child(3) .lb-rank { color: #d97706; }
    .lb-info { flex: 1; min-width: 0; }
    .lb-name { font-size: 13px; font-weight: 600; color: #111; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .lb-meta { font-size: 10px; color: #999; margin-top: 2px; }
    .lb-stat { text-align: center; width: 72px; flex-shrink: 0; }
    .lb-stat-val { font-size: 18px; font-weight: 700; font-family: 'IBM Plex Mono', monospace; color: #6366f1; }
    .lb-stat-label { font-size: 9px; text-transform: uppercase; letter-spacing: .5px; color: #999; font-weight: 600; }
    .lb-bar-wrap { width: 130px; flex-shrink: 0; }
    .lb-bar-track { height: 8px; background: #e8e5e0; border-radius: 4px; overflow: hidden; display: flex; }
    .lb-bar-conv { background: #22c55e; height: 100%; }
    .lb-bar-pend { background: #f59e0b; height: 100%; }
    .lb-conv-label { font-size: 10px; color: #666; margin-top: 2px; text-align: center; }
    .lb-badge { font-size: 10px; font-weight: 600; padding: 3px 8px; border-radius: 10px; white-space: nowrap; width: 100px; text-align: center; flex-shrink: 0; }
    .lb-badge.hot { background: #fef3c7; color: #92400e; }
    .lb-badge.over { background: #fee2e2; color: #b91c1c; }
    .lb-badge.full { background: #dbeafe; color: #1e40af; }
    .lb-badge.low-conv { background: #fce7f3; color: #9d174d; }
    .lb-alerts { margin-bottom: 20px; }
    .lb-alert { display: flex; align-items: center; gap: 10px; padding: 8px 14px; border-radius: 6px; font-size: 12px; margin-bottom: 6px; }
    .lb-alert.warn { background: #fef3c7; border: 1px solid #fcd34d; color: #92400e; }
    .lb-alert.crit { background: #fee2e2; border: 1px solid #fca5a5; color: #b91c1c; }
    .lb-alert.info { background: #dbeafe; border: 1px solid #93c5fd; color: #1e40af; }
    .lb-alert-icon { font-size: 16px; }
    .lb-alert-text strong { font-weight: 700; }

    /* ── KPI row (for demographics) ── */
    .kpi-row { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 16px; }
    .kpi { flex: 1; min-width: 130px; border: 1px solid #e0ddd8; border-radius: 8px; padding: 14px 16px; background: #fff; border-top: 3px solid var(--accent, #888); }
    .kpi .kpi-label { font-size: 10px; text-transform: uppercase; letter-spacing: .8px; color: #888; margin-bottom: 4px; font-weight: 600; }
    .kpi .kpi-val { font-size: 22px; font-weight: 700; }
    .kpi .kpi-sub { font-size: 11px; color: #888; margin-top: 2px; }
    .obs { background: #fff; border: 1px solid #e0ddd8; border-radius: 8px; padding: 14px 18px; margin-bottom: 16px; }
    .obs-title { font-size: 12px; font-weight: 700; color: #333; margin-bottom: 10px; }
    .obs-grid { display: grid; grid-template-columns: 1fr; gap: 10px; font-size: 12px; color: #444; line-height: 1.6; }
    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(340px, 1fr)); gap: 14px; margin-bottom: 16px; }

    /* ── Footer ── */
    .report-footer { text-align: center; padding: 24px 0; font-size: 11px; color: #ccc; font-family: 'IBM Plex Mono', monospace; }

    @media (max-width: 640px) {
      .toolbar { padding: 8px 12px; gap: 6px; }
      .report { padding: 16px 12px 32px; }
      .chart-label { width: 140px; font-size: 11px; }
      .summary-card { min-width: 100px; }
    }

    .insights-feedback { display:flex; align-items:center; gap:8px; margin-top:12px; padding:8px 4px; font-size:13px; color:#666; }
    .insights-feedback button { background:none; border:1px solid #e5e7eb; border-radius:6px; padding:4px 10px; cursor:pointer; font-size:13px; transition:all .15s; }
    .insights-feedback button:hover { background:#f3f4f6; border-color:#d1d5db; }
    .insights-feedback .fb-label { color:#888; font-size:12px; }
    .insights-feedback .fb-thanks { color:#10b981; font-weight:600; font-size:13px; }
    .insights-feedback .fb-down-form { display:flex; align-items:center; gap:6px; flex:1; }
    .insights-feedback .fb-down-form input { flex:1; border:1px solid #d1d5db; border-radius:6px; padding:5px 10px; font-size:13px; font-family:inherit; outline:none; }
    .insights-feedback .fb-down-form input:focus { border-color:#6366f1; box-shadow:0 0 0 2px rgba(99,102,241,.15); }
    .insights-feedback .fb-send { background:#6366f1!important; color:#fff!important; border-color:#6366f1!important; font-weight:600; }
    .insights-feedback .fb-send:hover { background:#4f46e5!important; }
  </style>
</head>
<body>

<div id="root"></div>

<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>

<script type="text/babel">
const { useState, useEffect, useMemo, useCallback, useRef } = React;

/* ── Helpers ── */
const SP = new URLSearchParams(window.location.search);
const URL_TOKEN = SP.get('token') || '';
function withToken(url) { if (!URL_TOKEN) return url; const sep = url.includes('?') ? '&' : '?'; return url + sep + 'token=' + encodeURIComponent(URL_TOKEN); }

const parts = window.location.pathname.split('/').filter(Boolean);
const orgSlug = parts[0] || '';
const basePath = '/' + parts.slice(0, 2).join('/');

function fmtN(v) { const n = Number(v); return isNaN(n) ? 0 : n; }
function fmtInt(v) { return fmtN(v).toLocaleString(); }
function fmtPct(v) { const n = fmtN(v); return n === 0 ? '—' : n.toFixed(1) + '%'; }

function normalizeRow(raw) {
  return {
    season:        raw['Season'] ?? '',
    program:       raw['Program'] ?? '',
    section:       raw['Section'] ?? '',

/* ── Bar Chart component (Chart.js) ── */
function BarChart(props) {
  var canvasRef = React.useRef(null);
  var chartRef = React.useRef(null);
  var data = props.data || [];

  React.useEffect(function() {
    if (!canvasRef.current || !data.length) return;
    if (chartRef.current) chartRef.current.destroy();

    var labels = data.map(function(d) {
      var l = String(d[props.labelKey] || '');
      return l.length > 30 ? l.slice(0, 28) + '\u2026' : l;
    });
    var values = data.map(function(d) { return d[props.valKey] || 0; });
    var color = props.color || '#6366f1';

    chartRef.current = new Chart(canvasRef.current, {
      type: 'bar',
      data: {
        labels: labels,
        datasets: [{
          data: values,
          backgroundColor: color + 'cc',
          borderColor: color,
          borderWidth: 1,
          borderRadius: 4,
          barPercentage: 0.7,
        }]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        indexAxis: 'y',
        scales: {
          x: {
            grid: { color: '#f1f5f9' },
            beginAtZero: true,
            ticks: { font: { size: 10 }, callback: function(v) { return (props.prefix || '') + v.toLocaleString(); } },
          },
          y: {
            grid: { display: false },
            ticks: { font: { size: 10, weight: '500' }, color: '#555' },
          },
        },
        plugins: {
          legend: { display: false },
          tooltip: {
            callbacks: {
              label: function(ctx) { return (props.prefix || '') + ctx.raw.toLocaleString(); }
            }
          },
        },
      },
    });

    return function() { if (chartRef.current) chartRef.current.destroy(); };
  }, [data, props.labelKey, props.valKey, props.color, props.prefix]);

  if (!data.length) return null;
  var chartHeight = Math.max(150, data.length * 28 + 40);

  return React.createElement('div', { style: { background: '#fff', border: '1px solid #e0ddd8', borderRadius: 10, padding: '16px 20px' } },
    React.createElement('div', { style: { fontSize: 12, fontWeight: 600, color: '#555', marginBottom: 12 } }, props.title),
    React.createElement('div', { style: { height: chartHeight } },
      React.createElement('canvas', { ref: canvasRef })
    )
  );
}
