<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Instructor Payout Report</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'IBM Plex Sans', 'Segoe UI', system-ui, sans-serif; font-size: 12px; color: #1a1a1a; background: #f5f4f1; line-height: 1.35; }

    /* ── Toolbar ── */
    .toolbar { position: sticky; top: 0; z-index: 100; display: flex; align-items: center; gap: 10px; padding: 8px 20px; background: #2c2c2c; color: #eee; font-size: 13px; flex-wrap: wrap; }
    .toolbar-title { font-weight: 600; margin-right: 8px; }
    .toolbar-spacer { flex: 1; }
    .toolbar label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.5px; color: #aaa; display: flex; flex-direction: column; gap: 2px; }
    .toolbar select, .toolbar input[type="text"] { padding: 4px 8px; border: 1px solid rgba(255,255,255,.2); border-radius: 4px; background: rgba(255,255,255,.1); color: #fff; font-size: 12px; font-family: inherit; outline: none; }
    .toolbar select:focus, .toolbar input[type="text"]:focus { border-color: #3b82f6; }
    .toolbar select option { background: #2c2c2c; color: #fff; }
    .toolbar button { padding: 6px 14px; border: 1px solid rgba(255,255,255,.25); border-radius: 4px; background: rgba(255,255,255,.08); color: #fff; font-size: 12px; font-family: inherit; cursor: pointer; transition: background .15s; }
    .toolbar button:hover { background: rgba(255,255,255,.18); }
    .toolbar .btn-excel { background: #16803c; border-color: #16803c; font-weight: 600; }
    .toolbar .btn-excel:hover { background: #15692f; }
    .toolbar .btn-print { background: rgba(255,255,255,.08); font-weight: 500; }
    .toolbar .divider { width: 1px; height: 28px; background: rgba(255,255,255,.15); margin: 0 4px; }
    .toolbar .row-count { font-size: 11px; color: #aaa; }

    /* ── Split pill bar (in toolbar) ── */
    .split-bar { display: inline-flex; border-radius: 4px; overflow: hidden; border: 1px solid rgba(255,255,255,.2); }
    .split-bar button { padding: 4px 10px; font-size: 11px; font-weight: 600; border: none; border-right: 1px solid rgba(255,255,255,.15); background: rgba(255,255,255,.06); color: #aaa; cursor: pointer; transition: all .15s; border-radius: 0; }
    .split-bar button:last-child { border-right: none; }
    .split-bar button.active { background: #3b82f6; color: #fff; }
    .split-bar button:hover:not(.active) { background: rgba(255,255,255,.14); color: #ddd; }

    /* ── Page ── */
    .page { max-width: 1320px; margin: 16px auto; padding: 24px 28px; background: #fff; box-shadow: 0 1px 4px rgba(0,0,0,.08); }

    /* ── Report header ── */
    .report-header { display: flex; justify-content: space-between; align-items: flex-end; border-bottom: 2.5px solid #111; padding-bottom: 8px; margin-bottom: 16px; }
    .report-header-logo { height: 42px; max-width: 140px; object-fit: contain; object-position: left center; }
    .report-header .org-label { font-size: 10.5px; letter-spacing: 1.6px; text-transform: uppercase; color: #777; font-weight: 600; }
    .report-header .title { font-size: 17px; font-weight: 700; margin-top: 1px; }
    .report-header .date-range { font-size: 11px; color: #666; text-align: right; }

    /* ── Summary cards ── */
    .summary-cards { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
    .summary-card { flex: 1; min-width: 120px; padding: 10px 12px; border-radius: 5px; background: #f8f8f6; border: 1px solid #e4e4e0; border-left: 3px solid #ccc; }
    .summary-card .card-label { font-size: 9.5px; text-transform: uppercase; letter-spacing: 0.5px; color: #888; font-weight: 600; margin-bottom: 4px; }
    .summary-card .card-value { font-size: 15px; font-weight: 700; font-family: 'IBM Plex Mono', monospace; white-space: nowrap; }
    .summary-card .card-sub { font-size: 10px; color: #999; margin-top: 2px; }
    .summary-card.green  { border-left-color: #16a34a; } .summary-card.green  .card-value { color: #15803d; }
    .summary-card.blue   { border-left-color: #3b82f6; } .summary-card.blue   .card-value { color: #2563eb; }
    .summary-card.red    { border-left-color: #ef4444; } .summary-card.red    .card-value { color: #dc2626; }
    .summary-card.violet { border-left-color: #7c3aed; } .summary-card.violet .card-value { color: #6d28d9; }
    .summary-card.indigo { border-left-color: #4f46e5; } .summary-card.indigo .card-value { color: #4338ca; }
    .summary-card.amber  { border-left-color: #d97706; } .summary-card.amber  .card-value { color: #b45309; }
    .summary-card.teal   { border-left-color: #0d9488; } .summary-card.teal   .card-value { color: #0f766e; }
    .summary-card.slate  { border-left-color: #475569; } .summary-card.slate  .card-value { color: #334155; }

    /* ── Table ── */
    .table-wrapper { overflow-x: auto; }
    table { border-collapse: collapse; width: 100%; font-size: 11.5px; }
    thead th { background: #e4e4e0; border: 1px solid #ccc; padding: 5px 8px; text-align: right; font-weight: 600; font-size: 10px; text-transform: uppercase; letter-spacing: 0.3px; color: #333; white-space: nowrap; }
    thead th.left { text-align: left; }
    tbody td { padding: 5px 8px; border-bottom: 1px solid #eee; text-align: right; font-variant-numeric: tabular-nums; }
    tbody td.left { text-align: left; }
    tbody tr:hover { background: #fafaf8; }

    /* Instructor group header */
    tr.group-header td { background: #f0ede7; padding: 7px 8px; font-weight: 700; font-size: 11.5px; color: #333; border-bottom: 1.5px solid #d5d2cc; text-align: left; }
    tr.group-header td .group-meta { font-weight: 400; font-size: 10px; color: #888; margin-left: 10px; }

    /* Subtotal row */
    tr.subtotal-row td { background: #edeae4; padding: 5px 8px; font-weight: 700; font-size: 11px; font-variant-numeric: tabular-nums; border-top: 1px solid #ccc; border-bottom: 2px solid #bbb; color: #444; }
    tr.subtotal-row td.left { text-align: left; font-style: italic; color: #888; }

    /* Grand total */
    tfoot td { background: #2c2c2c; color: #fff; padding: 7px 8px; font-weight: 700; font-size: 11.5px; font-variant-numeric: tabular-nums; }

    .zero { color: #ccc; }
    .neg { color: #dc2626; }
    .canceled { display: inline-block; background: #fee2e2; color: #b91c1c; font-size: 9px; font-weight: 600; padding: 1px 5px; border-radius: 3px; margin-left: 5px; text-transform: uppercase; }
    .fill-bar { display: inline-block; width: 40px; height: 5px; background: #e4e4e0; border-radius: 2px; overflow: hidden; vertical-align: middle; margin-left: 4px; }
    .fill-bar-inner { height: 100%; border-radius: 2px; }

    /* ── Instructor spotlight ── */
    .spotlight-section { margin-bottom: 20px; }
    .spotlight-label { font-size: 9.5px; text-transform: uppercase; letter-spacing: 1px; color: #999; font-weight: 600; margin-bottom: 8px; }
    .spotlight-cards { display: flex; gap: 10px; flex-wrap: wrap; }
    .spotlight-card { flex: 1; min-width: 150px; max-width: 220px; padding: 10px 12px; border-radius: 5px; background: #f8f8f6; border: 1px solid #e4e4e0; border-left: 3px solid #ccc; }
    .spotlight-card .spot-cat { font-size: 9px; text-transform: uppercase; letter-spacing: 0.5px; color: #aaa; font-weight: 600; margin-bottom: 2px; }
    .spotlight-card .spot-name { font-size: 13px; font-weight: 700; color: #222; margin-bottom: 3px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .spotlight-card .spot-value { font-size: 14px; font-weight: 700; font-family: 'IBM Plex Mono', monospace; }
    .spotlight-card .spot-sub { font-size: 10px; color: #999; margin-top: 1px; }
    .spotlight-card.green  { border-left-color: #16a34a; } .spotlight-card.green  .spot-value { color: #15803d; }
    .spotlight-card.blue   { border-left-color: #3b82f6; } .spotlight-card.blue   .spot-value { color: #2563eb; }
    .spotlight-card.red    { border-left-color: #ef4444; } .spotlight-card.red    .spot-value { color: #dc2626; }
    .spotlight-card.violet { border-left-color: #7c3aed; } .spotlight-card.violet .spot-value { color: #6d28d9; }
    .spotlight-card.amber  { border-left-color: #d97706; } .spotlight-card.amber  .spot-value { color: #b45309; }
    .spotlight-card.teal   { border-left-color: #0d9488; } .spotlight-card.teal   .spot-value { color: #0f766e; }

    /* ── Empty / loading ── */
    .empty-state { text-align: center; padding: 60px 20px; color: #888; }
    .empty-state p { font-size: 14px; }

    /* ── Print ── */
    @media print { .toolbar { display: none !important; } body { background: #fff; } .page { margin: 0; padding: 10px; box-shadow: none; max-width: 100%; } }
    body.print-mode .toolbar { display: none !important; }
    body.print-mode { background: #fff; }
    body.print-mode .page { margin: 0; padding: 10px; box-shadow: none; max-width: 100%; }
  </style>
  <script>
    const URL_TOKEN = new URLSearchParams(window.location.search).get('token') || '';
    const TOKEN_QS  = URL_TOKEN ? '?token=' + encodeURIComponent(URL_TOKEN) : '';
    function withToken(url) {
      if (!URL_TOKEN) return url;
      return url + (url.includes('?') ? '&' : '?') + 'token=' + encodeURIComponent(URL_TOKEN);
    }
  </script>
</head>
<body>
<div id="root"></div>
<div id="report-ready" style="display:none"></div>

<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
<script src="/juice-loader.js"></script>
<script type="text/babel">
const { useState, useEffect, useMemo, useCallback } = React;

const fmt = (n) => n == null ? '$0.00' : '$' + Number(n).toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
const fmtPct = (n) => (n * 100).toFixed(1) + '%';
const parts = window.location.pathname.split('/').filter(Boolean);
const orgSlug = parts[0] || '';
const reportType = parts[1] || 'instructor-payout';

const SPLITS = [
  { label: '90/10', i: 0.90 },
  { label: '80/20', i: 0.80 },
  { label: '70/30', i: 0.70 },
  { label: '60/40', i: 0.60 },
  { label: '50/50', i: 0.50 },
];

function fmtDate(d) {
  if (!d) return '';
  try { return new Date(d).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' }); }
  catch { return d; }
}

function App() {
  const [rows, setRows]       = useState(null);
  const [loading, setLoading] = useState(true);
  const [error, setError]     = useState(null);
  const [splitIdx, setSplitIdx] = useState(2); // 70/30
  const [search, setSearch]     = useState('');
  const [instrFilter, setInstrFilter] = useState('');
  const [orgName, setOrgName] = useState('');
  const [logoUrl, setLogoUrl] = useState(null);

  const split = SPLITS[splitIdx];
  const iPct = Math.round(split.i * 100);
  const oPct = 100 - iPct;

  // Print mode
  useEffect(() => {
    if (new URLSearchParams(window.location.search).get('_print') === '1') document.body.classList.add('print-mode');
  }, []);

  // Fetch
  useEffect(() => {
    setLoading(true);
    fetch(withToken(`/${orgSlug}/${reportType}/api/data`))
      .then(r => { if (!r.ok) throw new Error(r.status); return r.json(); })
      .then(json => {
        const data = json.rows || json;
        setRows(Array.isArray(data) ? data : []);
        setOrgName(json.meta?.org_name || '');
        setLogoUrl(json.meta?.logo_url || null);
        setLoading(false);
        document.getElementById('report-ready').style.display = 'block';
      })
      .catch(e => { setError(e.message); setLoading(false); });
  }, []);

  // Normalize
  const normalized = useMemo(() => {
    if (!rows) return [];
    return rows.map(r => ({
      program:  r['program_name']  || r['Program Name']  || '',
      section:  r['section_name']  || r['Section Name']  || '',
      instr:    r['facilitator_name'] || r['Facilitator Name'] || '',
      canceled: r['section_canceled'] === true || r['section_canceled'] === 'true',
      startDate: r['section_start_date'] || '',
      endDate:   r['section_end_date']   || '',
      price:    Number(r['default_price']    || 0),
      capacity: Number(r['capacity']         || 0),
      enrolled: Number(r['number_enrolled']  || 0),
      paid:     Number(r['total_paid']       || 0),
      refunded: Number(r['total_refunded']   || 0),
      net:      Number(r['net_amount']       || 0),
    }));
  }, [rows]);

  // Filter
  const filtered = useMemo(() => {
    let d = normalized;
    if (instrFilter) d = d.filter(r => r.instr === instrFilter);
    if (search) { const q = search.toLowerCase(); d = d.filter(r => r.section.toLowerCase().includes(q) || r.program.toLowerCase().includes(q)); }
    return d;
  }, [normalized, instrFilter, search]);

  const instructors = useMemo(() => [...new Set(normalized.map(r => r.instr))].sort(), [normalized]);

  const grouped = useMemo(() => {
    const m = new Map();
    filtered.forEach(r => { if (!m.has(r.instr)) m.set(r.instr, []); m.get(r.instr).push(r); });
    return [...m.entries()].sort((a, b) => a[0].localeCompare(b[0]));
  }, [filtered]);

  // KPIs
  const kpis = useMemo(() => {
    const tNet = filtered.reduce((s, r) => s + r.net, 0);
    const tPaid = filtered.reduce((s, r) => s + r.paid, 0);
    const tRef = filtered.reduce((s, r) => s + r.refunded, 0);
    const tEnr = filtered.reduce((s, r) => s + r.enrolled, 0);
    const tCap = filtered.reduce((s, r) => s + r.capacity, 0);
    const uInstr = new Set(filtered.map(r => r.instr)).size;
    const cnt = filtered.length;
    return { tNet, tPaid, tRef, tEnr, tCap, uInstr, cnt,
      iPay: tNet * split.i, oRet: tNet * (1 - split.i),
      avgSec: cnt > 0 ? tNet / cnt : 0, avgInstr: uInstr > 0 ? tNet / uInstr : 0,
      fill: tCap > 0 ? tEnr / tCap : 0, refRate: tPaid > 0 ? tRef / tPaid : 0,
    };
  }, [filtered, split]);

  // Instructor spotlight metrics
  const instrMetrics = useMemo(() => {
    const map = new Map();
    filtered.forEach(r => {
      if (!map.has(r.instr)) map.set(r.instr, { name: r.instr, net: 0, paid: 0, refunded: 0, enrolled: 0, capacity: 0, sections: 0 });
      const m = map.get(r.instr);
      m.net += r.net; m.paid += r.paid; m.refunded += r.refunded;
      m.enrolled += r.enrolled; m.capacity += r.capacity; m.sections += 1;
    });
    const list = [...map.values()].map(m => ({
      ...m,
      fill: m.capacity > 0 ? m.enrolled / m.capacity : 0,
      avgPerSection: m.sections > 0 ? m.net / m.sections : 0,
    }));
    if (list.length === 0) return null;
    const byNet = [...list].sort((a, b) => b.net - a.net);
    const byFill = [...list].filter(m => m.capacity > 0).sort((a, b) => b.fill - a.fill);
    const byRef = [...list].filter(m => m.refunded > 0).sort((a, b) => b.refunded - a.refunded);
    const byEnr = [...list].sort((a, b) => b.enrolled - a.enrolled);
    const bySec = [...list].sort((a, b) => b.sections - a.sections);
    const byAvg = [...list].filter(m => m.net > 0).sort((a, b) => b.avgPerSection - a.avgPerSection);
    return {
      topRev: byNet[0] || null,
      bestFill: byFill[0] || null,
      topRefund: byRef[0] || null,
      mostEnrolled: byEnr[0] || null,
      mostSections: bySec[0] || null,
      highestAvg: byAvg[0] || null,
    };
  }, [filtered]);

  // Excel
  const exportExcel = useCallback(() => {
    function go() {
      const h = ['Instructor','Program','Section','Start','End','Price','Cap','Enrolled','Paid','Refunded','Net',`Instructor (${iPct}%)`,`Org (${oPct}%)`];
      const d = filtered.map(r => [r.instr, r.program, r.section+(r.canceled?' (CANCELED)':''), fmtDate(r.startDate), fmtDate(r.endDate), r.price, r.capacity, r.enrolled, r.paid, r.refunded, r.net, Math.round(r.net*split.i*100)/100, Math.round(r.net*(1-split.i)*100)/100]);
      d.push(['TOTALS','','','','','',kpis.tCap,kpis.tEnr,kpis.tPaid,kpis.tRef,kpis.tNet,Math.round(kpis.iPay*100)/100,Math.round(kpis.oRet*100)/100]);
      const ws = XLSX.utils.aoa_to_sheet([h,...d]);
      const wb = XLSX.utils.book_new();
      XLSX.utils.book_append_sheet(wb, ws, 'Instructor Payout');
      XLSX.writeFile(wb, `instructor-payout-${orgSlug}-${new Date().toISOString().slice(0,10)}.xlsx`);
      fetch(withToken(`/${orgSlug}/${reportType}/api/log`), { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({action:'excel',rows:filtered.length}) }).catch(()=>{});
    }
    if (typeof XLSX === 'undefined') { const s = document.createElement('script'); s.src='https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js'; s.onload=go; document.head.appendChild(s); } else go();
  }, [filtered, split, kpis, iPct, oPct]);

  const fillColor = (p) => p >= 0.8 ? '#16a34a' : p >= 0.5 ? '#d97706' : '#ef4444';
  const v = (n) => n === 0 ? 'zero' : n < 0 ? 'neg' : '';

  if (loading) return React.createElement(window.JuiceLoader || 'div', { text: 'Loading instructor payout data...' });
  if (error) return (<div className="page" style={{margin:'40px auto'}}><div className="empty-state"><p>Error loading data: {error}</p></div></div>);

  const displayOrg = orgName || 'rec.us';

  return (
    <div>
      {/* ── Toolbar ── */}
      <div className="toolbar">
        <span className="toolbar-title">Instructor Payout</span>
        <span className="divider"></span>
        <label>
          Split
          <div className="split-bar">
            {SPLITS.map((s, i) => (
              <button key={i} className={i === splitIdx ? 'active' : ''} onClick={() => setSplitIdx(i)}>{s.label}</button>
            ))}
          </div>
        </label>
        <span className="divider"></span>
        <label>
          Instructor
          <select value={instrFilter} onChange={e => setInstrFilter(e.target.value)} style={{minWidth: 140}}>
            <option value="">All</option>
            {instructors.map(n => <option key={n} value={n}>{n}</option>)}
          </select>
        </label>
        <label>
          Search
          <input type="text" placeholder="Section or program..." value={search} onChange={e => setSearch(e.target.value)} style={{minWidth: 150}} />
        </label>
        <span className="toolbar-spacer"></span>
        <span className="row-count">{filtered.length} section{filtered.length !== 1 ? 's' : ''} · {kpis.uInstr} instructor{kpis.uInstr !== 1 ? 's' : ''}</span>
        <span className="divider"></span>
        <button className="btn-excel" onClick={exportExcel}>⬇ Excel</button>
        <button className="btn-print" onClick={() => window.print()}>🖨 Print</button>
      </div>

      {/* ── Page ── */}
      <div className="page">
        {/* Report header */}
        <div className="report-header">
          <div>
            {logoUrl && <img src={logoUrl} alt="" className="report-header-logo" onError={e => e.target.style.display='none'} />}
            <div className="org-label">{displayOrg}</div>
            <div className="title">Instructor Payout Report</div>
          </div>
          <div className="date-range">{iPct}% Instructor / {oPct}% Organization</div>
        </div>

        {/* Summary cards */}
        <div className="summary-cards">
          <div className="summary-card green">
            <div className="card-label">Net Revenue</div>
            <div className="card-value">{fmt(kpis.tNet)}</div>
            <div className="card-sub">{fmt(kpis.tPaid)} paid · {fmt(kpis.tRef)} refunded</div>
          </div>
          <div className="summary-card indigo">
            <div className="card-label">Instructor Payout</div>
            <div className="card-value">{fmt(kpis.iPay)}</div>
            <div className="card-sub">{iPct}% of net · {kpis.uInstr} instructors</div>
          </div>
          <div className="summary-card teal">
            <div className="card-label">Org Retention</div>
            <div className="card-value">{fmt(kpis.oRet)}</div>
            <div className="card-sub">{oPct}% of net revenue</div>
          </div>
          <div className="summary-card violet">
            <div className="card-label">Avg / Instructor</div>
            <div className="card-value">{fmt(kpis.avgInstr)}</div>
            <div className="card-sub">{kpis.uInstr} unique</div>
          </div>
          <div className="summary-card blue">
            <div className="card-label">Avg / Section</div>
            <div className="card-value">{fmt(kpis.avgSec)}</div>
            <div className="card-sub">{kpis.cnt} sections</div>
          </div>
          <div className="summary-card amber">
            <div className="card-label">Fill Rate</div>
            <div className="card-value">{fmtPct(kpis.fill)}</div>
            <div className="card-sub">{kpis.tEnr} / {kpis.tCap}</div>
          </div>
          <div className={`summary-card ${kpis.refRate > 0.1 ? 'red' : 'slate'}`}>
            <div className="card-label">Refund Rate</div>
            <div className="card-value">{fmtPct(kpis.refRate)}</div>
            <div className="card-sub">{fmt(kpis.tRef)} of {fmt(kpis.tPaid)}</div>
          </div>
        </div>

        {/* Instructor Spotlights */}
        {instrMetrics && (
          <div className="spotlight-section">
            <div className="spotlight-label">Instructor Spotlights</div>
            <div className="spotlight-cards">
              {instrMetrics.topRev && (
                <div className="spotlight-card green">
                  <div className="spot-cat">Top Revenue</div>
                  <div className="spot-name">{instrMetrics.topRev.name}</div>
                  <div className="spot-value">{fmt(instrMetrics.topRev.net)}</div>
                  <div className="spot-sub">{instrMetrics.topRev.sections} sections · {instrMetrics.topRev.enrolled} enrolled</div>
                </div>
              )}
              {instrMetrics.bestFill && (
                <div className="spotlight-card teal">
                  <div className="spot-cat">Best Fill Rate</div>
                  <div className="spot-name">{instrMetrics.bestFill.name}</div>
                  <div className="spot-value">{fmtPct(instrMetrics.bestFill.fill)}</div>
                  <div className="spot-sub">{instrMetrics.bestFill.enrolled}/{instrMetrics.bestFill.capacity} across {instrMetrics.bestFill.sections} sections</div>
                </div>
              )}
              {instrMetrics.mostEnrolled && (
                <div className="spotlight-card blue">
                  <div className="spot-cat">Most Enrolled</div>
                  <div className="spot-name">{instrMetrics.mostEnrolled.name}</div>
                  <div className="spot-value">{instrMetrics.mostEnrolled.enrolled}</div>
                  <div className="spot-sub">{instrMetrics.mostEnrolled.sections} sections · {fmt(instrMetrics.mostEnrolled.net)} net</div>
                </div>
              )}
              {instrMetrics.highestAvg && (
                <div className="spotlight-card violet">
                  <div className="spot-cat">Highest Avg/Section</div>
                  <div className="spot-name">{instrMetrics.highestAvg.name}</div>
                  <div className="spot-value">{fmt(instrMetrics.highestAvg.avgPerSection)}</div>
                  <div className="spot-sub">{fmt(instrMetrics.highestAvg.net)} across {instrMetrics.highestAvg.sections} sections</div>
                </div>
              )}
              {instrMetrics.mostSections && (
                <div className="spotlight-card amber">
                  <div className="spot-cat">Most Sections</div>
                  <div className="spot-name">{instrMetrics.mostSections.name}</div>
                  <div className="spot-value">{instrMetrics.mostSections.sections}</div>
                  <div className="spot-sub">{instrMetrics.mostSections.enrolled} enrolled · {fmt(instrMetrics.mostSections.net)} net</div>
                </div>
              )}
              {instrMetrics.topRefund && (
                <div className="spotlight-card red">
                  <div className="spot-cat">Top Refunds</div>
                  <div className="spot-name">{instrMetrics.topRefund.name}</div>
                  <div className="spot-value">{fmt(instrMetrics.topRefund.refunded)}</div>
                  <div className="spot-sub">{fmtPct(instrMetrics.topRefund.paid > 0 ? instrMetrics.topRefund.refunded / instrMetrics.topRefund.paid : 0)} of {fmt(instrMetrics.topRefund.paid)} paid</div>
                </div>
              )}
            </div>
          </div>
        )}

        {/* Table */}
        {filtered.length === 0 ? (
          <div className="empty-state"><p>No sections match your filters.</p></div>
        ) : (
          <div className="table-wrapper">
            <table>
              <thead>
                <tr>
                  <th className="left">Section</th>
                  <th className="left">Program</th>
                  <th className="left">Dates</th>
                  <th>Price</th>
                  <th>Enrolled</th>
                  <th>Paid</th>
                  <th>Refunded</th>
                  <th>Net Revenue</th>
                  <th>Instr ({iPct}%)</th>
                  <th>Org ({oPct}%)</th>
                </tr>
              </thead>
              <tbody>
                {grouped.map(([instr, sections]) => {
                  const sub = sections.reduce((a, r) => ({ net: a.net+r.net, paid: a.paid+r.paid, ref: a.ref+r.refunded, enr: a.enr+r.enrolled, cap: a.cap+r.capacity }), { net:0, paid:0, ref:0, enr:0, cap:0 });
                  return (
                    <React.Fragment key={instr}>
                      <tr className="group-header">
                        <td colSpan={10}>
                          {instr}
                          <span className="group-meta">{sections.length} section{sections.length !== 1 ? 's' : ''} · {sub.enr} enrolled · Net {fmt(sub.net)}</span>
                        </td>
                      </tr>
                      {sections.map((r, i) => {
                        const fp = r.capacity > 0 ? r.enrolled / r.capacity : 0;
                        return (
                          <tr key={i}>
                            <td className="left">{r.section}{r.canceled && <span className="canceled">Canceled</span>}</td>
                            <td className="left" style={{color:'#888', fontSize:11}}>{r.program}</td>
                            <td className="left" style={{fontSize:11, whiteSpace:'nowrap'}}>{fmtDate(r.startDate)}{r.endDate && r.startDate !== r.endDate ? ' – '+fmtDate(r.endDate) : ''}</td>
                            <td>{fmt(r.price)}</td>
                            <td style={{textAlign:'center'}}>
                              {r.enrolled}/{r.capacity}
                              <span className="fill-bar"><span className="fill-bar-inner" style={{width:(fp*100)+'%', background:fillColor(fp)}}></span></span>
                            </td>
                            <td>{fmt(r.paid)}</td>
                            <td className={v(r.refunded)}>{r.refunded > 0 ? fmt(r.refunded) : '—'}</td>
                            <td style={{fontWeight:600}}>{fmt(r.net)}</td>
                            <td className={v(r.net * split.i)}>{fmt(r.net * split.i)}</td>
                            <td className={v(r.net * (1-split.i))}>{fmt(r.net * (1-split.i))}</td>
                          </tr>
                        );
                      })}
                      <tr className="subtotal-row">
                        <td className="left" colSpan={3}>Subtotal — {instr}</td>
                        <td></td>
                        <td style={{textAlign:'center'}}>{sub.enr}/{sub.cap}</td>
                        <td>{fmt(sub.paid)}</td>
                        <td className={v(sub.ref)}>{fmt(sub.ref)}</td>
                        <td>{fmt(sub.net)}</td>
                        <td>{fmt(sub.net * split.i)}</td>
                        <td>{fmt(sub.net * (1-split.i))}</td>
                      </tr>
                    </React.Fragment>
                  );
                })}
              </tbody>
              <tfoot>
                <tr>
                  <td className="left" colSpan={3} style={{textAlign:'left'}}>GRAND TOTAL</td>
                  <td></td>
                  <td style={{textAlign:'center'}}>{kpis.tEnr}/{kpis.tCap}</td>
                  <td style={{textAlign:'right'}}>{fmt(kpis.tPaid)}</td>
                  <td style={{textAlign:'right'}}>{fmt(kpis.tRef)}</td>
                  <td style={{textAlign:'right'}}>{fmt(kpis.tNet)}</td>
                  <td style={{textAlign:'right'}}>{fmt(kpis.iPay)}</td>
                  <td style={{textAlign:'right'}}>{fmt(kpis.oRet)}</td>
                </tr>
              </tfoot>
            </table>
          </div>
        )}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
