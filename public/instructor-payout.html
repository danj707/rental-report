<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Instructor Payout Report</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'IBM Plex Sans', 'Segoe UI', system-ui, sans-serif; font-size: 12px; color: #1a1a1a; background: #f5f4f1; line-height: 1.35; }

    /* ── Toolbar ── */
    .toolbar { position: sticky; top: 0; z-index: 100; display: flex; align-items: center; gap: 10px; padding: 8px 20px; background: #2c2c2c; color: #eee; font-size: 13px; flex-wrap: wrap; }
    .toolbar-title { font-weight: 600; margin-right: 8px; }
    .toolbar-spacer { flex: 1; }
    .toolbar label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.5px; color: #aaa; display: flex; flex-direction: column; gap: 2px; }
    .toolbar select, .toolbar input[type="text"] { padding: 4px 8px; border: 1px solid rgba(255,255,255,.2); border-radius: 4px; background: rgba(255,255,255,.1); color: #fff; font-size: 12px; font-family: inherit; outline: none; }
    .toolbar select:focus, .toolbar input[type="text"]:focus { border-color: #3b82f6; }
    .toolbar select option { background: #2c2c2c; color: #fff; }
    .toolbar button { padding: 6px 14px; border: 1px solid rgba(255,255,255,.25); border-radius: 4px; background: rgba(255,255,255,.08); color: #fff; font-size: 12px; font-family: inherit; cursor: pointer; transition: background .15s; }
    .toolbar button:hover { background: rgba(255,255,255,.18); }
    .toolbar .btn-excel { background: #16803c; border-color: #16803c; font-weight: 600; }
    .toolbar .btn-excel:hover { background: #15692f; }
    .toolbar .btn-pdf { background: #3b82f6; border-color: #3b82f6; font-weight: 600; }
    .toolbar .btn-pdf:hover { background: #2563eb; }
    .toolbar .btn-pdf:disabled { opacity: .5; cursor: not-allowed; }
    .toolbar .btn-print { background: rgba(255,255,255,.08); font-weight: 500; }
    .toolbar .divider { width: 1px; height: 28px; background: rgba(255,255,255,.15); margin: 0 4px; }
    .toolbar .row-count { font-size: 11px; color: #aaa; }

    /* ── Split pill bar (in toolbar) ── */
    .split-bar { display: inline-flex; border-radius: 4px; overflow: hidden; border: 1px solid rgba(255,255,255,.2); }
    .split-bar button { padding: 4px 10px; font-size: 11px; font-weight: 600; border: none; border-right: 1px solid rgba(255,255,255,.15); background: rgba(255,255,255,.06); color: #aaa; cursor: pointer; transition: all .15s; border-radius: 0; }
    .split-bar button:last-child { border-right: none; }
    .split-bar button.active { background: #3b82f6; color: #fff; }
    .split-bar button:hover:not(.active) { background: rgba(255,255,255,.14); color: #ddd; }

    /* ── Page ── */
    .page { max-width: 1320px; margin: 16px auto; padding: 24px 28px; background: #fff; box-shadow: 0 1px 4px rgba(0,0,0,.08); }

    /* ── Report header ── */
    .report-header { display: flex; justify-content: space-between; align-items: flex-end; border-bottom: 2.5px solid #111; padding-bottom: 8px; margin-bottom: 16px; }
    .report-header-logo { height: 42px; max-width: 140px; object-fit: contain; object-position: left center; }
    .report-header .org-label { font-size: 10.5px; letter-spacing: 1.6px; text-transform: uppercase; color: #777; font-weight: 600; }
    .report-header .title { font-size: 17px; font-weight: 700; margin-top: 1px; }
    .report-header .date-range { font-size: 11px; color: #666; text-align: right; }

    /* ── Summary cards ── */
    .summary-cards { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
    .summary-card { flex: 1; min-width: 120px; padding: 10px 12px; border-radius: 5px; background: #f8f8f6; border: 1px solid #e4e4e0; border-left: 3px solid #ccc; }
    .summary-card .card-label { font-size: 9.5px; text-transform: uppercase; letter-spacing: 0.5px; color: #888; font-weight: 600; margin-bottom: 4px; }
    .summary-card .card-value { font-size: 15px; font-weight: 700; font-family: 'IBM Plex Mono', monospace; white-space: nowrap; }
    .summary-card .card-sub { font-size: 10px; color: #999; margin-top: 2px; }
    .summary-card.green  { border-left-color: #16a34a; } .summary-card.green  .card-value { color: #15803d; }
    .summary-card.blue   { border-left-color: #3b82f6; } .summary-card.blue   .card-value { color: #2563eb; }
    .summary-card.red    { border-left-color: #ef4444; } .summary-card.red    .card-value { color: #dc2626; }
    .summary-card.violet { border-left-color: #7c3aed; } .summary-card.violet .card-value { color: #6d28d9; }
    .summary-card.indigo { border-left-color: #4f46e5; } .summary-card.indigo .card-value { color: #4338ca; }
    .summary-card.amber  { border-left-color: #d97706; } .summary-card.amber  .card-value { color: #b45309; }
    .summary-card.teal   { border-left-color: #0d9488; } .summary-card.teal   .card-value { color: #0f766e; }
    .summary-card.slate  { border-left-color: #475569; } .summary-card.slate  .card-value { color: #334155; }

    /* ── Table ── */
    .table-wrapper { overflow-x: auto; }
    table { border-collapse: collapse; width: 100%; font-size: 11.5px; }
    thead th { background: #e4e4e0; border: 1px solid #ccc; padding: 5px 8px; text-align: right; font-weight: 600; font-size: 10px; text-transform: uppercase; letter-spacing: 0.3px; color: #333; white-space: nowrap; }
    thead th.left { text-align: left; }
    tbody td { padding: 5px 8px; border-bottom: 1px solid #eee; text-align: right; font-variant-numeric: tabular-nums; }
    tbody td.left { text-align: left; }
    tbody tr:hover { background: #fafaf8; }

    /* Instructor group header */
    tr.group-header td { background: #f0ede7; padding: 7px 8px; font-weight: 700; font-size: 11.5px; color: #333; border-bottom: 1.5px solid #d5d2cc; text-align: left; }
    tr.group-header td .group-meta { font-weight: 400; font-size: 10px; color: #888; margin-left: 10px; }

    /* Subtotal row */
    tr.subtotal-row td { background: #edeae4; padding: 5px 8px; font-weight: 700; font-size: 11px; font-variant-numeric: tabular-nums; border-top: 1px solid #ccc; border-bottom: 2px solid #bbb; color: #444; }
    tr.subtotal-row td.left { text-align: left; font-style: italic; color: #888; }

    /* Grand total */
    tfoot td { background: #2c2c2c; color: #fff; padding: 7px 8px; font-weight: 700; font-size: 11.5px; font-variant-numeric: tabular-nums; }

    .zero { color: #ccc; }
    .neg { color: #dc2626; }
    .canceled { display: inline-block; background: #fee2e2; color: #b91c1c; font-size: 9px; font-weight: 600; padding: 1px 5px; border-radius: 3px; margin-left: 5px; text-transform: uppercase; }
    .fill-bar { display: inline-block; width: 40px; height: 5px; background: #e4e4e0; border-radius: 2px; overflow: hidden; vertical-align: middle; margin-left: 4px; }
    .fill-bar-inner { height: 100%; border-radius: 2px; }

    /* ── Instructor spotlight ── */
    .spotlight-section { margin-bottom: 20px; }
    .spotlight-label { font-size: 9.5px; text-transform: uppercase; letter-spacing: 1px; color: #999; font-weight: 600; margin-bottom: 8px; }
    .spotlight-cards { display: flex; gap: 10px; flex-wrap: wrap; }
    .spotlight-card { flex: 1; min-width: 150px; max-width: 220px; padding: 10px 12px; border-radius: 5px; background: #f8f8f6; border: 1px solid #e4e4e0; border-left: 3px solid #ccc; }
    .spotlight-card .spot-cat { font-size: 9px; text-transform: uppercase; letter-spacing: 0.5px; color: #aaa; font-weight: 600; margin-bottom: 2px; }
    .spotlight-card .spot-name { font-size: 13px; font-weight: 700; color: #222; margin-bottom: 3px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .spotlight-card .spot-value { font-size: 14px; font-weight: 700; font-family: 'IBM Plex Mono', monospace; }
    .spotlight-card .spot-sub { font-size: 10px; color: #999; margin-top: 1px; }
    .spotlight-card.green  { border-left-color: #16a34a; } .spotlight-card.green  .spot-value { color: #15803d; }
    .spotlight-card.blue   { border-left-color: #3b82f6; } .spotlight-card.blue   .spot-value { color: #2563eb; }
    .spotlight-card.red    { border-left-color: #ef4444; } .spotlight-card.red    .spot-value { color: #dc2626; }
    .spotlight-card.violet { border-left-color: #7c3aed; } .spotlight-card.violet .spot-value { color: #6d28d9; }
    .spotlight-card.amber  { border-left-color: #d97706; } .spotlight-card.amber  .spot-value { color: #b45309; }
    .spotlight-card.teal   { border-left-color: #0d9488; } .spotlight-card.teal   .spot-value { color: #0f766e; }

    /* ── Empty / loading ── */
    .empty-state { text-align: center; padding: 60px 20px; color: #888; }
    .empty-state p { font-size: 14px; }

    /* ── Print ── */
    @media print { .toolbar { display: none !important; } body { background: #fff; } .page { margin: 0; padding: 10px; box-shadow: none; max-width: 100%; } }
    body.print-mode .toolbar { display: none !important; }
    body.print-mode { background: #fff; }
    body.print-mode .page { margin: 0; padding: 10px; box-shadow: none; max-width: 100%; }

    /* ── AI Insights ── */
    .insights-section { margin: 0 0 16px; padding: 16px 0 0; }
    .insights-head { display: flex; align-items: center; gap: 12px; margin-bottom: 10px; }
    .insights-btn { background: linear-gradient(135deg, #6366f1, #8b5cf6); color: #fff; border: none; border-radius: 8px; padding: 8px 18px; font-size: 13px; font-weight: 600; cursor: pointer; font-family: inherit; }
    .insights-btn:hover { filter: brightness(1.08); }
    .insights-btn:disabled { opacity: .6; cursor: wait; }
    .insights-sub { font-size: 12px; color: #888; }
    .insights-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(230px, 1fr)); gap: 12px; }
    .insight-card { border: 1px solid #e5e7eb; border-left-width: 4px; border-radius: 8px; padding: 14px 16px; background: #fff; }
    .insight-opportunity { border-left-color: #10b981; } .insight-opportunity .insight-type { color: #059669; }
    .insight-risk { border-left-color: #ef4444; } .insight-risk .insight-type { color: #dc2626; }
    .insight-signal { border-left-color: #3b82f6; } .insight-signal .insight-type { color: #2563eb; }
    .insight-type { font-size: 10px; font-weight: 700; letter-spacing: .6px; text-transform: uppercase; margin-bottom: 6px; }
    .insight-title { font-size: 14px; font-weight: 700; color: #111827; margin-bottom: 5px; line-height: 1.3; }
    .insight-detail { font-size: 13px; color: #4b5563; line-height: 1.5; }
    .insight-action { font-size: 12px; color: #6b7280; margin-top: 8px; font-weight: 500; }
    .insights-feedback { display:flex; align-items:center; gap:8px; margin-top:12px; padding:8px 4px; font-size:13px; color:#666; }
    .insights-feedback button { background:none; border:1px solid #e5e7eb; border-radius:6px; padding:4px 10px; cursor:pointer; font-size:13px; transition:all .15s; }
    .insights-feedback button:hover { background:#f3f4f6; border-color:#d1d5db; }
    .insights-feedback .fb-label { color:#888; font-size:12px; }
    .insights-feedback .fb-thanks { color:#10b981; font-weight:600; font-size:13px; }
    .insights-feedback .fb-down-form { display:flex; align-items:center; gap:6px; flex:1; }
    .insights-feedback .fb-down-form input { flex:1; border:1px solid #d1d5db; border-radius:6px; padding:5px 10px; font-size:13px; font-family:inherit; outline:none; }
    .insights-feedback .fb-down-form input:focus { border-color:#6366f1; box-shadow:0 0 0 2px rgba(99,102,241,.15); }
    .insights-feedback .fb-send { background:#6366f1!important; color:#fff!important; border-color:#6366f1!important; font-weight:600; }
    .insights-feedback .fb-send:hover { background:#4f46e5!important; }
    .ai-loading { padding: 24px 16px; text-align: center; }
    .ai-spinner { border:3px solid #e5e7eb; border-top:3px solid #6366f1; border-radius:50%; width:24px; height:24px; margin:0 auto; animation:ai-spin 1s linear infinite; }
    @keyframes ai-spin { to { transform:rotate(360deg); } }
  </style>
  <script>
    const URL_TOKEN = new URLSearchParams(window.location.search).get('token') || '';
    const TOKEN_QS  = URL_TOKEN ? '?token=' + encodeURIComponent(URL_TOKEN) : '';
    function withToken(url) {
      if (!URL_TOKEN) return url;
      return url + (url.includes('?') ? '&' : '?') + 'token=' + encodeURIComponent(URL_TOKEN);
    }
  </script>
</head>
<body>
<div id="root"></div>
<div id="report-ready" style="display:none"></div>

<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
<script src="/juice-loader.js"></script>
<script type="text/babel">
const { useState, useEffect, useMemo, useCallback } = React;

const fmt = (n) => n == null ? '$0.00' : '$' + Number(n).toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
const fmtPct = (n) => (n * 100).toFixed(1) + '%';
const parts = window.location.pathname.split('/').filter(Boolean);
const orgSlug = parts[0] || '';
const reportType = parts[1] || 'instructor-payout';

const SPLITS = [
  { label: '90/10', i: 0.90 },
  { label: '80/20', i: 0.80 },
  { label: '70/30', i: 0.70 },
  { label: '65/35', i: 0.65 },
  { label: '60/40', i: 0.60 },
  { label: '50/50', i: 0.50 },
];

function fmtDate(d) {
  if (!d) return '';
  try { return new Date(d).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' }); }
  catch { return d; }
}

function App() {
  const [rows, setRows]       = useState(null);
  const [loading, setLoading] = useState(true);
  const [error, setError]     = useState(null);
  const _initParams = useMemo(() => new URLSearchParams(window.location.search), []);
  const [splitIdx, setSplitIdx] = useState(() => {
    const si = parseInt(_initParams.get('split'));

  // ── AI Insights ──
  const buildInsightsBlob = useCallback(() => {
    if (!rows || !rows.length) return null;
    const byInstructor = {};
    rows.forEach(r => { const inst = r.instructor||r.instructorName||'Unknown';
      if (!byInstructor[inst]) byInstructor[inst] = {participants:0,revenue:0,sections: new Set()};
      byInstructor[inst].participants++;
      byInstructor[inst].revenue += Number(r.split||r.instructorPayout||r.revenue||0);
      byInstructor[inst].sections.add(r.section||r.program||''); });
    const summary = Object.entries(byInstructor).map(([name,d]) => ({name, participants:d.participants, revenue:d.revenue, sections:d.sections.size}));
    return { rowCount: rows.length, instructorCount: summary.length, instructors: summary.sort((a,b)=>b.revenue-a.revenue).slice(0,15) };
  }, [rows]);

  const sendInsightsFeedback = useCallback((score) => {
    if (!insightsTraceId) return;
    fetch(withToken('/' + orgSlug + '/' + reportType + '/api/insights/score'), {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ traceId: insightsTraceId, score, comment: score === 0 ? fbComment : '' }),
    }).catch(() => {});
    setFbSent(true); setFbMode(null);
  }, [insightsTraceId, fbComment]);

  const getInsights = useCallback(async () => {
    const blob = buildInsightsBlob();
    if (!blob) return;
    setInsightsLoading(true); setInsightsError(null);
    try {
      const resp = await fetch(withToken('/' + orgSlug + '/' + reportType + '/api/insights'), {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(blob),
      });
      const json = await resp.json().catch(() => ({}));
      if (!resp.ok || !json.ok) throw new Error(json.error || 'Request failed');
      setInsights(json.insights || []);
      setInsightsTraceId(json.traceId || null);
      setFbSent(false); setFbMode(null); setFbComment('');
    } catch (err) {
      setInsightsError(err.message);
    } finally {
      setInsightsLoading(false);
    }
  }, [buildInsightsBlob]);

  return (si >= 0 && si < SPLITS.length) ? si : 2;
  }); // 70/30 default
  const [search, setSearch]     = useState(_initParams.get('search') || '');
  const [instrFilter, setInstrFilter] = useState(_initParams.get('instructor') || '');
  const [pdfLoading, setPdfLoading] = useState(false);
  const [orgName, setOrgName] = useState('');
  const [logoUrl, setLogoUrl] = useState(null);
  const [basePriceOnly, setBasePriceOnly] = useState(false);
  const [expandedSections, setExpandedSections] = useState(new Set());
  const [insights, setInsights] = useState(null);
  const [insightsLoading, setInsightsLoading] = useState(false);
  const [insightsError, setInsightsError] = useState(null);
  const [insightsTraceId, setInsightsTraceId] = useState(null);
  const [fbSent, setFbSent] = useState(false);
  const [fbMode, setFbMode] = useState(null);
  const [fbComment, setFbComment] = useState('');

  const split = SPLITS[splitIdx];
  const iPct = Math.round(split.i * 100);
  const oPct = 100 - iPct;

  // Print mode
  useEffect(() => {
    if (new URLSearchParams(window.location.search).get('_print') === '1') document.body.classList.add('print-mode');
  }, []);

  // Fetch
  useEffect(() => {
    setLoading(true);
    fetch(withToken(`/${orgSlug}/${reportType}/api/data`))
      .then(r => { if (!r.ok) throw new Error(r.status); return r.json(); })
      .then(json => {
        const data = json.rows || json;
        setRows(Array.isArray(data) ? data : []);
        setOrgName(json.meta?.org_name || '');
        setLogoUrl(json.meta?.logo_url || null);
        setLoading(false);
        document.getElementById('report-ready').style.display = 'block';
      })
      .catch(e => { setError(e.message); setLoading(false); });
  }, []);

  // Normalize — aggregate participant rows into sections
  const normalized = useMemo(() => {
    if (!rows) return [];
    var smap = new Map();
    rows.forEach(function(r) {
      var sid = r['section_id'] || (r['section_name'] + '|' + r['instructor']);
      if (!smap.has(sid)) {
        smap.set(sid, {
          program:  r['program_name']  || r['Program Name']  || '',
          section:  r['section_name']  || r['Section Name']  || '',
          sectionId: sid,
          instr:    r['instructor'] || r['facilitator_name'] || r['Facilitator Name'] || '',
          canceled: false,
          startDate: '',
          endDate:   '',
          participants: [],
        });
      }
      smap.get(sid).participants.push({
        name: r['participant_name'] || 'Unknown',
        signupDate: r['signup_date'] || '',
        basePrice: Number(r['base_price'] || 0),
        finalPrice: Number(r['final_price'] || 0),
        listPrice: Number(r['list_price'] || 0),
        priceType: r['price_type'] || 'Standard',
        paid: Number(r['amount_paid'] || 0),
        refunded: Number(r['amount_refunded'] || 0),
        canceled: (r['booking_status'] || '') === 'Canceled',
      });
    });
    return [...smap.values()].map(function(s) {
      var enrolled = s.participants.filter(function(p) { return !p.canceled; }).length;
      var allCount = s.participants.length;
      var activeParticipants = s.participants.filter(function(p) { return !p.canceled; });
      var paid = s.participants.reduce(function(sum, p) { return sum + p.paid; }, 0);
      var refunded = s.participants.reduce(function(sum, p) { return sum + p.refunded; }, 0);
      var price = allCount > 0 ? s.participants[0].basePrice : 0;
      // Resident base rate = lowest final_price among active group/resident participants
      var grpParticipants = activeParticipants.filter(function(p) { return p.priceType === 'Group/Resident'; });
      var residentRate = grpParticipants.length > 0
        ? Math.min.apply(null, grpParticipants.map(function(p) { return p.finalPrice; }))
        : price;
      var residentBaseTotal = residentRate * enrolled; // only active participants
      return Object.assign({}, s, {
        price: price,
        residentRate: residentRate,
        capacity: enrolled,
        enrolled: enrolled,
        totalParticipants: allCount,
        paid: paid,
        refunded: refunded,
        net: paid - refunded,
        baseTotal: residentBaseTotal,
      });
    });
  }, [rows]);

  // Filter
  const filtered = useMemo(() => {
    let d = normalized;
    if (instrFilter) d = d.filter(r => r.instr === instrFilter);
    if (search) { const words = search.toLowerCase().split(/\s+/).filter(Boolean); d = d.filter(r => { const hay = (r.section + ' ' + r.program + ' ' + r.instr).toLowerCase(); return words.every(w => hay.includes(w)); }); }
    return d;
  }, [normalized, instrFilter, search]);

  const instructors = useMemo(() => [...new Set(normalized.map(r => r.instr))].sort(), [normalized]);

  const grouped = useMemo(() => {
    const m = new Map();
    filtered.forEach(r => { if (!m.has(r.instr)) m.set(r.instr, []); m.get(r.instr).push(r); });
    return [...m.entries()].sort((a, b) => a[0].localeCompare(b[0]));
  }, [filtered]);

  // KPIs
  const kpis = useMemo(() => {
    const tNet = filtered.reduce((s, r) => s + r.net, 0);
    const tPaid = filtered.reduce((s, r) => s + r.paid, 0);
    const tRef = filtered.reduce((s, r) => s + r.refunded, 0);
    const tEnr = filtered.reduce((s, r) => s + r.enrolled, 0);
    const tCap = filtered.reduce((s, r) => s + r.capacity, 0);
    const tBase = filtered.reduce((s, r) => s + r.baseTotal, 0);
    const uInstr = new Set(filtered.map(r => r.instr)).size;
    const cnt = filtered.length;
    const splitAmt = basePriceOnly ? tBase : tNet;
    return { tNet, tPaid, tRef, tEnr, tCap, tBase, uInstr, cnt, splitAmt,
      iPay: splitAmt * split.i, oRet: splitAmt * (1 - split.i),
      avgSec: cnt > 0 ? tNet / cnt : 0, avgInstr: uInstr > 0 ? tNet / uInstr : 0,
      fill: tCap > 0 ? tEnr / tCap : 0, refRate: tPaid > 0 ? tRef / tPaid : 0,
    };
  }, [filtered, split, basePriceOnly]);

  // Instructor spotlight metrics
  const instrMetrics = useMemo(() => {
    const map = new Map();
    filtered.forEach(r => {
      if (!map.has(r.instr)) map.set(r.instr, { name: r.instr, net: 0, paid: 0, refunded: 0, enrolled: 0, capacity: 0, sections: 0, baseTotal: 0 });
      const m = map.get(r.instr);
      m.net += r.net; m.paid += r.paid; m.refunded += r.refunded;
      m.enrolled += r.enrolled; m.capacity += r.capacity; m.sections += 1; m.baseTotal += r.baseTotal;
    });
    const list = [...map.values()].map(m => ({
      ...m,
      fill: m.capacity > 0 ? m.enrolled / m.capacity : 0,
      avgPerSection: m.sections > 0 ? m.net / m.sections : 0,
    }));
    if (list.length === 0) return null;
    const byNet = [...list].sort((a, b) => b.net - a.net);
    const byFill = [...list].filter(m => m.capacity > 0).sort((a, b) => b.fill - a.fill);
    const byRef = [...list].filter(m => m.refunded > 0).sort((a, b) => b.refunded - a.refunded);
    const byEnr = [...list].sort((a, b) => b.enrolled - a.enrolled);
    const bySec = [...list].sort((a, b) => b.sections - a.sections);
    const byAvg = [...list].filter(m => m.net > 0).sort((a, b) => b.avgPerSection - a.avgPerSection);
    return {
      topRev: byNet[0] || null,
      bestFill: byFill[0] || null,
      topRefund: byRef[0] || null,
      mostEnrolled: byEnr[0] || null,
      mostSections: bySec[0] || null,
      highestAvg: byAvg[0] || null,
    };
  }, [filtered]);

  // Excel
  const exportExcel = useCallback(() => {
    function go() {
      const h = ['Instructor','Program','Section','Base Price','Enrolled','Paid','Refunded', basePriceOnly ? 'Base Total' : 'Net',`Instructor (${iPct}%)`,`Org (${oPct}%)`];
      const d = filtered.map(r => { var sa = basePriceOnly ? r.baseTotal : r.net; return [r.instr, r.program, r.section, r.price, r.enrolled, r.paid, r.refunded, sa, Math.round(sa*split.i*100)/100, Math.round(sa*(1-split.i)*100)/100]; });
      d.push(['TOTALS','','','','','',kpis.tCap,kpis.tEnr,kpis.tPaid,kpis.tRef,kpis.tNet,Math.round(kpis.iPay*100)/100,Math.round(kpis.oRet*100)/100]);
      const ws = XLSX.utils.aoa_to_sheet([h,...d]);
      const wb = XLSX.utils.book_new();
      XLSX.utils.book_append_sheet(wb, ws, 'Instructor Payout');
      XLSX.writeFile(wb, `instructor-payout-${orgSlug}-${new Date().toISOString().slice(0,10)}.xlsx`);
      fetch(withToken(`/${orgSlug}/${reportType}/api/log`), { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({action:'excel',rows:filtered.length}) }).catch(()=>{});
    }
    if (typeof XLSX === 'undefined') { const s = document.createElement('script'); s.src='https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js'; s.onload=go; document.head.appendChild(s); } else go();
  }, [filtered, split, kpis, iPct, oPct]);

  // PDF download
  const downloadPdf = useCallback(() => {
    setPdfLoading(true);
    const qs = new URLSearchParams();
    if (splitIdx !== 2) qs.set('split', splitIdx);
    if (instrFilter) qs.set('instructor', instrFilter);
    if (search) qs.set('search', search);
    const pdfUrl = `/${orgSlug}/${reportType}/api/pdf?${qs}`;
    fetch(withToken(pdfUrl))
      .then(r => { if (!r.ok) throw new Error(r.status); return r.blob(); })
      .then(blob => {
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = `instructor-payout-${orgSlug}-${new Date().toISOString().slice(0,10)}.pdf`;
        a.click(); URL.revokeObjectURL(a.href);
      })
      .catch(err => alert('PDF generation failed: ' + err.message))
      .finally(() => setPdfLoading(false));
    fetch(withToken(`/${orgSlug}/${reportType}/api/log`), { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({action:'pdf',rows:filtered.length}) }).catch(()=>{});
  }, [splitIdx, instrFilter, search, filtered]);

  const fillColor = (p) => p >= 0.8 ? '#16a34a' : p >= 0.5 ? '#d97706' : '#ef4444';
  const v = (n) => n === 0 ? 'zero' : n < 0 ? 'neg' : '';

  if (loading) return React.createElement(window.JuiceLoader || 'div', { text: 'Loading instructor payout data...' });
  if (error) return (<div className="page" style={{margin:'40px auto'}}><div className="empty-state"><p>Error loading data: {error}</p></div></div>);

  const displayOrg = orgName || 'rec.us';

  return (
    <div>
      {/* ── Toolbar ── */}
      <div className="toolbar">
        <span className="toolbar-title">Instructor Payout</span>
        <span className="divider"></span>
        <label>
          Split
          <div className="split-bar">
            {SPLITS.map((s, i) => (
              <button key={i} className={i === splitIdx ? 'active' : ''} onClick={() => setSplitIdx(i)}>{s.label}</button>
            ))}
          </div>
        </label>
        <span className="divider"></span>
        <label>
          Instructor
          <select value={instrFilter} onChange={e => setInstrFilter(e.target.value)} style={{minWidth: 140}}>
            <option value="">All</option>
            {instructors.map(n => <option key={n} value={n}>{n}</option>)}
          </select>
        </label>
        <label style={{cursor:'pointer', flexDirection:'row', alignItems:'center', gap:'6px'}} title="When enabled, instructor split is calculated on the resident/base rate for every participant — not the amount they actually paid. Non-resident surcharges stay entirely with the organization. Use this when your instructor contract specifies payouts based on the standard class rate.">
          <input type="checkbox" checked={basePriceOnly} onChange={e => setBasePriceOnly(e.target.checked)} style={{accentColor:'#f59e0b'}} />
          <span style={{fontSize:'11px', color: basePriceOnly ? '#f59e0b' : '#aaa', fontWeight: basePriceOnly ? 600 : 400}}>Base Price Split</span>
          <span style={{display:'inline-flex', alignItems:'center', justifyContent:'center', width:14, height:14, borderRadius:'50%', background: basePriceOnly ? '#f59e0b' : '#ccc', color:'#fff', fontSize:9, fontStyle:'italic', fontFamily:'Georgia,serif', cursor:'help', marginLeft:2, flexShrink:0}}>i</span>
        </label>
        <label>
          Search
          <input type="text" placeholder="Section or program..." value={search} onChange={e => setSearch(e.target.value)} style={{minWidth: 150}} />
        </label>
        <span className="toolbar-spacer"></span>
        <span className="row-count">{filtered.length} section{filtered.length !== 1 ? 's' : ''} · {kpis.uInstr} instructor{kpis.uInstr !== 1 ? 's' : ''}</span>
        <span className="divider"></span>
        <button className="btn-pdf" onClick={downloadPdf} disabled={pdfLoading || !rows || rows.length === 0}>{pdfLoading ? 'Generating…' : '📄 PDF'}</button>
        <button className="btn-excel" onClick={exportExcel}>⬇ Excel</button>
        <button className="btn-print" onClick={() => window.print()}>🖨 Print</button>
      </div>

      {/* ── Page ── */}
      <div className="page">
        {/* Report header */}
        <div className="report-header">
          <div>
            {logoUrl && <img src={logoUrl} alt="" className="report-header-logo" onError={e => e.target.style.display='none'} />}
            <div className="org-label">{displayOrg}</div>
            <div className="title">Instructor Payout Report</div>
          </div>
          <div className="date-range">{iPct}% Instructor / {oPct}% Organization</div>
        </div>

        {/* Summary cards */}
        <div className="summary-cards">
          <div className="summary-card green">
            <div className="card-label">Net Revenue</div>
            <div className="card-value">{fmt(kpis.tNet)}</div>
            <div className="card-sub">{fmt(kpis.tPaid)} paid · {fmt(kpis.tRef)} refunded</div>
          </div>
          <div className="summary-card indigo">
            <div className="card-label">Instructor Payout</div>
            <div className="card-value">{fmt(kpis.iPay)}</div>
            <div className="card-sub">{iPct}% of {basePriceOnly ? 'base price' : 'net'} · {kpis.uInstr} instructors</div>
          </div>
          <div className="summary-card teal">
            <div className="card-label">Org Retention</div>
            <div className="card-value">{fmt(kpis.oRet)}</div>
            <div className="card-sub">{oPct}% of net revenue</div>
          </div>
          <div className="summary-card violet">
            <div className="card-label">Avg / Instructor</div>
            <div className="card-value">{fmt(kpis.avgInstr)}</div>
            <div className="card-sub">{kpis.uInstr} unique</div>
          </div>
          <div className="summary-card blue">
            <div className="card-label">Avg / Section</div>
            <div className="card-value">{fmt(kpis.avgSec)}</div>
            <div className="card-sub">{kpis.cnt} sections</div>
          </div>
          <div className="summary-card amber">
            <div className="card-label">Fill Rate</div>
            <div className="card-value">{fmtPct(kpis.fill)}</div>
            <div className="card-sub">{kpis.tEnr} / {kpis.tCap}</div>
          </div>
          <div className={`summary-card ${kpis.refRate > 0.1 ? 'red' : 'slate'}`}>
            <div className="card-label">Refund Rate</div>
            <div className="card-value">{fmtPct(kpis.refRate)}</div>
            <div className="card-sub">{fmt(kpis.tRef)} of {fmt(kpis.tPaid)}</div>
          </div>
        </div>

        {/* Instructor Spotlights */}
        {instrMetrics && (
          <div className="spotlight-section">
            <div className="spotlight-label">Instructor Spotlights</div>
            <div className="spotlight-cards">
              {instrMetrics.topRev && (
                <div className="spotlight-card green">
                  <div className="spot-cat">Top Revenue</div>
                  <div className="spot-name">{instrMetrics.topRev.name}</div>
                  <div className="spot-value">{fmt(instrMetrics.topRev.net)}</div>
                  <div className="spot-sub">{instrMetrics.topRev.sections} sections · {instrMetrics.topRev.enrolled} enrolled</div>
                </div>
              )}
              {instrMetrics.bestFill && (
                <div className="spotlight-card teal">
                  <div className="spot-cat">Best Fill Rate</div>
                  <div className="spot-name">{instrMetrics.bestFill.name}</div>
                  <div className="spot-value">{fmtPct(instrMetrics.bestFill.fill)}</div>
                  <div className="spot-sub">{instrMetrics.bestFill.enrolled}/{instrMetrics.bestFill.capacity} across {instrMetrics.bestFill.sections} sections</div>
                </div>
              )}
              {instrMetrics.mostEnrolled && (
                <div className="spotlight-card blue">
                  <div className="spot-cat">Most Enrolled</div>
                  <div className="spot-name">{instrMetrics.mostEnrolled.name}</div>
                  <div className="spot-value">{instrMetrics.mostEnrolled.enrolled}</div>
                  <div className="spot-sub">{instrMetrics.mostEnrolled.sections} sections · {fmt(instrMetrics.mostEnrolled.net)} net</div>
                </div>
              )}
              {instrMetrics.highestAvg && (
                <div className="spotlight-card violet">
                  <div className="spot-cat">Highest Avg/Section</div>
                  <div className="spot-name">{instrMetrics.highestAvg.name}</div>
                  <div className="spot-value">{fmt(instrMetrics.highestAvg.avgPerSection)}</div>
                  <div className="spot-sub">{fmt(instrMetrics.highestAvg.net)} across {instrMetrics.highestAvg.sections} sections</div>
                </div>
              )}
              {instrMetrics.mostSections && (
                <div className="spotlight-card amber">
                  <div className="spot-cat">Most Sections</div>
                  <div className="spot-name">{instrMetrics.mostSections.name}</div>
                  <div className="spot-value">{instrMetrics.mostSections.sections}</div>
                  <div className="spot-sub">{instrMetrics.mostSections.enrolled} enrolled · {fmt(instrMetrics.mostSections.net)} net</div>
                </div>
              )}
              {instrMetrics.topRefund && (
                <div className="spotlight-card red">
                  <div className="spot-cat">Top Refunds</div>
                  <div className="spot-name">{instrMetrics.topRefund.name}</div>
                  <div className="spot-value">{fmt(instrMetrics.topRefund.refunded)}</div>
                  <div className="spot-sub">{fmtPct(instrMetrics.topRefund.paid > 0 ? instrMetrics.topRefund.refunded / instrMetrics.topRefund.paid : 0)} of {fmt(instrMetrics.topRefund.paid)} paid</div>
                </div>
              )}
            </div>
          </div>
        )}


        {/* AI Insights */}
        {rows && rows.length > 0 && (
          <div className="insights-section no-print">
            <div className="insights-head">
              <button type="button" className="insights-btn" onClick={getInsights} disabled={insightsLoading}>
                {insightsLoading ? 'Analyzing…' : (insights ? '↻ Refresh' : '✨ Rec Insights')}
              </button>
              {insights && !insightsLoading && (
                <span className="insights-sub">{'Analyzed ' + rows.length + ' participants'}</span>
              )}
            </div>
            {insightsLoading && <div className="ai-loading"><div className="ai-spinner" /></div>}
            {insightsError && !insightsLoading && (
              <div style={{color:'#dc2626',fontSize:13,padding:'8px 0'}}><strong>Insights unavailable:</strong> {insightsError}</div>
            )}
            {insights && !insightsLoading && (
              <div className="insights-grid">
                {insights.map((ins, i) => (
                  <div key={i} className={'insight-card insight-' + (ins.type || 'signal')}>
                    <div className="insight-type">{ins.type || 'signal'}</div>
                    <div className="insight-title">{ins.title}</div>
                    <div className="insight-detail">{ins.detail}</div>
                    {ins.action && <div className="insight-action">→ {ins.action}</div>}
                  </div>
                ))}
              </div>
            )}
            {insights && !insightsLoading && (
              <div className="insights-feedback">
                {fbSent ? (
                  <span className="fb-thanks">✅ Thanks for the feedback!</span>
                ) : fbMode === 'down' ? (
                  <div className="fb-down-form">
                    <input placeholder="What could be better?" value={fbComment}
                      onChange={e => setFbComment(e.target.value)}
                      onKeyDown={e => e.key === 'Enter' && sendInsightsFeedback(0)}
                      autoFocus maxLength={500} />
                    <button className="fb-send" onClick={() => sendInsightsFeedback(0)}>Send</button>
                    <button onClick={() => setFbMode(null)}>Cancel</button>
                  </div>
                ) : (
                  <React.Fragment>
                    <span className="fb-label">Were these insights helpful?</span>
                    <button onClick={() => sendInsightsFeedback(1)} title="Yes">👍</button>
                    <button onClick={() => setFbMode('down')} title="Not helpful">👎</button>
                  </React.Fragment>
                )}
              </div>
            )}
          </div>
        )}

        {/* Table */}
        {filtered.length === 0 ? (
          <div className="empty-state"><p>No sections match your filters.</p></div>
        ) : (
          <div className="table-wrapper">
            <table>
              <thead>
                <tr>
                  <th className="left" style={{width:'16px'}}></th>
                  <th className="left">Section</th>
                  <th className="left">Program</th>
                  <th>Base Price</th>
                  <th>Enrolled</th>
                  <th>Paid</th>
                  <th>Refunded</th>
                  <th>{basePriceOnly ? 'Base Total' : 'Net Revenue'}</th>
                  <th>Instr ({iPct}%)</th>
                  <th>Org ({oPct}%)</th>
                </tr>
              </thead>
              <tbody>
                {grouped.map(([instr, sections]) => {
                  const sub = sections.reduce((a, r) => ({ net: a.net+r.net, paid: a.paid+r.paid, ref: a.ref+r.refunded, enr: a.enr+r.enrolled, cap: a.cap+r.capacity, base: a.base+r.baseTotal }), { net:0, paid:0, ref:0, enr:0, cap:0, base:0 });
                  const subSplitAmt = basePriceOnly ? sub.base : sub.net;
                  return (
                    <React.Fragment key={instr}>
                      <tr className="group-header">
                        <td colSpan={10}>
                          {instr}
                          <span className="group-meta">{sections.length} section{sections.length !== 1 ? 's' : ''} · {sub.enr} enrolled · {basePriceOnly ? 'Base' : 'Net'} {fmt(basePriceOnly ? sub.base : sub.net)}</span>
                        </td>
                      </tr>
                      {sections.map((r, i) => {
                        var splitAmt = basePriceOnly ? r.baseTotal : r.net;
                        var isExpanded = expandedSections.has(r.sectionId);
                        return (
                          <React.Fragment key={i}>
                            <tr style={{cursor:'pointer'}} onClick={() => {
                              var next = new Set(expandedSections);
                              if (next.has(r.sectionId)) next.delete(r.sectionId); else next.add(r.sectionId);
                              setExpandedSections(next);
                            }}>
                              <td style={{textAlign:'center', fontSize:10, color:'#999'}}>{isExpanded ? '\u25BC' : '\u25B6'}</td>
                              <td className="left">{r.section}{r.canceled && <span className="canceled">Canceled</span>}</td>
                              <td className="left" style={{color:'#888', fontSize:11}}>{r.program}</td>
                              <td>{fmt(r.price)}</td>
                              <td style={{textAlign:'center'}}>{r.enrolled}</td>
                              <td>{fmt(r.paid)}</td>
                              <td className={v(r.refunded)}>{r.refunded > 0 ? fmt(r.refunded) : '\u2014'}</td>
                              <td style={{fontWeight:600}}>{fmt(splitAmt)}</td>
                              <td className={v(splitAmt * split.i)}>{fmt(splitAmt * split.i)}</td>
                              <td className={v(splitAmt * (1-split.i))}>{fmt(splitAmt * (1-split.i))}</td>
                            </tr>
                            {isExpanded && r.participants && r.participants.map((p, pi) => {
                              var pCanceled = p.canceled;
                              var pSplitBase = pCanceled ? 0 : (basePriceOnly ? r.residentRate : (p.paid - p.refunded));
                              var rowStyle = pCanceled
                                ? {background:'#fef2f2', fontSize:'10.5px', textDecoration:'line-through', color:'#dc2626'}
                                : {background:'#fafaf8', fontSize:'10.5px'};
                              return (
                              <tr key={'p'+pi} style={rowStyle}>
                                <td></td>
                                <td className="left" style={{paddingLeft:24}}>
                                  {p.name}
                                  {pCanceled && <span style={{textDecoration:'none', marginLeft:6, fontSize:9, padding:'1px 5px', borderRadius:3, background:'#fee2e2', color:'#b91c1c', fontWeight:600}}>CANCELED</span>}
                                </td>
                                <td className="left" style={{color: pCanceled ? '#dc2626' : '#aaa'}}>{p.signupDate}</td>
                                <td style={{color: pCanceled ? '#dc2626' : (p.priceType === 'Group/Resident' ? '#2563eb' : '#666')}}>{fmt(basePriceOnly ? r.residentRate : p.finalPrice)}{!pCanceled && p.priceType === 'Group/Resident' && <span style={{fontSize:9, marginLeft:3, color:'#93c5fd', textDecoration:'none'}}>R</span>}</td>
                                <td style={{textAlign:'center', color:'#aaa'}}>
                                  {pCanceled
                                    ? <span style={{fontSize:9, padding:'1px 5px', borderRadius:3, background:'#fee2e2', color:'#b91c1c', textDecoration:'none'}}>REF</span>
                                    : <span style={{fontSize:9, padding:'1px 5px', borderRadius:3, background: p.priceType === 'Standard' ? '#f5f5f5' : '#eff6ff', color: p.priceType === 'Standard' ? '#999' : '#3b82f6'}}>{p.priceType === 'Standard' ? 'STD' : 'GRP'}</span>
                                  }
                                </td>
                                <td>{fmt(p.paid)}</td>
                                <td style={{color: p.refunded > 0 ? '#dc2626' : '#ccc'}}>{p.refunded > 0 ? fmt(p.refunded) : '\u2014'}</td>
                                <td style={{fontWeight:500, color: pCanceled ? '#dc2626' : undefined}}>{pCanceled ? '$0.00' : fmt(pSplitBase)}</td>
                                <td style={{color: pCanceled ? '#dc2626' : '#16a34a'}}>{pCanceled ? '$0.00' : fmt(pSplitBase * split.i)}</td>
                                <td style={{color: pCanceled ? '#dc2626' : '#666'}}>{pCanceled ? '$0.00' : fmt(pSplitBase * (1-split.i))}</td>
                              </tr>
                              );
                            })}
                          </React.Fragment>
                        );
                      })}
                      <tr className="subtotal-row">
                        <td></td>
                        <td className="left" colSpan={2}>Subtotal — {instr}</td>
                        <td></td>
                        <td style={{textAlign:'center'}}>{sub.enr}</td>
                        <td>{fmt(sub.paid)}</td>
                        <td className={v(sub.ref)}>{fmt(sub.ref)}</td>
                        <td>{fmt(subSplitAmt)}</td>
                        <td>{fmt(subSplitAmt * split.i)}</td>
                        <td>{fmt(subSplitAmt * (1-split.i))}</td>
                      </tr>
                    </React.Fragment>
                  );
                })}
              </tbody>
              <tfoot>
                <tr>
                  <td></td>
                  <td className="left" colSpan={2} style={{textAlign:'left'}}>GRAND TOTAL</td>
                  <td></td>
                  <td style={{textAlign:'center'}}>{kpis.tEnr}</td>
                  <td style={{textAlign:'right'}}>{fmt(kpis.tPaid)}</td>
                  <td style={{textAlign:'right'}}>{fmt(kpis.tRef)}</td>
                  <td style={{textAlign:'right'}}>{fmt(kpis.splitAmt)}</td>
                  <td style={{textAlign:'right'}}>{fmt(kpis.iPay)}</td>
                  <td style={{textAlign:'right'}}>{fmt(kpis.oRet)}</td>
                </tr>
              </tfoot>
            </table>
          </div>
        )}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
