<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Products — Month over Month</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Inter', sans-serif; background: #f1f5f9; color: #0f172a; -webkit-font-smoothing: antialiased; }
    input, button, select { font-family: inherit; }
    ::-webkit-scrollbar { height: 6px; width: 6px; }
    ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useMemo, useEffect, useCallback, useRef } = React;

const fmt$ = v => v == null ? '—' : '$' + Number(v).toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
const fmtN = v => v == null ? '—' : Number(v).toLocaleString();
const fmtMonth = m => { if (!m) return ''; const d = new Date(m + 'T12:00:00Z'); return d.toLocaleDateString('en-US', { year: 'numeric', month: 'short', timeZone: 'UTC' }); };
const PALETTE = ['#2563eb','#16a34a','#dc2626','#d97706','#7c3aed','#0891b2','#be185d','#65a30d','#c2410c','#1d4ed8','#15803d','#b91c1c'];

function App() {
  const [rows,          setRows]          = useState([]);
  const [loading,       setLoading]       = useState(false);
  const [error,         setError]         = useState(null);
  const [hasRun,        setHasRun]        = useState(false);
  const [startDate,     setStartDate]     = useState('');
  const [endDate,       setEndDate]       = useState('');
  const [locationInput, setLocationInput] = useState('');
  const [viewMode,      setViewMode]      = useState('revenue'); // revenue | qty | both
  const [showChart,     setShowChart]     = useState(false);
  const [groupByLoc,    setGroupByLoc]    = useState(false);
  const chartRef      = useRef(null);
  const chartInstance = useRef(null);
  const orgSlug       = window.location.pathname.split('/')[1];

  const runReport = useCallback(async () => {
    setLoading(true); setError(null);
    try {
      const p = new URLSearchParams();
      if (startDate)     p.set('start_date',     startDate);
      if (endDate)       p.set('end_date',        endDate);
      if (locationInput) p.set('desk_location',   locationInput);
      const res  = await fetch(`/${orgSlug}/products/api/data?${p}`);
      const data = await res.json();
      if (data.error) throw new Error(data.error);
      setRows(data.rows || []);
      setHasRun(true);
    } catch(e) { setError(e.message); }
    finally { setLoading(false); }
  }, [startDate, endDate, locationInput, orgSlug]);

  // ── Pivot ──────────────────────────────────────────────────────────────────
  const { months, rowKeys, matrix, rowTotals, monthTotals, grand, locations } = useMemo(() => {
    const matrix     = {};
    const monthSet   = new Set();
    const locationSet = new Set();

    rows.forEach(r => {
      const product  = r['Product Name']   || '(unknown)';
      const loc      = r['Desk Location']  || '(no location)';
      const month    = r['Month'];
      const qty      = Number(r['Qty Sold'])        || 0;
      const revenue  = Number(r['Revenue ($)'])     || 0;

      if (month) monthSet.add(month);
      if (loc !== '(no location)') locationSet.add(loc);

      const key = groupByLoc ? `${product} — ${loc}` : product;
      if (!matrix[key]) matrix[key] = {};
      if (!matrix[key][month]) matrix[key][month] = { qty: 0, revenue: 0 };
      matrix[key][month].qty     += qty;
      matrix[key][month].revenue += revenue;
    });

    const months  = [...monthSet].sort();
    const rowKeys = Object.keys(matrix).sort((a, b) => {
      const rA = months.reduce((s, m) => s + (matrix[a]?.[m]?.revenue || 0), 0);
      const rB = months.reduce((s, m) => s + (matrix[b]?.[m]?.revenue || 0), 0);
      return rB - rA;
    });

    const rowTotals   = {};
    const monthTotals = {};
    rowKeys.forEach(k => {
      rowTotals[k] = { qty: 0, revenue: 0 };
      months.forEach(m => {
        rowTotals[k].qty     += matrix[k]?.[m]?.qty     || 0;
        rowTotals[k].revenue += matrix[k]?.[m]?.revenue || 0;
      });
    });
    months.forEach(m => {
      monthTotals[m] = { qty: 0, revenue: 0 };
      rowKeys.forEach(k => {
        monthTotals[m].qty     += matrix[k]?.[m]?.qty     || 0;
        monthTotals[m].revenue += matrix[k]?.[m]?.revenue || 0;
      });
    });
    const grand = {
      qty:     rowKeys.reduce((s, k) => s + rowTotals[k].qty,     0),
      revenue: rowKeys.reduce((s, k) => s + rowTotals[k].revenue, 0),
    };

    return { months, rowKeys, matrix, rowTotals, monthTotals, grand, locations: [...locationSet].sort() };
  }, [rows, groupByLoc]);

  // ── Excel export ───────────────────────────────────────────────────────────
  function exportExcel() {
    const hdr = ['Product', ...months.map(fmtMonth), 'Total'];
    if (viewMode === 'both') {
      const hdr2 = ['', ...months.flatMap(m => [fmtMonth(m) + ' Rev', fmtMonth(m) + ' Qty']), 'Total Rev', 'Total Qty'];
      const rows2 = rowKeys.map(k => [k, ...months.flatMap(m => [matrix[k]?.[m]?.revenue || 0, matrix[k]?.[m]?.qty || 0]), rowTotals[k].revenue, rowTotals[k].qty]);
      const tot2  = ['TOTAL', ...months.flatMap(m => [monthTotals[m]?.revenue || 0, monthTotals[m]?.qty || 0]), grand.revenue, grand.qty];
      const ws = XLSX.utils.aoa_to_sheet([hdr2, ...rows2, tot2]);
      const wb = XLSX.utils.book_new(); XLSX.utils.book_append_sheet(wb, ws, 'Products MoM');
      return XLSX.writeFile(wb, `products-mom-${new Date().toISOString().slice(0,7)}.xlsx`);
    }
    const field  = viewMode === 'qty' ? 'qty' : 'revenue';
    const fmtVal = viewMode === 'qty' ? (v => v) : (v => v);
    const data   = [hdr, ...rowKeys.map(k => [k, ...months.map(m => matrix[k]?.[m]?.[field] || 0), rowTotals[k][field]]),
                    ['TOTAL', ...months.map(m => monthTotals[m]?.[field] || 0), grand[field]]];
    const ws = XLSX.utils.aoa_to_sheet(data);
    const wb = XLSX.utils.book_new(); XLSX.utils.book_append_sheet(wb, ws, 'Products MoM');
    XLSX.writeFile(wb, `products-mom-${new Date().toISOString().slice(0,7)}.xlsx`);
  }

  // ── Chart ──────────────────────────────────────────────────────────────────
  useEffect(() => {
    if (!showChart || !chartRef.current || months.length === 0) return;
    if (chartInstance.current) chartInstance.current.destroy();
    const field = viewMode === 'qty' ? 'qty' : 'revenue';
    chartInstance.current = new Chart(chartRef.current, {
      type: 'bar',
      data: {
        labels: months.map(fmtMonth),
        datasets: rowKeys.slice(0, 10).map((k, i) => ({
          label: k,
          data: months.map(m => matrix[k]?.[m]?.[field] || 0),
          backgroundColor: PALETTE[i % PALETTE.length] + 'cc',
          borderColor:     PALETTE[i % PALETTE.length],
          borderWidth: 1,
          borderRadius: 3,
        })),
      },
      options: {
        responsive: true, maintainAspectRatio: false,
        plugins: {
          legend: { position: 'right', labels: { boxWidth: 12, font: { size: 11 } } },
          tooltip: { callbacks: { label: ctx => ` ${ctx.dataset.label}: ${field === 'qty' ? fmtN(ctx.raw) : fmt$(ctx.raw)}` } },
        },
        scales: {
          x: { stacked: false, ticks: { font: { size: 11 } } },
          y: { ticks: { callback: v => field === 'qty' ? fmtN(v) : fmt$(v), font: { size: 11 } } },
        },
      },
    });
    return () => chartInstance.current?.destroy();
  }, [showChart, months, rowKeys, matrix, viewMode]);

  // ── MoM badge ─────────────────────────────────────────────────────────────
  function MoM({ key: k, mi }) {
    if (mi === 0) return null;
    const field = viewMode === 'qty' ? 'qty' : 'revenue';
    const curr  = matrix[k]?.[months[mi]]?.[field]     || 0;
    const prev  = matrix[k]?.[months[mi - 1]]?.[field] || 0;
    if (prev === 0 || curr === 0) return null;
    const pct = (curr - prev) / prev * 100;
    if (Math.abs(pct) < 0.5) return null;
    const up = pct > 0;
    return (
      <span style={{ fontSize: 9, fontWeight: 600, marginLeft: 4, fontFamily: 'DM Mono, monospace',
        color: up ? '#16a34a' : '#dc2626', letterSpacing: '-0.01em' }}>
        {up ? '▲' : '▼'}{Math.abs(pct).toFixed(0)}%
      </span>
    );
  }

  const bestProduct = rowKeys[0];
  const bestMonth   = months.reduce((b, m) => !b || (monthTotals[m]?.revenue || 0) > (monthTotals[b]?.revenue || 0) ? m : b, null);

  // ── Toolbar ────────────────────────────────────────────────────────────────
  const TB = { fontSize: 11, color: '#64748b', display: 'block', marginBottom: 5, fontWeight: 500, letterSpacing: '0.04em', textTransform: 'uppercase' };
  const IN = { border: '1px solid #cbd5e1', borderRadius: 6, padding: '8px 10px', fontSize: 13, color: '#0f172a', outline: 'none', width: '100%' };

  return (
    <div style={{ minHeight: '100vh', display: 'flex', flexDirection: 'column' }}>

      {/* Header */}
      <header style={{ background: '#1e293b', color: '#fff', padding: '20px 32px', display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
        <div>
          <div style={{ fontSize: 11, color: '#64748b', textTransform: 'uppercase', letterSpacing: '0.1em', marginBottom: 4 }}>
            {window.ORG_CONFIG?.orgName || 'Product Sales'}
          </div>
          <div style={{ fontSize: 20, fontWeight: 700, letterSpacing: '-0.02em' }}>Month-over-Month Report</div>
        </div>
        {hasRun && grand.revenue > 0 && (
          <div style={{ textAlign: 'right' }}>
            <div style={{ fontSize: 10, color: '#64748b', marginBottom: 2 }}>Period Revenue</div>
            <div style={{ fontSize: 24, fontWeight: 700, color: '#34d399', fontFamily: 'DM Mono, monospace' }}>{fmt$(grand.revenue)}</div>
          </div>
        )}
      </header>

      {/* Toolbar */}
      <div style={{ background: '#fff', borderBottom: '1px solid #e2e8f0', padding: '16px 32px', display: 'flex', gap: 16, flexWrap: 'wrap', alignItems: 'flex-end' }}>
        <div style={{ flex: '0 0 140px' }}>
          <label style={TB}>Start Date</label>
          <input type="date" value={startDate} onChange={e => setStartDate(e.target.value)} style={IN} />
        </div>
        <div style={{ flex: '0 0 140px' }}>
          <label style={TB}>End Date</label>
          <input type="date" value={endDate} onChange={e => setEndDate(e.target.value)} style={IN} />
        </div>
        <div style={{ flex: '0 0 180px' }}>
          <label style={TB}>Desk Location</label>
          <input type="text" value={locationInput} onChange={e => setLocationInput(e.target.value)}
            placeholder="All locations" onKeyDown={e => e.key === 'Enter' && runReport()} style={IN} />
        </div>
        <div>
          <label style={{ ...TB, opacity: 0 }}>.</label>
          <button onClick={runReport} disabled={loading} style={{
            background: loading ? '#94a3b8' : '#2563eb', color: '#fff', border: 'none',
            borderRadius: 6, padding: '9px 22px', fontSize: 13, fontWeight: 500, cursor: loading ? 'not-allowed' : 'pointer',
            transition: 'background .15s',
          }}>
            {loading ? '⏳ loading…' : '▶ Run Report'}
          </button>
        </div>
        {hasRun && !loading && (
          <>
            {/* View toggle */}
            <div style={{ display: 'flex', border: '1px solid #e2e8f0', borderRadius: 6, overflow: 'hidden', alignSelf: 'flex-end' }}>
              {[['revenue','$ Revenue'],['qty','# Qty'],['both','Both']].map(([v, l]) => (
                <button key={v} onClick={() => setViewMode(v)} style={{
                  padding: '8px 14px', fontSize: 12, fontWeight: 500, border: 'none', cursor: 'pointer',
                  background: viewMode === v ? '#2563eb' : '#f8fafc', color: viewMode === v ? '#fff' : '#64748b',
                }}>{l}</button>
              ))}
            </div>
            {/* Group by location */}
            {locations.length > 1 && (
              <button onClick={() => setGroupByLoc(g => !g)} style={{
                alignSelf: 'flex-end', padding: '8px 14px', fontSize: 12, fontWeight: 500,
                background: groupByLoc ? '#eff6ff' : '#f8fafc', border: `1px solid ${groupByLoc ? '#2563eb' : '#e2e8f0'}`,
                color: groupByLoc ? '#2563eb' : '#64748b', borderRadius: 6, cursor: 'pointer',
              }}>⊞ By Location</button>
            )}
            {/* Chart toggle */}
            <button onClick={() => setShowChart(s => !s)} style={{
              alignSelf: 'flex-end', padding: '8px 14px', fontSize: 12, fontWeight: 500,
              background: showChart ? '#f0fdf4' : '#f8fafc', border: `1px solid ${showChart ? '#16a34a' : '#e2e8f0'}`,
              color: showChart ? '#16a34a' : '#64748b', borderRadius: 6, cursor: 'pointer',
            }}>📊 Chart</button>
            {/* Excel */}
            <button onClick={exportExcel} style={{
              alignSelf: 'flex-end', padding: '8px 14px', fontSize: 12, fontWeight: 500,
              background: '#f8fafc', border: '1px solid #e2e8f0', color: '#64748b', borderRadius: 6, cursor: 'pointer',
            }}>⬇ Excel</button>
          </>
        )}
      </div>

      {error && (
        <div style={{ padding: '14px 32px', background: '#fef2f2', borderBottom: '1px solid #fecaca', color: '#dc2626', fontSize: 13 }}>
          ⚠ {error}
        </div>
      )}

      {/* Summary cards */}
      {hasRun && !loading && grand.revenue > 0 && (
        <div style={{ padding: '20px 32px 4px', display: 'flex', gap: 12, flexWrap: 'wrap' }}>
          <StatCard label="Total Revenue"    value={fmt$(grand.revenue)} />
          <StatCard label="Total Units Sold" value={fmtN(grand.qty)} />
          <StatCard label="Months"           value={months.length} />
          <StatCard label="Products"         value={rowKeys.length} />
          {bestProduct && <StatCard label="Top Product" value={bestProduct.length > 22 ? bestProduct.slice(0, 20) + '…' : bestProduct} sub={fmt$(rowTotals[bestProduct]?.revenue)} />}
          {bestMonth   && <StatCard label="Best Month"  value={fmtMonth(bestMonth)} sub={fmt$(monthTotals[bestMonth]?.revenue)} />}
        </div>
      )}

      {/* Not run / empty */}
      {!hasRun && !loading && (
        <div style={{ flex: 1, display: 'flex', alignItems: 'center', justifyContent: 'center', color: '#94a3b8', fontSize: 14 }}>
          Set filters above and click Run Report.
        </div>
      )}
      {hasRun && !loading && rows.length === 0 && (
        <div style={{ flex: 1, display: 'flex', alignItems: 'center', justifyContent: 'center', color: '#94a3b8', fontSize: 14 }}>
          No data found for the selected filters.
        </div>
      )}

      {/* Pivot table */}
      {hasRun && !loading && months.length > 0 && (
        <div style={{ padding: '16px 32px', overflowX: 'auto', flex: 1 }}>
          <table style={{ borderCollapse: 'collapse', fontSize: 13, background: '#fff', boxShadow: '0 1px 3px rgba(0,0,0,.08)', borderRadius: 8, overflow: 'hidden', minWidth: '100%' }}>
            <thead>
              <tr style={{ background: '#1e293b', color: '#fff' }}>
                <th style={{ textAlign: 'left', padding: '12px 16px', fontWeight: 600, position: 'sticky', left: 0, background: '#1e293b', zIndex: 2, whiteSpace: 'nowrap', minWidth: 180 }}>
                  Product {groupByLoc && <span style={{ fontSize: 10, color: '#64748b', fontWeight: 400 }}>— Location</span>}
                </th>
                {months.map(m => (
                  <th key={m} style={{ textAlign: 'right', padding: '12px 14px', fontWeight: 600, whiteSpace: 'nowrap', minWidth: viewMode === 'both' ? 160 : 110 }}>
                    {fmtMonth(m)}
                  </th>
                ))}
                <th style={{ textAlign: 'right', padding: '12px 14px', fontWeight: 600, whiteSpace: 'nowrap', background: '#0f172a', minWidth: viewMode === 'both' ? 160 : 110 }}>
                  Total
                </th>
              </tr>
              {/* Both-mode subheader */}
              {viewMode === 'both' && (
                <tr style={{ background: '#334155', color: '#94a3b8', fontSize: 10, textTransform: 'uppercase', letterSpacing: '0.08em' }}>
                  <th style={{ position: 'sticky', left: 0, background: '#334155' }}></th>
                  {months.map(m => (
                    <th key={m} style={{ padding: '5px 14px', textAlign: 'right' }}>
                      <span style={{ display: 'flex', justifyContent: 'flex-end', gap: 12 }}>
                        <span>Rev</span><span>Qty</span>
                      </span>
                    </th>
                  ))}
                  <th style={{ padding: '5px 14px', textAlign: 'right' }}>
                    <span style={{ display: 'flex', justifyContent: 'flex-end', gap: 12 }}><span>Rev</span><span>Qty</span></span>
                  </th>
                </tr>
              )}
            </thead>
            <tbody>
              {rowKeys.map((k, pi) => (
                <tr key={k} style={{ background: pi % 2 === 0 ? '#fff' : '#f8fafc', borderBottom: '1px solid #f1f5f9' }}
                  onMouseEnter={e => e.currentTarget.style.background = '#eff6ff'}
                  onMouseLeave={e => e.currentTarget.style.background = pi % 2 === 0 ? '#fff' : '#f8fafc'}>

                  {/* Product name */}
                  <td style={{ padding: '9px 16px', fontWeight: 500, position: 'sticky', left: 0, background: 'inherit', zIndex: 1,
                    whiteSpace: 'nowrap', maxWidth: 240, overflow: 'hidden', textOverflow: 'ellipsis', borderRight: '1px solid #e2e8f0' }}>
                    {k}
                  </td>

                  {/* Month cells */}
                  {months.map((m, mi) => {
                    const cell = matrix[k]?.[m] || { qty: 0, revenue: 0 };
                    const empty = cell.revenue === 0 && cell.qty === 0;
                    return (
                      <td key={m} style={{ textAlign: 'right', padding: '9px 14px', fontVariantNumeric: 'tabular-nums',
                        fontFamily: 'DM Mono, monospace', color: empty ? '#cbd5e1' : '#0f172a', fontSize: 12 }}>
                        {viewMode === 'revenue' && (
                          <span style={{ display: 'inline-flex', alignItems: 'baseline' }}>
                            {empty ? '—' : fmt$(cell.revenue)}
                            {!empty && <MoM key={k} mi={mi} />}
                          </span>
                        )}
                        {viewMode === 'qty' && (
                          <span style={{ display: 'inline-flex', alignItems: 'baseline' }}>
                            {empty ? '—' : fmtN(cell.qty)}
                            {!empty && <MoM key={k} mi={mi} />}
                          </span>
                        )}
                        {viewMode === 'both' && (
                          <span style={{ display: 'flex', justifyContent: 'flex-end', gap: 12 }}>
                            <span>{empty ? '—' : fmt$(cell.revenue)}</span>
                            <span style={{ color: '#64748b' }}>{empty ? '—' : fmtN(cell.qty)}</span>
                          </span>
                        )}
                      </td>
                    );
                  })}

                  {/* Row total */}
                  <td style={{ textAlign: 'right', padding: '9px 14px', fontWeight: 600, background: '#f1f5f9',
                    fontVariantNumeric: 'tabular-nums', fontFamily: 'DM Mono, monospace', fontSize: 12 }}>
                    {viewMode === 'revenue' && fmt$(rowTotals[k].revenue)}
                    {viewMode === 'qty'     && fmtN(rowTotals[k].qty)}
                    {viewMode === 'both'    && (
                      <span style={{ display: 'flex', justifyContent: 'flex-end', gap: 12 }}>
                        <span>{fmt$(rowTotals[k].revenue)}</span>
                        <span style={{ color: '#64748b' }}>{fmtN(rowTotals[k].qty)}</span>
                      </span>
                    )}
                  </td>
                </tr>
              ))}
            </tbody>
            <tfoot>
              <tr style={{ background: '#1e293b', color: '#fff', fontWeight: 700, fontSize: 13 }}>
                <td style={{ padding: '12px 16px', position: 'sticky', left: 0, background: '#1e293b' }}>TOTAL</td>
                {months.map(m => (
                  <td key={m} style={{ textAlign: 'right', padding: '12px 14px', fontVariantNumeric: 'tabular-nums', fontFamily: 'DM Mono, monospace' }}>
                    {viewMode === 'revenue' && fmt$(monthTotals[m]?.revenue || 0)}
                    {viewMode === 'qty'     && fmtN(monthTotals[m]?.qty     || 0)}
                    {viewMode === 'both'    && (
                      <span style={{ display: 'flex', justifyContent: 'flex-end', gap: 12 }}>
                        <span>{fmt$(monthTotals[m]?.revenue || 0)}</span>
                        <span style={{ opacity: .7 }}>{fmtN(monthTotals[m]?.qty || 0)}</span>
                      </span>
                    )}
                  </td>
                ))}
                <td style={{ textAlign: 'right', padding: '12px 14px', fontVariantNumeric: 'tabular-nums', fontFamily: 'DM Mono, monospace' }}>
                  {viewMode === 'revenue' && fmt$(grand.revenue)}
                  {viewMode === 'qty'     && fmtN(grand.qty)}
                  {viewMode === 'both'    && (
                    <span style={{ display: 'flex', justifyContent: 'flex-end', gap: 12 }}>
                      <span>{fmt$(grand.revenue)}</span>
                      <span style={{ opacity: .7 }}>{fmtN(grand.qty)}</span>
                    </span>
                  )}
                </td>
              </tr>
            </tfoot>
          </table>
        </div>
      )}

      {/* Chart */}
      {showChart && hasRun && months.length > 0 && (
        <div style={{ padding: '0 32px 32px' }}>
          <div style={{ background: '#fff', borderRadius: 8, padding: '20px 24px', boxShadow: '0 1px 3px rgba(0,0,0,.08)', height: 360 }}>
            <canvas ref={chartRef} />
          </div>
        </div>
      )}
    </div>
  );
}

function StatCard({ label, value, sub }) {
  return (
    <div style={{ background: '#fff', borderRadius: 8, padding: '14px 18px', boxShadow: '0 1px 3px rgba(0,0,0,.06)', minWidth: 130 }}>
      <div style={{ fontSize: 10, color: '#64748b', textTransform: 'uppercase', letterSpacing: '0.08em', marginBottom: 5, fontWeight: 500 }}>{label}</div>
      <div style={{ fontSize: 18, fontWeight: 700, color: '#0f172a', fontFamily: 'DM Mono, monospace', letterSpacing: '-0.02em' }}>{value}</div>
      {sub && <div style={{ fontSize: 11, color: '#64748b', marginTop: 2 }}>{sub}</div>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
