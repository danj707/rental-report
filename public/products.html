<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Product Sales — Daily Detail</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'IBM Plex Sans', 'Segoe UI', system-ui, sans-serif;
      font-size: 12px;
      color: #1a1a1a;
      background: #f5f4f1;
      line-height: 1.35;
    }

    /* ── Toolbar ── */
    .toolbar {
      position: sticky;
      top: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 20px;
      background: #2c2c2c;
      color: #eee;
      font-size: 13px;
      flex-wrap: wrap;
    }
    .toolbar-title { font-weight: 600; margin-right: 8px; }
    .toolbar-spacer { flex: 1; }
    .toolbar label {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: #aaa;
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    .toolbar input[type="date"],
    .toolbar input[type="text"] {
      padding: 4px 8px;
      border: 1px solid rgba(255,255,255,.2);
      border-radius: 4px;
      background: rgba(255,255,255,.1);
      color: #fff;
      font-size: 12px;
      font-family: inherit;
      outline: none;
    }
    .toolbar input[type="date"]:focus,
    .toolbar input[type="text"]:focus { border-color: #3b82f6; }
    .toolbar input[type="date"]::-webkit-calendar-picker-indicator { filter: invert(1); cursor: pointer; }
    .toolbar input[type="text"]::placeholder { color: #666; }
    .toolbar button {
      padding: 6px 14px;
      border: 1px solid rgba(255,255,255,.25);
      border-radius: 4px;
      background: rgba(255,255,255,.08);
      color: #fff;
      font-size: 12px;
      font-family: inherit;
      cursor: pointer;
      transition: background .15s;
    }
    .toolbar button:hover { background: rgba(255,255,255,.18); }
    .toolbar button.active {
      background: rgba(255,255,255,.22);
      border-color: rgba(255,255,255,.55);
    }
    .toolbar .btn-run { background: #16a34a; border-color: #16a34a; font-weight: 600; }
    .toolbar .btn-run:hover { background: #15803d; }
    .toolbar .btn-run:disabled { opacity: .5; cursor: not-allowed; }
    .toolbar .btn-excel { background: #166534; border-color: #166534; font-weight: 600; }
    .toolbar .btn-excel:hover { background: #14532d; }
    .toolbar .btn-excel:disabled { opacity: .5; cursor: not-allowed; }
    .toolbar .btn-pdf { background: #3b82f6; border-color: #3b82f6; font-weight: 600; }
    .toolbar .btn-pdf:hover { background: #2563eb; }
    .toolbar .btn-pdf:disabled { opacity: .5; cursor: not-allowed; }
    .toolbar .divider { width: 1px; height: 28px; background: rgba(255,255,255,.15); margin: 0 4px; }
    .toolbar .row-count { font-size: 11px; color: #aaa; }

    /* ── Desk picker dropdown (inside toolbar, white bg) ── */
    .desk-picker button {
      background: #f3f4f6 !important;
      color: #333 !important;
      border-color: #ccc !important;
      font-size: 11px !important;
      padding: 4px 10px !important;
    }
    .desk-picker button:hover { background: #e5e7eb !important; }
    .desk-picker label {
      font-size: 12px !important;
      text-transform: none !important;
      letter-spacing: 0 !important;
      color: #333 !important;
      flex-direction: row !important;
    }

    /* ── Page ── */
    .page {
      max-width: 1320px;
      margin: 16px auto;
      padding: 24px 28px;
      background: #fff;
      box-shadow: 0 1px 4px rgba(0,0,0,.08);
    }

    /* ── Report header ── */
    .report-header-logo { height: 42px; max-width: 140px; object-fit: contain; object-position: left center; }
    .report-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      border-bottom: 2.5px solid #111;
      padding-bottom: 8px;
      margin-bottom: 16px;
    }
    .report-header .org-label {
      font-size: 10.5px;
      letter-spacing: 1.6px;
      text-transform: uppercase;
      color: #777;
      font-weight: 600;
    }
    .report-header .title { font-size: 17px; font-weight: 700; margin-top: 1px; }
    .report-header .date-range { font-size: 11px; color: #666; text-align: right; }

    /* ── Summary cards ── */
    .summary-cards {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }
    .summary-card {
      flex: 1;
      min-width: 110px;
      padding: 10px 12px;
      border-radius: 5px;
      background: #f8f8f6;
      border: 1px solid #e4e4e0;
      border-left: 3px solid #ccc;
    }
    .summary-card .card-label {
      font-size: 9.5px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: #888;
      font-weight: 600;
      margin-bottom: 4px;
    }
    .summary-card .card-value {
      font-size: 15px;
      font-weight: 700;
      font-family: 'IBM Plex Mono', monospace;
      white-space: normal;
      word-break: break-word;
    }
    .summary-card.green  { border-left-color: #16a34a; }
    .summary-card.green  .card-value { color: #15803d; }
    .summary-card.blue   { border-left-color: #3b82f6; }
    .summary-card.blue   .card-value { color: #2563eb; }
    .summary-card.violet { border-left-color: #7c3aed; }
    .summary-card.violet .card-value { color: #6d28d9; }
    .summary-card.amber  { border-left-color: #d97706; }
    .summary-card.amber  .card-value { color: #b45309; }
    .summary-card.slate  { border-left-color: #475569; }
    .summary-card.slate  .card-value { color: #334155; }

    /* ── Table ── */
    .table-wrapper { overflow-x: auto; }
    table { border-collapse: collapse; width: 100%; font-size: 11.5px; }

    thead th {
      background: #e4e4e0;
      border: 1px solid #ccc;
      padding: 5px 8px;
      text-align: right;
      font-weight: 600;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.3px;
      color: #333;
      white-space: nowrap;
    }
    thead th.left { text-align: left; }
    thead th.group {
      text-align: center;
      background: #d0d0cc;
      font-size: 9px;
      border-bottom: 2px solid #aaa;
      color: #444;
    }
    thead th.group.total-group {
      background: #c4c4c0;
    }
    thead th.total-col {
      background: #d8d8d4;
    }

    tbody td {
      border: 1px solid #e8e8e4;
      padding: 4px 8px;
      text-align: right;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 11px;
      white-space: nowrap;
    }
    tbody td.left {
      text-align: left;
      font-family: 'IBM Plex Sans', sans-serif;
      white-space: normal;
      word-break: break-word;
      min-width: 180px;
      max-width: 260px;
    }
    tbody td.total-col { background: #f4f4f0; }
    tbody tr:nth-child(even) td.total-col { background: #efefe9; }
    tbody tr:hover td.total-col { background: #e8e8e2; }
    tbody tr:nth-child(even) { background: #fafaf8; }
    tbody tr:hover { background: #f0f0ec; }

    tfoot td {
      border: 1px solid #ccc;
      border-top: 2px solid #444;
      padding: 5px 8px;
      text-align: right;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 11px;
      font-weight: 700;
      background: #ececea;
      white-space: nowrap;
    }
    tfoot td.left {
      text-align: left;
      font-family: 'IBM Plex Sans', sans-serif;
      font-weight: 700;
    }
    tfoot td.total-col { background: #e4e4e0; }

    .cell-zero { color: #c8c8c4; }
    .mom-up   { font-size: 9px; color: #16a34a; margin-left: 3px; font-family: 'IBM Plex Mono', monospace; }
    .mom-down { font-size: 9px; color: #dc2626; margin-left: 3px; font-family: 'IBM Plex Mono', monospace; }

    /* ── Chart ── */
    .chart-wrap { margin-top: 4px; position: relative; }
    .chart-wrap canvas { max-width: 100%; }

    /* ── Footer ── */
    .report-footer {
      display: flex;
      justify-content: space-between;
      border-top: 2.5px solid #111;
      margin-top: 16px;
      padding-top: 6px;
      font-size: 10px;
      color: #777;
    }

    /* ── Loading / Error ── */
    .loading { text-align: center; padding: 80px 20px; color: #888; font-size: 14px; }
    .loading .spinner {
      position: relative;
      display: inline-block;
      width: 34px;
      height: 44px;
      margin: 0 auto;
      box-sizing: border-box;
      border: 2px solid #e07b1a;
      border-top-color: #f7b96b;
      border-radius: 4px 4px 14px 14px;
      background: rgba(255, 248, 240, 0.5);
      overflow: hidden;
      box-shadow: inset -4px 0 0 rgba(255, 255, 255, 0.35);
    }
    .loading .spinner::before {
      content: '';
      position: absolute;
      left: 0; right: 0; bottom: 0;
      height: 60%;
      background: linear-gradient(180deg, #ffb24d 0%, #ff8c1f 55%, #f2710a 100%);
      box-shadow: inset 0 2px 0 rgba(255, 255, 255, 0.45);
      animation: juice-fill 2s ease-in-out infinite;
    }
    .loading .spinner::after {
      content: '';
      position: absolute;
      left: 50%; bottom: 6px;
      width: 3px; height: 3px;
      margin-left: -1.5px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.85);
      box-shadow: -5px 7px 0 0 rgba(255, 255, 255, 0.65), 5px 12px 0 -0.5px rgba(255, 255, 255, 0.5);
      animation: juice-bubbles 2.2s ease-out infinite;
    }
    @keyframes juice-fill {
      0%   { height: 42%; }
      50%  { height: 80%; }
      100% { height: 42%; }
    }
    @keyframes juice-bubbles {
      0%   { transform: translateY(2px) scale(0.5); opacity: 0; }
      30%  { opacity: 0.9; }
      70%  { opacity: 0.6; }
      100% { transform: translateY(-22px) scale(1); opacity: 0; }
    }
    .loading { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 14px; }
    .juice-msg { position: relative; height: 1.4em; line-height: 1.4em; min-width: 190px; }
    .juice-msg span { position: absolute; left: 0; right: 0; text-align: center; opacity: 0; animation: juice-phrase 10s infinite; }
    .juice-msg span:nth-child(1) { animation-delay: 0s; }
    .juice-msg span:nth-child(2) { animation-delay: 2s; }
    .juice-msg span:nth-child(3) { animation-delay: 4s; }
    .juice-msg span:nth-child(4) { animation-delay: 6s; }
    .juice-msg span:nth-child(5) { animation-delay: 8s; }
    @keyframes juice-phrase {
      0%   { opacity: 0; transform: translateY(5px); }
      2%   { opacity: 1; transform: translateY(0); }
      18%  { opacity: 1; transform: translateY(0); }
      20%  { opacity: 0; transform: translateY(-5px); }
      100% { opacity: 0; }
    }
    .error { text-align: center; padding: 60px 20px; color: #b91c1c; font-size: 14px; }

    /* ── Print ── */
    @media print {
      body { background: #fff; }
      .toolbar { display: none !important; }
      .page { box-shadow: none; margin: 0; padding: 12px 16px; max-width: 100%; }
    }
    body.print-mode .toolbar { display: none !important; }
    body.print-mode .page { box-shadow: none; margin: 0; padding: 12px 16px; max-width: 100%; }

    /* ── Button loading spinner ── */
    @keyframes btn-spin { to { transform: rotate(360deg); } }
    .btn-spinner {
      display: inline-block;
      width: 12px;
      height: 12px;
      border: 2px solid rgba(0,0,0,.15);
      border-top-color: #333;
      border-radius: 50%;
      animation: btn-spin .6s linear infinite;
      vertical-align: middle;
      margin-right: 5px;
    }
    .toolbar button:disabled .btn-spinner {
      border-top-color: #888;
    }

    /* ── AI Insights ── */
    .insights-section { margin: 0 0 16px; padding: 16px 0 0; }
    .insights-head { display: flex; align-items: center; gap: 12px; margin-bottom: 10px; }
    .insights-btn { background: linear-gradient(135deg, #6366f1, #8b5cf6); color: #fff; border: none; border-radius: 8px; padding: 8px 18px; font-size: 13px; font-weight: 600; cursor: pointer; font-family: inherit; 
      position: relative; overflow: visible;
      box-shadow: 0 2px 12px rgba(99,102,241,.3);
    }
    .insights-btn:hover { filter: brightness(1.08); }
    .insights-btn:disabled { opacity: .6; cursor: wait; }
    .insights-sub { font-size: 12px; color: #888; }
    .insights-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(230px, 1fr)); gap: 12px; }
    .insight-card { border: 1px solid #e5e7eb; border-left-width: 4px; border-radius: 8px; padding: 14px 16px; background: #fff; }
    .insight-opportunity { border-left-color: #10b981; } .insight-opportunity .insight-type { color: #059669; }
    .insight-risk { border-left-color: #ef4444; } .insight-risk .insight-type { color: #dc2626; }
    .insight-signal { border-left-color: #3b82f6; } .insight-signal .insight-type { color: #2563eb; }
    .insight-type { font-size: 10px; font-weight: 700; letter-spacing: .6px; text-transform: uppercase; margin-bottom: 6px; }
    .insight-title { font-size: 14px; font-weight: 700; color: #111827; margin-bottom: 5px; line-height: 1.3; }
    .insight-detail { font-size: 13px; color: #4b5563; line-height: 1.5; }
    .insight-action { font-size: 12px; color: #6b7280; margin-top: 8px; font-weight: 500; }
    .insights-feedback { display:flex; align-items:center; gap:8px; margin-top:12px; padding:8px 4px; font-size:13px; color:#666; }
    .insights-feedback button { background:none; border:1px solid #e5e7eb; border-radius:6px; padding:4px 10px; cursor:pointer; font-size:13px; transition:all .15s; }
    .insights-feedback button:hover { background:#f3f4f6; border-color:#d1d5db; }
    .insights-feedback .fb-label { color:#888; font-size:12px; }
    .insights-feedback .fb-thanks { color:#10b981; font-weight:600; font-size:13px; }
    .insights-feedback .fb-down-form { display:flex; align-items:center; gap:6px; flex:1; }
    .insights-feedback .fb-down-form input { flex:1; border:1px solid #d1d5db; border-radius:6px; padding:5px 10px; font-size:13px; font-family:inherit; outline:none; }
    .insights-feedback .fb-down-form input:focus { border-color:#6366f1; box-shadow:0 0 0 2px rgba(99,102,241,.15); }
    .insights-feedback .fb-send { background:#6366f1!important; color:#fff!important; border-color:#6366f1!important; font-weight:600; }
    .insights-feedback .fb-send:hover { background:#4f46e5!important; }
    .ai-loading { padding: 24px 16px; text-align: center; }
    .ai-spinner { border:3px solid #e5e7eb; border-top:3px solid #6366f1; border-radius:50%; width:24px; height:24px; margin:0 auto; animation:ai-spin 1s linear infinite; }
    @keyframes ai-spin { to { transform:rotate(360deg); } }
  </style>
  <script>
    // ── Token auth (injected) ────────────────────────────────────────
    const URL_TOKEN = new URLSearchParams(window.location.search).get('token') || '';
    const TOKEN_QS  = URL_TOKEN ? '?token=' + encodeURIComponent(URL_TOKEN) : '';
    function withToken(url) {
      if (!URL_TOKEN) return url;
      return url + (url.includes('?') ? '&' : '?') + 'token=' + encodeURIComponent(URL_TOKEN);
    }
  </script>
</head>
<body>
<div id="root"></div>

<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<script type="text/babel">
const { useState, useEffect, useMemo, useCallback, useRef } = React;

const LS_HIDE_ZERO = 'products_daily_hide_zero_v1';
const LS_SHOW_NET  = 'products_daily_show_net_v1';
const LS_BY_DESK   = 'products_daily_by_desk_v1';
const LS_BY_ITEM   = 'products_daily_by_item_v1';

const SP = new URLSearchParams(window.location.search);
const isPrint = SP.get('_print') === '1';

/* ── date helpers ── */
function toISO(d) {
  const y = d.getFullYear(), m = String(d.getMonth() + 1).padStart(2, '0'), day = String(d.getDate()).padStart(2, '0');
  return `${y}-${m}-${day}`;
}
function getDefaultRange() {
  const now = new Date();
  return { start: toISO(new Date(now.getFullYear(), 0, 1)), end: toISO(now) };
}
const MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
const WK = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
function parseDateFlexible(v) {
  if (v == null) return null;
  if (v instanceof Date) return isNaN(v) ? null : v;
  const s = String(v).trim();
  let m = s.match(/^(\d{4})-(\d{2})-(\d{2})/);
  if (m) return new Date(+m[1], +m[2] - 1, +m[3]);
  const d = new Date(s);
  return isNaN(d) ? null : d;
}
function formatDisplayDate(v) {
  const d = parseDateFlexible(v);
  if (!d) return String(v ?? '');
  return `${WK[d.getDay()]}, ${MONTHS[d.getMonth()]} ${d.getDate()}, ${d.getFullYear()}`;
}

/* ── number helpers ── */
function pf(v) {
  if (v == null) return 0;
  if (typeof v === 'number') return isFinite(v) ? v : 0;
  const n = parseFloat(String(v).replace(/[$,]/g, ''));
  return isFinite(n) ? n : 0;
}
function fmtMoney(v) {
  const n = pf(v);
  const s = '$' + Math.abs(n).toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
  return n < 0 ? '-' + s : s;
}
function fmtInt(v) { return Math.round(pf(v)).toLocaleString('en-US'); }

/* ── row normalization: keyed object OR positional array ── */
function normalizeRow(r) {
  let dateRaw, product, desk, qty, revenue, refunds, net;
  if (Array.isArray(r)) {
    [dateRaw, product, desk, qty, revenue, refunds, net] = r;
  } else {
    dateRaw  = r['Date'];
    product  = r['Product Name'] ?? r['Product'];
    desk     = r['Desk Location'];
    qty      = r['Qty Sold'] ?? r['Qty'];
    revenue  = r['Revenue ($)'] ?? r['Revenue'];
    refunds  = r['Refunds ($)'] ?? r['Refunds'];
    net      = r['Net Revenue ($)'] ?? r['Net Revenue'] ?? r['Net'];
  }
  const d = parseDateFlexible(dateRaw);
  return {
    dateISO:  d ? toISO(d) : String(dateRaw ?? ''),
    dateLabel: formatDisplayDate(dateRaw),
    dateMs:   d ? d.getTime() : 0,
    product:  product != null && String(product).trim() !== '' ? String(product) : '(unnamed product)',
    desk:     desk != null && String(desk).trim() !== '' ? String(desk) : '(No desk location)',
    qty:      Math.round(pf(qty)),
    revenue:  pf(revenue),
    refunds:  pf(refunds),
    net:      net == null ? pf(revenue) - pf(refunds) : pf(net),
  };
}

function SummaryCard({ color, label, value, sub }) {
  return (
    <div className={`summary-card ${color}`}>
      <div className="card-label">{label}</div>
      <div className="card-value">{value}</div>
      {sub ? <div className="card-label" style={{ marginTop: 2 }}>{sub}</div> : null}
    </div>
  );
}

function App() {
  const orgSlug = window.location.pathname.split('/').filter(Boolean)[0] || '';
  const def = getDefaultRange();

  /* initial state — URL params win, else localStorage, else defaults */
  const [startDate, setStartDate] = useState(SP.get('start_date') || def.start);
  const [endDate, setEndDate]     = useState(SP.get('end_date') || def.end);
  const [loadedStart, setLoadedStart] = useState(SP.get('start_date') || def.start);
  const [loadedEnd, setLoadedEnd]     = useState(SP.get('end_date') || def.end);

  const [rows, setRows]       = useState([]);
  const [loading, setLoading] = useState(true);
  const [error, setError]     = useState(null);
  const [orgName, setOrgName] = useState('');
  const [logoUrl, setLogoUrl] = useState('');

  const [hideZero, setHideZero] = useState(() =>
    SP.has('hide_zero') ? SP.get('hide_zero') === '1' : localStorage.getItem(LS_HIDE_ZERO) === '1');
  const [showNet, setShowNet] = useState(() =>
    SP.has('chart_net') ? SP.get('chart_net') === '1' : localStorage.getItem(LS_SHOW_NET) !== '0');
  const [byDesk, setByDesk] = useState(() =>
    SP.has('by_desk') ? SP.get('by_desk') === '1' : localStorage.getItem(LS_BY_DESK) === '1');
  const [byItem, setByItem] = useState(() =>
    SP.has('by_item') ? SP.get('by_item') === '1' : localStorage.getItem(LS_BY_ITEM) === '1');

  const [searchTerm, setSearchTerm] = useState(SP.get('search') || '');

  const [selectedDesks, setSelectedDesks] = useState(() => {
    const d = SP.get('desks');
    return d ? new Set(d.split(',').map(s => s.trim()).filter(Boolean)) : new Set();
  });
  const [deskPickerOpen, setDeskPickerOpen] = useState(false);
  const [pdfLoading, setPdfLoading] = useState(false);
  const [expanded, setExpanded] = useState(() => new Set());
  const [insights, setInsights] = useState(null);
  const [insightsLoading, setInsightsLoading] = useState(false);
  const [insightsError, setInsightsError] = useState(null);
  const [insightsTraceId, setInsightsTraceId] = useState(null);
  const [fbSent, setFbSent] = useState(false);
  const [fbMode, setFbMode] = useState(null);
  const [fbComment, setFbComment] = useState('');

  const chartRef = useRef(null);
  const chartInst = useRef(null);
  const deskBoxRef = useRef(null);

  useEffect(() => { if (isPrint) document.body.classList.add('print-mode'); }, []);
  useEffect(() => { localStorage.setItem(LS_HIDE_ZERO, hideZero ? '1' : '0'); }, [hideZero]);
  useEffect(() => { localStorage.setItem(LS_SHOW_NET, showNet ? '1' : '0'); }, [showNet]);
  useEffect(() => { localStorage.setItem(LS_BY_DESK, byDesk ? '1' : '0'); }, [byDesk]);
  useEffect(() => { localStorage.setItem(LS_BY_ITEM, byItem ? '1' : '0'); }, [byItem]);

  useEffect(() => {
    function onDocClick(e) {
      if (deskBoxRef.current && !deskBoxRef.current.contains(e.target)) setDeskPickerOpen(false);
    }
    document.addEventListener('mousedown', onDocClick);
    return () => document.removeEventListener('mousedown', onDocClick);
  }, []);

  function logClientEvent(event) {
    const parts = window.location.pathname.split('/').filter(Boolean);
    if (parts.length >= 2) {
      fetch(withToken(`/${parts[0]}/${parts[1]}/api/log?event=${event}`), { method: 'POST' }).catch(() => {});
    }
  }

  const fetchData = useCallback((sd, ed, preserveDesks) => {
    setLoading(true);
    setError(null);
    const qs = new URLSearchParams();
    if (sd) qs.set('start_date', sd);
    if (ed) qs.set('end_date', ed);
    if (SP.get('_nocache') === '1' || SP.get('_refresh') === '1') qs.set('_nocache', '1');
    fetch(withToken(`/${orgSlug}/products/api/data?${qs.toString()}`))
      .then(r => { if (!r.ok) throw new Error('HTTP ' + r.status); return r.json(); })
      .then(json => {
        const raw = Array.isArray(json) ? json : (json.rows || []);
        setRows(raw.map(normalizeRow));
        if (json && json.meta) {
          if (json.meta.org_name) setOrgName(json.meta.org_name);
          if (json.meta.logo_url) setLogoUrl(json.meta.logo_url);
        }
        setLoadedStart(sd); setLoadedEnd(ed);
        if (!preserveDesks) setSelectedDesks(new Set());
        setLoading(false);
      })
      .catch(err => { setError(err.message || String(err)); setLoading(false); });
  }, [orgSlug]);

  /* initial load preserves any desks passed via URL */
  useEffect(() => { fetchData(loadedStart, loadedEnd, true); /* eslint-disable-next-line */ }, []);

  const datesChanged = startDate !== loadedStart || endDate !== loadedEnd;

  function handleRun() { logClientEvent('run'); fetchData(startDate, endDate, false); }
  function setThisYear() {
    const now = new Date();
    const s = toISO(new Date(now.getFullYear(), 0, 1)), e = toISO(now);
    setStartDate(s); setEndDate(e); fetchData(s, e, false);
  }
  function setLastYear() {
    const y = new Date().getFullYear() - 1;
    const s = toISO(new Date(y, 0, 1)), e = toISO(new Date(y, 11, 31));
    setStartDate(s); setEndDate(e); fetchData(s, e, false);
  }
  function setRolling12() {
    const now = new Date();
    const s = toISO(new Date(now.getFullYear(), now.getMonth() - 11, 1)), e = toISO(now);
    setStartDate(s); setEndDate(e); fetchData(s, e, false);
  }

  const allDesks = useMemo(() => {
    const set = new Set();
    rows.forEach(r => set.add(r.desk));
    return Array.from(set).sort((a, b) => a.localeCompare(b));
  }, [rows]);

  function toggleDesk(d) {
    setSelectedDesks(prev => {
      const next = new Set(prev);
      if (next.has(d)) next.delete(d); else next.add(d);
      return next;
    });
  }

  /* desk filter + hide-zero (applies in both grains) */
  const filtered = useMemo(() => rows.filter(r => {
    if (selectedDesks.size > 0 && !selectedDesks.has(r.desk)) return false;
    if (hideZero && r.revenue === 0 && r.refunds === 0) return false;
    return true;
  }), [rows, selectedDesks, hideZero]);

  const searchFiltered = useMemo(() => {
    const q = searchTerm.trim().toLowerCase();
    if (!q) return filtered;
    return filtered.filter(r => r.product.toLowerCase().includes(q));
  }, [filtered, searchTerm]);

  /* grain: aggregate to date×product by default; date×product×desk when byDesk */
  const displayRows = useMemo(() => {
    if (byDesk) return searchFiltered;
    const m = new Map();
    searchFiltered.forEach(r => {
      const k = r.dateISO + '|' + r.product;
      if (!m.has(k)) m.set(k, { dateISO: r.dateISO, dateLabel: r.dateLabel, dateMs: r.dateMs, product: r.product, desk: null, qty: 0, revenue: 0, refunds: 0, net: 0 });
      const a = m.get(k); a.qty += r.qty; a.revenue += r.revenue; a.refunds += r.refunds; a.net += r.net;
    });
    return Array.from(m.values());
  }, [searchFiltered, byDesk]);

  /* "Total by Item" view: aggregate across all dates by product (+ desk if byDesk) */
  const itemSummary = useMemo(() => {
    if (!byItem) return [];
    const m = new Map();
    searchFiltered.forEach(r => {
      const k = r.product + (byDesk ? '|' + r.desk : '');
      if (!m.has(k)) m.set(k, { product: r.product, desk: r.desk, qty: 0, revenue: 0, refunds: 0, net: 0 });
      const a = m.get(k); a.qty += r.qty; a.revenue += r.revenue; a.refunds += r.refunds; a.net += r.net;
    });
    return Array.from(m.values()).sort((a, b) => showNet ? (b.net - a.net) : (b.revenue - a.revenue));
  }, [searchFiltered, byItem, byDesk, showNet]);

  /* group by date DESC, rows within by net DESC, subtotal per date */
  const groups = useMemo(() => {
    const map = new Map();
    displayRows.forEach(r => {
      if (!map.has(r.dateISO)) map.set(r.dateISO, { dateISO: r.dateISO, dateLabel: r.dateLabel, dateMs: r.dateMs, rows: [] });
      map.get(r.dateISO).rows.push(r);
    });
    const arr = Array.from(map.values());
    arr.sort((a, b) => b.dateMs - a.dateMs);
    arr.forEach(g => {
      g.rows.sort((a, b) => showNet ? (b.net - a.net) : (b.revenue - a.revenue));
      g.sub = g.rows.reduce((acc, r) => { acc.qty += r.qty; acc.revenue += r.revenue; acc.refunds += r.refunds; acc.net += r.net; return acc; }, { qty: 0, revenue: 0, refunds: 0, net: 0 });
    });
    return arr;
  }, [displayRows, showNet]);

  const totals = useMemo(() => searchFiltered.reduce((acc, r) => { acc.qty += r.qty; acc.revenue += r.revenue; acc.refunds += r.refunds; acc.net += r.net; return acc; }, { qty: 0, revenue: 0, refunds: 0, net: 0 }), [searchFiltered]);
  const productCount = useMemo(() => new Set(searchFiltered.map(r => r.product)).size, [searchFiltered]);
  const bestDay = useMemo(() => {
    let best = null;
    groups.forEach(g => { const v = showNet ? g.sub.net : g.sub.revenue; if (!best || v > best.val) best = { label: g.dateLabel, val: v }; });
    return best;
  }, [groups, showNet]);

  /* keep the browser URL in sync with active filters so PDF/email/subscribe honor them */
  useEffect(() => {
    if (isPrint) return;
    const p = new URLSearchParams();
    if (URL_TOKEN) p.set('token', URL_TOKEN);
    if (loadedStart) p.set('start_date', loadedStart);
    if (loadedEnd) p.set('end_date', loadedEnd);
    if (byDesk) p.set('by_desk', '1');
    if (byItem) p.set('by_item', '1');
    if (hideZero) p.set('hide_zero', '1');
    p.set('chart_net', showNet ? '1' : '0');
    if (selectedDesks.size > 0) p.set('desks', Array.from(selectedDesks).join(','));
    if (searchTerm.trim()) p.set('search', searchTerm.trim());
    window.history.replaceState(null, '', window.location.pathname + '?' + p.toString());
  }, [loadedStart, loadedEnd, byDesk, byItem, hideZero, showNet, selectedDesks, searchTerm]);

  /* chart: daily bars (default) or top-products bars (byItem) */
  useEffect(() => {
    if (!chartRef.current || typeof Chart === 'undefined') return;
    if (chartInst.current) { chartInst.current.destroy(); chartInst.current = null; }

    let labels, data, titleText;
    if (byItem) {
      /* top N products by net or gross */
      const sorted = [...itemSummary].sort((a, b) => showNet ? b.net - a.net : b.revenue - a.revenue);
      const top = sorted.slice(0, 25);
      labels = top.map(r => byDesk ? `${r.product} · ${r.desk}` : r.product);
      data = top.map(r => showNet ? r.net : r.revenue);
      titleText = `Top Products by ${showNet ? 'Net' : 'Gross'} Revenue`;
    } else {
      const asc = [...groups].sort((a, b) => a.dateMs - b.dateMs);
      labels = asc.map(g => { const d = parseDateFlexible(g.dateISO); return d ? `${MONTHS[d.getMonth()]} ${d.getDate()}` : g.dateISO; });
      data = asc.map(g => showNet ? g.sub.net : g.sub.revenue);
      titleText = (showNet ? 'Net' : 'Gross') + ' Revenue by Day';
    }

    chartInst.current = new Chart(chartRef.current, {
      type: 'bar',
      data: { labels, datasets: [{
        label: showNet ? 'Net Revenue' : 'Gross Revenue',
        data,
        backgroundColor: data.map(v => v < 0 ? '#dc2626' : (showNet ? '#2563eb' : '#16a34a')),
        borderRadius: 2,
      }] },
      options: {
        responsive: true, maintainAspectRatio: false,
        indexAxis: byItem ? 'y' : 'x',
        plugins: {
          legend: { display: false },
          title: { display: true, text: titleText, font: { size: 12, weight: '600' }, color: '#333' },
          tooltip: { callbacks: { label: c => fmtMoney(c.parsed[byItem ? 'x' : 'y']) } },
        },
        scales: byItem ? {
          x: { ticks: { font: { size: 9 }, callback: v => '$' + Number(v).toLocaleString() }, grid: { color: '#eee' } },
          y: { ticks: { font: { size: 9 } }, grid: { display: false } },
        } : {
          x: { ticks: { font: { size: 9 }, maxRotation: 90, minRotation: 0 }, grid: { display: false } },
          y: { ticks: { font: { size: 9 }, callback: v => '$' + Number(v).toLocaleString() }, grid: { color: '#eee' } },
        },
      },
    });
    return () => { if (chartInst.current) { chartInst.current.destroy(); chartInst.current = null; } };
  }, [groups, itemSummary, showNet, byItem, byDesk]);

  const nCols = byItem ? (byDesk ? 6 : 5) : (byDesk ? 7 : 6);
  const isOpen = (iso) => isPrint || expanded.has(iso);
  function toggleDate(iso) {
    setExpanded(prev => { const n = new Set(prev); if (n.has(iso)) n.delete(iso); else n.add(iso); return n; });
  }
  function expandAll() { setExpanded(new Set(groups.map(g => g.dateISO))); }
  function collapseAll() { setExpanded(new Set()); }

  function downloadPdf() {
    setPdfLoading(true);
    logClientEvent('pdf');
    const p = new URLSearchParams();
    if (loadedStart) p.set('start_date', loadedStart);
    if (loadedEnd) p.set('end_date', loadedEnd);
    if (byDesk) p.set('by_desk', '1');
    if (byItem) p.set('by_item', '1');
    if (hideZero) p.set('hide_zero', '1');
    p.set('chart_net', showNet ? '1' : '0');
    if (selectedDesks.size > 0) p.set('desks', Array.from(selectedDesks).join(','));
    if (searchTerm.trim()) p.set('search', searchTerm.trim());
    fetch(withToken(`/${orgSlug}/products/api/pdf?${p.toString()}`))
      .then(r => { if (!r.ok) throw new Error('HTTP ' + r.status); return r.blob(); })
      .then(blob => {
        const link = document.createElement('a');
        link.href = URL.createObjectURL(blob);
        link.download = `products-daily-${loadedStart || 'export'}_${loadedEnd || ''}.pdf`;
        link.click(); URL.revokeObjectURL(link.href);
      })
      .catch(err => alert('PDF generation failed: ' + err.message))
      .finally(() => setPdfLoading(false));
  }


  // ── AI Insights ──
  const buildInsightsBlob = useCallback(() => {
    if (!displayRows || !displayRows.length) return null;
    const numCols = ['revenue','refunds','net','quantity'];
    const totals = {};
    numCols.forEach(c => { totals[c] = displayRows.reduce((s,r) => s + (Number(r[c]) || 0), 0); });
    return { rowCount: displayRows.length, totals,
      topProducts: displayRows.slice().sort((a,b) => (b.net||0)-(a.net||0)).slice(0,15)
        .map(r => ({ name: r.product || r.name, net: r.net, revenue: r.revenue, refunds: r.refunds })) };
  }, [displayRows]);

  const sendInsightsFeedback = useCallback((score) => {
    if (!insightsTraceId) return;
    fetch(withToken('/' + orgSlug + '/products' + '/api/insights/score'), {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ traceId: insightsTraceId, score, comment: score === 0 ? fbComment : '' }),
    }).catch(() => {});
    setFbSent(true); setFbMode(null);
  }, [insightsTraceId, fbComment]);

  const getInsights = useCallback(async () => {
    const blob = buildInsightsBlob();
    if (!blob) return;
    setInsightsLoading(true); setInsightsError(null);
    try {
      const resp = await fetch(withToken('/' + orgSlug + '/products' + '/api/insights'), {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(blob),
      });
      const json = await resp.json().catch(() => ({}));
      if (!resp.ok || !json.ok) throw new Error(json.error || 'Request failed');
      setInsights(json.insights || []);
      setInsightsTraceId(json.traceId || null);
      setFbSent(false); setFbMode(null); setFbComment('');
    } catch (err) {
      setInsightsError(err.message);
    } finally {
      setInsightsLoading(false);
    }
  }, [buildInsightsBlob]);

  function exportExcel() {
    logClientEvent('excel');
    if (byItem) {
      const header = byDesk
        ? ['Product Name', 'Desk Location', 'Qty Sold', 'Revenue ($)', 'Refunds ($)', 'Net Revenue ($)']
        : ['Product Name', 'Qty Sold', 'Revenue ($)', 'Refunds ($)', 'Net Revenue ($)'];
      const aoa = [header];
      itemSummary.forEach(r => {
        aoa.push(byDesk
          ? [r.product, r.desk, r.qty, r.revenue, r.refunds, r.net]
          : [r.product, r.qty, r.revenue, r.refunds, r.net]);
      });
      aoa.push(byDesk
        ? ['TOTAL', '', totals.qty, totals.revenue, totals.refunds, totals.net]
        : ['TOTAL', totals.qty, totals.revenue, totals.refunds, totals.net]);
      const ws = XLSX.utils.aoa_to_sheet(aoa);
      ws['!cols'] = byDesk
        ? [{ wch: 34 }, { wch: 22 }, { wch: 9 }, { wch: 13 }, { wch: 13 }, { wch: 15 }]
        : [{ wch: 34 }, { wch: 9 }, { wch: 13 }, { wch: 13 }, { wch: 15 }];
      const wb = XLSX.utils.book_new();
      XLSX.utils.book_append_sheet(wb, ws, 'Product Totals');
      XLSX.writeFile(wb, `products-by-item-${loadedStart || 'all'}_${loadedEnd || 'all'}.xlsx`);
      return;
    }
    const header = byDesk
      ? ['Date', 'Product Name', 'Desk Location', 'Qty Sold', 'Revenue ($)', 'Refunds ($)', 'Net Revenue ($)']
      : ['Date', 'Product Name', 'Qty Sold', 'Revenue ($)', 'Refunds ($)', 'Net Revenue ($)'];
    const aoa = [header];
    groups.forEach(g => {
      g.rows.forEach(r => {
        const dp = (r.dateISO || '').split('-');
        const dv = dp.length === 3 ? new Date(+dp[0], +dp[1]-1, +dp[2]) : r.dateISO;
        aoa.push(byDesk
          ? [dv, r.product, r.desk, r.qty, r.revenue, r.refunds, r.net]
          : [dv, r.product, r.qty, r.revenue, r.refunds, r.net]);
      });
    });
    aoa.push(byDesk
      ? ['TOTAL', '', '', totals.qty, totals.revenue, totals.refunds, totals.net]
      : ['TOTAL', '', totals.qty, totals.revenue, totals.refunds, totals.net]);
    const ws = XLSX.utils.aoa_to_sheet(aoa, { cellDates: true });
    for (let ri = 1; ri < aoa.length; ri++) {
      const addr = XLSX.utils.encode_cell({ r: ri, c: 0 });
      if (ws[addr] && ws[addr].t === 'd') ws[addr].z = 'MM/DD/YY';
    }
    ws['!cols'] = byDesk
      ? [{ wch: 12 }, { wch: 34 }, { wch: 22 }, { wch: 9 }, { wch: 13 }, { wch: 13 }, { wch: 15 }]
      : [{ wch: 12 }, { wch: 34 }, { wch: 9 }, { wch: 13 }, { wch: 13 }, { wch: 15 }];
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, 'Daily Products');
    XLSX.writeFile(wb, `products-daily-${loadedStart || 'all'}_${loadedEnd || 'all'}.xlsx`);
  }

  const displayOrg = orgName || 'rec.us';
  const rangeLabel = `${formatDisplayDate(loadedStart)} — ${formatDisplayDate(loadedEnd)}`;
  const deskBtnLabel = selectedDesks.size === 0 ? 'All desks' : `${selectedDesks.size} desk${selectedDesks.size > 1 ? 's' : ''}`;

  return (
    <div>
      {!isPrint && (
        <div className="toolbar">
          <span className="toolbar-title">Product Sales — Daily</span>
          <span className="toolbar-spacer" />
          <label>From <input type="date" value={startDate} onChange={e => setStartDate(e.target.value)} /></label>
          <label>To <input type="date" value={endDate} onChange={e => setEndDate(e.target.value)} /></label>
          <button onClick={setThisYear}>This Year</button>
          <button onClick={setLastYear}>Last Year</button>
          <button onClick={setRolling12}>Rolling 12</button>
          <button className="btn-run" onClick={handleRun} disabled={loading || !datesChanged}>
            {loading ? <><span className="btn-spinner" />Loading…</> : 'Run'}
          </button>
          <span className="divider" />

          <div ref={deskBoxRef} style={{ position: 'relative' }}>
            <button className={selectedDesks.size > 0 ? 'active' : ''} onClick={() => setDeskPickerOpen(o => !o)}>
              {deskBtnLabel} ▾
            </button>
            {deskPickerOpen && (
              <div className="desk-picker" style={{ position: 'absolute', top: '110%', right: 0, zIndex: 50, background: '#fff',
                border: '1px solid #ccc', borderRadius: 6, padding: 8, minWidth: 220, maxHeight: 300,
                overflowY: 'auto', boxShadow: '0 6px 24px rgba(0,0,0,0.15)' }}>
                <div style={{ marginBottom: 6 }}>
                  <button onClick={() => setSelectedDesks(new Set())}>Clear (all)</button>
                </div>
                {allDesks.map(d => (
                  <label key={d} style={{ display: 'flex', alignItems: 'center', gap: 6, padding: '3px 2px',
                    fontSize: 12, textTransform: 'none', letterSpacing: 0, cursor: 'pointer' }}>
                    <input type="checkbox" checked={selectedDesks.has(d)} onChange={() => toggleDesk(d)} />
                    {d}
                  </label>
                ))}
              </div>
            )}
          </div>

          <button className={byDesk ? 'active' : ''} onClick={() => setByDesk(v => !v)}>By Desk Location</button>
          <button className={byItem ? 'active' : ''} onClick={() => setByItem(v => !v)}>Total by Item</button>
          <button className={hideZero ? 'active' : ''} onClick={() => setHideZero(z => !z)}>Hide $0</button>
          <span className="divider" />
          <input type="text" placeholder="Search products…" value={searchTerm}
            onChange={e => setSearchTerm(e.target.value)}
            style={{ width: 160 }} />
          <span className="divider" />
          <span style={{ fontSize: 11, color: '#666' }}>Chart:</span>
          <button className={showNet ? 'active' : ''} onClick={() => setShowNet(true)}>Net</button>
          <button className={!showNet ? 'active' : ''} onClick={() => setShowNet(false)}>Gross</button>
          <span className="divider" />
          <button onClick={expandAll} disabled={byItem}>Expand all</button>
          <button onClick={collapseAll} disabled={byItem}>Collapse all</button>
          <span className="divider" />
          <button className="btn-excel" onClick={exportExcel} disabled={loading || searchFiltered.length === 0}>Excel</button>
          <button onClick={() => { logClientEvent('print'); window.print(); }}>Print</button>
          <button className="btn-pdf" onClick={downloadPdf} disabled={pdfLoading || searchFiltered.length === 0}>{pdfLoading ? 'Generating…' : '📄 PDF'}</button>
        </div>
      )}

      <div className="page">
        <div className="report-header">
          {logoUrl ? <img className="report-header-logo" src={logoUrl} alt="" /> : null}
          <div>
            <div className="org-label">{displayOrg}</div>
            <div className="title">{byItem ? 'Product Sales — Total by Item' : 'Product Sales — Daily Detail'}</div>
            <div className="date-range">{rangeLabel}{byDesk ? ' · by desk location' : ''}{byItem ? ' · aggregated' : ''}{searchTerm.trim() ? ` · search: "${searchTerm.trim()}"` : ''}</div>
          </div>
        </div>

        {loading && <div className="loading"><div className="spinner" /><div className="juice-msg"><span>Squeezing the oranges…</span><span>Juicing!</span><span>Adding the pulp…</span><span>Chilling the glass…</span><span>Pouring it out…</span></div></div>}
        {error && !loading && <div className="error">Couldn’t load report: {error}</div>}

        {!loading && !error && (
          <>
            <div className="summary-cards">
              {showNet
                ? <SummaryCard color={totals.net < 0 ? 'amber' : 'blue'} label="Net Revenue" value={fmtMoney(totals.net)} />
                : <SummaryCard color="green" label="Gross Revenue" value={fmtMoney(totals.revenue)} />}
              {totals.refunds > 0 && <SummaryCard color="amber" label="Refunds" value={fmtMoney(totals.refunds)} />}
              {showNet
                ? <SummaryCard color="green" label="Gross Revenue" value={fmtMoney(totals.revenue)} sub="(detail)" />
                : <SummaryCard color={totals.net < 0 ? 'amber' : 'blue'} label="Net Revenue" value={fmtMoney(totals.net)} sub="(detail)" />}
              <SummaryCard color="slate" label="Total Units" value={fmtInt(totals.qty)} />
              <SummaryCard color="violet" label="Products" value={fmtInt(productCount)} />
              {bestDay && <SummaryCard color="slate" label={'Best Day (' + (showNet ? 'net' : 'gross') + ')'} value={fmtMoney(bestDay.val)} sub={bestDay.label} />}
            </div>

            {(byItem ? itemSummary.length > 0 : groups.length > 0) && (
              <div className="chart-wrap" style={{ height: byItem ? Math.max(240, Math.min(itemSummary.length, 25) * 28 + 60) : 240 }}><canvas ref={chartRef} /></div>
            )}

            <div className="table-wrapper" style={{ marginTop: 14 }}>

        {/* AI Insights */}
        {displayRows && displayRows.length > 0 && (
          <div className="insights-section no-print">
            <div className="insights-head">
              <button type="button" className="insights-btn" onClick={getInsights} disabled={insightsLoading}>
                                <span className="sparkle">✦</span><span className="sparkle">✧</span><span className="sparkle">✦</span><span className="sparkle">✧</span><span className="sparkle">✦</span><span className="sparkle">✧</span>
{insightsLoading ? 'Analyzing…' : (insights ? '↻ Refresh' : '✨ Rec Insights')}
              </button>
              {insights && !insightsLoading && (
                <span className="insights-sub">{'Analyzed ' + displayRows.length + ' products'}</span>
              )}
            </div>
            {insightsLoading && <div className="ai-loading"><div className="ai-spinner" /></div>}
            {insightsError && !insightsLoading && (
              <div style={{color:'#dc2626',fontSize:13,padding:'8px 0'}}><strong>Insights unavailable:</strong> {insightsError}</div>
            )}
            {insights && !insightsLoading && (
              <div className="insights-grid">
                {insights.map((ins, i) => (
                  <div key={i} className={'insight-card insight-' + (ins.type || 'signal')}>
                    <div className="insight-type">{ins.type || 'signal'}</div>
                    <div className="insight-title">{ins.title}</div>
                    <div className="insight-detail">{ins.detail}</div>
                    {ins.action && <div className="insight-action">→ {ins.action}</div>}
                  </div>
                ))}
              </div>
            )}
            {insights && !insightsLoading && (
              <div className="insights-feedback">
                {fbSent ? (
                  <span className="fb-thanks">✅ Thanks for the feedback!</span>
                ) : fbMode === 'down' ? (
                  <div className="fb-down-form">
                    <input placeholder="What could be better?" value={fbComment}
                      onChange={e => setFbComment(e.target.value)}
                      onKeyDown={e => e.key === 'Enter' && sendInsightsFeedback(0)}
                      autoFocus maxLength={500} />
                    <button className="fb-send" onClick={() => sendInsightsFeedback(0)}>Send</button>
                    <button onClick={() => setFbMode(null)}>Cancel</button>
                  </div>
                ) : (
                  <React.Fragment>
                    <span className="fb-label">Were these insights helpful?</span>
                    <button onClick={() => sendInsightsFeedback(1)} title="Yes">👍</button>
                    <button onClick={() => setFbMode('down')} title="Not helpful">👎</button>
                  </React.Fragment>
                )}
              </div>
            )}
          </div>
        )}

              <table>
                <thead>
                  <tr>
                    {!byItem && <th className="left">Date</th>}
                    <th className="left">Product Name</th>
                    {byDesk && <th className="left">Desk Location</th>}
                    <th>Qty Sold</th>
                    <th style={!showNet ? {color:'#16a34a',fontWeight:800} : {}}>Revenue</th>
                    <th>Refunds</th>
                    <th style={showNet ? {color:'#2563eb',fontWeight:800} : {}}>Net</th>
                  </tr>
                </thead>
                <tbody>
                  {byItem ? (
                    /* ── Total by Item view ── */
                    itemSummary.length === 0 ? (
                      <tr><td className="left" colSpan={nCols} style={{ textAlign: 'center', padding: 24, color: '#888' }}>
                        No product sales in this range.
                      </td></tr>
                    ) : itemSummary.map((r, i) => (
                      <tr key={r.product + '|' + (r.desk || '') + '|' + i}>
                        <td className="left">{r.product}</td>
                        {byDesk && <td className="left">{r.desk}</td>}
                        <td>{r.qty === 0 ? <span className="cell-zero">—</span> : fmtInt(r.qty)}</td>
                        <td style={!showNet ? {fontWeight:600,color:'#16a34a'} : {}}>{r.revenue === 0 ? <span className="cell-zero">—</span> : fmtMoney(r.revenue)}</td>
                        <td>{r.refunds === 0 ? <span className="cell-zero">—</span> : <span style={{ color: '#b45309' }}>{fmtMoney(r.refunds)}</span>}</td>
                        <td style={{ color: r.net < 0 ? '#dc2626' : (showNet ? '#2563eb' : 'inherit'), fontWeight: showNet ? 600 : 'normal' }}>{fmtMoney(r.net)}</td>
                      </tr>
                    ))
                  ) : (
                    /* ── Daily Detail view ── */
                    <>
                  {groups.length === 0 && (
                    <tr><td className="left" colSpan={nCols} style={{ textAlign: 'center', padding: 24, color: '#888' }}>
                      No product sales in this range.
                    </td></tr>
                  )}
                  {groups.map(g => {
                    const open = isOpen(g.dateISO);
                    return (
                      <React.Fragment key={g.dateISO}>
                        {/* date summary row (always visible, click to expand) */}
                        <tr style={{ background: '#eceae4', cursor: isPrint ? 'default' : 'pointer' }}
                            onClick={isPrint ? undefined : () => toggleDate(g.dateISO)}>
                          <td className="left" style={{ fontWeight: 700 }}>
                            {!isPrint && <span style={{ display: 'inline-block', width: 14, color: '#666' }}>{open ? '▾' : '▸'}</span>}
                            {g.dateLabel}
                          </td>
                          <td className="left" colSpan={byDesk ? 2 : 1} style={{ fontStyle: 'italic', color: '#666' }}>
                            {g.rows.length} {byDesk ? 'line' : 'product'}{g.rows.length > 1 ? 's' : ''}
                          </td>
                          <td style={{ fontWeight: 700 }}>{fmtInt(g.sub.qty)}</td>
                          <td style={{ fontWeight: 700, color: !showNet ? '#16a34a' : 'inherit' }}>{fmtMoney(g.sub.revenue)}</td>
                          <td style={{ fontWeight: 700, color: g.sub.refunds > 0 ? '#b45309' : 'inherit' }}>{g.sub.refunds === 0 ? '—' : fmtMoney(g.sub.refunds)}</td>
                          <td style={{ fontWeight: 700, color: g.sub.net < 0 ? '#dc2626' : (showNet ? '#2563eb' : 'inherit') }}>{fmtMoney(g.sub.net)}</td>
                        </tr>
                        {/* detail rows when expanded */}
                        {open && g.rows.map((r, i) => (
                          <tr key={g.dateISO + '|' + r.product + '|' + (r.desk || '') + '|' + i}>
                            <td className="left"></td>
                            <td className="left">{r.product}</td>
                            {byDesk && <td className="left">{r.desk}</td>}
                            <td>{r.qty === 0 ? <span className="cell-zero">—</span> : fmtInt(r.qty)}</td>
                            <td style={!showNet ? {fontWeight:600,color:'#16a34a'} : {}}>{r.revenue === 0 ? <span className="cell-zero">—</span> : fmtMoney(r.revenue)}</td>
                            <td>{r.refunds === 0 ? <span className="cell-zero">—</span> : <span style={{ color: '#b45309' }}>{fmtMoney(r.refunds)}</span>}</td>
                            <td style={{ color: r.net < 0 ? '#dc2626' : (showNet ? '#2563eb' : 'inherit'), fontWeight: showNet ? 600 : 'normal' }}>{fmtMoney(r.net)}</td>
                          </tr>
                        ))}
                      </React.Fragment>
                    );
                  })}
                    </>
                  )}
                </tbody>
                <tfoot>
                  <tr>
                    <td className="left" colSpan={byItem ? (byDesk ? 2 : 1) : (byDesk ? 3 : 2)}>
                      TOTAL · {byItem ? `${itemSummary.length} item${itemSummary.length !== 1 ? 's' : ''}` : `${groups.length} days · ${searchFiltered.length} rows`}
                    </td>
                    <td>{fmtInt(totals.qty)}</td>
                    <td style={!showNet ? {color:'#16a34a',fontWeight:700} : {}}>{fmtMoney(totals.revenue)}</td>
                    <td style={{ color: totals.refunds > 0 ? '#b45309' : 'inherit' }}>{fmtMoney(totals.refunds)}</td>
                    <td style={{ color: totals.net < 0 ? '#dc2626' : (showNet ? '#2563eb' : 'inherit'), fontWeight: showNet ? 700 : 'normal' }}>{fmtMoney(totals.net)}</td>
                  </tr>
                </tfoot>
              </table>
            </div>

            <div className="report-footer">
              <span>{displayOrg}</span>
              <span>Generated {new Date().toLocaleString('en-US')}</span>
            </div>
          </>
        )}

        <div id="report-ready" style={{ display: 'none' }} />
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
    <script src="/share-widget.js" defer></script>
    <script src="/feedback-widget.js" defer></script>
      <script src="/nav-breadcrumb.js" defer></script>
  </body>
</html>
