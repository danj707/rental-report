<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Product Sales — Month over Month</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'IBM Plex Sans', 'Segoe UI', system-ui, sans-serif;
      font-size: 12px;
      color: #1a1a1a;
      background: #f5f4f1;
      line-height: 1.35;
    }

    /* ── Toolbar ── */
    .toolbar {
      position: sticky;
      top: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 20px;
      background: #2c2c2c;
      color: #eee;
      font-size: 13px;
      flex-wrap: wrap;
    }
    .toolbar-title { font-weight: 600; margin-right: 8px; }
    .toolbar-spacer { flex: 1; }
    .toolbar label {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: #aaa;
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    .toolbar input[type="date"],
    .toolbar input[type="text"] {
      padding: 4px 8px;
      border: 1px solid rgba(255,255,255,.2);
      border-radius: 4px;
      background: rgba(255,255,255,.1);
      color: #fff;
      font-size: 12px;
      font-family: inherit;
      outline: none;
    }
    .toolbar input[type="date"]:focus,
    .toolbar input[type="text"]:focus { border-color: #3b82f6; }
    .toolbar input[type="date"]::-webkit-calendar-picker-indicator { filter: invert(1); cursor: pointer; }
    .toolbar input[type="text"]::placeholder { color: #666; }
    .toolbar button {
      padding: 6px 14px;
      border: 1px solid rgba(255,255,255,.25);
      border-radius: 4px;
      background: rgba(255,255,255,.08);
      color: #fff;
      font-size: 12px;
      font-family: inherit;
      cursor: pointer;
      transition: background .15s;
    }
    .toolbar button:hover { background: rgba(255,255,255,.18); }
    .toolbar button.active {
      background: rgba(255,255,255,.22);
      border-color: rgba(255,255,255,.55);
    }
    .toolbar .btn-run { background: #16a34a; border-color: #16a34a; font-weight: 600; }
    .toolbar .btn-run:hover { background: #15803d; }
    .toolbar .btn-run:disabled { opacity: .5; cursor: not-allowed; }
    .toolbar .btn-excel { background: #166534; border-color: #166534; font-weight: 600; }
    .toolbar .btn-excel:hover { background: #14532d; }
    .toolbar .btn-excel:disabled { opacity: .5; cursor: not-allowed; }
    .toolbar .divider { width: 1px; height: 28px; background: rgba(255,255,255,.15); margin: 0 4px; }
    .toolbar .row-count { font-size: 11px; color: #aaa; }

    /* ── Page ── */
    .page {
      max-width: 1320px;
      margin: 16px auto;
      padding: 24px 28px;
      background: #fff;
      box-shadow: 0 1px 4px rgba(0,0,0,.08);
    }

    /* ── Report header ── */
    .report-header-logo { height: 42px; max-width: 140px; object-fit: contain; object-position: left center; }
    .report-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      border-bottom: 2.5px solid #111;
      padding-bottom: 8px;
      margin-bottom: 16px;
    }
    .report-header .org-label {
      font-size: 10.5px;
      letter-spacing: 1.6px;
      text-transform: uppercase;
      color: #777;
      font-weight: 600;
    }
    .report-header .title { font-size: 17px; font-weight: 700; margin-top: 1px; }
    .report-header .date-range { font-size: 11px; color: #666; text-align: right; }

    /* ── Summary cards ── */
    .summary-cards {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }
    .summary-card {
      flex: 1;
      min-width: 110px;
      padding: 10px 12px;
      border-radius: 5px;
      background: #f8f8f6;
      border: 1px solid #e4e4e0;
      border-left: 3px solid #ccc;
    }
    .summary-card .card-label {
      font-size: 9.5px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: #888;
      font-weight: 600;
      margin-bottom: 4px;
    }
    .summary-card .card-value {
      font-size: 15px;
      font-weight: 700;
      font-family: 'IBM Plex Mono', monospace;
      white-space: normal;
      word-break: break-word;
    }
    .summary-card.green  { border-left-color: #16a34a; }
    .summary-card.green  .card-value { color: #15803d; }
    .summary-card.blue   { border-left-color: #3b82f6; }
    .summary-card.blue   .card-value { color: #2563eb; }
    .summary-card.violet { border-left-color: #7c3aed; }
    .summary-card.violet .card-value { color: #6d28d9; }
    .summary-card.amber  { border-left-color: #d97706; }
    .summary-card.amber  .card-value { color: #b45309; }
    .summary-card.slate  { border-left-color: #475569; }
    .summary-card.slate  .card-value { color: #334155; }

    /* ── Table ── */
    .table-wrapper { overflow-x: auto; }
    table { border-collapse: collapse; width: 100%; font-size: 11.5px; }

    thead th {
      background: #e4e4e0;
      border: 1px solid #ccc;
      padding: 5px 8px;
      text-align: right;
      font-weight: 600;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.3px;
      color: #333;
      white-space: nowrap;
    }
    thead th.left { text-align: left; }
    thead th.group {
      text-align: center;
      background: #d0d0cc;
      font-size: 9px;
      border-bottom: 2px solid #aaa;
      color: #444;
    }
    thead th.group.total-group {
      background: #c4c4c0;
    }
    thead th.total-col {
      background: #d8d8d4;
    }

    tbody td {
      border: 1px solid #e8e8e4;
      padding: 4px 8px;
      text-align: right;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 11px;
      white-space: nowrap;
    }
    tbody td.left {
      text-align: left;
      font-family: 'IBM Plex Sans', sans-serif;
      white-space: normal;
      word-break: break-word;
      min-width: 180px;
      max-width: 260px;
    }
    tbody td.total-col { background: #f4f4f0; }
    tbody tr:nth-child(even) td.total-col { background: #efefe9; }
    tbody tr:hover td.total-col { background: #e8e8e2; }
    tbody tr:nth-child(even) { background: #fafaf8; }
    tbody tr:hover { background: #f0f0ec; }

    tfoot td {
      border: 1px solid #ccc;
      border-top: 2px solid #444;
      padding: 5px 8px;
      text-align: right;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 11px;
      font-weight: 700;
      background: #ececea;
      white-space: nowrap;
    }
    tfoot td.left {
      text-align: left;
      font-family: 'IBM Plex Sans', sans-serif;
      font-weight: 700;
    }
    tfoot td.total-col { background: #e4e4e0; }

    .cell-zero { color: #c8c8c4; }
    .mom-up   { font-size: 9px; color: #16a34a; margin-left: 3px; font-family: 'IBM Plex Mono', monospace; }
    .mom-down { font-size: 9px; color: #dc2626; margin-left: 3px; font-family: 'IBM Plex Mono', monospace; }

    /* ── Chart ── */
    .chart-wrap { margin-top: 4px; position: relative; }
    .chart-wrap canvas { max-width: 100%; }

    /* ── Footer ── */
    .report-footer {
      display: flex;
      justify-content: space-between;
      border-top: 2.5px solid #111;
      margin-top: 16px;
      padding-top: 6px;
      font-size: 10px;
      color: #777;
    }

    /* ── Loading / Error ── */
    .loading { text-align: center; padding: 80px 20px; color: #888; font-size: 14px; }
    .loading .spinner {
      display: inline-block;
      width: 28px; height: 28px;
      border: 3px solid #ddd;
      border-top-color: #3b82f6;
      border-radius: 50%;
      animation: spin .7s linear infinite;
      margin-bottom: 12px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .error { text-align: center; padding: 60px 20px; color: #b91c1c; font-size: 14px; }

    /* ── Print ── */
    @media print {
      body { background: #fff; }
      .toolbar { display: none !important; }
      .page { box-shadow: none; margin: 0; padding: 12px 16px; max-width: 100%; }
    }
    body.print-mode .toolbar { display: none !important; }
    body.print-mode .page { box-shadow: none; margin: 0; padding: 12px 16px; max-width: 100%; }
  </style>
</head>
<body>
<div id="root"></div>

<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<script type="text/babel">
const { useState, useEffect, useMemo, useCallback, useRef } = React;

const LS_VIEW      = 'products_view_mode_v1';
const LS_HIDE_ZERO = 'products_hide_zero_v1';
const LS_SHOW_NET  = 'products_show_net_v1';

// ── Helpers ───────────────────────────────────────────────────────────
function toISO(d) {
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function getDefaultRange() {
  const now = new Date();
  return { start: toISO(new Date(now.getFullYear(), 0, 1)), end: toISO(now) };
}
function formatDisplayDate(iso) {
  if (!iso) return '';
  const d = new Date(iso + 'T12:00:00');
  const M = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  return `${M[d.getMonth()]} ${d.getDate()}, ${d.getFullYear()}`;
}
function fmtMonthShort(iso) {
  if (!iso) return '';
  const d = new Date(iso + 'T12:00:00');
  const mo = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  return `${mo[d.getMonth()]} '${String(d.getFullYear()).slice(2)}`;
}
function fmtMonthFull(iso) {
  if (!iso) return '';
  const d = new Date(iso + 'T12:00:00');
  const M = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  return `${M[d.getMonth()]} ${d.getFullYear()}`;
}
function pf(v) { const n = parseFloat(v); return isNaN(n) ? 0 : n; }
function fmtMoney(v) {
  const n = pf(v);
  const abs = Math.abs(n).toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g, ',');
  return (n < 0 ? '-$' : '$') + abs;
}
function fmtNum(v) {
  const n = pf(v);
  return n === 0 ? '0' : n.toLocaleString();
}

// ── Summary card ──────────────────────────────────────────────────────
function SummaryCard({ label, value, color = 'blue', mono = false }) {
  return (
    <div className={`summary-card ${color}`}>
      <div className="card-label">{label}</div>
      <div className="card-value" style={mono ? {} : { fontFamily: "'IBM Plex Sans', sans-serif", fontSize: 13 }}>{value}</div>
    </div>
  );
}

// ── App ───────────────────────────────────────────────────────────────
function App() {
  const defaults = useMemo(() => getDefaultRange(), []);
  const orgSlug  = useMemo(() => window.location.pathname.split('/').filter(Boolean)[0] || '', []);
  const params   = useMemo(() => new URLSearchParams(window.location.search), []);

  const [startDate,    setStartDate]    = useState(params.get('start_date') || defaults.start);
  const [endDate,      setEndDate]      = useState(params.get('end_date')   || defaults.end);
  const [viewMode,     setViewMode]     = useState(() => localStorage.getItem(LS_VIEW) || 'revenue');
  const [hideZeroRev,  setHideZeroRev]  = useState(() => localStorage.getItem(LS_HIDE_ZERO) === 'true');
  const [showNetOnly,  setShowNetOnly]  = useState(() => localStorage.getItem(LS_SHOW_NET)  === 'true');
  const [selectedLocs, setSelectedLocs] = useState(() => new Set());
  const [locPickerOpen,setLocPickerOpen]= useState(false);
  const locPickerRef = useRef(null);

  const [rows,      setRows]      = useState(null);
  const [orgName,   setOrgName]   = useState('');
  const [logoUrl,   setLogoUrl]   = useState(null);
  const [loading,   setLoading]   = useState(false);
  const [error,     setError]     = useState(null);
  const [showChart, setShowChart] = useState(false);
  const [loadedStart, setLoadedStart] = useState(null);
  const [loadedEnd,   setLoadedEnd]   = useState(null);

  const chartRef  = useRef(null);
  const chartInst = useRef(null);

  useEffect(() => { localStorage.setItem(LS_VIEW,      viewMode);               }, [viewMode]);
  useEffect(() => { localStorage.setItem(LS_HIDE_ZERO, String(hideZeroRev));   }, [hideZeroRev]);
  useEffect(() => { localStorage.setItem(LS_SHOW_NET,  String(showNetOnly));   }, [showNetOnly]);

  // Close loc picker on outside click
  useEffect(() => {
    function handleClick(e) {
      if (locPickerRef.current && !locPickerRef.current.contains(e.target)) setLocPickerOpen(false);
    }
    document.addEventListener('mousedown', handleClick);
    return () => document.removeEventListener('mousedown', handleClick);
  }, []);
  useEffect(() => { if (params.get('_print') === '1') document.body.classList.add('print-mode'); }, []);

  // ── Fetch ────────────────────────────────────────────────────────────
  const fetchData = useCallback((sd, ed, loc) => {
    setLoading(true); setError(null);
    const qs = new URLSearchParams();
    if (sd)  qs.set('start_date',    sd);
    if (ed)  qs.set('end_date',      ed);
    if (loc) qs.set('desk_location', loc);
    fetch(`/${orgSlug}/products/api/data?${qs}`)
      .then(r => { if (!r.ok) throw new Error(`Server returned ${r.status}`); return r.json(); })
      .then(json => {
        setRows(json.rows || []);
        setOrgName(json.meta?.org_name || '');
        setLogoUrl(json.meta?.logo_url || null);
        setLoadedStart(sd); setLoadedEnd(ed);
      })
      .catch(e => setError(e.message))
      .finally(() => setLoading(false));
  }, [orgSlug]);

  useEffect(() => { fetchData(startDate, endDate, locationInput); }, []);

  function handleRun() { fetchData(startDate, endDate, locationInput); }

  function setYear(offset) {
    const now = new Date();
    const y = now.getFullYear() + offset;
    setStartDate(toISO(new Date(y, 0, 1)));
    setEndDate(toISO(new Date(y, 11, 31)));
  }
  function setRolling12() {
    const now = new Date();
    const start = new Date(now.getFullYear() - 1, now.getMonth() + 1, 1);
    setStartDate(toISO(start));
    setEndDate(toISO(now));
  }

  const datesChanged = startDate !== loadedStart || endDate !== loadedEnd;

  // ── Pivot ────────────────────────────────────────────────────────────
  const { months, products, matrix, rowTotals, monthTotals, grand, allDeskLocs } = useMemo(() => {
    if (!rows || rows.length === 0)
      return { months: [], products: [], matrix: {}, rowTotals: {}, monthTotals: {}, grand: { qty: 0, revenue: 0, refunds: 0, net: 0 }, allDeskLocs: [] };

    const matrix = {};
    const monthSet = new Set();
    const productSet = new Set();

    rows.forEach(r => {
      const product = r['Product Name'] || '(unknown)';
      const month   = r['Month'];
      const qty     = pf(r['Qty Sold']);
      const revenue = pf(r['Revenue ($)']);
      if (month) monthSet.add(month);
      productSet.add(product);
      if (!matrix[product]) matrix[product] = {};
      if (!matrix[product][month]) matrix[product][month] = { qty: 0, revenue: 0 };
      matrix[product][month].qty     += qty;
      matrix[product][month].revenue += revenue;
    });

    const months = [...monthSet].sort();
    const products = [...productSet].sort((a, b) => {
      const rA = months.reduce((s, m) => s + (matrix[a]?.[m]?.revenue || 0), 0);
      const rB = months.reduce((s, m) => s + (matrix[b]?.[m]?.revenue || 0), 0);
      return rB - rA;
    });

    const rowTotals = {};
    products.forEach(p => {
      rowTotals[p] = {
        qty:     months.reduce((s, m) => s + (matrix[p]?.[m]?.qty     || 0), 0),
        revenue: months.reduce((s, m) => s + (matrix[p]?.[m]?.revenue || 0), 0),
      };
    });
    const monthTotals = {};
    months.forEach(m => {
      monthTotals[m] = {
        qty:     products.reduce((s, p) => s + (matrix[p]?.[m]?.qty     || 0), 0),
        revenue: products.reduce((s, p) => s + (matrix[p]?.[m]?.revenue || 0), 0),
      };
    });
    const grand = {
      qty:     products.reduce((s, p) => s + rowTotals[p].qty,     0),
      revenue: products.reduce((s, p) => s + rowTotals[p].revenue, 0),
    };

    return { months, products, matrix, rowTotals, monthTotals, grand };
  }, [rows]);

  // ── MoM change ───────────────────────────────────────────────────────
  function getMoM(product, mi) {
    if (mi === 0) return null;
    const field = viewMode === 'qty' ? 'qty' : showNetOnly ? 'net' : 'revenue';
    const curr  = matrix[product]?.[months[mi]]?.[field]     || 0;
    const prev  = matrix[product]?.[months[mi - 1]]?.[field] || 0;
    if (prev === 0 || curr === 0) return null;
    const pct = (curr - prev) / prev * 100;
    return Math.abs(pct) < 0.5 ? null : pct;
  }

  // ── Excel export ─────────────────────────────────────────────────────
  function exportExcel() {
    if (!rows || rows.length === 0) return;
    const field = viewMode === 'qty' ? 'qty' : 'revenue';
    const hdr = ['Product', ...months.map(fmtMonthShort), 'Total'];
    if (viewMode === 'both') {
      const hdr2 = ['Product', ...months.flatMap(m => [fmtMonthShort(m) + ' Rev', fmtMonthShort(m) + ' Qty']), 'Total Rev', 'Total Qty'];
      const body = products.map(p => [p, ...months.flatMap(m => [matrix[p]?.[m]?.revenue || 0, matrix[p]?.[m]?.qty || 0]), rowTotals[p].revenue, rowTotals[p].qty]);
      const foot = ['TOTAL', ...months.flatMap(m => [monthTotals[m]?.revenue || 0, monthTotals[m]?.qty || 0]), grand.revenue, grand.qty];
      const ws = XLSX.utils.aoa_to_sheet([hdr2, ...body, foot]);
      const wb = XLSX.utils.book_new(); XLSX.utils.book_append_sheet(wb, ws, 'Products MoM');
      XLSX.writeFile(wb, `products-mom-${loadedStart || 'export'}.xlsx`);
    } else {
      const body = products.map(p => [p, ...months.map(m => matrix[p]?.[m]?.[field] || 0), rowTotals[p][field]]);
      const foot = ['TOTAL', ...months.map(m => monthTotals[m]?.[field] || 0), grand[field]];
      const ws = XLSX.utils.aoa_to_sheet([hdr, ...body, foot]);
      const wb = XLSX.utils.book_new(); XLSX.utils.book_append_sheet(wb, ws, 'Products MoM');
      XLSX.writeFile(wb, `products-mom-${loadedStart || 'export'}.xlsx`);
    }
    logClientEvent('excel');
  }

  function logClientEvent(event) {
    try {
      const parts = window.location.pathname.split('/').filter(Boolean);
      if (parts.length >= 2) fetch(`/${parts[0]}/${parts[1]}/api/log?event=${event}`, { method: 'POST' }).catch(() => {});
    } catch {}
  }

  // ── Chart ────────────────────────────────────────────────────────────
  useEffect(() => {
    if (!showChart || !chartRef.current || months.length === 0) return;
    if (chartInst.current) { chartInst.current.destroy(); chartInst.current = null; }
    const field  = viewMode === 'qty' ? 'qty' : 'revenue';
    const colors = ['#4f46e5','#16a34a','#d97706','#dc2626','#0891b2','#7c3aed','#be185d','#475569','#c2410c','#15803d'];
    chartInst.current = new Chart(chartRef.current.getContext('2d'), {
      type: 'bar',
      data: {
        labels: months.map(fmtMonthShort),
        datasets: products.slice(0, 10).map((p, i) => ({
          label: p,
          data: months.map(m => matrix[p]?.[m]?.[field] || 0),
          backgroundColor: colors[i % colors.length],
          borderWidth: 0,
          borderRadius: 2,
        })),
      },
      options: {
        responsive: true, maintainAspectRatio: false,
        plugins: { legend: { position: 'top', labels: { boxWidth: 10, font: { size: 10, family: "'IBM Plex Sans'" } } } },
        scales: {
          y: { ticks: { callback: v => field === 'qty' ? fmtNum(v) : '$' + Number(v).toLocaleString(), font: { size: 10 } } },
          x: { ticks: { maxRotation: 40, font: { size: 10 } } },
        },
      },
    });
    return () => chartInst.current?.destroy();
  }, [showChart, months, products, matrix, viewMode]);

  // ── Toolbar ───────────────────────────────────────────────────────────
  const isPrint = params.get('_print') === '1';

  function renderToolbar() {
    if (isPrint) return null;
    return (
      <div className="toolbar">
        <span className="toolbar-title">Product Sales MoM</span>

        <label>
          Start
          <input type="date" value={startDate} onChange={e => setStartDate(e.target.value)} />
        </label>
        <label>
          End
          <input type="date" value={endDate} onChange={e => setEndDate(e.target.value)} />
        </label>
        {/* ── Desk Location multi-select ── */}
        {allDeskLocs.length > 0 && (
          <div ref={locPickerRef} style={{ position: 'relative' }}>
            <button
              onClick={() => setLocPickerOpen(v => !v)}
              style={{
                fontSize: 11, padding: '5px 10px',
                background: selectedLocs.size > 0 && selectedLocs.size < allDeskLocs.length
                  ? 'rgba(217,119,6,.25)' : 'rgba(255,255,255,.08)',
                border: selectedLocs.size > 0 && selectedLocs.size < allDeskLocs.length
                  ? '1px solid #d97706' : '1px solid rgba(255,255,255,.25)',
                borderRadius: 4, color: '#fff', cursor: 'pointer'
              }}
            >
              📍 {selectedLocs.size === 0 ? 'All Locations' : selectedLocs.size === allDeskLocs.length ? 'All Locations' : `${selectedLocs.size} Location${selectedLocs.size > 1 ? 's' : ''}`}
            </button>
            {locPickerOpen && (
              <div style={{
                position: 'absolute', top: '110%', left: 0, zIndex: 999,
                background: '#2c2c2c', border: '1px solid #444', borderRadius: 6,
                padding: '8px 0', minWidth: 220, maxHeight: 280, overflowY: 'auto',
                boxShadow: '0 4px 16px rgba(0,0,0,.4)'
              }}>
                <div style={{ padding: '4px 12px 8px', borderBottom: '1px solid #444', display: 'flex', gap: 8 }}>
                  <button onClick={() => setSelectedLocs(new Set())}
                    style={{ fontSize: 10, padding: '2px 8px', background: '#444', border: 'none', borderRadius: 3, color: '#ccc', cursor: 'pointer' }}>
                    All
                  </button>
                  <button onClick={() => setSelectedLocs(new Set(allDeskLocs))}
                    style={{ fontSize: 10, padding: '2px 8px', background: '#444', border: 'none', borderRadius: 3, color: '#ccc', cursor: 'pointer' }}>
                    None
                  </button>
                  <button onClick={() => {
                    const online = new Set(['']);
                    setSelectedLocs(online);
                  }}
                    style={{ fontSize: 10, padding: '2px 8px', background: '#444', border: 'none', borderRadius: 3, color: '#ccc', cursor: 'pointer' }}>
                    Online only
                  </button>
                </div>
                {allDeskLocs.map(loc => (
                  <label key={loc} style={{
                    display: 'flex', alignItems: 'center', gap: 8,
                    padding: '5px 12px', cursor: 'pointer', fontSize: 11.5, color: '#ddd',
                    background: selectedLocs.has(loc) ? 'rgba(59,130,246,.2)' : 'transparent'
                  }}>
                    <input type="checkbox"
                      checked={selectedLocs.size === 0 || selectedLocs.has(loc)}
                      onChange={e => {
                        const next = new Set(selectedLocs.size === 0 ? allDeskLocs : selectedLocs);
                        if (e.target.checked) next.add(loc); else next.delete(loc);
                        if (next.size === allDeskLocs.length) setSelectedLocs(new Set());
                        else setSelectedLocs(next);
                      }}
                    />
                    {loc}
                  </label>
                ))}
              </div>
            )}
          </div>
        )}

        <button onClick={() => setYear(0)}   style={{ fontSize: 11, padding: '4px 8px' }}>This Year</button>
        <button onClick={() => setYear(-1)}  style={{ fontSize: 11, padding: '4px 8px' }}>Last Year</button>
        <button onClick={setRolling12}       style={{ fontSize: 11, padding: '4px 8px' }}>Rolling 12</button>

        <button
          className="btn-run"
          onClick={handleRun}
          disabled={loading}
          style={datesChanged && !loading ? { boxShadow: '0 0 0 2px #4ade80' } : {}}
        >
          {loading ? 'Loading…' : '▶ Run Report'}
        </button>

        <div className="divider" />

        {['revenue', 'qty', 'both'].map(mode => (
          <button
            key={mode}
            className={viewMode === mode ? 'active' : ''}
            style={{ fontSize: 11, padding: '4px 10px' }}
            onClick={() => setViewMode(mode)}
          >
            {mode === 'revenue' ? '$ Revenue' : mode === 'qty' ? '# Qty' : '☰ Both'}
          </button>
        ))}

        <div className="divider" />

        <button
          onClick={() => setShowNetOnly(v => !v)}
          className={showNetOnly ? 'active' : ''}
          style={{ fontSize: 11, padding: '4px 10px' }}
          title="Show Net Revenue (gross minus refunds) instead of gross"
        >Net Revenue</button>

        <button
          onClick={() => setHideZeroRev(v => !v)}
          className={hideZeroRev ? 'active' : ''}
          style={{ fontSize: 11, padding: '4px 10px' }}
          title="Hide products with $0 gross revenue"
        >Hide $0</button>

        <div className="divider" />

        <button
          className={showChart ? 'active' : ''}
          style={{ fontSize: 11, padding: '4px 10px' }}
          onClick={() => setShowChart(v => !v)}
        >▐ Chart</button>

        <div className="toolbar-spacer" />

        {rows && (
          <span className="row-count">
            {products.length} product{products.length !== 1 ? 's' : ''} · {months.length} month{months.length !== 1 ? 's' : ''}
            {selectedLocs.size > 0 && selectedLocs.size < allDeskLocs.length && (
              <> · {selectedLocs.size} location{selectedLocs.size > 1 ? 's' : ''}</>
            )}
          </span>
        )}

        <div className="divider" />

        <button onClick={() => { logClientEvent('print'); window.print(); }}>🖨 Print</button>
        <button
          className="btn-excel"
          onClick={exportExcel}
          disabled={!rows || rows.length === 0}
        >📥 Excel</button>
      </div>
    );
  }

  // ── Summary cards ────────────────────────────────────────────────────
  function renderSummaryCards() {
    if (!rows || rows.length === 0) return null;
    const bestProduct = products[0];
    const bestMonth   = months.reduce((b, m) => !b || (monthTotals[m]?.net || 0) > (monthTotals[b]?.net || 0) ? m : b, null);
    const hasRefunds  = grand.refunds > 0;
    return (
      <div className="summary-cards">
        <SummaryCard label="Gross Revenue"   value={fmtMoney(grand.revenue)} color="green"  />
        {hasRefunds && <SummaryCard label="Refunds"       value={fmtMoney(grand.refunds)} color="amber"  />}
        <SummaryCard label="Net Revenue"     value={fmtMoney(grand.net)}     color={grand.net >= 0 ? 'blue' : 'amber'}   />
        <SummaryCard label="Total Units Sold" value={fmtNum(grand.qty)}      color="slate"  />
        <SummaryCard label="Products"        value={products.length}          color="violet" />
        {bestMonth && (
          <div className="summary-card slate">
            <div className="card-label">Best Month (Net)</div>
            <div className="card-value" style={{ fontFamily: "'IBM Plex Sans'", fontSize: 13 }}>{fmtMonthFull(bestMonth)}</div>
            <div style={{ fontSize: 10, color: '#888', marginTop: 3 }}>{fmtMoney(monthTotals[bestMonth]?.net)}</div>
          </div>
        )}
      </div>
    );
  }

  // ── Table ────────────────────────────────────────────────────────────
  function renderTable() {
    if (!rows || rows.length === 0) {
      return <div style={{ textAlign: 'center', padding: '40px 0', color: '#888' }}>No data found for the selected date range.</div>;
    }

    const isBoth = viewMode === 'both';
    const field  = viewMode === 'qty' ? 'qty' : showNetOnly ? 'net' : 'revenue';
    const fmt    = viewMode === 'qty' ? fmtNum : fmtMoney;

    return (
      <div className="table-wrapper">
        <table>
          <thead>
            {/* Group header row — month names */}
            <tr>
              <th className="group left">Product</th>
              {months.map(m => (
                <th key={m} className="group" colSpan={isBoth ? 2 : 1}>{fmtMonthShort(m)}</th>
              ))}
              <th className="group total-group" colSpan={isBoth ? 2 : 1}>Total</th>
            </tr>

            {/* Column header row — sub-columns in both mode, labels in single mode */}
            {isBoth && (
              <tr>
                <th className="left"></th>
                {months.map(m => (
                  <React.Fragment key={m}>
                    <th>Revenue</th>
                    <th>Qty</th>
                  </React.Fragment>
                ))}
                <th className="total-col">Revenue</th>
                <th className="total-col">Qty</th>
              </tr>
            )}
          </thead>

          <tbody>
            {products.map((p, pi) => (
              <tr key={p}>
                <td className="left">{p}</td>

                {months.map((m, mi) => {
                  const cell  = matrix[p]?.[m] || { qty: 0, revenue: 0 };
                  const mom   = getMoM(p, mi);
                  const empty = cell.revenue === 0 && cell.qty === 0;

                  if (isBoth) {
                    const momBoth = getMoM(p, mi);
                    return (
                      <React.Fragment key={m}>
                        <td>
                          {cell.revenue === 0 ? <span className="cell-zero">—</span> : fmtMoney(cell.revenue)}
                          {cell.revenue !== 0 && momBoth !== null && (
                            <span className={momBoth > 0 ? 'mom-up' : 'mom-down'}>
                              {momBoth > 0 ? '▲' : '▼'}{Math.abs(momBoth).toFixed(0)}%
                            </span>
                          )}
                        </td>
                        <td>{cell.qty === 0 ? <span className="cell-zero">—</span> : fmtNum(cell.qty)}</td>
                      </React.Fragment>
                    );
                  }
                  return (
                    <td key={m}>
                      {empty
                        ? <span className="cell-zero">—</span>
                        : <>
                            {fmt(cell[field])}
                            {mom !== null && (
                              <span className={mom > 0 ? 'mom-up' : 'mom-down'}>
                                {mom > 0 ? '▲' : '▼'}{Math.abs(mom).toFixed(0)}%
                              </span>
                            )}
                          </>
                      }
                    </td>
                  );
                })}

                {isBoth ? (
                  <>
                    <td className="total-col">{fmtMoney(rowTotals[p].revenue)}</td>
                    <td className="total-col">{fmtNum(rowTotals[p].qty)}</td>
                  </>
                ) : (
                  <td className="total-col">{fmt(rowTotals[p][field])}</td>
                )}
              </tr>
            ))}
          </tbody>

          <tfoot>
            <tr>
              <td className="left">TOTAL</td>
              {months.map(m => {
                const mt = monthTotals[m] || { qty: 0, revenue: 0 };
                if (isBoth) return (
                  <React.Fragment key={m}>
                    <td>{fmtMoney(mt.revenue)}</td>
                    <td>{fmtNum(mt.qty)}</td>
                  </React.Fragment>
                );
                return <td key={m}>{fmt(mt[field])}</td>;
              })}
              {isBoth ? (
                <>
                  <td className="total-col">{fmtMoney(grand.revenue)}</td>
                  <td className="total-col">{fmtNum(grand.qty)}</td>
                </>
              ) : (
                <td className="total-col">{fmt(grand[field])}</td>
              )}
            </tr>
          </tfoot>
        </table>
      </div>
    );
  }

  // ── Error / Loading ───────────────────────────────────────────────────
  if (error && !rows) {
    return (
      <div>
        {renderToolbar()}
        <div className="page">
          <div className="error">
            <p><strong>Failed to load report data</strong></p>
            <p style={{ marginTop: 8 }}>{error}</p>
          </div>
        </div>
      </div>
    );
  }

  if (!rows) {
    return (
      <div>
        {renderToolbar()}
        <div className="page">
          <div className="loading">
            <div className="spinner" />
            <div>Loading report data…</div>
          </div>
        </div>
      </div>
    );
  }

  // ── Run meta ──────────────────────────────────────────────────────────
  const now = new Date();
  const runDate = `${(now.getMonth()+1).toString().padStart(2,'0')}/${now.getDate().toString().padStart(2,'0')}/${now.getFullYear()} @ ${now.toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit',hour12:true}).toLowerCase()}`;
  const displayOrg = orgName || 'rec.us';
  const dateRangeLabel = [
    loadedStart ? formatDisplayDate(loadedStart) : null,
    loadedEnd   ? formatDisplayDate(loadedEnd)   : null,
  ].filter(Boolean).join(' – ') || 'All Dates';

  return (
    <div>
      {renderToolbar()}

      <div className="page" style={loading ? { opacity: 0.5, pointerEvents: 'none' } : {}}>

        {/* Report header */}
        <div className="report-header">
          <div>
            {logoUrl && <img src={logoUrl} alt="" className="report-header-logo" onError={e => e.target.style.display='none'} />}
            <div className="org-label">{displayOrg}</div>
            <div className="title">Product Sales — Month over Month</div>
          </div>
          <div className="date-range">{dateRangeLabel}</div>
        </div>

        {/* Summary cards */}
        {renderSummaryCards()}

        {/* Table */}
        {renderTable()}

        {/* Chart */}
        {showChart && months.length > 0 && (
          <div className="chart-wrap" style={{ height: 320, marginTop: 20 }}>
            <canvas ref={chartRef} />
          </div>
        )}

        {/* Footer */}
        <div className="report-footer">
          <span>{displayOrg}</span>
          <span>Run Date/Time: {runDate}</span>
        </div>

        <div id="report-ready" style={{ display: 'none' }} />
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
