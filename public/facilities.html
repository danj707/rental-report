<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Facilities</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Inter', system-ui, -apple-system, sans-serif; font-size: 12px; color: #1a1a1a; background: #f5f4f1; line-height: 1.35; }

    /* ── Toolbar (matches Programs / Court Utilization) ── */
    .toolbar { position: sticky; top: 0; z-index: 100; display: flex; align-items: center; gap: 10px; padding: 8px 20px; background: #2c2c2c; color: #eee; font-size: 13px; flex-wrap: wrap; }
    .toolbar-title { font-weight: 600; margin-right: 4px; }
    .toolbar-back { color: #9ca3af; text-decoration: none; font-size: 12px; }
    .toolbar-back:hover { color: #fff; }
    .toolbar-spacer { flex: 1; }
    .toolbar label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.5px; color: #aaa; display: flex; flex-direction: column; gap: 2px; }
    .toolbar input[type="date"] { padding: 4px 8px; border: 1px solid rgba(255,255,255,.2); border-radius: 4px; background: rgba(255,255,255,.1); color: #fff; font-size: 12px; font-family: inherit; outline: none; }
    .toolbar input[type="date"]:focus { border-color: #3b82f6; }
    .toolbar input[type="date"]::-webkit-calendar-picker-indicator { filter: invert(1); cursor: pointer; }
    .toolbar button { padding: 6px 14px; border: 1px solid rgba(255,255,255,.25); border-radius: 4px; background: rgba(255,255,255,.08); color: #fff; font-size: 12px; font-family: inherit; cursor: pointer; transition: background .15s; white-space: nowrap; }
    .toolbar button:hover { background: rgba(255,255,255,.18); }
    .toolbar .btn-run { background: #16a34a; border-color: #16a34a; font-weight: 600; }
    .toolbar .btn-run:hover { background: #15803d; }
    .toolbar .btn-pdf { background: #3b82f6; border-color: #3b82f6; font-weight: 600; }
    .toolbar .btn-excel { background: #16803c; border-color: #16803c; font-weight: 600; }
    .toolbar .row-count { font-size: 11px; color: #aaa; }
    .toolbar .divider { width: 1px; height: 28px; background: rgba(255,255,255,.15); margin: 0 2px; }
    .toolbar .chk { flex-direction: row; align-items: center; gap: 6px; color: #ddd; text-transform: none; letter-spacing: 0; font-size: 12px; cursor: pointer; }

    /* ── Page ── */
    .page { max-width: 1400px; margin: 16px auto; padding: 24px 28px; background: #fff; box-shadow: 0 1px 4px rgba(0,0,0,.08); }

    /* ── Header ── */
    .report-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2.5px solid #111; padding-bottom: 10px; margin-bottom: 18px; gap: 16px; }
    .report-header-left { display: flex; align-items: center; gap: 14px; }
    .report-header-logo { height: 42px; max-width: 140px; object-fit: contain; object-position: left center; }
    .report-header .org-label { font-size: 10px; letter-spacing: 1.6px; text-transform: uppercase; color: #777; font-weight: 600; }
    .report-header .title { font-size: 17px; font-weight: 700; margin-top: 1px; }
    .report-header-right { text-align: right; }
    .report-header .date-range { font-size: 11px; color: #666; }

    /* ── Info banner ── */
    .stub-banner { background: #eff6ff; border: 1px solid #bfdbfe; border-left: 3px solid #3b82f6; padding: 10px 14px; margin-bottom: 16px; font-size: 12.5px; line-height: 1.55; color: #1e40af; border-radius: 4px; }
    .stub-banner strong { color: #1e3a8a; }

    /* ── Tabs (matches Programs) ── */
    .tabs { display:flex; gap:4px; border-bottom:2px solid #d1d5db; margin-bottom:16px; padding:0 4px; align-items:flex-end; flex-wrap: wrap; }
    .tab { padding:9px 18px 8px; font-size:13px; font-weight:600; color:#6b7280; cursor:pointer; transition:all .15s; display:flex; align-items:center; gap:6px; border-radius:8px 8px 0 0; border:1px solid transparent; border-bottom:none; margin-bottom:-2px; position:relative; background:transparent; }
    .tab:hover { color:#111; background:#f3f4f6; }
    .tab.active { color:#059669; background:#f0fdf4; border-color:#d1d5db; border-top:2px solid #059669; box-shadow:0 -2px 4px rgba(0,0,0,.04); z-index:1; }
    .tab .tab-badge { font-size:10px; padding:2px 7px; border-radius:10px; font-weight:600; background:#e5e7eb; color:#6b7280; }

    /* ── Summary (matches Programs) ── */
    .sum-cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 10px; margin: 16px 0; }
    .sum-card { background: #fff; border: 1px solid #e8e6e0; border-radius: 8px; padding: 14px 16px; }
    .sum-card .sc-label { font-size: 10px; text-transform: uppercase; letter-spacing: .5px; color: #888; font-weight: 700; margin-bottom: 4px; }
    .sum-card .sc-val { font-size: 24px; font-weight: 800; line-height: 1.1; font-variant-numeric: tabular-nums; }
    .sum-card .sc-sub { font-size: 11px; color: #999; margin-top: 3px; }
    .sc-green { color: #16a34a; } .sc-blue { color: #2563eb; } .sc-amber { color: #d97706; } .sc-red { color: #dc2626; } .sc-purple { color: #7c3aed; } .sc-muted { color: #64748b; }

    .band { background: linear-gradient(135deg,#ecfdf5 0%,#f0fdf4 100%); border: 1px solid #bbf7d0; border-radius: 10px; padding: 16px 18px; margin: 16px 0; }
    .band-head { display: flex; align-items: center; justify-content: space-between; gap: 12px; margin-bottom: 12px; }
    .band-title { font-size: 12px; font-weight: 700; color: #166534; display: flex; align-items: center; gap: 8px; }
    .band-title .sub { color: #6b7280; font-weight: 500; }
    .band-link { font-size: 12px; color: #059669; font-weight: 600; text-decoration: none; }
    .band-metrics { display: flex; gap: 30px; flex-wrap: wrap; }
    .band-metric .bm-val { font-size: 22px; font-weight: 800; font-variant-numeric: tabular-nums; }
    .band-metric .bm-lbl { font-size: 10px; text-transform: uppercase; letter-spacing: .5px; color: #6b7280; font-weight: 600; }

    .sum-bar-wrap { margin: 16px 0; }
    .sum-bar-label { font-size: 10px; color: #888; font-weight: 600; text-transform: uppercase; letter-spacing: .5px; margin-bottom: 4px; }
    .sum-bar { display: flex; height: 24px; border-radius: 4px; overflow: hidden; border: 1px solid #e8e6e0; background: #f3f4f6; }
    .sum-bar .seg { display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 700; color: #fff; overflow: hidden; white-space: nowrap; }
    .sum-legend { display: flex; gap: 14px; margin-top: 5px; font-size: 10px; color: #888; }
    .sum-legend span { display: flex; align-items: center; gap: 4px; }
    .sum-dot { width: 7px; height: 7px; border-radius: 50%; display: inline-block; }

    .sum-cat-table { width: 100%; border-collapse: collapse; font-size: 12px; margin-top: 16px; }
    .sum-cat-table caption { text-align: left; font-size: 12px; font-weight: 700; color: #333; margin-bottom: 8px; }
    .sum-cat-table th { background: #f5f3ef; padding: 7px 12px; text-align: left; font-size: 10px; text-transform: uppercase; letter-spacing: .5px; color: #888; font-weight: 700; border-bottom: 1px solid #e8e6e0; }
    .sum-cat-table th.num, .sum-cat-table td.num { text-align: right; font-variant-numeric: tabular-nums; }
    .sum-cat-table td { padding: 6px 12px; border-bottom: 1px solid #f0eeea; color: #555; }
    .sum-cat-table tr:last-child td { border-bottom: none; }
    .sum-cat-table .totals-row td { font-weight: 700; background: #f5f3ef; border-top: 1.5px solid #e8e6e0; color: #333; }
    .sum-badge { display: inline-block; padding: 1px 7px; border-radius: 3px; font-size: 9px; font-weight: 700; letter-spacing: .3px; background:#e0f2fe; color:#075985; }

    /* ── Empty / loading / error states ── */
    .empty { text-align: center; padding: 60px 20px; color: #9ca3af; }
    .empty .em-icon { font-size: 40px; margin-bottom: 12px; }
    .empty .em-title { font-size: 16px; font-weight: 700; color: #6b7280; margin-bottom: 6px; }
    .empty .em-sub { font-size: 12.5px; max-width: 460px; margin: 0 auto; line-height: 1.6; }
    .section-note { font-size: 11px; color: #9ca3af; margin-top: 18px; text-align: center; }
    @keyframes facspin { to { transform: rotate(360deg); } }
    .fac-spin { width:34px; height:34px; border:3px solid #e8e6e0; border-top-color:#0d9488; border-radius:50%; margin:14px auto; animation:facspin .8s linear infinite; }

    /* ── Filters ── */
    .filters { display: flex; align-items: center; gap: 16px; flex-wrap: wrap; padding: 10px 0 14px; border-bottom: 1px solid #eee; margin-bottom: 4px; }
    .filter-group { display: flex; align-items: center; gap: 7px; }
    .filter-lbl { font-size: 10px; text-transform: uppercase; letter-spacing: .5px; color: #9ca3af; font-weight: 700; }
    .chip { font-size: 12px; padding: 4px 11px; border-radius: 14px; border: 1px solid #d1d5db; background: #fff; color: #6b7280; cursor: pointer; user-select: none; transition: all .12s; }
    .chip.on { border-color: #0d9488; background: #f0fdfa; color: #0f766e; font-weight: 600; }
    .chip.on.cancel { border-color: #dc2626; background: #fef2f2; color: #b91c1c; }
    .dd { position: relative; }
    .dd-btn { font-size: 12px; padding: 5px 12px; border-radius: 8px; border: 1px solid #d1d5db; background: #fff; color: #374151; cursor: pointer; display: inline-flex; align-items: center; gap: 6px; }
    .dd-btn:hover { border-color: #9ca3af; }
    .dd-panel { position: absolute; top: 112%; left: 0; z-index: 50; background: #fff; border: 1px solid #e5e7eb; border-radius: 10px; box-shadow: 0 8px 24px rgba(0,0,0,.14); padding: 6px; min-width: 230px; max-height: 340px; overflow: auto; }
    .dd-grp { font-size: 9.5px; text-transform: uppercase; letter-spacing: .5px; color: #9ca3af; font-weight: 700; padding: 8px 8px 3px; }
    .dd-opt { display: flex; align-items: center; gap: 8px; padding: 5px 8px; border-radius: 6px; font-size: 12.5px; color: #374151; cursor: pointer; }
    .dd-opt:hover { background: #f3f4f6; }
    .dd-actions { display: flex; justify-content: space-between; padding: 7px 8px 3px; border-top: 1px solid #f0f0f0; margin-top: 4px; }
    .dd-actions button { background: none; border: none; color: #0d9488; font-size: 11px; font-weight: 700; cursor: pointer; }
    .flag { display: inline-flex; align-items: center; gap: 3px; font-size: 9px; font-weight: 800; letter-spacing: .3px; padding: 1px 6px; border-radius: 3px; background: #fef2f2; color: #b91c1c; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
  <script type="text/babel">
    const CFG = window.ORG_CONFIG || {};
    const e = React.createElement;

    const TABS = [
      { key: 'summary',     label: 'Summary' },
      { key: 'utilization', label: 'Court Utilization' },
      { key: 'camping',     label: 'Camping',        icon: '🏕️' },
      { key: 'golf',        label: 'Golf',           icon: '⛳' },
      { key: 'aquatics',    label: 'Pool / Aquatics', icon: '🏊' },
    ];

    // Rec's real site types (court.type), grouped into the display verticals.
    // These are the filter options — they match what Rec has, per spec.
    const REC_SITE_TYPES = [
      { v: 'campsite',            l: 'Campsite',            grp: 'Camping' },
      { v: 'golf',                l: 'Golf',                grp: 'Golf' },
      { v: 'pool',                l: 'Pool',                grp: 'Pool / Aquatics' },
      { v: 'court',               l: 'Court',               grp: 'Courts & Fields' },
      { v: 'field',               l: 'Field',               grp: 'Courts & Fields' },
      { v: 'gym',                 l: 'Gym',                 grp: 'Courts & Fields' },
      { v: 'rink',                l: 'Rink',                grp: 'Courts & Fields' },
      { v: 'room',                l: 'Room',                grp: 'Pavilions & Spaces' },
      { v: 'outdoor-event-space', l: 'Outdoor Event Space', grp: 'Pavilions & Spaces' },
      { v: 'picnic-table',        l: 'Picnic Table',        grp: 'Pavilions & Spaces' },
      { v: 'bounce-house',        l: 'Bounce House',        grp: 'Pavilions & Spaces' },
      { v: 'other',               l: 'Other',               grp: 'Pavilions & Spaces' },
    ];
    const STATUSES = [
      { v: 'confirmed',   l: 'Confirmed' },
      { v: 'in-progress', l: 'In-progress' },
      { v: 'canceled',    l: 'Canceled' },
    ];
    const VERTICALS = ['Camping', 'Golf', 'Pool / Aquatics', 'Courts & Fields', 'Pavilions & Spaces'];
    const TYPE_VERTICAL = {};
    REC_SITE_TYPES.forEach(t => { TYPE_VERTICAL[t.v] = t.grp; });
    const verticalOf = raw => TYPE_VERTICAL[raw] || 'Pavilions & Spaces';
    const HIGH_CANCEL = 20; // % → flag site as at-risk

    const money = n => '$' + Math.round(n || 0).toLocaleString();
    const pct = (n, d) => d ? Math.round((n / d) * 100) + '%' : '—';
    const lc = v => String(v == null ? '' : v).toLowerCase();

    // Per-status filter chips (all on by default — every status counts)
    function StatusChips({ sel, setSel }) {
      const toggle = v => setSel(sel.includes(v) ? sel.filter(x => x !== v) : sel.concat(v));
      return e('div', { className: 'filter-group' },
        e('span', { className: 'filter-lbl' }, 'Status'),
        STATUSES.map(s => e('span', {
          key: s.v,
          className: 'chip' + (sel.includes(s.v) ? ' on' + (s.v === 'canceled' ? ' cancel' : '') : ''),
          onClick: () => toggle(s.v),
        }, s.l)),
      );
    }

    // Site-type filter — Rec's real types, grouped by vertical. [] = All.
    function SiteTypeFilter({ sel, setSel }) {
      const [open, setOpen] = React.useState(false);
      const allV = REC_SITE_TYPES.map(t => t.v);
      const label = (sel.length === 0 || sel.length === allV.length) ? 'All site types' : (sel.length + ' selected');
      const toggle = v => {
        const base = sel.length === 0 ? allV : sel;
        const next = base.includes(v) ? base.filter(x => x !== v) : base.concat(v);
        setSel(next.length === allV.length ? [] : next);
      };
      const groups = [];
      REC_SITE_TYPES.forEach(t => { if (!groups.includes(t.grp)) groups.push(t.grp); });
      return e('div', { className: 'dd' },
        e('button', { className: 'dd-btn', onClick: () => setOpen(o => !o) }, '🏷️ ' + label, e('span', null, '▾')),
        open ? e('div', { className: 'dd-panel' },
          groups.map(g => e('div', { key: g },
            e('div', { className: 'dd-grp' }, g),
            REC_SITE_TYPES.filter(t => t.grp === g).map(t =>
              e('label', { className: 'dd-opt', key: t.v },
                e('input', { type: 'checkbox', checked: sel.length === 0 || sel.includes(t.v), onChange: () => toggle(t.v) }),
                t.l)),
          )),
          e('div', { className: 'dd-actions' },
            e('button', { onClick: () => setSel([]) }, 'Select all'),
            e('button', { onClick: () => setOpen(false) }, 'Done')),
        ) : null,
      );
    }

    function fmtDate(d) { return d.toISOString().slice(0, 10); }
    function monthStart(d) { return new Date(d.getFullYear(), d.getMonth(), 1); }
    function monthEnd(d) { return new Date(d.getFullYear(), d.getMonth() + 1, 0); }

    // ── Aggregate the card's rows into the Summary metrics, honoring filters ──
    function aggregate(rows, statusSel, typeSel) {
      const ts = new Set(typeSel);          // empty = all types
      const ss = new Set(statusSel);
      const scoped = rows.filter(r =>
        (ts.size === 0 || ts.has(r['Site Type'])) && ss.has(lc(r['Status']))
      );
      const isCanceled = r => lc(r['Status']) === 'canceled';
      const isInstant = r => lc(r['Booking Type']) === 'instant';
      const rev = r => isCanceled(r) ? 0 : (Number(r['Total']) || 0);

      const a = {
        bookings: scoped.length,
        canceled: scoped.filter(isCanceled).length,
        confirmed: scoped.filter(r => lc(r['Status']) === 'confirmed').length,
        inprog: scoped.filter(r => lc(r['Status']) === 'in-progress').length,
        revenue: scoped.reduce((s, r) => s + rev(r), 0),
        instant: scoped.filter(isInstant).length,
        managed: scoped.filter(r => !isInstant(r)).length,
        instRev: scoped.filter(isInstant).reduce((s, r) => s + rev(r), 0),
        mgdRev: scoped.filter(r => !isInstant(r)).reduce((s, r) => s + rev(r), 0),
        sites: new Set(scoped.map(r => (r['Facility'] || '') + '|' + (r['Location'] || ''))).size,
        byV: {},
        topSites: [],
      };

      VERTICALS.forEach(v => a.byV[v] = { bookings: 0, canceled: 0, revenue: 0, instant: 0, sites: new Set() });
      const bySite = {};
      scoped.forEach(r => {
        const v = verticalOf(r['Site Type']);
        if (!a.byV[v]) a.byV[v] = { bookings: 0, canceled: 0, revenue: 0, instant: 0, sites: new Set() };
        const g = a.byV[v];
        g.bookings++; g.revenue += rev(r);
        if (isCanceled(r)) g.canceled++;
        if (isInstant(r)) g.instant++;
        g.sites.add((r['Facility'] || '') + '|' + (r['Location'] || ''));

        const key = (r['Facility'] || '—') + '||' + (r['Location'] || '');
        if (!bySite[key]) bySite[key] = { facility: r['Facility'] || '—', location: r['Location'] || '', type: r['Site Type'] || '', bookings: 0, canceled: 0, revenue: 0 };
        bySite[key].bookings++; bySite[key].revenue += rev(r);
        if (isCanceled(r)) bySite[key].canceled++;
      });
      a.topType = Object.keys(a.byV).filter(v => a.byV[v].bookings).sort((x, y) => a.byV[y].revenue - a.byV[x].revenue)[0] || '—';
      a.topSites = Object.values(bySite).sort((x, y) => y.revenue - x.revenue).slice(0, 10);
      return a;
    }

    function Toolbar(props) {
      const backHref = '/' + CFG.slug + (CFG.token ? '?token=' + encodeURIComponent(CFG.token) : '');
      return e('div', { className: 'toolbar' },
        e('a', { className: 'toolbar-back', href: backHref }, '←'),
        e('span', { className: 'toolbar-title' }, 'Facilities'),
        e('label', null, 'START', e('input', { type: 'date', value: props.start, onChange: ev => props.setStart(ev.target.value) })),
        e('label', null, 'END', e('input', { type: 'date', value: props.end, onChange: ev => props.setEnd(ev.target.value) })),
        e('button', { onClick: props.thisMonth }, 'This Month'),
        e('button', { onClick: props.lastMonth }, 'Last Month'),
        e('button', { onClick: props.thisYear }, 'This Year'),
        e('button', { className: 'btn-run', onClick: props.run }, '▶ Run Report'),
        e('span', { className: 'toolbar-spacer' }),
        e('span', { className: 'row-count' }, props.loading ? 'loading…' :
          (props.count == null ? '' : props.count.toLocaleString() + ' bookings · ' + props.sites.toLocaleString() + ' sites')),
        e('button', { className: 'btn-pdf', disabled: true }, 'PDF'),
        e('button', { className: 'btn-excel', disabled: true }, 'Excel'),
      );
    }

    function KpiCards({ a }) {
      const cards = [
        { label: 'Bookings', val: a.bookings.toLocaleString(), cls: 'sc-blue', sub: 'facility reservations in view' },
        { label: 'Net Revenue', val: money(a.revenue), cls: 'sc-green', sub: 'excludes canceled' },
        { label: 'Instant-Book', val: a.bookings ? pct(a.instant, a.bookings) : '—', cls: 'sc-purple', sub: a.instant.toLocaleString() + ' bkgs · ' + money(a.instRev) },
        { label: 'Managed', val: a.bookings ? pct(a.managed, a.bookings) : '—', cls: 'sc-amber', sub: a.managed.toLocaleString() + ' bkgs · ' + money(a.mgdRev) },
        { label: 'Cancellation Rate', val: a.bookings ? pct(a.canceled, a.bookings) : '—', cls: 'sc-red', sub: a.canceled.toLocaleString() + ' of ' + a.bookings.toLocaleString() + ' canceled' },
        { label: 'Top Site Type', val: a.topType, cls: 'sc-muted', sub: 'by revenue' },
        { label: 'Active Sites', val: a.sites.toLocaleString(), cls: 'sc-muted', sub: 'with bookings in view' },
      ];
      return e('div', { className: 'sum-cards' },
        cards.map((c, i) => e('div', { className: 'sum-card', key: i },
          e('div', { className: 'sc-label' }, c.label),
          e('div', { className: 'sc-val ' + c.cls }, c.val),
          e('div', { className: 'sc-sub' }, c.sub),
        ))
      );
    }

    function SummaryTab({ rows, err, statusSel, typeSel }) {
      if (err) return e('div', { className: 'empty' },
        e('div', { className: 'em-icon' }, '⚠️'),
        e('div', { className: 'em-title' }, 'Could not load facility data'),
        e('div', { className: 'em-sub' }, String(err)));
      if (rows === null) return e('div', { className: 'empty' },
        e('div', { className: 'em-title', style: { color: '#9ca3af' } }, 'Loading facility data…'),
        e('div', { className: 'fac-spin' }));
      const a = aggregate(rows, statusSel, typeSel);
      if (!a.bookings) return e('div', { className: 'empty' },
        e('div', { className: 'em-icon' }, '🗓️'),
        e('div', { className: 'em-title' }, 'No facility bookings in this range'),
        e('div', { className: 'em-sub' }, 'Try a wider date range, or clear the site-type / status filters.'));

      const seg = (n, color, label) => n > 0 ? e('div', {
        className: 'seg', style: { width: (n / a.bookings * 100) + '%', background: color }
      }, (n / a.bookings >= 0.08 ? label : '')) : null;

      return e('div', null,
        e(KpiCards, { a }),
        // Reservation mix band (the marquee split)
        e('div', { className: 'band' },
          e('div', { className: 'band-head' },
            e('div', { className: 'band-title' }, '⚙️ RESERVATION MIX ', e('span', { className: 'sub' }, 'instant-book vs. staff-managed')),
          ),
          e('div', { className: 'band-metrics' },
            e('div', { className: 'band-metric' }, e('div', { className: 'bm-val sc-purple' }, pct(a.instant, a.bookings)), e('div', { className: 'bm-lbl' }, 'Instant-book')),
            e('div', { className: 'band-metric' }, e('div', { className: 'bm-val sc-amber' }, pct(a.managed, a.bookings)), e('div', { className: 'bm-lbl' }, 'Managed')),
            e('div', { className: 'band-metric' }, e('div', { className: 'bm-val sc-green' }, money(a.instRev)), e('div', { className: 'bm-lbl' }, 'Instant-book revenue')),
            e('div', { className: 'band-metric' }, e('div', { className: 'bm-val sc-green' }, money(a.mgdRev)), e('div', { className: 'bm-lbl' }, 'Managed revenue')),
          ),
        ),
        // Booking mix bar (instant vs managed)
        e('div', { className: 'sum-bar-wrap' },
          e('div', { className: 'sum-bar-label' }, 'Booking mix'),
          e('div', { className: 'sum-bar' }, seg(a.instant, '#7c3aed', 'Instant-book'), seg(a.managed, '#d97706', 'Managed')),
          e('div', { className: 'sum-legend' },
            e('span', null, e('span', { className: 'sum-dot', style: { background: '#7c3aed' } }), 'Instant-book (' + a.instant + ')'),
            e('span', null, e('span', { className: 'sum-dot', style: { background: '#d97706' } }), 'Managed (' + a.managed + ')')),
        ),
        // Booking status mix (surfaces cancellations)
        e('div', { className: 'sum-bar-wrap' },
          e('div', { className: 'sum-bar-label' }, 'Booking status mix'),
          e('div', { className: 'sum-bar' }, seg(a.confirmed, '#16a34a', 'Confirmed'), seg(a.inprog, '#2563eb', 'In-progress'), seg(a.canceled, '#dc2626', 'Canceled')),
          e('div', { className: 'sum-legend' },
            e('span', null, e('span', { className: 'sum-dot', style: { background: '#16a34a' } }), 'Confirmed (' + a.confirmed + ')'),
            e('span', null, e('span', { className: 'sum-dot', style: { background: '#2563eb' } }), 'In-progress (' + a.inprog + ')'),
            e('span', null, e('span', { className: 'sum-dot', style: { background: '#dc2626' } }), 'Canceled (' + a.canceled + ')')),
        ),
        // Revenue by site type (verticals)
        e('table', { className: 'sum-cat-table' },
          e('caption', null, 'Revenue by site type'),
          e('thead', null, e('tr', null,
            e('th', null, 'Site type'),
            e('th', { className: 'num' }, 'Sites'),
            e('th', { className: 'num' }, 'Bookings'),
            e('th', { className: 'num' }, 'Cancel %'),
            e('th', { className: 'num' }, 'Net revenue'),
            e('th', { className: 'num' }, '% instant-book'),
          )),
          e('tbody', null,
            VERTICALS.filter(v => a.byV[v] && a.byV[v].bookings).map((v, i) => {
              const g = a.byV[v];
              return e('tr', { key: i },
                e('td', null, v),
                e('td', { className: 'num' }, g.sites.size),
                e('td', { className: 'num' }, g.bookings),
                e('td', { className: 'num' }, pct(g.canceled, g.bookings)),
                e('td', { className: 'num' }, money(g.revenue)),
                e('td', { className: 'num' }, pct(g.instant, g.bookings)),
              );
            }),
            e('tr', { className: 'totals-row' },
              e('td', null, 'Total'),
              e('td', { className: 'num' }, a.sites),
              e('td', { className: 'num' }, a.bookings),
              e('td', { className: 'num' }, pct(a.canceled, a.bookings)),
              e('td', { className: 'num' }, money(a.revenue)),
              e('td', { className: 'num' }, pct(a.instant, a.bookings)),
            ),
          ),
        ),
        // Top sites by revenue (with cancellation red-flag)
        e('table', { className: 'sum-cat-table' },
          e('caption', null, 'Top sites by revenue ',
            e('span', { style: { fontWeight: 400, color: '#9ca3af', fontSize: 11 } }, '· ', e('span', { className: 'flag' }, '⚠ HIGH CANCEL'), ' ≥' + HIGH_CANCEL + '% canceled')),
          e('thead', null, e('tr', null,
            e('th', null, 'Site'),
            e('th', null, 'Type'),
            e('th', null, 'Location'),
            e('th', { className: 'num' }, 'Bookings'),
            e('th', { className: 'num' }, 'Cancel %'),
            e('th', { className: 'num' }, 'Net revenue'),
          )),
          e('tbody', null,
            a.topSites.map((s, i) => {
              const crPct = s.bookings ? (s.canceled / s.bookings) * 100 : 0;
              return e('tr', { key: i },
                e('td', null, s.facility, crPct >= HIGH_CANCEL ? e('span', { className: 'flag', style: { marginLeft: 6 } }, '⚠') : null),
                e('td', null, e('span', { className: 'sum-badge' }, verticalOf(s.type))),
                e('td', null, s.location),
                e('td', { className: 'num' }, s.bookings),
                e('td', { className: 'num' }, pct(s.canceled, s.bookings)),
                e('td', { className: 'num' }, money(s.revenue)),
              );
            }),
          ),
        ),
        e('div', { className: 'section-note' }, 'Live facility data · ' + rows.length.toLocaleString() + ' bookings in range · metrics update with the filters above.'),
      );
    }

    function VerticalTab(props) {
      const isUtil = props.tabKey === 'utilization';
      return e('div', { className: 'empty' },
        e('div', { className: 'em-icon' }, props.icon || '📈'),
        e('div', { className: 'em-title' }, props.label),
        e('div', { className: 'em-sub' }, isUtil
          ? 'The existing Court Utilization report folds in here as a sub-tab next — utilization %, reserved hours by court, split by customer / program / closure.'
          : ('A ' + props.label + '-specific view of facility bookings, availability, and revenue lands on this tab next.')),
        e('div', { className: 'section-note' }, 'Coming in the next update — the Summary tab is live on real data now.'),
      );
    }

    function App() {
      const now = new Date();
      const [start, setStart] = React.useState(fmtDate(monthStart(now)));
      const [end, setEnd] = React.useState(fmtDate(monthEnd(now)));
      const [tab, setTab] = React.useState(() => {
        const qs = new URLSearchParams(window.location.search);
        return qs.get('tab') || 'summary';
      });
      const [statusSel, setStatusSel] = React.useState(['confirmed', 'in-progress', 'canceled']);
      const [typeSel, setTypeSel] = React.useState([]); // [] = all site types
      const [rows, setRows] = React.useState(null);      // null = loading
      const [err, setErr] = React.useState(null);

      function load(s, en) {
        const sd = s || start, ed = en || end;
        setRows(null); setErr(null);
        const tok = CFG.token ? '&token=' + encodeURIComponent(CFG.token) : '';
        fetch('/' + CFG.slug + '/facilities/api/summary?start_date=' + sd + '&end_date=' + ed + tok)
          .then(r => r.json())
          .then(d => { if (d && d.error) { setErr(d.error); setRows([]); } else { setRows((d && d.rows) || []); } })
          .catch(er => { setErr(er.message); setRows([]); });
      }
      React.useEffect(() => { load(); }, []); // initial

      const runRange = (s, en) => { setStart(s); setEnd(en); load(s, en); };
      const setThisMonth = () => runRange(fmtDate(monthStart(now)), fmtDate(monthEnd(now)));
      const setLastMonth = () => { const d = new Date(now.getFullYear(), now.getMonth() - 1, 1); runRange(fmtDate(monthStart(d)), fmtDate(monthEnd(d))); };
      const setThisYear = () => runRange(fmtDate(new Date(now.getFullYear(), 0, 1)), fmtDate(new Date(now.getFullYear(), 11, 31)));

      const fmtRange = (s, en) => {
        const o = { year: 'numeric', month: 'long', day: 'numeric' };
        return new Date(s + 'T00:00:00').toLocaleDateString('en-US', o) + ' – ' + new Date(en + 'T00:00:00').toLocaleDateString('en-US', o);
      };
      const active = TABS.find(t => t.key === tab) || TABS[0];
      const count = rows ? rows.length : null;
      const siteCount = rows ? new Set(rows.map(r => (r['Facility'] || '') + '|' + (r['Location'] || ''))).size : 0;

      return e(React.Fragment, null,
        e(Toolbar, { start, end, setStart, setEnd, thisMonth: setThisMonth, lastMonth: setLastMonth, thisYear: setThisYear, run: () => load(), loading: rows === null, count, sites: siteCount }),
        e('div', { className: 'page' },
          e('div', { className: 'report-header' },
            e('div', { className: 'report-header-left' },
              CFG.logoUrl ? e('img', { className: 'report-header-logo', src: CFG.logoUrl, alt: '', onError: ev => { ev.target.style.display = 'none'; } }) : null,
              e('div', null,
                e('div', { className: 'org-label' }, CFG.displayName || 'Parks & Recreation'),
                e('div', { className: 'title' }, 'Facilities'),
              ),
            ),
            e('div', { className: 'report-header-right' },
              e('div', { className: 'date-range' }, fmtRange(start, end)),
            ),
          ),
          e('div', { className: 'stub-banner' },
            e('strong', null, 'Summary is live on real facility data.'),
            ' The Court Utilization, Camping, Golf, and Pool/Aquatics sub-tabs are being wired next.'
          ),
          e('div', { className: 'filters' },
            e(StatusChips, { sel: statusSel, setSel: setStatusSel }),
            e('div', { className: 'filter-group' },
              e('span', { className: 'filter-lbl' }, 'Site type'),
              e(SiteTypeFilter, { sel: typeSel, setSel: setTypeSel }),
            ),
          ),
          e('div', { className: 'tabs' },
            TABS.map(t => e('div', {
              key: t.key,
              className: 'tab' + (t.key === tab ? ' active' : ''),
              onClick: () => {
                setTab(t.key);
                const u = new URL(window.location); u.searchParams.set('tab', t.key); window.history.replaceState({}, '', u);
              },
            }, t.icon ? e('span', null, t.icon) : null, t.label)),
          ),
          tab === 'summary'
            ? e(SummaryTab, { rows, err, statusSel, typeSel })
            : e(VerticalTab, { tabKey: active.key, label: active.label, icon: active.icon }),
        ),
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(e(App));
  </script>
</body>
</html>
