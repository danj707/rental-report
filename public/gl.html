<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GL Code Rollup</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'IBM Plex Sans', 'Segoe UI', system-ui, sans-serif;
      font-size: 12px;
      color: #1a1a1a;
      background: #f5f4f1;
      line-height: 1.35;
    }

    /* ── Toolbar ── */
    .toolbar {
      position: sticky;
      top: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 20px;
      background: #2c2c2c;
      color: #eee;
      font-size: 13px;
      flex-wrap: wrap;
    }
    .toolbar-title { font-weight: 600; margin-right: 8px; }
    .toolbar-spacer { flex: 1; }
    .toolbar label {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: #aaa;
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    .toolbar input[type="date"] {
      padding: 4px 8px;
      border: 1px solid rgba(255,255,255,.2);
      border-radius: 4px;
      background: rgba(255,255,255,.1);
      color: #fff;
      font-size: 12px;
      font-family: inherit;
      outline: none;
    }
    .toolbar input[type="date"]:focus { border-color: #3b82f6; }
    .toolbar input[type="date"]::-webkit-calendar-picker-indicator { filter: invert(1); cursor: pointer; }
    .toolbar button {
      padding: 6px 14px;
      border: 1px solid rgba(255,255,255,.25);
      border-radius: 4px;
      background: rgba(255,255,255,.08);
      color: #fff;
      font-size: 12px;
      font-family: inherit;
      cursor: pointer;
      transition: background .15s;
    }
    .toolbar button:hover { background: rgba(255,255,255,.18); }
    .toolbar button.active {
      background: rgba(255,255,255,.22);
      border-color: rgba(255,255,255,.55);
    }
    .toolbar .btn-run { background: #16a34a; border-color: #16a34a; font-weight: 600; }
    .toolbar .btn-run:hover { background: #15803d; }
    .toolbar .btn-run:disabled { opacity: .5; cursor: not-allowed; }
    .toolbar .btn-excel { background: #166534; border-color: #166534; font-weight: 600; }
    .toolbar .btn-excel:hover { background: #14532d; }
    .toolbar .btn-excel:disabled { opacity: .5; cursor: not-allowed; }
    .toolbar .divider { width: 1px; height: 28px; background: rgba(255,255,255,.15); margin: 0 4px; }
    .toolbar .row-count { font-size: 11px; color: #aaa; }

    /* ── Page ── */
    .page {
      max-width: 1320px;
      margin: 16px auto;
      padding: 24px 28px;
      background: #fff;
      box-shadow: 0 1px 4px rgba(0,0,0,.08);
    }

    /* ── Report header ── */
    .report-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      border-bottom: 2.5px solid #111;
      padding-bottom: 8px;
      margin-bottom: 16px;
    }
    .report-header .org-label {
      font-size: 10.5px;
      letter-spacing: 1.6px;
      text-transform: uppercase;
      color: #777;
      font-weight: 600;
    }
    .report-header .title { font-size: 17px; font-weight: 700; margin-top: 1px; }
    .report-header .date-range { font-size: 11px; color: #666; text-align: right; }

    /* ── Summary cards ── */
    .summary-cards {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }
    .summary-card {
      flex: 1;
      min-width: 110px;
      padding: 10px 12px;
      border-radius: 5px;
      background: #f8f8f6;
      border: 1px solid #e4e4e0;
      border-left: 3px solid #ccc;
    }
    .summary-card .card-label {
      font-size: 9.5px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: #888;
      font-weight: 600;
      margin-bottom: 4px;
    }
    .summary-card .card-value {
      font-size: 15px;
      font-weight: 700;
      font-family: 'IBM Plex Mono', monospace;
      white-space: nowrap;
    }
    .summary-card.green  { border-left-color: #16a34a; }
    .summary-card.green  .card-value { color: #15803d; }
    .summary-card.blue   { border-left-color: #3b82f6; }
    .summary-card.blue   .card-value { color: #2563eb; }
    .summary-card.red    { border-left-color: #ef4444; }
    .summary-card.red    .card-value { color: #dc2626; }
    .summary-card.violet { border-left-color: #7c3aed; }
    .summary-card.violet .card-value { color: #6d28d9; }
    .summary-card.indigo { border-left-color: #4f46e5; }
    .summary-card.indigo .card-value { color: #4338ca; }
    .summary-card.amber  { border-left-color: #d97706; }
    .summary-card.amber  .card-value { color: #b45309; }
    .summary-card.slate  { border-left-color: #475569; }
    .summary-card.slate  .card-value { color: #334155; }

    /* ── Table ── */
    .table-wrapper { overflow-x: auto; }
    table { border-collapse: collapse; width: 100%; font-size: 11.5px; }

    thead th {
      background: #e4e4e0;
      border: 1px solid #ccc;
      padding: 5px 8px;
      text-align: right;
      font-weight: 600;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.3px;
      color: #333;
      white-space: nowrap;
    }
    thead th.left { text-align: left; }
    thead th.group {
      text-align: center;
      background: #d0d0cc;
      font-size: 9px;
      border-bottom: 2px solid #aaa;
      color: #444;
    }
    thead th.group.refund-group {
      background: #fca5a5;
      border-bottom: 2px solid #f87171;
      color: #7f1d1d;
    }
    thead th.refund-col {
      background: #fee2e2;
      color: #7f1d1d;
    }
    tbody td.refund-col { background: #fff5f5; }
    tbody tr:nth-child(even) td.refund-col { background: #fef2f2; }
    tbody tr:hover td.refund-col { background: #fee2e2; }
    tfoot td.refund-col { background: #fecaca; }

    tbody td {
      border: 1px solid #e8e8e4;
      padding: 4px 8px;
      text-align: right;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 11px;
      white-space: nowrap;
    }
    tbody td.left {
      text-align: left;
      font-family: 'IBM Plex Sans', sans-serif;
      white-space: normal;
    }
    tbody td.gl-code { font-weight: 700; }
    tbody tr:nth-child(even) { background: #fafaf8; }
    tbody tr:hover { background: #f0f0ec; }

    tfoot td {
      border: 1px solid #ccc;
      border-top: 2px solid #444;
      padding: 5px 8px;
      text-align: right;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 11px;
      font-weight: 700;
      background: #ececea;
      white-space: nowrap;
    }
    tfoot td.left {
      text-align: left;
      font-family: 'IBM Plex Sans', sans-serif;
      font-weight: 700;
    }

    .cell-zero { color: #c8c8c4; }
    .cell-neg  { color: #dc2626; }

    /* ── Chart ── */
    .chart-wrap {
      margin-top: 4px;
      position: relative;
    }
    .chart-wrap canvas { max-width: 100%; }

    /* ── Footer ── */
    .report-footer {
      display: flex;
      justify-content: space-between;
      border-top: 2.5px solid #111;
      margin-top: 16px;
      padding-top: 6px;
      font-size: 10px;
      color: #777;
    }

    /* ── Loading / Error ── */
    .loading { text-align: center; padding: 80px 20px; color: #888; font-size: 14px; }
    .loading .spinner {
      display: inline-block;
      width: 28px; height: 28px;
      border: 3px solid #ddd;
      border-top-color: #3b82f6;
      border-radius: 50%;
      animation: spin .7s linear infinite;
      margin-bottom: 12px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .error { text-align: center; padding: 60px 20px; color: #b91c1c; font-size: 14px; }

    /* ── Print ── */
    @media print {
      body { background: #fff; }
      .toolbar { display: none !important; }
      .page { box-shadow: none; margin: 0; padding: 12px 16px; max-width: 100%; }
    }
    body.print-mode .toolbar { display: none !important; }
    body.print-mode .page { box-shadow: none; margin: 0; padding: 12px 16px; max-width: 100%; }
  </style>
</head>
<body>
<div id="root"></div>

<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<script type="text/babel">
const { useState, useEffect, useMemo, useCallback, useRef } = React;

const LS_REFUND   = 'gl_refund_breakdown_v2';
const LS_VIEW     = 'gl_view_mode_v2';

// ── Params / date helpers ────────────────────────────────────────────
function getParams() {
  const p = new URLSearchParams(window.location.search);
  return { start_date: p.get('start_date'), end_date: p.get('end_date'), _print: p.get('_print') };
}

function toISO(d) {
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function getCurrentMonthRange() {
  const now = new Date();
  const y = now.getFullYear(), m = now.getMonth();
  return { start: toISO(new Date(y, m, 1)), end: toISO(new Date(y, m + 1, 0)) };
}

function formatDisplayDate(iso) {
  if (!iso) return '';
  const d = new Date(iso + 'T12:00:00');
  const M = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  return `${M[d.getMonth()]} ${d.getDate()}, ${d.getFullYear()}`;
}

// ── Money helpers ────────────────────────────────────────────────────
function pf(v) { const n = parseFloat(v); return isNaN(n) ? 0 : n; }

function fmtMoney(v) {
  const n = pf(v);
  if (n === 0) return null; // null = render blank with .cell-zero
  const abs = Math.abs(n).toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g, ',');
  return (n < 0 ? '-$' : '$') + abs;
}

function fmtMoneyStr(v) {
  const n = pf(v);
  const abs = Math.abs(n).toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g, ',');
  return (n < 0 ? '-$' : '$') + abs;
}

function MoneyCell({ v }) {
  const s = fmtMoney(v);
  const n = pf(v);
  if (s === null) return <span className="cell-zero">—</span>;
  if (n < 0) return <span className="cell-neg">{s}</span>;
  return <span>{s}</span>;
}

function sumField(rows, field) {
  return rows.reduce((acc, r) => acc + (r[field] ?? 0), 0);
}

// ── Normalize row ────────────────────────────────────────────────────
function normalizeRow(raw) {
  const isSplit = 'CC Online Payments' in raw;
  return {
    glCode:             raw['GL Code'] || '',
    accountName:        raw['Account Name'] || raw['GL Code Description'] || '',
    accountNumber:      raw['Account Number'] || '',
    locations:          raw['Locations'] || '',
    isSplit,

    // CC — adaptive
    ccPayments:         !isSplit
                          ? pf(raw['Credit Card Payments'])
                          : pf(raw['CC Online Payments']) + pf(raw['CC In-Person Payments']),
    ccOnlinePayments:   isSplit ? pf(raw['CC Online Payments'])    : null,
    ccInPersonPayments: isSplit ? pf(raw['CC In-Person Payments']) : null,

    cashPayments:       pf(raw['Cash Payments']),
    checkPayments:      pf(raw['Check Payments']),
    freePayments:       pf(raw['Free Payments']),
    orgCreditPayments:  pf(raw['Organization Credit Payments']),
    totalPayments:      pf(raw['Total Payments']),
    numPayments:        pf(raw['Number of Payments']),

    // CC refunds — adaptive
    ccRefunds:          !isSplit
                          ? pf(raw['CC Refunds'])
                          : pf(raw['CC Online Refunds']) + pf(raw['CC In-Person Refunds']),
    ccOnlineRefunds:    isSplit ? pf(raw['CC Online Refunds'])    : null,
    ccInPersonRefunds:  isSplit ? pf(raw['CC In-Person Refunds']) : null,

    cashRefunds:        pf(raw['Cash Refunds']),
    checkRefunds:       pf(raw['Check Refunds']),
    orgCreditRefunds:   pf(raw['Org Credit Refunds']),
    otherRefunds:       pf(raw['Other Refunds']),
    totalRefunds:       pf(raw['Total Refunds']),
    numRefunds:         pf(raw['Number of Refunds']),

    netAmount:          pf(raw['Net Amount']),
  };
}

// ── Summary card ─────────────────────────────────────────────────────
function SummaryCard({ label, value, color = 'blue' }) {
  const n = pf(value);
  const abs = Math.abs(n).toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g, ',');
  const display = (n < 0 ? '-$' : '$') + abs;
  return (
    <div className={`summary-card ${color}`}>
      <div className="card-label">{label}</div>
      <div className="card-value">{display}</div>
    </div>
  );
}

// ── Chart ─────────────────────────────────────────────────────────────
function GlChart({ rows, viewMode, hasCCSplit }) {
  const canvasRef = useRef(null);
  const chartInst = useRef(null);

  useEffect(() => {
    if (!canvasRef.current || !rows || rows.length === 0) return;
    if (chartInst.current) { chartInst.current.destroy(); chartInst.current = null; }

    const ctx = canvasRef.current.getContext('2d');
    const labels = rows.map(r => (r.accountName || r.glCode || '?').replace(/\s+/g, ' ').trim());

    if (viewMode === 'bar') {
      const datasets = hasCCSplit ? [
        { label: 'CC Online',    data: rows.map(r => r.ccOnlinePayments),   backgroundColor: '#4f46e5' },
        { label: 'CC In-Person', data: rows.map(r => r.ccInPersonPayments), backgroundColor: '#7c3aed' },
        { label: 'Cash',         data: rows.map(r => r.cashPayments),        backgroundColor: '#d97706' },
        { label: 'Check',        data: rows.map(r => r.checkPayments),       backgroundColor: '#475569' },
      ] : [
        { label: 'Credit Card', data: rows.map(r => r.ccPayments),    backgroundColor: '#4f46e5' },
        { label: 'Cash',        data: rows.map(r => r.cashPayments),  backgroundColor: '#d97706' },
        { label: 'Check',       data: rows.map(r => r.checkPayments), backgroundColor: '#475569' },
      ];

      chartInst.current = new Chart(ctx, {
        type: 'bar',
        data: { labels, datasets },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: { legend: { position: 'top' } },
          scales: {
            y: { ticks: { callback: v => '$' + Number(v).toLocaleString() } },
            x: { ticks: { maxRotation: 40, font: { size: 10 } } },
          },
        },
      });
    } else if (viewMode === 'pie') {
      const buckets = hasCCSplit
        ? [
            ['CC Online',    sumField(rows, 'ccOnlinePayments'),   '#4f46e5'],
            ['CC In-Person', sumField(rows, 'ccInPersonPayments'), '#7c3aed'],
            ['Cash',         sumField(rows, 'cashPayments'),        '#d97706'],
            ['Check',        sumField(rows, 'checkPayments'),       '#475569'],
            ['Free',         sumField(rows, 'freePayments'),        '#10b981'],
            ['Org Credit',   sumField(rows, 'orgCreditPayments'),   '#3b82f6'],
          ]
        : [
            ['Credit Card',  sumField(rows, 'ccPayments'),          '#4f46e5'],
            ['Cash',         sumField(rows, 'cashPayments'),         '#d97706'],
            ['Check',        sumField(rows, 'checkPayments'),        '#475569'],
            ['Free',         sumField(rows, 'freePayments'),         '#10b981'],
            ['Org Credit',   sumField(rows, 'orgCreditPayments'),    '#3b82f6'],
          ];

      const active = buckets.filter(([, v]) => v > 0);

      chartInst.current = new Chart(ctx, {
        type: 'doughnut',
        data: {
          labels: active.map(([k]) => k),
          datasets: [{
            data: active.map(([, v]) => v),
            backgroundColor: active.map(([,, c]) => c),
            borderWidth: 2,
            borderColor: '#fff',
          }],
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: {
            legend: { position: 'right' },
            tooltip: {
              callbacks: {
                label: ctx => {
                  const val = ctx.parsed;
                  const total = ctx.dataset.data.reduce((a, b) => a + b, 0);
                  return ` $${val.toFixed(2)} (${((val / total) * 100).toFixed(1)}%)`;
                },
              },
            },
          },
        },
      });
    }

    return () => { if (chartInst.current) { chartInst.current.destroy(); chartInst.current = null; } };
  }, [rows, viewMode, hasCCSplit]);

  const height = viewMode === 'pie' ? 340 : 380;
  const maxWidth = viewMode === 'pie' ? '520px' : '100%';

  return (
    <div className="chart-wrap" style={{ height, maxWidth, margin: viewMode === 'pie' ? '0 auto' : '0' }}>
      <canvas ref={canvasRef} />
    </div>
  );
}

// ── Main App ──────────────────────────────────────────────────────────
function App() {
  const params   = useMemo(() => getParams(), []);
  const defaults = useMemo(() => getCurrentMonthRange(), []);
  // Derive org/report from URL path: /smyrna/gl → 'smyrna', 'gl'
  const orgSlug    = useMemo(() => window.location.pathname.split('/').filter(Boolean)[0] || '', []);
  const reportType = useMemo(() => window.location.pathname.split('/').filter(Boolean)[1] || 'gl', []);

  const [startDate, setStartDate] = useState(params.start_date || defaults.start);
  const [endDate,   setEndDate]   = useState(params.end_date   || defaults.end);

  const [rows,    setRows]    = useState(null);
  const [orgName, setOrgName] = useState('');
  const [error,   setError]   = useState(null);
  const [loading, setLoading] = useState(false);

  const [loadedStart, setLoadedStart] = useState(null);
  const [loadedEnd,   setLoadedEnd]   = useState(null);

  const [showRefunds, setShowRefunds] = useState(
    () => localStorage.getItem(LS_REFUND) === 'true'
  );
  const [viewMode, setViewMode] = useState(
    () => localStorage.getItem(LS_VIEW) || 'table'
  );

  useEffect(() => { if (params._print === '1') document.body.classList.add('print-mode'); }, []);
  useEffect(() => { localStorage.setItem(LS_REFUND, showRefunds); }, [showRefunds]);
  useEffect(() => { localStorage.setItem(LS_VIEW, viewMode); }, [viewMode]);

  // ── Fetch ───────────────────────────────────────────────────────────
  const fetchData = useCallback((sd, ed) => {
    setLoading(true);
    setError(null);
    const qs = new URLSearchParams();
    if (sd) qs.set('start_date', sd);
    if (ed) qs.set('end_date', ed);
    fetch(`/${orgSlug}/${reportType}/api/data?${qs}`)
      .then(r => { if (!r.ok) throw new Error(`Server returned ${r.status}`); return r.json(); })
      .then(json => {
        setRows(json.rows.map(normalizeRow));
        setOrgName(json.meta?.org_name || '');
        setLoadedStart(sd);
        setLoadedEnd(ed);
      })
      .catch(e => setError(e.message))
      .finally(() => setLoading(false));
  }, []);

  useEffect(() => { fetchData(startDate, endDate); }, []);

  function handleRun() { fetchData(startDate, endDate); }

  function setMonth(offset) {
    const now = new Date();
    const t = new Date(now.getFullYear(), now.getMonth() + offset, 1);
    setStartDate(toISO(t));
    setEndDate(toISO(new Date(t.getFullYear(), t.getMonth() + 1, 0)));
  }

  const datesChanged = startDate !== loadedStart || endDate !== loadedEnd;

  // ── Derived ─────────────────────────────────────────────────────────
  const hasCCSplit = useMemo(
    () => rows && rows.length > 0 && rows[0].ccOnlinePayments !== null,
    [rows]
  );

  const totals = useMemo(() => {
    if (!rows) return {};
    return {
      totalPayments:      sumField(rows, 'totalPayments'),
      totalRefunds:       sumField(rows, 'totalRefunds'),
      netAmount:          sumField(rows, 'netAmount'),
      ccPayments:         sumField(rows, 'ccPayments'),
      ccOnlinePayments:   sumField(rows, 'ccOnlinePayments'),
      ccInPersonPayments: sumField(rows, 'ccInPersonPayments'),
      cashPayments:       sumField(rows, 'cashPayments'),
      checkPayments:      sumField(rows, 'checkPayments'),
    };
  }, [rows]);

  // ── Excel export ────────────────────────────────────────────────────
  function exportExcel() {
    if (!rows || rows.length === 0) return;

    const makeDataRow = r => {
      const row = {};
      row['GL Code']      = r.glCode;
      row['Account Name'] = r.accountName;
      if (rows.some(x => x.accountNumber)) row['Account #'] = r.accountNumber;
      if (hasCCSplit) {
        row['CC Online Pmts']    = r.ccOnlinePayments;
        row['CC In-Person Pmts'] = r.ccInPersonPayments;
      } else {
        row['CC Payments']       = r.ccPayments;
      }
      row['Cash Payments']         = r.cashPayments;
      row['Check Payments']        = r.checkPayments;
      row['Free Payments']         = r.freePayments;
      row['Org Credit Pmts']       = r.orgCreditPayments;
      row['Total Payments']        = r.totalPayments;
      if (hasCCSplit) {
        row['CC Online Refunds']    = r.ccOnlineRefunds;
        row['CC In-Person Refunds'] = r.ccInPersonRefunds;
      } else {
        row['CC Refunds']           = r.ccRefunds;
      }
      row['Cash Refunds']          = r.cashRefunds;
      row['Check Refunds']         = r.checkRefunds;
      row['Org Credit Refunds']    = r.orgCreditRefunds;
      row['Other Refunds']         = r.otherRefunds;
      row['Total Refunds']         = r.totalRefunds;
      row['Net Amount']            = r.netAmount;
      return row;
    };

    const data = rows.map(makeDataRow);

    // Totals row
    const totalsRow = { 'GL Code': 'TOTALS', 'Account Name': '' };
    if (rows.some(x => x.accountNumber)) totalsRow['Account #'] = '';
    if (hasCCSplit) {
      totalsRow['CC Online Pmts']    = totals.ccOnlinePayments;
      totalsRow['CC In-Person Pmts'] = totals.ccInPersonPayments;
    } else {
      totalsRow['CC Payments']       = totals.ccPayments;
    }
    totalsRow['Cash Payments']       = totals.cashPayments;
    totalsRow['Check Payments']      = totals.checkPayments;
    totalsRow['Free Payments']       = sumField(rows, 'freePayments');
    totalsRow['Org Credit Pmts']     = sumField(rows, 'orgCreditPayments');
    totalsRow['Total Payments']      = totals.totalPayments;
    if (hasCCSplit) {
      totalsRow['CC Online Refunds']    = sumField(rows, 'ccOnlineRefunds');
      totalsRow['CC In-Person Refunds'] = sumField(rows, 'ccInPersonRefunds');
    } else {
      totalsRow['CC Refunds']           = sumField(rows, 'ccRefunds');
    }
    totalsRow['Cash Refunds']        = sumField(rows, 'cashRefunds');
    totalsRow['Check Refunds']       = sumField(rows, 'checkRefunds');
    totalsRow['Org Credit Refunds']  = sumField(rows, 'orgCreditRefunds');
    totalsRow['Other Refunds']       = sumField(rows, 'otherRefunds');
    totalsRow['Total Refunds']       = totals.totalRefunds;
    totalsRow['Net Amount']          = totals.netAmount;
    data.push(totalsRow);

    const ws = XLSX.utils.json_to_sheet(data);

    // Currency format on money columns
    const headers = Object.keys(data[0]);
    const moneyHeaders = headers.filter(h => !['GL Code','Account Name','Account #'].includes(h));
    const range = XLSX.utils.decode_range(ws['!ref']);
    for (let R = 1; R <= range.e.r; R++) {
      moneyHeaders.forEach(h => {
        const c = headers.indexOf(h);
        if (c < 0) return;
        const addr = XLSX.utils.encode_cell({ r: R, c });
        if (ws[addr]) ws[addr].z = '"$"#,##0.00';
      });
    }

    // Bold totals row
    const totalsRowIdx = data.length;
    headers.forEach((h, c) => {
      const addr = XLSX.utils.encode_cell({ r: totalsRowIdx, c });
      if (ws[addr]) ws[addr].s = { font: { bold: true } };
    });

    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, 'GL Rollup');
    XLSX.writeFile(wb, `gl-report-${loadedStart || 'export'}.xlsx`);
  }

  const isPrint = params._print === '1';

  // ── Toolbar ─────────────────────────────────────────────────────────
  function renderToolbar() {
    if (isPrint) return null;
    return (
      <div className="toolbar">
        <span className="toolbar-title">GL Code Rollup</span>

        <label>
          Start
          <input type="date" value={startDate} onChange={e => setStartDate(e.target.value)} />
        </label>
        <label>
          End
          <input type="date" value={endDate} onChange={e => setEndDate(e.target.value)} />
        </label>

        <button onClick={() => setMonth(-1)} style={{fontSize:11, padding:'4px 8px'}}>Last Month</button>
        <button onClick={() => setMonth(0)}  style={{fontSize:11, padding:'4px 8px'}}>This Month</button>
        <button onClick={() => setMonth(1)}  style={{fontSize:11, padding:'4px 8px'}}>Next Month</button>

        <button
          className="btn-run"
          onClick={handleRun}
          disabled={loading}
          style={datesChanged && !loading ? { boxShadow: '0 0 0 2px #4ade80' } : {}}
        >
          {loading ? 'Loading…' : '▶ Run Report'}
        </button>

        <div className="divider" />

        <button
          className={showRefunds ? 'active' : ''}
          style={{fontSize:11, padding:'4px 10px'}}
          onClick={() => setShowRefunds(v => !v)}
        >
          {showRefunds ? '▾' : '▸'} Refund Detail
        </button>

        <div className="divider" />

        {['table','bar','pie'].map(mode => (
          <button
            key={mode}
            className={viewMode === mode ? 'active' : ''}
            style={{fontSize:11, padding:'4px 10px'}}
            onClick={() => setViewMode(mode)}
          >
            {mode === 'table' ? '☰ Table' : mode === 'bar' ? '▐ Bar' : '◉ Pie'}
          </button>
        ))}

        <div className="toolbar-spacer" />

        {rows && <span className="row-count">{rows.length} GL code{rows.length !== 1 ? 's' : ''}</span>}

        <div className="divider" />

        <button onClick={() => window.print()}>🖨️ Print</button>
        <button
          className="btn-excel"
          onClick={exportExcel}
          disabled={!rows || rows.length === 0}
        >📥 Excel</button>
        <div className="divider" />
        <button
          onClick={() => window.open(`/${orgSlug}/admin`, '_blank')}
          style={{fontSize:11, padding:'4px 10px'}}
        >📧 Subscriptions</button>
      </div>
    );
  }

  // ── Summary cards ────────────────────────────────────────────────────
  function renderSummaryCards() {
    if (!rows) return null;
    return (
      <div className="summary-cards">
        <SummaryCard label="Net Amount"     value={totals.netAmount}     color="green"  />
        <SummaryCard label="Total Payments" value={totals.totalPayments} color="blue"   />
        <SummaryCard label="Total Refunds"  value={totals.totalRefunds}  color="red"    />
        {hasCCSplit ? (
          <>
            <SummaryCard label="CC Online"    value={totals.ccOnlinePayments}   color="indigo" />
            <SummaryCard label="CC In-Person" value={totals.ccInPersonPayments} color="violet" />
          </>
        ) : (
          <SummaryCard label="Credit Card" value={totals.ccPayments} color="violet" />
        )}
        <SummaryCard label="Cash"  value={totals.cashPayments}  color="amber" />
        <SummaryCard label="Check" value={totals.checkPayments} color="slate" />
      </div>
    );
  }

  // ── Table ────────────────────────────────────────────────────────────
  function renderTable() {
    if (!rows || rows.length === 0) {
      return <div style={{textAlign:'center', padding:'40px 0', color:'#888'}}>No data found for the selected date range.</div>;
    }

    const hasAcctName = rows.some(r => r.accountName);
    const hasAcctNum  = rows.some(r => r.accountNumber);

    // colspan helpers
    const idCols       = 1 + (hasAcctName ? 1 : 0) + (hasAcctNum ? 1 : 0);
    const ccCols       = hasCCSplit ? 2 : 1;
    const otherPmtCols = showRefunds ? 2 : 0;   // free + org credit
    const ccRfndCols   = hasCCSplit ? 2 : 1;
    const refundCols   = showRefunds ? (ccRfndCols + 4) : 1; // + cash/check/orgcredit/other

    return (
      <div className="table-wrapper">
        <table>
          <thead>
            {/* ── Group header ── */}
            <tr>
              <th className="group left" colSpan={idCols}></th>
              <th className="group" colSpan={ccCols}>Credit Card</th>
              <th className="group" colSpan={1}>Cash</th>
              <th className="group" colSpan={1}>Check</th>
              {showRefunds && <th className="group" colSpan={2}>Other Pmts</th>}
              <th className="group" colSpan={1}>Total Pmts</th>
              <th className={`group${showRefunds ? ' refund-group' : ''}`} colSpan={refundCols}>{showRefunds ? 'Refunds' : 'Total Refunds'}</th>
              <th className="group" colSpan={1}>Net</th>
            </tr>

            {/* ── Column header ── */}
            <tr>
              <th className="left">GL Code</th>
              {hasAcctName && <th className="left">Account Name</th>}
              {hasAcctNum  && <th className="left">Acct #</th>}

              {hasCCSplit ? (
                <>
                  <th>CC Online</th>
                  <th>CC In-Person</th>
                </>
              ) : (
                <th>Credit Card</th>
              )}

              <th>Cash</th>
              <th>Check</th>

              {showRefunds && <><th>Free</th><th>Org Credit</th></>}

              <th>Total Pmts</th>

              {showRefunds
                ? hasCCSplit
                  ? <><th className="refund-col">CC Online</th><th className="refund-col">CC In-Prn</th><th className="refund-col">Cash</th><th className="refund-col">Check</th><th className="refund-col">Org Crd</th><th className="refund-col">Other</th></>
                  : <><th className="refund-col">CC</th><th className="refund-col">Cash</th><th className="refund-col">Check</th><th className="refund-col">Org Crd</th><th className="refund-col">Other</th></>
                : <th>Total Rfnds</th>
              }

              <th>Net Amount</th>
            </tr>
          </thead>

          <tbody>
            {rows.map((r, i) => (
              <tr key={i}>
                <td className="left gl-code">{r.glCode}</td>
                {hasAcctName && <td className="left">{r.accountName}</td>}
                {hasAcctNum  && <td className="left" style={{fontFamily:'IBM Plex Mono,monospace',fontSize:10}}>{r.accountNumber}</td>}

                {hasCCSplit ? (
                  <>
                    <td><MoneyCell v={r.ccOnlinePayments}   /></td>
                    <td><MoneyCell v={r.ccInPersonPayments} /></td>
                  </>
                ) : (
                  <td><MoneyCell v={r.ccPayments} /></td>
                )}

                <td><MoneyCell v={r.cashPayments}  /></td>
                <td><MoneyCell v={r.checkPayments} /></td>

                {showRefunds && (
                  <>
                    <td><MoneyCell v={r.freePayments}      /></td>
                    <td><MoneyCell v={r.orgCreditPayments} /></td>
                  </>
                )}

                <td style={{fontWeight:600}}><MoneyCell v={r.totalPayments} /></td>

                {showRefunds
                  ? hasCCSplit
                    ? <>
                        <td className="refund-col"><MoneyCell v={r.ccOnlineRefunds}    /></td>
                        <td className="refund-col"><MoneyCell v={r.ccInPersonRefunds}  /></td>
                        <td className="refund-col"><MoneyCell v={r.cashRefunds}        /></td>
                        <td className="refund-col"><MoneyCell v={r.checkRefunds}       /></td>
                        <td className="refund-col"><MoneyCell v={r.orgCreditRefunds}   /></td>
                        <td className="refund-col"><MoneyCell v={r.otherRefunds}       /></td>
                      </>
                    : <>
                        <td className="refund-col"><MoneyCell v={r.ccRefunds}          /></td>
                        <td className="refund-col"><MoneyCell v={r.cashRefunds}        /></td>
                        <td className="refund-col"><MoneyCell v={r.checkRefunds}       /></td>
                        <td className="refund-col"><MoneyCell v={r.orgCreditRefunds}   /></td>
                        <td className="refund-col"><MoneyCell v={r.otherRefunds}       /></td>
                      </>
                  : <td style={{fontWeight:600}}><MoneyCell v={r.totalRefunds} /></td>
                }

                <td style={{fontWeight:600, color: r.netAmount < 0 ? '#dc2626' : 'inherit'}}>
                  {fmtMoneyStr(r.netAmount)}
                </td>
              </tr>
            ))}
          </tbody>

          <tfoot>
            <tr>
              <td className="left">TOTALS</td>
              {hasAcctName && <td></td>}
              {hasAcctNum  && <td></td>}

              {hasCCSplit ? (
                <>
                  <td>{fmtMoneyStr(totals.ccOnlinePayments)}</td>
                  <td>{fmtMoneyStr(totals.ccInPersonPayments)}</td>
                </>
              ) : (
                <td>{fmtMoneyStr(totals.ccPayments)}</td>
              )}

              <td>{fmtMoneyStr(totals.cashPayments)}</td>
              <td>{fmtMoneyStr(totals.checkPayments)}</td>

              {showRefunds && (
                <>
                  <td>{fmtMoneyStr(sumField(rows, 'freePayments'))}</td>
                  <td>{fmtMoneyStr(sumField(rows, 'orgCreditPayments'))}</td>
                </>
              )}

              <td>{fmtMoneyStr(totals.totalPayments)}</td>

              {showRefunds
                ? hasCCSplit
                  ? <>
                      <td className="refund-col">{fmtMoneyStr(sumField(rows,'ccOnlineRefunds'))}</td>
                      <td className="refund-col">{fmtMoneyStr(sumField(rows,'ccInPersonRefunds'))}</td>
                      <td className="refund-col">{fmtMoneyStr(sumField(rows,'cashRefunds'))}</td>
                      <td className="refund-col">{fmtMoneyStr(sumField(rows,'checkRefunds'))}</td>
                      <td className="refund-col">{fmtMoneyStr(sumField(rows,'orgCreditRefunds'))}</td>
                      <td className="refund-col">{fmtMoneyStr(sumField(rows,'otherRefunds'))}</td>
                    </>
                  : <>
                      <td className="refund-col">{fmtMoneyStr(sumField(rows,'ccRefunds'))}</td>
                      <td className="refund-col">{fmtMoneyStr(sumField(rows,'cashRefunds'))}</td>
                      <td className="refund-col">{fmtMoneyStr(sumField(rows,'checkRefunds'))}</td>
                      <td className="refund-col">{fmtMoneyStr(sumField(rows,'orgCreditRefunds'))}</td>
                      <td className="refund-col">{fmtMoneyStr(sumField(rows,'otherRefunds'))}</td>
                    </>
                : <td>{fmtMoneyStr(totals.totalRefunds)}</td>
              }

              <td style={{color: totals.netAmount < 0 ? '#dc2626' : 'inherit'}}>
                {fmtMoneyStr(totals.netAmount)}
              </td>
            </tr>
          </tfoot>
        </table>
      </div>
    );
  }

  // ── Error / loading ─────────────────────────────────────────────────
  if (error && !rows) {
    return (
      <div>
        {renderToolbar()}
        <div className="page">
          <div className="error">
            <p><strong>Failed to load report data</strong></p>
            <p style={{marginTop:8}}>{error}</p>
          </div>
        </div>
      </div>
    );
  }

  if (!rows) {
    return (
      <div>
        {renderToolbar()}
        <div className="page">
          <div className="loading">
            <div className="spinner" />
            <div>Loading report data…</div>
          </div>
        </div>
      </div>
    );
  }

  // ── Run date/time ───────────────────────────────────────────────────
  const now = new Date();
  const runDate = `${(now.getMonth()+1).toString().padStart(2,'0')}/${now.getDate().toString().padStart(2,'0')}/${now.getFullYear()} @ ${now.toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit',hour12:true}).toLowerCase()}`;

  const displayOrg = orgName || 'rec.us';
  const dateRangeLabel = [
    loadedStart ? formatDisplayDate(loadedStart) : null,
    loadedEnd   ? formatDisplayDate(loadedEnd)   : null,
  ].filter(Boolean).join(' – ') || 'Current Month';

  return (
    <div>
      {renderToolbar()}

      <div className="page" style={loading ? { opacity: 0.5, pointerEvents: 'none' } : {}}>

        {/* Report header */}
        <div className="report-header">
          <div>
            <div className="org-label">{displayOrg}</div>
            <div className="title">GL Code Rollup</div>
          </div>
          <div className="date-range">{dateRangeLabel}</div>
        </div>

        {/* Summary cards */}
        {renderSummaryCards()}

        {/* Content: table or chart */}
        {viewMode === 'table'
          ? renderTable()
          : <GlChart rows={rows} viewMode={viewMode} hasCCSplit={hasCCSplit} />
        }

        {/* Footer */}
        <div className="report-footer">
          <span>{displayOrg}</span>
          <span>Run Date/Time: {runDate}</span>
        </div>

        {/* Puppeteer marker */}
        <div id="report-ready" style={{display:'none'}} />
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
