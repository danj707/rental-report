<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GL Code Rollup</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'IBM Plex Sans', 'Segoe UI', system-ui, sans-serif;
      font-size: 12px;
      color: #1a1a1a;
      background: #f5f4f1;
      line-height: 1.35;
    }

    /* ── Toolbar ── */
    .toolbar {
      position: sticky;
      top: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 20px;
      background: #2c2c2c;
      color: #eee;
      font-size: 13px;
      flex-wrap: wrap;
    }
    .toolbar-title { font-weight: 600; margin-right: 8px; }
    .toolbar-spacer { flex: 1; }
    .toolbar label {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: #aaa;
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    .toolbar input[type="date"] {
      padding: 4px 8px;
      border: 1px solid rgba(255,255,255,.2);
      border-radius: 4px;
      background: rgba(255,255,255,.1);
      color: #fff;
      font-size: 12px;
      font-family: inherit;
      outline: none;
    }
    .toolbar input[type="date"]:focus { border-color: #3b82f6; }
    .toolbar input[type="date"]::-webkit-calendar-picker-indicator { filter: invert(1); cursor: pointer; }
    .toolbar button {
      padding: 6px 14px;
      border: 1px solid rgba(255,255,255,.25);
      border-radius: 4px;
      background: rgba(255,255,255,.08);
      color: #fff;
      font-size: 12px;
      font-family: inherit;
      cursor: pointer;
      transition: background .15s;
    }
    .toolbar button:hover { background: rgba(255,255,255,.18); }
    .toolbar button.active {
      background: rgba(255,255,255,.22);
      border-color: rgba(255,255,255,.55);
    }
    .toolbar .btn-run { background: #16a34a; border-color: #16a34a; font-weight: 600; }
    .toolbar .btn-run:hover { background: #15803d; }
    .toolbar .btn-run:disabled { opacity: .5; cursor: not-allowed; }
    .toolbar .btn-pdf { background: #3b82f6; border-color: #3b82f6; font-weight: 600; }
    .toolbar .btn-pdf:hover { background: #2563eb; }
    .toolbar .btn-pdf:disabled { opacity: .5; cursor: not-allowed; }
    .toolbar .btn-excel { background: #166534; border-color: #166534; font-weight: 600; }
    .toolbar .btn-excel:hover { background: #14532d; }
    .toolbar .btn-excel:disabled { opacity: .5; cursor: not-allowed; }
    .toolbar .divider { width: 1px; height: 28px; background: rgba(255,255,255,.15); margin: 0 4px; }
    .toolbar .row-count { font-size: 11px; color: #aaa; }

    /* ── Page ── */
    .page {
      max-width: 1320px;
      margin: 16px auto;
      padding: 24px 28px;
      background: #fff;
      box-shadow: 0 1px 4px rgba(0,0,0,.08);
    }

    /* ── Report header ── */
    .report-header-logo { height: 42px; max-width: 140px; object-fit: contain; object-position: left center; }
    .report-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      border-bottom: 2.5px solid #111;
      padding-bottom: 8px;
      margin-bottom: 16px;
    }
    .report-header .org-label {
      font-size: 10.5px;
      letter-spacing: 1.6px;
      text-transform: uppercase;
      color: #777;
      font-weight: 600;
    }
    .report-header .title { font-size: 17px; font-weight: 700; margin-top: 1px; }
    .report-header .date-range { font-size: 11px; color: #666; text-align: right; }

    /* ── Summary cards ── */
    .summary-cards {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }
    .summary-card {
      flex: 1;
      min-width: 110px;
      padding: 10px 12px;
      border-radius: 5px;
      background: #f8f8f6;
      border: 1px solid #e4e4e0;
      border-left: 3px solid #ccc;
    }
    .summary-card .card-label {
      font-size: 9.5px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: #888;
      font-weight: 600;
      margin-bottom: 4px;
    }
    .summary-card .card-value {
      font-size: 15px;
      font-weight: 700;
      font-family: 'IBM Plex Mono', monospace;
      white-space: nowrap;
    }
    .summary-card.green  { border-left-color: #16a34a; }
    .summary-card.green  .card-value { color: #15803d; }
    .summary-card.blue   { border-left-color: #3b82f6; }
    .summary-card.blue   .card-value { color: #2563eb; }
    .summary-card.red    { border-left-color: #ef4444; }
    .summary-card.red    .card-value { color: #dc2626; }
    .summary-card.violet { border-left-color: #7c3aed; }
    .summary-card.violet .card-value { color: #6d28d9; }
    .summary-card.indigo { border-left-color: #4f46e5; }
    .summary-card.indigo .card-value { color: #4338ca; }
    .summary-card.amber  { border-left-color: #d97706; }
    .summary-card.amber  .card-value { color: #b45309; }
    .summary-card.slate  { border-left-color: #475569; }
    .summary-card.slate  .card-value { color: #334155; }
    .summary-card.teal   { border-left-color: #0d9488; }
    .summary-card.teal   .card-value { color: #0f766e; }
    .summary-card.purple { border-left-color: #9333ea; }
    .summary-card.purple .card-value { color: #7e22ce; }

    /* ── Table ── */
    .table-wrapper { overflow-x: auto; }
    table { border-collapse: collapse; width: 100%; font-size: 11.5px; }
    table.compact { font-size: 10px; }
    table.compact td, table.compact th { padding: 4px 5px; }
    table.compact th.left, table.compact td.left { padding-left: 6px; }

    thead th {
      background: #e4e4e0;
      border: 1px solid #ccc;
      padding: 5px 8px;
      text-align: right;
      font-weight: 600;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.3px;
      color: #333;
      white-space: nowrap;
    }
    thead th.left { text-align: left; }
    thead th.group {
      text-align: center;
      background: #d0d0cc;
      font-size: 9px;
      border-bottom: 2px solid #aaa;
      color: #444;
    }
    thead th.group.refund-group {
      background: #fca5a5;
      border-bottom: 2px solid #f87171;
      color: #7f1d1d;
    }
    thead th.refund-col {
      background: #fee2e2;
      color: #7f1d1d;
    }
    tbody td.refund-col { background: #fff5f5; }
    tbody tr:nth-child(even) td.refund-col { background: #fef2f2; }
    tbody tr:hover td.refund-col { background: #fee2e2; }
    tfoot td.refund-col { background: #fecaca; }

    tbody td {
      border: 1px solid #e8e8e4;
      padding: 4px 8px;
      text-align: right;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 11px;
      white-space: nowrap;
    }
    tbody td.left {
      text-align: left;
      font-family: 'IBM Plex Sans', sans-serif;
      white-space: normal;
    }
    tbody td.gl-code { font-weight: 700; }
    tbody tr:nth-child(even) { background: #fafaf8; }
    tbody tr:hover { background: #f0f0ec; }

    tfoot td {
      border: 1px solid #ccc;
      border-top: 2px solid #444;
      padding: 5px 8px;
      text-align: right;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 11px;
      font-weight: 700;
      background: #ececea;
      white-space: nowrap;
    }
    tfoot td.left {
      text-align: left;
      font-family: 'IBM Plex Sans', sans-serif;
      font-weight: 700;
    }

    .cell-zero { color: #c8c8c4; }
    .cell-neg  { color: #dc2626; }

    /* ── Chart ── */
    .chart-wrap {
      margin-top: 4px;
      position: relative;
    }
    .chart-wrap canvas { max-width: 100%; }

    /* ── Footer ── */
    .report-footer {
      display: flex;
      justify-content: space-between;
      border-top: 2.5px solid #111;
      margin-top: 16px;
      padding-top: 6px;
      font-size: 10px;
      color: #777;
    }

    /* ── Loading / Error ── */
    .loading { text-align: center; padding: 80px 20px; color: #888; font-size: 14px; }
    .loading .spinner {
      position: relative;
      display: inline-block;
      width: 34px;
      height: 44px;
      margin: 0 auto;
      box-sizing: border-box;
      border: 2px solid #e07b1a;
      border-top-color: #f7b96b;
      border-radius: 4px 4px 14px 14px;
      background: rgba(255, 248, 240, 0.5);
      overflow: hidden;
      box-shadow: inset -4px 0 0 rgba(255, 255, 255, 0.35);
    }
    .loading .spinner::before {
      content: '';
      position: absolute;
      left: 0; right: 0; bottom: 0;
      height: 60%;
      background: linear-gradient(180deg, #ffb24d 0%, #ff8c1f 55%, #f2710a 100%);
      box-shadow: inset 0 2px 0 rgba(255, 255, 255, 0.45);
      animation: juice-fill 2s ease-in-out infinite;
    }
    .loading .spinner::after {
      content: '';
      position: absolute;
      left: 50%; bottom: 6px;
      width: 3px; height: 3px;
      margin-left: -1.5px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.85);
      box-shadow: -5px 7px 0 0 rgba(255, 255, 255, 0.65), 5px 12px 0 -0.5px rgba(255, 255, 255, 0.5);
      animation: juice-bubbles 2.2s ease-out infinite;
    }
    @keyframes juice-fill {
      0%   { height: 42%; }
      50%  { height: 80%; }
      100% { height: 42%; }
    }
    @keyframes juice-bubbles {
      0%   { transform: translateY(2px) scale(0.5); opacity: 0; }
      30%  { opacity: 0.9; }
      70%  { opacity: 0.6; }
      100% { transform: translateY(-22px) scale(1); opacity: 0; }
    }
    .loading { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 14px; }
    .juice-msg { position: relative; height: 1.4em; line-height: 1.4em; min-width: 190px; }
    .juice-msg span { position: absolute; left: 0; right: 0; text-align: center; opacity: 0; animation: juice-phrase 10s infinite; }
    .juice-msg span:nth-child(1) { animation-delay: 0s; }
    .juice-msg span:nth-child(2) { animation-delay: 2s; }
    .juice-msg span:nth-child(3) { animation-delay: 4s; }
    .juice-msg span:nth-child(4) { animation-delay: 6s; }
    .juice-msg span:nth-child(5) { animation-delay: 8s; }
    @keyframes juice-phrase {
      0%   { opacity: 0; transform: translateY(5px); }
      2%   { opacity: 1; transform: translateY(0); }
      18%  { opacity: 1; transform: translateY(0); }
      20%  { opacity: 0; transform: translateY(-5px); }
      100% { opacity: 0; }
    }
    .error { text-align: center; padding: 60px 20px; color: #b91c1c; font-size: 14px; }

    /* ── GL Locations cell ── */
    .gl-locations {
      display: flex;
      flex-wrap: wrap;
      gap: 3px;
      margin-top: 3px;
    }
    .gl-loc-tag {
      display: inline-block;
      font-size: 9px;
      font-family: 'IBM Plex Sans', sans-serif;
      background: #f0ede8;
      border: 1px solid #ddd;
      border-radius: 3px;
      padding: 1px 5px;
      color: #555;
      white-space: nowrap;
      line-height: 1.5;
    }

    /* ── Print ── */
    @media print {
      .toolbar, .mode-bar { display: none !important; }
      body { background: #fff; }
      .page { box-shadow: none; margin: 0; padding: 12px 16px; max-width: 100%; }
      table.compact { font-size: 9px; }
      table.compact td, table.compact th { padding: 3px 4px; }
    }
    body.print-mode .toolbar { display: none !important; }
    body.print-mode .page { box-shadow: none; margin: 0; padding: 12px 16px; max-width: 100%; }
    /* ── Desk filter dropdown ── */
    .loc-filter-wrap { position: relative; }
    .btn-loc-filter { display: flex; align-items: center; gap: 6px; white-space: nowrap; }
    .btn-loc-filter .badge {
      background: #f59e0b; color: #1a1a1a; border-radius: 10px;
      font-size: 10px; font-weight: 700; padding: 1px 6px; line-height: 1.4;
    }
    .loc-dropdown {
      position: absolute; top: calc(100% + 6px); left: 0; z-index: 200;
      background: #1e1e1e; border: 1px solid rgba(255,255,255,.15); border-radius: 6px;
      min-width: 220px; max-height: 360px; display: flex; flex-direction: column;
      box-shadow: 0 8px 24px rgba(0,0,0,.5);
    }
    .loc-dropdown-header {
      display: flex; justify-content: space-between; align-items: center;
      padding: 8px 12px; border-bottom: 1px solid rgba(255,255,255,.1);
      font-size: 10px; text-transform: uppercase; letter-spacing: 0.5px;
      color: #aaa; flex-shrink: 0;
    }
    .loc-dropdown-header-actions { display: flex; gap: 8px; }
    .loc-dropdown-header button {
      padding: 2px 6px; font-size: 10px;
      border-color: rgba(255,255,255,.15); background: rgba(255,255,255,.06);
    }
    .loc-dropdown-search { padding: 6px 10px; border-bottom: 1px solid rgba(255,255,255,.08); flex-shrink: 0; }
    .loc-dropdown-search input {
      width: 100%; padding: 4px 8px; background: rgba(255,255,255,.08);
      border: 1px solid rgba(255,255,255,.15); border-radius: 4px;
      color: #fff; font-size: 11px; font-family: inherit; outline: none;
    }
    .loc-dropdown-search input::placeholder { color: #777; }
    .loc-dropdown-search input:focus { border-color: #3b82f6; }
    .loc-dropdown-list { overflow-y: auto; flex: 1; padding: 4px 0; }
    .loc-dropdown-list::-webkit-scrollbar { width: 4px; }
    .loc-dropdown-list::-webkit-scrollbar-track { background: transparent; }
    .loc-dropdown-list::-webkit-scrollbar-thumb { background: rgba(255,255,255,.2); border-radius: 2px; }
    .loc-item {
      display: flex; align-items: center; gap: 8px; padding: 5px 12px;
      cursor: pointer; transition: background .1s; font-size: 12px; color: #ddd;
    }
    .loc-item:hover { background: rgba(255,255,255,.07); }
    .loc-item input[type="checkbox"] { accent-color: #3b82f6; width: 13px; height: 13px; flex-shrink: 0; cursor: pointer; }
    .loc-item span { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex: 1; }

    /* ── Button loading spinner ── */
    @keyframes btn-spin { to { transform: rotate(360deg); } }
    .btn-spinner {
      display: inline-block;
      width: 12px;
      height: 12px;
      border: 2px solid rgba(0,0,0,.15);
      border-top-color: #333;
      border-radius: 50%;
      animation: btn-spin .6s linear infinite;
      vertical-align: middle;
      margin-right: 5px;
    }
    .toolbar button:disabled .btn-spinner {
      border-top-color: #888;
    }

    /* ── Insights ── */
    .insights-section { margin: 0 0 16px; padding: 16px 0 0; }
    .insights-head { display: flex; align-items: center; gap: 12px; margin-bottom: 10px; }
    .insights-btn { background: linear-gradient(135deg, #6366f1, #8b5cf6); color: #fff; border: none; border-radius: 8px; padding: 8px 18px; font-size: 13px; font-weight: 600; cursor: pointer; font-family: inherit; }
    .insights-btn:hover { filter: brightness(1.08); }
    .insights-btn:disabled { opacity: .6; cursor: wait; }
    .insights-sub { font-size: 12px; color: #888; }
    .insights-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(230px, 1fr)); gap: 12px; }
    .insight-card { border: 1px solid #e5e7eb; border-left-width: 4px; border-radius: 8px; padding: 14px 16px; background: #fff; }
    .insight-opportunity { border-left-color: #10b981; } .insight-opportunity .insight-type { color: #059669; }
    .insight-risk { border-left-color: #ef4444; } .insight-risk .insight-type { color: #dc2626; }
    .insight-signal { border-left-color: #3b82f6; } .insight-signal .insight-type { color: #2563eb; }
    .insight-type { font-size: 10px; font-weight: 700; letter-spacing: .6px; text-transform: uppercase; margin-bottom: 6px; }
    .insight-title { font-size: 14px; font-weight: 700; color: #111827; margin-bottom: 5px; line-height: 1.3; }
    .insight-detail { font-size: 13px; color: #4b5563; line-height: 1.5; }
    .insight-action { font-size: 12px; color: #6b7280; margin-top: 8px; font-weight: 500; }
    .insights-feedback { display:flex; align-items:center; gap:8px; margin-top:12px; padding:8px 4px; font-size:13px; color:#666; }
    .insights-feedback button { background:none; border:1px solid #e5e7eb; border-radius:6px; padding:4px 10px; cursor:pointer; font-size:13px; transition:all .15s; }
    .insights-feedback button:hover { background:#f3f4f6; border-color:#d1d5db; }
    .insights-feedback .fb-label { color:#888; font-size:12px; }
    .insights-feedback .fb-thanks { color:#10b981; font-weight:600; font-size:13px; }
    .insights-feedback .fb-down-form { display:flex; align-items:center; gap:6px; flex:1; }
    .insights-feedback .fb-down-form input { flex:1; border:1px solid #d1d5db; border-radius:6px; padding:5px 10px; font-size:13px; font-family:inherit; outline:none; }
    .insights-feedback .fb-down-form input:focus { border-color:#6366f1; box-shadow:0 0 0 2px rgba(99,102,241,.15); }
    .insights-feedback .fb-send { background:#6366f1!important; color:#fff!important; border-color:#6366f1!important; font-weight:600; }
    .insights-feedback .fb-send:hover { background:#4f46e5!important; }
    .loading { padding: 36px 16px; text-align: center; }
    .spinner { border:3px solid #e5e7eb; border-top:3px solid #6366f1; border-radius:50%; width:24px; height:24px; margin:0 auto 8px; animation:spin 1s linear infinite; }
    @keyframes spin { to { transform:rotate(360deg); } }
  </style>
  <script>
    // ── Token auth (injected) ────────────────────────────────────────
    const URL_TOKEN = new URLSearchParams(window.location.search).get('token') || '';
    const TOKEN_QS  = URL_TOKEN ? '?token=' + encodeURIComponent(URL_TOKEN) : '';
    function withToken(url) {
      if (!URL_TOKEN) return url;
      return url + (url.includes('?') ? '&' : '?') + 'token=' + encodeURIComponent(URL_TOKEN);
    }
  </script>
</head>
<body>
<div id="root"></div>

<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<script type="text/babel">
const { useState, useEffect, useMemo, useCallback, useRef } = React;

const LS_REFUND   = 'gl_refund_breakdown_v2';
const LS_VIEW     = 'gl_view_mode_v2';
const LS_LOCS     = 'gl_show_locations_v1';
const NO_DESK_LABEL = '(No desk location)';

// ── Params / date helpers ────────────────────────────────────────────
function getParams() {
  const p = new URLSearchParams(window.location.search);
  return { start_date: p.get('start_date'), end_date: p.get('end_date'), _print: p.get('_print') };
}

function toISO(d) {
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function getCurrentMonthRange() {
  const now = new Date();
  const y = now.getFullYear(), m = now.getMonth();
  return { start: toISO(new Date(y, m, 1)), end: toISO(new Date(y, m + 1, 0)) };
}

function formatDisplayDate(iso) {
  if (!iso) return '';
  const d = new Date(iso + 'T12:00:00');
  const M = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  return `${M[d.getMonth()]} ${d.getDate()}, ${d.getFullYear()}`;
}

// ── Money helpers ────────────────────────────────────────────────────
function pf(v) { const n = parseFloat(v); return isNaN(n) ? 0 : n; }

function fmtMoney(v) {
  const n = pf(v);
  if (n === 0) return null; // null = render blank with .cell-zero
  const abs = Math.abs(n).toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g, ',');
  return (n < 0 ? '-$' : '$') + abs;
}

function fmtMoneyStr(v) {
  const n = pf(v);
  const abs = Math.abs(n).toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g, ',');
  return (n < 0 ? '-$' : '$') + abs;
}

function MoneyCell({ v }) {
  const s = fmtMoney(v);
  const n = pf(v);
  if (s === null) return <span className="cell-zero">—</span>;
  if (n < 0) return <span className="cell-neg">{s}</span>;
  return <span>{s}</span>;
}

function sumField(rows, field) {
  return rows.reduce((acc, r) => acc + (r[field] ?? 0), 0);
}

// ── Re-aggregate desk-split rows back to one row per GL code ──────────
const GL_MONEY_FIELDS = [
  'ccPayments','cashPayments','checkPayments','freePayments','orgCreditPayments','scholarshipPayments',
  'totalPayments','numPayments','ccRefunds','cashRefunds','checkRefunds',
  'orgCreditRefunds','otherRefunds','totalRefunds','numRefunds','netAmount'
];
const GL_SPLIT_FIELDS = ['ccOnlinePayments','ccInPersonPayments','ccOnlineRefunds','ccInPersonRefunds'];

function aggregateByGlCode(list) {
  const map = new Map();  // preserves first-seen (gl-code) order
  for (const r of list) {
    const key = r.glCode || '';
    let a = map.get(key);
    if (!a) {
      a = {
        glCode:        r.glCode,
        accountName:   r.accountName,
        accountNumber: r.accountNumber,
        isSplit:       r.isSplit,
        _locSet:       new Set(),
      };
      GL_MONEY_FIELDS.forEach(f => { a[f] = 0; });
      GL_SPLIT_FIELDS.forEach(f => { a[f] = null; });
      map.set(key, a);
    }
    GL_MONEY_FIELDS.forEach(f => { a[f] += pf(r[f]); });
    GL_SPLIT_FIELDS.forEach(f => {
      if (r[f] !== null && r[f] !== undefined) a[f] = (a[f] ?? 0) + pf(r[f]);
    });
    if (r.locations) {
      r.locations.split(',').map(x => x.trim()).filter(Boolean).forEach(l => a._locSet.add(l));
    }
  }
  return Array.from(map.values()).map(a => {
    a.locations = Array.from(a._locSet).sort().join(', ');
    delete a._locSet;
    return a;
  });
}

// ── Normalize row ────────────────────────────────────────────────────
function normalizeRow(raw) {
  const isSplit = 'CC Online Payments' in raw;
  return {
    glCode:             raw['GL Code'] || '',
    accountName:        raw['Account Name'] || raw['GL Code Description'] || '',
    accountNumber:      raw['Account Number'] || '',
    locations:          raw['Locations'] || '',
    deskLocation:       raw['Desk Location'] || '',
    isSplit,

    // CC — adaptive
    ccPayments:         !isSplit
                          ? pf(raw['Credit Card Payments'])
                          : pf(raw['CC Online Payments']) + pf(raw['CC In-Person Payments']),
    ccOnlinePayments:   isSplit ? pf(raw['CC Online Payments'])    : null,
    ccInPersonPayments: isSplit ? pf(raw['CC In-Person Payments']) : null,

    cashPayments:       pf(raw['Cash Payments']),
    checkPayments:      pf(raw['Check Payments']),
    freePayments:       pf(raw['Free Payments']),
    orgCreditPayments:  pf(raw['Organization Credit Payments']),
    scholarshipPayments: pf(raw['Scholarship Payments']),
    totalPayments:      pf(raw['Total Payments']),
    numPayments:        pf(raw['Number of Payments']),

    // CC refunds — adaptive
    ccRefunds:          !isSplit
                          ? pf(raw['CC Refunds'])
                          : pf(raw['CC Online Refunds']) + pf(raw['CC In-Person Refunds']),
    ccOnlineRefunds:    isSplit ? pf(raw['CC Online Refunds'])    : null,
    ccInPersonRefunds:  isSplit ? pf(raw['CC In-Person Refunds']) : null,

    cashRefunds:        pf(raw['Cash Refunds']),
    checkRefunds:       pf(raw['Check Refunds']),
    orgCreditRefunds:   pf(raw['Org Credit Refunds']),
    otherRefunds:       pf(raw['Other Refunds']),
    totalRefunds:       pf(raw['Total Refunds']),
    numRefunds:         pf(raw['Number of Refunds']),

    netAmount:          pf(raw['Net Amount']),
  };
}

// ── Summary card ─────────────────────────────────────────────────────
function SummaryCard({ label, value, color = 'blue' }) {
  const n = pf(value);
  const abs = Math.abs(n).toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g, ',');
  const display = (n < 0 ? '-$' : '$') + abs;
  return (
    <div className={`summary-card ${color}`}>
      <div className="card-label">{label}</div>
      <div className="card-value">{display}</div>
    </div>
  );
}

// ── Chart ─────────────────────────────────────────────────────────────
function GlChart({ rows, viewMode, hasCCSplit }) {
  const canvasRef = useRef(null);
  const chartInst = useRef(null);

  useEffect(() => {
    if (!canvasRef.current || !rows || rows.length === 0) return;
    if (chartInst.current) { chartInst.current.destroy(); chartInst.current = null; }

    const ctx = canvasRef.current.getContext('2d');
    const labels = rows.map(r => (r.accountName || r.glCode || '?').replace(/\s+/g, ' ').trim());

    if (viewMode === 'bar') {
      const datasets = hasCCSplit ? [
        { label: 'CC Online',    data: rows.map(r => r.ccOnlinePayments),   backgroundColor: '#4f46e5' },
        { label: 'CC In-Person', data: rows.map(r => r.ccInPersonPayments), backgroundColor: '#7c3aed' },
        { label: 'Cash',         data: rows.map(r => r.cashPayments),        backgroundColor: '#d97706' },
        { label: 'Check',        data: rows.map(r => r.checkPayments),       backgroundColor: '#475569' },
      ] : [
        { label: 'Credit Card', data: rows.map(r => r.ccPayments),    backgroundColor: '#4f46e5' },
        { label: 'Cash',        data: rows.map(r => r.cashPayments),  backgroundColor: '#d97706' },
        { label: 'Check',       data: rows.map(r => r.checkPayments), backgroundColor: '#475569' },
      ];

      chartInst.current = new Chart(ctx, {
        type: 'bar',
        data: { labels, datasets },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: { legend: { position: 'top' } },
          scales: {
            y: { ticks: { callback: v => '$' + Number(v).toLocaleString() } },
            x: { ticks: { maxRotation: 40, font: { size: 10 } } },
          },
        },
      });
    } else if (viewMode === 'pie') {
      const buckets = hasCCSplit
        ? [
            ['CC Online',    sumField(rows, 'ccOnlinePayments'),   '#4f46e5'],
            ['CC In-Person', sumField(rows, 'ccInPersonPayments'), '#7c3aed'],
            ['Cash',         sumField(rows, 'cashPayments'),        '#d97706'],
            ['Check',        sumField(rows, 'checkPayments'),       '#475569'],
            ['Free',         sumField(rows, 'freePayments'),        '#10b981'],
            ['Org Credit',   sumField(rows, 'orgCreditPayments'),   '#3b82f6'],
            ['Scholarship',  sumField(rows, 'scholarshipPayments'), '#a855f7'],
          ]
        : [
            ['Credit Card',  sumField(rows, 'ccPayments'),          '#4f46e5'],
            ['Cash',         sumField(rows, 'cashPayments'),         '#d97706'],
            ['Check',        sumField(rows, 'checkPayments'),        '#475569'],
            ['Free',         sumField(rows, 'freePayments'),         '#10b981'],
            ['Org Credit',   sumField(rows, 'orgCreditPayments'),    '#3b82f6'],
            ['Scholarship',  sumField(rows, 'scholarshipPayments'),  '#a855f7'],
          ];

      const active = buckets.filter(([, v]) => v > 0);

      chartInst.current = new Chart(ctx, {
        type: 'doughnut',
        data: {
          labels: active.map(([k]) => k),
          datasets: [{
            data: active.map(([, v]) => v),
            backgroundColor: active.map(([,, c]) => c),
            borderWidth: 2,
            borderColor: '#fff',
          }],
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: {
            legend: { position: 'right' },
            tooltip: {
              callbacks: {
                label: ctx => {
                  const val = ctx.parsed;
                  const total = ctx.dataset.data.reduce((a, b) => a + b, 0);
                  return ` $${val.toFixed(2)} (${((val / total) * 100).toFixed(1)}%)`;
                },
              },
            },
          },
        },
      });
    }

    return () => { if (chartInst.current) { chartInst.current.destroy(); chartInst.current = null; } };
  }, [rows, viewMode, hasCCSplit]);

  const height = viewMode === 'pie' ? 340 : 380;
  const maxWidth = viewMode === 'pie' ? '520px' : '100%';

  return (
    <div className="chart-wrap" style={{ height, maxWidth, margin: viewMode === 'pie' ? '0 auto' : '0' }}>
      <canvas ref={canvasRef} />
    </div>
  );
}

// ── Desk-location multi-select filter ────────────────────────────────
function DeskFilter({ allDesks, selectedDesks, onChange }) {
  const [open, setOpen] = useState(false);
  const [search, setSearch] = useState('');
  const wrapRef = useRef(null);

  useEffect(() => {
    function onDocClick(e) {
      if (wrapRef.current && !wrapRef.current.contains(e.target)) setOpen(false);
    }
    document.addEventListener('mousedown', onDocClick);
    return () => document.removeEventListener('mousedown', onDocClick);
  }, []);

  const filtered = allDesks.filter(d => d.toLowerCase().includes(search.toLowerCase()));
  const allSelected  = selectedDesks.size === allDesks.length;
  const noneSelected = selectedDesks.size === 0;

  function toggle(desk) {
    const next = new Set(selectedDesks);
    if (next.has(desk)) next.delete(desk); else next.add(desk);
    onChange(next);
  }
  const selectAll = () => onChange(new Set(allDesks));
  const clearAll  = () => onChange(new Set());

  const badgeCount = allSelected ? null : selectedDesks.size;

  return (
    <div className="loc-filter-wrap" ref={wrapRef}>
      <button
        className={'btn-loc-filter' + (allSelected ? '' : ' active')}
        style={{fontSize:11, padding:'4px 10px', ...(allSelected ? {} : {borderColor:'#f59e0b', color:'#fde68a'})}}
        onClick={() => setOpen(o => !o)}
      >
        🗄️ Desk
        {badgeCount !== null && <span className="badge">{badgeCount}/{allDesks.length}</span>}
      </button>
      {open && (
        <div className="loc-dropdown">
          <div className="loc-dropdown-header">
            <span>Desk Location</span>
            <div className="loc-dropdown-header-actions">
              <button onClick={selectAll} disabled={allSelected}>All</button>
              <button onClick={clearAll} disabled={noneSelected}>None</button>
            </div>
          </div>
          {allDesks.length > 5 && (
            <div className="loc-dropdown-search">
              <input
                type="text"
                placeholder="Search…"
                value={search}
                onChange={e => setSearch(e.target.value)}
                autoFocus
              />
            </div>
          )}
          <div className="loc-dropdown-list">
            {filtered.map(desk => (
              <label className="loc-item" key={desk}>
                <input
                  type="checkbox"
                  checked={selectedDesks.has(desk)}
                  onChange={() => toggle(desk)}
                />
                <span>{desk}</span>
              </label>
            ))}
          </div>
        </div>
      )}
    </div>
  );
}

// ── Main App ──────────────────────────────────────────────────────────
function App() {
  const params   = useMemo(() => getParams(), []);
  const defaults = useMemo(() => getCurrentMonthRange(), []);
  // Derive org/report from URL path: /smyrna/gl → 'smyrna', 'gl'
  const orgSlug    = useMemo(() => window.location.pathname.split('/').filter(Boolean)[0] || '', []);
  const reportType = useMemo(() => window.location.pathname.split('/').filter(Boolean)[1] || 'gl', []);

  const [startDate, setStartDate] = useState(params.start_date || defaults.start);
  const [endDate,   setEndDate]   = useState(params.end_date   || defaults.end);

  const [rows,    setRows]    = useState(null);
  const [orgName, setOrgName] = useState('');
  const [logoUrl,  setLogoUrl]  = useState(null);
  const [pdfLoading, setPdfLoading] = useState(false);
  const [error,   setError]   = useState(null);
  const [loading, setLoading] = useState(false);

  const [loadedStart, setLoadedStart] = useState(null);
  const [loadedEnd,   setLoadedEnd]   = useState(null);

  // Share Link: expose the live applied filter state so the floating Share
  // widget copies a URL that reproduces the on-screen view (mirrors the PDF).
  useEffect(() => {
    window.recShareLink = () => {
      const qs = new URLSearchParams();
      qs.set('start_date', loadedStart || startDate);
      qs.set('end_date',   loadedEnd   || endDate);
      if (URL_TOKEN) qs.set('token', URL_TOKEN);
      return `${window.location.pathname}?${qs.toString()}`;
    };
    return () => { try { delete window.recShareLink; } catch (e) { window.recShareLink = undefined; } };
  }, [loadedStart, loadedEnd, startDate, endDate]);

  const [showRefunds,   setShowRefunds]   = useState(
    () => localStorage.getItem(LS_REFUND) === 'true'
  );
  const [showLocations, setShowLocations] = useState(
    () => localStorage.getItem(LS_LOCS) !== 'false'  // default ON
  );
  const [viewMode, setViewMode] = useState(
    () => localStorage.getItem(LS_VIEW) || 'table'
  );

  // Desk-location filter (session-only; resets when new data loads)
  const [selectedDesks, setSelectedDesks] = useState(null);
  const [insights, setInsights] = useState(null);
  const [insightsLoading, setInsightsLoading] = useState(false);
  const [insightsError, setInsightsError] = useState(null);
  const [insightsTraceId, setInsightsTraceId] = useState(null);
  const [fbSent, setFbSent] = useState(false);
  const [fbMode, setFbMode] = useState(null);
  const [fbComment, setFbComment] = useState('');

  useEffect(() => { if (params._print === '1') document.body.classList.add('print-mode'); }, []);
  useEffect(() => { localStorage.setItem(LS_REFUND,   showRefunds);   }, [showRefunds]);
  useEffect(() => { localStorage.setItem(LS_VIEW,     viewMode);      }, [viewMode]);
  useEffect(() => { localStorage.setItem(LS_LOCS,     showLocations); }, [showLocations]);

  // ── Fetch ───────────────────────────────────────────────────────────
  const fetchData = useCallback((sd, ed) => {
    setLoading(true);
    setError(null);
    const qs = new URLSearchParams();
    if (sd) qs.set('start_date', sd);
    if (ed) qs.set('end_date', ed);
    fetch(withToken(`/${orgSlug}/${reportType}/api/data?${qs}`))
      .then(r => { if (!r.ok) throw new Error(`Server returned ${r.status}`); return r.json(); })
      .then(json => {
        setRows(json.rows.map(normalizeRow));
        setOrgName(json.meta?.org_name || '');
        setLogoUrl(json.meta?.logo_url || null);
        setLoadedStart(sd);
        setLoadedEnd(ed);
      })
      .catch(e => setError(e.message))
      .finally(() => setLoading(false));
  }, []);

  useEffect(() => { fetchData(startDate, endDate); }, []);

  function handleRun() { fetchData(startDate, endDate); }

  function setMonth(offset) {
    const now = new Date();
    const t = new Date(now.getFullYear(), now.getMonth() + offset, 1);
    setStartDate(toISO(t));
    setEndDate(toISO(new Date(t.getFullYear(), t.getMonth() + 1, 0)));
  }

  const datesChanged = startDate !== loadedStart || endDate !== loadedEnd;

  // ── Derived ─────────────────────────────────────────────────────────
  const hasCCSplit = useMemo(
    () => rows && rows.length > 0 && rows[0].ccOnlinePayments !== null,
    [rows]
  );

  // Distinct desk locations present in the data ('' bucketed as "(No desk location)").
  const allDesks = useMemo(() => {
    if (!rows) return [];
    const set = new Set();
    rows.forEach(r => set.add(r.deskLocation || NO_DESK_LABEL));
    const arr = Array.from(set);
    // sort alpha, but always float "(No desk location)" to the bottom
    arr.sort((a, b) => {
      if (a === NO_DESK_LABEL) return 1;
      if (b === NO_DESK_LABEL) return -1;
      return a.localeCompare(b);
    });
    return arr;
  }, [rows]);

  // Only worth showing the filter when the data actually splits across >1 desk.
  const hasDesk = useMemo(() => allDesks.length > 1, [allDesks]);

  // Reset desk selection to "all" whenever a fresh dataset loads — except on the
  // first load, where a `desks` URL param (PDF/print, share link) pins a subset.
  const urlDesksApplied = useRef(false);
  useEffect(() => {
    if (rows && hasDesk) {
      const urlDesks = new URLSearchParams(window.location.search).get('desks');
      if (!urlDesksApplied.current && urlDesks) {
        urlDesksApplied.current = true;
        const want = new Set(urlDesks.split(',').map(s => s.trim()).filter(Boolean));
        const valid = allDesks.filter(d => want.has(d));
        setSelectedDesks(new Set(valid.length ? valid : allDesks));
      } else {
        setSelectedDesks(new Set(allDesks));
      }
    } else {
      setSelectedDesks(null);
    }
  }, [rows, hasDesk, allDesks]);

  // Rows actually rendered: desk-filtered then re-collapsed to one row per GL code.
  // For orgs without a desk dimension this is a no-op (displayRows === rows).
  const displayRows = useMemo(() => {
    if (!rows) return [];
    if (!hasDesk) return rows;
    const sel = selectedDesks || new Set(allDesks);
    const filtered = rows.filter(r => sel.has(r.deskLocation || NO_DESK_LABEL));
    return aggregateByGlCode(filtered);
  }, [rows, hasDesk, selectedDesks, allDesks]);

  const totals = useMemo(() => {
    if (!displayRows) return {};
    return {
      totalPayments:      sumField(displayRows, 'totalPayments'),
      numPayments:        sumField(displayRows, 'numPayments'),
      totalRefunds:       sumField(displayRows, 'totalRefunds'),
      numRefunds:         sumField(displayRows, 'numRefunds'),
      netAmount:          sumField(displayRows, 'netAmount'),
      ccPayments:         sumField(displayRows, 'ccPayments'),
      ccOnlinePayments:   sumField(displayRows, 'ccOnlinePayments'),
      ccInPersonPayments: sumField(displayRows, 'ccInPersonPayments'),
      cashPayments:       sumField(displayRows, 'cashPayments'),
      checkPayments:      sumField(displayRows, 'checkPayments'),
      orgCreditPayments:  sumField(displayRows, 'orgCreditPayments'),
      scholarshipPayments: sumField(displayRows, 'scholarshipPayments'),
    };
  }, [displayRows]);

  // ── AI Insights ────────────────────────────────────────────────────────────
  const buildInsightsBlob = useCallback(() => {
    if (!displayRows || !displayRows.length) return null;
    return {
      totals,
      glCodeCount: displayRows.length,
      dateRange: { start: loadedStart, end: loadedEnd },
      topCodes: displayRows
        .slice().sort((a, b) => (b.netAmount || 0) - (a.netAmount || 0))
        .slice(0, 15)
        .map(r => ({ code: r.glCode, name: r.accountName, net: r.netAmount, payments: r.totalPayments, refunds: r.totalRefunds, numPayments: r.numPayments })),
      refundRate: totals.totalPayments > 0 ? (totals.totalRefunds / totals.totalPayments * 100).toFixed(1) + '%' : '0%',
    };
  }, [displayRows, totals, loadedStart, loadedEnd]);

  const sendInsightsFeedback = useCallback((score) => {
    if (!insightsTraceId) return;
    fetch(withToken('/' + orgSlug + '/' + reportType + '/api/insights/score'), {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ traceId: insightsTraceId, score, comment: score === 0 ? fbComment : '' }),
    }).catch(() => {});
    setFbSent(true); setFbMode(null);
  }, [insightsTraceId, fbComment, orgSlug, reportType]);

  const getInsights = useCallback(async () => {
    const blob = buildInsightsBlob();
    if (!blob) return;
    setInsightsLoading(true); setInsightsError(null);
    try {
      const resp = await fetch(withToken('/' + orgSlug + '/' + reportType + '/api/insights'), {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(blob),
      });
      const json = await resp.json().catch(() => ({}));
      if (!resp.ok || !json.ok) throw new Error(json.error || 'Request failed');
      setInsights(json.insights || []);
      setInsightsTraceId(json.traceId || null);
      setFbSent(false); setFbMode(null); setFbComment('');
    } catch (err) {
      setInsightsError(err.message);
    } finally {
      setInsightsLoading(false);
    }
  }, [buildInsightsBlob, orgSlug, reportType]);

  // ── Excel export ────────────────────────────────────────────────────
  function exportExcel() {
    if (!displayRows || displayRows.length === 0) return;

    const includeLocs = showLocations && displayRows.some(x => x.locations && x.locations.trim());

    const makeDataRow = r => {
      const row = {};
      row['GL Code']      = r.glCode;
      row['Account Name'] = r.accountName;
      if (includeLocs) row['Locations'] = r.locations || '';
      if (displayRows.some(x => x.accountNumber)) row['Account #'] = r.accountNumber;
      if (hasCCSplit) {
        row['CC Online Pmts']    = r.ccOnlinePayments;
        row['CC In-Person Pmts'] = r.ccInPersonPayments;
      } else {
        row['CC Payments']       = r.ccPayments;
      }
      row['Cash Payments']         = r.cashPayments;
      row['Check Payments']        = r.checkPayments;
      row['Free Payments']         = r.freePayments;
      row['Org Credit Pmts']       = r.orgCreditPayments;
      row['Scholarship Pmts']      = r.scholarshipPayments;
      row['Total Payments']        = r.totalPayments;
      row['# Payments']            = r.numPayments;
      if (hasCCSplit) {
        row['CC Online Refunds']    = r.ccOnlineRefunds;
        row['CC In-Person Refunds'] = r.ccInPersonRefunds;
      } else {
        row['CC Refunds']           = r.ccRefunds;
      }
      row['Cash Refunds']          = r.cashRefunds;
      row['Check Refunds']         = r.checkRefunds;
      row['Org Credit Refunds']    = r.orgCreditRefunds;
      row['Other Refunds']         = r.otherRefunds;
      row['Total Refunds']         = r.totalRefunds;
      row['# Refunds']             = r.numRefunds;
      row['Net Amount']            = r.netAmount;
      return row;
    };

    const data = displayRows.map(makeDataRow);

    // Totals row
    const totalsRow = { 'GL Code': 'TOTALS', 'Account Name': '' };
    if (includeLocs) totalsRow['Locations'] = '';
    if (displayRows.some(x => x.accountNumber)) totalsRow['Account #'] = '';
    if (hasCCSplit) {
      totalsRow['CC Online Pmts']    = totals.ccOnlinePayments;
      totalsRow['CC In-Person Pmts'] = totals.ccInPersonPayments;
    } else {
      totalsRow['CC Payments']       = totals.ccPayments;
    }
    totalsRow['Cash Payments']       = totals.cashPayments;
    totalsRow['Check Payments']      = totals.checkPayments;
    totalsRow['Free Payments']       = sumField(displayRows, 'freePayments');
    totalsRow['Org Credit Pmts']     = sumField(displayRows, 'orgCreditPayments');
    totalsRow['Scholarship Pmts']    = sumField(displayRows, 'scholarshipPayments');
    totalsRow['Total Payments']      = totals.totalPayments;
    totalsRow['# Payments']          = totals.numPayments;
    if (hasCCSplit) {
      totalsRow['CC Online Refunds']    = sumField(displayRows, 'ccOnlineRefunds');
      totalsRow['CC In-Person Refunds'] = sumField(displayRows, 'ccInPersonRefunds');
    } else {
      totalsRow['CC Refunds']           = sumField(displayRows, 'ccRefunds');
    }
    totalsRow['Cash Refunds']        = sumField(displayRows, 'cashRefunds');
    totalsRow['Check Refunds']       = sumField(displayRows, 'checkRefunds');
    totalsRow['Org Credit Refunds']  = sumField(displayRows, 'orgCreditRefunds');
    totalsRow['Other Refunds']       = sumField(displayRows, 'otherRefunds');
    totalsRow['Total Refunds']       = totals.totalRefunds;
    totalsRow['# Refunds']           = totals.numRefunds;
    totalsRow['Net Amount']          = totals.netAmount;
    data.push(totalsRow);

    const ws = XLSX.utils.json_to_sheet(data);

    // Currency format on money columns
    const headers = Object.keys(data[0]);
    const moneyHeaders = headers.filter(h => !['GL Code','Account Name','Locations','Account #','# Payments','# Refunds'].includes(h));
    const range = XLSX.utils.decode_range(ws['!ref']);
    for (let R = 1; R <= range.e.r; R++) {
      moneyHeaders.forEach(h => {
        const c = headers.indexOf(h);
        if (c < 0) return;
        const addr = XLSX.utils.encode_cell({ r: R, c });
        if (ws[addr]) ws[addr].z = '"$"#,##0.00';
      });
    }

    // Bold totals row
    const totalsRowIdx = data.length;
    headers.forEach((h, c) => {
      const addr = XLSX.utils.encode_cell({ r: totalsRowIdx, c });
      if (ws[addr]) ws[addr].s = { font: { bold: true } };
    });

    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, 'GL Rollup');
    XLSX.writeFile(wb, `gl-report-${loadedStart || 'export'}.xlsx`);
    logClientEvent('excel');
  }


  // Fire-and-forget log to server for client-side events (excel, print)
  function logClientEvent(event) {
    try {
      const parts = window.location.pathname.split('/').filter(Boolean);
      if (parts.length >= 2) fetch(withToken(`/${parts[0]}/${parts[1]}/api/log?event=${event}`), { method: 'POST' }).catch(() => {});
    } catch {}
  }

  const isPrint = params._print === '1';

  function downloadPdf() {
    setPdfLoading(true);
    const parts = window.location.pathname.split('/').filter(Boolean);
    const qs = new URLSearchParams({ start_date: loadedStart||'', end_date: loadedEnd||'' });
    // Respect the on-screen desk filter so the PDF matches the displayed rollup.
    // Only send when a subset is selected (omit ⇒ "all", keeps URL short).
    if (hasDesk && selectedDesks && selectedDesks.size < allDesks.length) {
      qs.set('desks', [...selectedDesks].join(','));
    }
    const pdfUrl = parts.length >= 2
      ? `/${parts[0]}/${parts[1]}/api/pdf?${qs}`
      : '/api/pdf';
    fetch(withToken(pdfUrl))
      .then(r => r.blob())
      .then(blob => {
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = `report-${loadedStart || 'export'}.pdf`;
        a.click(); URL.revokeObjectURL(a.href);
      })
      .catch(err => alert('PDF generation failed: ' + err.message))
      .finally(() => setPdfLoading(false));
  }

  // ── Toolbar ─────────────────────────────────────────────────────────
  function renderToolbar() {
    if (isPrint) return null;
    return (
      <div className="toolbar">
        <span className="toolbar-title">GL Code Rollup</span>

        <label>
          Start
          <input type="date" value={startDate} onChange={e => setStartDate(e.target.value)} />
        </label>
        <label>
          End
          <input type="date" value={endDate} onChange={e => setEndDate(e.target.value)} />
        </label>

        <button onClick={() => setMonth(-1)} style={{fontSize:11, padding:'4px 8px'}}>Last Month</button>
        <button onClick={() => setMonth(0)}  style={{fontSize:11, padding:'4px 8px'}}>This Month</button>
        <button onClick={() => setMonth(1)}  style={{fontSize:11, padding:'4px 8px'}}>Next Month</button>

        <button
          className="btn-run"
          onClick={handleRun}
          disabled={loading}
          style={datesChanged && !loading ? { boxShadow: '0 0 0 2px #4ade80' } : {}}
        >
          {loading ? <><span className="btn-spinner" />Loading…</> : '▶ Run Report'}
        </button>

        <div className="divider" />

        <button
          className={showRefunds ? 'active' : ''}
          style={{fontSize:11, padding:'4px 10px'}}
          onClick={() => setShowRefunds(v => !v)}
        >
          {showRefunds ? '▾' : '▸'} Refund Detail
        </button>

        <button
          className={showLocations ? 'active' : ''}
          style={{fontSize:11, padding:'4px 10px'}}
          onClick={() => setShowLocations(v => !v)}
        >
          {showLocations ? '▾' : '▸'} Locations
        </button>

        {hasDesk && selectedDesks && (
          <DeskFilter
            allDesks={allDesks}
            selectedDesks={selectedDesks}
            onChange={setSelectedDesks}
          />
        )}

        <div className="divider" />

        {['table','bar','pie'].map(mode => (
          <button
            key={mode}
            className={viewMode === mode ? 'active' : ''}
            style={{fontSize:11, padding:'4px 10px'}}
            onClick={() => setViewMode(mode)}
          >
            {mode === 'table' ? '☰ Table' : mode === 'bar' ? '▐ Bar' : '◉ Pie'}
          </button>
        ))}

        <div className="toolbar-spacer" />

        {rows && <span className="row-count">{displayRows.length} GL code{displayRows.length !== 1 ? 's' : ''}</span>}

        <div className="divider" />

        <button onClick={() => window.print()}>🖨️ Print</button>
        <button
          className="btn-pdf"
          onClick={downloadPdf}
          disabled={pdfLoading || !rows || rows.length === 0}
        >{pdfLoading ? 'Generating…' : '📄 PDF'}</button>
        <button
          className="btn-excel"
          onClick={exportExcel}
          disabled={!rows || rows.length === 0}
        >📥 Excel</button>

      </div>
    );
  }

  // ── Summary cards ────────────────────────────────────────────────────
  function renderSummaryCards() {
    if (!rows) return null;
    return (
      <div className="summary-cards">
        <SummaryCard label="Net Amount"     value={totals.netAmount}     color="green"  />
        <SummaryCard label="Total Payments" value={totals.totalPayments} color="blue"   />
        <SummaryCard label="Total Refunds"  value={totals.totalRefunds}  color="red"    />
        {hasCCSplit ? (
          <>
            <SummaryCard label="CC Online"    value={totals.ccOnlinePayments}   color="indigo" />
            <SummaryCard label="CC In-Person" value={totals.ccInPersonPayments} color="violet" />
          </>
        ) : (
          <SummaryCard label="Credit Card" value={totals.ccPayments} color="violet" />
        )}
        <SummaryCard label="Cash"  value={totals.cashPayments}  color="amber" />
        <SummaryCard label="Check" value={totals.checkPayments} color="slate" />
        <SummaryCard label="Acct Credit" value={totals.orgCreditPayments} color="teal" />
        {totals.scholarshipPayments > 0 && <SummaryCard label="Scholarship" value={totals.scholarshipPayments} color="purple" />}
      </div>
    );
  }

  // ── Table ────────────────────────────────────────────────────────────
  function renderTable() {
    if (!displayRows || displayRows.length === 0) {
      return <div style={{textAlign:'center', padding:'40px 0', color:'#888'}}>No data found for the selected date range.</div>;
    }

    const hasAcctName = displayRows.some(r => r.accountName);
    const hasAcctNum  = displayRows.some(r => r.accountNumber);
    const hasScholarship = displayRows.some(r => r.scholarshipPayments > 0);
    const hasLocs     = (showLocations || isPrint) && displayRows.some(r => r.locations && r.locations.trim());

    // colspan helpers
    const idCols       = 1 + (hasAcctName ? 1 : 0) + (hasLocs ? 1 : 0) + (hasAcctNum ? 1 : 0);
    const ccCols       = hasCCSplit ? 2 : 1;
    const otherPmtCols = showRefunds ? 2 : 0;   // free + org credit
    const ccRfndCols   = hasCCSplit ? 2 : 1;
    const refundCols   = showRefunds ? (ccRfndCols + 4) : 1; // + cash/check/orgcredit/other

    return (
      <div className="table-wrapper">
        <table className={(showRefunds || hasScholarship) ? 'compact' : ''}>
          <thead>
            {/* ── Group header ── */}
            <tr>
              <th className="group left" colSpan={idCols}></th>
              <th className="group" colSpan={ccCols}>Credit Card</th>
              <th className="group" colSpan={1}>Cash</th>
              <th className="group" colSpan={1}>Check</th>
              {!showRefunds && <th className="group" colSpan={1}>Acct Credit</th>}
              {showRefunds && <th className="group" colSpan={hasScholarship ? 3 : 2}>Other Pmts</th>}
              {!showRefunds && hasScholarship && <th className="group" colSpan={1}>Scholarship</th>}
              <th className="group" colSpan={1}>Total Pmts</th>
              <th className="group" colSpan={1}></th>
              <th className={`group${showRefunds ? ' refund-group' : ''}`} colSpan={refundCols}>{showRefunds ? 'Refunds' : 'Total Refunds'}</th>
              <th className="group" colSpan={1}></th>
              <th className="group" colSpan={1}>Net</th>
            </tr>

            {/* ── Column header ── */}
            <tr>
              <th className="left">GL Code</th>
              {hasAcctName && <th className="left">Account Name</th>}
              {hasLocs     && <th className="left">Locations</th>}
              {hasAcctNum  && <th className="left">Acct #</th>}

              {hasCCSplit ? (
                <>
                  <th>CC Online</th>
                  <th>CC In-Person</th>
                </>
              ) : (
                <th>Credit Card</th>
              )}

              <th>Cash</th>
              <th>Check</th>

              {!showRefunds && <th>Acct Credit</th>}
              {showRefunds && <><th>Free</th><th>Org Credit</th>{hasScholarship && <th>Scholarship</th>}</>}
              {!showRefunds && hasScholarship && <th>Scholarship</th>}

              <th>Total Pmts</th>
              <th># Pmts</th>

              {showRefunds
                ? hasCCSplit
                  ? <><th className="refund-col">CC Online</th><th className="refund-col">CC In-Prn</th><th className="refund-col">Cash</th><th className="refund-col">Check</th><th className="refund-col">Org Crd</th><th className="refund-col">Other</th></>
                  : <><th className="refund-col">CC</th><th className="refund-col">Cash</th><th className="refund-col">Check</th><th className="refund-col">Org Crd</th><th className="refund-col">Other</th></>
                : <th>Total Rfnds</th>
              }

              <th># Rfnds</th>
              <th>Net Amount</th>
            </tr>
          </thead>

          <tbody>
            {displayRows.map((r, i) => (
              <tr key={i}>
                <td className="left gl-code">{r.glCode}</td>
                {hasAcctName && <td className="left">{r.accountName}</td>}
                {hasLocs && (
                  <td className="left" style={{minWidth:120, maxWidth:200}}>
                    {r.locations && r.locations.trim() ? (
                      <div className="gl-locations">
                        {r.locations.split(',').map(l => l.trim()).filter(Boolean).map((l, i) => (
                          <span key={i} className="gl-loc-tag">{l}</span>
                        ))}
                      </div>
                    ) : null}
                  </td>
                )}
                {hasAcctNum  && <td className="left" style={{fontFamily:'IBM Plex Mono,monospace',fontSize:10}}>{r.accountNumber}</td>}

                {hasCCSplit ? (
                  <>
                    <td><MoneyCell v={r.ccOnlinePayments}   /></td>
                    <td><MoneyCell v={r.ccInPersonPayments} /></td>
                  </>
                ) : (
                  <td><MoneyCell v={r.ccPayments} /></td>
                )}

                <td><MoneyCell v={r.cashPayments}  /></td>
                <td><MoneyCell v={r.checkPayments} /></td>

                {!showRefunds && <td><MoneyCell v={r.orgCreditPayments} /></td>}
                {!showRefunds && hasScholarship && <td><MoneyCell v={r.scholarshipPayments} /></td>}
                {showRefunds && (
                  <>
                    <td><MoneyCell v={r.freePayments}      /></td>
                    <td><MoneyCell v={r.orgCreditPayments} /></td>
                    {hasScholarship && <td><MoneyCell v={r.scholarshipPayments} /></td>}
                  </>
                )}

                <td style={{fontWeight:600}}><MoneyCell v={r.totalPayments} /></td>
                <td>{r.numPayments ? r.numPayments : <span className="cell-zero">—</span>}</td>

                {showRefunds
                  ? hasCCSplit
                    ? <>
                        <td className="refund-col"><MoneyCell v={r.ccOnlineRefunds}    /></td>
                        <td className="refund-col"><MoneyCell v={r.ccInPersonRefunds}  /></td>
                        <td className="refund-col"><MoneyCell v={r.cashRefunds}        /></td>
                        <td className="refund-col"><MoneyCell v={r.checkRefunds}       /></td>
                        <td className="refund-col"><MoneyCell v={r.orgCreditRefunds}   /></td>
                        <td className="refund-col"><MoneyCell v={r.otherRefunds}       /></td>
                      </>
                    : <>
                        <td className="refund-col"><MoneyCell v={r.ccRefunds}          /></td>
                        <td className="refund-col"><MoneyCell v={r.cashRefunds}        /></td>
                        <td className="refund-col"><MoneyCell v={r.checkRefunds}       /></td>
                        <td className="refund-col"><MoneyCell v={r.orgCreditRefunds}   /></td>
                        <td className="refund-col"><MoneyCell v={r.otherRefunds}       /></td>
                      </>
                  : <td style={{fontWeight:600}}><MoneyCell v={r.totalRefunds} /></td>
                }

                <td>{r.numRefunds ? r.numRefunds : <span className="cell-zero">—</span>}</td>

                <td style={{fontWeight:600, color: r.netAmount < 0 ? '#dc2626' : 'inherit'}}>
                  {fmtMoneyStr(r.netAmount)}
                </td>
              </tr>
            ))}
          </tbody>

          <tfoot>
            <tr>
              <td className="left">TOTALS</td>
              {hasAcctName && <td></td>}
              {hasLocs     && <td></td>}
              {hasAcctNum  && <td></td>}

              {hasCCSplit ? (
                <>
                  <td>{fmtMoneyStr(totals.ccOnlinePayments)}</td>
                  <td>{fmtMoneyStr(totals.ccInPersonPayments)}</td>
                </>
              ) : (
                <td>{fmtMoneyStr(totals.ccPayments)}</td>
              )}

              <td>{fmtMoneyStr(totals.cashPayments)}</td>
              <td>{fmtMoneyStr(totals.checkPayments)}</td>

              {!showRefunds && <td>{fmtMoneyStr(totals.orgCreditPayments)}</td>}
              {!showRefunds && hasScholarship && <td>{fmtMoneyStr(totals.scholarshipPayments)}</td>}
              {showRefunds && (
                <>
                  <td>{fmtMoneyStr(sumField(displayRows, 'freePayments'))}</td>
                  <td>{fmtMoneyStr(sumField(displayRows, 'orgCreditPayments'))}</td>
                  {hasScholarship && <td>{fmtMoneyStr(totals.scholarshipPayments)}</td>}
                </>
              )}

              <td>{fmtMoneyStr(totals.totalPayments)}</td>
              <td>{totals.numPayments || 0}</td>

              {showRefunds
                ? hasCCSplit
                  ? <>
                      <td className="refund-col">{fmtMoneyStr(sumField(displayRows,'ccOnlineRefunds'))}</td>
                      <td className="refund-col">{fmtMoneyStr(sumField(displayRows,'ccInPersonRefunds'))}</td>
                      <td className="refund-col">{fmtMoneyStr(sumField(displayRows,'cashRefunds'))}</td>
                      <td className="refund-col">{fmtMoneyStr(sumField(displayRows,'checkRefunds'))}</td>
                      <td className="refund-col">{fmtMoneyStr(sumField(displayRows,'orgCreditRefunds'))}</td>
                      <td className="refund-col">{fmtMoneyStr(sumField(displayRows,'otherRefunds'))}</td>
                    </>
                  : <>
                      <td className="refund-col">{fmtMoneyStr(sumField(displayRows,'ccRefunds'))}</td>
                      <td className="refund-col">{fmtMoneyStr(sumField(displayRows,'cashRefunds'))}</td>
                      <td className="refund-col">{fmtMoneyStr(sumField(displayRows,'checkRefunds'))}</td>
                      <td className="refund-col">{fmtMoneyStr(sumField(displayRows,'orgCreditRefunds'))}</td>
                      <td className="refund-col">{fmtMoneyStr(sumField(displayRows,'otherRefunds'))}</td>
                    </>
                : <td>{fmtMoneyStr(totals.totalRefunds)}</td>
              }

              <td>{totals.numRefunds || 0}</td>

              <td style={{color: totals.netAmount < 0 ? '#dc2626' : 'inherit'}}>
                {fmtMoneyStr(totals.netAmount)}
              </td>
            </tr>
          </tfoot>
        </table>
      </div>
    );
  }

  // ── Error / loading ─────────────────────────────────────────────────
  if (error && !rows) {
    return (
      <div>
        {renderToolbar()}
        <div className="page">
          <div className="error">
            <p><strong>Failed to load report data</strong></p>
            <p style={{marginTop:8}}>{error}</p>
          </div>
        </div>
      </div>
    );
  }

  if (!rows) {
    return (
      <div>
        {renderToolbar()}
        <div className="page">
          <div className="loading">
            <div className="spinner" />
            <div className="juice-msg"><span>Squeezing the oranges…</span><span>Juicing!</span><span>Adding the pulp…</span><span>Chilling the glass…</span><span>Pouring it out…</span></div>
          </div>
        </div>
      </div>
    );
  }

  // ── Run date/time ───────────────────────────────────────────────────
  const now = new Date();
  const runDate = `${(now.getMonth()+1).toString().padStart(2,'0')}/${now.getDate().toString().padStart(2,'0')}/${now.getFullYear()} @ ${now.toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit',hour12:true}).toLowerCase()}`;

  const displayOrg = orgName || 'rec.us';
  const dateRangeLabel = [
    loadedStart ? formatDisplayDate(loadedStart) : null,
    loadedEnd   ? formatDisplayDate(loadedEnd)   : null,
  ].filter(Boolean).join(' – ') || 'Current Month';

  return (
    <div>
      {renderToolbar()}

      <div className="page" style={loading ? { opacity: 0.5, pointerEvents: 'none' } : {}}>

        {/* Report header */}
        <div className="report-header">
          <div>
            {logoUrl && <img src={logoUrl} alt="" className="report-header-logo" onError={e => e.target.style.display='none'} />}
            <div className="org-label">{displayOrg}</div>
            <div className="title">GL Code Rollup</div>
          </div>
          <div className="date-range">{dateRangeLabel}</div>
        </div>

        {/* Summary cards */}
        {renderSummaryCards()}

        {/* AI Insights */}
        {displayRows && displayRows.length > 0 && (
          <div className="insights-section no-print">
            <div className="insights-head">
              <button type="button" className="insights-btn" onClick={getInsights} disabled={insightsLoading}>
                {insightsLoading ? 'Analyzing…' : (insights ? '↻ Refresh insights' : '✨ Rec Insights')}
              </button>
              {insights && !insightsLoading && (
                <span className="insights-sub">Analyzed {displayRows.length} GL codes</span>
              )}
            </div>
            {insightsLoading && (
              <div className="loading"><div className="spinner" /></div>
            )}
            {insightsError && !insightsLoading && (
              <div style={{color:'#dc2626',fontSize:13,padding:'8px 0'}}><strong>Insights unavailable:</strong> {insightsError}</div>
            )}
            {insights && !insightsLoading && (
              <div className="insights-grid">
                {insights.map((ins, i) => (
                  <div key={i} className={'insight-card insight-' + (ins.type || 'signal')}>
                    <div className="insight-type">{ins.type || 'signal'}</div>
                    <div className="insight-title">{ins.title}</div>
                    <div className="insight-detail">{ins.detail}</div>
                    {ins.action && <div className="insight-action">→ {ins.action}</div>}
                  </div>
                ))}
              </div>
            )}
            {insights && !insightsLoading && (
              <div className="insights-feedback">
                {fbSent ? (
                  <span className="fb-thanks">✅ Thanks for the feedback!</span>
                ) : fbMode === 'down' ? (
                  <div className="fb-down-form">
                    <input placeholder="What could be better?" value={fbComment}
                      onChange={e => setFbComment(e.target.value)}
                      onKeyDown={e => e.key === 'Enter' && sendInsightsFeedback(0)}
                      autoFocus maxLength={500} />
                    <button className="fb-send" onClick={() => sendInsightsFeedback(0)}>Send</button>
                    <button onClick={() => setFbMode(null)}>Cancel</button>
                  </div>
                ) : (
                  <React.Fragment>
                    <span className="fb-label">Were these insights helpful?</span>
                    <button onClick={() => sendInsightsFeedback(1)} title="Yes, helpful">👍</button>
                    <button onClick={() => setFbMode('down')} title="Not helpful">👎</button>
                  </React.Fragment>
                )}
              </div>
            )}
          </div>
        )}

        {/* Content: table or chart */}
        {viewMode === 'table'
          ? renderTable()
          : <GlChart rows={displayRows} viewMode={viewMode} hasCCSplit={hasCCSplit} />
        }

        {/* Footer */}
        <div className="report-footer">
          <span>{displayOrg}</span>
          <span>Run Date/Time: {runDate}</span>
        </div>

        {/* Puppeteer marker */}
        <div id="report-ready" style={{display:'none'}} />
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
    <script src="/share-widget.js" defer></script>
    <script src="/feedback-widget.js" defer></script>
      <script src="/nav-breadcrumb.js" defer></script>
  </body>
</html>
