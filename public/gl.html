<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GL Code Rollup</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'IBM Plex Sans', 'Segoe UI', system-ui, sans-serif;
      font-size: 12px;
      color: #1a1a1a;
      background: #f5f4f1;
      line-height: 1.35;
    }

    /* ── Toolbar ── */
    .toolbar {
      position: sticky;
      top: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 20px;
      background: #2c2c2c;
      color: #eee;
      font-size: 13px;
      flex-wrap: wrap;
    }
    .toolbar-title { font-weight: 600; margin-right: 4px; }
    .toolbar-spacer { flex: 1; }
    .toolbar label {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: #aaa;
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    .toolbar input[type="date"] {
      padding: 4px 8px;
      border: 1px solid rgba(255,255,255,.2);
      border-radius: 4px;
      background: rgba(255,255,255,.1);
      color: #fff;
      font-size: 12px;
      font-family: inherit;
      outline: none;
    }
    .toolbar input[type="date"]:focus { border-color: #3b82f6; }
    .toolbar input[type="date"]::-webkit-calendar-picker-indicator { filter: invert(1); cursor: pointer; }
    .toolbar button {
      padding: 6px 14px;
      border: 1px solid rgba(255,255,255,.25);
      border-radius: 4px;
      background: rgba(255,255,255,.08);
      color: #fff;
      font-size: 12px;
      font-family: inherit;
      cursor: pointer;
      transition: background .15s;
      white-space: nowrap;
    }
    .toolbar button:hover { background: rgba(255,255,255,.18); }
    .toolbar .btn-run { background: #16a34a; border-color: #16a34a; font-weight: 600; }
    .toolbar .btn-run:hover { background: #15803d; }
    .toolbar .btn-run:disabled { opacity: .5; cursor: not-allowed; }
    .toolbar .btn-pdf { background: #3b82f6; border-color: #3b82f6; font-weight: 600; }
    .toolbar .btn-pdf:hover { background: #2563eb; }
    .toolbar .btn-pdf:disabled { opacity: .5; cursor: not-allowed; }
    .toolbar .btn-excel { background: #16803c; border-color: #16803c; font-weight: 600; }
    .toolbar .btn-excel:hover { background: #15692f; }
    .toolbar .btn-excel:disabled { opacity: .5; cursor: not-allowed; }
    .toolbar .btn-toggle-on {
      background: rgba(251,191,36,.18);
      border-color: #fbbf24;
      color: #fbbf24;
      font-weight: 600;
    }
    .toolbar .btn-toggle-on:hover { background: rgba(251,191,36,.28); }
    .toolbar .row-count { font-size: 11px; color: #aaa; }
    .toolbar .divider { width: 1px; height: 28px; background: rgba(255,255,255,.15); margin: 0 2px; }

    /* ── View toggle segmented control ── */
    .view-toggle {
      display: flex;
      border: 1px solid rgba(255,255,255,.2);
      border-radius: 4px;
      overflow: hidden;
    }
    .view-toggle button {
      padding: 4px 11px;
      font-size: 11px;
      border: none;
      border-radius: 0;
      border-right: 1px solid rgba(255,255,255,.15);
      background: rgba(255,255,255,.06);
      color: #aaa;
      font-weight: 400;
      cursor: pointer;
      transition: background .12s, color .12s;
    }
    .view-toggle button:last-child { border-right: none; }
    .view-toggle button:hover { background: rgba(255,255,255,.14); color: #eee; }
    .view-toggle button.active {
      background: rgba(59,130,246,.45);
      color: #fff;
      font-weight: 600;
    }

    /* ── Page ── */
    .page {
      max-width: 1400px;
      margin: 16px auto;
      padding: 24px 28px;
      background: #fff;
      box-shadow: 0 1px 4px rgba(0,0,0,.08);
    }

    /* ── Header ── */
    .report-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 2.5px solid #111;
      padding-bottom: 10px;
      margin-bottom: 18px;
      gap: 16px;
    }
    .report-header-left { display: flex; align-items: center; gap: 14px; }
    .report-header-logo { height: 42px; max-width: 140px; object-fit: contain; object-position: left center; }
    .report-header .org-label { font-size: 10px; letter-spacing: 1.6px; text-transform: uppercase; color: #777; font-weight: 600; }
    .report-header .title { font-size: 17px; font-weight: 700; margin-top: 1px; }
    .report-header-right { text-align: right; }
    .report-header .date-range { font-size: 11px; color: #666; }

    /* ── GL Table ── */
    .gl-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 11.5px;
    }

    .gl-table thead tr {
      background: #e4e4e4;
      border-top: 1px solid #bbb;
      border-bottom: 1px solid #bbb;
    }
    .gl-table thead th {
      padding: 6px 8px;
      text-align: right;
      font-weight: 600;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.4px;
      color: #333;
      white-space: nowrap;
    }
    .gl-table thead th:first-child,
    .gl-table thead th:nth-child(2),
    .gl-table thead th:nth-child(3) { text-align: left; }

    .gl-table thead th.refund-group-header {
      background: #f5e6e6;
      border-left: 2px solid #e8b4b4;
      border-right: 2px solid #e8b4b4;
      color: #b91c1c;
      text-align: center;
      font-size: 9px;
      letter-spacing: 0.8px;
    }
    .gl-table thead th.refund-col {
      background: #fdf4f4;
      border-left: 1px solid #f0c8c8;
      color: #c53030;
    }
    .gl-table thead th.refund-col-first { border-left: 2px solid #e8b4b4; }
    .gl-table thead th.refund-col-last  { border-right: 2px solid #e8b4b4; }

    .gl-table tbody tr { border-bottom: 1px solid #eee; }
    .gl-table tbody tr:nth-child(even) { background: #fafaf8; }
    .gl-table tbody tr:hover { background: #f0eeea; }

    .gl-table tbody td {
      padding: 5px 8px;
      text-align: right;
      vertical-align: middle;
    }
    .gl-table tbody td:first-child { text-align: left; font-family: 'IBM Plex Mono', monospace; font-size: 11px; font-weight: 500; }
    .gl-table tbody td:nth-child(2) { text-align: left; color: #444; }
    .gl-table tbody td:nth-child(3) { text-align: left; }

    .gl-table tbody td.zero { color: #ccc; }
    .gl-table tbody td.money { font-variant-numeric: tabular-nums; }
    .gl-table tbody td.col-net { font-weight: 600; }
    .gl-table tbody td.col-net.positive { color: #15803d; }
    .gl-table tbody td.col-net.negative { color: #b91c1c; }

    .gl-table tbody td.refund-col {
      background: #fffafa;
      border-left: 1px solid #f5e0e0;
      color: #c53030;
    }
    .gl-table tbody td.refund-col.zero { color: #e8c8c8; background: #fffafa; }
    .gl-table tbody td.refund-col-first { border-left: 2px solid #e8b4b4; }
    .gl-table tbody td.refund-col-last  { border-right: 2px solid #e8b4b4; }
    .gl-table tbody tr:nth-child(even) td.refund-col { background: #fff5f5; }

    /* ── Totals row ── */
    .gl-table tfoot tr {
      border-top: 2px solid #111;
      border-bottom: 2px solid #111;
      background: #edeae4;
    }
    .gl-table tfoot td {
      padding: 6px 8px;
      text-align: right;
      font-weight: 700;
      font-size: 11.5px;
      font-variant-numeric: tabular-nums;
    }
    .gl-table tfoot td:first-child { text-align: left; font-family: inherit; font-size: 11px; letter-spacing: 0.4px; text-transform: uppercase; color: #555; }
    .gl-table tfoot td:nth-child(2) { text-align: left; }
    .gl-table tfoot td:nth-child(3) { text-align: left; }
    .gl-table tfoot td.col-net { color: #15803d; }
    .gl-table tfoot td.col-net.negative { color: #b91c1c; }
    .gl-table tfoot td.refund-col { background: #f5e8e8; border-left: 1px solid #e8b4b4; color: #b91c1c; }
    .gl-table tfoot td.refund-col-first { border-left: 2px solid #e8b4b4; }
    .gl-table tfoot td.refund-col-last  { border-right: 2px solid #e8b4b4; }

    /* ── Summary cards ── */
    .summary-cards {
      display: flex;
      gap: 12px;
      margin-bottom: 18px;
      flex-wrap: wrap;
    }
    .summary-card {
      flex: 1;
      min-width: 130px;
      background: #f5f4f1;
      border: 1px solid #ddd;
      border-radius: 6px;
      padding: 10px 14px;
    }
    .summary-card .card-label {
      font-size: 9.5px;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: #888;
      font-weight: 600;
      margin-bottom: 4px;
    }
    .summary-card .card-value {
      font-size: 18px;
      font-weight: 700;
      font-variant-numeric: tabular-nums;
      color: #111;
    }
    .summary-card .card-value.green { color: #15803d; }
    .summary-card .card-value.red { color: #b91c1c; }
    .summary-card .card-sub { font-size: 10px; color: #999; margin-top: 2px; }

    /* ── Chart container ── */
    .chart-container {
      padding: 8px 0 24px;
    }
    .chart-canvas-wrap {
      position: relative;
    }
    .chart-note {
      text-align: center;
      font-size: 10px;
      color: #999;
      margin-top: 10px;
    }

    /* ── Footer ── */
    .report-footer {
      display: flex;
      justify-content: space-between;
      border-top: 2.5px solid #111;
      margin-top: 16px;
      padding-top: 6px;
      font-size: 10px;
      color: #777;
    }

    /* ── Loading / Error ── */
    .loading { text-align: center; padding: 80px 20px; color: #888; font-size: 14px; }
    .loading .spinner {
      display: inline-block; width: 28px; height: 28px;
      border: 3px solid #ddd; border-top-color: #3b82f6;
      border-radius: 50%; animation: spin .7s linear infinite; margin-bottom: 12px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .error { text-align: center; padding: 60px 20px; color: #b91c1c; font-size: 14px; }

    /* ── Print / PDF ── */
    @media print {
      body { background: #fff; }
      .toolbar { display: none !important; }
      .page { box-shadow: none; margin: 0; padding: 12px 16px; max-width: 100%; }
      .summary-cards { page-break-inside: avoid; }
    }
    body.print-mode .toolbar { display: none !important; }
    body.print-mode { background: #fff; }
    body.print-mode .page { box-shadow: none; margin: 0; padding: 12px 16px; max-width: 100%; }
  </style>
</head>
<body>
<div id="root"></div>

<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.4/chart.umd.min.js"></script>

<script type="text/babel">
const { useState, useEffect, useMemo, useCallback, useRef } = React;

const LS_REFUND_BREAKDOWN = 'gl_refund_breakdown';
const LS_VIEW_MODE        = 'gl_view_mode';

function getOrgAndBase() {
  const parts = window.location.pathname.split('/').filter(Boolean);
  return { orgSlug: parts[0] || 'unknown', basePath: `/${parts[0]}/${parts[1]}` };
}

function getParams() {
  const p = new URLSearchParams(window.location.search);
  return {
    start_date: p.get('start_date'),
    end_date:   p.get('end_date'),
    _print:     p.get('_print'),
  };
}

function getCurrentMonthRange() {
  const now = new Date();
  const y = now.getFullYear(), m = now.getMonth();
  return { start: toISO(new Date(y, m, 1)), end: toISO(new Date(y, m + 1, 0)) };
}

function toISO(d) {
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function formatDisplayDate(isoStr) {
  if (!isoStr) return '';
  const d = new Date(isoStr + 'T12:00:00');
  const months = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  return `${months[d.getMonth()]} ${d.getDate()}, ${d.getFullYear()}`;
}

function fmtMoney(v) {
  if (v == null || v === '') return '$0.00';
  const n = typeof v === 'string' ? parseFloat(v) : v;
  if (isNaN(n)) return '$0.00';
  return (n < 0 ? '-$' : '$') + Math.abs(n).toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g, ',');
}

function fmtMoneyCompact(v) {
  const n = typeof v === 'string' ? parseFloat(v) : (v ?? 0);
  if (isNaN(n)) return '$0';
  const abs = Math.abs(n);
  const sign = n < 0 ? '-' : '';
  if (abs >= 1000000) return `${sign}$${(abs/1000000).toFixed(1)}M`;
  if (abs >= 1000)    return `${sign}$${(abs/1000).toFixed(1)}k`;
  return `${sign}$${abs.toFixed(0)}`;
}

function isZero(v) {
  const n = typeof v === 'string' ? parseFloat(v) : (v ?? 0);
  return isNaN(n) || n === 0;
}

function toNum(v) {
  const n = typeof v === 'string' ? parseFloat(v) : (v ?? 0);
  return isNaN(n) ? 0 : n;
}

function normalizeRow(raw) {
  return {
    glCode:           raw['GL Code']                       || raw['gl_code']                   || '',
    glDesc:           raw['GL Code Description']           || raw['gl_description']             || 'none',
    accountName:      'Account Name'   in raw ? (raw['Account Name']   || '') : null,
    accountNumber:    'Account Number' in raw ? (raw['Account Number'] || '') : null,
    creditCard:       raw['Credit Card Payments']          || raw['credit_card_payments']       || 0,
    cash:             raw['Cash Payments']                 || raw['cash_payments']              || 0,
    check:            raw['Check Payments']                || raw['check_payments']             || 0,
    free:             raw['Free Payments']                 || raw['free_payments']              || 0,
    orgCredit:        raw['Organization Credit Payments']  || raw['org_credit_payments']        || 0,
    totalPayments:    raw['Total Payments']                || raw['total_payments']             || 0,
    numPayments:      raw['Number of Payments']            || raw['number_of_payments']         || 0,
    ccRefunds:        raw['CC Refunds']                    || raw['cc_refunds']                 || 0,
    cashRefunds:      raw['Cash Refunds']                  || raw['cash_refunds']               || 0,
    checkRefunds:     raw['Check Refunds']                 || raw['check_refunds']              || 0,
    orgCreditRefunds: raw['Org Credit Refunds']            || raw['org_credit_refunds']         || 0,
    otherRefunds:     raw['Other Refunds']                 || raw['other_refunds']              || 0,
    totalRefunds:     raw['Total Refunds']                 || raw['total_refunds']              || 0,
    numRefunds:       raw['Number of Refunds']             || raw['number_of_refunds']          || 0,
    netAmount:        raw['Net Amount']                    || raw['net_amount']                 || 0,
    locations:        'Locations'      in raw ? (raw['Locations']      || '') : null,
  };
}

const REFUND_BREAKDOWN_COLS = [
  { key: 'ccRefunds',        label: 'CC',        header: 'CC Refunds'         },
  { key: 'cashRefunds',      label: 'Cash',       header: 'Cash Refunds'       },
  { key: 'checkRefunds',     label: 'Check',      header: 'Check Refunds'      },
  { key: 'orgCreditRefunds', label: 'Org Credit', header: 'Org Credit Refunds' },
  { key: 'otherRefunds',     label: 'Other',      header: 'Other Refunds'      },
];

// Chart color palette
const CHART_PALETTE = [
  '#3b82f6','#16a34a','#f59e0b','#8b5cf6','#06b6d4',
  '#f97316','#ec4899','#84cc16','#14b8a6','#6366f1',
  '#ef4444','#a3e635','#2dd4bf','#fb923c','#f43f5e',
  '#60a5fa','#4ade80','#fbbf24','#a78bfa','#34d399',
];

// ── GL Chart component ───────────────────────────────────────────────
// key prop forces remount on viewMode/date change — Chart.js gets a clean canvas each time
function GLChart({ rows, viewMode }) {
  const canvasRef = useRef(null);

  useEffect(() => {
    if (!canvasRef.current || !rows || rows.length === 0) return;
    const ctx = canvasRef.current.getContext('2d');

    let chart;

    if (viewMode === 'bar') {
      // Horizontal bar: Net Amount by GL code
      const labels = rows.map(r => r.glCode || '—');
      const values = rows.map(r => toNum(r.netAmount));
      const bgColors     = values.map(v => v >= 0 ? 'rgba(21,128,61,0.75)' : 'rgba(185,28,28,0.75)');
      const borderColors = values.map(v => v >= 0 ? '#15803d' : '#b91c1c');

      chart = new Chart(ctx, {
        type: 'bar',
        data: {
          labels,
          datasets: [{
            label: 'Net Amount',
            data: values,
            backgroundColor: bgColors,
            borderColor: borderColors,
            borderWidth: 1,
            borderRadius: 3,
          }]
        },
        options: {
          indexAxis: 'y',
          responsive: true,
          maintainAspectRatio: false,
          plugins: {
            legend: { display: false },
            tooltip: {
              callbacks: {
                label: ctx => '  ' + fmtMoney(ctx.parsed.x),
              }
            }
          },
          scales: {
            x: {
              grid: { color: 'rgba(0,0,0,.06)' },
              ticks: {
                font: { size: 10 },
                callback: v => fmtMoneyCompact(v),
              },
              border: { color: '#ccc' },
            },
            y: {
              ticks: {
                font: { family: "'IBM Plex Mono', monospace", size: 10 },
              },
              grid: { display: false },
              border: { color: '#ccc' },
            }
          }
        }
      });
    }

    if (viewMode === 'pie') {
      // Pie: Total Payments by GL code (positive rows only)
      const positiveRows = rows.filter(r => toNum(r.totalPayments) > 0);
      const labels = positiveRows.map(r => r.glCode || '—');
      const values = positiveRows.map(r => toNum(r.totalPayments));
      const total  = values.reduce((a, b) => a + b, 0);
      const colors = labels.map((_, i) => CHART_PALETTE[i % CHART_PALETTE.length]);

      chart = new Chart(ctx, {
        type: 'pie',
        data: {
          labels,
          datasets: [{
            data: values,
            backgroundColor: colors,
            borderColor: '#fff',
            borderWidth: 2,
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: {
            legend: {
              position: 'right',
              labels: {
                font: { size: 11, family: "'IBM Plex Sans', sans-serif" },
                padding: 14,
                usePointStyle: true,
                pointStyleWidth: 10,
              }
            },
            tooltip: {
              callbacks: {
                label: ctx => {
                  const pct = total > 0 ? ((ctx.parsed / total) * 100).toFixed(1) : '0.0';
                  return `  ${ctx.label}: ${fmtMoney(ctx.parsed)} (${pct}%)`;
                }
              }
            }
          }
        }
      });
    }

    return () => { if (chart) chart.destroy(); };
  }, []); // empty deps — key prop triggers remount

  const excludedCount = viewMode === 'pie'
    ? rows.filter(r => toNum(r.totalPayments) <= 0).length
    : 0;

  const barHeight = Math.max(320, rows.length * 32);
  const containerHeight = viewMode === 'bar' ? barHeight : 420;

  return (
    <div className="chart-container">
      <div className="chart-canvas-wrap" style={{ height: containerHeight + 'px' }}>
        <canvas ref={canvasRef} />
      </div>
      {viewMode === 'pie' && excludedCount > 0 && (
        <div className="chart-note">
          {excludedCount} GL code{excludedCount !== 1 ? 's' : ''} excluded (zero or negative payments not shown in pie)
        </div>
      )}
      {viewMode === 'bar' && (
        <div className="chart-note">Net Amount = Total Payments minus Total Refunds</div>
      )}
    </div>
  );
}

// ── Main App ─────────────────────────────────────────────────────────
function App() {
  const { orgSlug, basePath } = useMemo(() => getOrgAndBase(), []);
  const params   = useMemo(() => getParams(), []);
  const defaults = useMemo(() => getCurrentMonthRange(), []);

  const [startDate, setStartDate] = useState(params.start_date || defaults.start);
  const [endDate,   setEndDate]   = useState(params.end_date   || defaults.end);

  const [rows,        setRows]        = useState(null);
  const [meta,        setMeta]        = useState({});
  const [error,       setError]       = useState(null);
  const [loading,     setLoading]     = useState(false);
  const [pdfLoading,  setPdfLoading]  = useState(false);
  const [loadedStart, setLoadedStart] = useState(null);
  const [loadedEnd,   setLoadedEnd]   = useState(null);

  const [showRefundBreakdown, setShowRefundBreakdown] = useState(() => {
    try { return localStorage.getItem(LS_REFUND_BREAKDOWN) === 'true'; }
    catch { return false; }
  });

  const [viewMode, setViewMode] = useState(() => {
    try { return localStorage.getItem(LS_VIEW_MODE) || 'table'; }
    catch { return 'table'; }
  });

  function toggleRefundBreakdown() {
    setShowRefundBreakdown(prev => {
      const next = !prev;
      try { localStorage.setItem(LS_REFUND_BREAKDOWN, String(next)); } catch {}
      return next;
    });
  }

  function handleViewMode(mode) {
    setViewMode(mode);
    try { localStorage.setItem(LS_VIEW_MODE, mode); } catch {}
  }

  const hasBreakdownData = useMemo(() => {
    if (!rows || rows.length === 0) return false;
    return REFUND_BREAKDOWN_COLS.some(col => rows.some(r => toNum(r[col.key]) !== 0));
  }, [rows]);

  const breakdownActive = showRefundBreakdown && hasBreakdownData;

  useEffect(() => {
    if (params._print === '1') document.body.classList.add('print-mode');
  }, []);

  const fetchData = useCallback((sd, ed) => {
    setLoading(true);
    setError(null);
    const qs = new URLSearchParams();
    if (sd) qs.set('start_date', sd);
    if (ed) qs.set('end_date', ed);

    fetch(`${basePath}/api/data?${qs}`)
      .then(r => { if (!r.ok) throw new Error(`Server returned ${r.status}`); return r.json(); })
      .then(json => {
        setRows(json.rows.map(normalizeRow));
        setMeta(json.meta || {});
        setLoadedStart(sd);
        setLoadedEnd(ed);
      })
      .catch(err => setError(err.message))
      .finally(() => setLoading(false));
  }, [basePath]);

  useEffect(() => { fetchData(startDate, endDate); }, []);

  function setMonth(offset) {
    const now = new Date();
    const t = new Date(now.getFullYear(), now.getMonth() + offset, 1);
    setStartDate(toISO(t));
    setEndDate(toISO(new Date(t.getFullYear(), t.getMonth() + 1, 0)));
  }

  function downloadPdf() {
    setPdfLoading(true);
    const qs = new URLSearchParams();
    if (loadedStart) qs.set('start_date', loadedStart);
    if (loadedEnd)   qs.set('end_date',   loadedEnd);

    fetch(`${basePath}/api/pdf?${qs}`)
      .then(r => r.blob())
      .then(blob => {
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = `gl-rollup-${loadedStart || 'report'}.pdf`;
        a.click();
        URL.revokeObjectURL(a.href);
      })
      .catch(err => alert('PDF failed: ' + err.message))
      .finally(() => setPdfLoading(false));
  }

  // ── Totals ────────────────────────────────────────────────────────
  const totals = useMemo(() => {
    if (!rows) return null;
    const hasLocations     = rows.length > 0 && rows[0].locations     !== null;
    const hasAccountNumber = rows.length > 0 && rows[0].accountNumber !== null;
    const hasAccountName   = rows.length > 0 && rows[0].accountName   !== null;
    const sums = rows.reduce((acc, r) => {
      acc.creditCard        += toNum(r.creditCard);
      acc.cash              += toNum(r.cash);
      acc.check             += toNum(r.check);
      acc.free              += toNum(r.free);
      acc.orgCredit         += toNum(r.orgCredit);
      acc.totalPayments     += toNum(r.totalPayments);
      acc.numPayments       += toNum(r.numPayments);
      acc.ccRefunds         += toNum(r.ccRefunds);
      acc.cashRefunds       += toNum(r.cashRefunds);
      acc.checkRefunds      += toNum(r.checkRefunds);
      acc.orgCreditRefunds  += toNum(r.orgCreditRefunds);
      acc.otherRefunds      += toNum(r.otherRefunds);
      acc.totalRefunds      += toNum(r.totalRefunds);
      acc.numRefunds        += toNum(r.numRefunds);
      acc.netAmount         += toNum(r.netAmount);
      return acc;
    }, {
      creditCard:0, cash:0, check:0, free:0, orgCredit:0, totalPayments:0, numPayments:0,
      ccRefunds:0, cashRefunds:0, checkRefunds:0, orgCreditRefunds:0, otherRefunds:0,
      totalRefunds:0, numRefunds:0, netAmount:0,
    });
    return { ...sums, hasLocations, hasAccountNumber, hasAccountName };
  }, [rows]);

  // ── Excel export ──────────────────────────────────────────────────
  function downloadExcel() {
    if (!rows || rows.length === 0) return;

    const hasLocations     = totals && totals.hasLocations;
    const hasAccountNumber = totals && totals.hasAccountNumber;
    const hasAccountName   = totals && totals.hasAccountName;

    const headers = ['GL Code', 'Description'];
    if (hasAccountName)   headers.push('Account Name');
    if (hasAccountNumber) headers.push('Account #');
    if (hasLocations)     headers.push('Locations');
    headers.push('Credit Card', 'Cash', 'Check', 'Free', 'Org Credit', 'Total Payments', '# Payments');
    if (breakdownActive) {
      headers.push('CC Refunds', 'Cash Refunds', 'Check Refunds', 'Org Credit Refunds', 'Other Refunds');
    }
    headers.push('Total Refunds', '# Refunds', 'Net Amount');

    const dataRows = rows.map(r => {
      const row = [r.glCode, r.glDesc === 'none' ? '' : r.glDesc];
      if (hasAccountName)   row.push(r.accountName   || '');
      if (hasAccountNumber) row.push(r.accountNumber || '');
      if (hasLocations)     row.push(r.locations     || '');
      row.push(
        toNum(r.creditCard), toNum(r.cash), toNum(r.check),
        toNum(r.free), toNum(r.orgCredit),
        toNum(r.totalPayments), toNum(r.numPayments),
      );
      if (breakdownActive) {
        row.push(
          toNum(r.ccRefunds), toNum(r.cashRefunds), toNum(r.checkRefunds),
          toNum(r.orgCreditRefunds), toNum(r.otherRefunds),
        );
      }
      row.push(toNum(r.totalRefunds), toNum(r.numRefunds), toNum(r.netAmount));
      return row;
    });

    const totalsRow = ['TOTALS', ''];
    if (hasAccountName)   totalsRow.push('');
    if (hasAccountNumber) totalsRow.push('');
    if (hasLocations)     totalsRow.push('');
    totalsRow.push(
      totals.creditCard, totals.cash, totals.check,
      totals.free, totals.orgCredit,
      totals.totalPayments, totals.numPayments,
    );
    if (breakdownActive) {
      totalsRow.push(
        totals.ccRefunds, totals.cashRefunds, totals.checkRefunds,
        totals.orgCreditRefunds, totals.otherRefunds,
      );
    }
    totalsRow.push(totals.totalRefunds, totals.numRefunds, totals.netAmount);

    const wsData = [headers, ...dataRows, totalsRow];
    const ws = XLSX.utils.aoa_to_sheet(wsData);

    const colWidths = [{ wch: 14 }, { wch: 30 }];
    if (hasAccountName)   colWidths.push({ wch: 28 });
    if (hasAccountNumber) colWidths.push({ wch: 14 });
    if (hasLocations)     colWidths.push({ wch: 22 });
    colWidths.push(
      { wch: 12 }, { wch: 10 }, { wch: 10 }, { wch: 10 }, { wch: 12 },
      { wch: 14 }, { wch: 10 },
    );
    if (breakdownActive) {
      colWidths.push({ wch: 12 }, { wch: 12 }, { wch: 12 }, { wch: 14 }, { wch: 10 });
    }
    colWidths.push({ wch: 14 }, { wch: 10 }, { wch: 14 });
    ws['!cols'] = colWidths;

    const fixedColCount = 2
      + (hasAccountName   ? 1 : 0)
      + (hasAccountNumber ? 1 : 0)
      + (hasLocations     ? 1 : 0);

    const moneyOffsets = [0,1,2,3,4,5,7];
    const refundBreakdownOffsets = breakdownActive ? [8,9,10,11,12] : [];
    const totalRefundsOffset     = breakdownActive ? 13 : 8;
    const netAmountOffset        = breakdownActive ? 15 : 10;
    const allMoneyOffsets = [...moneyOffsets, ...refundBreakdownOffsets, totalRefundsOffset, netAmountOffset];

    for (let rowIdx = 1; rowIdx <= dataRows.length + 1; rowIdx++) {
      allMoneyOffsets.forEach(offset => {
        const cellAddr = XLSX.utils.encode_cell({ r: rowIdx, c: fixedColCount + offset });
        if (ws[cellAddr] && typeof ws[cellAddr].v === 'number') {
          ws[cellAddr].z = '"$"#,##0.00';
        }
      });
    }

    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, 'GL Code Rollup');
    const orgLabel = (meta.org_slug || 'report').replace(/\s+/g, '-').toLowerCase();
    XLSX.writeFile(wb, `gl-rollup-${orgLabel}-${loadedStart || 'report'}.xlsx`);
  }

  const isPrint      = params._print === '1';
  const datesChanged = startDate !== loadedStart || endDate !== loadedEnd;

  // ── Toolbar ───────────────────────────────────────────────────────
  function renderToolbar() {
    if (isPrint) return null;
    return (
      <div className="toolbar">
        <span className="toolbar-title">GL Code Rollup</span>
        <div className="divider" />
        <label>Start<input type="date" value={startDate} onChange={e => setStartDate(e.target.value)} /></label>
        <label>End<input type="date" value={endDate} onChange={e => setEndDate(e.target.value)} /></label>
        <button onClick={() => setMonth(-1)} style={{fontSize:11,padding:'4px 8px'}}>Last Month</button>
        <button onClick={() => setMonth(0)}  style={{fontSize:11,padding:'4px 8px'}}>This Month</button>
        <button onClick={() => setMonth(1)}  style={{fontSize:11,padding:'4px 8px'}}>Next Month</button>
        <button
          className="btn-run"
          onClick={() => fetchData(startDate, endDate)}
          disabled={loading}
          style={datesChanged && !loading ? {boxShadow:'0 0 0 2px #4ade80'} : {}}
        >
          {loading ? 'Loading…' : '▶ Run Report'}
        </button>
        <div className="divider" />
        <button
          className={showRefundBreakdown ? 'btn-toggle-on' : ''}
          onClick={toggleRefundBreakdown}
          title={hasBreakdownData
            ? (showRefundBreakdown ? 'Switch to summarized refunds' : 'Switch to refund breakdown by type')
            : 'Refund breakdown requires updated SQL'}
          style={{ fontSize: 11, padding: '4px 10px' }}
        >
          {showRefundBreakdown ? '↙ Refunds: Breakdown' : '↗ Refunds: Summary'}
          {showRefundBreakdown && !hasBreakdownData && <span style={{marginLeft:4,opacity:0.6,fontSize:10}}>(no data)</span>}
        </button>
        <div className="divider" />
        <div className="view-toggle">
          {[['table','⊞ Table'],['bar','▦ Bar'],['pie','◑ Pie']].map(([mode, label]) => (
            <button
              key={mode}
              className={viewMode === mode ? 'active' : ''}
              onClick={() => handleViewMode(mode)}
            >
              {label}
            </button>
          ))}
        </div>
        <div className="toolbar-spacer" />
        {rows && <span className="row-count">{rows.length} GL code{rows.length !== 1 ? 's' : ''}</span>}
        <div className="divider" />
        <button onClick={() => window.print()}>🖨️ Print</button>
        <button
          className="btn-pdf"
          onClick={downloadPdf}
          disabled={pdfLoading || !rows || rows.length === 0}
        >
          {pdfLoading ? 'Generating…' : '📄 PDF'}
        </button>
        <button
          className="btn-excel"
          onClick={downloadExcel}
          disabled={!rows || rows.length === 0}
        >
          📊 Excel
        </button>
      </div>
    );
  }

  // ── States ────────────────────────────────────────────────────────
  if (error && !rows) return (
    <div>{renderToolbar()}
      <div className="page"><div className="error">
        <p><strong>Failed to load GL data</strong></p>
        <p>{error}</p>
        <p style={{marginTop:12,color:'#666',fontSize:12}}>Check that Metabase public sharing is enabled and the GL UUID is correct.</p>
      </div></div>
    </div>
  );

  if (!rows) return (
    <div>{renderToolbar()}
      <div className="page"><div className="loading">
        <div className="spinner" /><div>Loading GL data…</div>
      </div></div>
    </div>
  );

  const now = new Date();
  const runDate = `${String(now.getMonth()+1).padStart(2,'0')}/${String(now.getDate()).padStart(2,'0')}/${now.getFullYear()} @ ${now.toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit',hour12:true}).toLowerCase()}`;
  const orgName = meta.org_name || (meta.org_slug || 'rec.us');
  const logoUrl = meta.logo_url || null;
  const dateRangeLabel = [loadedStart && formatDisplayDate(loadedStart), loadedEnd && formatDisplayDate(loadedEnd)].filter(Boolean).join(' – ') || 'Current Month';
  const netIsNeg = totals && totals.netAmount < 0;

  const fixedColSpan = 2
    + (totals && totals.hasAccountName   ? 1 : 0)
    + (totals && totals.hasAccountNumber ? 1 : 0)
    + (totals && totals.hasLocations     ? 1 : 0);

  const chartModeLabel = viewMode === 'bar'
    ? 'NET AMOUNT BY GL CODE'
    : viewMode === 'pie'
    ? 'TOTAL PAYMENTS BY GL CODE'
    : null;

  return (
    <div>
      {renderToolbar()}
      <div className="page" style={loading ? {opacity:0.5,pointerEvents:'none'} : {}}>

        {/* Header */}
        <div className="report-header">
          <div className="report-header-left">
            {logoUrl && <img src={logoUrl} alt="" className="report-header-logo" onError={e => e.target.style.display='none'} />}
            <div>
              <div className="org-label">{orgName}</div>
              <div className="title">GL Code Rollup</div>
            </div>
          </div>
          <div className="report-header-right">
            <div className="date-range">{dateRangeLabel}</div>
            {chartModeLabel && (
              <div style={{fontSize:10,color:'#3b82f6',marginTop:3,fontWeight:600,letterSpacing:'0.4px'}}>
                {chartModeLabel}
              </div>
            )}
            {!chartModeLabel && breakdownActive && (
              <div style={{fontSize:10,color:'#b91c1c',marginTop:3,fontWeight:600,letterSpacing:'0.4px'}}>
                REFUNDS SHOWN BY TYPE
              </div>
            )}
          </div>
        </div>

        {/* Summary cards — always visible */}
        {totals && (
          <div className="summary-cards">
            <div className="summary-card">
              <div className="card-label">Total Payments</div>
              <div className="card-value green">{fmtMoney(totals.totalPayments)}</div>
              <div className="card-sub">{totals.numPayments.toLocaleString()} transactions</div>
            </div>
            <div className="summary-card">
              <div className="card-label">Total Refunds</div>
              <div className="card-value red">{fmtMoney(totals.totalRefunds)}</div>
              <div className="card-sub">{totals.numRefunds.toLocaleString()} refunds</div>
            </div>
            <div className="summary-card">
              <div className="card-label">Net Amount</div>
              <div className={`card-value ${netIsNeg ? 'red' : 'green'}`}>{fmtMoney(totals.netAmount)}</div>
              <div className="card-sub">payments minus refunds</div>
            </div>
            <div className="summary-card">
              <div className="card-label">Credit Card</div>
              <div className="card-value">{fmtMoney(totals.creditCard)}</div>
              <div className="card-sub">card-online + card-present</div>
            </div>
            <div className="summary-card">
              <div className="card-label">Cash</div>
              <div className="card-value">{fmtMoney(totals.cash)}</div>
              <div className="card-sub">&nbsp;</div>
            </div>
            <div className="summary-card">
              <div className="card-label">Check</div>
              <div className="card-value">{fmtMoney(totals.check)}</div>
              <div className="card-sub">&nbsp;</div>
            </div>
          </div>
        )}

        {/* Main content: table or chart */}
        {rows.length === 0 ? (
          <div style={{textAlign:'center',padding:'40px 0',color:'#888'}}>No GL data found for the selected date range.</div>
        ) : viewMode !== 'table' ? (
          <GLChart
            key={`${viewMode}-${loadedStart}-${loadedEnd}`}
            rows={rows}
            viewMode={viewMode}
          />
        ) : (
          <table className="gl-table">
            <thead>
              {breakdownActive && (
                <tr>
                  <th colSpan={fixedColSpan + 7} style={{background:'transparent',border:'none'}} />
                  <th colSpan={REFUND_BREAKDOWN_COLS.length} className="refund-group-header">
                    Refunds by Type
                  </th>
                  <th colSpan={3} style={{background:'transparent',border:'none'}} />
                </tr>
              )}
              <tr>
                <th style={{width:'80px'}}>GL Code</th>
                <th style={{minWidth:'100px'}}>Description</th>
                {totals.hasAccountName   && <th style={{minWidth:'160px'}}>Account Name</th>}
                {totals.hasAccountNumber && <th style={{width:'90px'}}>Account #</th>}
                {totals.hasLocations     && <th style={{minWidth:'100px'}}>Locations</th>}
                <th style={{width:'90px'}}>Credit Card</th>
                <th style={{width:'75px'}}>Cash</th>
                <th style={{width:'75px'}}>Check</th>
                <th style={{width:'55px'}}>Free</th>
                <th style={{width:'80px'}}>Org Credit</th>
                <th style={{width:'90px'}}>Total Pmts</th>
                <th style={{width:'55px'}}># Pmts</th>
                {breakdownActive && REFUND_BREAKDOWN_COLS.map((col, i) => (
                  <th
                    key={col.key}
                    style={{width:'75px'}}
                    className={`refund-col ${i === 0 ? 'refund-col-first' : ''} ${i === REFUND_BREAKDOWN_COLS.length - 1 ? 'refund-col-last' : ''}`}
                  >
                    {col.label}
                  </th>
                ))}
                <th style={{width:'90px'}}>Total Rfds</th>
                <th style={{width:'50px'}}># Rfds</th>
                <th style={{width:'90px'}}>Net Amount</th>
              </tr>
            </thead>
            <tbody>
              {rows.map((r, i) => {
                const net = toNum(r.netAmount);
                return (
                  <tr key={i}>
                    <td>{r.glCode || <span style={{color:'#bbb'}}>—</span>}</td>
                    <td style={{color: r.glDesc === 'none' ? '#bbb' : '#444', fontStyle: r.glDesc === 'none' ? 'italic' : 'normal'}}>{r.glDesc}</td>
                    {totals.hasAccountName && (
                      <td style={{color:'#222', fontWeight: 500}}>{r.accountName}</td>
                    )}
                    {totals.hasAccountNumber && (
                      <td style={{color:'#888', fontSize:'10.5px', fontFamily:"'IBM Plex Mono',monospace"}}>{r.accountNumber}</td>
                    )}
                    {totals.hasLocations && (
                      <td style={{color:'#666', fontSize:'10.5px'}}>{r.locations}</td>
                    )}
                    <td className={`money ${isZero(r.creditCard) ? 'zero' : ''}`}>{fmtMoney(r.creditCard)}</td>
                    <td className={`money ${isZero(r.cash) ? 'zero' : ''}`}>{fmtMoney(r.cash)}</td>
                    <td className={`money ${isZero(r.check) ? 'zero' : ''}`}>{fmtMoney(r.check)}</td>
                    <td className={`money ${isZero(r.free) ? 'zero' : ''}`}>{fmtMoney(r.free)}</td>
                    <td className={`money ${isZero(r.orgCredit) ? 'zero' : ''}`}>{fmtMoney(r.orgCredit)}</td>
                    <td className="money" style={{fontWeight:500}}>{fmtMoney(r.totalPayments)}</td>
                    <td style={{color:'#666'}}>{toNum(r.numPayments).toLocaleString()}</td>
                    {breakdownActive && REFUND_BREAKDOWN_COLS.map((col, ci) => (
                      <td
                        key={col.key}
                        className={`money refund-col ${isZero(r[col.key]) ? 'zero' : ''} ${ci === 0 ? 'refund-col-first' : ''} ${ci === REFUND_BREAKDOWN_COLS.length - 1 ? 'refund-col-last' : ''}`}
                      >
                        {fmtMoney(r[col.key])}
                      </td>
                    ))}
                    <td className={`money ${isZero(r.totalRefunds) ? 'zero' : ''}`} style={{color: isZero(r.totalRefunds) ? '' : '#b91c1c'}}>{fmtMoney(r.totalRefunds)}</td>
                    <td style={{color: isZero(r.numRefunds) ? '#ccc' : '#b91c1c'}}>{toNum(r.numRefunds).toLocaleString()}</td>
                    <td className={`money col-net ${net < 0 ? 'negative' : net > 0 ? 'positive' : ''}`}>{fmtMoney(net)}</td>
                  </tr>
                );
              })}
            </tbody>
            <tfoot>
              <tr>
                <td colSpan={fixedColSpan}>Totals — {rows.length} GL code{rows.length !== 1 ? 's' : ''}</td>
                <td className="money">{fmtMoney(totals.creditCard)}</td>
                <td className="money">{fmtMoney(totals.cash)}</td>
                <td className="money">{fmtMoney(totals.check)}</td>
                <td className="money">{fmtMoney(totals.free)}</td>
                <td className="money">{fmtMoney(totals.orgCredit)}</td>
                <td className="money">{fmtMoney(totals.totalPayments)}</td>
                <td>{totals.numPayments.toLocaleString()}</td>
                {breakdownActive && REFUND_BREAKDOWN_COLS.map((col, ci) => (
                  <td
                    key={col.key}
                    className={`money refund-col ${ci === 0 ? 'refund-col-first' : ''} ${ci === REFUND_BREAKDOWN_COLS.length - 1 ? 'refund-col-last' : ''}`}
                  >
                    {fmtMoney(totals[col.key])}
                  </td>
                ))}
                <td className="money">{fmtMoney(totals.totalRefunds)}</td>
                <td>{totals.numRefunds.toLocaleString()}</td>
                <td className={`money col-net ${netIsNeg ? 'negative' : ''}`}>{fmtMoney(totals.netAmount)}</td>
              </tr>
            </tfoot>
          </table>
        )}

        {/* Footer */}
        <div className="report-footer">
          <span>
            {orgName} — GL Code Rollup
            {viewMode === 'bar' ? ' (Bar Chart)' : viewMode === 'pie' ? ' (Pie Chart)' : breakdownActive ? ' (Refunds by Type)' : ''}
          </span>
          <span>Run Date/Time: {runDate}</span>
        </div>

        <div id="report-ready" style={{display:'none'}} />
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
