      position: relative; overflow: visible;
      box-shadow: 0 2px 12px rgba(99,102,241,.3);
    }
  .insights-btn:hover:not(:disabled) { background:#374151; }
  .insights-btn:disabled { opacity:.6; cursor:default; }
    .insights-btn .sparkle {
      position: absolute; pointer-events: none;
      font-size: 10px; opacity: 0;
      animation: sparkle-float 2.5s ease-in-out infinite;
    }
    .insights-btn .sparkle:nth-child(1) { top: -8px; left: 8%; animation-delay: 0s; }
    .insights-btn .sparkle:nth-child(2) { top: -6px; right: 12%; animation-delay: 0.7s; font-size: 8px; }
    .insights-btn .sparkle:nth-child(3) { bottom: -7px; left: 25%; animation-delay: 1.4s; font-size: 7px; }
    .insights-btn .sparkle:nth-child(4) { top: -5px; left: 50%; animation-delay: 0.3s; font-size: 6px; }
    .insights-btn .sparkle:nth-child(5) { bottom: -6px; right: 20%; animation-delay: 1.1s; font-size: 9px; }
    .insights-btn .sparkle:nth-child(6) { top: -9px; right: 3%; animation-delay: 1.9s; font-size: 7px; }
    @keyframes sparkle-float {
      0%, 100% { opacity: 0; transform: translateY(0) scale(0.5); }
      15% { opacity: 1; transform: translateY(-3px) scale(1.1); }
      30% { opacity: 0.7; transform: translateY(-7px) scale(0.9); }
      50% { opacity: 0.3; transform: translateY(-11px) scale(0.6); }
      70% { opacity: 0; transform: translateY(-15px) scale(0.3); }
    }
  .insights-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(230px,1fr)); gap:12px; padding:0 20px 16px; }
  .insight-card { border:1px solid #e5e7eb; border-left-width:4px; border-radius:8px; padding:12px 14px; background:#fff; }
  .insight-type { font-size:9px; font-weight:700; letter-spacing:.6px; text-transform:uppercase; margin-bottom:5px; }

  .insight-risk { border-left-color:#f59e0b; } .insight-risk .insight-type { color:#d97706; }

  .loading { display:flex; flex-direction:column; align-items:center; justify-content:center; gap:14px; text-align:center; padding:60px 16px; color:#888; font-size:14px; }
  .loading .spinner {
    position:relative; display:inline-block; width:34px; height:44px; margin:0 auto;
    box-sizing:border-box; border:2px solid #e07b1a; border-top-color:#f7b96b;
    border-radius:4px 4px 14px 14px; background:rgba(255,248,240,0.5);

  .loading .spinner::before {
    content:''; position:absolute; left:0; right:0; bottom:0; height:60%;
    background:linear-gradient(180deg,#ffb24d 0%,#ff8c1f 55%,#f2710a 100%);
    box-shadow:inset 0 2px 0 rgba(255,255,255,0.45);

  }
  .loading .spinner::after {
    content:''; position:absolute; left:50%; bottom:6px; width:3px; height:3px; margin-left:-1.5px;
    border-radius:50%; background:rgba(255,255,255,0.85);
    box-shadow:-5px 7px 0 0 rgba(255,255,255,0.65), 5px 12px 0 -0.5px rgba(255,255,255,0.5);
    animation:juice-bubbles 2.2s ease-out infinite;
  }
  @keyframes juice-fill { 0%{height:42%} 50%{height:80%} 100%{height:42%} }
  @keyframes juice-bubbles { 0%{transform:translateY(2px) scale(0.5);opacity:0} 30%{opacity:0.9} 70%{opacity:0.6} 100%{transform:translateY(-22px) scale(1);opacity:0} }
  .juice-msg { position:relative; height:1.4em; line-height:1.4em; min-width:200px; margin:0 auto; }
  .juice-msg span { position:absolute; left:0; right:0; text-align:center; opacity:0; animation:juice-phrase 10s infinite; }
  .juice-msg span:nth-child(1) { animation-delay:0s; }
  .juice-msg span:nth-child(2) { animation-delay:2s; }
  .juice-msg span:nth-child(3) { animation-delay:4s; }
  .juice-msg span:nth-child(4) { animation-delay:6s; }
  .juice-msg span:nth-child(5) { animation-delay:8s; }
  @keyframes juice-phrase { 0%{opacity:0;transform:translateY(5px)} 2%{opacity:1;transform:translateY(0)} 18%{opacity:1;transform:translateY(0)} 20%{opacity:0;transform:translateY(-5px)} 100%{opacity:0} }
  .error { padding:14px; background:#fef2f2; color:#991b1b; border-radius:8px; margin:10px 0; font-size:13px; }

  .alert-card { padding:10px 14px; border-radius:8px; font-size:12px; line-height:1.5; margin-bottom:6px; }

  .future-box { background:linear-gradient(135deg,#ede9fe,#dbeafe); border-radius:10px; padding:16px 20px; border:1px solid #c7d2fe; margin-top:12px; }

  .future-box ul { font-size:12px; color:#4338ca; line-height:1.8; opacity:.85; margin:6px 0 0 18px; }

  .rev-coming { display:flex; flex-direction:column; align-items:center; justify-content:center; padding:80px 20px; text-align:center; }

  @media print { body { background:#fff; } .no-print { display:none!important; } .panel { break-inside:avoid; } }
  .map-wrap { height:420px; border-radius:8px; overflow:hidden; border:1px solid #e5e7eb; position:relative; z-index:1; }
  .map-toggle { display:flex; gap:4px; }
  .map-toggle button { padding:5px 12px; border-radius:4px; border:1px solid #d1d5db; background:#fff; font-size:11px; font-weight:600; cursor:pointer; font-family:inherit; color:#6b7280; }
  .map-toggle button.active { background:#6366f1; color:#fff; border-color:#6366f1; }
  .map-loading { display:flex; align-items:center; justify-content:center; height:420px; color:#6b7280; font-size:13px; }
</style>

<body>
<div id="root"></div>
<div id="report-ready" style="display:none"></div>

<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
<script type="text/babel">
var { useState, useEffect, useCallback, useMemo, useRef } = React;

var parts = window.location.pathname.split('/').filter(Boolean);
var orgSlug = parts[0] || '';
var reportType = parts[1] || 'users';
var urlParams = new URLSearchParams(window.location.search);
var token = urlParams.get('token') || '';
var isPrint = urlParams.get('_print') === '1';
if (isPrint) document.body.classList.add('print-mode');
function withToken(u) { return !token ? u : u + (u.includes('?') ? '&' : '?') + 'token=' + encodeURIComponent(token); }

if (typeof Chart !== 'undefined') { Chart.defaults.font.family = "'Inter',sans-serif"; Chart.defaults.font.size = 11; Chart.defaults.plugins.legend.display = false; }

/* ═══ Shared UI ═══ */
function Ring({ pct, label, color }) {
  var r=28, circ=2*Math.PI*r, offset=circ*(1-pct/100);
  return (<div className="ring-wrap"><svg width="60" height="60" viewBox="0 0 72 72"><circle cx="36" cy="36" r={r} fill="none" stroke="#f1f5f9" strokeWidth="6"/><circle cx="36" cy="36" r={r} fill="none" stroke={color} strokeWidth="6" strokeDasharray={circ} strokeDashoffset={offset} strokeLinecap="round" transform="rotate(-90 36 36)"/><text x="36" y="40" textAnchor="middle" fontSize="12" fontWeight="800" fill="#111827">{pct}%</text></svg><div className="ring-label">{label}</div></div>);
}

function ChartPanel({ title, note, desc, type, data, labelKey, dataKeys, colors, stacked, pctAxis, className, opts }) {
  var canvasRef = useRef(null); var chartRef = useRef(null);
  useEffect(function() {
    if (!canvasRef.current||!data||!data.length) return;
    if (chartRef.current) chartRef.current.destroy();
    var isLine = type === 'line';
    var datasets = dataKeys.map(function(dk,i) {
      var base = { label:dk.label||dk.key, data:data.map(function(d){return d[dk.key];}), backgroundColor:isLine?(colors[i]||'#6366f1')+'20':colors[i]||'#6366f1', borderColor:isLine?colors[i]||'#6366f1':undefined, borderWidth:isLine?2.5:0, borderRadius:isLine?0:4, barPercentage:.7, fill:isLine, tension:.3, pointRadius:isLine?3:0 };
      if (stacked && !isLine) base.borderRadius = (i===dataKeys.length-1)?4:0;
      return base;
    });
    var fullLabels = data.map(function(d){return d[labelKey];});
    chartRef.current = new Chart(canvasRef.current, { type:isLine?'line':'bar', data:{labels:fullLabels,datasets:datasets},
      options:Object.assign({ responsive:true, maintainAspectRatio:false, scales:{ x:{grid:{display:false},stacked:!!stacked,ticks:{callback:function(val,idx){var l=fullLabels[idx]||'';return l.length>24?l.slice(0,22)+'…':l;},maxRotation:45,minRotation:25,font:{size:10}}}, y:{grid:{color:'#f1f5f9'},stacked:!!stacked,beginAtZero:true,ticks:pctAxis?{callback:function(v){return v+'%';}}:{},max:pctAxis?100:undefined}}, plugins:{legend:{display:dataKeys.length>1,position:'top',labels:{boxWidth:12,font:{size:10}}},tooltip:{callbacks:{title:function(items){return items[0]?fullLabels[items[0].dataIndex]:'';}}} }}, opts||{})
    });
    return function(){if(chartRef.current)chartRef.current.destroy();};
  }, [data]);
  return (<div className={'panel '+(className||'')}><div className="panel-head">{title}{note&&<span className="panel-note">{note}</span>}</div>{desc&&<div className="panel-desc">{desc}</div>}<div className="chart-wrap">{(!data||!data.length)?<div style={{display:'flex',alignItems:'center',justifyContent:'center',height:'100%',color:'#9ca3af',fontSize:13,fontStyle:'italic'}}>No data for this period</div>:<canvas ref={canvasRef}></canvas>}</div></div>);
}

function FillRateChart({ sections, colors, selected }) {
  var canvasRef = useRef(null);
  var chartRef = useRef(null);

  useEffect(function(){
    if (!canvasRef.current || !sections || !sections.length) return;
    if (chartRef.current) chartRef.current.destroy();

    // Build unified date axis across all sections
    var allDates = {};
    sections.forEach(function(sec){
      sec.timeline.forEach(function(pt){ allDates[pt.date] = true; });
    });
    var labels = Object.keys(allDates).sort();

    // Build datasets
    var datasets = sections.map(function(sec, i){
      var ci = selected ? selected.indexOf(sec.section) : i;
      var color = colors[ci % colors.length];
      // Map timeline to aligned label positions
      var dataMap = {};
      sec.timeline.forEach(function(pt){ dataMap[pt.date] = pt.count; });
      // Forward-fill: carry last known value
      var lastVal = 0;
      var data = labels.map(function(d){
        if (dataMap[d] !== undefined) lastVal = dataMap[d];
        // Only start filling once section has started
        if (d < sec.timeline[0].date) return null;
        return lastVal;
      });
      return {
        label: sec.section.length > 30 ? sec.section.slice(0,28) + '…' : sec.section,
        data: data,
        borderColor: color,
        backgroundColor: color + '18',
        borderWidth: 2.5,
        fill: false,
        tension: 0.25,
        pointRadius: 2,
        pointHoverRadius: 5,
        spanGaps: true,
      };
    });

    // Add capacity reference lines
    var maxCap = 0;
    sections.forEach(function(sec){
      if (sec.capacity && sec.capacity > maxCap) maxCap = sec.capacity;
      if (sec.capacity) {
        datasets.push({
          label: sec.section.slice(0,20) + ' capacity',
          data: labels.map(function(){ return sec.capacity; }),
          borderColor: colors[(selected ? selected.indexOf(sec.section) : 0) % colors.length] + '40',
          borderWidth: 1.5,
          borderDash: [6, 4],
          fill: false,
          pointRadius: 0,
          pointHoverRadius: 0,
        });
      }
    });

    var fmtDate = function(d){ var p=d.split('-'); return new Date(p[0],p[1]-1,p[2]).toLocaleDateString('en-US',{month:'short',day:'numeric'}); };

    chartRef.current = new Chart(canvasRef.current, {
      type: 'line',
      data: { labels: labels.map(fmtDate), datasets: datasets },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        interaction: { mode: 'index', intersect: false },
        scales: {
          x: { grid: { display: false }, ticks: { maxRotation: 45, minRotation: 25, font: { size: 10 }, maxTicksLimit: 20 } },
          y: { grid: { color: '#f1f5f9' }, beginAtZero: true, title: { display: true, text: 'Enrollments', font: { size: 11 } } },
        },
        plugins: {
          legend: { display: true, position: 'top', labels: { boxWidth: 12, font: { size: 10 }, filter: function(item){ return item.text.indexOf('capacity') === -1; } } },
          tooltip: {
            callbacks: {
              title: function(items){ return items[0] ? items[0].label : ''; },
            }
          },
        },
      },
    });
    return function(){ if(chartRef.current) chartRef.current.destroy(); };
  }, [sections, selected]);

  if (!sections || !sections.length) return (
    React.createElement('div', {style:{textAlign:'center',padding:'40px 20px',color:'#888',fontSize:13}}, 'Select sections above to view fill rate curves.')
  );
  return (
    React.createElement('div', {className:'panel'}, 
      React.createElement('div', {className:'panel-head'}, 'Enrollment Fill Rate Over Time'),
      React.createElement('div', {className:'chart-wrap', style:{height:Math.min(400, 200 + sections.length * 20)}},
        React.createElement('canvas', {ref:canvasRef})
      )
    )
  );
}

function GeoMap({ zipData, mode }) {
  var mapRef = useRef(null);
  var mapInst = useRef(null);
  var heatLayer = useRef(null);
  var markersRef = useRef([]);
  var [coords, setCoords] = useState({});
  var [loading, setLoading] = useState(true);

  // Geocode zip codes via Nominatim, cache in localStorage
  useEffect(function() {
    if (!zipData || !zipData.length) { setLoading(false); return; }
    var cache = {};
    try { cache = JSON.parse(localStorage.getItem('_zipGeo') || '{}'); } catch(e) {}
    var toGeo = zipData.filter(function(z) { return !cache[z.zip]; });
    if (toGeo.length === 0) { setCoords(cache); setLoading(false); return; }

    // zippopotam.us is free, CORS-enabled, no rate limit — fire in parallel batches
    var batch = 0;
    var batchSize = 8;
    function doBatch() {
      var slice = toGeo.slice(batch * batchSize, (batch + 1) * batchSize);
      if (slice.length === 0) {
        try { localStorage.setItem('_zipGeo', JSON.stringify(cache)); } catch(e) {}
        setCoords(Object.assign({}, cache));
        setLoading(false);
        return;
      }
      Promise.all(slice.map(function(z) {
        return fetch('https://api.zippopotam.us/us/' + encodeURIComponent(z.zip))
          .then(function(r) { return r.ok ? r.json() : null; })
          .then(function(data) {
            if (data && data.places && data.places[0]) {
              cache[z.zip] = [parseFloat(data.places[0].latitude), parseFloat(data.places[0].longitude)];
            }
          })
          .catch(function() {});
      })).then(function() { batch++; setTimeout(doBatch, 200); });
    }
    doBatch();
  }, [zipData]);

  // Build/update map
  useEffect(function() {
    if (loading || !mapRef.current || !zipData.length) return;
    var pts = zipData.filter(function(z) { return coords[z.zip]; }).map(function(z) {
      return { lat: coords[z.zip][0], lng: coords[z.zip][1], hh: z.hh, rev: z.revenue, zip: z.zip, city: z.city };
    });
    if (!pts.length) return;

    if (!mapInst.current) {
      mapInst.current = L.map(mapRef.current, { scrollWheelZoom: true, zoomControl: true });
      L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '\u00A9 OpenStreetMap', maxZoom: 18, opacity: 0.85
      }).addTo(mapInst.current);
    }
    var map = mapInst.current;

    // Clear old
    if (heatLayer.current) { map.removeLayer(heatLayer.current); heatLayer.current = null; }
    markersRef.current.forEach(function(m) { map.removeLayer(m); });
    markersRef.current = [];

    // Heat data
    var maxVal = Math.max.apply(null, pts.map(function(p) { return mode === 'rev' ? p.rev : p.hh; }));
    var heatPts = pts.map(function(p) {
      var intensity = (mode === 'rev' ? p.rev : p.hh) / (maxVal || 1);
      return [p.lat, p.lng, Math.max(intensity, 0.1)];
    });
    heatLayer.current = L.heatLayer(heatPts, { radius: 35, blur: 25, maxZoom: 14, gradient: { 0.2: '#6366f1', 0.5: '#0d9488', 0.8: '#f59e0b', 1.0: '#f43f5e' } }).addTo(map);

    // Circle markers with value-based color gradient
    pts.forEach(function(p) {
      var val = mode === 'rev' ? p.rev : p.hh;
      var r = Math.max(Math.sqrt(val / (maxVal || 1)) * 28, 6);
      var pct = val / (maxVal || 1);
      // Color gradient: light teal → amber → red based on intensity
      var color;
      if (pct < 0.15) color = '#6ee7b7';       // light green (low)
      else if (pct < 0.3) color = '#0d9488';    // teal
      else if (pct < 0.5) color = '#0284c7';    // blue
      else if (pct < 0.7) color = '#f59e0b';    // amber
      else if (pct < 0.85) color = '#ea580c';   // orange
      else color = '#dc2626';                    // red (high)
      var marker = L.circleMarker([p.lat, p.lng], {
        radius: r, fillColor: color, fillOpacity: 0.75,
        color: '#fff', weight: 2,
      }).addTo(map);
      marker.bindTooltip(
        '<strong>' + p.city + ' ' + p.zip + '</strong><br/>' +
        p.hh + ' households<br/>' +
        '$' + Math.round(p.rev).toLocaleString() + ' revenue',
        { direction: 'top' }
      );
      markersRef.current.push(marker);
    });

    // Fit bounds
    var bounds = L.latLngBounds(pts.map(function(p) { return [p.lat, p.lng]; }));
    map.fitBounds(bounds, { padding: [30, 30], maxZoom: 12 });
  }, [loading, coords, mode, zipData]);

  if (loading) return <div className="loading" style={{height:420}}><div className="spinner"/><div className="juice-msg"><span>Squeezing the oranges…</span><span>Juicing!</span><span>Adding the pulp…</span><span>Chilling the glass…</span><span>Pouring it out…</span></div></div>;
  return <div ref={mapRef} className="map-wrap"></div>;
}

function GenderChart({ gender, genderSpecified, total, colors }) {
  var canvasRef = useRef(null); var chartRef = useRef(null);
  useEffect(function() {
    if (!canvasRef.current) return;
    if (chartRef.current) chartRef.current.destroy();
    chartRef.current = new Chart(canvasRef.current, { type:'doughnut', data:{labels:gender.map(function(g){return g.name;}),datasets:[{data:gender.map(function(g){return g.value;}),backgroundColor:colors.slice(0,gender.length),borderWidth:0}]}, options:{responsive:true,maintainAspectRatio:false,cutout:'60%',plugins:{legend:{display:true,position:'right',labels:{boxWidth:12,font:{size:10}}}}} });
    return function(){if(chartRef.current)chartRef.current.destroy();};
  }, [gender]);
  return (<div className="panel"><div className="panel-head">Gender<span className="panel-note">{total-genderSpecified} not specified</span></div><div className="chart-wrap"><canvas ref={canvasRef}></canvas></div></div>);
}

/* ═══ compute() ═══ */
function compute(rows) {
  var EXPECTED_KEYS=['Household ID','Role','HoH Name','Created At','Rec ID','First Name','Last Name','Email','Phone','Street Number','Street Name','City','State','Zip Code','Date of Birth','Age','Grade','Gender','Residency?','Gross Revenue','Refunds','Net Revenue','Items Purchased','First Transaction','Last Transaction','Program Revenue','Facility Revenue','Fee Revenue','Product Revenue'];
  rows = rows.map(function(r) {
    var o={};
    EXPECTED_KEYS.forEach(function(k){o[k]='';});
    Object.keys(r).forEach(function(k){o[k]=r[k]==null?'':String(r[k]);});
    return o;
  });

  // Guest detection: First Name = 'Guest' or email matches guest-user+guest-*
  function isGuest(r) {
    var fn = (r['First Name']||'').trim().toLowerCase();
    var em = (r['Email']||'').trim().toLowerCase();
    return fn === 'guest' || em.indexOf('guest-user+guest-') === 0;
  }
  function isStaff(r) {
    var em = (r['Email']||'').trim().toLowerCase();
    // Exclude guest-user+* emails — they're checkout-only accounts, not staff
    return em.indexOf('@rec.us') !== -1 && em.indexOf('guest-user+') !== 0;
  }

  // Always exclude staff accounts (@rec.us)
  var staffCount = rows.filter(isStaff).length;
  rows = rows.filter(function(r){return !isStaff(r);});

  var allRows = rows;
  var guestRows = rows.filter(isGuest);
  var registeredRows = rows.filter(function(r){return !isGuest(r);});
  var guestCount = guestRows.length;
  var guestHHs = new Set(); guestRows.forEach(function(r){if(r['Household ID'])guestHHs.add(r['Household ID']);});
  var guestHHCount = guestHHs.size;

  // ── Guest analytics (computed once, rendered in Guests tab) ──
  var guestGross=0, guestRefunds=0, guestNet=0, guestItems=0;
  var guestProgRev=0, guestFacRev=0, guestFeeRev=0, guestProdRev=0;
  var guestWithRev=0;
  var guestRevList=[];
  var guestMonthly={};
  var guestHHRevSeen={};
  guestRows.forEach(function(r){
    var hid=r['Household ID']||r['Rec ID']||'';
    if(guestHHRevSeen[hid]) return;
    guestHHRevSeen[hid]=1;
    var gr=num(col(r,['Gross Revenue','gross_revenue']));
    var rf=num(col(r,['Refunds','refunds','Total Refunds']));
    var nt=num(col(r,['Net Revenue','net_revenue']));
    var it=Math.round(num(col(r,['Items Purchased','items_purchased','Item Count'])));
    var pr=num(col(r,['Product Revenue','product_revenue']));
    var pg=num(col(r,['Program Revenue','program_revenue']));
    var fc=num(col(r,['Facility Revenue','facility_revenue']));
    var fe=num(col(r,['Fee Revenue','fee_revenue']));
    guestGross+=gr; guestRefunds+=rf; guestNet+=nt; guestItems+=it;
    guestProdRev+=pr; guestProgRev+=pg; guestFacRev+=fc; guestFeeRev+=fe;
    if(gr>0){guestWithRev++; guestRevList.push(gr);}
    // Monthly trend from Created At
    var ca=col(r,['Created At','created_at']);
    if(ca){var dp=parseDate(ca);if(dp){var ym=dp.getFullYear()+'-'+String(dp.getMonth()+1).padStart(2,'0');guestMonthly[ym]=(guestMonthly[ym]||0)+1;}}
  });
  guestRevList.sort(function(a,b){return a-b;});
  var guestAvgRev=guestWithRev>0?guestGross/guestWithRev:0;
  var guestMedianRev=guestRevList.length>0?pctile(guestRevList,50):0;
  var guestAvgItems=guestWithRev>0?guestItems/guestWithRev:0;
  // Guest revenue distribution buckets
  var guestRevDist=[
    {label:'$0',count:guestHHCount-guestWithRev},
    {label:'$1–10',count:0},{label:'$11–25',count:0},{label:'$26–50',count:0},
    {label:'$51–100',count:0},{label:'$100+',count:0}
  ];
  guestRevList.forEach(function(v){
    if(v<=10)guestRevDist[1].count++;
    else if(v<=25)guestRevDist[2].count++;
    else if(v<=50)guestRevDist[3].count++;
    else if(v<=100)guestRevDist[4].count++;
    else guestRevDist[5].count++;
  });
  // Sorted monthly keys for chart
  var guestMonthKeys=Object.keys(guestMonthly).sort();
  var guestMonthData=guestMonthKeys.map(function(k){return {label:k,count:guestMonthly[k]};});

  // Demographics / Revenue / Strategy use registered-only
  rows = registeredRows;
  var total = rows.length;
  var hohs = rows.filter(function(r){return r['Role']==='Head of Household';});
  var members = rows.filter(function(r){return r['Role']==='Member';});
  var residents = rows.filter(function(r){return r['Residency?'].trim()==='Yes';}).length;

  // Household sizes
  var hhMap = {};
  rows.forEach(function(r){ var h=r['Household ID']; if(h) hhMap[h]=(hhMap[h]||0)+1; });
  var hhCount = Object.keys(hhMap).length;
  var hhSizes = Object.values(hhMap).sort(function(a,b){return a-b;});
  var medianHH = hhSizes[Math.floor(hhSizes.length/2)];
  var avgHH = (hhSizes.reduce(function(s,v){return s+v;},0)/hhSizes.length).toFixed(1);
  var hhSizeDist = {};
  hhSizes.forEach(function(s){ var k = s>=6?'6+':String(s); hhSizeDist[k]=(hhSizeDist[k]||0)+1; });
  var hhSizeData = ['1','2','3','4','5','6+'].filter(function(k){return hhSizeDist[k];}).map(function(k){return {size:k,count:hhSizeDist[k]};});

  // Ages — clamp to 0-110 for sanity
  function safeAge(r) { var a=parseFloat(r['Age']); return (!isNaN(a)&&a>=0&&a<=110)?Math.round(a):null; }
  var allAges = rows.map(safeAge).filter(function(a){return a!==null;});
  var hohAges = hohs.map(safeAge).filter(function(a){return a!==null;});
  var memAges = members.map(safeAge).filter(function(a){return a!==null;});
  allAges.sort(function(a,b){return a-b;}); hohAges.sort(function(a,b){return a-b;}); memAges.sort(function(a,b){return a-b;});
  var medianAge = allAges.length?allAges[Math.floor(allAges.length/2)]:null;
  var medianHohAge = hohAges.length?hohAges[Math.floor(hohAges.length/2)]:null;
  var medianMemAge = memAges.length?memAges[Math.floor(memAges.length/2)]:null;

  // Bad ages (outside 0-110)
  var badAges = rows.filter(function(r){ var a=parseFloat(r['Age']); return !isNaN(a)&&(a<0||a>110); }).length;

  var ageBuckets = [
    {label:'0\u20134',lo:0,hi:4},{label:'5\u20139',lo:5,hi:9},{label:'10\u201312',lo:10,hi:12},
    {label:'13\u201317',lo:13,hi:17},{label:'18\u201324',lo:18,hi:24},{label:'25\u201334',lo:25,hi:34},
    {label:'35\u201344',lo:35,hi:44},{label:'45\u201354',lo:45,hi:54},{label:'55\u201364',lo:55,hi:64},{label:'65+',lo:65,hi:999},
  ];
  var ageDist = ageBuckets.map(function(b){
    var bHoh=0,bMem=0;
    hohs.forEach(function(r){var a=safeAge(r); if(a!==null&&a>=b.lo&&a<=b.hi) bHoh++;});
    members.forEach(function(r){var a=safeAge(r); if(a!==null&&a>=b.lo&&a<=b.hi) bMem++;});
    return {range:b.label,hoh:bHoh,member:bMem};
  }).filter(function(d){return d.hoh+d.member>0;});

  // Gender
  var gMap={};
  rows.forEach(function(r){ var g=r['Gender'].trim(); g=g?g.charAt(0).toUpperCase()+g.slice(1):'Not specified'; gMap[g]=(gMap[g]||0)+1; });
  var gender=Object.entries(gMap).map(function(e){return{name:e[0],value:e[1]};}).sort(function(a,b){return b.value-a.value;});
  var genderSpecified=total-(gMap['Not specified']||0);

  // Grade
  var gradeOrder=['Preschool','Pre-k','Kindergarten','First','Second','Third','Fourth','Fifth','Sixth','Seventh','Eighth','Ninth','Tenth','Eleventh','Twelfth'];
  var grMap={};
  rows.forEach(function(r){ var g=r['Grade'].trim(); if(g){g=g.charAt(0).toUpperCase()+g.slice(1); grMap[g]=(grMap[g]||0)+1;}});
  var gradeData=gradeOrder.filter(function(g){return grMap[g];}).map(function(g){return{grade:g,count:grMap[g]};});
  Object.keys(grMap).forEach(function(g){if(!gradeData.find(function(d){return d.grade===g;})) gradeData.push({grade:g,count:grMap[g]});});
  var withGrade=rows.filter(function(r){return r['Grade'].trim();}).length;

  // Signups
  var months=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  function parseDate(s){if(!s)return null;var d=new Date(s);return isNaN(d.getTime())?null:d;}
  var mMap={};
  rows.forEach(function(r){var d=parseDate(r['Created At']);if(d){var k=d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0');mMap[k]=(mMap[k]||0)+1;}});
  var signups=Object.entries(mMap).sort(function(a,b){return a[0].localeCompare(b[0]);}).map(function(e){var p=e[0].split('-');return{month:months[parseInt(p[1])-1]+" '"+p[0].slice(2),count:e[1]};});
  var running=0;
  var cumulative=Object.entries(mMap).sort(function(a,b){return a[0].localeCompare(b[0]);}).map(function(e){running+=e[1];var p=e[0].split('-');return{month:months[parseInt(p[1])-1]+" '"+p[0].slice(2),cumulative:running};});

  // City
  var cMap={};
  rows.forEach(function(r){var c=r['City'].trim()||'Unknown';cMap[c]=(cMap[c]||0)+1;});
  var topCity=Object.entries(cMap).filter(function(e){return e[0]!=='Unknown'&&e[0]!=='(empty)';}).sort(function(a,b){return b[1]-a[1];})[0];
  topCity=topCity?topCity[0]:'';
  var cityArr=Object.entries(cMap).sort(function(a,b){return b[1]-a[1];});
  var topCities=cityArr.slice(0,8).map(function(e){return{city:e[0],count:e[1]};});
  var otherC=cityArr.slice(8).reduce(function(s,e){return s+e[1];},0);
  if(otherC>0)topCities.push({city:'Other',count:otherC});

  // Residency by age
  var resByAge=ageBuckets.map(function(b){
    var bucket=rows.filter(function(r){var a=safeAge(r);return a!==null&&a>=b.lo&&a<=b.hi;});
    if(!bucket.length)return null;
    var res=bucket.filter(function(r){return r['Residency?'].trim()==='Yes';}).length;
    return{range:b.label,rate:Math.round(res/bucket.length*100),total:bucket.length};
  }).filter(Boolean);

  // Completeness
  var noAge=rows.filter(function(r){return !r['Age'].trim();}).length;
  var noGender=rows.filter(function(r){return !r['Gender'].trim();}).length;
  var noZip=rows.filter(function(r){return !r['Zip Code'].trim();}).length;
  var withPhone=rows.filter(function(r){var v=col(r,['Has Phone','Phone']);return v==='true'||v===true||(typeof v==='string'&&v.trim()&&v!=='false');}).length;
  var withEmergency=rows.filter(function(r){var v=col(r,['Has Emergency Contact']);return v==='true'||v===true;}).length;
  var withPickup=rows.filter(function(r){var v=col(r,['Has Authorized Pickup']);return v==='true'||v===true;}).length;
  var withConfirmed=rows.filter(function(r){var v=col(r,['Account Confirmed','Confirmed At']);return v==='true'||v===true||(typeof v==='string'&&v.trim()&&v!=='false'&&v!=='');}).length;

  // Zip-level aggregation for map
  var zipAgg={};
  var hhZipSeen={};
  rows.forEach(function(r){
    var z=r['Zip Code'].trim();var c=r['City'].trim();var st=r['State'].trim();
    var hid=r['Household ID'];
    if(!z)return;
    if(!zipAgg[z])zipAgg[z]={zip:z,city:c,state:st,hh:0,people:0,revenue:0};
    zipAgg[z].people++;
    if(!hhZipSeen[hid+'|'+z]){hhZipSeen[hid+'|'+z]=1;zipAgg[z].hh++;zipAgg[z].revenue+=num(col(r,['Net Revenue','net_revenue']));}
  });
  var zipData=Object.values(zipAgg).sort(function(a,b){return b.hh-a.hh;}).slice(0,30);

  // Velocity (HoH signups as proxy)
  var now=new Date();
  var d30=new Date(now);d30.setDate(d30.getDate()-30);
  var d90=new Date(now);d90.setDate(d90.getDate()-90);
  var last30=hohs.filter(function(r){var d=parseDate(r['Created At']);return d&&d>=d30;}).length;
  var last90=hohs.filter(function(r){var d=parseDate(r['Created At']);return d&&d>=d90;}).length;
  var peakMonth=signups.reduce(function(best,s){return s.count>best.count?s:best;},{month:'',count:0});

  // Multi-member HH stats
  var multiHH=hhSizes.filter(function(s){return s>1;}).length;
  var maxHH=hhSizes[hhSizes.length-1];

  // ── Revenue (household-level, deduplicated) ──────────────
  function num(v){if(!v||!String(v).trim())return 0;return parseFloat(String(v).replace(/,/g,''))||0;}
  // Resilient column lookup — Metabase JSON keys can differ from CSV headers
  function col(r,names){for(var i=0;i<names.length;i++){if(r[names[i]]!==undefined)return r[names[i]];}
    var keys=Object.keys(r);for(var i=0;i<names.length;i++){var lc=names[i].toLowerCase();for(var j=0;j<keys.length;j++){if(keys[j].toLowerCase()===lc)return r[keys[j]];}}return '';}
  // Debug: log first row's keys so we can see what Metabase returns
  if(rows.length>0){console.log('[users] Row keys:', Object.keys(rows[0])); console.log('[users] Sample Gross Revenue:', col(rows[0],['Gross Revenue','gross_revenue','Gross_Revenue']));}
  var hhRevSeen={};
  rows.forEach(function(r){
    var hid=r['Household ID'];
    if(!hid) return;
    if(!hhRevSeen[hid]) hhRevSeen[hid]={gross:num(col(r,['Gross Revenue','gross_revenue'])),refunds:num(col(r,['Refunds','refunds','Total Refunds'])),net:num(col(r,['Net Revenue','net_revenue'])),items:Math.round(num(col(r,['Items Purchased','items_purchased','Item Count']))),res:col(r,['Residency?','residency?','Residency']).trim()==='Yes',
      progRev:num(col(r,['Program Revenue','program_revenue'])),facRev:num(col(r,['Facility Revenue','facility_revenue'])),feeRev:num(col(r,['Fee Revenue','fee_revenue'])),prodRev:num(col(r,['Product Revenue','product_revenue']))};
  });
  var hhRevList=Object.values(hhRevSeen);
  var hasRevData=hhRevList.some(function(h){return h.gross>0||h.refunds>0;});
  var spendingHH=hhRevList.filter(function(h){return h.net>0;});
  var unbookedHH=hhRevList.filter(function(h){return h.net===0;});
  var totalGross=hhRevList.reduce(function(s,h){return s+h.gross;},0);
  var totalRefunds=hhRevList.reduce(function(s,h){return s+h.refunds;},0);
  var totalNet=hhRevList.reduce(function(s,h){return s+h.net;},0);
  var spendNets=spendingHH.map(function(h){return h.net;}).sort(function(a,b){return a-b;});
  var medianRev=spendNets.length?spendNets[Math.floor(spendNets.length/2)]:0;
  var avgRev=spendNets.length?(totalNet/spendNets.length):0;
  function pctile(arr,p){if(!arr.length)return 0;var i=Math.floor(arr.length*p/100);return arr[Math.min(i,arr.length-1)];}

  // Revenue distribution buckets
  var revBuckets=[{label:'$0',lo:0,hi:0},{label:'$1\u2013$50',lo:0.01,hi:50},{label:'$51\u2013$100',lo:50.01,hi:100},{label:'$101\u2013$250',lo:100.01,hi:250},{label:'$251\u2013$500',lo:250.01,hi:500},{label:'$501\u2013$1K',lo:500.01,hi:1000},{label:'$1K\u2013$2K',lo:1000.01,hi:2000},{label:'$2K+',lo:2000.01,hi:999999}];
  var revDist=revBuckets.map(function(b){var c=hhRevList.filter(function(h){return h.net>=b.lo&&h.net<=b.hi;}).length;return{range:b.label,count:c};}).filter(function(d){return d.count>0;});

  // Revenue by residency
  var resSpend=spendingHH.filter(function(h){return h.res;});
  var nonresSpend=spendingHH.filter(function(h){return !h.res;});
  var resAvg=resSpend.length?(resSpend.reduce(function(s,h){return s+h.net;},0)/resSpend.length):0;
  var nonresAvg=nonresSpend.length?(nonresSpend.reduce(function(s,h){return s+h.net;},0)/nonresSpend.length):0;
  var resMedian=resSpend.length?resSpend.map(function(h){return h.net;}).sort(function(a,b){return a-b;})[Math.floor(resSpend.length/2)]:0;
  var nonresMedian=nonresSpend.length?nonresSpend.map(function(h){return h.net;}).sort(function(a,b){return a-b;})[Math.floor(nonresSpend.length/2)]:0;
  var resByRes=[{group:'Resident',avg:Math.round(resAvg),median:Math.round(resMedian),count:resSpend.length},{group:'Non-Resident',avg:Math.round(nonresAvg),median:Math.round(nonresMedian),count:nonresSpend.length}];

  // Revenue by HH size
  var sizeRevMap={};
  Object.keys(hhRevSeen).forEach(function(hid){
    var h=hhRevSeen[hid];
    var sz=Math.min(hhMap[hid]||1,6);var k=sz<6?String(sz):'6+';
    if(!sizeRevMap[k])sizeRevMap[k]={spend:[],total:0,all:0};
    sizeRevMap[k].all++;
    if(h.net>0){sizeRevMap[k].spend.push(h.net);sizeRevMap[k].total+=h.net;}
  });
  var revBySize=['1','2','3','4','5','6+'].filter(function(k){return sizeRevMap[k];}).map(function(k){var d=sizeRevMap[k];return{size:k,avg:d.spend.length?Math.round(d.total/d.spend.length):0,count:d.spend.length,total:Math.round(d.total)};});

  // Pareto curve
  var paretoNets=spendNets.slice().reverse();
  var paretoTotal=paretoNets.reduce(function(s,v){return s+v;},0);
  var paretoData=[];var pRun=0;
  [5,10,15,20,25,30,40,50,60,70,80,90,100].forEach(function(p){
    var idx=Math.floor(paretoNets.length*p/100);
    var slice=paretoNets.slice(0,idx);
    var sum=slice.reduce(function(s,v){return s+v;},0);
    paretoData.push({hhPct:p+'%',revPct:Math.round(sum/paretoTotal*100)});
  });

  // ── Revenue by category ──────────────────────────────────
  var totalProgRev=hhRevList.reduce(function(s,h){return s+h.progRev;},0);
  var totalFacRev=hhRevList.reduce(function(s,h){return s+h.facRev;},0);
  var totalFeeRev=hhRevList.reduce(function(s,h){return s+h.feeRev;},0);
  var totalProdRev=hhRevList.reduce(function(s,h){return s+h.prodRev;},0);
  var catData=[
    {cat:'Programs',value:Math.round(totalProgRev),color:'#7c3aed'},
    {cat:'Facilities',value:Math.round(totalFacRev),color:'#0d9488'},
    {cat:'Fees',value:Math.round(totalFeeRev),color:'#f59e0b'},
    {cat:'Products',value:Math.round(totalProdRev),color:'#f43f5e'},
  ].filter(function(d){return d.value>0;});
  var hasCatData=catData.some(function(d){return d.value>0;});

  // Cross-sell: HHs by category usage
  var progOnly=hhRevList.filter(function(h){return h.progRev>0&&h.facRev===0;}).length;
  var facOnly=hhRevList.filter(function(h){return h.facRev>0&&h.progRev===0;}).length;
  var bothProgFac=hhRevList.filter(function(h){return h.progRev>0&&h.facRev>0;}).length;
  var progHH=hhRevList.filter(function(h){return h.progRev>0;}).length;
  var facHH=hhRevList.filter(function(h){return h.facRev>0;}).length;

  // ── Strategy tab computations ───────────────────────────
  // HoH info map for CSV exports — must be built before cross-sell CSV lists
  var hohInfoMap={};
  hohs.forEach(function(r){
    var hid=r['Household ID'];
    if(!hid) return;
    if(!hohInfoMap[hid]) hohInfoMap[hid]={
      'First Name':r['First Name'],'Last Name':r['Last Name'],'Email':col(r,['Email','email']),
      'Phone':col(r,['Phone','phone']),'City':r['City'],'State':r['State'],'Zip Code':r['Zip Code'],
      'Residency':r['Residency?'],'Signup Date':r['Created At'],
      'HH Size':hhMap[hid]||1,'Net Revenue':num(col(r,['Net Revenue','net_revenue'])),
    };
  });

  // Cross-sell CSV lists
  var progNoFacCSV=[];
  Object.keys(hhRevSeen).forEach(function(hid){if(hhRevSeen[hid].progRev>0&&hhRevSeen[hid].facRev===0&&hohInfoMap[hid])progNoFacCSV.push(hohInfoMap[hid]);});
  var facNoProgCSV=[];
  Object.keys(hhRevSeen).forEach(function(hid){if(hhRevSeen[hid].facRev>0&&hhRevSeen[hid].progRev===0&&hohInfoMap[hid])facNoProgCSV.push(hohInfoMap[hid]);});
  var bothProgFacCSV=[];
  Object.keys(hhRevSeen).forEach(function(hid){if(hhRevSeen[hid].progRev>0&&hhRevSeen[hid].facRev>0&&hohInfoMap[hid])bothProgFacCSV.push(hohInfoMap[hid]);});

  // 1. Unbooked profile vs spender profile
  var unbookedIds=new Set(hhRevList.filter(function(h){return h.net===0;}).map(function(h,i){return Object.keys(hhRevSeen)[i];}));
  // Rebuild unbooked IDs properly
  unbookedIds=new Set();
  Object.keys(hhRevSeen).forEach(function(hid){if(hhRevSeen[hid].net===0)unbookedIds.add(hid);});
  var spenderIds=new Set();
  Object.keys(hhRevSeen).forEach(function(hid){if(hhRevSeen[hid].net>0)spenderIds.add(hid);});

  function profileSegment(idSet){
    var seg=rows.filter(function(r){return idSet.has(r['Household ID']);});
    var segHohs=seg.filter(function(r){return r['Role']==='Head of Household';});
    var segRes=segHohs.filter(function(r){return r['Residency?'].trim()==='Yes';}).length;
    var segSizes=[];
    var seen={};segHohs.forEach(function(r){var h=r['Household ID'];if(!seen[h]){seen[h]=1;segSizes.push(hhMap[h]||1);}});
    segSizes.sort(function(a,b){return a-b;});
    var daysArr=segHohs.map(function(r){var d=parseDate(r['Created At']);return d?Math.round((now-d)/(86400000)):null;}).filter(function(v){return v!==null;});
    daysArr.sort(function(a,b){return a-b;});
    return {
      count:idSet.size,resPct:segHohs.length?Math.round(segRes/segHohs.length*100):0,
      medianSize:segSizes.length?segSizes[Math.floor(segSizes.length/2)]:0,
      medianDaysOld:daysArr.length?daysArr[Math.floor(daysArr.length/2)]:0,
    };
  }
  var unbookedProfile=profileSegment(unbookedIds);
  var spenderProfile=profileSegment(spenderIds);

  // Unbooked CSV list
  var unbookedCSV=[];
  unbookedIds.forEach(function(hid){if(hohInfoMap[hid])unbookedCSV.push(hohInfoMap[hid]);});

  // 2. Revenue by age group (avg HH revenue for HHs with member in each bracket)
  var revByAgeBracket=ageBuckets.map(function(b){
    var hhIdsInBracket=new Set();
    rows.forEach(function(r){var a=safeAge(r);if(a!==null&&a>=b.lo&&a<=b.hi)hhIdsInBracket.add(r['Household ID']);});
    var revs=[];
    hhIdsInBracket.forEach(function(hid){if(hhRevSeen[hid]&&hhRevSeen[hid].net>0)revs.push(hhRevSeen[hid].net);});
    var memCount=rows.filter(function(r){var a=safeAge(r);return a!==null&&a>=b.lo&&a<=b.hi;}).length;
    return {range:b.label,hhCount:hhIdsInBracket.size,spendingHH:revs.length,avgRev:revs.length?Math.round(revs.reduce(function(s,v){return s+v;},0)/revs.length):0,memberCount:memCount};
  }).filter(function(d){return d.hhCount>0;});

  // 3. Grade gap — kids per grade vs avg HH revenue for HHs with kid in that grade
  var gradeRevData=gradeData.map(function(g){
    var hhIdsWithGrade=new Set();
    rows.forEach(function(r){var gr=r['Grade'].trim();if(gr&&(gr.charAt(0).toUpperCase()+gr.slice(1))===g.grade)hhIdsWithGrade.add(r['Household ID']);});
    var revs=[];
    hhIdsWithGrade.forEach(function(hid){if(hhRevSeen[hid]&&hhRevSeen[hid].net>0)revs.push(hhRevSeen[hid].net);});
    return {grade:g.grade,kids:g.count,avgHHRev:revs.length?Math.round(revs.reduce(function(s,v){return s+v;},0)/revs.length):0};
  });

  // 3b. Gender revenue breakdown
  var genderRevMap={};
  var genderRevTotal=0;
  rows.forEach(function(r){
    var g=(col(r,['Gender','gender'])||'').trim();
    var hid=r['Household ID'];
    if(!g||!hid||!hhRevSeen[hid]) return;
    if(!genderRevMap[g]) genderRevMap[g]={gender:g,hh:new Set(),rev:0};
    if(!genderRevMap[g].hh.has(hid)){genderRevMap[g].hh.add(hid);genderRevMap[g].rev+=hhRevSeen[hid].net;}
  });
  var genderRevData=Object.values(genderRevMap).map(function(d){return {gender:d.gender,hhCount:d.hh.size,rev:Math.round(d.rev)};}).sort(function(a,b){return b.rev-a.rev;});
  genderRevTotal=genderRevData.reduce(function(s,d){return s+d.rev;},0);
  var genderRevCoverage=genderSpecified>0?Math.round(genderSpecified/total*100):0;

  // 4. Revenue levers
  var levers=[];
  if(unbookedIds.size>0) levers.push({title:'Convert unbooked households',desc:unbookedIds.size+' households signed up but never purchased. If they converted at the median spend rate:',opp:Math.round(unbookedIds.size*medianRev),segment:'unbooked'});
  if(nonresAvg>0&&resAvg>nonresAvg) levers.push({title:'Close the non-resident spend gap',desc:'Non-residents avg $'+Math.round(nonresAvg)+' vs residents $'+Math.round(resAvg)+'. If non-resident spenders matched resident levels:',opp:Math.round((resAvg-nonresAvg)*nonresSpend.length),segment:'nonresident'});
  var size1Conv=0,size2Conv=0;
  if(sizeRevMap['1']){size1Conv=sizeRevMap['1'].spend.length/sizeRevMap['1'].all;}
  if(sizeRevMap['2']){size2Conv=sizeRevMap['2'].spend.length/sizeRevMap['2'].all;}
  if(size1Conv<size2Conv&&sizeRevMap['1']) levers.push({title:'Activate single-person households',desc:'Solo HH convert at '+Math.round(size1Conv*100)+'% vs '+Math.round(size2Conv*100)+'% for pairs. If solo conversion matched pairs:',opp:Math.round((size2Conv-size1Conv)*sizeRevMap['1'].all*(sizeRevMap['1'].spend.length>0?sizeRevMap['1'].total/sizeRevMap['1'].spend.length:medianRev)),segment:'solo'});

  // 5. Lapsing households (last txn > 90 days ago)
  var lapsingIds=new Set();
  rows.forEach(function(r){
    if(r['Role']!=='Head of Household')return;
    var hid=r['Household ID'];
    var lastTxn=parseDate(col(r,['Last Transaction','last_transaction']));
    if(lastTxn&&(now-lastTxn)>90*86400000)lapsingIds.add(hid);
  });
  var lapsingCSV=[];
  lapsingIds.forEach(function(hid){if(hohInfoMap[hid]){var info=Object.assign({},hohInfoMap[hid]);lapsingCSV.push(info);}});

  // Non-resident CSV
  var nonresCSV=[];
  Object.keys(hohInfoMap).forEach(function(hid){if(hohInfoMap[hid]['Residency']!=='Yes')nonresCSV.push(hohInfoMap[hid]);});

  // Solo unbooked CSV
  var soloUnbookedCSV=[];
  unbookedIds.forEach(function(hid){if(hohInfoMap[hid]&&(hhMap[hid]||1)===1)soloUnbookedCSV.push(hohInfoMap[hid]);});

  return {
    total:total, hohCount:hohs.length, memCount:members.length,
    residents:residents, nonResidents:total-residents, resPct:((residents/total)*100).toFixed(1),
    hhCount:hhCount, medianHH:medianHH, avgHH:avgHH, hhSizeData:hhSizeData, multiHH:multiHH, maxHH:maxHH,
    medianAge:medianAge, medianHohAge:medianHohAge, medianMemAge:medianMemAge,
    minAge:allAges[0], maxAge:allAges[allAges.length-1], withAge:allAges.length,
    badAges:badAges, ageDist:ageDist,
    gender:gender, genderSpecified:genderSpecified,
    gradeData:gradeData, withGrade:withGrade,
    signups:signups, cumulative:cumulative,
    cities:topCities, topCity:topCity, resByAge:resByAge,
    noAge:noAge, noGender:noGender, noZip:noZip, zipData:zipData,
    withPhone:withPhone, withEmergency:withEmergency, withPickup:withPickup, withConfirmed:withConfirmed,
    last30:last30, last90:last90, peakMonth:peakMonth,
    // Revenue
    hasRevData:hasRevData, totalGross:totalGross, totalRefunds:totalRefunds, totalNet:totalNet,
    spendingHH:spendingHH.length, unbookedHH:unbookedHH.length,
    medianRev:medianRev, avgRev:avgRev,
    revP25:pctile(spendNets,25), revP75:pctile(spendNets,75), revP90:pctile(spendNets,90), revP95:pctile(spendNets,95),
    revDist:revDist, resByRes:resByRes, revBySize:revBySize, paretoData:paretoData,
    refundRate:totalGross>0?((totalRefunds/totalGross)*100).toFixed(1):'0',
    conversionRate:hhCount>0?((spendingHH.length/hhCount)*100).toFixed(0):'0',
    hhOver100:hhRevList.filter(function(h){return h.net>100;}).length,
    hhOver500:hhRevList.filter(function(h){return h.net>500;}).length,
    // Strategy
    unbookedProfile:unbookedProfile, spenderProfile:spenderProfile,
    unbookedCSV:unbookedCSV, lapsingCSV:lapsingCSV, nonresCSV:nonresCSV, soloUnbookedCSV:soloUnbookedCSV,
    revByAgeBracket:revByAgeBracket, gradeRevData:gradeRevData,
    genderRevData:genderRevData, genderRevTotal:genderRevTotal, genderRevCoverage:genderRevCoverage,
    levers:levers, lapsingCount:lapsingIds.size,
    catData:catData, hasCatData:hasCatData,
    totalProgRev:totalProgRev, totalFacRev:totalFacRev, totalFeeRev:totalFeeRev, totalProdRev:totalProdRev,
    progOnly:progOnly, facOnly:facOnly, bothProgFac:bothProgFac, progHH:progHH, facHH:facHH,
    progNoFacCSV:progNoFacCSV, facNoProgCSV:facNoProgCSV, bothProgFacCSV:bothProgFacCSV,
    // Guests
    guestCount:guestCount, guestHHCount:guestHHCount, totalWithGuests:allRows.length, staffCount:staffCount,
    guestGross:guestGross, guestRefunds:guestRefunds, guestNet:guestNet, guestItems:guestItems,
    guestProdRev:guestProdRev, guestProgRev:guestProgRev, guestFacRev:guestFacRev, guestFeeRev:guestFeeRev,
    guestWithRev:guestWithRev, guestAvgRev:guestAvgRev, guestMedianRev:guestMedianRev, guestAvgItems:guestAvgItems,
    guestRevDist:guestRevDist, guestMonthData:guestMonthData,
  };
}

/* ═══ Insights blob ═══ */
function buildInsightsBlob(s, currentTab) {
  var base = {
    totalPeople:s.total, households:s.hhCount, hohCount:s.hohCount, memberCount:s.memCount,
    medianHouseholdSize:s.medianHH, residentPct:s.resPct,
    guestAccounts:s.guestCount, guestHouseholds:s.guestHHCount,
  };
  if (currentTab === 'revenue') return Object.assign(base, {
    focus:'REVENUE ANALYSIS',
    totalNet:Math.round(s.totalNet), totalGross:Math.round(s.totalGross), totalRefunds:Math.round(s.totalRefunds),
    spendingHH:s.spendingHH, unbookedHH:s.unbookedHH, conversionPct:s.conversionRate, refundRatePct:s.refundRate,
    medianPerHH:Math.round(s.medianRev), avgPerHH:Math.round(s.avgRev),
    residentAvgSpend:Math.round(s.resByRes[0]&&s.resByRes[0].avg||0), nonResidentAvgSpend:Math.round(s.resByRes[1]&&s.resByRes[1].avg||0),
    programRevenue:Math.round(s.totalProgRev), facilityRevenue:Math.round(s.totalFacRev),
    programHH:s.progHH, facilityHH:s.facHH, bothHH:s.bothProgFac,
    revBySize:s.revBySize.map(function(d){return 'Size '+d.size+': '+d.count+' HH, avg $'+d.avg;}).join(', '),
  });
  if (currentTab === 'strategy') return Object.assign(base, {
    focus:'STRATEGIC OPPORTUNITIES',
    unbookedHH:s.unbookedHH, unbookedProfile:s.unbookedProfile, spenderProfile:s.spenderProfile,
    lapsingHH:s.lapsingCount, conversionPct:s.conversionRate,
    levers:s.levers.map(function(l){return l.title+': +$'+l.opp;}),
    progOnlyHH:s.progOnly, facOnlyHH:s.facOnly, bothProgFacHH:s.bothProgFac,
    revByAge:s.revByAgeBracket.map(function(d){return d.range+': '+d.spendingHH+' HH, avg $'+d.avgRev;}).join(', '),
    gradeGap:s.gradeRevData.map(function(d){return d.grade+': '+d.kids+' kids, avg HH $'+d.avgHHRev;}).join(', '),
  });
  if (currentTab === 'guests') return Object.assign(base, {
    focus:'GUEST CHECKOUT ANALYSIS',
    guestAccounts:s.guestCount, guestHouseholds:s.guestHHCount,
    guestGrossRevenue:Math.round(s.guestGross), guestNetRevenue:Math.round(s.guestNet),
    guestRefunds:Math.round(s.guestRefunds), guestTransactingAccounts:s.guestWithRev,
    avgGuestTransaction:s.guestAvgRev.toFixed(2), medianGuestTransaction:s.guestMedianRev.toFixed(2),
    avgItemsPerGuest:s.guestAvgItems.toFixed(1), totalGuestItems:s.guestItems,
    guestProductRevenue:Math.round(s.guestProdRev), guestProgramRevenue:Math.round(s.guestProgRev),
    guestFacilityRevenue:Math.round(s.guestFacRev),
    guestShareOfRevenue:((s.guestGross/(s.totalGross+s.guestGross))*100).toFixed(1)+'%',
  });
  // Demographics (default)
  return Object.assign(base, {
    focus:'DEMOGRAPHIC ANALYSIS',
    avgHouseholdSize:s.avgHH, maxHouseholdSize:s.maxHH,
    signupVelocity:{last30HH:s.last30,last90HH:s.last90}, peakMonth:s.peakMonth,
    age:{withData:s.withAge,medianAll:s.medianAge,medianHoH:s.medianHohAge,medianMember:s.medianMemAge,badEntries:s.badAges},
    ageDistribution:s.ageDist.map(function(d){return d.range+':'+d.hoh+'hoh+'+d.member+'mem';}),
    gender:s.gender.map(function(g){return g.name+':'+g.value;}).join(', '),
    grade:{withData:s.withGrade,breakdown:s.gradeData.map(function(g){return g.grade+':'+g.count;}).join(', ')},
    topCities:s.cities.slice(0,6).map(function(c){return c.city+':'+c.count;}).join(', '),
    dataGaps:{ageMissing:s.noAge,genderMissing:s.noGender,zipMissing:s.noZip},
    authorizedPickups:{withPickup:s.withPickup,pct:pickupPct},
  });
}

/* ═══ Auto observations ═══ */
function E(emoji){return React.createElement('span',{className:'emoji'},emoji+' ');}
function Tip({label, tip}){
  if(!tip) return label;
  return <span className="tip-wrap">{label}<span className="tip-icon">i</span><span className="tip-bubble">{tip}</span></span>;
}
function buildObs(s) {
  var o=[];
  o.push({e:'\uD83D\uDC68\u200D\uD83D\uDC69\u200D\uD83D\uDC67\u200D\uD83D\uDC66',l:'Households',t:s.hhCount+' households, '+s.total+' people total. '+s.hohCount+' HoH + '+s.memCount+' members. Median HH size: '+s.medianHH+'.'});
  if(s.medianMemAge!==null) o.push({e:'\uD83D\uDC76',l:'Ages',t:'Member median age '+s.medianMemAge+' vs HoH median '+s.medianHohAge+'. '+(s.medianMemAge<18?'Primarily a family/youth community.':'Mixed adult household base.')});
  if(s.peakMonth.count>s.total*0.15) o.push({e:'\uD83D\uDCC8',l:'Growth',t:s.peakMonth.month+' peak: '+s.peakMonth.count+' signups ('+Math.round(s.peakMonth.count/s.total*100)+'% of all).'});
  o.push({e:'\uD83C\uDFE0',l:'Residency',t:s.resPct+'% residency rate. '+(parseFloat(s.resPct)>75?'Strong local base.':parseFloat(s.resPct)>50?'Moderate local mix.':'Heavy non-resident usage.')});
  if(s.withGrade>10) o.push({e:'\uD83C\uDF93',l:'Grades',t:s.withGrade+' people with grade data. Most common: '+s.gradeData[0].grade+' ('+s.gradeData[0].count+'). Covers preschool through high school.'});
  var gapPct=Math.round(Math.max(s.noAge,s.noGender)/s.total*100);
  if(gapPct>15) o.push({e:'\u26A0\uFE0F',l:'Data Gap',t:'Up to '+gapPct+'% missing demographics. '+s.noAge+' missing age, '+s.noGender+' missing gender.'});

  if(s.topCity) o.push({e:'\uD83D\uDDFA\uFE0F',l:'Geography',t:Math.round(s.cities[0].count/s.total*100)+'% from '+s.topCity+'. Spans '+s.cities.length+'+ cities.'});
  if(s.guestCount>0) o.push({e:'\uD83D\uDC64',l:'Guest Accounts',t:s.guestCount.toLocaleString()+' guest checkout accounts ($'+Math.round(s.guestGross).toLocaleString()+' revenue). See the Guests tab for full analytics.'});
  return o;
}
function buildRevObs(s) {
  if(!s.hasRevData) return [];
  var o=[];
  o.push({e:'\uD83D\uDCB0',l:'Total Revenue',t:'$'+Math.round(s.totalNet).toLocaleString()+' net across '+s.spendingHH+' spending households. $'+Math.round(s.totalRefunds).toLocaleString()+' in refunds ('+s.refundRate+'%).'});
  o.push({e:'\uD83D\uDCCA',l:'Typical Spend',t:'Median household spends $'+Math.round(s.medianRev)+', avg $'+Math.round(s.avgRev)+'. Top 5% spend $'+Math.round(s.revP95)+'+'});
  o.push({e:'\uD83D\uDEAA',l:'Conversion',t:s.conversionRate+'% of households have purchased ('+s.spendingHH+' of '+s.hhCount+'). '+s.unbookedHH+' signed up but never bought.'});
  if(s.resByRes&&s.resByRes[0]&&s.resByRes[1]) o.push({e:'\uD83C\uDFE0',l:'Resident Gap',t:'Residents avg $'+s.resByRes[0].avg+' vs non-residents $'+s.resByRes[1].avg+'. '+(s.resByRes[0].avg>s.resByRes[1].avg*1.5?'Residents spend significantly more.':'Relatively balanced spend.')});
  if(s.hasCatData&&s.totalProgRev>0) o.push({e:'\uD83C\uDFAF',l:'Category Mix',t:'Programs: $'+Math.round(s.totalProgRev).toLocaleString()+', Facilities: $'+Math.round(s.totalFacRev).toLocaleString()+'. '+s.progHH+' HH use programs, '+s.facHH+' book facilities.'});
  if(s.revBySize&&s.revBySize.length>1) o.push({e:'\uD83D\uDC6A',l:'Family Spend',t:'Larger families spend more: size 1 avg $'+(s.revBySize[0]?.avg||0)+' vs size 3+ avg $'+(s.revBySize[2]?.avg||s.revBySize[1]?.avg||0)+'. Family programming drives revenue.'});
  return o;
}
function buildStratObs(s) {
  if(!s.hasRevData) return [];
  var o=[];
  if(s.unbookedHH>0) o.push({e:'\uD83D\uDCA1',l:'Unbooked Gap',t:s.unbookedHH+' households signed up but never purchased. If converted at median rate, that\u2019s +$'+Math.round(s.unbookedHH*s.medianRev).toLocaleString()+' potential revenue.'});
  if(s.lapsingCount>0) o.push({e:'\u23F0',l:'Lapsing Risk',t:s.lapsingCount+' previously active households haven\u2019t purchased in 90+ days. These are re-engagement targets.'});
  if(s.progOnly>0) o.push({e:'\uD83C\uDFAE',l:'Cross-Sell',t:s.progOnly+' HH use programs but never booked a facility. '+s.facOnly+' book facilities but aren\u2019t in programs. Cross-sell opportunity.'});
  if(s.gradeRevData&&s.gradeRevData.length>0){var top=s.gradeRevData[0];o.push({e:'\uD83C\uDF93',l:'Grade Insight',t:'Highest concentration: '+top.grade+' ('+top.kids+' kids). HH with '+top.grade+' students avg $'+top.avgHHRev+' spend.'});}
  if(s.levers&&s.levers.length>0){var totalOpp=s.levers.reduce(function(sum,l){return sum+l.opp;},0);o.push({e:'\uD83D\uDE80',l:'Total Opportunity',t:s.levers.length+' revenue levers identified totaling +$'+Math.round(totalOpp).toLocaleString()+' in potential revenue.'});}
  return o;
}

/* ═══ MAIN ═══ */
function App() {
  var [rows, setRows] = useState(null);
  var [loading, setLoading] = useState(true);
  var [error, setError] = useState(null);
  var [cacheInfo, setCacheInfo] = useState(null);
  var [refreshing, setRefreshing] = useState(false);
  var [tab, setTab] = useState('demo');
  var [mapMode, setMapMode] = useState('hh');

  // ── Cross-tab infrastructure ──────────────────────────────
  // Tabs that appear conditionally based on org's enabled reports
  var CROSS_TABS = [
    { key:'products',  report:'products',  label:'Products',   icon:'\uD83D\uDED2', badge:null, color:'#db2777' },
  ];
  var orgReports = useMemo(function(){
    try { return (window.ORG_CONFIG && window.ORG_CONFIG.reports) || []; } catch(e){ return []; }
  }, []);
  var [crossData, setCrossData] = useState({});   // { fasttrack: { rows:[], loading:false, error:null }, ... }
  var [crossComputed, setCrossComputed] = useState({});  // { fasttrack: { ...analytics }, ... }
  var [fillCapacity, setFillCapacity] = useState(null); // programs data for capacity
  var [fillSelected, setFillSelected] = useState(null); // selected section names for chart
  var [fillSort, setFillSort] = useState({ col: 'total', dir: 'desc' }); // sortable table

  function fetchCrossTab(key, report) {
    if (crossData[key] && (crossData[key].rows || crossData[key].loading)) return;
    setCrossData(function(prev){
      var next = Object.assign({}, prev);
      next[key] = { rows:null, loading:true, error:null };
      return next;
    });
    fetch(withToken('/'+orgSlug+'/'+report+'/api/data'))
      .then(function(r){if(!r.ok)throw new Error('HTTP '+r.status);return r.json();})
      .then(function(j){
        var rows = j.rows||j.data||j||[];
        setCrossData(function(prev){
          var next = Object.assign({}, prev);
          next[key] = { rows:rows, loading:false, error:null };
          return next;
        });
      })
      .catch(function(e){
        setCrossData(function(prev){
          var next = Object.assign({}, prev);
          next[key] = { rows:null, loading:false, error:e.message };
          return next;
        });
      });
  }

  function switchTab(t){
    setTab(t);setInsights(null);setInsightsError(null);
    // Lazy-fetch cross-tab data
    var ct = CROSS_TABS.find(function(c){return c.key===t;});
    if (ct && orgReports.indexOf(ct.gate || ct.report) !== -1) fetchCrossTab(ct.key, ct.report);
    // Fill Rate also needs programs data for capacity
    if (t === 'fillrate' && !fillCapacity) {
      fetch(withToken('/'+orgSlug+'/programs/api/data'))
        .then(function(r){if(!r.ok)throw new Error('HTTP '+r.status);return r.json();})
        .then(function(j){setFillCapacity(j.rows||j.data||j||[]);})
        .catch(function(){setFillCapacity([]);});
    }
  }
  var [insights, setInsights] = useState(null);
  var [insightsLoading, setInsightsLoading] = useState(false);
  var [insightsError, setInsightsError] = useState(null);
  var [insightsTraceId, setInsightsTraceId] = useState(null);
  var [fbSent, setFbSent] = useState(false);
  var [fbMode, setFbMode] = useState(null);
  var [fbComment, setFbComment] = useState('');

  useEffect(function() {
    fetch(withToken('/'+orgSlug+'/'+reportType+'/api/data'))
      .then(function(r){if(!r.ok)throw new Error('HTTP '+r.status);return r.json();})
      .then(function(j){
        setRows(j.rows||j);
        if(j.meta&&j.meta.cached_at) setCacheInfo({at:j.meta.cached_at,stale:!!j.meta.stale_cache});
        else setCacheInfo(null);
        setLoading(false);
      })
      .catch(function(e){setError(e.message);setLoading(false);});
  }, []);

  // Defer heavy compute to next frame so the page shell renders instantly
  var [s, setS] = useState(null);
  var [computing, setComputing] = useState(false);
  useEffect(function(){
    if (!rows) { setS(null); return; }
    setComputing(true);
    var id = setTimeout(function(){
      setS(compute(rows));
      setComputing(false);
    }, 0);
    return function(){ clearTimeout(id); };
  }, [rows]);

  var observations = useMemo(function(){return s?buildObs(s):[];}, [s]);
  var revObservations = useMemo(function(){return s?buildRevObs(s):[];}, [s]);
  var stratObservations = useMemo(function(){return s?buildStratObs(s):[];}, [s]);


  var sendInsightsFeedback = useCallback(function(score) {
    if (!insightsTraceId) return;
    fetch(withToken('/' + orgSlug + '/' + reportType + '/api/insights/score'), {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ traceId: insightsTraceId, score: score, comment: score === 0 ? fbComment : '' }),
    }).catch(function(){});
    setFbSent(true); setFbMode(null);
  }, [insightsTraceId, fbComment]);

  var getInsights = useCallback(function() {
    if(!s||insightsLoading)return;
    setInsightsLoading(true);setInsightsError(null);
    var insightsPayload = (tab === 'fillrate' && fillRateAnalytics) ? {
        focus: 'FILL RATE ANALYSIS — analyze enrollment velocity, demand patterns, and pricing implications',
        totalSections: fillRateAnalytics.totalSections,
        atCapacity: fillRateAnalytics.atCapacity,
        avgFillPct: fillRateAnalytics.avgPct,
        fastestFill: fillRateAnalytics.fastestFill ? { section: fillRateAnalytics.fastestFill.section, program: fillRateAnalytics.fastestFill.program, days: fillRateAnalytics.fastestFill.fillDays, enrolled: fillRateAnalytics.fastestFill.total, capacity: fillRateAnalytics.fastestFill.capacity } : null,
        slowestFill: fillRateAnalytics.slowestFill ? { section: fillRateAnalytics.slowestFill.section, program: fillRateAnalytics.slowestFill.program, days: fillRateAnalytics.slowestFill.fillDays, enrolled: fillRateAnalytics.slowestFill.total, capacity: fillRateAnalytics.slowestFill.capacity } : null,
        topSections: fillRateAnalytics.top.slice(0, 15).map(function(sec){ return { section: sec.section, program: sec.program, enrolled: sec.total, capacity: sec.capacity||null, fillPct: sec.fillPct, fillDays: sec.fillDays }; }),
        overCapacity: fillRateAnalytics.sections.filter(function(s){ return s.fillPct && s.fillPct > 100; }).length,
        underHalf: fillRateAnalytics.sections.filter(function(s){ return s.fillPct !== null && s.fillPct < 50; }).length,
      } : buildInsightsBlob(s, tab);
    fetch(withToken('/'+orgSlug+'/'+reportType+'/api/insights'),{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(insightsPayload)})
    .then(function(r){return r.json();})
    .then(function(j){if(!j.ok)throw new Error(j.error||'Failed');setInsights(j.insights||[]);setInsightsTraceId(j.traceId||null);setFbSent(false);setFbMode(null);setFbComment('');})
    .catch(function(e){setInsightsError(e.message);})
    .finally(function(){setInsightsLoading(false);});
  }, [s,insightsLoading]);

  var prodAnalytics = useMemo(function(){
    var cd = crossData.products;
    if (!cd || !cd.rows || cd.rows.length === 0) return null;
    var pf = function(v){ return parseFloat(String(v||0).replace(/[,$]/g,''))||0; };
    var totalQty=0, totalRev=0, totalRefunds=0, totalNet=0;
    var prodMap={}, deskMap={}, dateMap={};
    cd.rows.forEach(function(r){
      var name = r['Product Name']||r['Product']||'(unnamed)';
      var desk = r['Desk Location']||'(No desk)';
      var dateRaw = r['Date']||'';
      var qty = Math.round(pf(r['Qty Sold']||r['Qty']));
      var rev = pf(r['Revenue ($)']||r['Revenue']);
      var ref = pf(r['Refunds ($)']||r['Refunds']);
      var net = r['Net Revenue ($)']!=null||r['Net Revenue']!=null ? pf(r['Net Revenue ($)']||r['Net Revenue']) : rev - ref;
      totalQty+=qty; totalRev+=rev; totalRefunds+=ref; totalNet+=net;
      if(!prodMap[name]) prodMap[name]={qty:0,rev:0,refunds:0,net:0};
      prodMap[name].qty+=qty; prodMap[name].rev+=rev; prodMap[name].refunds+=ref; prodMap[name].net+=net;
      if(!deskMap[desk]) deskMap[desk]={qty:0,rev:0,net:0};
      deskMap[desk].qty+=qty; deskMap[desk].rev+=rev; deskMap[desk].net+=net;
      var dKey = String(dateRaw).split('T')[0];
      if(!dateMap[dKey]) dateMap[dKey]={qty:0,rev:0,net:0};
      dateMap[dKey].qty+=qty; dateMap[dKey].rev+=rev; dateMap[dKey].net+=net;
    });
    var uniqueProducts = Object.keys(prodMap).length;
    var avgPerSale = totalQty>0 ? totalNet/totalQty : 0;
    var refundRate = totalRev>0 ? (totalRefunds/totalRev)*100 : 0;
    var topByRev = Object.keys(prodMap).map(function(n){return Object.assign({name:n},prodMap[n]);})
      .sort(function(a,b){return b.net-a.net;}).slice(0,12);
    var topByQty = Object.keys(prodMap).map(function(n){return Object.assign({name:n},prodMap[n]);})
      .sort(function(a,b){return b.qty-a.qty;}).slice(0,12);
    var desks = Object.keys(deskMap).map(function(d){return Object.assign({desk:d},deskMap[d]);})
      .sort(function(a,b){return b.net-a.net;});
    var activeDays = Object.keys(dateMap).length;
    var avgDailyRev = activeDays>0 ? totalNet/activeDays : 0;
    // Weekly aggregation
    var weekMap = {};
    Object.keys(dateMap).forEach(function(dKey){
      var d = new Date(dKey+'T12:00:00');
      var day = d.getDay(); var diff = d.getDate() - day + (day === 0 ? -6 : 1);
      var mon = new Date(d); mon.setDate(diff);
      var wKey = mon.toISOString().slice(0,10);
      if(!weekMap[wKey]) weekMap[wKey]={qty:0,rev:0,net:0};
      weekMap[wKey].qty+=dateMap[dKey].qty; weekMap[wKey].rev+=dateMap[dKey].rev; weekMap[wKey].net+=dateMap[dKey].net;
    });
    var weeklyData = Object.keys(weekMap).sort().map(function(w){
      var lbl = new Date(w+'T12:00:00');
      return { week: lbl.toLocaleDateString('en-US',{month:'short',day:'numeric'}), qty:weekMap[w].qty, rev:Math.round(weekMap[w].rev), net:Math.round(weekMap[w].net) };
    });
    return {
      totalQty:totalQty, totalRev:totalRev, totalRefunds:totalRefunds, totalNet:totalNet,
      uniqueProducts:uniqueProducts, avgPerSale:avgPerSale, refundRate:refundRate,
      topByRev:topByRev, topByQty:topByQty, desks:desks,
      activeDays:activeDays, avgDailyRev:avgDailyRev, weeklyData:weeklyData,
    };
  }, [crossData.products]);

  // ── Fill Rate analytics ──────────────────────────────────────
  var fillRateAnalytics = useMemo(function(){
    var cd = crossData.fillrate;
    if (!cd || !cd.rows || cd.rows.length === 0) return null;

    // Build per-section enrollment timeline from program-demographics data
    var secMap = {};
    cd.rows.forEach(function(r){
      var sec = r['Section'] || r['section'] || '';
      var prog = r['Program'] || r['program'] || '';
      var dateRaw = r['Enrolled Date'] || r['enrolled_date'] || r['Enrolled date'] || '';
      if (!sec || !dateRaw) return;
      var dKey = String(dateRaw).split('T')[0];
      if (!secMap[sec]) secMap[sec] = { program: prog, section: sec, dates: {}, total: 0 };
      if (!secMap[sec].dates[dKey]) secMap[sec].dates[dKey] = 0;
      secMap[sec].dates[dKey]++;
      secMap[sec].total++;
    });

    // Merge capacity from programs data
    if (fillCapacity && fillCapacity.length) {
      fillCapacity.forEach(function(r){
        var sec = r['section'] || r['Section'] || '';
        var cap = parseInt(r['capacity'] || r['Capacity'] || 0);
        if (sec && secMap[sec] && cap > 0) secMap[sec].capacity = cap;
      });
    }

    // Build cumulative time series for each section
    var sections = Object.keys(secMap).map(function(k){ return secMap[k]; })
      .filter(function(s){ return s.total >= 3; }) // skip tiny sections
      .sort(function(a,b){ return b.total - a.total; });

    sections.forEach(function(sec){
      var sortedDates = Object.keys(sec.dates).sort();
      var cumul = 0;
      sec.timeline = sortedDates.map(function(d){
        cumul += sec.dates[d];
        return { date: d, count: cumul };
      });
      sec.firstDate = sortedDates[0];
      sec.lastDate = sortedDates[sortedDates.length - 1];
      // Days from first enrollment to reaching total
      var d0 = new Date(sec.firstDate + 'T12:00:00');
      var d1 = new Date(sec.lastDate + 'T12:00:00');
      sec.fillDays = Math.max(1, Math.round((d1 - d0) / 86400000));
      sec.fillPct = sec.capacity ? Math.round(sec.total / sec.capacity * 100) : null;
    });

    // KPIs
    var totalSections = sections.length;
    var atCapacity = sections.filter(function(s){ return s.fillPct && s.fillPct >= 95; }).length;
    var avgFillPct = sections.filter(function(s){ return s.fillPct; });
    var avgPct = avgFillPct.length > 0 ? Math.round(avgFillPct.reduce(function(a,s){ return a + s.fillPct; }, 0) / avgFillPct.length) : null;
    var fastestFill = sections.filter(function(s){ return s.fillDays > 0 && s.total >= 5; })
      .sort(function(a,b){ return a.fillDays - b.fillDays; })[0] || null;
    var slowestFill = sections.filter(function(s){ return s.fillDays > 0 && s.total >= 5; })
      .sort(function(a,b){ return b.fillDays - a.fillDays; })[0] || null;

    return {
      sections: sections,
      totalSections: totalSections,
      atCapacity: atCapacity,
      avgPct: avgPct,
      fastestFill: fastestFill,
      slowestFill: slowestFill,
      top: sections.slice(0, 30),
    };
  }, [crossData.fillrate, fillCapacity]);

  var [pdfLoading, setPdfLoading] = useState(false);
  var [csvRequestModal, setCsvRequestModal] = useState(null);

  function refreshData() {
    setRefreshing(true);setCacheInfo(null);
    var url = withToken('/'+orgSlug+'/'+reportType+'/api/data');
    url += (url.includes('?') ? '&' : '?') + '_nocache=1';
    fetch(url)
      .then(function(r){if(!r.ok)throw new Error('HTTP '+r.status);return r.json();})
      .then(function(j){
        setRows(j.rows||j);
        if(j.meta&&j.meta.cached_at) setCacheInfo({at:j.meta.cached_at,stale:!!j.meta.stale_cache});
        else setCacheInfo(null);
      })
      .catch(function(e){setError(e.message);})
      .finally(function(){setRefreshing(false);});
  }

  function downloadPdf() {
    setPdfLoading(true);
    fetch(withToken('/'+orgSlug+'/'+reportType+'/api/pdf'))
      .then(function(r){return r.blob();})
      .then(function(blob){
        var a=document.createElement('a');
        a.href=URL.createObjectURL(blob);
        a.download='users-report-'+orgSlug+'.pdf';
        document.body.appendChild(a);a.click();a.remove();
      })
      .catch(function(e){alert('PDF generation failed: '+e.message);})
      .finally(function(){setPdfLoading(false);});
  }

  useEffect(function(){window.recShareLink=function(){return window.location.href;};}, []);

  function requestCSV(description) {
    setCsvRequestModal(description);
  }

  var headerBar = (
    <div className="toolbar no-print">
      <h1>Community Intelligence</h1>
      <span className="pill" style={{background:'rgba(255,255,255,.12)',color:'#ddd'}}>{orgSlug.charAt(0).toUpperCase()+orgSlug.slice(1)}</span>
      {s&&<span className="pill" style={{background:'rgba(16,185,129,.15)',color:'#6ee7b7'}}>{s.hhCount} HH &middot; {s.total} people</span>}
      <div className="spacer"/>
    </div>
  );

  if(loading) return <React.Fragment>{headerBar}<div className="loading"><div className="spinner"/><div className="juice-msg"><span>Squeezing the oranges…</span><span>Juicing!</span><span>Adding the pulp…</span><span>Chilling the glass…</span><span>Pouring it out…</span></div></div></React.Fragment>;
  if(error) return <React.Fragment>{headerBar}<div className="dash"><div className="error"><strong>Error:</strong> {error}</div></div></React.Fragment>;
  if(!s) return <React.Fragment>{headerBar}<div className="loading"><div className="spinner"/><div style={{color:'#888',fontSize:13,marginTop:8}}>{computing?'Crunching '+((rows&&rows.length)||0).toLocaleString()+' records…':'No data returned.'}</div></div></React.Fragment>;

  var TEAL='#0d9488',AMBER='#f59e0b',ROSE='#f43f5e',EMERALD='#10b981',INDIGO='#6366f1',PURPLE='#8b5cf6',SKY='#0ea5e9';
  var GENDER_COLORS=[INDIGO,'#94a3b8',SKY,AMBER,PURPLE];

  var insightsBlock = (
    <div className="insights-section no-print">
      <div className="insights-wrap">
        <div className="insights-head">
          <button type="button" className="insights-btn" onClick={getInsights} disabled={insightsLoading}>
                            <span className="sparkle">✦</span><span className="sparkle">✧</span><span className="sparkle">✦</span><span className="sparkle">✧</span><span className="sparkle">✦</span><span className="sparkle">✧</span>
{insightsLoading?'Analyzing…':(insights?'↻ Refresh':'✨ Rec Insights')}
          </button>
          {insights&&!insightsLoading&&<span style={{fontSize:11,color:'#9ca3af'}}>Analyzed {s.hhCount} households, {s.total} people</span>}
        </div>
        {insightsLoading&&<div className="loading"><div className="spinner"/><div className="juice-msg"><span>Squeezing the oranges…</span><span>Juicing!</span><span>Adding the pulp…</span><span>Chilling the glass…</span><span>Pouring it out…</span></div></div>}
        {insightsError&&!insightsLoading&&<div style={{padding:'8px 20px 16px'}}><div className="error">{insightsError}</div></div>}
        {insights&&!insightsLoading&&(
          <div className="insights-grid">
            {insights.map(function(ins,i){return(
              <div key={i} className={'insight-card insight-'+(ins.type||'signal')}>
                <div className="insight-type">{ins.type||'signal'}</div>
                <div className="insight-title">{ins.title}</div>
                <div className="insight-detail">{ins.detail}</div>
                {ins.action&&<div className="insight-action">{'\u2192'} {ins.action}</div>}
              </div>
            );})}
          </div>
        )}
        {insights && !insightsLoading && (
          <div className="insights-feedback">
            {fbSent ? (
              <span className="fb-thanks">✅ Thanks for the feedback!</span>
            ) : fbMode === 'down' ? (
              <div className="fb-down-form">
                <input placeholder="What could be better?" value={fbComment}
                  onChange={e => setFbComment(e.target.value)}
                  onKeyDown={e => e.key === 'Enter' && sendInsightsFeedback(0)}
                  autoFocus maxLength={500} />
                <button className="fb-send" onClick={() => sendInsightsFeedback(0)}>Send</button>
                <button onClick={() => setFbMode(null)}>Cancel</button>
              </div>
            ) : (
              <React.Fragment>
                <span className="fb-label">Were these insights helpful?</span>
                <button onClick={() => sendInsightsFeedback(1)} title="Yes">👍</button>
                <button onClick={() => setFbMode('down')} title="Not helpful">👎</button>
              </React.Fragment>
            )}
          </div>
        )}
      </div>
    </div>
  );
  var agePct=Math.round(s.withAge/s.total*100);
  var genderPct=Math.round(s.genderSpecified/s.total*100);
  var zipPct=Math.round((s.total-s.noZip)/s.total*100);
  var gradePct=Math.round(s.withGrade/s.total*100);
  var phonePct=Math.round(s.withPhone/s.total*100);
  var emergPct=Math.round(s.withEmergency/s.total*100);
  var pickupPct=Math.round(s.withPickup/s.total*100);
  var confirmedPct=Math.round(s.withConfirmed/s.total*100);

  return (
    <React.Fragment>
      <div className="toolbar no-print">
        <h1>Community Intelligence</h1>
        <span className="pill" style={{background:'rgba(255,255,255,.12)',color:'#ddd'}}>{orgSlug.charAt(0).toUpperCase()+orgSlug.slice(1)}</span>
        <span className="pill" style={{background:'rgba(16,185,129,.15)',color:'#6ee7b7'}}>{s.hhCount} HH &middot; {s.total} people</span>
        <div className="spacer"/>
        <div className="divider"/>
        <button onClick={function(){window.print();}}>{'\uD83D\uDDA8\uFE0F'} Print</button>
        <button className="btn-pdf" onClick={downloadPdf} disabled={pdfLoading}>
          {pdfLoading?'Generating…':'\uD83D\uDCC4 PDF'}
        </button>
      </div>

      {cacheInfo&&(
        <div className="cache-banner no-print" style={cacheInfo.stale?{background:'#fef3c7',borderColor:'#f59e0b',color:'#92400e'}:{}}>
          <span>{cacheInfo.stale?'⚠️ Showing cached data':'Cached data'} from <strong>{new Date(cacheInfo.at).toLocaleString()}</strong>{cacheInfo.stale?' — live data is temporarily unavailable':''}</span>
          <button onClick={refreshData} disabled={refreshing}>{refreshing?'Refreshing…':'Refresh Now'}</button>
        </div>
      )}

      <div className="dash">
        {/* Tabs */}
        <div className="tabs no-print">
          <div className={'tab'+(tab==='demo'?' active':'')} onClick={function(){switchTab('demo');}}>
            Demographics
          </div>
          <div className={'tab'+(tab==='revenue'?' active':'')} onClick={function(){switchTab('revenue');}}>
            Revenue
            <span className="tab-badge" style={{background:s.hasRevData?'#dcfce7':'#fef3c7',color:s.hasRevData?'#166534':'#92400e'}}>{s.hasRevData?'$'+(s.totalNet/1000).toFixed(0)+'K':'No data'}</span>
          </div>
          <div className={'tab'+(tab==='strategy'?' active':'')} onClick={function(){switchTab('strategy');}}>
            Strategy
            {s.hasRevData&&s.levers.length>0&&<span className="tab-badge" style={{background:'#fef3c7',color:'#92400e'}}>{s.levers.length} levers</span>}
          </div>
          {s.guestCount>0&&(
            <div className={'tab'+(tab==='guests'?' active':'')} onClick={function(){switchTab('guests');}}>
              Guests
              <span className="tab-badge" style={{background:'#fce7f3',color:'#9d174d'}}>{s.guestCount>999?(s.guestCount/1000).toFixed(1)+'K':s.guestCount}</span>
            </div>
          )}
          {/* Cross-report tabs: enabled reports get live tabs, others get locked teasers */}
          {CROSS_TABS.map(function(ct){

              <div key={ct.key} className={'tab'+(isActive?' active':'')} onClick={function(){switchTab(ct.key);}}>

            return (
              <div key={ct.key} className={'tab'+(isActive?' active':'')} onClick={function(){switchTab(ct.key);}} style={{opacity:0.5}}>
                {ct.icon} {ct.label}

              </div>

          })}

        {tab==='demo' && (
