            <div className="kpi-row">
              <div className="kpi" style={{'--accent':INDIGO}}><div className="kpi-label"><Tip label="Households" tip="Unique household accounts registered in the system. Each has one head of household (HoH) and zero or more members." /></div><div className="kpi-val">{s.hhCount}</div><div className="kpi-sub">+{s.last30} last 30d</div></div>
              <div className="kpi" style={{'--accent':PURPLE}}><div className="kpi-label"><Tip label="Total People" tip="All individuals — heads of household plus members. Includes anyone with an account, whether or not they’ve purchased." /></div><div className="kpi-val">{s.total}</div><div className="kpi-sub">{s.hohCount} HoH + {s.memCount} members</div></div>
              <div className="kpi" style={{'--accent':TEAL}}><div className="kpi-label"><Tip label="Residents" tip="Percentage of people with a local residential address on file." /></div><div className="kpi-val">{s.resPct}%</div><div className="kpi-sub">{s.residents} of {s.total}</div></div>
              <div className="kpi" style={{'--accent':AMBER}}><div className="kpi-label"><Tip label="Median HH Size" tip="Median number of people per household. Size 1 = single-person HH." /></div><div className="kpi-val">{s.medianHH}</div><div className="kpi-sub">Avg {s.avgHH} &middot; Max {s.maxHH}</div></div>
              <div className="kpi" style={{'--accent':SKY}}><div className="kpi-label"><Tip label="Median Age" tip="Median age from date of birth records. Only includes people with DOB on file." /></div><div className="kpi-val">{s.medianAge!=null?s.medianAge:'\u2014'}</div><div className="kpi-sub">HoH {s.medianHohAge} &middot; Mem {s.medianMemAge}</div></div>
              <div className="kpi" style={{'--accent':EMERALD}}><div className="kpi-label"><Tip label="With Grade" tip="People with a school grade level recorded. Key for youth program targeting." /></div><div className="kpi-val">{s.withGrade}</div><div className="kpi-sub">{gradePct}% of people</div></div>
            </div>

            {/* Key Observations */}
            <div className="obs">
              <div className="obs-title">Key Observations</div>
              <div className="obs-grid">{observations.map(function(o,i){return <div key={i}>{E(o.e)}<strong style={{color:'#065f46'}}>{o.l}</strong> {o.t}</div>;})}</div>
            </div>

            {insightsBlock}

            {/* Row 1: HH Size + Residency */}
            <div className="grid">
              <ChartPanel title="Household Size Distribution" note={s.multiHH+' multi-member'} desc="Number of households by member count. Includes all registered accounts." type="bar" data={s.hhSizeData} labelKey="size" dataKeys={[{key:'count',label:'Households'}]} colors={[INDIGO]} />
              <div className="panel">
                <div className="panel-head">Residency &amp; Completeness</div><div className="panel-desc">Resident vs non-resident breakdown and profile data completeness across all accounts.</div>
                <div style={{display:'flex',height:20,borderRadius:5,overflow:'hidden',marginBottom:10}}>
                  <div style={{width:s.resPct+'%',background:TEAL,display:'flex',alignItems:'center',justifyContent:'center'}}><span style={{fontSize:10,fontWeight:700,color:'#fff'}}>{s.residents}</span></div>
                  <div style={{flex:1,background:'#e2e8f0',display:'flex',alignItems:'center',justifyContent:'center'}}><span style={{fontSize:10,fontWeight:700,color:'#6b7280'}}>{s.nonResidents}</span></div>
                </div>
                <div className="ring-row">
                  <Ring pct={agePct} label="DOB" color={agePct<70?ROSE:agePct<85?AMBER:EMERALD} />
                  <Ring pct={genderPct} label="Gender" color={genderPct<50?ROSE:genderPct<75?AMBER:EMERALD} />
                  <Ring pct={zipPct} label="Zip" color={zipPct<90?AMBER:EMERALD} />
                  <Ring pct={gradePct} label="Grade" color={gradePct<10?ROSE:gradePct<30?AMBER:EMERALD} />
                  <Ring pct={phonePct} label="Phone" color={phonePct<60?ROSE:phonePct<80?AMBER:EMERALD} />
                  <Ring pct={emergPct} label="Emergency" color={emergPct<30?ROSE:emergPct<60?AMBER:EMERALD} />
                  <Ring pct={pickupPct} label="Auth Pickup" color={pickupPct<30?ROSE:pickupPct<60?AMBER:EMERALD} />
                </div>
              </div>
            </div>

            {/* Row 2: Signups + Growth */}
            <div className="grid">
              <ChartPanel title="New Signups by Month" desc="New account registrations per month based on account creation date." data={s.signups} labelKey="month" dataKeys={[{key:'count',label:'Signups'}]} colors={[INDIGO]} />
              <ChartPanel title="Cumulative Growth" desc="Running total of registered accounts over time." type="line" data={s.cumulative} labelKey="month" dataKeys={[{key:'cumulative',label:'Total'}]} colors={[INDIGO]} />
            </div>

            {/* Row 3: Age by Role + Gender */}
            <div className="grid">
              <ChartPanel title="Age Distribution by Role" note="HoH vs Members" desc="Age breakdown for heads of household vs additional members (typically children)." data={s.ageDist} labelKey="range" dataKeys={[{key:'hoh',label:'Head of Household'},{key:'member',label:'Member'}]} colors={[INDIGO,'#c7d2fe']} stacked />
              <GenderChart gender={s.gender} genderSpecified={s.genderSpecified} total={s.total} colors={GENDER_COLORS} />
            </div>

            {/* Row 4: Residency by Age + Grade */}
            <div className="grid">
              <ChartPanel title="Residency Rate by Age" note="% of each group" desc="Percentage of people in each age bracket who are verified residents." data={s.resByAge} labelKey="range" dataKeys={[{key:'rate',label:'Resident %'}]} colors={s.resByAge.map(function(e){return e.rate>=80?TEAL:e.rate>=65?AMBER:ROSE;})} pctAxis />
              <ChartPanel title="Grade Distribution" note={s.withGrade+' people'} desc="School grade level for participants who have grade data on file." data={s.gradeData} labelKey="grade" dataKeys={[{key:'count',label:'Students'}]} colors={[PURPLE]} />
            </div>

            {/* City */}
            <div className="grid">
              <div className="panel span2">
                <div className="panel-head">People by City</div><div className="panel-desc">Geographic distribution based on address data on file.</div>

                  var pct=(c.count/s.total*100);var isTop=c.city===s.topCity;
                  return (<div key={c.city} className="city-bar-row">
                    <div className="city-label" style={{color:isTop?'#166534':'#6b7280',fontWeight:isTop?700:400}}>{c.city}</div>
                    <div className="city-track"><div className="city-fill" style={{width:Math.max(pct,1.5)+'%',background:isTop?TEAL:'#94a3b8'}}>{pct>4&&<span>{c.count}</span>}</div></div>

                    <div className="city-pct">{pct.toFixed(1)}%</div>
                  </div>);
                })}
              </div>
            </div>

          </React.Fragment>
        )}

        {tab==='revenue' && (
          <React.Fragment>
            {!s.hasRevData ? (

              </div>

              <React.Fragment>
                {/* Revenue KPIs */}
                <div className="kpi-row">
                  <div className="kpi" style={{'--accent':EMERALD}}><div className="kpi-label"><Tip label="Net Revenue" tip="Total payments minus refunds. The actual revenue retained." /></div><div className="kpi-val">${s.totalNet>=1000?(s.totalNet/1000).toFixed(0)+'K':Math.round(s.totalNet)}</div><div className="kpi-sub">${s.totalGross>=1000?(s.totalGross/1000).toFixed(0)+'K':Math.round(s.totalGross)} gross</div></div>
                  <div className="kpi" style={{'--accent':INDIGO}}><div className="kpi-label">Median / HH</div><div className="kpi-val">${Math.round(s.medianRev)}</div><div className="kpi-sub">Avg ${Math.round(s.avgRev)}</div></div>
                  <div className="kpi" style={{'--accent':TEAL}}><div className="kpi-label"><Tip label="Conversion" tip="Percentage of registered households that made at least one purchase." /></div><div className="kpi-val">{s.conversionRate}%</div><div className="kpi-sub">{s.spendingHH} of {s.hhCount} HH</div></div>
                  <div className="kpi" style={{'--accent':AMBER}}><div className="kpi-label">Unbooked</div><div className="kpi-val">{s.unbookedHH}</div><div className="kpi-sub">{Math.round(s.unbookedHH/s.hhCount*100)}% of households</div></div>
                  <div className="kpi" style={{'--accent':ROSE}}><div className="kpi-label"><Tip label="Refund Rate" tip="Total refunds as a percentage of gross revenue." /></div><div className="kpi-val">{s.refundRate}%</div><div className="kpi-sub">${s.totalRefunds>=1000?(s.totalRefunds/1000).toFixed(1)+'K':Math.round(s.totalRefunds)} total</div></div>
                </div>

                <div className="panel" style={{marginBottom:14}}>
                  <div className="panel-head">How Much Do Households Spend?<span className="panel-note">{s.spendingHH} households with purchases</span></div>
                  <div style={{display:'flex',justifyContent:'space-around',textAlign:'center',padding:'8px 0'}}>
                    {[{l:'Low Spender',sub:'Bottom 25%',v:s.revP25},{l:'Typical',sub:'Middle household',v:s.medianRev},{l:'Active',sub:'Top 25%',v:s.revP75},{l:'Power User',sub:'Top 10%',v:s.revP90},{l:'Super Fan',sub:'Top 5%',v:s.revP95}].map(function(p){return(
                      <div key={p.l}>
                        <div style={{fontSize:10,fontWeight:700,color:'#374151',textTransform:'uppercase'}}>{p.l}</div>
                        <div style={{fontSize:22,fontWeight:800,color:'#111827'}}>${Math.round(p.v)}</div>
                        <div style={{fontSize:10,color:'#9ca3af'}}>{p.sub}</div>
                      </div>

                </div>

                    <div className="obs-title">Key Observations</div>
                    <div className="obs-grid">{revObservations.map(function(o,i){return <div key={i}>{E(o.e)}<strong style={{color:'#065f46'}}>{o.l}</strong> {o.t}</div>;})}</div>
                  </div>
                )}

                {insightsBlock}

                {/* Charts */}
                <div className="grid">
                  <ChartPanel title="Revenue Distribution" note="net $ per household" data={s.revDist} labelKey="range" dataKeys={[{key:'count',label:'Households'}]} colors={[EMERALD]} />
                  <ChartPanel title="Avg Spend: Resident vs Non-Resident" data={s.resByRes} labelKey="group" dataKeys={[{key:'avg',label:'Avg $'},{key:'median',label:'Median $'}]} colors={[TEAL,SKY]} />
                </div>

                <div className="grid">
                  <ChartPanel title="Avg Net Revenue by Household Size" note="bigger families spend more" data={s.revBySize} labelKey="size" dataKeys={[{key:'avg',label:'Avg Net $'}]} colors={[INDIGO]} />
                  <ChartPanel title="Revenue Concentration (Pareto)" note="top 20% = ~64% of revenue" type="line" data={s.paretoData} labelKey="hhPct" dataKeys={[{key:'revPct',label:'% of Revenue'}]} colors={[ROSE]} opts={{scales:{y:{max:100,ticks:{callback:function(v){return v+'%';}}}}}} />
                </div>

                {/* Gender Revenue Breakdown */}
                {s.genderRevData.length>0 && s.hasRevData && (
                  <div className="panel" style={{marginBottom:14}}>
                    <div className="panel-head">Revenue by Gender

                    </div>
                    <div style={{display:'flex',gap:12,padding:'10px 16px',flexWrap:'wrap'}}>
                      {s.genderRevData.map(function(d){
                        var pct=s.genderRevTotal>0?((d.rev/s.genderRevTotal)*100).toFixed(1):'0';
                        var barW=s.genderRevData[0].rev>0?(d.rev/s.genderRevData[0].rev)*100:0;
                        return (
                          <div key={d.gender} style={{flex:'1 1 140px',minWidth:120}}>
                            <div style={{display:'flex',justifyContent:'space-between',marginBottom:4}}>
                              <span style={{fontSize:12,fontWeight:600,color:'#111827'}}>{d.gender}</span>
                              <span style={{fontSize:12,fontWeight:700,color:'#111827'}}>${d.rev>=1000?(d.rev/1000).toFixed(1)+'K':d.rev}</span>
                            </div>
                            <div style={{background:'#f3f4f6',borderRadius:4,height:8,overflow:'hidden'}}>
                              <div style={{height:'100%',borderRadius:4,background:d.gender==='Female'?'#ec4899':d.gender==='Male'?'#3b82f6':'#8b5cf6',width:barW+'%',transition:'width 0.5s ease'}}></div>
                            </div>
                            <div style={{display:'flex',justifyContent:'space-between',marginTop:3}}>
                              <span style={{fontSize:10,color:'#9ca3af'}}>{d.hhCount} households</span>
                              <span style={{fontSize:10,color:'#9ca3af'}}>{pct}%</span>
                            </div>
                          </div>
                        );
                      })}
                    </div>
                    {s.genderRevCoverage<40 && (
                      <div style={{padding:'6px 16px 10px',fontSize:11,color:'#92400e',background:'#fef9ee',borderTop:'1px solid #fde68a',borderRadius:'0 0 8px 8px'}}>
                        ⚠ Only {s.genderRevCoverage}% of users have reported gender. This breakdown may not represent the full population. Encourage profile completion for more accurate insights.
                      </div>
                    )}
                  </div>
                )}

                {/* Conversion funnel */}
                <div className="panel" style={{marginBottom:14}}>
                  <div className="panel-head">Conversion Funnel</div>
                  <div style={{display:'flex',alignItems:'center',gap:6,padding:'10px 0'}}>
                    {[
                      {label:'Signed Up',val:s.hhCount,color:INDIGO},
                      {label:'First Purchase',val:s.spendingHH,color:TEAL},
                      {label:'Spent >$100',val:s.hhOver100,color:AMBER},
                      {label:'Spent >$500',val:s.hhOver500,color:ROSE},
                    ].map(function(step,i,arr){
                      var pct=Math.round(step.val/s.hhCount*100);
                      var w=Math.max(pct,8);
                      return (
                        <div key={step.label} style={{flex:1,textAlign:'center'}}>
                          <div style={{height:Math.max(w*.6,20),background:step.color,borderRadius:6,display:'flex',alignItems:'center',justifyContent:'center',marginBottom:4,transition:'height .3s'}}>
                            <span style={{fontSize:14,fontWeight:800,color:'#fff'}}>{step.val}</span>
                          </div>
                          <div style={{fontSize:10,fontWeight:600,color:'#6b7280'}}>{step.label}</div>
                          <div style={{fontSize:10,color:'#9ca3af'}}>{pct}%</div>
                        </div>
                      );
                    })}
                  </div>
                </div>

                {/* Revenue by Category */}
                {s.hasCatData&&(
                  <div className="grid">
                    <ChartPanel title="Revenue by Category" data={s.catData} labelKey="cat" dataKeys={[{key:'value',label:'Revenue $'}]} colors={s.catData.map(function(d){return d.color;})} />
                    <div className="panel">
                      <div className="panel-head">Category Breakdown</div>
                      <div style={{display:'flex',flexDirection:'column',gap:6,padding:'6px 0'}}>
                        {s.catData.map(function(d){
                          var pct=s.totalGross>0?Math.round(d.value/s.totalGross*100):0;
                          return(
                            <div key={d.cat} style={{display:'flex',alignItems:'center',gap:10}}>
                              <div style={{width:10,height:10,borderRadius:3,background:d.color,flexShrink:0}}/>
                              <span style={{fontSize:13,fontWeight:600,flex:1}}>{d.cat}</span>
                              <span style={{fontSize:14,fontWeight:800}}>${d.value>=1000?(d.value/1000).toFixed(1)+'K':d.value}</span>
                              <span style={{fontSize:11,color:'#9ca3af',width:36,textAlign:'right'}}>{pct}%</span>
                            </div>
                          );
                        })}
                      </div>
                      <div style={{fontSize:11,color:'#9ca3af',marginTop:8}}>{s.progHH} HH use programs, {s.facHH} book facilities, {s.bothProgFac} do both</div>
                    </div>
                  </div>
                )}

              </React.Fragment>
            )}
          </React.Fragment>
        )}

        {tab==='strategy' && (
          <React.Fragment>
            {!s.hasRevData ? (
              <div className="rev-coming"><h2>Revenue Data Required</h2><p>Strategy tab needs revenue data. Update the Metabase query to include the revenue CTE.</p></div>
            ) : (
              <React.Fragment>
                {/* Geographic Heatmap */}
                <div className="panel" style={{marginBottom:14}}>
                  <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:10}}>
                    <div className="panel-head" style={{marginBottom:0}}>Where Are Your Users?</div>
                    <div className="map-toggle" style={{marginLeft:'auto'}}>
                      <button className={mapMode==='hh'?'active':''} onClick={function(){setMapMode('hh');}}>Households</button>
                      <button className={mapMode==='rev'?'active':''} onClick={function(){setMapMode('rev');}}>Revenue</button>
                    </div>
                  </div>
                  <GeoMap zipData={s.zipData} mode={mapMode} />
                  <div style={{fontSize:11,color:'#9ca3af',marginTop:6,display:'flex',alignItems:'center',gap:12,flexWrap:'wrap'}}>
                    <span>{s.zipData.length} zip codes &middot; {mapMode==='hh'?'sized by household count':'sized by net revenue'} &middot; hover for details</span>
                    <span style={{display:'flex',alignItems:'center',gap:3,fontSize:10}}>
                      <span style={{width:10,height:10,borderRadius:'50%',background:'#6ee7b7',display:'inline-block'}}/>Low
                      <span style={{width:10,height:10,borderRadius:'50%',background:'#0284c7',display:'inline-block',marginLeft:4}}/>Med
                      <span style={{width:10,height:10,borderRadius:'50%',background:'#f59e0b',display:'inline-block',marginLeft:4}}/>High
                      <span style={{width:10,height:10,borderRadius:'50%',background:'#dc2626',display:'inline-block',marginLeft:4}}/>Top
                    </span>
                  </div>
                </div>

                {stratObservations.length>0&&(
                  <div className="obs">
                    <div className="obs-title">Key Observations</div>
                    <div className="obs-grid">{stratObservations.map(function(o,i){return <div key={i}>{E(o.e)}<strong style={{color:'#065f46'}}>{o.l}</strong> {o.t}</div>;})}</div>
                  </div>
                )}

                {insightsBlock}

                {/* Revenue Levers */}
                <div className="panel" style={{marginBottom:14}}>
                  <div className="panel-head">Revenue Levers<span className="panel-note">quantified growth opportunities</span></div>
                  <div style={{display:'flex',flexDirection:'column',gap:10,padding:'4px 0'}}>
                    {s.levers.map(function(lev,i){return(
                      <div key={i} style={{display:'flex',alignItems:'center',gap:14,padding:'12px 16px',background:'linear-gradient(135deg,#f0fdf4,#ecfeff)',borderRadius:8,border:'1px solid #a7f3d0'}}>
                        <div style={{flex:1}}>
                          <div style={{fontSize:14,fontWeight:700,color:'#065f46',marginBottom:2}}>{lev.title}</div>
                          <div style={{fontSize:12,color:'#064e3b',lineHeight:1.5}}>{lev.desc}</div>
                        </div>
                        <div style={{textAlign:'center',flexShrink:0}}>
                          <div style={{fontSize:10,fontWeight:600,color:'#059669',textTransform:'uppercase'}}>Opportunity</div>
                          <div style={{fontSize:24,fontWeight:800,color:'#065f46'}}>+${lev.opp>=1000?(lev.opp/1000).toFixed(0)+'K':lev.opp}</div>
                        </div>
                        <button style={{flexShrink:0,fontSize:11,padding:'6px 12px',borderRadius:6,border:'1px solid #d1d5db',background:'#fff',cursor:'pointer',fontFamily:'inherit',fontWeight:600}} onClick={function(){
                          if(lev.segment==='unbooked')requestCSV('Unbooked households');
                          else if(lev.segment==='nonresident')requestCSV('Non-resident households');
                          else if(lev.segment==='solo')requestCSV('Solo unbooked households');
                        }}>{'📋'} Request CSV</button>
                      </div>
                    );})}
                  </div>
                </div>

                {/* Unbooked vs Spender + Lapsing */}
                <div className="grid">
                  <div className="panel">
                    <div className="panel-head">Who's Not Buying?<span className="panel-note">{s.unbookedProfile.count} unbooked</span></div>

                      <div style={{fontWeight:700,color:'#6b7280'}}></div><div style={{fontWeight:700,color:'#059669',textAlign:'right'}}>Spenders</div><div style={{fontWeight:700,color:'#dc2626',textAlign:'right'}}>Unbooked</div>
                      <div>Households</div><div style={{textAlign:'right',fontWeight:600}}>{s.spenderProfile.count}</div><div style={{textAlign:'right',fontWeight:600}}>{s.unbookedProfile.count}</div>

                  </div>

                  <div className="panel">
                    <div className="panel-head">Lapsing Households<span className="panel-note">no purchase in 90+ days</span></div>

                      <div style={{fontSize:13,color:'#6b7280',marginTop:4}}>previously active households</div>
                      <div style={{fontSize:12,color:'#9ca3af'}}>haven't purchased in 90+ days</div>
                    </div>
                    {s.lapsingCount>0&&<button style={{fontSize:11,padding:'6px 12px',borderRadius:6,border:'1px solid #d1d5db',background:'#fff',cursor:'pointer',fontFamily:'inherit',fontWeight:600,color:'#374151'}} onClick={function(){requestCSV('Lapsing households (' + s.lapsingCSV.length + ' contacts)');}}>{'📋'} Request {s.lapsingCSV.length} lapsing contacts</button>}
                  </div>
                </div>

                        var va=c==='section'?a.section:c==='program'?a.program:c==='total'?a.total:c==='capacity'?(a.capacity||0):c==='fillPct'?(a.fillPct||0):a.fillDays;
                        var vb=c==='section'?b.section:c==='program'?b.program:c==='total'?b.total:c==='capacity'?(b.capacity||0):c==='fillPct'?(b.fillPct||0):b.fillDays;
                        if(typeof va==='string')return va.localeCompare(vb)*d;
                        return ((va||0)-(vb||0))*d;
                      }).map(function(sec,i){
                        var barPct = sec.fillPct ? Math.min(sec.fillPct, 100) : 0;
                        var barCol = barPct >= 95 ? '#059669' : barPct >= 70 ? '#d97706' : barPct >= 40 ? '#2563eb' : '#9ca3af';
                        return (
                          <tr key={i} style={{borderBottom:'1px solid #f3f4f6'}}>
                            <td style={{padding:'7px 10px',fontWeight:600,color:'#111827',maxWidth:200,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{sec.section}</td>
                            <td style={{padding:'7px 10px',color:'#6b7280',maxWidth:180,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{sec.program}</td>
                            <td style={{padding:'7px 10px',textAlign:'right',fontWeight:600}}>{sec.total}</td>
                            <td style={{padding:'7px 10px',textAlign:'right'}}>{sec.capacity||'—'}</td>
                            <td style={{padding:'7px 10px',textAlign:'right'}}>
                              {sec.fillPct!==null ? (
                                <span style={{display:'inline-flex',alignItems:'center',gap:6}}>
                                  <span style={{width:48,height:6,borderRadius:3,background:'#f3f4f6',display:'inline-block',position:'relative',overflow:'hidden'}}>
                                    <span style={{position:'absolute',left:0,top:0,bottom:0,borderRadius:3,background:barCol,width:Math.min(barPct,100)+'%'}}></span>
                                  </span>
                                  {sec.fillPct>100?<span style={{fontWeight:700,color:'#059669',fontSize:11}}>Full <span style={{fontWeight:400,color:'#9ca3af'}}>({sec.total}/{sec.capacity})</span></span>:<span style={{fontWeight:600,color:barCol}}>{sec.fillPct}%</span>}
                                </span>
                              ) : '—'}
                            </td>
                            <td style={{padding:'7px 10px',textAlign:'right',color:'#6b7280'}}>{sec.fillDays}d</td>
                          </tr>
                        );
                      })}</tbody>
                    </table>
                  </div>
                </div>
              </React.Fragment>
            );
          }

          // ── Generic cross-tab placeholder ──
          return (
            <div key={ct.key} style={{textAlign:'center',padding:'60px 20px',color:'#888'}}>
              {ct.icon} {ct.label} analytics coming soon. {cd.rows.length} rows loaded.
            </div>
          );
        })}
      </div>
      {csvRequestModal && (
        <div style={{position:'fixed',top:0,left:0,right:0,bottom:0,background:'rgba(0,0,0,0.45)',zIndex:9999,display:'flex',alignItems:'center',justifyContent:'center'}} onClick={function(){setCsvRequestModal(null);}}>
          <div style={{background:'#fff',borderRadius:12,padding:'28px 32px',maxWidth:440,width:'90%',boxShadow:'0 20px 60px rgba(0,0,0,0.3)',position:'relative'}} onClick={function(e){e.stopPropagation();}}>
            <div style={{fontSize:15,fontWeight:700,color:'#111827',marginBottom:12}}>{'🔒'} CSV Export Restricted</div>
            <div style={{fontSize:13,color:'#374151',lineHeight:1.6,marginBottom:8}}>
              To protect user privacy, CSV exports containing personally identifiable information are no longer available for direct download.
            </div>
            <div style={{fontSize:13,color:'#374151',lineHeight:1.6,marginBottom:16}}>
              To request this data, please contact the Professional Services team:
            </div>
            <div style={{background:'#f0fdf4',border:'1px solid #bbf7d0',borderRadius:8,padding:'12px 14px',marginBottom:6}}>
              <div style={{fontSize:12,color:'#6b7280',marginBottom:4}}>Requested data</div>
              <div style={{fontSize:13,fontWeight:600,color:'#111827'}}>{csvRequestModal}</div>
            </div>
            <div style={{background:'#f0f9ff',border:'1px solid #bae6fd',borderRadius:8,padding:'12px 14px',marginBottom:18}}>
              <div style={{fontSize:12,color:'#6b7280',marginBottom:4}}>Contact</div>
              <a href={'mailto:partnersupport@rec.us?subject=CSV%20Export%20Request%20-%20'+encodeURIComponent(orgSlug)+'&body='+encodeURIComponent('Hi Partner Support,\n\nI\'d like to request a CSV export.\n\nOrg: '+orgSlug+'\nData: '+csvRequestModal+'\n\nThank you!')} style={{fontSize:13,fontWeight:600,color:'#2563eb',textDecoration:'none'}}>partnersupport@rec.us</a>
            </div>
            <div style={{display:'flex',justifyContent:'flex-end',gap:10}}>
              <button style={{fontSize:13,padding:'8px 20px',borderRadius:8,border:'1px solid #d1d5db',background:'#fff',color:'#374151',cursor:'pointer',fontWeight:600,fontFamily:'inherit'}} onClick={function(){setCsvRequestModal(null);}}>Close</button>
              <a href={'mailto:dan@rec.us?subject=Report%20Request%20-%20'+encodeURIComponent(orgSlug)+'&body='+encodeURIComponent('Hi Dan,\n\nI\'d like to request a report.\n\nOrg: '+orgSlug+'\nData: '+csvRequestModal+'\n\nThank you!')} style={{fontSize:13,padding:'8px 20px',borderRadius:8,border:'none',background:'#2563eb',color:'#fff',cursor:'pointer',fontWeight:600,fontFamily:'inherit',textDecoration:'none',display:'inline-block'}}>{'📨'} Request Report</a>
            </div>
          </div>
        </div>
      )}
      <div id="report-ready" style={{display:'none'}}/>
    </React.Fragment>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
    <script src="/nav-breadcrumb.js" defer></script>
  </body>
</html>
