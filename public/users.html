<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Rec Technologies - Intelligent Reporting</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.css" />
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet.heat/0.2.0/leaflet-heat.js"></script>
<script src="/share-widget.js" defer></script>
<script src="/feedback-widget.js" defer></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Inter', -apple-system, sans-serif; background: #f8fafc; color: #374151; }
  body.print-mode .no-print { display: none !important; }
  body.print-mode .toolbar { display: none !important; }

  .toolbar { display:flex; align-items:center; gap:10px; flex-wrap:wrap; padding:8px 20px; background:#2c2c2c; color:#eee; font-size:13px; position:sticky; top:0; z-index:100; }
  .toolbar h1 { font-size:15px; font-weight:700; color:#fff; white-space:nowrap; margin-right:4px; }
  .pill { font-size:11px; font-weight:700; padding:3px 10px; border-radius:20px; }
  .spacer { flex:1; }
  .toolbar button { padding:6px 14px; border:1px solid rgba(255,255,255,.25); border-radius:4px; background:rgba(255,255,255,.08); color:#fff; font-size:12px; font-family:inherit; cursor:pointer; transition:background .15s; white-space:nowrap; }
  .toolbar button:hover { background:rgba(255,255,255,.18); }
  .toolbar .btn-pdf { background:#3b82f6; border-color:#3b82f6; font-weight:600; }
  .toolbar .btn-pdf:hover { background:#2563eb; }
  .toolbar .btn-pdf:disabled { opacity:.5; cursor:not-allowed; }
  .toolbar .divider { width:1px; height:28px; background:rgba(255,255,255,.15); margin:0 2px; }

  .cache-banner { display:flex; align-items:center; gap:10px; padding:6px 20px; background:#fffbeb; border-bottom:1px solid #fde68a; font-size:12px; color:#92400e; }
  .cache-banner button { padding:3px 10px; border-radius:4px; border:1px solid #fbbf24; background:#fff; font-size:11px; font-weight:600; cursor:pointer; font-family:inherit; color:#92400e; }
  .cache-banner button:hover { background:#fef3c7; }
  .cache-banner button:disabled { opacity:.5; cursor:default; }

  /* Tabs */
  .tabs { display:flex; gap:0; border-bottom:2px solid #e5e7eb; margin-bottom:16px; }
  .tab { padding:10px 20px; font-size:13px; font-weight:600; color:#6b7280; cursor:pointer; border-bottom:2px solid transparent; margin-bottom:-2px; transition:all .15s; user-select:none; }
  .tab:hover { color:#374151; }
  .tab.active { color:#6366f1; border-bottom-color:#6366f1; }
  .tab .tab-badge { font-size:10px; font-weight:700; padding:2px 7px; border-radius:10px; margin-left:6px; }

  .dash { max-width:1120px; margin:0 auto; padding:20px 16px; }
  .kpi-row { display:grid; grid-template-columns:repeat(auto-fit, minmax(145px, 1fr)); gap:10px; margin-bottom:14px; }
  .kpi { background:#fff; border-radius:10px; padding:14px 16px; box-shadow:0 1px 3px rgba(0,0,0,.06), 0 0 0 1px rgba(0,0,0,.03); border-top:3px solid var(--accent,#6366f1); }
  .kpi-label { font-size:10px; font-weight:600; color:#6b7280; text-transform:uppercase; letter-spacing:.06em; }
  .kpi-val { font-size:26px; font-weight:800; color:#111827; line-height:1; margin:3px 0; }
  .kpi-sub { font-size:11px; color:#9ca3af; line-height:1.4; }

  .grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:14px; }
  .panel { background:#fff; border-radius:10px; padding:16px 18px; box-shadow:0 1px 3px rgba(0,0,0,.06), 0 0 0 1px rgba(0,0,0,.03); }
  .panel-head { font-size:11px; font-weight:700; color:#374151; text-transform:uppercase; letter-spacing:.04em; margin-bottom:10px; }
  .panel-note { font-size:10px; color:#9ca3af; font-style:italic; margin-left:6px; }
  .span2 { grid-column:span 2; }

  .ring-row { display:flex; justify-content:space-around; padding:4px 0; }
  .ring-wrap { display:flex; flex-direction:column; align-items:center; gap:3px; }
  .ring-label { font-size:10px; color:#6b7280; text-align:center; }

  .chart-wrap { position:relative; height:200px; }
  .chart-wrap canvas { width:100%!important; height:100%!important; }

  .city-bar-row { display:flex; align-items:center; gap:8px; margin-bottom:3px; }
  .city-label { font-size:11px; width:90px; text-align:right; flex-shrink:0; }
  .city-track { flex:1; height:12px; background:#f1f5f9; border-radius:4px; overflow:hidden; }
  .city-fill { height:100%; border-radius:4px; display:flex; align-items:center; justify-content:center; }
  .city-fill span { font-size:8px; font-weight:700; color:#fff; }
  .city-pct { font-size:10px; color:#9ca3af; width:36px; text-align:right; }

  .obs { background:linear-gradient(135deg,#f0fdf4,#ecfeff); border-radius:10px; padding:16px 20px; border:1px solid #a7f3d0; margin-bottom:12px; }
  .obs-title { font-size:11px; font-weight:700; color:#065f46; text-transform:uppercase; letter-spacing:.04em; margin-bottom:8px; }
  .obs-grid { display:grid; grid-template-columns:1fr 1fr; gap:5px 20px; font-size:12px; color:#064e3b; line-height:1.5; }
  .emoji { display:inline; } body.print-mode .emoji { display:none; }

  .insights-section { margin-bottom:14px; }
  .insights-wrap { background:linear-gradient(135deg,#eef2ff,#f0fdfa); border-radius:10px; border:1px solid #c7d2fe; overflow:hidden; }
  .insights-head { display:flex; align-items:center; gap:12px; padding:14px 20px; }
  .insights-btn { display:inline-flex; align-items:center; gap:6px; background:#111827; color:#fff; border:none; border-radius:6px; padding:8px 16px; font-size:13px; font-weight:600; font-family:inherit; cursor:pointer; }
  .insights-btn:hover:not(:disabled) { background:#374151; }
  .insights-btn:disabled { opacity:.6; cursor:default; }
  .insights-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(230px,1fr)); gap:12px; padding:0 20px 16px; }
  .insight-card { border:1px solid #e5e7eb; border-left-width:4px; border-radius:8px; padding:12px 14px; background:#fff; }
  .insight-type { font-size:9px; font-weight:700; letter-spacing:.6px; text-transform:uppercase; margin-bottom:5px; }
  .insight-title { font-size:13px; font-weight:700; color:#111827; margin-bottom:4px; line-height:1.3; }
  .insight-detail { font-size:12px; color:#374151; line-height:1.45; }
  .insight-action { font-size:11px; color:#6b7280; margin-top:6px; font-weight:500; }
  .insight-opportunity { border-left-color:#10b981; } .insight-opportunity .insight-type { color:#059669; }
  .insight-risk { border-left-color:#f59e0b; } .insight-risk .insight-type { color:#d97706; }
  .insight-signal { border-left-color:#6366f1; } .insight-signal .insight-type { color:#4f46e5; }

  .loading { display:flex; flex-direction:column; align-items:center; justify-content:center; gap:14px; text-align:center; padding:60px 16px; color:#888; font-size:14px; }
  .loading .spinner {
    position:relative; display:inline-block; width:34px; height:44px; margin:0 auto;
    box-sizing:border-box; border:2px solid #e07b1a; border-top-color:#f7b96b;
    border-radius:4px 4px 14px 14px; background:rgba(255,248,240,0.5);
    overflow:hidden; box-shadow:inset -4px 0 0 rgba(255,255,255,0.35);
  }
  .loading .spinner::before {
    content:''; position:absolute; left:0; right:0; bottom:0; height:60%;
    background:linear-gradient(180deg,#ffb24d 0%,#ff8c1f 55%,#f2710a 100%);
    box-shadow:inset 0 2px 0 rgba(255,255,255,0.45);
    animation:juice-fill 2s ease-in-out infinite;
  }
  .loading .spinner::after {
    content:''; position:absolute; left:50%; bottom:6px; width:3px; height:3px; margin-left:-1.5px;
    border-radius:50%; background:rgba(255,255,255,0.85);
    box-shadow:-5px 7px 0 0 rgba(255,255,255,0.65), 5px 12px 0 -0.5px rgba(255,255,255,0.5);
    animation:juice-bubbles 2.2s ease-out infinite;
  }
  @keyframes juice-fill { 0%{height:42%} 50%{height:80%} 100%{height:42%} }
  @keyframes juice-bubbles { 0%{transform:translateY(2px) scale(0.5);opacity:0} 30%{opacity:0.9} 70%{opacity:0.6} 100%{transform:translateY(-22px) scale(1);opacity:0} }
  .juice-msg { position:relative; height:1.4em; line-height:1.4em; min-width:200px; margin:0 auto; }
  .juice-msg span { position:absolute; left:0; right:0; text-align:center; opacity:0; animation:juice-phrase 10s infinite; }
  .juice-msg span:nth-child(1) { animation-delay:0s; }
  .juice-msg span:nth-child(2) { animation-delay:2s; }
  .juice-msg span:nth-child(3) { animation-delay:4s; }
  .juice-msg span:nth-child(4) { animation-delay:6s; }
  .juice-msg span:nth-child(5) { animation-delay:8s; }
  @keyframes juice-phrase { 0%{opacity:0;transform:translateY(5px)} 2%{opacity:1;transform:translateY(0)} 18%{opacity:1;transform:translateY(0)} 20%{opacity:0;transform:translateY(-5px)} 100%{opacity:0} }
  .error { padding:14px; background:#fef2f2; color:#991b1b; border-radius:8px; margin:10px 0; font-size:13px; }
  .empty { padding:30px; text-align:center; color:#9ca3af; font-size:13px; }

  .alert-card { padding:10px 14px; border-radius:8px; font-size:12px; line-height:1.5; margin-bottom:6px; }
  .alert-warn { background:#fef3c7; color:#92400e; border:1px solid #fcd34d; }
  .alert-info { background:#dbeafe; color:#1e40af; border:1px solid #93c5fd; }

  .future-box { background:linear-gradient(135deg,#ede9fe,#dbeafe); border-radius:10px; padding:16px 20px; border:1px solid #c7d2fe; margin-top:12px; }
  .future-box h4 { font-size:12px; font-weight:700; color:#4338ca; margin-bottom:4px; }
  .future-box p { font-size:12px; color:#4338ca; line-height:1.6; opacity:.85; }
  .future-box ul { font-size:12px; color:#4338ca; line-height:1.8; opacity:.85; margin:6px 0 0 18px; }

  .rev-coming { display:flex; flex-direction:column; align-items:center; justify-content:center; padding:80px 20px; text-align:center; }
  .rev-coming h2 { font-size:20px; font-weight:800; color:#111827; margin-bottom:8px; }
  .rev-coming p { font-size:14px; color:#6b7280; max-width:500px; line-height:1.6; }

  @media print { body { background:#fff; } .no-print { display:none!important; } .panel { break-inside:avoid; } }
  .map-wrap { height:420px; border-radius:8px; overflow:hidden; border:1px solid #e5e7eb; position:relative; z-index:1; }
  .map-toggle { display:flex; gap:4px; }
  .map-toggle button { padding:5px 12px; border-radius:4px; border:1px solid #d1d5db; background:#fff; font-size:11px; font-weight:600; cursor:pointer; font-family:inherit; color:#6b7280; }
  .map-toggle button.active { background:#6366f1; color:#fff; border-color:#6366f1; }
  .map-loading { display:flex; align-items:center; justify-content:center; height:420px; color:#6b7280; font-size:13px; }
</style>
</head>
<body>
<div id="root"></div>
<div id="report-ready" style="display:none"></div>

<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
<script type="text/babel">
var { useState, useEffect, useCallback, useMemo, useRef } = React;

var parts = window.location.pathname.split('/').filter(Boolean);
var orgSlug = parts[0] || '';
var reportType = parts[1] || 'users';
var urlParams = new URLSearchParams(window.location.search);
var token = urlParams.get('token') || '';
var isPrint = urlParams.get('_print') === '1';
if (isPrint) document.body.classList.add('print-mode');
function withToken(u) { return !token ? u : u + (u.includes('?') ? '&' : '?') + 'token=' + encodeURIComponent(token); }

if (typeof Chart !== 'undefined') { Chart.defaults.font.family = "'Inter',sans-serif"; Chart.defaults.font.size = 11; Chart.defaults.plugins.legend.display = false; }

/* ═══ Shared UI ═══ */
function Ring({ pct, label, color }) {
  var r=28, circ=2*Math.PI*r, offset=circ*(1-pct/100);
  return (<div className="ring-wrap"><svg width="60" height="60" viewBox="0 0 72 72"><circle cx="36" cy="36" r={r} fill="none" stroke="#f1f5f9" strokeWidth="6"/><circle cx="36" cy="36" r={r} fill="none" stroke={color} strokeWidth="6" strokeDasharray={circ} strokeDashoffset={offset} strokeLinecap="round" transform="rotate(-90 36 36)"/><text x="36" y="40" textAnchor="middle" fontSize="12" fontWeight="800" fill="#111827">{pct}%</text></svg><div className="ring-label">{label}</div></div>);
}

function ChartPanel({ title, note, type, data, labelKey, dataKeys, colors, stacked, pctAxis, className, opts }) {
  var canvasRef = useRef(null); var chartRef = useRef(null);
  useEffect(function() {
    if (!canvasRef.current||!data||!data.length) return;
    if (chartRef.current) chartRef.current.destroy();
    var isLine = type === 'line';
    var datasets = dataKeys.map(function(dk,i) {
      var base = { label:dk.label||dk.key, data:data.map(function(d){return d[dk.key];}), backgroundColor:isLine?(colors[i]||'#6366f1')+'20':colors[i]||'#6366f1', borderColor:isLine?colors[i]||'#6366f1':undefined, borderWidth:isLine?2.5:0, borderRadius:isLine?0:4, barPercentage:.7, fill:isLine, tension:.3, pointRadius:isLine?3:0 };
      if (stacked && !isLine) base.borderRadius = (i===dataKeys.length-1)?4:0;
      return base;
    });
    chartRef.current = new Chart(canvasRef.current, { type:isLine?'line':'bar', data:{labels:data.map(function(d){return d[labelKey];}),datasets:datasets},
      options:Object.assign({ responsive:true, maintainAspectRatio:false, scales:{ x:{grid:{display:false},stacked:!!stacked}, y:{grid:{color:'#f1f5f9'},stacked:!!stacked,beginAtZero:true,ticks:pctAxis?{callback:function(v){return v+'%';}}:{},max:pctAxis?100:undefined}}, plugins:{legend:{display:dataKeys.length>1,position:'top',labels:{boxWidth:12,font:{size:10}}}} }, opts||{})
    });
    return function(){if(chartRef.current)chartRef.current.destroy();};
  }, [data]);
  return (<div className={'panel '+(className||'')}><div className="panel-head">{title}{note&&<span className="panel-note">{note}</span>}</div><div className="chart-wrap"><canvas ref={canvasRef}></canvas></div></div>);
}

function GeoMap({ zipData, mode }) {
  var mapRef = useRef(null);
  var mapInst = useRef(null);
  var heatLayer = useRef(null);
  var markersRef = useRef([]);
  var [coords, setCoords] = useState({});
  var [loading, setLoading] = useState(true);

  // Geocode zip codes via Nominatim, cache in localStorage
  useEffect(function() {
    if (!zipData || !zipData.length) { setLoading(false); return; }
    var cache = {};
    try { cache = JSON.parse(localStorage.getItem('_zipGeo') || '{}'); } catch(e) {}
    var toGeo = zipData.filter(function(z) { return !cache[z.zip]; });
    if (toGeo.length === 0) { setCoords(cache); setLoading(false); return; }

    // zippopotam.us is free, CORS-enabled, no rate limit — fire in parallel batches
    var batch = 0;
    var batchSize = 8;
    function doBatch() {
      var slice = toGeo.slice(batch * batchSize, (batch + 1) * batchSize);
      if (slice.length === 0) {
        try { localStorage.setItem('_zipGeo', JSON.stringify(cache)); } catch(e) {}
        setCoords(Object.assign({}, cache));
        setLoading(false);
        return;
      }
      Promise.all(slice.map(function(z) {
        return fetch('https://api.zippopotam.us/us/' + encodeURIComponent(z.zip))
          .then(function(r) { return r.ok ? r.json() : null; })
          .then(function(data) {
            if (data && data.places && data.places[0]) {
              cache[z.zip] = [parseFloat(data.places[0].latitude), parseFloat(data.places[0].longitude)];
            }
          })
          .catch(function() {});
      })).then(function() { batch++; setTimeout(doBatch, 200); });
    }
    doBatch();
  }, [zipData]);

  // Build/update map
  useEffect(function() {
    if (loading || !mapRef.current || !zipData.length) return;
    var pts = zipData.filter(function(z) { return coords[z.zip]; }).map(function(z) {
      return { lat: coords[z.zip][0], lng: coords[z.zip][1], hh: z.hh, rev: z.revenue, zip: z.zip, city: z.city };
    });
    if (!pts.length) return;

    if (!mapInst.current) {
      mapInst.current = L.map(mapRef.current, { scrollWheelZoom: true, zoomControl: true });
      L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '\u00A9 OpenStreetMap', maxZoom: 18, opacity: 0.85
      }).addTo(mapInst.current);
    }
    var map = mapInst.current;

    // Clear old
    if (heatLayer.current) { map.removeLayer(heatLayer.current); heatLayer.current = null; }
    markersRef.current.forEach(function(m) { map.removeLayer(m); });
    markersRef.current = [];

    // Heat data
    var maxVal = Math.max.apply(null, pts.map(function(p) { return mode === 'rev' ? p.rev : p.hh; }));
    var heatPts = pts.map(function(p) {
      var intensity = (mode === 'rev' ? p.rev : p.hh) / (maxVal || 1);
      return [p.lat, p.lng, Math.max(intensity, 0.1)];
    });
    heatLayer.current = L.heatLayer(heatPts, { radius: 35, blur: 25, maxZoom: 14, gradient: { 0.2: '#6366f1', 0.5: '#0d9488', 0.8: '#f59e0b', 1.0: '#f43f5e' } }).addTo(map);

    // Circle markers with value-based color gradient
    pts.forEach(function(p) {
      var val = mode === 'rev' ? p.rev : p.hh;
      var r = Math.max(Math.sqrt(val / (maxVal || 1)) * 28, 6);
      var pct = val / (maxVal || 1);
      // Color gradient: light teal → amber → red based on intensity
      var color;
      if (pct < 0.15) color = '#6ee7b7';       // light green (low)
      else if (pct < 0.3) color = '#0d9488';    // teal
      else if (pct < 0.5) color = '#0284c7';    // blue
      else if (pct < 0.7) color = '#f59e0b';    // amber
      else if (pct < 0.85) color = '#ea580c';   // orange
      else color = '#dc2626';                    // red (high)
      var marker = L.circleMarker([p.lat, p.lng], {
        radius: r, fillColor: color, fillOpacity: 0.75,
        color: '#fff', weight: 2,
      }).addTo(map);
      marker.bindTooltip(
        '<strong>' + p.city + ' ' + p.zip + '</strong><br/>' +
        p.hh + ' households<br/>' +
        '$' + Math.round(p.rev).toLocaleString() + ' revenue',
        { direction: 'top' }
      );
      markersRef.current.push(marker);
    });

    // Fit bounds
    var bounds = L.latLngBounds(pts.map(function(p) { return [p.lat, p.lng]; }));
    map.fitBounds(bounds, { padding: [30, 30], maxZoom: 12 });
  }, [loading, coords, mode, zipData]);

  if (loading) return <div className="loading" style={{height:420}}><div className="spinner"/><div className="juice-msg"><span>Squeezing the oranges…</span><span>Juicing!</span><span>Adding the pulp…</span><span>Chilling the glass…</span><span>Pouring it out…</span></div></div>;
  return <div ref={mapRef} className="map-wrap"></div>;
}

function GenderChart({ gender, genderSpecified, total, colors }) {
  var canvasRef = useRef(null); var chartRef = useRef(null);
  useEffect(function() {
    if (!canvasRef.current) return;
    if (chartRef.current) chartRef.current.destroy();
    chartRef.current = new Chart(canvasRef.current, { type:'doughnut', data:{labels:gender.map(function(g){return g.name;}),datasets:[{data:gender.map(function(g){return g.value;}),backgroundColor:colors.slice(0,gender.length),borderWidth:0}]}, options:{responsive:true,maintainAspectRatio:false,cutout:'60%',plugins:{legend:{display:true,position:'right',labels:{boxWidth:12,font:{size:10}}}}} });
    return function(){if(chartRef.current)chartRef.current.destroy();};
  }, [gender]);
  return (<div className="panel"><div className="panel-head">Gender<span className="panel-note">{total-genderSpecified} not specified</span></div><div className="chart-wrap"><canvas ref={canvasRef}></canvas></div></div>);
}

/* ═══ compute() ═══ */
function compute(rows) {
  var EXPECTED_KEYS=['Household ID','Role','HoH Name','Created At','Rec ID','First Name','Last Name','Email','Phone','Street Number','Street Name','City','State','Zip Code','Date of Birth','Age','Grade','Gender','Residency?','Gross Revenue','Refunds','Net Revenue','Items Purchased','First Transaction','Last Transaction','Program Revenue','Facility Revenue','Fee Revenue','Product Revenue'];
  rows = rows.map(function(r) {
    var o={};
    EXPECTED_KEYS.forEach(function(k){o[k]='';});
    Object.keys(r).forEach(function(k){o[k]=r[k]==null?'':String(r[k]);});
    return o;
  });

  // Guest detection: First Name = 'Guest' or email matches guest-user+guest-*
  function isGuest(r) {
    var fn = (r['First Name']||'').trim().toLowerCase();
    var em = (r['Email']||'').trim().toLowerCase();
    return fn === 'guest' || em.indexOf('guest-user+guest-') === 0;
  }
  function isStaff(r) {
    var em = (r['Email']||'').trim().toLowerCase();
    // Exclude guest-user+* emails — they're checkout-only accounts, not staff
    return em.indexOf('@rec.us') !== -1 && em.indexOf('guest-user+') !== 0;
  }

  // Always exclude staff accounts (@rec.us)
  var staffCount = rows.filter(isStaff).length;
  rows = rows.filter(function(r){return !isStaff(r);});

  var allRows = rows;
  var guestRows = rows.filter(isGuest);
  var registeredRows = rows.filter(function(r){return !isGuest(r);});
  var guestCount = guestRows.length;

  if(nonresAvg>0&&resAvg>nonresAvg) levers.push({title:'Close the non-resident spend gap',desc:'Non-residents avg $'+Math.round(nonresAvg)+' vs residents $'+Math.round(resAvg)+'. If non-resident spenders matched resident levels:',opp:Math.round((resAvg-nonresAvg)*nonresSpend.length),segment:'nonresident'});
  var size1Conv=0,size2Conv=0;
  if(sizeRevMap['1']){size1Conv=sizeRevMap['1'].spend.length/sizeRevMap['1'].all;}
  if(sizeRevMap['2']){size2Conv=sizeRevMap['2'].spend.length/sizeRevMap['2'].all;}
  if(size1Conv<size2Conv&&sizeRevMap['1']) levers.push({title:'Activate single-person households',desc:'Solo HH convert at '+Math.round(size1Conv*100)+'% vs '+Math.round(size2Conv*100)+'% for pairs. If solo conversion matched pairs:',opp:Math.round((size2Conv-size1Conv)*sizeRevMap['1'].all*(sizeRevMap['1'].spend.length>0?sizeRevMap['1'].total/sizeRevMap['1'].spend.length:medianRev)),segment:'solo'});

  // 5. Lapsing households (last txn > 90 days ago)
  var lapsingIds=new Set();
  rows.forEach(function(r){
    if(r['Role']!=='Head of Household')return;
    var hid=r['Household ID'];
    var lastTxn=parseDate(col(r,['Last Transaction','last_transaction']));
    if(lastTxn&&(now-lastTxn)>90*86400000)lapsingIds.add(hid);
  });
  var lapsingCSV=[];
  lapsingIds.forEach(function(hid){if(hohInfoMap[hid]){var info=Object.assign({},hohInfoMap[hid]);lapsingCSV.push(info);}});

  // Non-resident CSV
  var nonresCSV=[];
  Object.keys(hohInfoMap).forEach(function(hid){if(hohInfoMap[hid]['Residency']!=='Yes')nonresCSV.push(hohInfoMap[hid]);});

  // Solo unbooked CSV
  var soloUnbookedCSV=[];
  unbookedIds.forEach(function(hid){if(hohInfoMap[hid]&&(hhMap[hid]||1)===1)soloUnbookedCSV.push(hohInfoMap[hid]);});

  return {
    total:total, hohCount:hohs.length, memCount:members.length,
    residents:residents, nonResidents:total-residents, resPct:((residents/total)*100).toFixed(1),
    hhCount:hhCount, medianHH:medianHH, avgHH:avgHH, hhSizeData:hhSizeData, multiHH:multiHH, maxHH:maxHH,
    medianAge:medianAge, medianHohAge:medianHohAge, medianMemAge:medianMemAge,
    minAge:allAges[0], maxAge:allAges[allAges.length-1], withAge:allAges.length,
    badAges:badAges, ageDist:ageDist,

    gradeData:gradeData, withGrade:withGrade,
    signups:signups, cumulative:cumulative,
    cities:topCities, topCity:topCity, resByAge:resByAge,
    noAge:noAge, noGender:noGender, noZip:noZip, zipData:zipData,
    last30:last30, last90:last90, peakMonth:peakMonth,
    // Revenue
    hasRevData:hasRevData, totalGross:totalGross, totalRefunds:totalRefunds, totalNet:totalNet,
    spendingHH:spendingHH.length, unbookedHH:unbookedHH.length,
    medianRev:medianRev, avgRev:avgRev,
    revP25:pctile(spendNets,25), revP75:pctile(spendNets,75), revP90:pctile(spendNets,90), revP95:pctile(spendNets,95),
    revDist:revDist, resByRes:resByRes, revBySize:revBySize, paretoData:paretoData,
    refundRate:totalGross>0?((totalRefunds/totalGross)*100).toFixed(1):'0',
    conversionRate:hhCount>0?((spendingHH.length/hhCount)*100).toFixed(0):'0',
    hhOver100:hhRevList.filter(function(h){return h.net>100;}).length,
    hhOver500:hhRevList.filter(function(h){return h.net>500;}).length,
    // Strategy
    unbookedProfile:unbookedProfile, spenderProfile:spenderProfile,
    unbookedCSV:unbookedCSV, lapsingCSV:lapsingCSV, nonresCSV:nonresCSV, soloUnbookedCSV:soloUnbookedCSV,
    revByAgeBracket:revByAgeBracket, gradeRevData:gradeRevData,
    levers:levers, lapsingCount:lapsingIds.size,
    catData:catData, hasCatData:hasCatData,
    totalProgRev:totalProgRev, totalFacRev:totalFacRev, totalFeeRev:totalFeeRev, totalProdRev:totalProdRev,
    progOnly:progOnly, facOnly:facOnly, bothProgFac:bothProgFac, progHH:progHH, facHH:facHH,

/* ═══ Auto observations ═══ */
function E(emoji){return React.createElement('span',{className:'emoji'},emoji+' ');}
function buildObs(s) {
  var o=[];
  o.push({e:'\uD83D\uDC68\u200D\uD83D\uDC69\u200D\uD83D\uDC67\u200D\uD83D\uDC66',l:'Households',t:s.hhCount+' households, '+s.total+' people total. '+s.hohCount+' HoH + '+s.memCount+' members. Median HH size: '+s.medianHH+'.'});
  if(s.medianMemAge!==null) o.push({e:'\uD83D\uDC76',l:'Ages',t:'Member median age '+s.medianMemAge+' vs HoH median '+s.medianHohAge+'. '+(s.medianMemAge<18?'Primarily a family/youth community.':'Mixed adult household base.')});
  if(s.peakMonth.count>s.total*0.15) o.push({e:'\uD83D\uDCC8',l:'Growth',t:s.peakMonth.month+' peak: '+s.peakMonth.count+' signups ('+Math.round(s.peakMonth.count/s.total*100)+'% of all).'});
  o.push({e:'\uD83C\uDFE0',l:'Residency',t:s.resPct+'% residency rate. '+(parseFloat(s.resPct)>75?'Strong local base.':parseFloat(s.resPct)>50?'Moderate local mix.':'Heavy non-resident usage.')});
  if(s.withGrade>10) o.push({e:'\uD83C\uDF93',l:'Grades',t:s.withGrade+' people with grade data. Most common: '+s.gradeData[0].grade+' ('+s.gradeData[0].count+'). Covers preschool through high school.'});
  var gapPct=Math.round(Math.max(s.noAge,s.noGender)/s.total*100);
  if(gapPct>15) o.push({e:'\u26A0\uFE0F',l:'Data Gap',t:'Up to '+gapPct+'% missing demographics. '+s.noAge+' missing age, '+s.noGender+' missing gender.'});

  if(s.topCity) o.push({e:'\uD83D\uDDFA\uFE0F',l:'Geography',t:Math.round(s.cities[0].count/s.total*100)+'% from '+s.topCity+'. Spans '+s.cities.length+'+ cities.'});
  if(s.guestCount>0) o.push({e:'\uD83D\uDC64',l:'Guest Accounts',t:s.guestCount.toLocaleString()+' guest checkout accounts ($'+Math.round(s.guestGross).toLocaleString()+' revenue). See the Guests tab for full analytics.'});
  return o;
}
function buildRevObs(s) {
  if(!s.hasRevData) return [];
  var o=[];
  o.push({e:'\uD83D\uDCB0',l:'Total Revenue',t:'$'+Math.round(s.totalNet).toLocaleString()+' net across '+s.spendingHH+' spending households. $'+Math.round(s.totalRefunds).toLocaleString()+' in refunds ('+s.refundRate+'%).'});
  o.push({e:'\uD83D\uDCCA',l:'Typical Spend',t:'Median household spends $'+Math.round(s.medianRev)+', avg $'+Math.round(s.avgRev)+'. Top 5% spend $'+Math.round(s.revP95)+'+'});
  o.push({e:'\uD83D\uDEAA',l:'Conversion',t:s.conversionRate+'% of households have purchased ('+s.spendingHH+' of '+s.hhCount+'). '+s.unbookedHH+' signed up but never bought.'});
  if(s.resByRes&&s.resByRes[0]&&s.resByRes[1]) o.push({e:'\uD83C\uDFE0',l:'Resident Gap',t:'Residents avg $'+s.resByRes[0].avg+' vs non-residents $'+s.resByRes[1].avg+'. '+(s.resByRes[0].avg>s.resByRes[1].avg*1.5?'Residents spend significantly more.':'Relatively balanced spend.')});
  if(s.hasCatData&&s.totalProgRev>0) o.push({e:'\uD83C\uDFAF',l:'Category Mix',t:'Programs: $'+Math.round(s.totalProgRev).toLocaleString()+', Facilities: $'+Math.round(s.totalFacRev).toLocaleString()+'. '+s.progHH+' HH use programs, '+s.facHH+' book facilities.'});
  if(s.revBySize&&s.revBySize.length>1) o.push({e:'\uD83D\uDC6A',l:'Family Spend',t:'Larger families spend more: size 1 avg $'+(s.revBySize[0]?.avg||0)+' vs size 3+ avg $'+(s.revBySize[2]?.avg||s.revBySize[1]?.avg||0)+'. Family programming drives revenue.'});
  return o;
}
function buildStratObs(s) {
  if(!s.hasRevData) return [];
  var o=[];
  if(s.unbookedHH>0) o.push({e:'\uD83D\uDCA1',l:'Unbooked Gap',t:s.unbookedHH+' households signed up but never purchased. If converted at median rate, that\u2019s +$'+Math.round(s.unbookedHH*s.medianRev).toLocaleString()+' potential revenue.'});
  if(s.lapsingCount>0) o.push({e:'\u23F0',l:'Lapsing Risk',t:s.lapsingCount+' previously active households haven\u2019t purchased in 90+ days. These are re-engagement targets.'});
  if(s.progOnly>0) o.push({e:'\uD83C\uDFAE',l:'Cross-Sell',t:s.progOnly+' HH use programs but never booked a facility. '+s.facOnly+' book facilities but aren\u2019t in programs. Cross-sell opportunity.'});
  if(s.gradeRevData&&s.gradeRevData.length>0){var top=s.gradeRevData[0];o.push({e:'\uD83C\uDF93',l:'Grade Insight',t:'Highest concentration: '+top.grade+' ('+top.kids+' kids). HH with '+top.grade+' students avg $'+top.avgHHRev+' spend.'});}
  if(s.levers&&s.levers.length>0){var totalOpp=s.levers.reduce(function(sum,l){return sum+l.opp;},0);o.push({e:'\uD83D\uDE80',l:'Total Opportunity',t:s.levers.length+' revenue levers identified totaling +$'+Math.round(totalOpp).toLocaleString()+' in potential revenue.'});}
  return o;
}

/* ═══ MAIN ═══ */
function App() {
  var [rows, setRows] = useState(null);

  var [mapMode, setMapMode] = useState('hh');

  // ── Cross-tab infrastructure ──────────────────────────────
  // Tabs that appear conditionally based on org's enabled reports
  var CROSS_TABS = [
    { key:'fasttrack', report:'fasttrack', label:'Fast Track', icon:'\u26A1', badge:null, color:'#6366f1' },
    { key:'products',  report:'products',  label:'Products',   icon:'\uD83D\uDED2', badge:null, color:'#db2777' },
  ];
  var orgReports = useMemo(function(){
    try { return (window.ORG_CONFIG && window.ORG_CONFIG.reports) || []; } catch(e){ return []; }
  }, []);
  var [crossData, setCrossData] = useState({});   // { fasttrack: { rows:[], loading:false, error:null }, ... }
  var [crossComputed, setCrossComputed] = useState({});  // { fasttrack: { ...analytics }, ... }

  function fetchCrossTab(key, report) {
    if (crossData[key] && (crossData[key].rows || crossData[key].loading)) return;
    setCrossData(function(prev){
      var next = Object.assign({}, prev);
      next[key] = { rows:null, loading:true, error:null };
      return next;
    });
    fetch(withToken('/'+orgSlug+'/'+report+'/api/data'))
      .then(function(r){if(!r.ok)throw new Error('HTTP '+r.status);return r.json();})
      .then(function(j){
        var rows = j.rows||j.data||j||[];
        setCrossData(function(prev){
          var next = Object.assign({}, prev);
          next[key] = { rows:rows, loading:false, error:null };
          return next;
        });
      })
      .catch(function(e){
        setCrossData(function(prev){
          var next = Object.assign({}, prev);
          next[key] = { rows:null, loading:false, error:e.message };
          return next;
        });
      });
  }

  function switchTab(t){
    setTab(t);setInsights(null);setInsightsError(null);
    // Lazy-fetch cross-tab data
    var ct = CROSS_TABS.find(function(c){return c.key===t;});
    if (ct && orgReports.indexOf(ct.report) !== -1) fetchCrossTab(ct.key, ct.report);
  }
  var [insights, setInsights] = useState(null);
  var [insightsLoading, setInsightsLoading] = useState(false);
  var [insightsError, setInsightsError] = useState(null);

  useEffect(function() {
    fetch(withToken('/'+orgSlug+'/'+reportType+'/api/data'))
      .then(function(r){if(!r.ok)throw new Error('HTTP '+r.status);return r.json();})
      .then(function(j){
        setRows(j.rows||j);
        if(j.meta&&j.meta.cached_at) setCacheInfo({at:j.meta.cached_at});
        else setCacheInfo(null);
        setLoading(false);
      })
      .catch(function(e){setError(e.message);setLoading(false);});
  }, []);

  // Defer heavy compute to next frame so the page shell renders instantly
  var [s, setS] = useState(null);
  var [computing, setComputing] = useState(false);
  useEffect(function(){
    if (!rows) { setS(null); return; }
    setComputing(true);
    var id = setTimeout(function(){
      setS(compute(rows));
      setComputing(false);
    }, 0);
    return function(){ clearTimeout(id); };
  }, [rows]);

  var observations = useMemo(function(){return s?buildObs(s):[];}, [s]);
  var revObservations = useMemo(function(){return s?buildRevObs(s):[];}, [s]);
  var stratObservations = useMemo(function(){return s?buildStratObs(s):[];}, [s]);

  // ── Cross-tab computed analytics ──────────────────────────
  var ftAnalytics = useMemo(function(){
    var cd = crossData.fasttrack;
    if (!cd || !cd.rows || cd.rows.length === 0) return null;
    var allFtRows = cd.rows;
    var sectionRows = allFtRows.filter(function(r){ return (r['Row Type']||'section') !== 'user'; });
    var userRows    = allFtRows.filter(function(r){ return r['Row Type'] === 'user'; });

    // Section-level analytics (existing)
    var totalSignups=0, totalConverted=0, totalPending=0, totalDropped=0;
    var totalEnrolled=0, totalCapacity=0, totalDirect=0;
    var sectionCount=0;
    var programMap={};
    sectionRows.forEach(function(r){
      var signups = parseInt(r['FT Signups']||r['ft_signups']||0)||0;
      var converted = parseInt(r['FT Converted']||r['ft_converted']||0)||0;
      var pending = parseInt(r['FT Pending']||r['ft_pending']||0)||0;
      var dropped = parseInt(r['FT Dropped']||r['ft_dropped']||0)||0;
      var enrolled = parseInt(r['Total Enrolled']||r['total_enrolled']||0)||0;
      var cap = parseInt(r['Capacity']||r['capacity']||0)||0;
      var direct = parseInt(r['Direct Enrolled']||r['direct_enrolled']||0)||0;
      var prog = r['Program']||r['program']||'Unknown';
      totalSignups+=signups; totalConverted+=converted; totalPending+=pending; totalDropped+=dropped;
      totalEnrolled+=enrolled; totalCapacity+=cap; totalDirect+=direct;
      if(signups>0) sectionCount++;
      if(!programMap[prog]) programMap[prog]={signups:0,converted:0,pending:0,dropped:0,sections:0};
      programMap[prog].signups+=signups; programMap[prog].converted+=converted;
      programMap[prog].pending+=pending; programMap[prog].dropped+=dropped;
      programMap[prog].sections++;
    });
    var convRate = totalSignups>0?((totalConverted/totalSignups)*100).toFixed(1):'0';
    var ftShareOfEnrolled = totalEnrolled>0?((totalConverted/totalEnrolled)*100).toFixed(1):'0';
    var topPrograms = Object.keys(programMap).map(function(p){return Object.assign({name:p},programMap[p]);})
      .filter(function(p){return p.signups>0;})
      .sort(function(a,b){return b.signups-a.signups;})
      .slice(0,12);
    var funnel = [
      {label:'FT Signups',value:totalSignups},
      {label:'Converted',value:totalConverted},
      {label:'Pending',value:totalPending},
      {label:'Dropped',value:totalDropped}
    ];

    // User-level demographic crossover
    var demo = { hasData:false, ftUsers:userRows.length, matched:0,
      ages:[], resYes:0, resNo:0, cities:{}, zips:{}, ftRevTotal:0, ftRevHHs:0,
      ageBrackets:{'0-5':0,'6-12':0,'13-17':0,'18-25':0,'26-35':0,'36-45':0,'46-55':0,'56-65':0,'65+':0} };
    if (userRows.length > 0 && rows && rows.length > 0) {
      var emailMap = {};
      var hhMap = {};
      rows.forEach(function(r){
        var em = (r['Email']||'').trim().toLowerCase();
        if (em) emailMap[em] = r;
        var hh = r['Household ID']||'';
        if (hh && !hhMap[hh]) hhMap[hh] = r;
      });
      var matchedHHs = new Set();
      userRows.forEach(function(ur){
        var em = (ur['User Email']||'').trim().toLowerCase();
        var hh = ur['User HH ID']||'';
        var match = emailMap[em] || hhMap[hh] || null;
        if (!match) return;
        demo.matched++;
        var mhh = match['Household ID']||'';
        if (matchedHHs.has(mhh)) return;
        matchedHHs.add(mhh);
        var rawRev = match['Net Revenue'] || match['net_revenue'] || match['Net_Revenue'] || 0;
        var hhNet = parseFloat(String(rawRev).replace(/,/g,'')) || 0;
        if (hhNet > 0) { demo.ftRevTotal += hhNet; demo.ftRevHHs++; }
        var age = parseInt(match['Age'])||0;
        if (age > 0 && age < 120) {
          demo.ages.push(age);
          if(age<=5) demo.ageBrackets['0-5']++;
          else if(age<=12) demo.ageBrackets['6-12']++;
          else if(age<=17) demo.ageBrackets['13-17']++;
          else if(age<=25) demo.ageBrackets['18-25']++;
          else if(age<=35) demo.ageBrackets['26-35']++;
          else if(age<=45) demo.ageBrackets['36-45']++;
          else if(age<=55) demo.ageBrackets['46-55']++;
          else if(age<=65) demo.ageBrackets['56-65']++;
          else demo.ageBrackets['65+']++;
        }
        var res = (match['Residency?']||'').trim();
        if (res === 'Yes') demo.resYes++;
        else if (res === 'No') demo.resNo++;
        var city = (match['City']||'').trim();
        if (city) demo.cities[city] = (demo.cities[city]||0)+1;
        var zip = (match['Zip Code']||'').trim();
        if (zip) demo.zips[zip] = (demo.zips[zip]||0)+1;
      });
      demo.hasData = demo.matched > 0;
      demo.medianAge = demo.ages.length > 0 ? (function(a){a.sort(function(x,y){return x-y;});return a[Math.floor(a.length/2)];})(demo.ages.slice()) : null;
      demo.resPct = (demo.resYes+demo.resNo)>0 ? ((demo.resYes/(demo.resYes+demo.resNo))*100).toFixed(1) : null;
      demo.topCities = Object.keys(demo.cities).map(function(c){return {city:c,count:demo.cities[c]};}).sort(function(a,b){return b.count-a.count;}).slice(0,8);
      demo.topZips = Object.keys(demo.zips).map(function(z){return {zip:z,count:demo.zips[z]};}).sort(function(a,b){return b.count-a.count;}).slice(0,8);
      demo.ageBracketData = Object.keys(demo.ageBrackets).map(function(k){return {label:k,count:demo.ageBrackets[k]};});
      demo.matchedHHs = matchedHHs.size;
      demo.avgFtSpend = demo.ftRevHHs > 0 ? Math.round(demo.ftRevTotal / demo.ftRevHHs) : 0;
    }

    // Efficiency metrics (industry benchmarks: avg phone/walk-in registration ~10 min,
    // FT self-service ~2 min, saving ~8 min per registration; BLS median rec worker $23/hr)
    var MINS_SAVED_PER_FT = 8;
    var ADMIN_HOURLY_RATE = 23;
    var adminMinsSaved = totalConverted * MINS_SAVED_PER_FT;
    var adminHoursSaved = Math.round(adminMinsSaved / 60);
    var costSavings = Math.round((adminMinsSaved / 60) * ADMIN_HOURLY_RATE);

    return {
      totalSignups:totalSignups, totalConverted:totalConverted, totalPending:totalPending, totalDropped:totalDropped,
      convRate:convRate, sectionCount:sectionCount, totalSections:sectionRows.length,
      ftShareOfEnrolled:ftShareOfEnrolled, totalEnrolled:totalEnrolled, totalDirect:totalDirect,
      topPrograms:topPrograms, funnel:funnel, demo:demo,
      adminHoursSaved:adminHoursSaved, costSavings:costSavings,
    };
  }, [crossData.fasttrack, rows]);

  var getInsights = useCallback(function() {
    if(!s||insightsLoading)return;
    setInsightsLoading(true);setInsightsError(null);
    fetch(withToken('/'+orgSlug+'/'+reportType+'/api/insights'),{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(buildInsightsBlob(s,tab))})
    .then(function(r){return r.json();})
    .then(function(j){if(!j.ok)throw new Error(j.error||'Failed');setInsights(j.insights||[]);})
    .catch(function(e){setInsightsError(e.message);})
    .finally(function(){setInsightsLoading(false);});
  }, [s,insightsLoading]);

  var [pdfLoading, setPdfLoading] = useState(false);

  function refreshData() {
    setRefreshing(true);setCacheInfo(null);
    var url = withToken('/'+orgSlug+'/'+reportType+'/api/data');
    url += (url.includes('?') ? '&' : '?') + '_nocache=1';
    fetch(url)
      .then(function(r){if(!r.ok)throw new Error('HTTP '+r.status);return r.json();})
      .then(function(j){
        setRows(j.rows||j);
        if(j.meta&&j.meta.cached_at) setCacheInfo({at:j.meta.cached_at});
        else setCacheInfo(null);
      })
      .catch(function(e){setError(e.message);})
      .finally(function(){setRefreshing(false);});
  }

  function downloadPdf() {
    setPdfLoading(true);
    fetch(withToken('/'+orgSlug+'/'+reportType+'/api/pdf'))
      .then(function(r){return r.blob();})
      .then(function(blob){
        var a=document.createElement('a');
        a.href=URL.createObjectURL(blob);
        a.download='users-report-'+orgSlug+'.pdf';
        document.body.appendChild(a);a.click();a.remove();
      })
      .catch(function(e){alert('PDF generation failed: '+e.message);})
      .finally(function(){setPdfLoading(false);});
  }

  useEffect(function(){window.recShareLink=function(){return window.location.href;};}, []);

  function exportCSV(data, filename) {
    if(!data||!data.length){alert('No data to export');return;}
    var ws=XLSX.utils.json_to_sheet(data);
    var wb=XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb,ws,'Export');
    XLSX.writeFile(wb,filename+'.csv',{bookType:'csv'});
  }

  if(loading) return <div className="loading"><div className="spinner"/><div className="juice-msg"><span>Squeezing the oranges…</span><span>Juicing!</span><span>Adding the pulp…</span><span>Chilling the glass…</span><span>Pouring it out…</span></div></div>;
  if(error) return <div className="dash"><div className="error"><strong>Error:</strong> {error}</div></div>;
  if(!s) return <div className="loading"><div className="spinner"/><div style={{color:'#888',fontSize:13,marginTop:8}}>{computing?'Crunching '+((rows&&rows.length)||0).toLocaleString()+' records…':'No data returned.'}</div></div>;

  var TEAL='#0d9488',AMBER='#f59e0b',ROSE='#f43f5e',EMERALD='#10b981',INDIGO='#6366f1',PURPLE='#8b5cf6',SKY='#0ea5e9';
  var GENDER_COLORS=[INDIGO,'#94a3b8',SKY,AMBER,PURPLE];

  var insightsBlock = (
    <div className="insights-section no-print">
      <div className="insights-wrap">
        <div className="insights-head">
          <button type="button" className="insights-btn" onClick={getInsights} disabled={insightsLoading}>
            {insightsLoading?'Analyzing…':(insights?'↻ Refresh':'✨ Rec Insights')}
          </button>
          {insights&&!insightsLoading&&<span style={{fontSize:11,color:'#9ca3af'}}>Analyzed {s.hhCount} households, {s.total} people</span>}
        </div>
        {insightsLoading&&<div className="loading"><div className="spinner"/><div className="juice-msg"><span>Squeezing the oranges…</span><span>Juicing!</span><span>Adding the pulp…</span><span>Chilling the glass…</span><span>Pouring it out…</span></div></div>}
        {insightsError&&!insightsLoading&&<div style={{padding:'8px 20px 16px'}}><div className="error">{insightsError}</div></div>}
        {insights&&!insightsLoading&&(
          <div className="insights-grid">
            {insights.map(function(ins,i){return(
              <div key={i} className={'insight-card insight-'+(ins.type||'signal')}>
                <div className="insight-type">{ins.type||'signal'}</div>
                <div className="insight-title">{ins.title}</div>
                <div className="insight-detail">{ins.detail}</div>
                {ins.action&&<div className="insight-action">{'\u2192'} {ins.action}</div>}
              </div>
            );})}
          </div>
        )}
      </div>
    </div>
  );
  var agePct=Math.round(s.withAge/s.total*100);
  var genderPct=Math.round(s.genderSpecified/s.total*100);
  var zipPct=Math.round((s.total-s.noZip)/s.total*100);
  var gradePct=Math.round(s.withGrade/s.total*100);

  return (
    <React.Fragment>
      <div className="toolbar no-print">
        <h1>Community Intelligence</h1>
        <span className="pill" style={{background:'rgba(255,255,255,.12)',color:'#ddd'}}>{orgSlug.charAt(0).toUpperCase()+orgSlug.slice(1)}</span>
        <span className="pill" style={{background:'rgba(16,185,129,.15)',color:'#6ee7b7'}}>{s.hhCount} HH &middot; {s.total} people</span>
        <div className="spacer"/>
        <div className="divider"/>
        <button onClick={function(){window.print();}}>{'\uD83D\uDDA8\uFE0F'} Print</button>
        <button className="btn-pdf" onClick={downloadPdf} disabled={pdfLoading}>
          {pdfLoading?'Generating…':'\uD83D\uDCC4 PDF'}
        </button>
      </div>

      {cacheInfo&&(
        <div className="cache-banner no-print">
          <span>Cached data from <strong>{new Date(cacheInfo.at).toLocaleString()}</strong></span>
          <button onClick={refreshData} disabled={refreshing}>{refreshing?'Refreshing…':'Refresh Now'}</button>
        </div>
      )}

      <div className="dash">
        {/* Tabs */}
        <div className="tabs no-print">
          <div className={'tab'+(tab==='demo'?' active':'')} onClick={function(){switchTab('demo');}}>
            Demographics
          </div>
          <div className={'tab'+(tab==='revenue'?' active':'')} onClick={function(){switchTab('revenue');}}>
            Revenue
            <span className="tab-badge" style={{background:s.hasRevData?'#dcfce7':'#fef3c7',color:s.hasRevData?'#166534':'#92400e'}}>{s.hasRevData?'$'+(s.totalNet/1000).toFixed(0)+'K':'No data'}</span>
          </div>
          <div className={'tab'+(tab==='strategy'?' active':'')} onClick={function(){switchTab('strategy');}}>
            Strategy
            {s.hasRevData&&s.levers.length>0&&<span className="tab-badge" style={{background:'#fef3c7',color:'#92400e'}}>{s.levers.length} levers</span>}
          </div>
          {s.guestCount>0&&(
            <div className={'tab'+(tab==='guests'?' active':'')} onClick={function(){switchTab('guests');}}>
              Guests
              <span className="tab-badge" style={{background:'#fce7f3',color:'#9d174d'}}>{s.guestCount>999?(s.guestCount/1000).toFixed(1)+'K':s.guestCount}</span>
            </div>
          )}
          {/* Cross-report tabs: enabled reports get live tabs, others get locked teasers */}
          {CROSS_TABS.map(function(ct){
            var enabled = orgReports.indexOf(ct.report) !== -1;
            var isActive = tab === ct.key;
            if (enabled) return (
              <div key={ct.key} className={'tab'+(isActive?' active':'')} onClick={function(){switchTab(ct.key);}}>
                {ct.icon} {ct.label}
                {crossData[ct.key]&&crossData[ct.key].rows&&<span className="tab-badge" style={{background:ct.color+'22',color:ct.color}}>{crossData[ct.key].rows.length}</span>}
              </div>
            );
            return (
              <div key={ct.key} className={'tab'+(isActive?' active':'')} onClick={function(){switchTab(ct.key);}} style={{opacity:0.5}}>
                {ct.icon} {ct.label}
                <span className="tab-badge" style={{background:'#f3f4f6',color:'#9ca3af'}}>{'🔒'}</span>
              </div>
            );
          })}
        </div>

        {tab==='demo' && (
          <React.Fragment>
            {/* KPIs */}
            <div className="kpi-row">
              <div className="kpi" style={{'--accent':INDIGO}}><div className="kpi-label">Households</div><div className="kpi-val">{s.hhCount}</div><div className="kpi-sub">+{s.last30} last 30d</div></div>
              <div className="kpi" style={{'--accent':PURPLE}}><div className="kpi-label">Total People</div><div className="kpi-val">{s.total}</div><div className="kpi-sub">{s.hohCount} HoH + {s.memCount} members</div></div>
              <div className="kpi" style={{'--accent':TEAL}}><div className="kpi-label">Residents</div><div className="kpi-val">{s.resPct}%</div><div className="kpi-sub">{s.residents} of {s.total}</div></div>
              <div className="kpi" style={{'--accent':AMBER}}><div className="kpi-label">Median HH Size</div><div className="kpi-val">{s.medianHH}</div><div className="kpi-sub">Avg {s.avgHH} &middot; Max {s.maxHH}</div></div>
              <div className="kpi" style={{'--accent':SKY}}><div className="kpi-label">Median Age</div><div className="kpi-val">{s.medianAge!=null?s.medianAge:'\u2014'}</div><div className="kpi-sub">HoH {s.medianHohAge} &middot; Mem {s.medianMemAge}</div></div>
              <div className="kpi" style={{'--accent':EMERALD}}><div className="kpi-label">With Grade</div><div className="kpi-val">{s.withGrade}</div><div className="kpi-sub">{gradePct}% of people</div></div>
            </div>

            {/* Key Observations */}
            <div className="obs">
              <div className="obs-title">Key Observations</div>
              <div className="obs-grid">{observations.map(function(o,i){return <div key={i}>{E(o.e)}<strong style={{color:'#065f46'}}>{o.l}</strong> {o.t}</div>;})}</div>
            </div>

            {insightsBlock}

            {/* Row 1: HH Size + Residency */}
            <div className="grid">
              <ChartPanel title="Household Size Distribution" note={s.multiHH+' multi-member'} type="bar" data={s.hhSizeData} labelKey="size" dataKeys={[{key:'count',label:'Households'}]} colors={[INDIGO]} />
              <div className="panel">
                <div className="panel-head">Residency &amp; Completeness</div>
                <div style={{display:'flex',height:20,borderRadius:5,overflow:'hidden',marginBottom:10}}>
                  <div style={{width:s.resPct+'%',background:TEAL,display:'flex',alignItems:'center',justifyContent:'center'}}><span style={{fontSize:10,fontWeight:700,color:'#fff'}}>{s.residents}</span></div>
                  <div style={{flex:1,background:'#e2e8f0',display:'flex',alignItems:'center',justifyContent:'center'}}><span style={{fontSize:10,fontWeight:700,color:'#6b7280'}}>{s.nonResidents}</span></div>
                </div>
                <div className="ring-row">
                  <Ring pct={agePct} label="DOB" color={agePct<70?ROSE:agePct<85?AMBER:EMERALD} />
                  <Ring pct={genderPct} label="Gender" color={genderPct<50?ROSE:genderPct<75?AMBER:EMERALD} />
                  <Ring pct={zipPct} label="Zip" color={zipPct<90?AMBER:EMERALD} />
                  <Ring pct={gradePct} label="Grade" color={gradePct<10?ROSE:gradePct<30?AMBER:EMERALD} />
                </div>
              </div>
            </div>

            {/* Row 2: Signups + Growth */}
            <div className="grid">
              <ChartPanel title="New Signups by Month" data={s.signups} labelKey="month" dataKeys={[{key:'count',label:'Signups'}]} colors={[INDIGO]} />
              <ChartPanel title="Cumulative Growth" type="line" data={s.cumulative} labelKey="month" dataKeys={[{key:'cumulative',label:'Total'}]} colors={[INDIGO]} />
            </div>

            {/* Row 3: Age by Role + Gender */}
            <div className="grid">
              <ChartPanel title="Age Distribution by Role" note="HoH vs Members" data={s.ageDist} labelKey="range" dataKeys={[{key:'hoh',label:'Head of Household'},{key:'member',label:'Member'}]} colors={[INDIGO,'#c7d2fe']} stacked />
              <GenderChart gender={s.gender} genderSpecified={s.genderSpecified} total={s.total} colors={GENDER_COLORS} />
            </div>

            {/* Row 4: Residency by Age + Grade */}
            <div className="grid">
              <ChartPanel title="Residency Rate by Age" note="% of each group" data={s.resByAge} labelKey="range" dataKeys={[{key:'rate',label:'Resident %'}]} colors={s.resByAge.map(function(e){return e.rate>=80?TEAL:e.rate>=65?AMBER:ROSE;})} pctAxis />
              <ChartPanel title="Grade Distribution" note={s.withGrade+' people'} data={s.gradeData} labelKey="grade" dataKeys={[{key:'count',label:'Students'}]} colors={[PURPLE]} />
            </div>

            {/* City */}
            <div className="grid">
              <div className="panel span2">
                <div className="panel-head">People by City</div>
                {s.cities.map(function(c){
                  var pct=(c.count/s.total*100);var isTop=c.city===s.topCity;
                  return (<div key={c.city} className="city-bar-row">
                    <div className="city-label" style={{color:isTop?'#166534':'#6b7280',fontWeight:isTop?700:400}}>{c.city}</div>
                    <div className="city-track"><div className="city-fill" style={{width:Math.max(pct,1.5)+'%',background:isTop?TEAL:'#94a3b8'}}>{pct>4&&<span>{c.count}</span>}</div></div>
                    {pct<=4&&<div style={{fontSize:10,color:'#9ca3af',width:24}}>{c.count}</div>}
                    <div className="city-pct">{pct.toFixed(1)}%</div>
                  </div>);
                })}
              </div>
            </div>

          </React.Fragment>
        )}

        {tab==='revenue' && (
          <React.Fragment>
            {!s.hasRevData ? (
              <div className="rev-coming">
                <h2>No Revenue Data</h2>
                <p>Revenue columns not detected in the data. Ensure the Metabase query includes the <code>hh_revenue</code> CTE with Gross Revenue, Refunds, and Net Revenue columns.</p>
              </div>
            ) : (
              <React.Fragment>
                {/* Revenue KPIs */}
                <div className="kpi-row">
                  <div className="kpi" style={{'--accent':EMERALD}}><div className="kpi-label">Net Revenue</div><div className="kpi-val">${s.totalNet>=1000?(s.totalNet/1000).toFixed(0)+'K':Math.round(s.totalNet)}</div><div className="kpi-sub">${s.totalGross>=1000?(s.totalGross/1000).toFixed(0)+'K':Math.round(s.totalGross)} gross</div></div>
                  <div className="kpi" style={{'--accent':INDIGO}}><div className="kpi-label">Median / HH</div><div className="kpi-val">${Math.round(s.medianRev)}</div><div className="kpi-sub">Avg ${Math.round(s.avgRev)}</div></div>
                  <div className="kpi" style={{'--accent':TEAL}}><div className="kpi-label">Conversion</div><div className="kpi-val">{s.conversionRate}%</div><div className="kpi-sub">{s.spendingHH} of {s.hhCount} HH</div></div>
                  <div className="kpi" style={{'--accent':AMBER}}><div className="kpi-label">Unbooked</div><div className="kpi-val">{s.unbookedHH}</div><div className="kpi-sub">{Math.round(s.unbookedHH/s.hhCount*100)}% of households</div></div>
                  <div className="kpi" style={{'--accent':ROSE}}><div className="kpi-label">Refund Rate</div><div className="kpi-val">{s.refundRate}%</div><div className="kpi-sub">${s.totalRefunds>=1000?(s.totalRefunds/1000).toFixed(1)+'K':Math.round(s.totalRefunds)} total</div></div>
                </div>

                {/* Percentiles callout */}
                <div className="panel" style={{marginBottom:14}}>
                  <div className="panel-head">How Much Do Households Spend?<span className="panel-note">{s.spendingHH} households with purchases</span></div>
                  <div style={{display:'flex',justifyContent:'space-around',textAlign:'center',padding:'8px 0'}}>
                    {[{l:'Low Spender',sub:'Bottom 25%',v:s.revP25},{l:'Typical',sub:'Middle household',v:s.medianRev},{l:'Active',sub:'Top 25%',v:s.revP75},{l:'Power User',sub:'Top 10%',v:s.revP90},{l:'Super Fan',sub:'Top 5%',v:s.revP95}].map(function(p){return(
                      <div key={p.l}>
                        <div style={{fontSize:10,fontWeight:700,color:'#374151',textTransform:'uppercase'}}>{p.l}</div>
                        <div style={{fontSize:22,fontWeight:800,color:'#111827'}}>${Math.round(p.v)}</div>
                        <div style={{fontSize:10,color:'#9ca3af'}}>{p.sub}</div>
                      </div>
                    );})}
                  </div>
                </div>

                {revObservations.length>0&&(
                  <div className="obs">
                    <div className="obs-title">Key Observations</div>
                    <div className="obs-grid">{revObservations.map(function(o,i){return <div key={i}>{E(o.e)}<strong style={{color:'#065f46'}}>{o.l}</strong> {o.t}</div>;})}</div>
                  </div>
                )}

                {insightsBlock}

                {/* Charts */}
                <div className="grid">
                  <ChartPanel title="Revenue Distribution" note="net $ per household" data={s.revDist} labelKey="range" dataKeys={[{key:'count',label:'Households'}]} colors={[EMERALD]} />
                  <ChartPanel title="Avg Spend: Resident vs Non-Resident" data={s.resByRes} labelKey="group" dataKeys={[{key:'avg',label:'Avg $'},{key:'median',label:'Median $'}]} colors={[TEAL,SKY]} />
                </div>

                <div className="grid">
                  <ChartPanel title="Avg Net Revenue by Household Size" note="bigger families spend more" data={s.revBySize} labelKey="size" dataKeys={[{key:'avg',label:'Avg Net $'}]} colors={[INDIGO]} />
                  <ChartPanel title="Revenue Concentration (Pareto)" note="top 20% = ~64% of revenue" type="line" data={s.paretoData} labelKey="hhPct" dataKeys={[{key:'revPct',label:'% of Revenue'}]} colors={[ROSE]} opts={{scales:{y:{max:100,ticks:{callback:function(v){return v+'%';}}}}}} />
                </div>

                {/* Conversion funnel */}
                <div className="panel" style={{marginBottom:14}}>
                  <div className="panel-head">Conversion Funnel</div>
                  <div style={{display:'flex',alignItems:'center',gap:6,padding:'10px 0'}}>
                    {[
                      {label:'Signed Up',val:s.hhCount,color:INDIGO},
                      {label:'First Purchase',val:s.spendingHH,color:TEAL},
                      {label:'Spent >$100',val:s.hhOver100,color:AMBER},
                      {label:'Spent >$500',val:s.hhOver500,color:ROSE},
                    ].map(function(step,i,arr){
                      var pct=Math.round(step.val/s.hhCount*100);
                      var w=Math.max(pct,8);
                      return (
                        <div key={step.label} style={{flex:1,textAlign:'center'}}>
                          <div style={{height:Math.max(w*.6,20),background:step.color,borderRadius:6,display:'flex',alignItems:'center',justifyContent:'center',marginBottom:4,transition:'height .3s'}}>
                            <span style={{fontSize:14,fontWeight:800,color:'#fff'}}>{step.val}</span>
                          </div>
                          <div style={{fontSize:10,fontWeight:600,color:'#6b7280'}}>{step.label}</div>
                          <div style={{fontSize:10,color:'#9ca3af'}}>{pct}%</div>
                        </div>
                      );
                    })}
                  </div>
                </div>

                {/* Revenue by Category */}
                {s.hasCatData&&(
                  <div className="grid">
                    <ChartPanel title="Revenue by Category" data={s.catData} labelKey="cat" dataKeys={[{key:'value',label:'Revenue $'}]} colors={s.catData.map(function(d){return d.color;})} />
                    <div className="panel">
                      <div className="panel-head">Category Breakdown</div>
                      <div style={{display:'flex',flexDirection:'column',gap:6,padding:'6px 0'}}>
                        {s.catData.map(function(d){
                          var pct=s.totalGross>0?Math.round(d.value/s.totalGross*100):0;
                          return(
                            <div key={d.cat} style={{display:'flex',alignItems:'center',gap:10}}>
                              <div style={{width:10,height:10,borderRadius:3,background:d.color,flexShrink:0}}/>
                              <span style={{fontSize:13,fontWeight:600,flex:1}}>{d.cat}</span>
                              <span style={{fontSize:14,fontWeight:800}}>${d.value>=1000?(d.value/1000).toFixed(1)+'K':d.value}</span>
                              <span style={{fontSize:11,color:'#9ca3af',width:36,textAlign:'right'}}>{pct}%</span>
                            </div>
                          );
                        })}
                      </div>
                      <div style={{fontSize:11,color:'#9ca3af',marginTop:8}}>{s.progHH} HH use programs, {s.facHH} book facilities, {s.bothProgFac} do both</div>
                    </div>
                  </div>
                )}

              </React.Fragment>
            )}
          </React.Fragment>
        )}

        {tab==='strategy' && (
          <React.Fragment>
            {!s.hasRevData ? (
              <div className="rev-coming"><h2>Revenue Data Required</h2><p>Strategy tab needs revenue data. Update the Metabase query to include the revenue CTE.</p></div>
            ) : (
              <React.Fragment>
                {/* Geographic Heatmap */}
                <div className="panel" style={{marginBottom:14}}>
                  <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:10}}>
                    <div className="panel-head" style={{marginBottom:0}}>Where Are Your Users?</div>
                    <div className="map-toggle" style={{marginLeft:'auto'}}>
                      <button className={mapMode==='hh'?'active':''} onClick={function(){setMapMode('hh');}}>Households</button>
                      <button className={mapMode==='rev'?'active':''} onClick={function(){setMapMode('rev');}}>Revenue</button>
                    </div>
                  </div>
                  <GeoMap zipData={s.zipData} mode={mapMode} />

                      {ft.demo.medianAge!==null&&<div className="kpi" style={{'--accent':'#d97706'}}><div className="kpi-label">Median Age</div><div className="kpi-val">{ft.demo.medianAge}</div><div className="kpi-sub">{s&&s.medianAge?'vs '+s.medianAge+' overall':'of matched HoH'}</div></div>}
                      {ft.demo.resPct!==null&&<div className="kpi" style={{'--accent':'#059669'}}><div className="kpi-label">Resident Rate</div><div className="kpi-val">{ft.demo.resPct}%</div><div className="kpi-sub">{s?'vs '+s.resPct+'% overall':'of FT users'}</div></div>}
                      {ft.demo.topCities.length>0&&<div className="kpi" style={{'--accent':'#2563eb'}}><div className="kpi-label">Top City</div><div className="kpi-val">{ft.demo.topCities[0].city}</div><div className="kpi-sub">{ft.demo.topCities[0].count} HH ({ft.demo.matchedHHs>0?((ft.demo.topCities[0].count/ft.demo.matchedHHs)*100).toFixed(0):'0'}%)</div></div>}
                      {ft.demo.avgFtSpend>0&&<div className="kpi" style={{'--accent':'#dc2626'}}><div className="kpi-label">Avg FT Spend</div><div className="kpi-val">{'$'+ft.demo.avgFtSpend.toLocaleString()}</div><div className="kpi-sub">{s&&s.avgRev?'vs $'+Math.round(s.avgRev).toLocaleString()+' overall':'per household'}</div></div>}
                    </div>
                    <div className="obs">
                      <div className="obs-title">Key Observations</div>
                      <div className="obs-grid">
                        {ft.demo.resPct!==null&&s&&<div>{E('\uD83C\uDFE0')}<strong style={{color:'#065f46'}}>Residency</strong> FT users are {parseFloat(ft.demo.resPct)>parseFloat(s.resPct)?'more':'less'} local than the general population ({ft.demo.resPct}% vs {s.resPct}% resident).{parseFloat(ft.demo.resPct)<parseFloat(s.resPct)*0.8?' Non-residents are disproportionately using Fast Track \u2014 it may be their discovery channel.':''}</div>}
                        {ft.demo.medianAge!==null&&s&&s.medianAge&&<div>{E('\uD83D\uDC76')}<strong style={{color:'#065f46'}}>Age Profile</strong> FT household median age is {ft.demo.medianAge} vs {s.medianAge} overall. {ft.demo.medianAge<s.medianAge-3?'FT skews younger \u2014 families with young children are the primary FT audience.':ft.demo.medianAge>s.medianAge+3?'FT skews older than average.':'Age profile is similar to the general population.'}</div>}
                        {ft.demo.topCities.length>1&&<div>{E('\uD83D\uDDFA\uFE0F')}<strong style={{color:'#065f46'}}>Geography</strong> Top FT cities: {ft.demo.topCities.slice(0,3).map(function(c){return c.city+' ('+c.count+')';}).join(', ')}. {ft.demo.topCities[0].count>ft.demo.matchedHHs*0.5?'Heavily concentrated in '+ft.demo.topCities[0].city+'.':'Spread across multiple areas.'}</div>}
                        {ft.demo.avgFtSpend>0&&s&&s.avgRev>0&&<div>{E('\uD83D\uDCB8')}<strong style={{color:'#065f46'}}>Spending</strong> FT households spend an average of ${ft.demo.avgFtSpend.toLocaleString()} vs ${Math.round(s.avgRev).toLocaleString()} overall{ft.demo.avgFtSpend>s.avgRev?' \u2014 FT users are higher-value customers, spending '+(((ft.demo.avgFtSpend/s.avgRev)-1)*100).toFixed(0)+'% more than average.':ft.demo.avgFtSpend<s.avgRev*0.8?' \u2014 FT users tend to be lighter spenders, suggesting it attracts casual or first-time participants.':' \u2014 spend levels are comparable to the general population.'}</div>}
                      </div>
                    </div>
                    <div className="grid">
                      <ChartPanel title={'FT Users by Age Group'} data={ft.demo.ageBracketData.filter(function(d){return d.count>0;})} labelKey="label" dataKeys={[{key:'count',label:'Households'}]} colors={['#6366f1']} />
                      <ChartPanel title={'FT Users by City'} data={ft.demo.topCities} labelKey="city" dataKeys={[{key:'count',label:'Households'}]} colors={['#059669']} />
                    </div>
                  </React.Fragment>
                )}

                {ft.demo.ftUsers===0 && (
                  <div style={{borderTop:'1px solid #e5e7eb',marginTop:20,paddingTop:16,textAlign:'center',color:'#9ca3af',fontSize:13,padding:'24px 0'}}>
                    User-level demographic crossover available when the Metabase FT query is updated to v5 (adds per-user rows).
                  </div>
                )}
              </React.Fragment>
            );
          }

          // ── Generic cross-tab placeholder ──
          return (
            <div key={ct.key} style={{textAlign:'center',padding:'60px 20px',color:'#888'}}>
              {ct.icon} {ct.label} analytics coming soon. {cd.rows.length} rows loaded.
            </div>
          );
        })}
      </div>
      <div id="report-ready" style={{display:'none'}}/>
    </React.Fragment>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
    <script src="/nav-breadcrumb.js" defer></script>
  </body>
</html>
