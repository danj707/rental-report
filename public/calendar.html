<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Calendar</title>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
  :root{
    --bg:#f5f6f8; --card:#fff; --ink:#1f2430; --muted:#6b7280; --line:#e5e7eb;
    --accent:#2563eb; --shadow:0 1px 3px rgba(16,24,40,.08),0 1px 2px rgba(16,24,40,.06);
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);font:14px/1.45 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif}
  .wrap{max-width:1280px;margin:0 auto;padding:20px}
  .toolbar{display:flex;flex-wrap:wrap;gap:10px;align-items:center;background:var(--card);
    border:1px solid var(--line);border-radius:12px;padding:12px 14px;box-shadow:var(--shadow);margin-bottom:16px}
  .toolbar .grow{flex:1}
  button,select,input[type=date]{font:inherit;border:1px solid var(--line);background:#fff;color:var(--ink);
    border-radius:8px;padding:7px 11px;cursor:pointer}
  button:hover{border-color:#cbd5e1}
  button.primary{background:var(--accent);border-color:var(--accent);color:#fff}
  button.primary:hover{filter:brightness(.95)}
  .seg{display:inline-flex;border:1px solid var(--line);border-radius:8px;overflow:hidden}
  .seg button{border:none;border-radius:0;background:#fff}
  .seg button.on{background:var(--accent);color:#fff}
  .hdr{display:flex;align-items:baseline;justify-content:space-between;margin:4px 2px 14px}
  .hdr h1{font-size:20px;margin:0}
  .hdr .org{color:var(--muted)}
  /* org banner */
  .org-banner{display:flex;align-items:center;gap:14px;margin-bottom:16px;padding:14px 18px;
    background:var(--card);border:1px solid var(--line);border-radius:12px;box-shadow:var(--shadow)}
  .org-banner img{height:44px;max-width:180px;object-fit:contain}
  .org-banner .org-name{font-size:18px;font-weight:700;color:var(--ink)}
  .org-banner .org-sub{font-size:13px;color:var(--muted);margin-top:2px}
  .range{font-weight:600}
  /* week grid */
  .week{display:grid;grid-template-columns:56px repeat(7,1fr);background:var(--card);
    border:1px solid var(--line);border-radius:12px;box-shadow:var(--shadow);overflow:hidden}
  .week .dayhead{padding:8px 6px;text-align:center;border-bottom:1px solid var(--line);border-left:1px solid var(--line);font-weight:600;cursor:pointer}
  .week .dayhead:hover{background:#f0f4ff}
  .week .dayhead small{display:block;color:var(--muted);font-weight:500}
  .week .corner{border-bottom:1px solid var(--line)}
  .allday{display:grid;grid-template-columns:56px repeat(7,1fr);border-bottom:1px solid var(--line)}
  .allday .lbl{font-size:11px;color:var(--muted);padding:4px 6px;text-align:right}
  .allday .cell{border-left:1px solid var(--line);padding:3px;display:flex;flex-direction:column;gap:3px}
  /* day grid */
  .day-grid{display:grid;grid-template-columns:56px 1fr;background:var(--card);
    border:1px solid var(--line);border-radius:12px;box-shadow:var(--shadow);overflow:hidden}
  .day-grid .dayhead{padding:8px 12px;text-align:center;border-bottom:1px solid var(--line);border-left:1px solid var(--line);font-weight:600}
  .day-grid .dayhead small{display:block;color:var(--muted);font-weight:500}
  .day-grid .corner{border-bottom:1px solid var(--line)}
  .day-allday{display:grid;grid-template-columns:56px 1fr;border-bottom:1px solid var(--line)}
  .day-allday .lbl{font-size:11px;color:var(--muted);padding:4px 6px;text-align:right}
  .day-allday .cell{border-left:1px solid var(--line);padding:3px;display:flex;flex-wrap:wrap;gap:4px}
  .day-body{display:grid;grid-template-columns:56px 1fr;position:relative}
  .grid{display:grid;grid-template-columns:56px repeat(7,1fr);position:relative}
  .axis{position:relative}
  .axis .tick{position:absolute;right:6px;font-size:11px;color:var(--muted);transform:translateY(-6px)}
  .col{position:relative;border-left:1px solid var(--line)}
  .col .hline{position:absolute;left:0;right:0;border-top:1px solid #f1f3f5}
  .ev{position:absolute;left:3px;right:3px;border-radius:6px;padding:3px 5px;color:#fff;overflow:hidden;
    font-size:11px;line-height:1.25;cursor:pointer;box-shadow:0 1px 1px rgba(0,0,0,.12);border:1.5px solid rgba(255,255,255,.45)}
  .ev a{color:#fff;text-decoration:none}
  .ev .t{font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .ev .s{opacity:.92;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .chip{display:inline-block;border-radius:999px;padding:0 6px;font-size:10px;font-weight:700;background:rgba(255,255,255,.28)}
  .chip.full{background:#111827;color:#fff}
  .chip.wait{background:#f59e0b;color:#111827}
  /* +N more chip (inline inside event) */
  .more-chip{display:inline-block;border-radius:999px;padding:1px 7px;margin-top:1px;
    font-size:10px;font-weight:700;color:#1f2430;background:rgba(255,255,255,.88);
    cursor:pointer;white-space:nowrap;text-shadow:none}
  .more-chip:hover{background:#fff}
  /* more popover (time-slot expansion) */
  .slot-pop{position:fixed;z-index:900;background:var(--card);border:1px solid var(--line);
    border-radius:12px;box-shadow:0 8px 32px rgba(0,0,0,.18);padding:10px;min-width:260px;max-width:340px;max-height:400px;overflow-y:auto}
  .slot-pop .sp-title{font-weight:700;font-size:12px;color:var(--muted);margin-bottom:8px;text-transform:uppercase;letter-spacing:.03em}
  .slot-pop .sp-item{display:flex;gap:8px;align-items:center;padding:6px 8px;border-radius:8px;cursor:pointer;margin-bottom:2px}
  .slot-pop .sp-item:hover{background:var(--bg)}
  .slot-pop .sp-dot{width:8px;height:8px;border-radius:50%;flex:0 0 auto}
  .slot-pop .sp-info{flex:1;min-width:0}
  .slot-pop .sp-act{font-weight:600;font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .slot-pop .sp-sub{font-size:11px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  /* list */
  .list .day{margin-bottom:18px}
  .list .dlabel{font-weight:700;margin:0 2px 8px;padding-bottom:6px;border-bottom:2px solid var(--line)}
  .list .loc{font-size:12px;text-transform:uppercase;letter-spacing:.04em;color:var(--muted);margin:10px 2px 6px}
  .row{display:flex;gap:12px;align-items:flex-start;background:var(--card);border:1px solid var(--line);
    border-radius:10px;padding:9px 11px;margin-bottom:7px;box-shadow:var(--shadow)}
  .row .bar{width:4px;align-self:stretch;border-radius:4px;flex:0 0 auto}
  .row .when{width:140px;flex:0 0 auto;color:var(--muted);font-variant-numeric:tabular-nums}
  .row .main{flex:1;min-width:0}
  .row .main .ti{font-weight:600}
  .row .main .su{color:var(--muted);font-size:13px}
  .row .right{text-align:right;flex:0 0 auto;display:flex;flex-direction:column;gap:4px;align-items:flex-end}
  .empty{background:var(--card);border:1px dashed var(--line);border-radius:12px;padding:40px;text-align:center;color:var(--muted)}
  .note{color:var(--muted);font-size:12px;margin:8px 2px}
  @media print{
    body{background:#fff}
    .toolbar{display:none}
    .week,.day-grid,.row{box-shadow:none}
    .wrap{max-width:none;padding:0}
  }
  body.print-mode .toolbar{display:none}

  /* ---- session popup ---- */
  .pop-overlay{position:fixed;inset:0;background:rgba(0,0,0,.38);z-index:1000;display:flex;align-items:center;justify-content:center}
  .pop{background:var(--card);border-radius:16px;box-shadow:0 8px 32px rgba(0,0,0,.22);width:380px;max-width:92vw;overflow:hidden}
  .pop-head{display:flex;align-items:flex-start;justify-content:space-between;padding:16px 16px 12px;border-bottom:1px solid var(--line)}
  .pop-act{font-weight:700;font-size:15px;color:var(--text)}
  .pop-time{font-size:13px;color:var(--muted);margin-top:3px}
  .pop-x{border:1px solid var(--line);background:none;border-radius:50%;width:28px;height:28px;font-size:18px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--muted);flex-shrink:0;padding:0}
  .pop-body{padding:12px 16px 16px}
  .pop-row{display:flex;gap:8px;align-items:flex-start;font-size:13px;color:var(--text);margin-bottom:7px;word-break:break-word}
  .pop-lbl{color:var(--muted);font-size:11px;text-transform:uppercase;letter-spacing:.05em;min-width:76px;white-space:nowrap}
  .pop-chips{margin-top:4px}
  .pop-link{display:inline-block;margin-top:10px;font-size:13px;color:#6366f1;text-decoration:none;font-weight:600}
  .filter-sel{border:1px solid var(--line);border-radius:8px;padding:4px 10px;font-size:13px;background:var(--card);color:var(--text);cursor:pointer;height:32px;max-width:160px}
  .filter-sel:focus{outline:none;border-color:var(--accent)}
  .filter-clear{font-size:11px;color:var(--accent);cursor:pointer;text-decoration:underline;white-space:nowrap}
  /* present / kiosk mode */
  body.present-mode{background:#fff}
  body.present-mode .toolbar{display:none}
  body.present-mode .wrap{max-width:none;padding:24px 40px}
  body.present-mode .org-banner img{height:56px;max-width:220px}
  body.present-mode .org-banner .org-name{font-size:22px}
  body.present-mode .org-banner .org-sub{font-size:15px}
  body.present-mode .hdr .range{font-size:16px}
  body.present-mode .list .dlabel{font-size:17px}
  body.present-mode .list .loc{font-size:14px}
  body.present-mode .row{padding:12px 14px;font-size:16px}
  body.present-mode .row .when{font-size:15px;width:170px}
  body.present-mode .row .main .ti{font-size:16px}
  body.present-mode .row .main .su{font-size:14px}
  body.present-mode .row .right{font-size:14px}
  body.present-mode .chip{font-size:12px;padding:1px 8px}
  body.present-mode .present-status{position:fixed;bottom:12px;right:16px;font-size:11px;color:var(--muted);opacity:.5;z-index:10}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useMemo,useCallback,useRef} = React;

/* ---------- helpers ---------- */
const PALETTE = ['#2563eb','#0d9488','#db2777','#d97706','#7c3aed','#dc2626','#0891b2','#65a30d','#c026d3','#475569'];
function colorFor(key){
  const s = String(key||'').toLowerCase();
  let h=0; for(let i=0;i<s.length;i++) h=(h*31+s.charCodeAt(i))>>>0;
  return PALETTE[h % PALETTE.length];
}
function pad(n){return n<10?'0'+n:''+n;}
function fmtISO(d){return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate());}
function startOfWeek(d){const x=new Date(d);const wd=x.getDay();x.setDate(x.getDate()-wd);x.setHours(0,0,0,0);return x;}
function addDays(d,n){const x=new Date(d);x.setDate(x.getDate()+n);return x;}
const DOW=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
const DOWL=['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
const MON=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

// parse "08:00pm", "8:00 AM", "20:00", "2026-03-01T20:00" -> minutes from midnight
function toMin(v){
  if(v==null) return null;
  let s=String(v).trim();
  if(!s) return null;
  if(s.indexOf('T')>=0) s=s.split('T')[1]||s;
  const m=s.match(/(\d{1,2}):(\d{2})\s*([ap]\.?m\.?)?/i);
  if(!m) return null;
  let h=+m[1], mm=+m[2];
  const ap=(m[3]||'').toLowerCase().replace(/\./g,'');
  if(ap==='pm'&&h<12) h+=12;
  if(ap==='am'&&h===12) h=0;
  return h*60+mm;
}
function minToLabel(min){
  let h=Math.floor(min/60), m=min%60; const ap=h>=12?'pm':'am';
  let hh=h%12; if(hh===0) hh=12;
  return hh+':'+pad(m)+ap;
}
// normalize one Metabase row to internal keys (tolerant of alt aliases)
function pick(r,keys){ for(const k of keys){ if(r[k]!=null&&r[k]!=='') return r[k]; } return ''; }
function stripHtml(s){ if(!s) return ''; return String(s).replace(/<[^>]*>/g,' ').replace(/&nbsp;/g,' ').replace(/&amp;/g,'&').replace(/&lt;/g,'<').replace(/&gt;/g,'>').replace(/&#?\w+;/g,' ').replace(/\s+/g,' ').trim(); }
function normalizeRow(r){
  const begin=pick(r,['Begin','Start','Start Time','begin','start']);
  const end=pick(r,['End','End Time','end']);
  const status=String(pick(r,['Status','status'])).toLowerCase();
  return {
    orgName: pick(r,['Org Name','Organization','orgName']),
    dateISO: parseDateISO(pick(r,['Date','Begin Sort','date','starts_at','Starts At'])),
    begin, end,
    beginMin: toMin(pick(r,['Begin Sort','Begin','Start','start','starts_at'])),
    endMin: toMin(end),
    location: pick(r,['Location','location','Facility Location'])||'Unassigned',
    facility: pick(r,['Facility','Court','facility']),
    activity: pick(r,['Activity','Site Type','Purpose','activity'])||'Reservation',
    program: pick(r,['Program','program']),
    section: pick(r,['Section','section','Purpose','Reservee']),
    url: pick(r,['Section URL','Url','url','sectionUrl']),
    full: status.indexOf('full')>=0 || status.indexOf('capacity')>=0,
    waitlist: status.indexOf('wait')>=0,
    total: pick(r,['price','Price','Total','total']),
    description: stripHtml(pick(r,['Description','description'])),
  };
}
function parseDateISO(v){
  if(!v) return '';
  let s=String(v);
  if(s.indexOf('T')>=0) s=s.split('T')[0];
  if(/^\d{4}-\d{2}-\d{2}$/.test(s)) return s;
  const d=new Date(s);
  if(!isNaN(d)) return fmtISO(d);
  return s;
}

/* ---------- start-time grouping ---------- */
// Groups sorted events by start-time proximity (within THRESHOLD minutes).
// Avoids cascading merges where an 8am–10am event swallows all 10am events.
// Returns [{start,end,events:[...]}]
const START_GROUP_THRESHOLD=15; // minutes
function groupOverlaps(events){
  const groups=[];
  let cur=null;
  for(const e of events){
    if(!cur || e.beginMin-cur.start>START_GROUP_THRESHOLD){
      cur={start:e.beginMin, end:e.endMin||e.beginMin+30, events:[e]};
      groups.push(cur);
    } else {
      cur.events.push(e);
      cur.end=Math.max(cur.end, e.endMin||e.beginMin+30);
    }
  }
  return groups;
}

/* ---------- sample fallback ---------- */
const TEMPLATE = (()=>{
  const base=startOfWeek(new Date());
  const mk=(off,b,e,act,loc,fac,prog,sec,status)=>({
    "Org Name":"Apex Parks & Rec","Date":fmtISO(addDays(base,off)),
    "Begin":b,"End":e,"Activity":act,"Location":loc,"Facility":fac,
    "Program":prog,"Section":sec,"Status":status||"",
    "Section URL":"https://rec.us/apex"
  });
  return [
    mk(1,"09:00am","10:00am","Youth Soccer","North Fields","Field 2","Spring Soccer","U8 Mon/Wed","full"),
    mk(1,"09:30am","10:30am","Gymnastics","Rec Center","Studio B","Tumbling","Beginner",""),
    mk(1,"09:45am","11:00am","Art Camp","Community Center","Room 3","Summer Art","Mixed Media","waitlist"),
    mk(1,"04:00pm","05:30pm","Adult Yoga","Community Center","Studio A","Wellness","Evening Flow","waitlist"),
    mk(2,"06:00pm","07:30pm","Basketball","Rec Center","Court 1","Open Gym","Drop-in",""),
    mk(3,"08:00am","03:00pm","Day Camp","Community Center","Hall","Summer Camp","Week 1","full"),
    mk(4,"10:00am","11:00am","Pickleball","North Fields","Court 3","Open Play","Morning",""),
    mk(5,"05:00pm","06:00pm","Adult Yoga","Community Center","Studio A","Wellness","Sunset Flow",""),
    mk(6,"09:00am","12:00pm","Swim Lessons","Aquatics","Pool","Learn to Swim","Level 2","waitlist"),
  ];
})();

/* ---------- data fetch ---------- */
function ctx(){
  const parts=window.location.pathname.split('/').filter(Boolean);
  // /{org}/calendar  -> org=parts[0]; standalone /calendar.html -> none
  const org=(parts.length>=2 && parts[1].indexOf('calendar')===0)?parts[0]:null;
  const q=new URLSearchParams(window.location.search);
  return {org, token:q.get('token')||'', print:q.get('_print')==='1'};
}
const MB_FALLBACK_UUID="8a3dac9b-6c34-45e1-a7d0-3a177477fe17";

async function fetchData(from,to){
  const {org,token}=ctx();
  if(org){
    try{
      const u=new URL('/'+org+'/calendar/api/data',window.location.origin);
      u.searchParams.set('start_date',from); u.searchParams.set('end_date',to);
      if(token) u.searchParams.set('token',token);
      const res=await fetch(u.toString());
      if(res.ok){ const j=await res.json(); const rows=j.rows||j.data||j||[]; if(rows.length) return {rows,src:'live'}; }
    }catch(e){}
  }
  return {rows:TEMPLATE,src:'sample'};
}

/* ---------- views ---------- */
function StatusChips({ev}){
  return (<React.Fragment>
    {ev.full && <span className="chip full">Full</span>}
    {ev.waitlist && <span className="chip wait">Waitlist</span>}
  </React.Fragment>);
}

/* --- Slot popover ("+N more" expansion) --- */
function SlotPopover({group,anchorRect,onSelect,onClose}){
  const ref=useRef();
  useEffect(()=>{
    const handler=(e)=>{if(ref.current && !ref.current.contains(e.target)) onClose();};
    document.addEventListener('mousedown',handler);
    return ()=>document.removeEventListener('mousedown',handler);
  },[onClose]);
  if(!group||!anchorRect) return null;
  // position below the anchor, clamped to viewport
  let top=anchorRect.bottom+4, left=anchorRect.left;
  if(top+300>window.innerHeight) top=anchorRect.top-300;
  if(left+300>window.innerWidth) left=window.innerWidth-320;
  if(left<8) left=8;
  const timeRange=minToLabel(group.start)+' – '+minToLabel(group.end);
  return (
    <div className="slot-pop" ref={ref} style={{top,left,position:'fixed'}}>
      <div className="sp-title">{timeRange} · {group.events.length} sessions</div>
      {group.events.map((e,i)=>(
        <div className="sp-item" key={i} onClick={()=>onSelect(e)}>
          <div className="sp-dot" style={{background:colorFor(e.activity)}}></div>
          <div className="sp-info">
            <div className="sp-act">{e.activity}</div>
            <div className="sp-sub">{minToLabel(e.beginMin)}{e.endMin!=null?' – '+minToLabel(e.endMin):''} · {e.facility||e.location}</div>
          </div>
          <StatusChips ev={e}/>
        </div>
      ))}
    </div>
  );
}

function WeekView({weekStart,events,onEv,onDayClick}){
  const [slotGroup,setSlotGroup]=useState(null);
  const [slotRect,setSlotRect]=useState(null);
  const days=useMemo(()=>Array.from({length:7},(_,i)=>fmtISO(addDays(weekStart,i))),[weekStart]);
  const timed=events.filter(e=>e.beginMin!=null && e.endMin!=null && (e.endMin-e.beginMin)<7*60);
  const allday=events.filter(e=>!(e.beginMin!=null && e.endMin!=null) || (e.endMin-e.beginMin)>=7*60);
  let lo,hi;
  if(timed.length>0){
    lo=Infinity; hi=-Infinity;
    timed.forEach(e=>{ lo=Math.min(lo,e.beginMin); hi=Math.max(hi,e.endMin); });
    lo=Math.floor(lo/60)*60-60; hi=Math.ceil(hi/60)*60+60;
    lo=Math.max(lo,0); hi=Math.min(hi,24*60);
  } else { lo=8*60; hi=17*60; }
  const PX=1.8, H=(hi-lo)*PX;
  const hours=[]; for(let m=lo;m<=hi;m+=60) hours.push(m);
  const byDay=(d)=>{
    const sorted=timed.filter(e=>e.dateISO===d).sort((a,b)=>a.beginMin-b.beginMin);
    return groupOverlaps(sorted);
  };
  const allByDay=d=>allday.filter(e=>e.dateISO===d);

  const handleMore=(grp,evt)=>{
    const rect=evt.currentTarget.getBoundingClientRect();
    setSlotGroup(grp); setSlotRect(rect);
  };

  return (
    <React.Fragment>
    <div className="week">
      <div className="corner"></div>
      {days.map((d,i)=>{const dt=addDays(weekStart,i);
        return <div className="dayhead" key={d} onClick={()=>onDayClick&&onDayClick(d)}>{DOW[i]}<small>{MON[dt.getMonth()]} {dt.getDate()}</small></div>;})}

      <div className="allday" style={{gridColumn:'1 / -1'}}>
        <div className="lbl">all-day</div>
        {days.map(d=>(
          <div className="cell" key={'a'+d}>
            {allByDay(d).map((e,j)=>(
              <div className="ev" key={j} style={{position:'static',background:colorFor(e.activity),cursor:'pointer'}} title={e.activity+' — '+e.section} onClick={()=>onEv&&onEv(e)}>
                <div className="t">{e.activity} <StatusChips ev={e}/></div>
              </div>
            ))}
          </div>
        ))}
      </div>

      <div className="grid" style={{gridColumn:'1 / -1'}}>
        <div className="axis" style={{height:H}}>
          {hours.map(m=>(<div className="tick" key={m} style={{top:(m-lo)*PX}}>{minToLabel(m).replace(':00','')}</div>))}
        </div>
        {days.map(d=>(
          <div className="col" key={'c'+d} style={{height:H}}>
            {hours.map(m=>(<div className="hline" key={m} style={{top:(m-lo)*PX}}></div>))}
            {byDay(d).map((grp,gi)=>{
              const first=grp.events[0];
              const top=(first.beginMin-lo)*PX;
              const extra=grp.events.length-1;
              const minHt=extra>0?34:20;
              const ht=Math.max((first.endMin-first.beginMin)*PX,minHt);
              return (
                <div className="ev" key={gi} style={{top,height:ht,background:colorFor(first.activity),cursor:'pointer'}}
                     onClick={()=>onEv&&onEv(first)}
                     title={first.activity+' '+first.begin+'–'+first.end+(first.section?(' · '+first.section):'')}>
                  <div className="t">{minToLabel(first.beginMin)} {first.activity} <StatusChips ev={first}/></div>
                  {ht>32 && !extra && <div className="s">{first.facility||first.section}</div>}
                  {extra>0 && <div className="s"><span className="more-chip" onClick={(evt)=>{evt.stopPropagation();handleMore(grp,evt);}}>+{extra} more</span></div>}
                </div>
              );
            })}
          </div>
        ))}
      </div>
    </div>
    <SlotPopover group={slotGroup} anchorRect={slotRect} onSelect={(e)=>{setSlotGroup(null);onEv&&onEv(e);}} onClose={()=>setSlotGroup(null)}/>
    </React.Fragment>
  );
}

function DayView({dateISO,events,onEv}){
  const dt=new Date(dateISO+'T00:00:00');
  const timed=events.filter(e=>e.dateISO===dateISO && e.beginMin!=null && e.endMin!=null && (e.endMin-e.beginMin)<7*60);
  const allday=events.filter(e=>e.dateISO===dateISO && (!(e.beginMin!=null && e.endMin!=null) || (e.endMin-e.beginMin)>=7*60));
  let lo,hi;
  if(timed.length>0){
    lo=Infinity; hi=-Infinity;
    timed.forEach(e=>{ lo=Math.min(lo,e.beginMin); hi=Math.max(hi,e.endMin); });
    lo=Math.floor(lo/60)*60-60; hi=Math.ceil(hi/60)*60+60;
    lo=Math.max(lo,0); hi=Math.min(hi,24*60);
  } else { lo=8*60; hi=17*60; }
  const PX=2.4, H=(hi-lo)*PX;
  const hours=[]; for(let m=lo;m<=hi;m+=60) hours.push(m);

  // layout overlapping events into columns
  const sorted=timed.slice().sort((a,b)=>a.beginMin-b.beginMin||(a.endMin-a.beginMin)-(b.endMin-b.beginMin));
  const cols=[]; // each col is an array of events
  const evCols=new Map(); // event -> {col, totalCols}
  for(const e of sorted){
    let placed=false;
    for(let c=0;c<cols.length;c++){
      const last=cols[c][cols[c].length-1];
      if(e.beginMin>=last.endMin){ cols[c].push(e); evCols.set(e,{col:c}); placed=true; break; }
    }
    if(!placed){ evCols.set(e,{col:cols.length}); cols.push([e]); }
  }
  const totalCols=cols.length||1;
  for(const [e,info] of evCols) info.totalCols=totalCols;

  return (
    <div className="day-grid">
      <div className="corner"></div>
      <div className="dayhead">{DOWL[dt.getDay()]}<small>{MON[dt.getMonth()]} {dt.getDate()}, {dt.getFullYear()}</small></div>

      {allday.length>0 && (
        <div className="day-allday" style={{gridColumn:'1 / -1'}}>
          <div className="lbl">all-day</div>
          <div className="cell">
            {allday.map((e,j)=>(
              <div className="ev" key={j} style={{position:'static',background:colorFor(e.activity),cursor:'pointer',maxWidth:300}} onClick={()=>onEv&&onEv(e)}>
                <div className="t">{e.activity} <StatusChips ev={e}/></div>
                <div className="s">{e.facility||e.section}</div>
              </div>
            ))}
          </div>
        </div>
      )}

      <div className="day-body" style={{gridColumn:'1 / -1'}}>
        <div className="axis" style={{height:H}}>
          {hours.map(m=>(<div className="tick" key={m} style={{top:(m-lo)*PX}}>{minToLabel(m).replace(':00','')}</div>))}
        </div>
        <div className="col" style={{height:H}}>
          {hours.map(m=>(<div className="hline" key={m} style={{top:(m-lo)*PX}}></div>))}
          {sorted.map((e,j)=>{
            const info=evCols.get(e);
            const top=(e.beginMin-lo)*PX;
            const ht=Math.max((e.endMin-e.beginMin)*PX,26);
            const colW=100/info.totalCols;
            const left=info.col*colW+'%';
            const width=colW+'%';
            return (
              <div className="ev" key={j} style={{top,height:ht,background:colorFor(e.activity),cursor:'pointer',left,width,right:'auto',paddingRight:4}}
                   onClick={()=>onEv&&onEv(e)}
                   title={e.activity+' '+e.begin+'–'+e.end+(e.section?(' · '+e.section):'')}>
                <div className="t">{minToLabel(e.beginMin)} {e.activity} <StatusChips ev={e}/></div>
                {ht>36 && <div className="s">{[e.facility,e.section].filter(Boolean).join(' · ')}</div>}
                {ht>52 && <div className="s">{e.location}</div>}
              </div>
            );
          })}
        </div>
      </div>
    </div>
  );
}

function ListView({events,onEv}){
  const byDate=useMemo(()=>{
    const m={};
    events.slice().sort((a,b)=>(a.dateISO+ (a.beginMin!=null?pad(Math.floor(a.beginMin/60))+pad(a.beginMin%60):'9999'))
                              .localeCompare(b.dateISO+(b.beginMin!=null?pad(Math.floor(b.beginMin/60))+pad(b.beginMin%60):'9999')))
      .forEach(e=>{(m[e.dateISO]=m[e.dateISO]||[]).push(e);});
    return m;
  },[events]);
  const dates=Object.keys(byDate).sort();
  if(!dates.length) return <div className="empty">No scheduled sessions in this range.</div>;
  return (
    <div className="list">
      {dates.map(d=>{
        const dt=new Date(d+'T00:00:00');
        const locs={}; byDate[d].forEach(e=>{(locs[e.location]=locs[e.location]||[]).push(e);});
        return (
          <div className="day" key={d}>
            <div className="dlabel">{DOW[dt.getDay()]}, {MON[dt.getMonth()]} {dt.getDate()}, {dt.getFullYear()}</div>
            {Object.keys(locs).sort().map(loc=>(
              <div key={loc}>
                <div className="loc">{loc}</div>
                {locs[loc].map((e,j)=>(
                  <div className="row" key={j} style={{cursor:"pointer"}} onClick={()=>onEv&&onEv(e)}>
                    <div className="bar" style={{background:colorFor(e.activity)}}></div>
                    <div className="when">{e.beginMin!=null?(minToLabel(e.beginMin)+' – '+(e.endMin!=null?minToLabel(e.endMin):'')):'All day'}</div>
                    <div className="main">
                      <div className="ti">{e.activity}</div>
                      <div className="su">{[e.program,e.section,e.facility].filter(Boolean).join(' · ')}</div>
                    </div>
                    <div className="right">
                      <StatusChips ev={e}/>
                      {e.total!=='' && e.total!=null && <div className="su">{'From '+(typeof e.total==='number'?('$'+e.total.toFixed(2)):e.total)}</div>}
                    </div>
                  </div>
                ))}
              </div>
            ))}
          </div>
        );
      })}
    </div>
  );
}

/* ---------- app ---------- */

function PopoverCard({ev,onClose}){
  if(!ev) return null;
  const loc=[ev.location,ev.facility].filter(Boolean).join(' · ');
  const desc=[ev.program,ev.section].filter(Boolean).join(' – ');
  const price=ev.total!==''&&ev.total!=null&&ev.total!==0?('From '+(typeof ev.total==='number'?('$'+ev.total.toFixed(2)):String(ev.total))):'N/A';
  return (
    <div className="pop-overlay" onClick={onClose}>
      <div className="pop" onClick={e=>e.stopPropagation()}>
        <div className="pop-head">
          <div style={{flex:1,marginRight:10}}>
            <div className="pop-act" style={{color:colorFor(ev.activity)}}>{ev.activity}</div>
            <div className="pop-time">{ev.begin}{ev.end?' – '+ev.end:''}</div>
          </div>
          <button className="pop-x" onClick={onClose}>×</button>
        </div>
        <div className="pop-body">
          {loc && <div className="pop-row"><span className="pop-lbl">Location</span><span>{loc}</span></div>}
          {desc && <div className="pop-row"><span className="pop-lbl">Section</span><span style={{whiteSpace:'normal',overflowWrap:'anywhere'}}>{desc}</span></div>}
          {ev.description && <div className="pop-row"><span className="pop-lbl">Description</span><span style={{whiteSpace:'normal',overflowWrap:'anywhere',display:'-webkit-box',WebkitLineClamp:4,WebkitBoxOrient:'vertical',overflow:'hidden',fontSize:12,lineHeight:'1.45',color:'var(--ink)'}}>{ev.description}</span></div>}
          <div className="pop-row"><span className="pop-lbl">Price</span><span>{price}</span></div>
          {(ev.full||ev.waitlist) && <div className="pop-row pop-chips"><StatusChips ev={ev}/></div>}
          {ev.url && <a className="pop-link" href={ev.url} target="_blank" rel="noopener">View Session →</a>}
        </div>
      </div>
    </div>
  );
}

function App(){
  const c=ctx();
  const [weekStart,setWeekStart]=useState(()=>startOfWeek(new Date()));
  const [view,setView]=useState('week');
  const [selectedDate,setSelectedDate]=useState(()=>fmtISO(new Date()));
  const [rows,setRows]=useState([]);
  const [src,setSrc]=useState('');
  const [loading,setLoading]=useState(true);
  const [popoverEv,setPopoverEv]=useState(null);
  // Read initial filter from URL params
  const urlParams=useMemo(()=>new URLSearchParams(window.location.search),[]);
  const [actFilter,setActFilter]=useState(()=>urlParams.get('activity')||'');
  const [locFilter,setLocFilter]=useState(()=>urlParams.get('location')||'');
  // All-time filter options (populated from a wide fetch)
  const [allActivities,setAllActivities]=useState([]);
  const [allLocations,setAllLocations]=useState([]);
  // Present mode
  const isPresent=urlParams.get('present')==='1';
  const scrollRef=useRef(null);
  const pauseRef=useRef(false);

  const load=useCallback(async(ws)=>{
    setLoading(true);
    const from=fmtISO(ws), to=fmtISO(addDays(ws,6));
    const {rows,src}=await fetchData(from,to);
    setRows(rows.map(normalizeRow)); setSrc(src); setLoading(false);
  },[]);

  // One-time wide fetch to populate all filter options (today → +180 days)
  useEffect(()=>{
    (async()=>{
      const from=fmtISO(new Date());
      const to=fmtISO(addDays(new Date(),180));
      const {rows:wideRows}=await fetchData(from,to);
      const norm=wideRows.map(normalizeRow);
      setAllActivities([...new Set(norm.map(e=>e.activity).filter(Boolean))].sort());
      setAllLocations([...new Set(norm.map(e=>e.location).filter(Boolean))].sort());
    })();
  },[]);

  useEffect(()=>{ if(c.print) document.body.classList.add('print-mode'); },[]);
  useEffect(()=>{ load(weekStart); },[weekStart,load]);

  // Sync filter state → URL so the address bar is always a shareable link
  useEffect(()=>{
    const u=new URL(window.location.href);
    if(actFilter) u.searchParams.set('activity',actFilter); else u.searchParams.delete('activity');
    if(locFilter) u.searchParams.set('location',locFilter); else u.searchParams.delete('location');
    window.history.replaceState(null,'',u.toString());
  },[actFilter,locFilter]);

  // Present mode: force list view, add body class, auto-scroll, auto-refresh
  useEffect(()=>{
    if(!isPresent) return;
    document.body.classList.add('present-mode');
    // Force list view
    setView('list');
    // Auto-refresh data every 5 minutes
    const refreshId=setInterval(()=>{ load(weekStart); },5*60*1000);
    // Auto-scroll
    const SPEED=0.6; // px per frame
    const PAUSE_AT_BOTTOM=4000; // ms pause at bottom before looping
    const PAUSE_AT_TOP=2000; // ms pause at top after reset
    let rafId;
    let paused=false;
    const tick=()=>{
      if(!paused){
        const maxScroll=document.documentElement.scrollHeight-window.innerHeight;
        if(window.scrollY>=maxScroll-2){
          // Reached bottom — pause then reset
          paused=true;
          setTimeout(()=>{
            window.scrollTo({top:0,behavior:'auto'});
            setTimeout(()=>{ paused=false; },PAUSE_AT_TOP);
          },PAUSE_AT_BOTTOM);
        } else {
          window.scrollBy(0,SPEED);
        }
      }
      rafId=requestAnimationFrame(tick);
    };
    // Start scrolling after a brief delay for content to render
    const startId=setTimeout(()=>{ rafId=requestAnimationFrame(tick); },2000);
    // Esc key exits present mode
    const onKey=(e)=>{ if(e.key==='Escape'){const u=new URL(window.location.href);u.searchParams.delete('present');window.location.href=u.toString();}};
    window.addEventListener('keydown',onKey);
    return ()=>{
      clearInterval(refreshId);
      clearTimeout(startId);
      if(rafId) cancelAnimationFrame(rafId);
      window.removeEventListener('keydown',onKey);
      document.body.classList.remove('present-mode');
    };
  },[isPresent,weekStart]);

  const goToDay=(dateISO)=>{ setSelectedDate(dateISO); setView('day'); };
  const goDay=(offset)=>{
    const next=addDays(new Date(selectedDate+'T00:00:00'),offset);
    const nextISO=fmtISO(next);
    // if navigating outside current week, shift week too
    const ws=startOfWeek(next);
    if(fmtISO(ws)!==fmtISO(weekStart)) setWeekStart(ws);
    setSelectedDate(nextISO);
  };

  const ws=weekStart, we=addDays(weekStart,6);
  const orgName=rows.length?rows[0].orgName:'';
  const rangeLabel=view==='day'
    ? (()=>{const dt=new Date(selectedDate+'T00:00:00'); return DOWL[dt.getDay()]+', '+MON[dt.getMonth()]+' '+dt.getDate()+', '+dt.getFullYear();})()
    : MON[ws.getMonth()]+' '+ws.getDate()+' – '+MON[we.getMonth()]+' '+we.getDate()+', '+we.getFullYear();
  // Use wide-range options for dropdowns, fall back to current week if wide hasn't loaded yet
  const activities=allActivities.length>0?allActivities:[...new Set(rows.map(e=>e.activity).filter(Boolean))].sort();
  const locations=allLocations.length>0?allLocations:[...new Set(rows.map(e=>e.location).filter(Boolean))].sort();
  const filtered=useMemo(()=>rows.filter(e=>(!actFilter||e.activity===actFilter)&&(!locFilter||e.location===locFilter)),[rows,actFilter,locFilter]);

  return (
    <div className="wrap">
      <div className="toolbar">
        <div className="seg">
          <button className={view==='week'?'on':''} onClick={()=>setView('week')}>Week</button>
          <button className={view==='day'?'on':''} onClick={()=>{setView('day')}}>Day</button>
          <button className={view==='list'?'on':''} onClick={()=>setView('list')}>List</button>
        </div>
        {view==='day' ? (
          <React.Fragment>
            <button onClick={()=>{const t=new Date();setSelectedDate(fmtISO(t));const ws2=startOfWeek(t);if(fmtISO(ws2)!==fmtISO(weekStart))setWeekStart(ws2);}}>Today</button>
            <button onClick={()=>goDay(-1)}>‹ Prev</button>
            <button onClick={()=>goDay(1)}>Next ›</button>
          </React.Fragment>
        ) : (
          <React.Fragment>
            <button onClick={()=>setWeekStart(startOfWeek(new Date()))}>This Week</button>
            <button onClick={()=>setWeekStart(addDays(weekStart,-7))}>‹ Prev</button>
            <button onClick={()=>setWeekStart(addDays(weekStart,7))}>Next ›</button>
          </React.Fragment>
        )}
        <span className="range">{rangeLabel}</span>
        <span className="grow"></span>
        <button onClick={()=>window.print()}>Print</button>
        <button onClick={()=>{const u=new URL(window.location.href);u.searchParams.set('present','1');if(actFilter)u.searchParams.set('activity',actFilter);if(locFilter)u.searchParams.set('location',locFilter);window.open(u.toString(),'_blank');}}>Present ▶</button>
        <select className="filter-sel" value={actFilter} onChange={e=>setActFilter(e.target.value)}>
          <option value="">All Activities</option>
          {activities.map(a=><option key={a} value={a}>{a}</option>)}
        </select>
        <select className="filter-sel" value={locFilter} onChange={e=>setLocFilter(e.target.value)}>
          <option value="">All Locations</option>
          {locations.map(l=><option key={l} value={l}>{l}</option>)}
        </select>
        {(actFilter||locFilter)&&<span className="filter-clear" onClick={()=>{setActFilter('');setLocFilter('');}}>✕ Clear</span>}
      </div>

      <div className="hdr">
        {window.__ORG__ && (
          <div className="org-banner" style={{marginBottom:0,border:'none',boxShadow:'none',padding:'0 2px'}}>
            {window.__ORG__.logoUrl && <img src={window.__ORG__.logoUrl} alt=""/>}
            <div>
              <div className="org-name">{window.__ORG__.displayName}</div>
              <div className="org-sub">Session Schedule</div>
            </div>
          </div>
        )}
        {!window.__ORG__ && <h1>Calendar {orgName && <span className="org">· {orgName}</span>}</h1>}
        <span className="range">{rangeLabel}</span>
      </div>

      {loading ? <div className="empty">Loading…</div>
        : view==='week' ? <WeekView weekStart={weekStart} events={filtered} onEv={setPopoverEv} onDayClick={goToDay}/>
        : view==='day' ? <DayView dateISO={selectedDate} events={filtered} onEv={setPopoverEv}/>
        : <ListView events={filtered} onEv={setPopoverEv}/>}

      <PopoverCard ev={popoverEv} onClose={()=>setPopoverEv(null)}/>
      {src==='sample' && <div className="note">Showing sample data (no live source reachable). Wire <code>/{'{org}'}/calendar/api/data</code> to go live.</div>}
      {!loading && <div id="report-ready" style={{display:'none'}}>ready</div>}
      {isPresent && <div className="present-status">Auto-refreshes every 5 min · Press Esc to exit</div>}
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
