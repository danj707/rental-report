<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Calendar</title>
<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.3.1/umd/react.production.min.js"></script>
<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.3.1/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.26.9/babel.min.js"></script>
<style>
  :root{
    --bg:#f5f4f1; --card:#fff; --ink:#1a1a1a; --muted:#777; --line:#e5e5e5;
    --accent:#2563eb; --shadow:0 1px 3px rgba(0,0,0,.05);
    --weekend:#fffbf7; --today-bg:#1a1a1a; --today-fg:#fff;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);font:14px/1.45 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif}
  .wrap{max-width:1280px;margin:16px auto;padding:24px 28px;background:#fff;box-shadow:0 1px 4px rgba(0,0,0,.08);border-radius:2px}
  .toolbar{display:flex;flex-wrap:wrap;gap:8px;align-items:center;background:transparent;
    padding:0 0 16px;margin-bottom:0;border:none;box-shadow:none}
  .toolbar .grow{flex:1}
  button,select,input[type=date]{font:inherit;border:1px solid #d4d4d4;background:#fff;color:var(--ink);
    border-radius:20px;padding:6px 14px;cursor:pointer;font-size:13px;transition:all .15s}
  button:hover{border-color:#aaa;background:#fafafa}
  button.primary{background:var(--accent);border-color:var(--accent);color:#fff;border-radius:20px}
  button.primary:hover{filter:brightness(.95)}
  .seg{display:inline-flex;border:1px solid #d4d4d4;border-radius:20px;overflow:hidden;background:#f5f5f5}
  .seg button{border:none;border-radius:0;background:transparent;font-weight:500;padding:7px 16px;font-size:13px;color:#888;transition:all .15s}
  .seg button:hover{background:rgba(0,0,0,.03);color:#555}
  .seg button.on{background:#fff;color:var(--ink);font-weight:600;box-shadow:0 1px 3px rgba(0,0,0,.08);border-radius:20px;margin:-1px;border:1px solid #d4d4d4}
  .hdr{display:flex;align-items:baseline;justify-content:space-between;margin:4px 2px 14px}
  .hdr h1{font-size:20px;margin:0}
  .hdr .org{color:var(--muted)}
  /* org banner */
  .org-banner{display:flex;align-items:center;gap:14px;margin-bottom:16px;padding:14px 18px;
    background:transparent;border:none;border-radius:0;box-shadow:none}
  .org-banner img{height:44px;max-width:180px;object-fit:contain}
  .org-banner .org-name{font-size:18px;font-weight:700;color:var(--ink)}
  .org-banner .org-sub{font-size:13px;color:var(--muted);margin-top:2px}
  .range{font-weight:600;font-size:16px;color:var(--ink)}
  /* week grid */
  .week{display:grid;grid-template-columns:56px repeat(7,minmax(0,1fr));background:var(--card);
    border:1px solid var(--line);border-radius:8px;box-shadow:var(--shadow);overflow:clip}
  .week .dayhead{padding:10px 6px;text-align:center;border-bottom:1px solid var(--line);border-left:1px solid #f0f0f3;
    font-weight:700;font-size:10px;text-transform:uppercase;letter-spacing:.5px;cursor:pointer;transition:background .1s;position:sticky;top:0;z-index:12;background:var(--card)}
  .week .dayhead:hover{background:#f8f9ff}
  .week .dayhead small{display:block;color:var(--muted);font-weight:600;font-size:13px;text-transform:none;letter-spacing:0;margin-top:2px}
  .week .corner{border-bottom:1px solid var(--line);position:sticky;top:0;z-index:12;background:var(--card)}
  .week .dayhead.today{background:#fafafa;z-index:13;border-bottom:2px solid var(--today-bg)}
  .week .dayhead.today small{color:var(--ink);font-weight:700}
  .col.today{background:rgba(253,243,220,0.15)}
  .allday .cell.today{background:rgba(253,243,220,0.35)}
  .now-line{position:absolute;left:0;right:0;height:2px;background:#dc2626;z-index:5;pointer-events:none}
  .now-line::before{content:'';position:absolute;left:-4px;top:-3px;width:8px;height:8px;border-radius:50%;background:#ef4444}
  .allday{display:grid;grid-template-columns:subgrid;border-bottom:1px solid var(--line)}
  .allday .lbl{font-size:11px;color:var(--muted);padding:4px 6px;text-align:right}
  .allday .cell{border-left:1px solid #f0f0f3;padding:3px;display:flex;flex-direction:column;gap:3px;overflow:hidden;min-width:0}
  /* day grid */
  .day-grid{display:grid;grid-template-columns:56px 1fr;background:var(--card);
    border:1px solid var(--line);border-radius:8px;box-shadow:var(--shadow);overflow:hidden}
  .day-grid .dayhead{padding:10px 12px;text-align:center;border-bottom:1px solid var(--line);border-left:1px solid #f0f0f3;
    font-weight:700;font-size:10px;text-transform:uppercase;letter-spacing:.5px}
  .day-grid .dayhead small{display:block;color:var(--muted);font-weight:600;font-size:13px;text-transform:none;letter-spacing:0;margin-top:2px}
  .day-grid .corner{border-bottom:1px solid var(--line)}
  .day-allday{display:grid;grid-template-columns:56px 1fr;border-bottom:1px solid var(--line)}
  .day-allday .lbl{font-size:11px;color:var(--muted);padding:4px 6px;text-align:right}
  .day-allday .cell{border-left:1px solid var(--line);padding:3px;display:flex;flex-wrap:wrap;gap:4px}
  .day-body{display:grid;grid-template-columns:56px 1fr;position:relative}
  .grid{display:grid;grid-template-columns:subgrid;position:relative}
  .axis{position:relative}
  .axis .tick{position:absolute;right:6px;font-size:10px;color:#687280;transform:translateY(-6px);font-weight:500}
  .col{position:relative;border-left:1px solid #f0f0f3}
  .col .hline{position:absolute;left:0;right:0;border-top:1px solid #f4f5f7}
  .ev{position:absolute;left:3px;right:3px;border-radius:4px;padding:4px 6px;color:var(--ink);overflow:hidden;
    font-size:11px;line-height:1.3;cursor:pointer;box-shadow:0 1px 2px rgba(0,0,0,.06);border:none;border-left:3px solid currentColor;transition:filter .1s,transform .1s}
  .ev:hover{filter:brightness(.97);transform:translateY(-1px);z-index:10}
  .ev a{color:var(--ink);text-decoration:none}
  .ev .t{font-weight:600;display:flex;align-items:center;gap:3px 4px;min-width:0;flex-wrap:wrap;color:var(--ink)}
  .ev .t .evtitle{flex:1 1 auto;min-width:0;overflow:hidden;white-space:nowrap;text-overflow:ellipsis}
  .ev .t .evtime{flex:none}
  .ev .t .chip{flex:none}
  .ev .s{opacity:.75;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--ink)}
  .chip{display:inline-block;border-radius:999px;padding:0 6px;font-size:10px;font-weight:700;background:rgba(0,0,0,.08);color:var(--ink)}
  .chip.full{background:#1a1a1a;color:#fff}
  .chip.wait{background:#FEF3C7;color:#92400E;border:1px solid #F59E0B}
  .chip.closed{background:#FEE2E2;color:#991B1B;border:1px solid #F87171}
  .chip.open-reg{background:#D1FAE5;color:#065F46;border:1px solid #34D399}
  /* +N more chip (inline inside event) */
  .more-chip{display:inline-block;border-radius:999px;padding:1px 7px;margin-top:1px;
    font-size:10px;font-weight:700;color:#1f2430;background:rgba(255,255,255,.88);
    cursor:pointer;white-space:nowrap;text-shadow:none}
  .more-chip:hover{background:#fff}
  /* more popover (time-slot expansion) */
  .slot-pop{position:fixed;z-index:900;background:var(--card);border:1px solid var(--line);
    border-radius:12px;box-shadow:0 8px 32px rgba(0,0,0,.18);padding:10px;min-width:260px;max-width:340px;max-height:400px;overflow-y:auto}
  .slot-pop .sp-title{font-weight:700;font-size:12px;color:var(--muted);margin-bottom:8px;text-transform:uppercase;letter-spacing:.03em}
  .slot-pop .sp-item{display:flex;gap:8px;align-items:center;padding:6px 8px;border-radius:8px;cursor:pointer;margin-bottom:2px}
  .slot-pop .sp-item:hover{background:var(--bg)}
  .slot-pop .sp-dot{width:8px;height:8px;border-radius:50%;flex:0 0 auto}
  .slot-pop .sp-info{flex:1;min-width:0}
  .slot-pop .sp-act{font-weight:600;font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .slot-pop .sp-sub{font-size:11px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  /* list */
  .list .day{margin-bottom:16px;background:var(--card);border:1px solid var(--line);border-radius:8px;overflow:hidden}
  .list .dlabel{font-weight:700;margin:0;padding:12px 14px;border-bottom:1px solid var(--line);font-size:14px;color:var(--ink)}
  .list .loc{font-size:11px;text-transform:uppercase;letter-spacing:.04em;color:var(--muted);margin:0;padding:8px 14px 4px;font-weight:600}
  .row{display:flex;gap:12px;align-items:flex-start;background:var(--card);border:none;border-bottom:1px solid #f0f0f0;
    border-radius:0;padding:12px 14px;margin-bottom:0;box-shadow:none;transition:background .15s}
  .row:hover{background:#fafafa}
  .row .bar{width:4px;align-self:stretch;border-radius:4px;flex:0 0 auto}
  .row .when{width:140px;flex:0 0 auto;color:var(--muted);font-variant-numeric:tabular-nums}
  .row .main{flex:1;min-width:0}
  .row .main .ti{font-weight:600}
  .row .main .su{color:var(--muted);font-size:13px}
  .row .right{text-align:right;flex:0 0 auto;display:flex;flex-direction:column;gap:4px;align-items:flex-end}
  .empty{background:var(--card);border:1px dashed var(--line);border-radius:12px;padding:40px;text-align:center;color:var(--muted)}
  .empty-week{background:var(--card);border:1px dashed var(--line);border-radius:12px;padding:60px 40px;text-align:center;margin:20px 0}
  .empty-week-icon{font-size:48px;margin-bottom:12px}
  .empty-week-msg{font-size:20px;font-weight:600;color:var(--fg);margin-bottom:6px}
  .empty-week-hint{font-size:14px;color:var(--muted)}
  .note{color:var(--muted);font-size:12px;margin:8px 2px}
  /* ── Month view ─────────────────────────────────────── */
  .month-nav{display:none}
  .month-nav .month-label{font-size:18px;font-weight:700;min-width:200px;text-align:center}
  .month-dow{display:grid;grid-template-columns:repeat(7,1fr);gap:0;margin-bottom:0;background:var(--card);border:1px solid var(--line);border-bottom:none;border-radius:8px 8px 0 0;overflow:hidden}
  .month-dow div{text-align:center;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:#999;padding:10px 4px;background:#fafafa;border-bottom:1px solid var(--line);border-right:1px solid var(--line)}
  .month-dow div:last-child{border-right:none}
  .month-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:0;border:1px solid var(--line);border-top:none;border-radius:0 0 8px 8px;overflow:hidden}
  .month-cell{min-height:100px;border:1px solid var(--line);border-radius:0;background:var(--card);
    padding:5px;position:relative;overflow:hidden;cursor:default;transition:border-color .12s}
  .month-cell:nth-child(7n+6),.month-cell:nth-child(7n){background:var(--weekend)}
  .month-cell.other{background:#fafafa;opacity:.4}
  .month-cell.today{border-color:var(--line);border-width:1px}
  .month-cell.has-ev{cursor:pointer}
  .month-cell.has-ev:hover{border-color:#94a3b8;box-shadow:0 2px 6px rgba(0,0,0,.06)}
  .month-num{font-size:11px;font-weight:400;color:#666;margin-bottom:3px;line-height:1;text-align:right}
  .month-cell.today .month-num{color:#fff;background:var(--today-bg);display:inline-flex;align-items:center;justify-content:center;width:22px;height:22px;border-radius:50%;font-weight:700;float:right}
  .month-chip{display:block;border-radius:4px;padding:2px 5px;margin-bottom:2px;font-size:10px;font-weight:500;
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--ink);line-height:1.4;cursor:pointer;
    border:none;border-left:3px solid;transition:filter .1s,transform .1s}
  .month-chip:hover{filter:brightness(.96);transform:translateY(-1px);z-index:2}
  .month-more{font-size:9px;color:#F5A623;font-weight:600;padding:1px 3px;cursor:pointer}
  .month-more:hover{color:#d4891a}
  /* ── Day detail popup ──────────────────────────────── */
  .dp-overlay{position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:1000;display:flex;align-items:center;justify-content:center}
  .dp-panel{background:var(--card);border-radius:16px;box-shadow:0 12px 48px rgba(0,0,0,.2);
    width:520px;max-width:92vw;max-height:80vh;display:flex;flex-direction:column;overflow:hidden}
  .dp-head{display:flex;align-items:center;justify-content:space-between;padding:16px 18px;
    border-bottom:1px solid var(--line)}
  .dp-date{font-size:16px;font-weight:700}
  .dp-count{font-size:12px;color:var(--muted);margin-top:2px}
  .dp-actions{display:flex;gap:6px;align-items:center}
  .dp-actions button{font-size:11px;padding:4px 10px;border-radius:6px;border:1px solid var(--line);
    background:var(--card);cursor:pointer}
  .dp-actions button:hover{background:var(--bg)}
  .dp-list{flex:1;overflow-y:auto;padding:12px 16px}
  .dp-item{display:flex;gap:10px;padding:10px;border-radius:10px;margin-bottom:6px;
    background:var(--bg);transition:background .1s}
  .dp-item:hover{background:#eef2ff}
  .dp-bar{width:4px;border-radius:4px;align-self:stretch;flex:0 0 auto}
  .dp-body{flex:1;min-width:0}
  .dp-top{display:flex;align-items:baseline;justify-content:space-between;gap:8px}
  .dp-label{font-weight:600;font-size:13.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1;min-width:0}
  .dp-time{font-size:12px;color:var(--muted);font-variant-numeric:tabular-nums;flex:0 0 auto}
  .dp-loc{font-size:11.5px;color:var(--muted);margin-top:1px}
  .dp-meta{font-size:11px;color:#636b78;margin-top:2px}
  .dp-link{display:inline-block;margin-top:3px;font-size:11px;color:var(--accent);text-decoration:none;font-weight:600}
  .dp-link:hover{text-decoration:underline}

    @media print{
    body{background:#fff}
    .toolbar{display:none}
    .week,.day-grid,.row{box-shadow:none}
    .wrap{max-width:none;padding:0;box-shadow:none;margin:0}
  }
  body.print-mode .toolbar{display:none}

  /* ---- session popup ---- */
  .pop-overlay{position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:1000;display:flex;align-items:center;justify-content:center}
  .pop{background:var(--card);border-radius:16px;box-shadow:0 12px 48px rgba(0,0,0,.2);width:400px;max-width:92vw;overflow:hidden}
  .pop-head{display:flex;align-items:flex-start;justify-content:space-between;padding:18px 18px 14px;border-bottom:1px solid var(--line)}
  .pop-act{font-weight:700;font-size:16px}
  .pop-time{font-size:13px;color:var(--muted);margin-top:4px}
  .pop-x{border:1px solid var(--line);background:var(--card);border-radius:6px;width:28px;height:28px;font-size:16px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--muted);flex-shrink:0;padding:0;transition:background .1s}
  .pop-x:hover{background:var(--bg)}
  .pop-body{padding:14px 18px 18px}
  .pop-row{display:flex;gap:8px;align-items:flex-start;font-size:13px;color:var(--ink);margin-bottom:8px;word-break:break-word}
  .pop-lbl{color:var(--muted);font-size:10px;text-transform:uppercase;letter-spacing:.05em;min-width:78px;white-space:nowrap;font-weight:600}
  .pop-chips{margin-top:4px}
  .pop-link{display:inline-block;margin-top:12px;font-size:13px;color:var(--accent);text-decoration:none;font-weight:600}
  .pop-link:hover{text-decoration:underline}
  .filter-sel{border:1px solid #d4d4d4;border-radius:20px;padding:5px 12px;font-size:13px;background:var(--card);color:var(--ink);cursor:pointer;height:34px;max-width:200px}
  .filter-sel:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 2px rgba(37,99,235,.1)}
  .filter-clear{font-size:11px;color:var(--accent);cursor:pointer;text-decoration:underline;white-space:nowrap}
  /* present / kiosk mode */
  body.present-mode{background:#fff}
  body.present-mode .toolbar{display:none}
  body.present-mode .wrap{max-width:none;padding:24px 40px;box-shadow:none;margin:0;border-radius:0}
  body.present-mode .org-banner img{height:56px;max-width:220px}
  body.present-mode .org-banner .org-name{font-size:22px}
  body.present-mode .org-banner .org-sub{font-size:15px}
  body.present-mode .hdr .range{font-size:16px}
  body.present-mode .list .dlabel{font-size:17px}
  body.present-mode .list .loc{font-size:14px}
  body.present-mode .row{padding:12px 14px;font-size:16px}
  body.present-mode .row .when{font-size:15px;width:170px}
  body.present-mode .row .main .ti{font-size:16px}
  body.present-mode .row .main .su{font-size:14px}
  body.present-mode .row .right{font-size:14px}
  body.present-mode .chip{font-size:12px;padding:1px 8px}
  body.present-mode .present-status{position:fixed;bottom:12px;right:16px;font-size:11px;color:var(--muted);opacity:.5;z-index:10}

  /* Program Finder */

  /* -- Find a Program Wizard -- */
  .pgwiz-bar{padding:14px 16px;background:linear-gradient(135deg,#eef2ff,#e0e7ff);border:2px solid #818cf8;border-radius:12px;cursor:pointer;text-align:center;font-size:14px;color:#3730a3;font-weight:600;transition:all .15s;box-shadow:0 2px 8px rgba(99,102,241,0.12);margin:12px 12px 0}
  .pgwiz-bar:hover{background:linear-gradient(135deg,#e0e7ff,#c7d2fe)}
  .pgwiz-wrap{padding:20px 24px;background:linear-gradient(135deg,#eef2ff,#f5f3ff);border:2px solid #818cf8;border-radius:12px;margin:12px 12px 0;box-shadow:0 4px 16px rgba(99,102,241,0.15)}
  .pgwiz-head{display:flex;justify-content:space-between;align-items:center;font-size:15px;font-weight:600;color:#312e81;margin-bottom:12px}
  .pgwiz-x{background:none;border:none;font-size:16px;cursor:pointer;color:#6b7280;padding:2px 6px}
  .pgwiz-x:hover{color:#111}
  .pgwiz-step{animation:pgwizFade .2s ease}
  @keyframes pgwizFade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
  .pgwiz-q{font-size:14px;color:#374151;margin-bottom:10px;font-weight:500}
  .pgwiz-opts{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:8px}
  .pgwiz-pill{padding:8px 14px;border-radius:20px;border:1px solid #c7d2fe;background:#fff;font-size:13px;cursor:pointer;color:#312e81;transition:all .15s;font-family:inherit;font-weight:500}
  .pgwiz-pill:hover{background:#e0e7ff;border-color:#818cf8}
  .pgwiz-go{background:#4f46e5;color:#fff;border-color:#4f46e5}
  .pgwiz-go:hover{background:#4338ca}
  .pgwiz-back{background:none;border:none;font-size:12px;color:#6b7280;cursor:pointer;padding:4px 0;margin-top:4px}
  .pgwiz-back:hover{color:#374151}
  .pgwiz-result{padding:12px 20px;background:linear-gradient(135deg,#f0fdf4,#ecfdf5);border:2px solid #86efac;border-radius:12px;margin:12px 12px 0;font-size:14px;color:#166534;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
  .pgwiz-result strong{font-weight:600}
  .pgwiz-result-x{background:none;border:none;color:#6b7280;cursor:pointer;font-size:14px;margin-left:auto;padding:2px 6px}
  .pgwiz-result-x:hover{color:#111}
  .pgwiz-crumb{font-size:12px;color:#6366f1;font-weight:600;margin-bottom:8px}
  .pgwiz-crumb-link{cursor:pointer;text-decoration:underline;text-decoration-style:dotted;text-underline-offset:2px}
  .pgwiz-crumb-link:hover{color:#4338ca}
  body.present-mode .pgwiz-bar,body.present-mode .pgwiz-wrap,body.present-mode .pgwiz-result{display:none}
  @media print{.pgwiz-bar,.pgwiz-wrap,.pgwiz-result{display:none!important}}

  .pf-fab{position:fixed;bottom:24px;right:24px;z-index:100;display:flex;align-items:center;gap:8px;
    background:linear-gradient(135deg,#6366f1,#2563eb);color:#fff;border:none;border-radius:50px;
    padding:14px 22px;font-size:14px;font-weight:700;cursor:pointer;box-shadow:0 4px 20px rgba(37,99,235,.35);
    transition:transform .15s,box-shadow .15s}
  .pf-fab:hover{transform:translateY(-2px);box-shadow:0 6px 28px rgba(37,99,235,.45);background:linear-gradient(135deg,#6366f1,#2563eb)}
  .pf-fab .pf-spark{font-size:18px}
  .pf-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;display:flex;align-items:center;justify-content:center;padding:20px}
  .pf-modal{background:#fff;border-radius:16px;max-width:480px;width:100%;max-height:90vh;overflow-y:auto;box-shadow:0 24px 60px rgba(0,0,0,.25)}
  .pf-head{padding:24px 24px 16px;text-align:center;background:linear-gradient(135deg,#f0f9ff 0%,#f5f3ff 100%);border-radius:16px 16px 0 0}
  .pf-head h2{margin:0;font-size:20px;color:#1f2937}

<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useMemo,useCallback,useRef} = React;

/* ---------- helpers ---------- */
const PALETTE = ['#2563eb','#0a7b71','#db2777','#b45309','#7c3aed','#dc2626','#0e7490','#4d7c0f','#c026d3','#475569'];
function colorFor(key){
  const s = String(key||'').toLowerCase();
  let h=0; for(let i=0;i<s.length;i++) h=(h*31+s.charCodeAt(i))>>>0;
  return PALETTE[h % PALETTE.length];
}
function colorForBg(key){
  var hex=colorFor(key);
  var r=parseInt(hex.slice(1,3),16), g=parseInt(hex.slice(3,5),16), b=parseInt(hex.slice(5,7),16);
  var mr=Math.round(255*0.82+r*0.18), mg=Math.round(255*0.82+g*0.18), mb=Math.round(255*0.82+b*0.18);
  return 'rgb('+mr+','+mg+','+mb+')';
}
function pad(n){return n<10?'0'+n:''+n;}
function fmtISO(d){return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate());}
function startOfWeek(d){const x=new Date(d);const wd=x.getDay();x.setDate(x.getDate()-wd);x.setHours(0,0,0,0);return x;}
function addDays(d,n){const x=new Date(d);x.setDate(x.getDate()+n);return x;}
function trackClick(ev){
  try{
    const slug=(window.__ORG__||{}).slug||window.location.pathname.split('/').filter(Boolean)[0]||'';
    const url=ev.url||'';const section=ev.section||ev.label||'';
    navigator.sendBeacon('/'+slug+'/calendar/api/click',new Blob([JSON.stringify({section:section,url:url})],{type:'application/json'}));
  }catch(e){}
}
const DOW=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
const DOWL=['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
const MON=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

// parse "08:00pm", "8:00 AM", "20:00", "2026-03-01T20:00" -> minutes from midnight
function toMin(v){
  if(v==null) return null;
  let s=String(v).trim();
  if(!s) return null;
  if(s.indexOf('T')>=0) s=s.split('T')[1]||s;
  const m=s.match(/(\d{1,2}):(\d{2})\s*([ap]\.?m\.?)?/i);
  if(!m) return null;
  let h=+m[1], mm=+m[2];
  const ap=(m[3]||'').toLowerCase().replace(/\./g,'');
  if(ap==='pm'&&h<12) h+=12;
  if(ap==='am'&&h===12) h=0;
  return h*60+mm;
}
function minToLabel(min){
  let h=Math.floor(min/60), m=min%60; const ap=h>=12?'pm':'am';
  let hh=h%12; if(hh===0) hh=12;
  return hh+':'+pad(m)+ap;
}
// normalize one Metabase row to internal keys (tolerant of alt aliases)
function pick(r,keys){ for(const k of keys){ if(r[k]!=null&&r[k]!=='') return r[k]; } return ''; }
function stripHtml(s){ if(!s) return ''; return String(s).replace(/<[^>]*>?/g,' ').replace(/&nbsp;/g,' ').replace(/&amp;/g,'&').replace(/&lt;/g,'<').replace(/&gt;/g,'>').replace(/&#?\w+;/g,' ').replace(/\s+/g,' ').trim(); }
// Activities hidden from the public calendar (e.g. uncategorized private lessons).
const HIDDEN_ACTIVITIES = ['uncategorized'];
const isHiddenActivity = e => HIDDEN_ACTIVITIES.includes(String((e && e.activity) || '').trim().toLowerCase());
function normalizeRow(r){
  const begin=pick(r,['Begin','Start','Start Time','begin','start']);
  const end=pick(r,['End','End Time','end']);
  const status=String(pick(r,['Status','status'])).toLowerCase();
  return {
    orgName: pick(r,['Org Name','Organization','orgName']),
    dateISO: parseDateISO(pick(r,['Date','Begin Sort','date','starts_at','Starts At'])),
    begin, end,
    beginMin: toMin(pick(r,['Begin Sort','Begin','Start','start','starts_at'])),
    endMin: toMin(end),
    location: pick(r,['Location','location','Facility Location'])||'Unassigned',
    facility: pick(r,['Facility','Court','facility']),
    activity: pick(r,['Activity','Site Type','Purpose','activity'])||'Reservation',
    program: pick(r,['Program','program']),
    section: pick(r,['Section','section','Purpose','Reservee']),
    label: pick(r,['Section','section','Purpose','Reservee']) || pick(r,['Program','program']) || pick(r,['Activity','Site Type','Purpose','activity']) || 'Reservation',
    url: pick(r,['Section URL','Url','url','sectionUrl']),
    full: status.indexOf('full')>=0 || status.indexOf('capacity')>=0,
    waitlist: status.indexOf('wait')>=0,
    closed: status.indexOf('closed')>=0,
    total: pick(r,['price','Price','Total','total']),
    description: stripHtml(pick(r,['Description','description'])),
    eligibility: pick(r,['Eligibility','eligibility'])||'',
  };
}

function parseEligibility(elig){
  if(!elig) return {minAge:null,maxAge:null,grades:[]};
  var minAge=null,maxAge=null,grades=[];
  var am=elig.match(/Ages\s+(\d+)-(\d+)/);
  if(am){minAge=parseInt(am[1]);maxAge=parseInt(am[2]);}
  var ap=elig.match(/Ages\s+(\d+)\+/);
  if(ap){minAge=parseInt(ap[1]);maxAge=199;}
  var gm=elig.match(/Grades:\s*([^|]+)/);
  if(gm){grades=gm[1].split(',').map(function(g){return g.trim();}).filter(Boolean);}
  return {minAge:minAge,maxAge:maxAge,grades:grades};
}
var GRADE_ORDER=['preschool','kindergarten','first','second','third','fourth','fifth','sixth','seventh','eighth','ninth','tenth','eleventh','twelfth'];
function gradeLabel(g){return g.charAt(0).toUpperCase()+g.slice(1);}
function parseDateISO(v){
  if(!v) return '';
  let s=String(v);
  if(s.indexOf('T')>=0) s=s.split('T')[0];
  if(/^\d{4}-\d{2}-\d{2}$/.test(s)) return s;
  const d=new Date(s);
  if(!isNaN(d)) return fmtISO(d);
  return s;
}

/* ---------- start-time grouping ---------- */
// Groups sorted events by start-time proximity (within THRESHOLD minutes).
// Avoids cascading merges where an 8am–10am event swallows all 10am events.
// Returns [{start,end,events:[...]}]
const START_GROUP_THRESHOLD=15; // minutes
function groupOverlaps(events){
  const groups=[];
  let cur=null;
  for(const e of events){
    if(!cur || e.beginMin-cur.start>START_GROUP_THRESHOLD){
      cur={start:e.beginMin, end:e.endMin||e.beginMin+30, events:[e]};
      groups.push(cur);
    } else {
      cur.events.push(e);
      cur.end=Math.max(cur.end, e.endMin||e.beginMin+30);
    }
  }
  return groups;
}

/* ---------- sample fallback ---------- */
const TEMPLATE = (()=>{
  const base=startOfWeek(new Date());
  const mk=(off,b,e,act,loc,fac,prog,sec,status)=>({
    "Org Name":"Apex Parks & Rec","Date":fmtISO(addDays(base,off)),
    "Begin":b,"End":e,"Activity":act,"Location":loc,"Facility":fac,
    "Program":prog,"Section":sec,"Status":status||"",
    "Section URL":"https://rec.us/apex"
  });
  return [
    mk(1,"09:00am","10:00am","Youth Soccer","North Fields","Field 2","Spring Soccer","U8 Mon/Wed","full"),
    mk(1,"09:30am","10:30am","Gymnastics","Rec Center","Studio B","Tumbling","Beginner",""),
    mk(1,"09:45am","11:00am","Art Camp","Community Center","Room 3","Summer Art","Mixed Media","waitlist"),
    mk(1,"04:00pm","05:30pm","Adult Yoga","Community Center","Studio A","Wellness","Evening Flow","waitlist"),
    mk(2,"06:00pm","07:30pm","Basketball","Rec Center","Court 1","Open Gym","Drop-in",""),
    mk(3,"08:00am","03:00pm","Day Camp","Community Center","Hall","Summer Camp","Week 1","full"),
    mk(4,"10:00am","11:00am","Pickleball","North Fields","Court 3","Open Play","Morning",""),
    mk(5,"05:00pm","06:00pm","Adult Yoga","Community Center","Studio A","Wellness","Sunset Flow",""),
    mk(6,"09:00am","12:00pm","Swim Lessons","Aquatics","Pool","Learn to Swim","Level 2","waitlist"),
  ];
})();

/* ---------- data fetch ---------- */
function ctx(){
  const parts=window.location.pathname.split('/').filter(Boolean);
  // /{org}/calendar  -> org=parts[0]; standalone /calendar.html -> none
  const org=(parts.length>=2 && parts[1].indexOf('calendar')===0)?parts[0]:null;
  const q=new URLSearchParams(window.location.search);
  return {org, token:q.get('token')||'', print:q.get('_print')==='1'};
}
const MB_FALLBACK_UUID="8a3dac9b-6c34-45e1-a7d0-3a177477fe17";

async function fetchData(from,to){
  const {org,token}=ctx();
  if(org){
    try{
      const u=new URL('/'+org+'/calendar/api/data',window.location.origin);
      u.searchParams.set('start_date',from); u.searchParams.set('end_date',to);
      if(token) u.searchParams.set('token',token);
      console.log('[calendar] fetching',u.toString());
      const res=await fetch(u.toString());
      if(!res.ok){
        const body=await res.text().catch(()=>'');
        console.error('[calendar] fetch failed',res.status,body);
        return {rows:TEMPLATE,src:'sample',error:'Server returned '+res.status};
      }
      const j=await res.json();
      const rows=j.rows||j.data||j||[];
      console.log('[calendar] got',rows.length,'rows, keys:',rows.length?Object.keys(rows[0]).join(', '):'(empty)');
      // 0 rows is a valid result (empty week) — return live, not sample
      return {rows,src:'live'};
    }catch(e){
      console.error('[calendar] fetch error',e);
      return {rows:TEMPLATE,src:'sample',error:e.message};
    }
  }
  return {rows:TEMPLATE,src:'sample'};
}

/* ---------- views ---------- */
function StatusChips({ev}){
  return (<React.Fragment>
    {ev.full && <span className="chip full">Full</span>}
    {ev.waitlist && <span className="chip wait">Waitlist</span>}
    {ev.closed && !ev.full && <span className="chip closed">Closed</span>}
  </React.Fragment>);
}

/* --- Slot popover ("+N more" expansion) --- */
function SlotPopover({group,anchorRect,onSelect,onClose}){
  const ref=useRef();
  useEffect(()=>{
    const handler=(e)=>{if(ref.current && !ref.current.contains(e.target)) onClose();};
    document.addEventListener('mousedown',handler);
    return ()=>document.removeEventListener('mousedown',handler);
  },[onClose]);
  if(!group||!anchorRect) return null;
  // position below the anchor, clamped to viewport
  let top=anchorRect.bottom+4, left=anchorRect.left;
  if(top+300>window.innerHeight) top=anchorRect.top-300;
  if(left+300>window.innerWidth) left=window.innerWidth-320;
  if(left<8) left=8;
  const timeRange=minToLabel(group.start)+' – '+minToLabel(group.end);
  return (
    <div className="slot-pop" ref={ref} style={{top,left,position:'fixed'}}>
      <div className="sp-title">{timeRange} · {group.events.length} sessions</div>
      {group.events.map((e,i)=>(
        <div className="sp-item" key={i} onClick={()=>onSelect(e)}>
          <div className="sp-dot" style={{background:colorFor(e.activity)}}></div>
          <div className="sp-info">
            <div className="sp-act">{e.label}</div>
            <div className="sp-sub">{minToLabel(e.beginMin)}{e.endMin!=null?' – '+minToLabel(e.endMin):''} · {e.facility||e.location}</div>
          </div>
          <StatusChips ev={e}/>
        </div>
      ))}
    </div>
  );
}

function WeekView({weekStart,events,onEv,onDayClick}){
  const [slotGroup,setSlotGroup]=useState(null);
  const [slotRect,setSlotRect]=useState(null);
  const days=useMemo(()=>Array.from({length:7},(_,i)=>fmtISO(addDays(weekStart,i))),[weekStart]);
  const todayISO=fmtISO(new Date());
  const nowDt=new Date();
  const nowMin=nowDt.getHours()*60+nowDt.getMinutes();
  const timed=events.filter(e=>e.beginMin!=null && e.endMin!=null && (e.endMin-e.beginMin)<7*60);
  const allday=events.filter(e=>!(e.beginMin!=null && e.endMin!=null) || (e.endMin-e.beginMin)>=7*60);
  let lo,hi;
  if(timed.length>0){
    lo=Infinity; hi=-Infinity;
    timed.forEach(e=>{ lo=Math.min(lo,e.beginMin); hi=Math.max(hi,e.endMin); });
    lo=Math.floor(lo/60)*60-60; hi=Math.ceil(hi/60)*60+60;
    lo=Math.max(lo,0); hi=Math.min(hi,24*60);
  } else { lo=8*60; hi=17*60; }
  const PX=1.8, H=(hi-lo)*PX;
  const hours=[]; for(let m=lo;m<=hi;m+=60) hours.push(m);
  const byDay=(d)=>{
    const sorted=timed.filter(e=>e.dateISO===d).sort((a,b)=>a.beginMin-b.beginMin);
    return groupOverlaps(sorted);
  };
  const allByDay=d=>allday.filter(e=>e.dateISO===d);

  const handleMore=(grp,evt)=>{
    const rect=evt.currentTarget.getBoundingClientRect();
    setSlotGroup(grp); setSlotRect(rect);
  };

  return (
    <React.Fragment>
    <div className="week">
      <div className="corner"></div>
      {days.map((d,i)=>{const dt=addDays(weekStart,i);
        return <div className={'dayhead'+(d===todayISO?' today':'')} key={d} onClick={()=>onDayClick&&onDayClick(d)}>{DOW[i]}<small>{MON[dt.getMonth()]} {dt.getDate()}</small></div>;})}

      <div className="allday" style={{gridColumn:'1 / -1'}}>
        <div className="lbl">all-day</div>
        {days.map(d=>(
          <div className={'cell'+(d===todayISO?' today':'')} key={'a'+d}>
            {allByDay(d).map((e,j)=>(
              <div className="ev" key={j} style={{position:'static',background:colorForBg(e.activity),borderLeftColor:colorFor(e.activity),cursor:'pointer'}} title={e.label} onClick={()=>onEv&&onEv(e)}>
                <div className="t"><span className="evtitle">{e.label}</span><StatusChips ev={e}/></div>
              </div>
            ))}
          </div>
        ))}
      </div>

      <div className="grid" style={{gridColumn:'1 / -1'}}>
        <div className="axis" style={{height:H}}>
          {hours.map(m=>(<div className="tick" key={m} style={{top:(m-lo)*PX}}>{minToLabel(m).replace(':00','')}</div>))}
        </div>
        {days.map(d=>(
          <div className={'col'+(d===todayISO?' today':'')} key={'c'+d} style={{height:H}}>
            {hours.map(m=>(<div className="hline" key={m} style={{top:(m-lo)*PX}}></div>))}
            {d===todayISO && nowMin>=lo && nowMin<=hi && <div className="now-line" style={{top:(nowMin-lo)*PX}}/>}
            {byDay(d).map((grp,gi)=>{
              const first=grp.events[0];
              const top=(first.beginMin-lo)*PX;
              const extra=grp.events.length-1;
              const minHt=extra>0?34:20;
              const ht=Math.max((first.endMin-first.beginMin)*PX,minHt);
              return (
                <div className="ev" key={gi} style={{top,height:ht,background:colorForBg(first.activity),borderLeftColor:colorFor(first.activity),cursor:'pointer'}}
                     onClick={()=>onEv&&onEv(first)}
                     title={first.label+' '+first.begin+'–'+first.end}>
                  <div className="t"><span className="evtime">{minToLabel(first.beginMin)}</span><span className="evtitle">{first.label}</span><StatusChips ev={first}/></div>
                  {ht>32 && !extra && <div className="s">{first.facility||first.activity}</div>}
                  {extra>0 && <div className="s"><span className="more-chip" onClick={(evt)=>{evt.stopPropagation();handleMore(grp,evt);}}>+{extra} more</span></div>}
                </div>
              );
            })}
          </div>
        ))}
      </div>
    </div>
    <SlotPopover group={slotGroup} anchorRect={slotRect} onSelect={(e)=>{setSlotGroup(null);onEv&&onEv(e);}} onClose={()=>setSlotGroup(null)}/>
    </React.Fragment>
  );
}

function DayView({dateISO,events,onEv}){
  const dt=new Date(dateISO+'T00:00:00');
  const timed=events.filter(e=>e.dateISO===dateISO && e.beginMin!=null && e.endMin!=null && (e.endMin-e.beginMin)<7*60);
  const allday=events.filter(e=>e.dateISO===dateISO && (!(e.beginMin!=null && e.endMin!=null) || (e.endMin-e.beginMin)>=7*60));
  let lo,hi;
  if(timed.length>0){
    lo=Infinity; hi=-Infinity;
    timed.forEach(e=>{ lo=Math.min(lo,e.beginMin); hi=Math.max(hi,e.endMin); });
    lo=Math.floor(lo/60)*60-60; hi=Math.ceil(hi/60)*60+60;
    lo=Math.max(lo,0); hi=Math.min(hi,24*60);
  } else { lo=8*60; hi=17*60; }
  const PX=2.4, H=(hi-lo)*PX;
  const hours=[]; for(let m=lo;m<=hi;m+=60) hours.push(m);

  // layout overlapping events into columns
  const sorted=timed.slice().sort((a,b)=>a.beginMin-b.beginMin||(a.endMin-a.beginMin)-(b.endMin-b.beginMin));
  const cols=[]; // each col is an array of events
  const evCols=new Map(); // event -> {col, totalCols}
  for(const e of sorted){
    let placed=false;
    for(let c=0;c<cols.length;c++){
      const last=cols[c][cols[c].length-1];
      if(e.beginMin>=last.endMin){ cols[c].push(e); evCols.set(e,{col:c}); placed=true; break; }
    }
    if(!placed){ evCols.set(e,{col:cols.length}); cols.push([e]); }
  }
  const totalCols=cols.length||1;
  for(const [e,info] of evCols) info.totalCols=totalCols;

  return (
    <div className="day-grid">
      <div className="corner"></div>
      <div className="dayhead">{DOWL[dt.getDay()]}<small>{MON[dt.getMonth()]} {dt.getDate()}, {dt.getFullYear()}</small></div>

      {allday.length>0 && (
        <div className="day-allday" style={{gridColumn:'1 / -1'}}>
          <div className="lbl">all-day</div>
          <div className="cell">
            {allday.map((e,j)=>(
              <div className="ev" key={j} style={{position:'static',background:colorForBg(e.activity),borderLeftColor:colorFor(e.activity),cursor:'pointer',maxWidth:300}} onClick={()=>onEv&&onEv(e)}>
                <div className="t"><span className="evtitle">{e.label}</span><StatusChips ev={e}/></div>
                <div className="s">{e.facility||e.activity}</div>
              </div>
            ))}
          </div>
        </div>
      )}

      <div className="day-body" style={{gridColumn:'1 / -1'}}>
        <div className="axis" style={{height:H}}>
          {hours.map(m=>(<div className="tick" key={m} style={{top:(m-lo)*PX}}>{minToLabel(m).replace(':00','')}</div>))}
        </div>
        <div className="col" style={{height:H}}>
          {hours.map(m=>(<div className="hline" key={m} style={{top:(m-lo)*PX}}></div>))}
          {sorted.map((e,j)=>{
            const info=evCols.get(e);
            const top=(e.beginMin-lo)*PX;
            const ht=Math.max((e.endMin-e.beginMin)*PX,26);
            const colW=100/info.totalCols;
            const left=info.col*colW+'%';
            const width=colW+'%';
            return (
              <div className="ev" key={j} style={{top,height:ht,background:colorForBg(e.activity),borderLeftColor:colorFor(e.activity),cursor:'pointer',left,width,right:'auto',paddingRight:4}}
                   onClick={()=>onEv&&onEv(e)}
                   title={e.label+' '+e.begin+'–'+e.end}>
                <div className="t"><span className="evtime">{minToLabel(e.beginMin)}</span><span className="evtitle">{e.label}</span><StatusChips ev={e}/></div>
                {ht>36 && <div className="s">{[e.activity,e.facility].filter(Boolean).join(' · ')}</div>}
                {ht>52 && <div className="s">{e.location}</div>}
              </div>
            );
          })}
        </div>
      </div>
    </div>
  );
}

function ListView({events,onEv}){
  const byDate=useMemo(()=>{
    const m={};
    events.slice().sort((a,b)=>(a.dateISO+ (a.beginMin!=null?pad(Math.floor(a.beginMin/60))+pad(a.beginMin%60):'9999'))
                              .localeCompare(b.dateISO+(b.beginMin!=null?pad(Math.floor(b.beginMin/60))+pad(b.beginMin%60):'9999')))
      .forEach(e=>{(m[e.dateISO]=m[e.dateISO]||[]).push(e);});
    return m;
  },[events]);
  const dates=Object.keys(byDate).sort();
  if(!dates.length) return <div className="empty">No scheduled sessions in this range.</div>;
  return (
    <div className="list">
      {dates.map(d=>{
        const dt=new Date(d+'T00:00:00');
        const locs={}; byDate[d].forEach(e=>{(locs[e.location]=locs[e.location]||[]).push(e);});
        return (
          <div className="day" key={d}>
            <div className="dlabel">{DOW[dt.getDay()]}, {MON[dt.getMonth()]} {dt.getDate()}, {dt.getFullYear()}</div>
            {Object.keys(locs).sort().map(loc=>(
              <div key={loc}>
                <div className="loc">{loc}</div>
                {locs[loc].map((e,j)=>(
                  <div className="row" key={j} style={{cursor:"pointer"}} onClick={()=>onEv&&onEv(e)}>
                    <div className="bar" style={{background:colorFor(e.activity)}}></div>
                    <div className="when">{e.beginMin!=null?(minToLabel(e.beginMin)+' – '+(e.endMin!=null?minToLabel(e.endMin):'')):'All day'}</div>
                    <div className="main">
                      <div className="ti">{e.label}</div>
                      <div className="su">{[e.activity,e.facility].filter(Boolean).join(' · ')}</div>
                    </div>
                    <div className="right">
                      <StatusChips ev={e}/>
                      {e.total!=='' && e.total!=null && <div className="su">{'From '+(typeof e.total==='number'?('$'+e.total.toFixed(2)):e.total)}</div>}
                    </div>
                  </div>
                ))}
              </div>
            ))}
          </div>
        );
      })}
    </div>
  );
}

/* ---------- month view ---------- */
var MONTH_NAMES=['January','February','March','April','May','June','July','August','September','October','November','December'];

function MonthView({events,monthDate,onMonthChange,onEv}){
  var [selectedDay,setSelectedDay]=useState(null);
  var year=monthDate.getFullYear(), month=monthDate.getMonth();

  var byDate=useMemo(function(){
    var m={};
    events.forEach(function(e){ if(e.dateISO){ (m[e.dateISO]=m[e.dateISO]||[]).push(e); } });
    Object.values(m).forEach(function(arr){ arr.sort(function(a,b){ return (a.beginMin||0)-(b.beginMin||0); }); });
    return m;
  },[events]);

  var calDays=useMemo(function(){
    var first=new Date(year,month,1);
    var last=new Date(year,month+1,0);
    var startDow=first.getDay();
    var days=[];
    for(var i=0;i<startDow;i++){
      var d=new Date(year,month,-startDow+i+1);
      days.push({iso:fmtISO(d),inMonth:false,num:d.getDate()});
    }
    for(var dd=1;dd<=last.getDate();dd++){
      days.push({iso:fmtISO(new Date(year,month,dd)),inMonth:true,num:dd});
    }
    var rem=42-days.length;
    for(var j=1;j<=rem;j++){
      var d2=new Date(year,month+1,j);
      days.push({iso:fmtISO(d2),inMonth:false,num:d2.getDate()});
    }
    return days;
  },[year,month]);

  var todayISO=fmtISO(new Date());
  var MAX_CHIPS=2;

  return (
    <React.Fragment>
      <div className="month-nav">
        <button onClick={function(){onMonthChange(-1);}}>&#8249; Prev</button>
        <div className="month-label">{MONTH_NAMES[month]} {year}</div>
        <button onClick={function(){onMonthChange(1);}}>Next &#8250;</button>
      </div>
      <div className="month-dow">
        {DOW.map(function(d){return <div key={d}>{d}</div>;})}
      </div>
      <div className="month-grid">
        {calDays.map(function(cd){
          var dayEvs=byDate[cd.iso]||[];
          var isToday=cd.iso===todayISO;
          var vis=dayEvs.slice(0,MAX_CHIPS);
          var overflow=dayEvs.length-MAX_CHIPS;
          var cls='month-cell'+(cd.inMonth?'':' other')+(isToday?' today':'')+(dayEvs.length?' has-ev':'');
          return (
            <div key={cd.iso} className={cls} onClick={function(){if(dayEvs.length) setSelectedDay(cd.iso);}}>
              <div className="month-num">{cd.num}</div>
              {vis.map(function(e,i){
                return (
                  <div key={i} className="month-chip" style={{background:colorForBg(e.activity),borderLeftColor:colorFor(e.activity)}}
                       onClick={function(evt){evt.stopPropagation();setSelectedDay(cd.iso);}}
                       title={e.label+' '+(e.begin||'')}>
                    {e.begin?minToLabel(e.beginMin)+' ':''}{e.label.length>20?e.label.slice(0,18)+'\u2026':e.label}
                  </div>
                );
              })}
              {overflow>0 && (
                <div className="month-more" onClick={function(evt){evt.stopPropagation();setSelectedDay(cd.iso);}}>
                  +{overflow} more &#8212; click to expand
                </div>
              )}
            </div>
          );
        })}
      </div>
      {selectedDay && (
        <DayDetailPopup date={selectedDay} events={byDate[selectedDay]||[]} onEv={onEv}
          onClose={function(){setSelectedDay(null);}}/>
      )}
    </React.Fragment>
  );
}

function ProgramFinder(){
  const [open,setOpen]=useState(false);
  const [desc,setDesc]=useState('');
  const [email,setEmail]=useState('');
  const [sending,setSending]=useState(false);
  const [error,setError]=useState('');
  const [done,setDone]=useState(false);

  const {org,token}=ctx();
  if(!org || !(window.__ORG__||{}).recommendEnabled) return null; // only show when enabled

  function reset(){setOpen(false);setDesc('');setEmail('');setError('');setDone(false);setSending(false);}

  async function submit(){
    if(desc.trim().length<5){setError('Tell us a bit more about what you\u2019re looking for!');return;}
    if(!email||!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)){setError('Please enter a valid email address.');return;}
    setError('');setSending(true);
    try{
      const u=new URL('/'+org+'/calendar/api/recommend',location.origin);
      const r=await fetch(u.toString(),{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({description:desc.trim(),email:email.trim()})
      });
      const d=await r.json();
      if(!r.ok||!d.ok){setError(d.error||'Something went wrong. Please try again.');setSending(false);return;}
      setDone(true);setSending(false);
    }catch(e){setError('Network error. Please try again.');setSending(false);}
  }

  return (<React.Fragment>
    <button className="pf-fab" onClick={()=>setOpen(true)}>
      <span className="pf-spark">{'\u2728'}</span> Find Programs for Me
    </button>
    {open && (
      <div className="pf-overlay" onClick={e=>{if(e.target===e.currentTarget)reset();}}>
        <div className="pf-modal" style={{position:'relative'}}>
          <button className="pf-close" onClick={reset}>{'\u00D7'}</button>
          {done ? (
            <div className="pf-success">
              <div className="pf-check">{'\u2709\uFE0F'}</div>
              <h3>Check Your Inbox!</h3>
              <p>We've sent a personalized list of program recommendations to <strong>{email}</strong>. It should arrive within a minute or two.</p>
              <button className="pf-submit" style={{marginTop:20,maxWidth:200}} onClick={reset}>Done</button>
            </div>
          ) : (
            <React.Fragment>
              <div className="pf-head">
                <h2>{'\u2728'} Find Your Perfect Program</h2>
                <p>Tell us what you're looking for and we'll email you a personalized list of programs that match your interests!</p>
              </div>
              <div className="pf-body">
                <label className="pf-label">What are you looking for?</label>
                <textarea className="pf-textarea" value={desc} onChange={e=>setDesc(e.target.value)}
                  placeholder="e.g. &quot;After-school activities for my 7-year-old who loves sports&quot; or &quot;Evening yoga classes for beginners&quot; or &quot;Weekend art programs for teens&quot;"
                  maxLength={1000} disabled={sending}/>
                <div className="pf-hint">{desc.length}/1000</div>
                <input className="pf-input" type="email" value={email} onChange={e=>setEmail(e.target.value)}
                  placeholder="Your email address" disabled={sending}/>
                {error && <div className="pf-error">{error}</div>}
                <button className="pf-submit" onClick={submit} disabled={sending}>
                  {sending ? <React.Fragment><span className="pf-spinner"></span>Finding your perfect programs&hellip;</React.Fragment> : 'Send My Recommendations'}
                </button>
                <div className="pf-hint" style={{textAlign:'center',marginTop:8}}>We'll only use your email to send this one list. No spam, ever.</div>
              </div>
            </React.Fragment>
          )}
        </div>
      </div>
    )}
  </React.Fragment>);
}

function App(){
  const c=ctx();
  const [weekStart,setWeekStart]=useState(()=>{
    const w=new URLSearchParams(window.location.search).get('week');
    const d=w?new Date(w+'T00:00:00'):new Date();
    return startOfWeek(isNaN(d)?new Date():d);
  });
  const [view,setView]=useState('week');
  const [monthDate,setMonthDate]=useState(()=>new Date());
  const goMonth=useCallback((offset)=>{
    setMonthDate(d=>{const n=new Date(d);n.setMonth(n.getMonth()+offset);return n;});
  },[]);
  const [selectedDate,setSelectedDate]=useState(()=>fmtISO(new Date()));
  const [rows,setRows]=useState([]);
  const [src,setSrc]=useState('');
  const [fetchError,setFetchError]=useState('');
  const [loading,setLoading]=useState(true);
  const [popoverEv,setPopoverEv]=useState(null);
  // Read initial filter from URL params
  const urlParams=useMemo(()=>new URLSearchParams(window.location.search),[]);
  const [actFilter,setActFilter]=useState(()=>urlParams.get('activity')||'');
  const [locFilter,setLocFilter]=useState(()=>urlParams.get('location')||'');
  const [availFilter,setAvailFilter]=useState(()=>urlParams.get('avail')||'');
  // All-time filter options (populated from a wide fetch)
  const [allActivities,setAllActivities]=useState([]);
  const [wizOpen,setWizOpen]=useState(false);
  const [wizStep,setWizStep]=useState(0);
  const [wizAct,setWizAct]=useState('');
  const [ageFilter,setAgeFilter]=useState('');
  const [gradeFilter,setGradeFilter]=useState('');
  const [wizApplied,setWizApplied]=useState(false);
  const [wizScrollIdx,setWizScrollIdx]=useState(0);

  function wizApply(act,loc,age,grade){
    if(act)setActFilter(act);
    if(loc)setLocFilter(loc);
    if(age)setAgeFilter(age);
    if(grade)setGradeFilter(grade);
    setWizApplied(true);setWizOpen(false);
  }
  function wizReset(){
    setActFilter('');setLocFilter('');setAvailFilter('');setAgeFilter('');setGradeFilter('');
    setWizApplied(false);setWizOpen(false);setWizStep(0);setWizAct('');
    setWeekStart(startOfWeek(new Date()));setView('week');
  }
  function wizGoWeek(d){setWeekStart(startOfWeek(d));setView('week');}
  var wizToday=new Date();
  var wizTomorrow=new Date();wizTomorrow.setDate(wizToday.getDate()+1);
  function wizNextDow(dow){var d=new Date();var diff=(dow-d.getDay()+7)%7;if(diff===0)diff=7;d.setDate(d.getDate()+diff);return d;}
  var wizDateOpts=[
    {label:'This Week',fn:()=>wizGoWeek(wizToday)},
    {label:'This Weekend',fn:()=>{var sat=wizNextDow(6);setWeekStart(startOfWeek(sat));setView('week');}},
    {label:'Next Week',fn:()=>{var d=new Date();d.setDate(d.getDate()+7);wizGoWeek(d);}},
  ];
  const [allLocations,setAllLocations]=useState([]);
  // Present mode
  const isPresent=urlParams.get('present')==='1';
  const scrollRef=useRef(null);
  const pauseRef=useRef(false);

  const load=useCallback(async(ws)=>{
    setLoading(true);
    const from=fmtISO(ws), to=fmtISO(addDays(ws,6));
    const {rows,src,error}=await fetchData(from,to);
    setRows(rows.map(normalizeRow).filter(e=>!isHiddenActivity(e))); setSrc(src); setFetchError(error||''); setLoading(false);
  },[]);

  // One-time wide fetch to populate all filter options (today → +60 days)
  useEffect(()=>{
    (async()=>{
      const from=fmtISO(new Date());
      const to=fmtISO(addDays(new Date(),60));
      const {rows:wideRows}=await fetchData(from,to);
      const norm=wideRows.map(normalizeRow).filter(e=>!isHiddenActivity(e));
      setAllActivities([...new Set(norm.flatMap(e=>(e.activity||'').split(',').map(a=>a.trim())).filter(Boolean))].sort());
      setAllLocations([...new Set(norm.map(e=>e.location).filter(Boolean))].sort());
    })();
  },[]);

  useEffect(()=>{ if(c.print) document.body.classList.add('print-mode'); },[]);
  useEffect(()=>{
    if(view==='month'){
      const first=new Date(monthDate.getFullYear(),monthDate.getMonth(),1);
      const last=new Date(monthDate.getFullYear(),monthDate.getMonth()+1,0);
      (async()=>{
        setLoading(true);
        const {rows:r,src:s,error}=await fetchData(fmtISO(first),fmtISO(last));
        setRows(r.map(normalizeRow).filter(e=>!isHiddenActivity(e)));
        setSrc(s); setFetchError(error||''); setLoading(false);
      })();
    } else {
      load(weekStart);
    }
  },[weekStart,monthDate,view,load]);

  // Sync filter state → URL so the address bar is always a shareable link
  useEffect(()=>{
    const u=new URL(window.location.href);
    if(actFilter) u.searchParams.set('activity',actFilter); else u.searchParams.delete('activity');
    if(locFilter) u.searchParams.set('location',locFilter); else u.searchParams.delete('location');
    if(availFilter) u.searchParams.set('avail',availFilter); else u.searchParams.delete('avail');
    u.searchParams.set('week',fmtISO(weekStart));
    window.history.replaceState(null,'',u.toString());
  },[actFilter,locFilter,availFilter,weekStart]);

  // Present mode: force list view, add body class, auto-scroll, auto-refresh
  useEffect(()=>{
    if(!isPresent) return;
    document.body.classList.add('present-mode');
    // Force list view
    setView('list');
    // Auto-refresh data every 5 minutes
    const refreshId=setInterval(()=>{ load(weekStart); },5*60*1000);
    // Auto-scroll
    const SPEED=0.6; // px per frame
    const PAUSE_AT_BOTTOM=4000; // ms pause at bottom before looping
    const PAUSE_AT_TOP=2000; // ms pause at top after reset
    let rafId;
    let paused=false;
    const tick=()=>{
      if(!paused){
        const maxScroll=document.documentElement.scrollHeight-window.innerHeight;
        if(window.scrollY>=maxScroll-2){
          // Reached bottom — pause then reset
          paused=true;
          setTimeout(()=>{
            window.scrollTo({top:0,behavior:'auto'});
            setTimeout(()=>{ paused=false; },PAUSE_AT_TOP);
          },PAUSE_AT_BOTTOM);
        } else {
          window.scrollBy(0,SPEED);
        }
      }
      rafId=requestAnimationFrame(tick);
    };
    // Start scrolling after a brief delay for content to render
    const startId=setTimeout(()=>{ rafId=requestAnimationFrame(tick); },2000);
    // Esc key exits present mode
    const onKey=(e)=>{ if(e.key==='Escape'){const u=new URL(window.location.href);u.searchParams.delete('present');window.location.href=u.toString();}};
    window.addEventListener('keydown',onKey);
    return ()=>{
      clearInterval(refreshId);
      clearTimeout(startId);
      if(rafId) cancelAnimationFrame(rafId);
      window.removeEventListener('keydown',onKey);
      document.body.classList.remove('present-mode');
    };
  },[isPresent,weekStart]);

  const goToDay=(dateISO)=>{ setSelectedDate(dateISO); setView('day'); };
  const goDay=(offset)=>{
    const next=addDays(new Date(selectedDate+'T00:00:00'),offset);
    const nextISO=fmtISO(next);
    // if navigating outside current week, shift week too
    const ws=startOfWeek(next);
    if(fmtISO(ws)!==fmtISO(weekStart)) setWeekStart(ws);
    setSelectedDate(nextISO);
  };

  const ws=weekStart, we=addDays(weekStart,6);
  const orgName=rows.length?rows[0].orgName:'';
  const rangeLabel=view==='month'
    ? MONTH_NAMES[monthDate.getMonth()]+' '+monthDate.getFullYear()
    : view==='day'
    ? (()=>{const dt=new Date(selectedDate+'T00:00:00'); return DOWL[dt.getDay()]+', '+MON[dt.getMonth()]+' '+dt.getDate()+', '+dt.getFullYear();})()
    : MON[ws.getMonth()]+' '+ws.getDate()+' – '+MON[we.getMonth()]+' '+we.getDate()+', '+we.getFullYear();
  // Use wide-range options for dropdowns, fall back to current week if wide hasn't loaded yet
  const activities=allActivities.length>0?allActivities:[...new Set(rows.flatMap(e=>(e.activity||'').split(',').map(a=>a.trim())).filter(Boolean))].sort();
  const _actLen=activities?activities.length:0;
  useEffect(()=>{
    if(wizOpen||wizApplied||!_actLen) return;
    setWizScrollIdx(0);
    const iv=setInterval(()=>setWizScrollIdx(i=>(i+1)%_actLen),2500);
    return ()=>clearInterval(iv);
  },[wizOpen,wizApplied,_actLen]);
  const eligData=useMemo(()=>{
    var ageBuckets=new Map(),gradeSet=new Set();
    rows.forEach(function(e){
      var p=parseEligibility(e.eligibility);
      if(p.minAge!==null){
        var label=p.maxAge>=199?p.minAge+'+':p.minAge+'-'+p.maxAge;
        ageBuckets.set(label,{min:p.minAge,max:p.maxAge});
      }
      p.grades.forEach(function(g){gradeSet.add(g);});
    });
    var ages=[...ageBuckets.entries()].sort(function(a,b){return a[1].min-b[1].min;});
    var grades=GRADE_ORDER.filter(function(g){return gradeSet.has(g);});
    return {ages:ages,grades:grades};
  },[rows]);
  const locations=allLocations.length>0?allLocations:[...new Set(rows.map(e=>e.location).filter(Boolean))].sort();
  const filtered=useMemo(()=>rows.filter(function(e){
    if(actFilter&&!(e.activity||'').split(',').some(a=>a.trim()===actFilter)) return false;
    if(locFilter&&e.location!==locFilter) return false;
    if(availFilter==='open'&&(e.full||e.closed)) return false;
    if(availFilter==='waitlist'&&!e.waitlist) return false;
    if(availFilter==='closed'&&!e.closed) return false;
    if(ageFilter){
      var p=parseEligibility(e.eligibility);
      var fa=parseInt(ageFilter);
      if(p.minAge===null) return false;
      if(fa<p.minAge||fa>p.maxAge) return false;
    }
    if(gradeFilter){
      var p2=parseEligibility(e.eligibility);
      if(!p2.grades.length) return false;
      if(p2.grades.indexOf(gradeFilter)<0) return false;
    }
    return true;
  }),[rows,actFilter,locFilter,availFilter,ageFilter,gradeFilter]);

  return (
    <div className="wrap">
      <div className="toolbar">
        <div className="seg">
          <button className={view==='week'?'on':''} onClick={()=>setView('week')}>Week</button>
          <button className={view==='month'?'on':''} onClick={()=>setView('month')}>Month</button>
          <button className={view==='day'?'on':''} onClick={()=>{setView('day')}}>Day</button>
          <button className={view==='list'?'on':''} onClick={()=>setView('list')}>List</button>
        </div>
        {view==='month' ? (
          <React.Fragment>
            <button onClick={()=>{const t=new Date();setSelectedDate(fmtISO(t));setWeekStart(startOfWeek(t));setView('day');}}>Today</button>
            <button onClick={()=>setMonthDate(new Date())}>This Month</button>
          </React.Fragment>
        ) : view==='day' ? (
          <React.Fragment>
            <button onClick={()=>{const t=new Date();setSelectedDate(fmtISO(t));const ws2=startOfWeek(t);if(fmtISO(ws2)!==fmtISO(weekStart))setWeekStart(ws2);}}>Today</button>
            <button onClick={()=>goDay(-1)}>‹ Prev</button>
            <button onClick={()=>goDay(1)}>Next ›</button>
          </React.Fragment>
        ) : (
          <React.Fragment>
            <button onClick={()=>{const t=new Date();setSelectedDate(fmtISO(t));setWeekStart(startOfWeek(t));setView('day');}}>Today</button>
            <button onClick={()=>setWeekStart(startOfWeek(new Date()))}>This Week</button>
            <button onClick={()=>setWeekStart(addDays(weekStart,-7))}>‹ Prev</button>
            <button onClick={()=>setWeekStart(addDays(weekStart,7))}>Next ›</button>
          </React.Fragment>
        )}
        <span className="range">{rangeLabel}</span>
        <span className="grow"></span>
        <button onClick={()=>window.print()}>Print</button>
        <button onClick={()=>{const u=new URL(window.location.href);u.searchParams.set('present','1');if(actFilter)u.searchParams.set('activity',actFilter);if(locFilter)u.searchParams.set('location',locFilter);if(availFilter)u.searchParams.set('avail',availFilter);u.searchParams.set('week',fmtISO(weekStart));window.open(u.toString(),'_blank');}}>Present ▶</button>
        <select className="filter-sel" value={actFilter} onChange={e=>setActFilter(e.target.value)}>
          <option value="">All Activities</option>
          {activities.map(a=><option key={a} value={a}>{a}</option>)}
        </select>
        <select className="filter-sel" value={locFilter} onChange={e=>setLocFilter(e.target.value)}>
          <option value="">All Locations</option>
          {locations.map(l=><option key={l} value={l}>{l}</option>)}
        </select>
        <select className="filter-sel" value={availFilter} onChange={e=>setAvailFilter(e.target.value)}>
          <option value="">All Availability</option>
          <option value="open">Open for Registration</option>
          <option value="waitlist">Waitlist Available</option>
          <option value="closed">Registration Closed</option>
        </select>
        <select className="filter-sel" value={ageFilter} onChange={e=>{setAgeFilter(e.target.value);setGradeFilter('');}}>
          <option value="">All Ages</option>
          <option value="4">Preschool (3-5)</option>
          <option value="8">Elementary (6-10)</option>
          <option value="12">Middle School (11-13)</option>
          <option value="16">High School (14-18)</option>
          <option value="21">Adult (18+)</option>
        </select>
        <select className="filter-sel" value={gradeFilter} onChange={e=>{setGradeFilter(e.target.value);setAgeFilter('');}}>
          <option value="">All Grades</option>
          {eligData&&eligData.grades?eligData.grades.map(g=><option key={g} value={g}>{gradeLabel(g)}</option>):null}
        </select>
        {(actFilter||locFilter||availFilter||ageFilter||gradeFilter)&&<span className="filter-clear" onClick={()=>{setActFilter('');setLocFilter('');setAvailFilter('');setAgeFilter('');setGradeFilter('');}}>✕ Clear</span>}
      </div>

      {/* Find a Program Wizard */}
      {!isPresent && !wizOpen && !wizApplied && activities && activities.length>0 && (
        <div className="pgwiz-bar" onClick={()=>{setWizOpen(true);setWizStep(0);setWizAct('');}}>
          <span style={{marginRight:6}}>{String.fromCodePoint(10024)}</span>
          Find a Program
          <span style={{marginLeft:6,color:'#4f46e5',fontWeight:700}}>{activities&&activities.length>0?<span key={wizScrollIdx} style={{display:'inline-block',animation:'pgwizFade .4s ease'}}>{activities[wizScrollIdx%activities.length]}</span>:''}</span>
        </div>
      )}
      {wizApplied && (
        <div className="pgwiz-result">
          <span>{String.fromCodePoint(10024)}</span>
          <span>Showing: {ageFilter?<span><strong>{ageFilter} yrs</strong> {String.fromCodePoint(183)} </span>:gradeFilter?<span><strong>{gradeLabel(gradeFilter)}</strong> {String.fromCodePoint(183)} </span>:''}<strong>{actFilter||'All Activities'}</strong>{locFilter?<span> at <strong>{locFilter}</strong></span>:''} {String.fromCodePoint(8212)} {filtered.length} session{filtered.length!==1?'s':''}</span>
          <button className="pgwiz-pill" style={{marginLeft:8,fontSize:11,padding:'4px 12px'}} onClick={()=>{wizReset();setWizOpen(true);}}>
            {String.fromCodePoint(8635)} Start Over
          </button>
          <button className="pgwiz-result-x" onClick={wizReset} title="Clear filter">{String.fromCodePoint(10005)}</button>
        </div>
      )}
      {wizOpen && (
        <div className="pgwiz-wrap">
          <div className="pgwiz-head">
            <span>{String.fromCodePoint(10024)} Find a Program</span>
            <button className="pgwiz-x" onClick={()=>setWizOpen(false)}>{String.fromCodePoint(10005)}</button>
          </div>
          {wizStep===0 && (
            <div className="pgwiz-step">
              <div className="pgwiz-q">When are you looking?</div>
              <div className="pgwiz-opts">
                {wizDateOpts.map(o=>(
                  <button key={o.label} className="pgwiz-pill" onClick={()=>{o.fn();setWizStep(1);}}>{o.label}</button>
                ))}
                <button className="pgwiz-pill" onClick={()=>setWizStep(1)} style={{borderStyle:'dashed',color:'#6b7280'}}>Any time</button>
              </div>
            </div>
          )}
          {wizStep===1 && (
            <div className="pgwiz-step">
              <div className="pgwiz-crumb">
                <span className="pgwiz-crumb-link" onClick={()=>setWizStep(0)}>{String.fromCodePoint(128197)} When {String.fromCodePoint(9999)}</span>
              </div>
              <div className="pgwiz-q">Who is it for?</div>
              <div className="pgwiz-opts">
                <button className="pgwiz-pill pgwiz-go" onClick={()=>setWizStep(2)}>Anyone / All Ages</button>
                <button className="pgwiz-pill" onClick={()=>{setAgeFilter('4');setWizStep(2);}}>Preschool (3-5)</button>
                <button className="pgwiz-pill" onClick={()=>{setAgeFilter('8');setWizStep(2);}}>Elementary (6-10)</button>
                <button className="pgwiz-pill" onClick={()=>{setAgeFilter('12');setWizStep(2);}}>Middle School (11-13)</button>
                <button className="pgwiz-pill" onClick={()=>{setAgeFilter('16');setWizStep(2);}}>High School (14-18)</button>
                <button className="pgwiz-pill" onClick={()=>{setAgeFilter('21');setWizStep(2);}}>Adult (18+)</button>
              </div>
              {eligData && eligData.grades && eligData.grades.length>0 && (
                <div style={{marginTop:10}}>
                  <div style={{fontSize:12,color:'#6b7280',marginBottom:6}}>Or pick a specific grade:</div>
                  <div className="pgwiz-opts">
                    {eligData.grades.map(g=>(
                      <button key={g} className="pgwiz-pill" onClick={()=>{setGradeFilter(g);setWizStep(2);}} style={{padding:'6px 12px',fontSize:12}}>{gradeLabel(g)}</button>
                    ))}
                  </div>
                </div>
              )}
              <button className="pgwiz-back" onClick={()=>setWizStep(0)}>{String.fromCodePoint(8592)} Back</button>
            </div>
          )}
          {wizStep===2 && (
            <div className="pgwiz-step">
              <div className="pgwiz-crumb">
                <span className="pgwiz-crumb-link" onClick={()=>setWizStep(0)}>{String.fromCodePoint(128197)} When {String.fromCodePoint(9999)}</span>
                {' '}{String.fromCodePoint(183)}{' '}
                <span className="pgwiz-crumb-link" onClick={()=>{setWizStep(1);setAgeFilter('');setGradeFilter('');}}>{ageFilter?ageFilter+' yrs':gradeFilter?gradeLabel(gradeFilter):'All ages'} {String.fromCodePoint(9999)}</span>
              </div>
              <div className="pgwiz-q">What type of activity?</div>
              <div className="pgwiz-opts">
                <button className="pgwiz-pill pgwiz-go" onClick={()=>{wizApply('','',ageFilter,gradeFilter);}}>Show All</button>
                {activities.map(a=>(
                  <button key={a} className="pgwiz-pill" onClick={()=>{setWizAct(a);setWizStep(3);}}>{a}</button>
                ))}
              </div>
              <button className="pgwiz-back" onClick={()=>{setWizStep(1);setAgeFilter('');setGradeFilter('');}}>{String.fromCodePoint(8592)} Back</button>
            </div>
          )}
          {wizStep===3 && (
            <div className="pgwiz-step">
              <div className="pgwiz-crumb">
                <span className="pgwiz-crumb-link" onClick={()=>setWizStep(0)}>{String.fromCodePoint(128197)} When {String.fromCodePoint(9999)}</span>
                {' '}{String.fromCodePoint(183)}{' '}
                <span className="pgwiz-crumb-link" onClick={()=>{setWizStep(1);setAgeFilter('');setGradeFilter('');}}>{ageFilter?ageFilter+' yrs':gradeFilter?gradeLabel(gradeFilter):'All ages'} {String.fromCodePoint(9999)}</span>
                {' '}{String.fromCodePoint(183)}{' '}
                <span className="pgwiz-crumb-link" onClick={()=>{setWizStep(2);setWizAct('');}}>{wizAct} {String.fromCodePoint(9999)}</span>
              </div>
              <div className="pgwiz-q">Any location preference?</div>
              <div className="pgwiz-opts">
                <button className="pgwiz-pill pgwiz-go" onClick={()=>wizApply(wizAct,'',ageFilter,gradeFilter)}>Anywhere</button>
                {locations.map(l=>(
                  <button key={l} className="pgwiz-pill" onClick={()=>wizApply(wizAct,l,ageFilter,gradeFilter)}>{l}</button>
                ))}
              </div>
              <button className="pgwiz-back" onClick={()=>{setWizStep(2);setWizAct('');}}>{String.fromCodePoint(8592)} Back</button>
            </div>
          )}
        </div>
      )}

      <div className="hdr">
        {window.__ORG__ && (
          <div className="org-banner" style={{marginBottom:0,border:'none',boxShadow:'none',padding:'0 2px'}}>
            {window.__ORG__.logoUrl && <img src={window.__ORG__.logoUrl} alt=""/>}
            <div>
              <div className="org-name">{window.__ORG__.displayName}</div>
              <div className="org-sub">Session Schedule</div>
            </div>
          </div>
        )}
        {!window.__ORG__ && <h1>Calendar {orgName && <span className="org">· {orgName}</span>}</h1>}
        <span className="range">{rangeLabel}</span>
      </div>

      {loading ? <div className="empty">Loading…</div>
        : src==='live' && filtered.length===0 ? <div className="empty-week"><div className="empty-week-icon">📅</div><div className="empty-week-msg">No sessions scheduled</div><div className="empty-week-hint">{view==='day' ? 'Try another day or browse the week view.' : view==='week' ? 'Try the next week or check a different date range.' : 'No upcoming sessions found with current filters.'}</div></div>
        : view==='week' ? <WeekView weekStart={weekStart} events={filtered} onEv={setPopoverEv} onDayClick={goToDay}/>
        : view==='month' ? <MonthView events={filtered} monthDate={monthDate} onMonthChange={goMonth} onEv={setPopoverEv}/>
        : view==='day' ? <DayView dateISO={selectedDate} events={filtered} onEv={setPopoverEv}/>
        : <ListView events={filtered} onEv={setPopoverEv}/>}

      <PopoverCard ev={popoverEv} onClose={()=>setPopoverEv(null)}/>
      <ProgramFinder/>
      {src==='sample' && <div className="note">Showing sample data.{fetchError ? ' Reason: '+fetchError+'.' : ''} Check browser console for details. Wire <code>/{'{org}'}/calendar/api/data</code> to go live.</div>}
      {!loading && <div id="report-ready" style={{display:'none'}}>ready</div>}
      {isPresent && <div className="present-status">Auto-refreshes every 5 min · Press Esc to exit</div>}
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
    <script src="/nav-breadcrumb.js" defer></script>
  </body>
</html>
