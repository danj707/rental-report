<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Class Roster</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'IBM Plex Sans', system-ui, sans-serif;
      font-size: 12px;
      color: #1a1a1a;
      background: #f5f4f1;
      line-height: 1.35;
    }

    /* ── Toolbar ── */
    .toolbar {
      position: sticky; top: 0; z-index: 100;
      display: flex; align-items: center; gap: 8px;
      padding: 8px 16px;
      background: #2c2c2c; color: #eee;
      font-size: 12px; flex-wrap: wrap;
    }
    .toolbar-title { font-weight: 700; font-size: 13px; margin-right: 4px; white-space: nowrap; }
    .toolbar-divider { width: 1px; height: 24px; background: rgba(255,255,255,.18); margin: 0 2px; }
    .toolbar-spacer { flex: 1; }

    .toolbar label {
      font-size: 10px; text-transform: uppercase; letter-spacing: 0.5px;
      color: #aaa; display: flex; flex-direction: column; gap: 2px;
    }
    .toolbar input[type="date"],
    .toolbar input[type="text"] {
      padding: 4px 8px; border: 1px solid rgba(255,255,255,.2); border-radius: 4px;
      background: rgba(255,255,255,.1); color: #fff; font-size: 12px; font-family: inherit; outline: none;
    }
    .toolbar input[type="date"]:focus,
    .toolbar input[type="text"]:focus { border-color: #3b82f6; }
    .toolbar input[type="date"]::-webkit-calendar-picker-indicator { filter: invert(1); cursor: pointer; }
    .toolbar input[type="text"]::placeholder { color: #777; }

    .toolbar button {
      padding: 5px 12px; border: 1px solid rgba(255,255,255,.25); border-radius: 4px;
      background: rgba(255,255,255,.08); color: #fff; font-size: 11px; font-family: inherit;
      cursor: pointer; transition: background .15s; white-space: nowrap;
    }
    .toolbar button:hover { background: rgba(255,255,255,.18); }
    .toolbar .btn-run  { background: #16a34a; border-color: #16a34a; font-weight: 600; font-size: 12px; padding: 5px 14px; }
    .toolbar .btn-run:hover { background: #15803d; }
    .toolbar .btn-run:disabled { opacity: .5; cursor: not-allowed; }
    .toolbar .btn-pdf { background: #3b82f6; border-color: #3b82f6; font-weight: 600; }
    .toolbar .btn-pdf:hover { background: #2563eb; }
    .toolbar .btn-pdf:disabled { opacity: .5; cursor: not-allowed; }
    .toolbar .btn-excel { background: #0e7c45; border-color: #0e7c45; }
    .toolbar .btn-excel:hover { background: #0a6236; }
    .toolbar .row-count { font-size: 11px; color: #aaa; }

    /* status filter pills */
    .status-pills { display: flex; gap: 4px; }
    .status-pill {
      padding: 3px 10px; border-radius: 20px; font-size: 10px; font-weight: 600;
      cursor: pointer; border: 1px solid transparent; white-space: nowrap;
      transition: background .12s, border-color .12s;
    }
    .status-pill-all     { background: rgba(255,255,255,.1); color: #ddd; }
    .status-pill-all.active { background: #e5e7eb; color: #111; }
    .status-pill-enrolled { background: rgba(22,163,74,.15); color: #4ade80; border-color: rgba(22,163,74,.3); }
    .status-pill-enrolled.active { background: #16a34a; color: #fff; }
    .status-pill-cancelled { background: rgba(239,68,68,.1); color: #f87171; border-color: rgba(239,68,68,.3); }
    .status-pill-cancelled.active { background: #dc2626; color: #fff; }

    /* col toggle buttons */
    .col-toggle {
      padding: 3px 9px; border-radius: 4px; font-size: 10px; cursor: pointer; white-space: nowrap;
      background: rgba(255,255,255,.07); color: #aaa; border: 1px solid rgba(255,255,255,.15);
      transition: background .12s, color .12s;
    }
    .col-toggle.on { background: rgba(59,130,246,.25); color: #93c5fd; border-color: rgba(59,130,246,.4); }

    /* ── Page ── */
    .page {
      max-width: 1300px; margin: 16px auto; padding: 24px 28px;
      background: #fff; box-shadow: 0 1px 4px rgba(0,0,0,.08);
    }

    /* ── Report header ── */
    .report-header-logo { height: 42px; max-width: 140px; object-fit: contain; object-position: left center; }
    .report-header {
      display: flex; justify-content: space-between; align-items: flex-end;
      border-bottom: 2.5px solid #111; padding-bottom: 8px; margin-bottom: 16px;
    }
    .report-header .org-label { font-size: 10.5px; letter-spacing: 1.6px; text-transform: uppercase; color: #777; font-weight: 600; }
    .report-header .title { font-size: 17px; font-weight: 700; margin-top: 1px; }
    .report-header .date-range { font-size: 11px; color: #666; text-align: right; }

    /* ── Section group ── */
    .section-group { margin-bottom: 20px; }

    .section-hdr {
      display: flex; align-items: baseline; gap: 10px; justify-content: space-between;
      padding: 7px 8px;
      background: #2c2c2c; color: #fff;
      border-radius: 4px 4px 0 0;
    }
    .section-hdr-left { display: flex; align-items: baseline; gap: 10px; }
    .section-hdr .sec-name { font-weight: 700; font-size: 13px; }
    .section-hdr .class-name { font-size: 11px; color: #aaa; }
    .section-hdr .sec-counts { font-size: 10px; color: #aaa; display: flex; gap: 8px; }
    .sec-counts .cnt-enrolled  { color: #4ade80; }
    .sec-counts .cnt-cancelled { color: #f87171; }

    /* ── Session sub-header ── */
    .session-hdr {
      display: flex; align-items: center; gap: 8px;
      padding: 5px 8px 4px;
      background: #edeae4;
      border-bottom: 1px solid #ccc;
      font-weight: 600; font-size: 11px; color: #555;
    }
    .session-hdr .sess-date { font-size: 12px; font-weight: 700; color: #222; }
    .session-hdr .sess-time { color: #777; }
    .session-hdr .sess-count { margin-left: auto; font-size: 10px; color: #999; }

    /* ── Column header row ── */
    .col-header-row {
      display: flex; gap: 4px; padding: 4px 8px;
      background: #e8e5df;
      border-bottom: 1px solid #ccc;
      font-weight: 700; font-size: 10px; text-transform: uppercase;
      letter-spacing: 0.4px; color: #555;
    }

    /* ── Data row ── */
    .data-row {
      display: flex; gap: 4px; padding: 4px 8px;
      border-bottom: 1px solid #f0ede8;
      align-items: center; font-size: 11.5px;
    }
    .data-row:nth-child(even) { background: #fafaf8; }
    .data-row.is-cancelled { opacity: .65; }

    .cell { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

    .status-badge {
      display: inline-block; padding: 1px 7px; border-radius: 10px;
      font-size: 10px; font-weight: 600; white-space: nowrap;
    }
    .status-enrolled  { background: #dcfce7; color: #166534; }
    .status-cancelled { background: #fee2e2; color: #991b1b; }

    /* ── Form responses sub-row ── */
    .form-responses-row {
      padding: 6px 8px 8px 8px;
      border-bottom: 1px solid #e8e4de;
      background: #f0f4ff;
      font-size: 10.5px;
    }
    .form-responses-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 4px 16px;
    }
    .form-qa-pair { display: flex; flex-direction: column; gap: 1px; }
    .form-q { color: #555; font-size: 10px; font-weight: 600; }
    .form-a { color: #111; font-size: 11px; }

    /* ── Column widths ── */
    .col-fname     { width: 110px; font-weight: 500; }
    .col-lname     { width: 110px; font-weight: 500; }
    .col-recid     { width: 72px; font-family: 'IBM Plex Mono', monospace; font-size: 10.5px; }
    .col-dob       { width: 82px; }
    .col-age       { width: 36px; text-align: center; }
    .col-grade     { width: 50px; text-align: center; }
    .col-gender    { width: 56px; }
    .col-phone     { width: 108px; }
    .col-email     { width: 160px; font-size: 10.5px; }
    .col-owner     { width: 130px; }
    .col-ownerph   { width: 108px; }
    .col-ownerem   { width: 155px; font-size: 10.5px; }
    .col-times     { width: 138px; }
    .col-status    { width: 76px; }
    .col-reg       { width: 82px; }

    /* ── Footer ── */
    .report-footer {
      display: flex; justify-content: space-between;
      border-top: 2.5px solid #111; margin-top: 14px; padding-top: 6px;
      font-size: 10px; color: #777;
    }

    /* ── Loading / Error ── */
    .loading { text-align: center; padding: 80px 20px; color: #888; font-size: 14px; }
    .loading .spinner {
      display: inline-block; width: 28px; height: 28px;
      border: 3px solid #ddd; border-top-color: #3b82f6;
      border-radius: 50%; animation: spin .7s linear infinite; margin-bottom: 12px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .error { text-align: center; padding: 60px 20px; color: #b91c1c; font-size: 14px; }

    /* ── Print ── */
    @media print {
      body { background: #fff; }
      .toolbar { display: none !important; }
      .page { box-shadow: none; margin: 0; padding: 12px 16px; max-width: 100%; }
    }
    body.print-mode .toolbar { display: none !important; }
    body.print-mode { background: #fff; }
    body.print-mode .page { box-shadow: none; margin: 0; padding: 12px 16px; max-width: 100%; }
  </style>
</head>
<body>
<div id="root"></div>
<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>

<script type="text/babel">
const { useState, useEffect, useMemo, useCallback } = React;

const LS_COLS = 'roster_cols_v2';

const COL_DEFAULTS = {
  recId: false, dob: false, age: true, grade: true, gender: false,
  contact: true, owner: true, ownerContact: false,
  times: true, registered: false, responses: false,
};

function loadCols() {
  try { return { ...COL_DEFAULTS, ...JSON.parse(localStorage.getItem(LS_COLS) || '{}') }; }
  catch { return COL_DEFAULTS; }
}
function saveCols(v) { try { localStorage.setItem(LS_COLS, JSON.stringify(v)); } catch {} }

function toISO(d) {
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function getCurrentMonthRange() {
  const now = new Date();
  return { start: toISO(new Date(now.getFullYear(), now.getMonth(), 1)),
           end:   toISO(new Date(now.getFullYear(), now.getMonth()+1, 0)) };
}
function formatDisplayDate(iso) {
  if (!iso) return '';
  const d = new Date(iso + 'T12:00:00');
  const months = ['January','February','March','April','May','June',
                  'July','August','September','October','November','December'];
  return `${months[d.getMonth()]} ${d.getDate()}, ${d.getFullYear()}`;
}
function formatPhone(p) {
  if (!p) return '';
  const d = p.replace(/\D/g, '');
  if (d.length === 10) return `(${d.slice(0,3)})${d.slice(3,6)}-${d.slice(6)}`;
  if (d.length === 11 && d[0] === '1') return `(${d.slice(1,4)})${d.slice(4,7)}-${d.slice(7)}`;
  return p;
}
function formatDOB(dob) {
  if (!dob) return '';
  if (/^\d{4}-\d{2}-\d{2}/.test(dob)) {
    const [y, mo, d] = dob.substring(0,10).split('-');
    return `${mo}/${d}/${y}`;
  }
  return dob;
}

function normalizeRow(raw) {
  // Decode form responses from form_submission schema + submission
  const formResponses = (() => {
    try {
      const fd = typeof raw['Form Responses'] === 'string'
        ? JSON.parse(raw['Form Responses'])
        : raw['Form Responses'];
      if (!fd || !fd.schema || !fd.submission) return null;
      return fd.schema
        .filter(el => el.name && el.title)
        .map(el => {
          const rawAns = fd.submission[el.name];
          let answer = '';
          if (Array.isArray(rawAns)) {
            const choiceMap = {};
            (el.choices || []).forEach(c => { choiceMap[c.value] = c.text; });
            answer = rawAns.map(v => choiceMap[v] || v).join(', ');
          } else if (rawAns !== null && rawAns !== undefined) {
            answer = String(rawAns);
          }
          return { q: el.title, a: answer };
        })
        .filter(qa => qa.a !== '');
    } catch { return null; }
  })();

  return {
    recId:        raw['Rec ID']          || '',
    firstName:    raw['First Name']      || '',
    lastName:     raw['Last Name']       || '',
    dob:          raw['Date of Birth']   || '',
    age:          raw['Age'] != null ? raw['Age'] : '',
    grade:        raw['Grade']           || '',
    gender:       raw['Gender']          || '',
    phone:        raw['Phone']           || '',
    email:        raw['Email']           || '',
    owner:        raw['Household Owner'] || '',
    ownerEmail:   raw['Owner Email']     || '',
    ownerPhone:   raw['Owner Phone']     || '',
    className:    raw['Class']           || '',
    section:      raw['Section']         || '',
    sessionDate:  raw['Session Date']    || '',
    sessionStart: raw['Session Start']   || '',
    sessionEnd:   raw['Session End']     || '',
    status:       raw['Status']          || 'Enrolled',
    registered:   raw['Registered']      || '',
    formResponses,
  };
}

// ── App ──────────────────────────────────────────────────────────────────────
function App() {
  const p = useMemo(() => new URLSearchParams(window.location.search), []);
  const isPrint = p.get('_print') === '1';

  const defaults = useMemo(() => getCurrentMonthRange(), []);
  const [startDate, setStartDate] = useState(p.get('start_date') || defaults.start);
  const [endDate, setEndDate]     = useState(p.get('end_date')   || defaults.end);
  const [sectionFilter, setSectionFilter] = useState(p.get('section_name') || '');
  const [statusFilter, setStatusFilter]   = useState('all');

  const [rows, setRows]       = useState(null);
  const [orgName, setOrgName] = useState('');
  const [logoUrl,  setLogoUrl]  = useState(null);
  const [pdfLoading, setPdfLoading] = useState(false);
  const [loading, setLoading] = useState(false);
  const [error, setError]     = useState(null);
  const [loadedStart, setLoadedStart]     = useState(null);
  const [loadedEnd, setLoadedEnd]         = useState(null);
  const [loadedSection, setLoadedSection] = useState(null);

  const [cols, setCols] = useState(loadCols);
  const toggleCol = useCallback(key => {
    setCols(prev => { const next = { ...prev, [key]: !prev[key] }; saveCols(next); return next; });
  }, []);

  const orgSlug = useMemo(() => window.location.pathname.split('/').filter(Boolean)[0] || '', []);

  useEffect(() => { if (isPrint) document.body.classList.add('print-mode'); }, [isPrint]);

  const fetchData = useCallback((sd, ed, sec) => {
    setLoading(true); setError(null);
    const qs = new URLSearchParams();
    if (sd) qs.set('start_date', sd);
    if (ed) qs.set('end_date', ed);
    if (sec && sec.trim()) qs.set('section_name', sec.trim());

    fetch(`/${orgSlug}/roster/api/data?${qs}`)
      .then(r => { if (!r.ok) throw new Error(`Server returned ${r.status}`); return r.json(); })
      .then(json => {
        setRows(json.rows.map(normalizeRow));
        if (json.rows.length > 0 && json.rows[0]['Org Name']) setOrgName(json.rows[0]['Org Name']);
        setLogoUrl(json.meta?.logo_url || null);
        setLoadedStart(sd); setLoadedEnd(ed); setLoadedSection(sec || '');
      })
      .catch(err => setError(err.message))
      .finally(() => setLoading(false));
  }, [orgSlug]);

  useEffect(() => { fetchData(startDate, endDate, sectionFilter); }, []);

  function handleRun() { fetchData(startDate, endDate, sectionFilter); }

  function setMonth(offset) {
    const now = new Date();
    const target = new Date(now.getFullYear(), now.getMonth() + offset, 1);
    const last   = new Date(target.getFullYear(), target.getMonth() + 1, 0);
    setStartDate(toISO(target)); setEndDate(toISO(last));
  }

  const paramsChanged = loadedSection !== null && (
    startDate !== loadedStart || endDate !== loadedEnd
  );

  const sectionFilteredRows = useMemo(() => {
    if (!rows) return [];
    const secLower = sectionFilter.trim().toLowerCase();
    return !secLower ? rows : rows.filter(r => r.section.toLowerCase().includes(secLower));
  }, [rows, sectionFilter]);

  const counts = useMemo(() => ({
    all:       sectionFilteredRows.length,
    enrolled:  sectionFilteredRows.filter(r => r.status === 'Enrolled').length,
    cancelled: sectionFilteredRows.filter(r => r.status === 'Cancelled').length,
  }), [sectionFilteredRows]);

  const displayRows = useMemo(() => {
    if (!rows) return [];
    const secLower = sectionFilter.trim().toLowerCase();
    return rows.filter(r => {
      const statusOk =
        statusFilter === 'all' ||
        (statusFilter === 'enrolled'  && r.status === 'Enrolled') ||
        (statusFilter === 'cancelled' && r.status === 'Cancelled');
      const sectionOk = !secLower || r.section.toLowerCase().includes(secLower);
      return statusOk && sectionOk;
    });
  }, [rows, statusFilter, sectionFilter]);

  const grouped = useMemo(() => {
    const bySec = {};
    displayRows.forEach(r => {
      if (!bySec[r.section]) bySec[r.section] = { className: r.className, sessions: {} };
      const dk = r.sessionDate || '(No Date)';
      if (!bySec[r.section].sessions[dk])
        bySec[r.section].sessions[dk] = { start: r.sessionStart, end: r.sessionEnd, rows: [] };
      bySec[r.section].sessions[dk].rows.push(r);
    });
    Object.values(bySec).forEach(sec =>
      Object.values(sec.sessions).forEach(sess =>
        sess.rows.sort((a, b) => (a.lastName + a.firstName).localeCompare(b.lastName + b.firstName))
      )
    );
    return bySec;
  }, [displayRows]);

  const sortedSections = useMemo(() => Object.keys(grouped).sort(), [grouped]);

  // Fire-and-forget log to server for client-side events (excel, print)
  function logClientEvent(event) {
    try {
      const parts = window.location.pathname.split('/').filter(Boolean);
      if (parts.length >= 2) fetch(`/${parts[0]}/${parts[1]}/api/log?event=${event}`, { method: 'POST' }).catch(() => {});
    } catch {}
  }

  // ── Excel export ──
  function exportExcel() {
    if (!rows || !rows.length) return;
    const headers = [
      'Section', 'Class', 'Session Date',
      ...(cols.times    ? ['Start', 'End'] : []),
      'Last Name', 'First Name',
      ...(cols.recId    ? ['Rec ID'] : []),
      ...(cols.dob      ? ['DOB'] : []),
      ...(cols.age      ? ['Age'] : []),
      ...(cols.grade    ? ['Grade'] : []),
      ...(cols.gender   ? ['Gender'] : []),
      ...(cols.contact  ? ['Phone', 'Email'] : []),
      ...(cols.owner    ? ['Household Owner'] : []),
      ...(cols.ownerContact ? ['Owner Phone', 'Owner Email'] : []),
      'Status',
      ...(cols.registered ? ['Registered'] : []),
    ];
    const dataRows = displayRows.map(r => [
      r.section, r.className, r.sessionDate,
      ...(cols.times    ? [r.sessionStart, r.sessionEnd] : []),
      r.lastName, r.firstName,
      ...(cols.recId    ? [r.recId] : []),
      ...(cols.dob      ? [formatDOB(r.dob)] : []),
      ...(cols.age      ? [r.age] : []),
      ...(cols.grade    ? [r.grade] : []),
      ...(cols.gender   ? [r.gender] : []),
      ...(cols.contact  ? [formatPhone(r.phone), r.email] : []),
      ...(cols.owner    ? [r.owner] : []),
      ...(cols.ownerContact ? [formatPhone(r.ownerPhone), r.ownerEmail] : []),
      r.status,
      ...(cols.registered ? [r.registered] : []),
    ]);
    const ws = XLSX.utils.aoa_to_sheet([headers, ...dataRows]);
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, 'Roster');
    XLSX.writeFile(wb, `class-roster-${loadedStart || 'report'}.xlsx`);
    logClientEvent('excel');
  }

  function ColToggle({ k, label }) {
    return <button className={`col-toggle${cols[k] ? ' on' : ''}`} onClick={() => toggleCol(k)}>{label}</button>;
  }

  const now = new Date();
  const runDate = `${(now.getMonth()+1).toString().padStart(2,'0')}/${now.getDate().toString().padStart(2,'0')}/${now.getFullYear()} @ ${now.toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit',hour12:true}).toLowerCase()}`;
  const dateRangeLabel = [loadedStart && formatDisplayDate(loadedStart), loadedEnd && formatDisplayDate(loadedEnd)].filter(Boolean).join(' – ') || 'Current Month';

  function downloadPdf() {
    setPdfLoading(true);
    const parts = window.location.pathname.split('/').filter(Boolean);
    const pdfUrl = parts.length >= 2
      ? `/${parts[0]}/${parts[1]}/api/pdf?${new URLSearchParams({start_date: loadedStart||'', end_date: loadedEnd||''})}`
      : '/api/pdf';
    fetch(pdfUrl)
      .then(r => r.blob())
      .then(blob => {
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = `report-${loadedStart || 'export'}.pdf`;
        a.click(); URL.revokeObjectURL(a.href);
      })
      .catch(err => alert('PDF generation failed: ' + err.message))
      .finally(() => setPdfLoading(false));
  }

  function renderToolbar() {
    if (isPrint) return null;
    return (
      <div className="toolbar">
        <span className="toolbar-title">Class Roster</span>
        <div className="toolbar-divider" />

        <label>
          Section
          <input type="text" value={sectionFilter} onChange={e => setSectionFilter(e.target.value)}
            placeholder="Filter sections…" style={{width:160}} onKeyDown={e => e.key === 'Enter' && handleRun()} />
        </label>

        <label>Start<input type="date" value={startDate} onChange={e => setStartDate(e.target.value)} /></label>
        <label>End<input type="date" value={endDate} onChange={e => setEndDate(e.target.value)} /></label>
        <button onClick={() => setMonth(-1)} style={{fontSize:10,padding:'3px 7px'}}>Last Mo.</button>
        <button onClick={() => setMonth(0)}  style={{fontSize:10,padding:'3px 7px'}}>This Mo.</button>
        <button onClick={() => setMonth(1)}  style={{fontSize:10,padding:'3px 7px'}}>Next Mo.</button>
        <button className="btn-run" onClick={handleRun} disabled={loading}
          style={paramsChanged && !loading ? {boxShadow:'0 0 0 2px #4ade80'} : {}}>
          {loading ? 'Loading…' : '▶ Run Report'}
        </button>

        <div className="toolbar-divider" />

        <div className="status-pills">
          <span className={`status-pill status-pill-all${statusFilter==='all'?' active':''}`} onClick={() => setStatusFilter('all')}>
            All {counts.all > 0 && `(${counts.all})`}
          </span>
          <span className={`status-pill status-pill-enrolled${statusFilter==='enrolled'?' active':''}`} onClick={() => setStatusFilter('enrolled')}>
            Enrolled {counts.enrolled > 0 && `(${counts.enrolled})`}
          </span>
          <span className={`status-pill status-pill-cancelled${statusFilter==='cancelled'?' active':''}`} onClick={() => setStatusFilter('cancelled')}>
            Cancelled {counts.cancelled > 0 && `(${counts.cancelled})`}
          </span>
        </div>

        <div className="toolbar-divider" />

        <ColToggle k="recId"        label="Rec ID" />
        <ColToggle k="dob"          label="DOB" />
        <ColToggle k="age"          label="Age" />
        <ColToggle k="grade"        label="Grade" />
        <ColToggle k="gender"       label="Gender" />
        <ColToggle k="contact"      label="Contact" />
        <ColToggle k="owner"        label="Owner" />
        <ColToggle k="ownerContact" label="Owner Contact" />
        <ColToggle k="times"        label="Times" />
        <ColToggle k="registered"   label="Registered" />
        <ColToggle k="responses"    label="Form Responses" />

        <div className="toolbar-spacer" />
        {rows && <span className="row-count">{displayRows.length} of {counts.all}</span>}
        <div className="toolbar-divider" />
        <button onClick={() => window.print()}>🖨️ Print</button>
        <button className="btn-excel" onClick={exportExcel} disabled={!rows || !rows.length}>📊 Excel</button>
        <button
          className="btn-pdf"
          onClick={downloadPdf}
          disabled={pdfLoading || !rows || !rows.length}
        >
          {pdfLoading ? 'Generating…' : '📄 PDF'}
        </button>
      </div>
    );
  }

  if (error && !rows) return (
    <div>{renderToolbar()}
      <div className="page"><div className="error"><p><strong>Failed to load data</strong></p><p>{error}</p></div></div>
    </div>
  );

  if (!rows) return (
    <div>{renderToolbar()}
      <div className="page"><div className="loading"><div className="spinner" /><div>Loading roster…</div></div></div>
    </div>
  );

  function ColHdrs() {
    return (
      <div className="col-header-row">
        {cols.recId && <span className="cell col-recid">Rec ID</span>}
        <span className="cell col-fname">First Name</span>
        <span className="cell col-lname">Last Name</span>
        {cols.dob      && <span className="cell col-dob">DOB</span>}
        {cols.age      && <span className="cell col-age">Age</span>}
        {cols.grade    && <span className="cell col-grade">Grade</span>}
        {cols.gender   && <span className="cell col-gender">Gender</span>}
        {cols.contact  && <><span className="cell col-phone">Phone</span><span className="cell col-email">Email</span></>}
        {cols.owner    && <span className="cell col-owner">Household Owner</span>}
        {cols.ownerContact && <><span className="cell col-ownerph">Owner Phone</span><span className="cell col-ownerem">Owner Email</span></>}
        {cols.times    && <span className="cell col-times">Start – End</span>}
        <span className="cell col-status">Status</span>
        {cols.registered && <span className="cell col-reg">Registered</span>}
      </div>
    );
  }

  function DataRow({ r }) {
    const isCancelled = r.status === 'Cancelled';
    return (
      <>
        <div className={`data-row${isCancelled ? ' is-cancelled' : ''}`}>
          {cols.recId && <span className="cell col-recid">{r.recId}</span>}
          <span className="cell col-fname">{r.firstName}</span>
          <span className="cell col-lname">{r.lastName}</span>
          {cols.dob      && <span className="cell col-dob">{formatDOB(r.dob)}</span>}
          {cols.age      && <span className="cell col-age">{r.age}</span>}
          {cols.grade    && <span className="cell col-grade">{r.grade}</span>}
          {cols.gender   && <span className="cell col-gender">{r.gender}</span>}
          {cols.contact  && <>
            <span className="cell col-phone">{formatPhone(r.phone)}</span>
            <span className="cell col-email">
              {r.email ? <a href={`mailto:${r.email}`} style={{color:'#3b82f6',textDecoration:'none'}}>{r.email}</a> : ''}
            </span>
          </>}
          {cols.owner && <span className="cell col-owner">{r.owner}</span>}
          {cols.ownerContact && <>
            <span className="cell col-ownerph">{formatPhone(r.ownerPhone)}</span>
            <span className="cell col-ownerem">{r.ownerEmail}</span>
          </>}
          {cols.times && <span className="cell col-times" style={{fontSize:'10.5px'}}>
            {r.sessionStart && r.sessionEnd ? `${r.sessionStart} – ${r.sessionEnd}` : r.sessionStart || ''}
          </span>}
          <span className="cell col-status">
            <span className={`status-badge status-${isCancelled ? 'cancelled' : 'enrolled'}`}>{r.status}</span>
          </span>
          {cols.registered && <span className="cell col-reg">{r.registered}</span>}
        </div>
        {cols.responses && r.formResponses && r.formResponses.length > 0 && (
          <div className="form-responses-row">
            <div className="form-responses-grid">
              {r.formResponses.map((qa, i) => (
                <div className="form-qa-pair" key={i}>
                  <span className="form-q">{qa.q}</span>
                  <span className="form-a">{qa.a}</span>
                </div>
              ))}
            </div>
          </div>
        )}
      </>
    );
  }

  return (
    <div>
      {renderToolbar()}
      <div className="page" style={loading ? {opacity:.5, pointerEvents:'none'} : {}}>

        <div className="report-header">
          <div>
            {logoUrl && <img src={logoUrl} alt="" className="report-header-logo" onError={e => e.target.style.display='none'} />}
            <div className="org-label">{orgName || orgSlug}</div>
            <div className="title">Class Roster</div>
          </div>
          <div className="date-range">{dateRangeLabel}</div>
        </div>

        {sortedSections.length === 0 && (
          <div style={{textAlign:'center',padding:'40px 0',color:'#888'}}>
            No participants found for the selected filters.
          </div>
        )}

        {sortedSections.map(secName => {
          const sec = grouped[secName];
          const sortedDates = Object.keys(sec.sessions).sort();
          const secEnrolled  = Object.values(sec.sessions).flatMap(s => s.rows).filter(r => r.status === 'Enrolled').length;
          const secCancelled = Object.values(sec.sessions).flatMap(s => s.rows).filter(r => r.status === 'Cancelled').length;

          return (
            <div className="section-group" key={secName}>
              <div className="section-hdr">
                <div className="section-hdr-left">
                  <span className="sec-name">{secName}</span>
                  {sec.className && <span className="class-name">{sec.className}</span>}
                </div>
                <div className="sec-counts">
                  {secEnrolled  > 0 && <span className="cnt-enrolled">{secEnrolled} enrolled</span>}
                  {secCancelled > 0 && <span className="cnt-cancelled">{secCancelled} cancelled</span>}
                </div>
              </div>

              {sortedDates.map((dk, di) => {
                const sess = sec.sessions[dk];
                return (
                  <div key={dk}>
                    <div className="session-hdr">
                      <span className="sess-date">{dk}</span>
                      {sess.start && sess.end && (
                        <span className="sess-time">·  {sess.start} – {sess.end}</span>
                      )}
                      <span className="sess-count">{sess.rows.length} participant{sess.rows.length !== 1 ? 's' : ''}</span>
                    </div>
                    {di === 0 && <ColHdrs />}
                    {sess.rows.map((r, i) => <DataRow key={i} r={r} />)}
                  </div>
                );
              })}
            </div>
          );
        })}

        <div className="report-footer">
          <span>{orgName || orgSlug}</span>
          <span>Run Date/Time: {runDate}</span>
        </div>
        <div id="report-ready" style={{display:'none'}} />
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
